body:
  text: 欽定四庫全書御纂周易折中卷十四繫辭上傳下子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地本義十翼皆夫子所作不應自著子曰字疑皆後人所加也窮理則知崇如天而德崇循理則禮卑如地而業廣此其取類又以清濁言也集說韓氏伯曰極知之崇象天髙而統物備禮之用象地廣而載物也孔氏頴達曰言易道至極聖人用之以增崇其德廣大其葉朱子語類云知識貴乎髙明踐履貴乎著實知既髙明須放低著實作去又云知崇者德之所以崇禮卑者業之所以廣蓋禮才有些不到處便有所缺闕業便不廣矣惟極卑無所缺闕所以廣又云禮卑是卑順之意卑便廣地卑便廣髙則狹了人若只揀取髙底作便狹兩腳踏地作方得吳氏澄曰崇德者立心之易而所得日進日新也廣業者行事之簡而所就日充日富也德之進而新由所知之崇髙明如天業之充而富由所履之卑乎實如地張氏振淵曰知即德之虛明炯於中者禮即業之矩矱成於外者天運於萬物之上而聖心之知亦獨超於萬象之表故曰崇效天地包細微不遺一物而聖人之禮亦不忽於纖悉細微之際故曰卑法地天地設位而易行乎其中矣成性存存道義之門本義天地設位而變化行猶知禮存性而道義出也成性本成之性也存存謂存而又存不已之意也此第七章集說朱子語類云識見髙於上所行實於下中閒便生生而不窮故說易行乎其中成性存存道義之門俞氏琰曰人之性渾然天成蓋無有不善者更加以涵養功夫存之又存則無所往而非道無所往而非義矣林氏希元曰此承上文知崇禮卑崇效天卑法地而言意謂天地設位則陰陽變化而易行乎其中矣聖人知禮至於效天法地則本成之性存存不已而道義從此出故曰道義之門蓋道義之得於心者日新月盛則德於是乎崇矣道義之見於事者日積月纍則業於是乎廣矣此易所以為聖人之崇德廣業而易書所以為至也盧氏曰天地位而易行是天地德業之盛知禮存而道義出是聖人德業之盛吳氏曰愼曰道義之出不窮猶易之生生不已也然未有不存存而能生生者案門字不可專以出說須知兼出入兩意知崇於內則萬理由此生是道所從出之門也禮卑於外則萬行由此成是義所從入之門也若以四德配則知屬冬禮屬夏道即仁也屬春義屬秋仁主出而發用然非一心虛明萬理畢照則無以為發用之源義主入而收斂然非百行萬善具足完滿亦無以為收斂之地矣此造化動靜互根顯諸仁藏諸用之妙其在人則性之德也合內外之道也總論項氏安世曰此章言聖人體易於身也知窮萬理之原則乾之始萬物也禮循萬理之則則坤之成萬物也道者義之體智之所知也義者道之用禮之所行也聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象本義賾雜亂也象卦之象如說卦所列者集說朱子語類云賾雜亂也古無此字只是嘖字今從臣亦是口之義與左傳嘖有繁言之嘖同是口裏說話多雜亂底意思所以下文說不可惡先儒多以賾為至妙之意若如此說何以謂之不可惡賾只是一箇雜亂冗閙底意思吳氏澄曰不以彖對爻言而以象對爻言者文王未繫彖辭之先重卦之名謂之象象先於彖言象則彖在其中胡氏炳文曰擬者象之未成象者擬之已定姑以乾坤二卦言之未盡則擬陰陽之形容於是為竒耦之畫畫則象也已畫又取象天地首腹牛馬以至於為金為玉為釜為布之類皆象也鄭氏維嶽曰擬之在心象之在畫張氏振淵曰擬諸形容者擬之陰陽也在未畫卦之先象其物宜正畫卦之事擬是擬其所象象是象其所擬物而曰宜不獨肖其形兼欲盡其理聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻本義㑹謂理之所聚而不可遺處通謂理之可行而無所礙處如庖丁解牛㑹則其族而通則其虛也集說朱子語類云㑹以物之所聚而言通以事之所宜而言會是衆理聚處雖覺得有許多難易窒礙必於其中却得箇通底道理乃可行爾且如事理閒若不於會處理會却只見得一偏便如何行得通須是於㑹處都理會其間却自有箇通處這禮字又說得濶凡事物之常理皆是又云會而不通便窒塞而不可行通而不會便不知許多曲直錯雜處吳氏澄曰會通謂大中至正之理非一偏一曲有所拘礙者也聖人見天下不一之動而觀其極善之理以行其事見理精審則行事允當也以處事之法為辭繫於各爻之下使筮而遇此爻者如此處事則吉不如此處事則凶也胡氏炳文曰不會則於理有遺闕如之何可通不通則於理有窒礙如之何可行通是時中典常是庸蔡氏清曰觀會通行典禮且就天下之動上說未著在易將此理係之於易以斷其吉凶是爻辭之所以為爻辭者乃所以效天下之動也故謂之爻趙氏光大曰通即會中之通據事理而言則曰通據聖人立為常法而言則曰典禮典常也禮者理之可行者也何氏楷曰㑹如省會之㑹自彼而來者面面可至通如通都之通自此而往者方方可逹錢氏澄之曰事勢盤錯之㑹人見為有礙者聖人觀之必有其通非權宜之行而典禮之行蓋確乎不可易也言天下之至賾而不可惡也言天下之至動而不可亂也本義惡猶厭也集說朱子語類云雜亂處人易得厭惡然都是道理中合有底事自合理㑹故不可惡動亦是合有底上面各自有道理故自不可亂吳氏澄曰六十四卦之義所以章顯天下至幽之義而名言宜稱人所易知則自不至厭惡其賾矣三百八十四爻之辭所以該載天下至多之事而處決精當人所易從則自不至棼亂其動矣潘氏士藻曰有至一者存所以不可惡有至常者存所以不可亂擬之而後言議之而後動擬議以成其變化本義觀象玩辭觀變玩占而法行之此下七爻則其例也集說王氏宗傳曰擬之而後言擬是象而言也擬是而言則言有物矣議之而後動議是爻而動也議是而動則動惟厥時矣朱子語類云擬議只是裁度自家言動使合此理變易以從道之意胡氏炳文曰聖人之於象擬之而後成學易者如之何不擬之而後言聖人之於爻必觀會通以行典禮學易者如之何不議之而後動前言變化易之變化也此言成其變化學易者之變化也鳴鶴在陰其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不愼乎本義釋中孚九二爻義集說韓氏伯曰鶴鳴於陰氣同則和出言户庭千里或應出言猶然況其大者乎千里或應況其邇者乎故夫憂悔吝者存乎纖介定失得者愼於樞機是以君子擬議以動愼其微也蔡氏淵曰居其室即在陰之義出其言即鳴之義千里之外應之即和之之義感應者心也言者心之聲行者心之迹言行乃感應之樞機也保氏八曰言出乎身加乎民行發乎邇見乎遠樞動而户開機動而矢發小則招榮辱大則動天地皆此唱而彼和感應之最捷也汪氏砥之曰居室照在陰看中孚者誠積於中在陰居室正當愼獨以修言行而進於誠也同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭本義釋同人九五爻義言君子之道初若不同而後實無間斷金如蘭言物莫能間而其言有味也集說韓氏伯曰君子出處默語不違其中其跡雖異道同則應耿氏南仲曰或出或處或默或語者物或間之而其迹異也迹雖異而心同故物不得而終閒焉其利斷金則其開除矣間除則合故又曰同心之言其臭如蘭其相好之無斁也朱子語類云同心之利雖金石之堅亦被他斷決將去斷是斷作兩段俞氏琰曰出處語默即先號咷後笑之義二人同心斷金臭蘭即相遇之義錢氏志立曰斷金言其心志之堅物不得閒也如蘭言其氣味之一物不能雜也初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有愼之至也夫茅之為物薄而用可重也愼斯術也以往其無所失矣本義釋大過初六爻義集說程氏敬承曰天下事成於愼而敗於忽況當大過時時事艱難愼心不到便有所失故有取於愼之至言寧過於畏愼也案茅之為物薄而用可重此句須對卦義看卦取棟為義者任重者也茅之視棟為物薄矣然棟雖任重而猶有橈之患故當大事者每憂其傾墜也若藉茅於地則雖重物而不憂於傾墜矣豈非物薄而用可重乎自古圖大事必以小心為基故大過之時義雖用剛而以初爻之柔為基者此也勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也本義釋謙九三爻義德言盛禮言恭言德欲其盛禮欲其恭也集說楊氏萬里曰人之謙與傲係其德之厚與薄德厚者無盈色德薄者無卑辭如鐘磬焉愈厚者聲愈緩薄者反是故有勞有功而不伐不德唯至厚者能之其德愈盛則其禮愈恭矣亢龍有悔子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也本義釋乾上九爻義當屬文言此蓋重出集說孔氏穎逹曰上既以謙德保位此明無謙則有悔故引乾之上九亢龍有悔證驕亢不謙也王氏宗傳曰知聖人深豫乎謙之九三則知聖人深戒乎乾之上九何也亢者謙之反也九三致恭存位上九則貴而無位九三萬民服上九則髙而無民九三能以功下人上九則賢人在下位而無輔此九三所以謙而有終上九所以亢而有悔也不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子愼密而不出也本義釋節初九爻義集說蔡氏淵曰不言則是非不形人之招禍惟言為甚故言所當節也密於言語即不出户庭之義吳氏澄曰此爻辭所象愼動之節而夫子以發言之辭釋之程子曰在人所節惟言與行節於言則行可知言當在先也子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也本義釋解六三爻義此第八章言卦爻之用集說孔氏穎逹曰此結上不密失身之事事若不密人則乘此機危而害之猶若財之不密盜則乘此機危而竊之胡氏瑗曰小人居君子之位不惟盜之所奪抑亦為盜之侵伐矣蓋在上之人不能選賢任能遂使小人乘時得勢而至於髙位非小人之然也陳氏琛曰小人而乘君子之器則處非其據而盜思奪之矣且小人在位則慢上暴下人所不堪而盜思伐之矣趙氏光大曰强取曰奪執辭曰伐案慢暴如陳氏說亦通然以慢字對下文慢藏觀之則當為上䙝慢其名器而在下之小人得肆其殘暴之義方與伐字相應蓋奪者禍止其身也伐者禍及國家也慢藏誨盜以喻上慢下暴盜思伐之冶容誨淫以喻小人而乘君子之器盜思奪之總論谷氏家杰曰此章重擬議成變化句前章以存存用易尊德性也此章以擬議用易道問學也案此上二章申君子所居而安者一節之義得易理於心之謂德成易理於事之謂業聖人猶然況學者乎是故不可以至賾而惡也不可以至動而亂也擬之於至賾之中得聖人所謂擬諸形容者則沛然無疑而可以言矣議之於至動之際得聖人所謂觀其會通者則確然不易而可以動矣知禮成性不待擬議而變化出焉者聖人之事也精義利用擬議以成其變化者學者之功也中孚以下七爻舉例言之天一地二天三地四天五地六天七地八天九地十本義此簡本在第十章之首程子曰宜在此今從之此言天地之數陽竒陰耦即所謂河圖者也其位一六居下二七居上三八居左四九居右五十居中就此章而言之則中五為衍母次十為衍子次一二三四為四象之位次六七八九為四象之數二老位於西北二少位於東南其數則各以其類交錯於外也集說郭氏雍曰天數五地數五者此也漢志言天以一生水地以二生火天以三生木地以四生金天以五生土故或謂天一至五為五行生數地六至地十為五行成數雖有此五行之說而於易無所見故五行之說出於歷數之學非易之道也朱子語類云自大衍之數五十至再扐而後掛便接乾之策二百一十有六至可與祐神矣為一節是論大衍之數自天一至地十却連天數五至而行鬼神也為一節是論河圖五十五之數今其文閒斷差錯不相連接舛誤甚明項氏安世曰姚大老云天一地二至天九地十班固律歷志及衛元嵩元包運蓍篇皆在天數五地數五之上吳氏澄曰案漢書律歷志引此章天一地二至行鬼神也六十四字相連則是班固時此簡猶未錯也天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也本義此簡本在大衍之後今桉宜在此天數五者一三五七九皆竒也地數五者二四六八十皆耦也相得謂一與二三與四五與六七與八九與十各以竒耦為類而自相得有合謂一與六二與七三與八四與九五與十皆兩相合二十有五者五奇之積也三十者五耦之積也變化謂一變生水而六化成之二化生火而七變成之三變生木而八化成之四化生金而九變成之五變生土而十化成之鬼神謂凡奇耦生成之屈伸往來者集說孔氏穎逹曰言此陽奇陰耦之數成就其變化而宣行鬼神之用程子曰數只是氣變化鬼神亦只是氣天地之數五十有五變化鬼神皆不越於其閒龔氏煥曰五位相得之說當從孔氏蓋既謂之五位相得則是指一六居北二七居南三八居東四九居西五十居中而言且一二三四之相得不見其用不若孔之的也案龔氏之意謂相得者言四方相次如一三七九二四六八是也有合者言四方相交如一六二七三八四九是也此說極合圖意蓋相得者是二氣之迭運四時之順播所以成變化者此也有合者是動靜之互根陰陽之互藏所以行鬼神者此也然成變化行鬼神不直言於相得有合之後必重叙天地之數五十有五者蓋非重叙細數則無以見相得者之自少而多自微而盛有合者之多少相閒微盛相錯而往來積漸之迹屈伸交互之機有所未明者矣大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸奇於扐以象閏五歲再閏故再扐而後掛本義大衍之數五十蓋以河圖中宫天五乘地十而得之至用以筮則又止用四十有九蓋皆出於理勢之自然而非人之知力所能損益也兩謂天地也掛懸其一於左手小指之間也三三才也揲間而數之也奇所揲四數之餘也扐勒於左手中三指之兩閒也閏積月之餘日而成月者也五歲之間再積日而再成月故五歲之中凡有再閏然後别起積分如一掛之後左右各一揲而一扐故五者之中凡有再扐然後别起一掛也集說韓氏伯曰王弼曰演天地之數者五十也其用四十有九則其一不用也不用而用以之通非數而數以之成斯易之太極也孔氏穎逹曰分而為二以象兩者五十之內去其一餘有四十九合同未分今以四十九分而為二以象兩儀也掛一以象三者就兩儀之閒於天數之中分掛其一以象三才也揲之以四以象四時者分揲其蓍皆以四四為數以象四時歸奇於扐以象閏者謂四揲之餘歸此殘奇於扐而成數以象天道歸殘聚餘分而成閏也五歲再閏者凡前閏後閏相去大略三十二月在五歲之中故五歲再閏張氏浚曰歸奇於扐以象閏何也大衍用四十有九老陽餘數十有三老陰餘數二十有五合之為三十有八少陽餘數二十有一少陰餘數十有七合之亦為三十有八乘以六爻之位則二百二十有八也凡術於算者率以二百二十八為求閏之法蓋自然之紀如此朱子蓍卦考誤曰五十之內去其一但用四十九策合同未分是象太一也以四十九策分置左右兩手左手象天右手象地是象兩儀也掛猶懸也於右手之中取其一策懸於左手小指之閒所以象人而配天地是象三才揲數之也謂先置右手之策於一處而以右手四四而數左手之策又置左手之策而以左手四四而數右手之策也皆以四數是象四時奇零也扐勒也謂既四數兩手之策則其四四之後必有零數或一或二或三或四左手者歸之於第四第三指之間右手者歸之於第三第二指之間而扐之也象閏者積餘分而成閏月也凡前後閏相去大略三十二月在五歲之中此掛一揲四歸竒之法亦一變之閒凡一掛兩揲兩扐為五歲之象其閒凡兩扐以象閏是五歲之中凡有再閏然後置前掛扐之策復以見存之策分二掛一而為第二變也又答郭雍曰過揲之數雖先得之然其數衆而繁歸竒之數雖後得之然其數寡而約紀數之法以約御繁不以衆制寡故先儒舊說專以多少決陰陽之老少而過揲之數亦冥㑹焉初非有異說也然七八九六所以為陰陽之老少者其說又本於圖書定於四象其歸竒之數亦因揲而得之耳大抵河圖洛書者七八九六之祖也四象之形體次第者其父也歸奇之奇耦方圓者其子也過揲而以四乘之者其孫也今自歸竒以上皆棄不録而獨以過揲四乘之數為說恐或未究象數之本原也吳氏澄曰衍母之一數之所起故大衍五十之數虛其一而不用所用者四十有九其數七七蓋以一一為體七七為用也胡氏炳文曰厯法再閏之後又從積分而起則筮法再扐之後又必從掛一而起也附録虞氏翻曰竒所掛一策扐所揲之餘不一則二不三則四也取竒以歸扐以閏月定四時成歲故歸竒於扐以象閏也張子曰竒所掛之一也扐左右手四揲之餘也再扐後掛者每成一爻而後掛也謂第二第三揲不掛也閏嘗不及三歲而再至故曰五歲再閏此歸奇必俟於再扐者象閏之中間再歲也郭氏忠孝曰奇者所掛之一也扐者左右兩揲之餘也得左右兩揲之餘置於前以竒歸之也歸奇象閏也五歲再閏非以再扐象再閏也蓋閏之後有再歲故歸奇之後亦有再扐也再扐而後復掛掛而復歸則五歲再閏之義矣自唐初以來以奇為扐故揲法多誤至橫渠先生而後奇扐復分又曰扐者數之餘也如禮言祭用數之仂是也或謂指閒為扐者非繫辭言歸奇於扐則奇與扐為二事也又言再扐而後掛則扐與奇亦二事也由是知正義誤以奇為扐又誤以左右手揲為再扐如曰最末之餘歸之合於扐掛之一處其說自相抵捂莫知所從惟當從橫渠先生之說為正又曰繫辭以兩扐一掛為三變而成一爻是有三歲一閏之象正義以每一揲左右兩手之餘即為再扐是一變之中再扐一掛皆具則一歲一閏之象也凡揲蓍第一變必掛一者謂不掛一則無變所餘皆得五也惟掛一則所餘非五則九故能變第二第三揲雖不掛亦有四八之變蓋不必掛也故聖人必再扐後掛者以此案郭雍本其先人郭忠孝之說以為蓍說引張子之言為據朱子與之往復辨論今附録於後以備參考大約孔疏本義則以左右揲餘為奇而即以再扐象再閏張子郭氏則以先掛一者為奇而歸之於扐以象閏其說謂惟初變掛一而後二變不掛故初歲有閏又須更越二歲如初變有掛又須更越二變以應再扐後掛之文也如郭氏說則再閏再扐兩再字各異義而不相應故須以朱子之論為確然以歸竒為歸掛一之奇則自虞翻已為此說且玩經文語氣歸奇於扐奇與扐自是兩物而併歸一處爾此義則郭氏之說可從蓋疏義之意是以扐象閏也張郭之意是以掛象閏也今折其中則掛扐皆當併以象閏以天道論之氣盈朔虛必併為一法以筮儀論之掛與扐必併在一處以經文考之曰歸奇於扐又曰再扐後掛則象閏者當併掛與扐明矣乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日本義凡此策數生於四象蓋河圖四面太陽居一而連九少陰居二而連八少陽居三而連七太陰居四而連六揲蓍之法則通計三變之餘去其初掛之一凡四為奇凡八為耦奇圓圍三耦方圍四三用其全四用其半積而數之則為六七八九而第三變揲數策數亦皆符會蓋餘三奇則九而其揲亦九策亦四九三十六是為居一之太陽餘二竒一耦則八而其揲亦八策亦四八三十二是為居二之少陰二耦一竒則七而其揲亦七策亦四七二十八是為居三之少陽三耦則六而其揲亦六策亦四六二十四是為居四之老陰是其變化往來進退離合之妙皆出自然非人之所能為也少陰退而未極乎虛少陽進而未極乎盈故此獨以老陽老陰計乾坤六爻之策數餘可推而知也期周一歲也凡三百六十五日四分日之一此特舉成數而槩言之耳集說孔氏穎達曰乾之少陽一爻有二十八策六爻則有一百六十八策此經據老陽之策也若坤之少陰一爻有三十二六爻則有一百九十二此經據坤之老陰故百四十有四也朱子語類云大凡易數皆六十三十六對二十四三十二對二十八皆六十也十甲十二辰亦湊到六十也鐘律五聲十二律亦積為六十也以此知天地之數皆至六十為節又答程大昌曰大傳專以六爻乘二老而言故曰乾之策二百二十有六坤之策百四十有四凡三百有六十其實六爻之為陰陽者老少錯雜其積而為乾者未必皆老陽其積而為坤者未必皆老陰其為六子諸卦者或陽或陰亦互有老少焉胡氏炳文曰前則掛扐象月之閏此則過揲之數象歲之周蓋揲之以四已合四時之象故總過揲之數又合四時成歲之象也案大傳不言乾之掛扐若干坤之掛扐若干而但言乾之策坤之策則以策數定七八九六者似是二篇之策萬有一千五百二十當萬物之數也本義二篇謂上下經凡陽爻百九十二得六千九百一十二策陰爻百九十二得四千六百八策合之得此數是故四營而成易十有八變而成卦本義四營謂分二掛一揲四歸竒也易變易也謂一變也三變成爻十八變則成六爻也集說陸氏績曰分而為二以象兩一營也掛一以象三二營也揲之以四以象四時三營也歸奇於扐以象閏四營也孔氏穎逹曰營謂經營謂四度經營蓍策乃成易之一變也每一爻有三變初一揲不五則九是一變也第二揲不四則八是二變也第三揲亦不四則八是三變也若三者俱多為老陰謂初得九第二第三俱得八也若三者俱少為老陽謂初得五第二第三俱得四也若兩少一多為少陰謂初與二三之閒或有四有五而有八或有二四而有一九也其兩多一少為少陽謂三揲之閒或有一九一八而有一四或為二八而有一五也三變既畢乃定一爻六爻則十有八變乃始成卦也朱子語類云這處未下得卦字亦未下得爻字只下得易字八卦而小成本義謂九變而成三畫得內卦也集說孔氏穎逹曰八卦而小成者象天地雷風日月山澤於大象略盡是易道小成引而伸之觸類而長之天下之能事畢矣本義謂已成六爻而視其爻之變與不變以為動靜則一卦可變而為六十四卦以定吉凶凡四千九十六卦也案六十四卦變為四千九十六卦之法即如八卦變為六十四卦之法畫上加畫至於四千九十六卦則六畫者積十二畫矣如引寸以為尺引尺以為丈故曰引而伸之聖人設六十四卦又繫以辭則事類大略已盡今又就其變之所適而加一卦焉彼此相觸或相因以相生或相反以相成其變無窮則義類亦無窮故曰觸類而長之如此則足以該事變而周民用故曰天下之能事畢顯道神德行是故可與酬酢可與祐神矣本義道因辭顯行以數神酬酢謂應對祐神謂助神化之功集說韓氏伯曰可以應對萬物之求助成神化之功也酬酢猶應對張子曰示人吉凶其道顯陰陽不測其德神顯故可與酬酢神故可與祐神又曰顯道者危使平易使傾懼以終始其要無咎之道也神德行者寂然不動冥會於萬化之感而莫知為之者也受命如響故可與酬酢曲盡鬼謀故可與祐神顯道神德行此言蓍龜之德也項氏安世曰天道雖幽可闡之以示乎人人事雖顯可推之以合乎天明可以酬酢事物之宜幽可以贊出鬼神之命子曰知變化之道者其知神之所為乎本義變化之道即上文數法是也皆非人之所能為故夫子歎之而門人加子曰以别上文也此第九章言天地大衍之數揲蓍求卦之法然亦略矣意其詳具於大卜筮人之官而今不可考耳其可推者啓蒙備言之集說韓氏伯曰變化之道不為而自然故知變化之道者則知神之所為張子曰惟神為能變化以其一天下之動也人能知變化之道其必知神之所為也蘇氏軾曰神之所為不可知觀變化而知之矣變化之閒神無不在董氏銖曰陽化為陰陰變為陽者變化也所以變化者道也道者本然之妙變化者所乘之機故隂變陽化而道無不在兩在故不測故曰知變化之道者其知神之所為乎龔氏煥曰此所謂知變化之道者其知神之所為即承上文所謂成變化而行鬼神為言也蓋河圖之數體也故曰所以成變化而行鬼神大衍之數用也故曰知變化之道其知神之所為成變化所以行鬼神故知變化之道則知神之所為變化者神之所為而神不離於變化知道者必能知之陸氏振竒曰神妙變化而為言故知鬼神之行即在成變化處谷氏家杰曰神之所為是因圖數之神以贊衍法之神見其亦如天地之成變化而行鬼神也指蓍法之變化為神非總承數法而並贊其神也案此節是承蓍卦而贊之龔氏谷氏之論為得蓋蓍卦之法乃所以寫變化之機而陰陽合一不測之妙行乎其間也下文象變辭占即是變化之道至精至變以極於至神即是神之所為易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占本義四者皆變化之道神之所為者也集說虞氏翻曰以言者尚其辭聖人之情見於辭繫辭焉以盡言也動則玩其占故尚其占者也孔氏穎逹曰策是筮之所用並言卜者卜雖龜之見兆亦有陰陽五行變動之狀程子曰言所以述理以言者尚其辭謂以言求理者則存意於辭也以動者尚其變動則變也順變而動乃合道也制器作事當體乎象卜筮吉凶當考乎占朱子語類問以卜筮者尚其占卜用龜亦使易占否曰不用則是文勢如此胡氏炳文曰辭以明變象之理占以斷變象之應故四者之目以辭與占始終焉蔡氏清曰尚辭與尚占有别後章云繫辭焉所以告也定之以吉凶所以斷也於此可見尚辭尚占之别矣又曰言動制器卜筮不必俱以筮易言君子居則觀其象而玩其辭亦可用易也動則觀其變而玩其占亦可用易也何氏楷曰此章與第二章觀象玩辭觀變玩占相應是以君子將有為也將有行也問焉而以言其受命也如嚮無有遠近幽深遂知來物非天下之至精其孰能與於此本義此尚辭尚占之事言人以蓍問易求其卦爻之辭而以之發言處事則易受人之命而有以告之如嚮之應聲以決其未來之吉凶也以言與以言者尚其辭之以言義同命則將筮而告蓍之語冠禮筮日宰自右贊命是也集說朱子語類云問焉而以言以上下文推之以言却是命筮之詞古人亦大段重這命筮之詞吳氏澄曰有為謂作內事有行謂作外事蔡氏清曰行之於身是有為措之事業是有行案此節是釋動則觀其變而玩其占之意又起下章所謂蓍之德也蓍以知來故曰遂知來物至精者虛明鑒照如水鏡之無纖翳也參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此本義此尚象之事變則象之未定者也參者三數之也伍者五數之也既參以變又伍以變一先一後更相考核以審其多寡之實也錯者交而互之一左一右之謂也綜者總而挈之一低一昂之謂也此亦皆謂揲蓍求卦之事蓋通三揲兩手之策以成陰陽老少之畫究七八九六之數以定卦爻動靜之象也參伍錯綜皆古語而參伍尤難曉按荀子云窺敵制變欲伍以參韓非曰省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以比物伍之以合參史記曰必參而伍之又曰參伍不失漢書曰參伍其賈以類相準此足以相發明矣集說虞氏翻曰觀變陰陽始立卦故成天地之文物相雜故曰文也數六畫之數六爻之動三極之道故定天下吉凶之象也朱子語類云紀數之法以三數之則遇五而齊以五數之則遇三而㑹所謂參伍以變者前後多寡更相反覆以不齊而要其齊又云參伍所以通之其治之也簡而疏錯綜所以極之其治之也繁而密案此節是釋居則觀其象而玩其辭之意又起下章所謂卦之德六爻之義也卦爻以藏往故曰遂成天地之文遂定天下之象成文謂八卦也雷風水火山澤之象具而天地之文成矣定象謂六爻也內外上下賁賤之位立而天下之象定矣參伍錯綜亦是互文總以見卦爻陰陽互相參錯爾至變者變動周流如雲物之無定質也易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此本義此四者之體所以立而用所以行者也易指蓍卦無思無為言其無心也寂然者感之體感通者寂之用人心之妙其動靜亦如此集說孔氏穎逹曰既無思無為故寂然不動有感必應萬事皆通是感而遂通天下之故也言易理神功不測邵子曰無思無為者神妙致一之地也所謂一以貫之聖人以此洗心退藏於密程子曰老子曰無為又曰無為而無不為聖人作易未嘗言無為惟曰無思也無為也此戒夫作為也然下即曰寂然不動感而遂通天下之故是動靜之理未嘗為一偏之說矣胡氏居仁曰天下之理雖萬殊而實一本皆具於心故感而遂通若原不曾具得此理如何通得林氏希元曰感而遂通天下之故即是上文遂成天地之文遂定天下之象受命如嚮遂知來物之意蓋即上文而再謄說以歸於至神也張氏振淵曰上數遂字已含有神字意非精變之外别有神案此節是總蓍卦爻之德而贊之遂通天下之故即上文遂知來物遂成天地之文而此謂之至神者以其皆感通於寂然不動之中其知來物非出於思其成文定象非出於為也神不在精變之外其即精變之自然而然者與夫易聖人之所以極深而研幾也本義研猶審也幾微也所以極深者至精也所以研幾者至變也集說韓氏伯曰極未形之理則曰深適動微之㑹則曰幾孔氏穎逹曰言易道𢎞大故聖人用之所以窮極幽深而研覆幾微也無有遠近幽深是極深也參伍以變錯綜其數是研幾也俞氏琰曰深藴奧而難見也幾細微而未著也極深謂以易之至精窮天下之至精研幾謂以易之至變察天下之至變唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至本義所以通志而成務者神之所為也集說虞氏翻曰深謂幽贊神明無有遠近幽深遂知來物故通天下之志謂蓍也務事也謂易研幾故成天下之務謂卦也寂然不動感而遂通故不行而至者也孔氏穎逹曰唯深也故能通天下之志者聖人用易道以極深故聖人德深也能通天下之志意即是受命如嚮遂知來物唯幾也故能成天下之務者聖人用易道以研幾故能知事之幾微通其變遂成天地之文是也張子曰一故神譬之人身四體皆一物故能觸之而無不覺不待心使至此而後覺也此所謂感而遂通不行而至不疾而速也張氏浚曰精之所燭來物遂知天下之志於此而可通變之所該萬象以定天下之務於此而可成朱子語類云通天下之志猶言開物開通其閉塞也故其下對成務又易精變神說曰變化之道莫非神之所為也故知變化之道則知神之所為矣易有聖人之道四焉所謂變化之道也觀變玩占可以見其精之至矣玩辭觀象可以見其變之至矣然非有寂然感通之神則亦何以為精為變而成變化之道哉此變化之所以為神之所為也案本義以至精為尚辭尚占之事至變為尚象尚變之事而易說以至精為變占至變為象辭蓋本第二章居則觀象玩辭動則觀變玩占而來此與下章蓍之德卦之德既相應而第二章觀玩之義亦因以明當從此說子曰易有聖人之道四焉者此之謂也本義此第十章承上章之意言易之用有此四者集說蔡氏清曰上章四營而成易至顯道神德行則辭變象占四者俱有但未及枚舉而明言之耳故此章詳之子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑本義開物成務謂使人卜筮以知吉凶而成事業冒天下之道謂卦爻既設而天下之道皆在其中集說朱子語類云古時民淳俗朴風氣未開於天下事全未知識故聖人立龜與之卜作易與之筮使人趨吉避害以成天下之事故曰開物成務物是人物務是事務冒是單得天下許多道理在裏又云讀繫辭者須要就卦中一一見得許多道理然後可讀繫辭也蓋易之為書大抵皆是因卜筮以教逐爻開示吉凶將天下許多道理包藏在其中故冒天下之道龔氏煥曰通志以開物言定業以成務言斷疑以冒天下之道言惟其能冒天下之道所以能斷天下之疑苟其道有不備又何足以斷天下之疑也哉案此通志即是上章通志定業斷疑則是上章成務言通志成務則斷疑在其中矣又多此一句者以起下文蓍卦爻三事是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫本義圓神謂變化無方方知謂事有定理易以貢謂變易以告人聖人體具三者之德而無一塵之纍無事則其心寂然人莫能窺有事則神知之用隨感而應所謂無卜筮而知吉凶也神武不殺得其理而不假其物之謂集說虞氏翻曰吉凶與民同患謂作易者其有憂患也韓氏伯曰圓者運而不窮方者止而有分唯變所適無數不周故曰圓卦列爻分各有其體故曰方又曰表吉凶之象以同民所憂患之事故曰吉凶與民同患也孔氏穎達曰易道深遠故古之聰明睿知神武之君用此易道不用刑殺而威服之也崔氏憬曰蓍之數七七四十九象陽圓其為用變通不定因之以知來物是蓍之德圓而神也卦之數八八六十四象陰方其為用也爻位有分因之以藏往知事是卦之德方以知也張子曰圓神故能通天下之志方知故能定天下之業易貢故能斷天下之疑程子曰安有識得易後不知退藏於密密是用之源聖人之妙處龔氏原曰圓者其體動而不窮神者其用虛而善應卦者象也象則示之以定體爻者變也變則其義不可為典要以此洗心者所以無思也以此退藏於密者所以無為也以此吉凶與民同患者感而遂通天下之故也王氏宗傳曰聖人以此蓍卦六爻洗去夫心之纍則是心也廓然而大公用能退藏於密而不窮之用默存於我焉此即易之所謂寂然不動也夫妙用之源默存於聖人之心則發而為用也酬酢萬物而不窮樂以天下憂以天下故曰吉凶與民同患此即感而遂通天下之故也朱子語類云此言聖人所以作易之本也蓍動卦靜而爻之變易無窮未畫之前此理已具於聖人之心矣然物之未感則寂然不動而無朕兆之可名及其出而應物則憂以天下而圓神方知者各見於功用之實聰明睿知神武而不殺者言其體用之妙也洗心退藏言體知來藏往言用然亦只言體用具矣而未及使出來處到下文是興神物以前民用方發揮許多道理以盡見於用也項氏安世曰蓍用七其德圓卦用八其德方爻用九六其義易貢胡氏居仁曰退藏於密只是其心湛然無事而衆理具在也何氏楷曰德統而義析故爻以義言又曰吉凶之幾兆端已發將至而未至者曰來吉凶之理見在於此一定而可知者曰往是以明於天之道而察於民之故是興神物以前民用聖人以此齊戒以神明其德夫本義神物謂蓍龜湛然純一之謂齊肅然警惕之謂戒明天道故知神物之可興察民故故知其用之不可不有以開其先是以作為卜筮以教人而於此焉齊戒以考其占使其心神明不測如鬼神之能知來也集說韓氏伯曰洗心曰齊防患曰戒朱子語類云此言作易之事也聖人以此齊戒以神明其德夫言用易之事也齊戒敬也聖人無一時一事而不敬此特因卜筮而尤見其精誠之至如孔子所愼齊戰疾之意也又云聖人既具此理又將此理就蓍龜上發明出來使民亦得前知而用之也德即聖人之德聖人自有此理又用蓍龜之理以神明之丘氏富國曰心即神明之舍人能洗之而無一㸃之纍則此心靜與神明一於揲蓍求卦之時能以齊戒存之則此心動與神明通心在則神在矣案以此洗心者聖人體易之事也在學者則居而觀象玩辭亦必如聖人之洗心然後可以得其理以此齊戒者聖人用易之事也在學者則動而觀變玩占亦必如聖人之齊戒然後可以見其幾言聖人以為君子之楷則也是故闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神本義闔闢動靜之機也先言坤者由靜而動也乾坤變通者化育之功也見象形器者生物之序也法者聖人修道之所為而神者百姓自然之日用也集說荀氏爽曰見乃謂之象謂日月星辰光見在天而成象也形乃謂之器萬物生長在地成形可以為器用者也觀象於天觀形於地制而用之可以為法虞氏翻曰闔閉翕也坤象夜故以閉户也闢開也乾象晝故以開户也陽變闔陰陰變闢陽剛柔相推而生變化也陸氏績曰聖人制器以周民用用之不遺故曰利用出入也民皆用之而不知所由來故謂之神也朱氏震曰知闔闢變通者明於天之道知利用出入民咸用之者察於民之故朱子語類云闔闢乾坤理與事皆如此書亦如此這箇只說理底意思多問闔户謂之坤一假只是這一箇物以其闔謂之坤以其闢謂之乾以其闔闢謂之變以其不窮謂之通以其發見而未成形謂之象以其成形則謂之器聖人修明以立教則謂之法百姓日用則謂之神曰是如此又曰利用出入者便是人生日用都離他不得案此節是說天道民故如此易有大極一節是說聖人作易以模寫之是故易有大極是生兩儀兩儀生四象四象生八卦本義一每生二自然之理也易者陰陽之變大極者其理也兩儀者始為一畫以分陰陽四象者次為二畫以分大少八卦者次為三畫而三才之象始備此數言者實聖人作易自然之次第有不假絲毫智力而成者畫卦揲蓍其序皆然詳見序例啓蒙集說邵子曰太極何物也曰無為之本也太極生兩儀兩儀天地之謂乎曰兩儀天地之祖也太極分而為二先得一為一復得一為二一二謂兩儀曰兩儀生四象四象何物也曰四象謂陰陽剛柔有陰陽然後可以生天有剛柔然後可以生地立功之本於斯為極曰四象生八卦八卦何謂也曰謂乾坤離坎兌艮震巽也迭相盛衰終始於其閒矣因而重之則六十四卦由是而生也而易之道備矣朱子語類云太極十全是具一箇善若三百八十四爻中有善有惡皆陰陽變化後方有又云若說其生則俱生太極依舊在陰陽裏但言其次序須有這實理方始有陰陽也自見在事物而觀之則陰陽函太極推其本則太極生陰陽又云易有太極便是下面兩儀四象八卦自三百八十四爻總為六十四自六十四總為八卦自八卦總為四象自四象總為兩儀自兩儀總為太極以物論之易之太極如木之有根浮圖之有頂但木之根浮圖之頂是有形之極太極却不是一物無方所頓放是無形之極故周子曰無極而太極是他說得有功處然太極之所以為太極却不離乎兩儀四象八卦如一隂一陽之謂道指一陰一陽為道則不可然道不離乎陰陽也陳氏淳曰太極只是渾淪極至之理非可以形氣言傳曰易有太極易只是陰陽變化其所以為陰陽變化之理則太極也又曰三極之道三極云者只是三才極至之理其謂之三極者以見三才之中各具一太極而太極之妙無不流行於三才之中也外此百家諸子都說屬氣形去如漢志謂太極函三為一乃是指天地人氣形已具而渾淪未判老子說有物混成先天地生正指此也莊子謂道在太極之先所謂太極亦是指此渾淪未判者而道又别懸空在太極之先則道與太極分為二矣不知道即是太極道是以理之通行者而言太極是以理之極至者而言惟理之極至所以古今人物通行惟古今人物通行所以為理之極至更無二理也胡氏居仁曰太極理也道理最大無以復加故曰太極凡事到理上便是極了再改移不得太是尊大之義極是至當無以加也鄭氏維嶽曰繫辭傳中乾坤多指竒耦二畫言三畫六畫皆此二畫之所生而坤又乾之所生乾者一而已一者太極也徐氏在漢曰同一乾坤也以其一神則謂之太極以其兩化則謂之兩儀竒參耦中乾體而有坎象耦參竒中坤體而有離象故謂之四象乾體而有坎象則震艮之形成矣坤體而有離象則巽兌之形成矣故謂之八卦八卦定吉凶吉凶生大業本義有吉有凶是生大業集說俞氏琰曰八卦具而定吉凶則足以斷天下之疑矣吉凶定而生大業則有以成天下之務矣案聖人作易準天之道故陰陽互變而定為八卦之象形效民之故故制為典禮而推之生民之利用是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鉤深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜本義富貴謂有天下履帝位立下疑有闕文亹亹猶勉勉也疑則怠決故勉集說侯氏行果曰亹勉也夫幽隱深遠之情吉凶未兆之事物皆勉勉然願知之然不能也及蓍成卦龜成兆也雖神道之幽密未來之吉凶坐可觀也是蓍龜成天下之勉勉也朱子語類問以定天下之吉凶成天下之亹亹曰人到疑而不能決處便放倒了不肯向前動有疑阻既知其吉凶自然勉勉住不得則其所以亹亹者卜筮成之也俞氏琰曰賾謂雜亂探者抽而出之也隱謂隱僻索者尋而得之也深謂不可測鉤者曲而取之也遠謂難至致者推而極之也趙氏玉泉曰八卦定吉凶而生大業蓍龜定吉凶而成亹亹可見卦畫者蓍龜之體蓍龜者卦畫之用吳氏曰愼曰上文易有太極四句言作易之序定吉凶生大業言易之用此節贊蓍龜之大用而先之以五者又與闔户八句相應案此節是合上文造化易書而通贊之天地即乾坤四時即變通日月即見象不言形器者下文有立成器之文蓋在天者示人以象而已在地者則民生器用之資故上文制而用之亦偏承形器而言也此備物致用立成器之聖人非富貴則不能故中閒又著此一句明前文制而用之者是治世之聖人也至畫卦生蓍乃是作易之聖人總而叙之則見作易之功與造物者同符與治世者相配也是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之本義此四者聖人作易之所由也河圖洛書詳見啓蒙集說孔氏穎逹曰河出圖洛出書如鄭康成之義則春秋緯云河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書感河圖有九篇洛書有六篇孔安國以為河圖則八卦是也洛書則九疇是也輔嗣之義未知何從劉氏子翬曰河圖昧乎太極則八卦分而無統洛書昧乎皇極則九疇滯而不通朱氏震曰天生神物謂蓍龜也天地變化四時也天垂象見吉凶日月也河圖洛書象數也則者彼有物而此則之也郭氏雍曰河出圖而後畫八卦洛出書而定九疇故河圖非卦也包犧畫而為卦洛書非字也大禹書而為字亦猶箕子因九疇而陳洪範文王因八卦而演周易其始則肇於河圖洛書畫於八卦九疇成於周易洪範其序如此胡氏炳文曰四者言聖人作易之由而易之所以作由於卜筮故以天生神物始焉易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也本義四象謂陰陽老少示謂示人以所值之卦爻此第十一章專言卜筮集說游氏讓溪曰四象謂陰陽老少示謂示人以變化之道即上文以通天下之志者也繫辭焉以盡其言故曰告即上文以定天下之業者也定之以吉凶則趨避之機決矣故曰斷即上文以斷天下之疑者也此結上數節之意案此上三章申君子居則觀其象一節之義首之以河圖次之以蓍策遡易之所因起是象變之本辭占之源也中閒遂備列四者為聖人之道其又以辭為之先者明學易從辭入也辭生於變變出於象象歸於占故其序如此辭變象占四者以其包含來物故謂之至精以其錯綜萬象故謂之至變以其無思無為而感通萬故故謂之至神其所以為聖人之道者以其皆出於聖人之心也蓍德圓神至精也即聖心之所以知來卦德方知爻義易貢至變也即聖心之所以藏往蓍卦之寂然感通至神也即聖心之所以退藏於密吉凶與民同患也以此洗心則為聖人之德以此立教斯為聖人之道故其易之所以作也明於天道則變化象形之類是也察於民故則制法利用之類是也因而寫之於易其兩儀四象八卦之交錯則變化象形具矣吉凶定事業起則制法利用寓矣於是託之蓍龜以前民用蓋與天地四時日月及崇髙有位備物成器之聖人其道上下同流而未之有異也言易之道於此盡矣故復總言以結之天生神物結大衍之數也天地變化垂象結闔闢變通見象形器之類也河出圖洛出書結河圖數也易以蓍策而興以仰觀俯察而作而其發獨智者則莫大於龍馬之祥故其序又如此四象兼象變繫辭辭也定吉凶占也復說四者以起大有上爻之意而終自天祐之吉無不利之指也易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也本義釋大有上九爻義然在此無所屬或恐是錯簡宜在第八章之末集說侯氏行果曰此引大有上九辭以證之也大有上九履信思順自天祐之言人能依四象所示繫辭所告則天及人皆共祐之吉無不利者也朱氏震曰天之所助者順也人之所助者信也六五履信而思乎順又自下以尚賢是以自天祐之吉無不利言此明獲天人之理然後吉無不利聖人明於天之道而察於民之故合天人者也柴氏中行曰聖人興易以示天下欲居則觀其象而玩其辭動則觀其變而玩其占捨逆取順避凶趨吉而已六十四卦中如大有上九辭之順道而獲吉者多矣夫子於此再三舉之者以自天祐之吉無不利之辭深見人順道而行自與吉會之意何氏楷曰取大有上九爻辭以結上文居則觀象而玩辭動則觀變而玩占則孜孜尚賢之意也是以自天祐之吉無不利也與第二章自天祐之語遙應非錯簡也案何氏說是然即是申釋第二章結語之意非遙應也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情僞繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神本義言之所傳者淺象之所示者深觀奇耦二畫包含變化無有窮盡則可見矣變通鼓舞以事而言兩子曰字宜衍其一蓋子曰字皆後人所加故有此誤如近世通書乃周子所自作亦為後人每章加以周子曰字其設問答處正如此也集說崔氏憬曰言伏羲仰觀俯察而立八卦之象以盡其意設卦謂因而重之為六十四卦情僞盡在其中矣作卦爻之辭以繫伏羲立卦之象象既盡意故辭亦盡言也蘇氏軾曰辭約而義廣故能盡其言朱子語類云立象盡意是觀竒耦兩畫包舍變化無有窮盡設卦以盡情僞謂有一奇一耦設之於卦自是盡得天下情僞繫辭焉便斷其吉凶變而通之以盡利此言占得此卦陰陽老少交變因其變便有通之之理鼓之舞之以盡神既占則無所疑自然行得順便如言顯道神德行成天下之亹亹皆是鼓之舞之意又云歐公說繫辭不是孔子作所謂書不盡言言不盡意者非蓋他不曽看立象以盡意一句惟其言不盡意故立象以盡之學者於言上會得者淺於象上㑹得者深問鼓之舞之以盡神又言鼓天下之動者存乎辭鼓舞恐只是振揚發明底意思否曰然蓋提撕警覺使人各為其所當為也吳氏澄曰立象謂羲皇之卦畫所以示者也盡意謂雖無言而與民同患之意悉具於其中設卦謂文王設立重卦之名盡情僞謂六十四名足以盡天下事物之情辭謂文王周公之彖爻所以告者也羲皇之卦畫足以盡意矣文王又因卦之象設卦之名以盡情僞然卦雖有名而未有辭也又繫彖辭爻辭則足以盡其言矣設卦一句在立象之後繫辭之前蓋竟盡意之緒啓盡言之端也梁氏寅曰意非言可盡則立象以盡意矣言非書可盡而又謂繫辭盡其言何也曰言止於是而已矣而意之無窮聖人故貴於象也故特首之曰立象以盡意錢氏志立曰聖人之意不能以言盡而盡於立象此聖人以象為言也因而繫辭凡聖人所欲言者又未嘗不盡於此案立象朱子謂指竒耦二畫崔氏吳氏則謂是八卦之象似為得之崔氏說又較明也變通鼓舞語類俱著占筮說然須知象辭之中便已具變通鼓舞之妙特因占而用爾故下文化而裁之存乎變推而行之存乎通皆是指象辭中之理有變有通非專為七八九六之變也鼓舞即是下文鼓天下之動意又案象足以盡意故因象繫辭足以盡言但添一焉字而意自明聖筆之妙也乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣本義緼所包蓄者猶衣之著也易之所有陰陽而已凡陽皆乾凡陰皆坤畫卦定位則二者成列而易之體立矣乾坤毁謂卦畫不立乾坤息謂變化不行集說胡氏瑗曰此言大易之道本始於天地天地設立陰陽之端萬物之理萬事之情以至寒暑往來日月運行皆由乾坤之所生故乾坤成而易道變化建立乎其中矣若乾坤毁棄則無以見易之用易既毁則無以見乾坤之用如是乾坤或幾乎息矣張子曰乾坤天地也易造化也蘇氏軾曰乾坤之於易猶日之於歲也除日而求歲豈可得哉故乾坤毁則易不可見矣易不可見則乾為獨陽坤為獨陰生生之功息矣葉氏良佩曰乾位乎上坤位乎下乾坤成列而易已立乎其中矣四德之循環萬物之出入易與天地相為無窮必乾坤毁則無以見耳若易不可見則乾坤或幾乎息矣案此節及形而上者一節皆是就造化人事說以見聖人立象設卦之所從來未是說卦畫蓍變夫象以下方是說聖人立象設卦繫辭之事是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業本義卦爻陰陽皆形而下者其理則道也因其自然之化而裁制之變之義也變通二字上章以天言此章以人言集說孔氏穎達曰陰陽之化自然相裁聖人亦法此而裁節也程子曰形而上者為道形而下者為器須著如此說器亦道道亦器也又曰繫辭曰形而上者謂之道形而下者謂之器又曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義又曰一陰一陽之謂道陰陽亦形而下者也而曰道者唯此語截得上下最分明元來只此是道要在人默而識之也張氏浚曰道形而上神則妙之器形而下體則著之道之與器本不相離散而在天地萬物之閒者其理莫不皆然王氏宗傳曰道也者無方無體所以妙是器也器也者有方有體所以顯是道也道外無器器外無道其本一也故形而上者與形而下者皆謂之形化而裁之則是器有所指别而名體各異故謂之變推而行之則是變無所凝滯而運用不窮故謂之通舉是變通之用而措之天下之民使之各盡其所以相生相養之道故謂之事業朱子語類云形而上者謂之道形而下者謂之器道是道理事事物物皆有箇道理器是形迹事事物物亦皆有箇形迹有道須有器有器須有道物必有則問形而上下如何以形言曰此言最的當設若以有形無形言之便是物與理相閒斷了所以謂截得分明者只是上下之間分别得一箇界止分明器亦道道亦器有分别而不相離也問只是這一箇道理但即形器之本體而離乎形器則謂之道就形器而言則謂之器聖人因其自然化而裁之則謂之變推而行之則謂之通舉而措之則謂之事業裁也行也措也都只是裁行措這箇道曰是方氏應祥曰此節正好體認立象盡意處乾坤象也而曰易之緼曰易立乎其中則意盡矣正以象之所在即道也是故字承上乾坤來形而上形而下所以俱言形者見得本此一物若舍此一字專言上者下者便分兩截矣是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻本義重出以起下文集說陸氏績曰此明說立象盡意設卦盡情僞之意也孔氏穎達曰下文極天下之賾存乎卦鼓天下之動存乎辭為此故更引其文也極天下之賾者存乎卦鼓天下之動者存乎辭本義卦即象也辭即爻也集說朱子語類云極天下之賾者存乎卦謂卦體之中備陰陽變易之形容鼓天下之動者存乎辭是說出這天下之動如鼓之舞之相似俞氏琰曰賾以象著卦有象則窮天下之至雜至亂無有遺者故曰極動以辭決使天下樂於趨事赴功者手舞足蹈而不能自己故曰鼓案極天下之賾結立象以盡意設卦以盡情僞兩句鼓天下之動結繫辭焉以盡其言一句化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行本義卦爻所以變通者在人人之所以能神而明之者在德此第十二章集說程子曰易因爻象論變化因變化論神因神論人因人論德行大體通論易道而終於默而成之不言而信存乎德行程氏敬承曰上繫末章歸重德行下繫末章亦首揭出德行此之德行即所謂乾坤易簡者乎張氏振淵曰謂之變謂之通變通因化裁推行而有也存乎變存乎通化裁推行因變通而施也案化而裁之推而行之結變而通之以盡利一句神而明之以下結鼓之舞之以盡神一句上文化裁推行是泛說天地閒道理故曰謂之變謂之通此化裁推行是說易書中所具故曰存乎變存乎通言就易道之變處見得聖人化裁之妙就易道之通處見得聖人推行之善也神而明之神字即根鼓舞盡神來辭之鼓舞乎人者固足以盡神然必以人心之神契合乎易之神然後鼓舞而不自知此所謂神而明之也默而成之不言而信是其所以能神明處總論胡氏炳文曰上繫凡十二章末乃曰書不盡言言不盡意蓋欲學者自得於書言之外也自立象盡意至鼓天下之動者存乎辭反覆易之書言可謂盡矣末乃曰默而成之不言而信存乎德行然則易果書言之所能盡哉得於心為德履於身為行易之存乎人者蓋有存乎心身而不徒存乎書言者矣案此章蓋總上十一章之意而通論之言不盡意故立象以盡意謂伏羲也書不盡言故因象而繫辭焉以盡其言謂文周也象之足以盡意者言之指陳有限而象之該括無窮也因象繫辭之足以盡言者象為虛倣之象而該括無窮則辭亦為假託之辭而包涵無盡也變通盡利者象所自具之理而所以定吉凶鼓舞盡神者辭所發揮之妙而所以成亹亹也其言乾坤者推象之所自來也有天地故有變化滯於形以觀之亦器焉而已超乎形以觀之則道之宗也因天地之變化而裁之則人事所由變也因其可通之理而推行之則人事所由通也自古聖人所以定天下之業者此而已矣是以作易之聖觀乾坤之器而立象推其變通之用而設辭使天下後世欲裁化而推行者於是乎在其功可謂盛矣雖然象足以盡意而有畫前之易故貴乎默而成之也辭足以盡言而有言外之意故貴乎不言而信也此則所謂神而明之蓋學之不以觀玩之文而明之不以口耳之粗者也德行謂有得於易簡之理御纂周易折中卷十四

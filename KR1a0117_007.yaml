body:
  text: 欽定四庫全書御纂周易折中卷二坤下坎上程傳比序卦衆必有所比故受之以比比親輔也人之類必相親輔然後能安故既有衆則必有所比比所以次師也為卦上坎下坤以二體言之水在地上物之相切比無閒莫如水之在地上故為比也又衆爻皆陰獨五以陽剛居君位衆所親附而上亦親下故為比也比吉原筮元永貞無咎不寧方來後夫凶本義比親輔也九五以陽剛居上之中而得其正上下五陰比而從之以一人而橅萬邦以四海而仰一人之象故筮者得之則當為人所親輔然必再筮以自審有元善長永正固之德然後可以當衆之歸而無咎其未比而有所不安者亦將皆來歸之若又遲而後至則此交已固彼來已晚而得凶矣若欲比人則亦以是而反觀之耳程傳比吉道也人相親比自為吉道故雜卦云比樂師憂人相親比必有其道苟非其道則有悔咎故必推原占決其可比者而比之筮謂占決卜度非謂以蓍龜也所比得元永貞則無咎元謂有君長之道永謂可以常久貞謂得正道上之比下必有此三者下之從上必求此三者則無咎也人之不能自保其安寧方且來求親比得所比則能保其安當其不寧之時固宜汲汲以求比若獨立自恃求比之志不速而後則雖夫亦凶矣夫猶凶况柔弱者乎夫剛立之稱傳曰子南夫也又曰是謂我非夫凡生天地之間者未有不相親比而能自存者也雖剛强之至未有能獨立者也比之道由兩志相求兩志不相求則睽矣君懷撫其下下親輔於上親戚朋友鄉黨皆然故當上下合志以相從苟無相求之意則離而凶矣大抵人情相求則合相持則睽相持相待莫先也人之相親固有道然而欲比之志不可緩也集說郭氏雍曰一陽之卦得位者師比而已得君位者為比得臣位者為師馮氏椅曰萃與比下體坤順同上體水澤不相逺惟九四一爻有分權之象故元永貞言於五比下無分權者故元永貞言於卦義各有在也胡氏一桂曰六十四卦惟䝉比以筮言䝉貴初而比貴原者蓋發䝉之道當視其初筮之専誠顯比之道當致其原筮而謹審所以不同也胡氏炳文曰原筮本義讀如原蠶原廟原田之原義皆訓再曰吉曰無咎曰凶皆占辭吉上下相比之占統言也無咎所比者之占凶比人者之占分言也䝉比卦辭特發兩筮字以示占者之通例筮得䝉卦辭䝉求亨者與亨䝉者皆可用筮得此卦辭為人所比與求比者皆可用顧其所處所存者何如耳䝉之筮問之人者也不一則不專比之筮問其在我者也不再則不審不寧方來指下四陰而言來者自來後者自後吾惟問我之可比不可比彼之來比不來比吾不問也此固王者大公之道而為九五之顯比者也初六有孚比之無咎有孚盈缶終來有它吉本義比之初貴乎有信則可以無咎矣若其充實則又有它吉也程傳初六比之始也相比之道以誠信為本中心不信而親人人誰與之故比之始必有孚誠乃無咎也孚信之在中也誠信充實於內若物之盈滿於缶中也缶質素之器言若缶之盈實其中外不加文飾則終能來有它吉也它非此也外也若誠實充於內物無不信豈用飾外以求比乎誠信中實雖它外皆當感而來從孚信比之本也集說鄭氏汝諧曰五為比之主初最遠而非其應何以有吉義蓋幾生於應物之先而誠出於志之未變故以信求比何咎之有盈充也缶素器也居下而位卑擴吾之信以充之雖逺而非其應終必應而有它吉矣有它吉者非期於必得而得之也胡氏炳文曰與人交止於信親比之初能有誠信所以比之無咎及其誠信充實則非特無咎又有它吉初六不與五應故曰有它大過九四中孚初九皆曰有它彼則戒其有它向之心此則許其有它至之吉也六二比之自內貞吉本義柔順中正上應九五自內比外而得其正吉之道也占者如是則正而吉矣程傳二與五為正應皆得中正以中正之道相比者也二處於內自內謂由已也擇才而用雖在乎上而以身許國必由於己已以得君道合而進乃得正而吉也以中正之道應上之求乃自內也不自失也汲汲以求比者非君子自重之道乃自失也集說梁氏寅曰二與五為比由內而比外者也凡貞吉有爻之本善者有爻非貞而為之戒者此曰貞吉爻之本善也言自內比外而得其正是以吉也谷氏家杰曰自內之所有者以比之逹不變塞也即此是正故吉六三比之匪人本義陰柔不中正承乘應皆陰所比皆非其人之象其占大凶不言可知程傳三不中正而所比皆不中正四陰柔而不中二存應而比初皆不中正匪人也比於匪人其失可知悔吝不假言也故可傷二之中正而謂之匪人隨時取義各不同也集說王氏弼曰四自外比二為五應近不相得遠則無應所與比者皆非已親故曰比之匪人朱子語類云初應四為比得其人二應五亦為比得其人惟三乃應上上為比之無首者故為比之匪人也趙氏彥肅曰初比於五先也二應也四承也六三無是三者之義將不能比五矣六四外比之貞吉本義以柔居柔外比九五為得其正吉之道也占者如是則正而吉矣程傳四與初不相應而五比之外比於五乃得貞正而吉也君臣相比正也相比相與宜也五剛陽中正賢也居尊位在上也親賢從上比之正也故為貞吉以六居四亦為得正之義又陰柔不中之人能比於剛明中正之賢乃得正而吉也又比賢從上必以正道則吉也數說相須其義始備集說易氏祓曰易以上卦為外下卦為內而二體亦各有內外四與五同體而言外比者亦所以比五也李氏過曰二與四皆比於五二應五在卦之內故言比之自內四承五在卦之外故言外比之外內雖異而得其所比其義一也故皆言貞吉九五顯比王用三驅失前禽邑人不誡吉本義一陽居尊剛健中正卦之羣陰皆來比已顯其比而無私如天子不合圍開一面之網來者不拒去者不追故為用三驅失前禽而邑人不誡之象蓋雖私屬亦喻上意不相警備以求必得也凡此皆吉之道占者如是則吉也程傳五居君位處中得正盡比道之善者也人君比天下之道當顯明其比道而已如誠意以待物恕己以及人發政施仁使天下蒙其惠澤是人君親比天下之道也如是天下孰不親比於上若乃暴其小仁違道干譽欲以求下之比其道亦狹矣其能得天下之比乎故聖人以九五盡比道之正取三驅為喻曰王用三驅失前禽邑人不誡吉先王以四時之畋不可廢也故推其仁心為三驅之禮乃禮所謂天子不合圍也成湯祝網是其義也天子之畋圍合其三面前開一路使之可去不忍盡物好生之仁也只取其不用命者不出而反入者也禽獸前去者皆免矣故曰失前禽也王者顯明其比道天下自然來比來者撫之固不煦煦然求比於物若田之三驅禽之去者從而不追來者則取之也此王道之大所以其民皡皥而莫知為之者也邑人不誡吉言其至公不私無遠邇親踈之别也邑者居邑易中所言邑皆同王者所都諸侯國中也誡期約也待物之一不期誡於居邑如是則吉也聖人以大公無私治天下於顯比見之矣非惟人君比天下之道如此大率人之相比莫不然以臣於君言之竭其忠誠致其才力乃顯其比君之道也用之與否在君而已不可阿諛逢迎求其比已也在朋友亦然修身誠意以待之親已與否在人而已不可巧言令色曲從苟合以求人之比己也於鄉黨親戚於衆人莫不皆然三驅失前禽之義也集說朱子語類問伊川解顯比王用三驅失前禽所謂來者撫之去者不追與失前禽而殺不去者所譬頗不相類如何曰田獵之禮置旃以為門刈草以為長圍田獵者自門驅而入禽獸向我而出者皆免惟被驅而入者皆獲故以前禽比去者不追獲者譬來則取之大意如此無緣得一一相似伊川解此句不須疑但邑人不誡吉一句似可疑恐易之文義不如此耳又云邑人不誡如有聞無聲言其自不消相告誡又如歸市者不止耕者不變相似胡氏炳文曰諸陰爻皆言比之陰比陽也五言顯比陽為陰所比也師比之五皆取田象師之田有禽害物之禽也比之失前禽背已之禽也在師則執之王者之義也在比能失之王者之仁也梁氏寅曰九五陽剛中正為比之主陽剛則明而不暗中正則公而不私此其所以為顯比也以象言之如田狩而用三驅失前禽來者不拒去者不追此上之比下也固顯比也比下既得其道則雖私屬亦喻上意而不待告誡此下之比上也亦顯比也上下之相比同一顯明之道又安有不吉乎林氏希元曰顯與隱對光明正大而無隱伏回曲暗昧褊窄者顯也隱伏回曲暗昧褊窄而不光明正大者隱也王者以父母天下為職生養教誨但知吾分所當為盡其道而為之至於民之感恩與否則聽其在彼初不屑屑焉暴其私恩小惠違道干譽以求百姓之我親此其施為舉措何等光明正大而豈有隱伏回曲暗昧褊窄之病故謂之顯比譬如王者解一面之網用三驅之田禽獸向我而入者取之背我而前去者則失之初不求於必得至於私屬亦喻上意不相警備以求必得焉夫王用三驅失前禽者王道之得邑人不誡者王化之行凡此皆吉之道也王者能如九五之顯比則亦王道得而王化行矣陸氏振奇曰三驅失禽置失得於勿恤者狀蕩平之王心邑人不誡泯知識於大順者狀熙皥之王化案本義解邑人不誡謂不相警備以求必得似以為求所失之前禽也然語類只作冇聞無聲之意尤為精切蓋言王者田獵而近郊之處略不驚擾耳本義係朱子未修改之書故其後來講論每有不同者皆此類也大抵爻意是以田獵喻王者皥皥之氣象前禽失而不追邑人居而不誡遠去者若不知有王者之親乃所以為親之至也近附者若不知有王者之尊乃所以為尊之至也顯比之世凡有血氣莫不尊親而所謂大順大化不見其迹者又如此上六比之無首凶本義陰柔居上無以比下凶之道也故為無首之象而其占則凶也程傳六居上比之終也首謂始也凡比之道其始善則其終善矣有其始而無其終者或有矣未有無其始而有終者也故比之無首至終則凶也此據比終而言然上六陰柔不中處險之極固非克終者也始比不以道隙於終者天下多矣集說王氏弼曰無首後也處卦之終是後夫也為時所棄宜其凶也王氏申子曰五以一陽居尊四陰比之於下故彖傳曰下順從也而上六孤立於外而不從豈非後夫之象乾下巽上程傳小畜序卦比必有所畜故受之以小畜物相比附則為聚聚畜也又相親比則志相畜小畜所以次比也畜止也止則聚矣為卦巽上乾下乾在上之物乃居巽下夫畜止剛健莫如巽順為巽所畜故為畜也然巽陰也其體柔順惟能以巽順柔其剛健非能力止之也畜道之小者也又四以一陰得位為五陽所說得位得柔巽之道也能畜羣陽之志是以為畜也小畜謂以小畜大所畜聚者小所畜之事小以陰故也彖専以六四畜諸陽為成卦之義不言二體蓋舉其重者小畜亨密雲不雨自我西郊本義巽亦三畫卦之名一陰伏於二陽之下故其德為巽為入其象為風為木小陰也畜止之之義也上巽下乾以陰畜陽又卦惟六四一陰上下五陽皆為所畜故為小畜又以陰畜陽能係而不能固亦為所畜者小之象內健外巽二五皆陽各居一卦之中而用事有剛而能中其志得行之象故其占當得亨通然畜未極而施未行故有密雲不雨自我西郊之象蓋密雲陰物西郊陰方我者文王自我也文王演易於羑里視岐周為西方正小畜之時也筮者得之則占亦如其象云程傳雲陰陽之氣二氣交而和則相畜固而成雨陽倡而陰和順也故和若陰先陽倡不順也故不和不和則不能成雨雲之畜聚雖密而不成雨者自西郊故也東北陽方西南陰方自陰倡故不和而不能成雨以人觀之雲氣之興皆自四逺故云郊據西而言故云自我畜陽者四畜之主也集說胡氏瑗曰陰陽交則雨澤乃施若陽氣上升而陰氣不能固蔽則不雨若陰氣雖能固蔽而陽氣不交亦當不雨猶若釜甑之氣以物覆之則蒸而為水也自我西郊是雲氣起於西郊之陰位必不能為雨也程子語録或以小畜為臣畜君以大畜為君畜臣曰不必如此大畜只是所畜者大小畜只是所畜者小不必指定一件事便是君畜臣臣畜君皆是這道理隨大小用張氏浚曰臣之誠意雖通於上而君德未孚若天氣未應曰密雲不雨西郊陰位自我西郊言陽氣未應也朱子語類問密雲不雨自我西郊曰凡雨者皆是陰氣盛凝結得密方濕潤下降為雨今乾上進一陰止他不得所以彖中云尚往也是指乾欲上進之象到上九則以卦之始終言畜極則散遂為既雨既處陰德盛滿如此所以有君子征凶之戒􅏀氏富國曰乾本在上之物今在巽下則為柔所畜故曰小畜但六四以一陰而畜止五陽能係其志而不能固其志此又畜道之小者也夫物畜則止止極則行故小畜亦有亨義密雲陰氣也自二至四互兌屬西方故曰西郊四以柔居柔故有此象凡雲自東而西則雨自西而東則不雨陰先倡也小畜以柔為主不能固陽而止之故雲雖密而不雨林氏希元曰小畜有二義一是以小畜大一是所畜者小亦惟以小畜大故所畜者小其歸一而已矣問天氣屬陽地氣屬陰今以陰畜陽反以天氣為陰地氣為陽何也曰以兩儀之分言則位乎下而氣上騰者為陰位乎上而氣下降者為陽自四象之交言則陰之騰上者又為陽陽之下降者又為陰此䝉引之說也可以發朱子之所未發案此卦須明取象之意則卦義自明彖言密雲不雨者地氣上騰而天氣未應以其雲之來自我西郊陰倡而陽未和故也蓋以上下之陰陽言之則地氣陰也天氣陽也以四方之陰陽言之則西方陰也東方陽也陰感而陽未應乃卦所以為小畜之義彖傳尚往謂陰氣上升施未行謂陰氣未能成雨而降也以人事擬之則是臣子志存國家未能得君父和合之象諸家或以地氣上升者為陽天氣下應者為陰故於彖傳尚往亦屬陽說惟張氏以為天氣未應者於卦義極相合也初九復自道何其咎吉本義下卦乾體本皆在上之物志欲上進而為陰所畜然初九體乾居下得正前逺於陰雖與四為正應而能自守以正不為所畜故有進復自道之象占者如是則無咎而吉也程傳初九陽爻而乾體陽在上之物又剛健之才足以上進而復與在上同志其進復於上乃其道也故云復自道復既自道何過咎之有無咎而又有吉也諸爻言無咎者如是則無咎矣故云無咎者善補過也雖使爻義本善亦不害於不如是則有咎之義初九乃由其道而行無有過咎故云何其咎無咎之甚明也集說王氏申子曰復反也初以陽剛居健體志欲上行而為四得時得位者所畜故復然初剛而得正雖為所畜而復如自守以正不為所畜者故曰復自道言雖為彼所畜而吾實自復於道也龔氏煥曰復自道此復字與無往不復不逺復之義同謂復於在下之位而不進也初九以陽剛之才位居最下為陰所畜知幾不進而自復其道焉何咎之有九二牽復亦謂與初九牽連而內復也易及諸經無有以復為上進者俞氏琰曰復謂返於本位也以初九之剛往應六四之柔而受其制豈不失其道而有咎今也返而以正道自守故能轉咎而為吉何氏諧曰天地閒氣化人事皆有陰畜陽之時陽既為陰所畜便不宜過剛躁動初以陽才居陽位濳伏於下何咎之有先言何其咎而後言吉者以無咎為吉也案傳義皆以復為上進沿王弼舊說也以大畜初二爻比例觀之則王氏龔氏諸說為長九二牽復吉本義三陽志同而九二漸近於陰以其剛中故能與初九牽連而復亦吉道也占者如是則吉矣程傳二以陽居下體之中五以陽居上體之中皆以陽剛居中為陰所畜俱欲上復五雖在四上而為其所畜則同是同志者也夫同患相憂二五同志故相牽連而復二陽並進則陰不能勝得遂其復矣故吉也曰遂其復則離畜矣乎曰凡爻之辭皆謂如是則可以如是若已然則時已變矣尚何教誡乎五為巽體巽畜於乾而反與二相牽何也曰舉二體而言則巽畜乎乾全卦而言則一陰畜五陽也在易隨時取義皆如此也集說王氏申子曰二所乘之初為陰所畜亦既復矣所承之三又為陰所畜說輻而不進矣二以陽處陰居下得中上又無應故不待畜即與同類牽連而復是不自失其中者也自能審進退而不失其中故吉何氏楷曰與初相牽連而復居於下故吉九三輿說輻夫妻反目本義九三亦欲上進然剛而不中迫近於陰而又非正應但以陰陽相說而為所係畜不能自進故有輿說輻之象然以志剛故又不能平而與之爭故又為夫妻反目之象戒占者如是則不得進而有所爭也程傳三以陽爻居不得中而密比於四陰陽之情相求也又昵比而不中為陰畜制者也故不能前進猶車輿說去輪輻言不能行也夫妻反目陰制於陽者也今反制陽如夫妻之反目也反目謂怒目相視不順其夫而反制之也婦人為夫寵惑既而遂反制其夫未有夫不失道而妻能制之者也故說輻反目三自為也集說項氏安世曰輻陸氏釋文云本亦作輹桉輻車轑也輹車軸轉也輻以利輪之轉輹以利軸之轉然輻無說理必輪破轂裂而後可說若輹則有說時車不行則說之矣大畜大壯皆作輹字又曰九三反目稱妻言相敵也上九既兩稱婦言相順也胡氏炳文曰大畜九二輿說輹輹與輻或據左氏傳注以為通用何也曰說文輹車下橫木非輻也大畜九二說輹剛而得中自止而不進也小畜九三說輻剛而不中止於陰而不得進也說輹可復進說輻則不可以行矣案九三比近六四故有夫妻之象過剛不能自制其動雖有六四比近畜之不能止也進不利於行故曰輿說輻退不安其室故曰夫妻反目六四有孚血去惕出無咎本義以一陰畜衆陽本有傷害憂懼以其柔順得正虛中巽體二陽助之是冇孚而血去惕出之象也無咎宜矣故戒占者亦有其德則無咎也程傳四於畜時處近君之位畜君者也若內有孚誠則五志信之從其畜也卦獨一陰畜衆陽者也諸陽之志係於四四苟欲以力畜之則一柔敵衆剛必見傷害惟盡其孚誠以應之則可以感之矣故其傷害遠其危懼免也如此則可以無咎不然則不免乎害矣此以柔畜剛之道也以人君之威嚴而微細之臣有能畜止其欲者蓋有孚信以感之也集說項氏安世曰以陰畜陽以小包大能無憂乎獨恃與五有孚故能離其血惕去而出之以免於咎臣之畜君必信而後濟非與上合志不可為也案此爻程傳之說獨明蓋惟此爻與彖意合者以其為卦之主故也九五有孚攣如富以其鄰本義巽體三爻同力畜乾鄰之象也而九五居中處尊勢能有為以兼乎上下故為有孚攣固用富厚之力而以其鄰之象以猶春秋以某師之以言能左右之也占者有孚則能如是也程傳小畜衆陽為陰所畜之時也五以中正居尊位而有孚信則其類皆應之矣故曰攣如謂牽連相從也五必援挽與之相濟是富以其鄰也五以居尊位之勢如富者推其財力與鄰比共之也君子為小人所困正人為羣邪所厄則在下者必攀挽於上期於同進在上者必援引於下與之戮力非獨推已力以及人也固資在下之助以成其力耳集說朱子語類云孚有在陽爻有在陰爻伊川謂中虛信之本中實信之質案此爻之義從來未明今以卦意推之則六四者近君之位也所謂小畜者也九五者君位也能畜其德以受臣下之畜者也四曰有孚是積誠以格其君五亦曰有孚是推誠以待其下上下相孚而後畜道成矣故四曰上合志者指五也五曰以其鄰者指四也四與五相近故曰鄰又鄰即臣也書曰臣哉鄰哉是也富者積誠之滿也積誠之滿至於能用其鄰則其鄰亦以誠應之矣故象傳曰不獨富也以誠感誠之謂也大抵上下之閒不實心則不能相交故曰富以其鄰不虛心則亦不能相交故曰不富以其鄰所取象者本於陽實陰虛而其義一也上九既雨既處尚德載婦貞厲月幾望君子征凶本義畜極而成陰陽和矣故為既雨既處之象蓋尊尚陰德至於積滿而然也陰加於陽故雖正亦厲然陰既盛而抗陽則君子亦不可以有行矣其占如此為戒深矣程傳九以巽順之極居卦之上處畜之終從畜而止者也為四所止也既雨和也既處止也陰之畜陽不和則不能止既和而止畜之道成矣大畜畜之大故極而散小畜畜之小故極而成尚德載四用柔巽之德積滿而至於成也陰柔之畜剛非一朝一夕能成由積纍而至可不戒乎載積滿也詩云厥聲載路婦貞厲婦謂陰以陰而畜陽以柔而制剛婦若貞固守此危厲之道也安有婦制其夫臣制其君而能安者乎月望則與日敵矣幾望言其盛將敵也陰已能畜陽而云幾望何也此以柔巽畜其志也非力能制也然不已則將盛於陽而凶矣於幾望而為之戒曰婦將敵矣君子動則凶也君子謂陽征動也幾望將盈之時若已望則陽已消矣尚何戒乎集說楊氏時曰三陽下進一陰畜之不能固故密雲不雨尚往也至上九則往極矣故既處夫陰陽和則雨而婦以順為正雖畜而至於雨以是為正則厲矣月遡日以為明者也望則與日敵故幾望則不可過君子至此而猶征焉則凶之道也小畜以陰畜陽為主其極必疑陽故戒之如此項氏安世曰上九居畜之極畜道已成昔之不雨者今既雨矣昔之尚往者今既處矣彖之所謂亨於是見之載者積也畜至於上其德積而成載則所畜大矣然以小畜大非可常之事也婦道貞此而不變則為危君子過此而復行則為凶蓋月望則昃陰極則消自然之理也王氏應麟曰小畜上九月幾望則凶陰疑陽也歸妹六五月幾望則吉陰應陽也中孚六四月幾望則無咎陰從陽也案此爻亦以畜道既成言之耳楊氏說最完善兌下乾上程傳履序卦物畜然後有禮故受之以履夫物之聚則有大小之别高下之等美惡之分是物畜然後有禮履所以繼畜也履禮也禮人之所履也為卦天上澤下天而在上澤而處下上下之分尊卑之義理之當也禮之本也常履之道也故為履履踐也藉也履物為踐履於物為藉以柔藉剛故為履也不曰剛履柔而曰柔履剛者剛乘柔常理不足道故易中惟言柔乘剛不言剛乘柔也言履藉於剛乃見卑順說應之義履虎尾不嘻人亨本義兌亦三畫卦之名一陰見於二陽之上故其德為說其象為澤履有所躡而進之義也以兌遇乾和說以躡剛强之後有履虎尾而不見傷之象故其卦為履而占如是也人能如是則處危而不傷矣程傳履人所履之道也天在上而澤處下以柔履藉於剛上下各得其義事之至順理之至當也人之履行如此雖履至危之地亦無所害故履虎尾而不見其嘻嚙所以能亨也集說朱子語類云履上乾下兌以陰躡陽是隨後躡他如踏他腳跡相似所以云履虎尾卦之三四爻發虎尾義便是陰去躡他陽後處李氏簡曰履禮也行之以和故能進退履衆剛而不見傷禮之用和為貴其是之謂乎胡氏炳文曰程傳訓履為踐為藉以上下論也本義云有所躡而進以前後論也於尾字為切諸家多以兌為虎本義從程傳以乾為虎本夫子彖傳意也不嘻人亨大抵人之涉世多是危機不為所傷乃見所履大傳曰易之興也其當文王與紂之事邪是故其辭危危莫危於履虎尾之辭矣故九卦處憂患以履為首梁氏寅曰履者踐履也人之於禮亦踐行其天理者故履為禮也夫虎剛猛之獸乾三陽虎之象也上為虎之首則四為虎之尾兌履乾之後履虎尾之象也虎嘻人者也然以和說履之則不見嘻而反致亨以是觀之人之踐履卑遜何往而不亨乎然和非阿容也說非佞媚也亦恭順而不失其正耳兌之傳曰剛中而柔外此其道也蔡氏清曰八卦惟兌為至弱惟乾為至健今以至弱者而躡於至健者之後自是危機故獨以履名卦而彖傳復取其德而謂之履虎尾不嘻人亨也初九素履往無咎本義以陽在下居履之初未為物遷率其素履者也占者如是則往而無咎也程傳履不處者行之義初處至下素在下者也而陽剛之才可以上進若安其卑下之素而往則無咎矣夫人不能自安於貧賤之素則其進也乃貪躁而動求去乎貧賤耳非欲有為也既得其進驕溢必矣故往則有咎賢者則安履其素其處也樂其進也將有為也故得其進則有為而無不善乃守其素履者也集說胡氏炳文曰初未交於物有素象案本義與蔡氏皆曰居履之初不為物遷蔡氏則曰素者無文之謂蓋履禮也履初言素禮以質為本也賁文也賁上言白文之極反而質也白賁無咎其即素履往無咎與九二履道坦坦幽人貞吉本義剛中在下無應於上故為履道平坦幽獨守貞之象幽人履道而遇其占則貞而吉矣程傳九二居柔寬裕得中其所履坦坦然平易之道也雖所履得坦易之道亦必幽靜安恬之人處之則能貞固而吉也九二陽志上進故有幽人之戒集說梁氏寅曰行於道路者由中則平坦從旁則崎險九二以剛居中是履道而得其平坦者也持身如是不輕自售故為幽人貞吉六三眇能視跛能履履虎尾嘻人凶武人為于大君本義六三不中不正柔而志剛以此履乾必見傷害故其象如此而占者凶又為剛武之人得志而肆暴之象如秦政項籍豈能久也程傳三以陰居陽志欲剛而體本陰柔安能堅其所履故如盲眇之視其見不明跛躄之履其行不逺才既不足而又處不得中履非其正以柔而務剛其履如此是履於危地故曰履虎尾以不善履履危地必及禍患故曰嘻人凶武人為于大君如武暴之人而居人上肆其躁率而已非能順履而遠到也不中正而志剛乃為羣陽所與是以剛躁蹈危而得凶也集說耿氏南仲曰視欲正視而不正則眇者也行欲中行而不中則跛者也故歸妹初九不中則為跛九二不正則為眇履六三不中又不正故跛眇兼焉歸妹履皆兌下也王氏申子曰三以陰居陽以柔履剛謂其明耶則衆陽而獨陰謂其不明耶則又居於陽眇能視之象也謂其能行耶則衆剛而獨柔謂其不能行耶則又履乎剛跛能履之象也是體暗而用明才弱而志剛者也而又不中不正故不自度量而一於進敢於蹈危而取禍如履虎尾而受嘻人之凶也若不顧强弱勇猛直前惟武人用之以有為于大君之事則可然彖亦主三而言曰不嘻人亨此曰嘻人凶何也蓋彖總言一卦之體爻則據其時與位而言所以不同吳氐澄曰彖通指一卦而言則上九虎之首也虎口實而合有不嘻之象此專據一爻而言則三為兌之上畫也兌口虛而開故有嘻人之象胡氏炳文曰凡卦辭以爻為主則爻辭與卦同如屯卦利建侯而初爻亦利建侯以卦上下體論則爻辭與卦不同如此卦云履虎尾不嘻人而六三則曰嘻人是也卦書不嘻人兌三爻說體自與乾三爻健體相應也爻書嘻人六三一爻與上九一爻獨相應履虎尾而首應也案武人為于大君王氏之說得之蓋三非大君之位且為于兩字語氣亦不順也子曰暴虎馮河死而無悔者吾不與也即此句之意九四履虎尾訴訴終吉本義九四亦以不中不正履九五之剛然以剛居柔故能戒懼而得終吉程傳九四陽剛而乾體雖居四剛勝者也在近君多懼之地無相得之義五復剛決之過故為履虎尾訴訴畏懼之貌若能畏懼則當終吉蓋九雖剛而志柔四雖近而不處故能兢愼畏懼則終免於危而獲吉也集說王氏弼曰逼近至尊以陽承陽處多懼之地故曰履虎尾訴訴也然以陽居陰以謙為本雖處危懼終獲其志故終吉也王氏宗傳曰經曰四多懼處多懼之地而復以恐懼自處所謂訴訴也四處三陽之後故亦曰履虎尾無忘其訴訴之戒故曰終吉在卦德曰履虎尾不嘻人亨其九四之謂乎朱子語類云履三爻正是躡他虎尾處四上躡五亦為虎尾之象胡氏炳文曰本義於三之履虎尾曰不中不正以履乾是以乾為虎而三在其後也於四之履虎尾則曰亦以不中不正履九五之剛是以九五為虎而四在其後也三四皆不中正而占有不同者三多凶以柔居剛其凶也宜四多懼以剛居柔所以終吉九五夬履貞厲本義九五以剛中正履帝位而下以兌說應之凡事必行無所疑礙故其象為夬決其履雖使得正亦危道也故其占為雖正而危為戒深矣程傳夬剛決也五以陽剛乾體居至尊之位任其剛決而行者也如此則雖得正猶危厲也古之聖人居天下之尊明足以照剛足以決勢足以專然而未嘗不盡天下之議雖芻蕘之微必取乃其所以為聖也履帝位而光明者也若自任剛明決行不顧雖使得正亦危道也可固守乎有剛明之才苟專自任猶為危道況剛眀不足者乎易中云貞厲義各不同隨卦可見集說項氏安世曰六三於彖辭為亨者以下卦言之有和說之德也於本爻為凶者資本陰柔履位不正宜其凶也九五於彖辭為不疚者以上卦言之有剛健中正之德也於本爻為厲者以剛行剛志在夬決其理雖正其事則危也凡彖多言卦德凡爻多論爻位王氏申子曰履之卦義履剛也履剛之道尚柔不尚剛也五雖中正以履帝位然以剛居剛是一於尚剛者也夬履謂決於行也一於任剛決行而不顧則於中正之道豈能無咎乎若貞固守此危道也故曰貞厲案凡彖傳中所贊美則其爻辭無凶厲者何獨此爻不然蓋履道貴柔九五以剛居剛是決於履也然以其有中正之德故能常存危厲之心則雖決於履而動可無過舉矣書云心之憂危若蹈虎尾此其所以履帝位而不疚也與凡易中貞厲有厲有以常存危懼之心為義者如噬嗑之貞厲無咎夬之其危乃光是也然則此之貞厲兌五之有厲當從此例也上九視履考祥其旋元吉本義視履之終以考其祥周旋無虧則得元吉占者禍福視其所履而未定也程傳一處履之終於其終視其所履行以考其善惡禍福若其旋則善且吉也旋謂周旋完備無不至也人之所履考視其終若終始周完無疚善之至也是以元吉人之吉凶係其所履善惡之多寡吉凶之小大也集說王氏弼曰禍福之祥生乎所履處履之極履道成矣故可視履而考祥也居極應說高而不危是其旋也履道大成故元吉梁氏寅曰上履之終也人之所履觀之於始則誠僞未可見惟觀之於終然後見也故視其所履以考其善若周旋無虧則其吉大矣是爻也豈非動容周旋中禮而為盛德之至與總論項氏安世曰一陰一陽之卦在下者為復姤在上者為夬剝其義主於消長也在二五者陽在二為師之將在五為比之主陰在二為同人之君子在五為大有之君子其義主於得位也在三四者陽在三則以剛行柔為勞謙在四則以剛制柔為由豫陰在三則以柔行剛為履在四則以柔制剛為小畜其義主於用事也大抵用事之爻在下者為行己之事在上者為制人之事又曰履之六爻皆以履柔為吉故九二為坦坦九四為訴訴終吉上九為其旋元吉皆履柔也六三卦辭本善終以履剛為凶初九九五所履皆正然初僅能無咎五不免於厲皆履剛也是故初則懼其失初心之正而教之以保其素五則懼其恃勢位之正而教之以謹其決蓋剛者喜動而好決任剛而行者後多可悔之事也乾下坤上程傳泰序卦履而泰然後安故受之以泰履得其所則舒泰泰則安矣泰所以次履也為卦坤陰在上乾陽居下天地陰陽之氣相交而和則萬物生成故為通泰泰小往大來吉亨本義泰通也為卦天地交而二氣通故為泰正月之卦也小謂陰大謂陽言坤往居外乾來居內又自歸妹來則六往居四九來居三也占者有剛陽之德則吉而亨矣程傳小謂陰大謂陽往往之於外也來來居於內也陽氣下降陰氣上交也陰陽和暢則萬物生遂天地之泰也以人事言之大則君上小則臣下君推誠以任下臣盡誠以事君上下之志通朝廷之泰也陽為君子陰為小人君子來處於內小人往處於外是君子得位小人在下天下之泰也泰之道吉而且亨也不云元吉元亨者時有汙隆治有小大雖泰豈一概哉言吉亨則可包矣集說劉氏牧曰往來者以內外卦言之由內而之外為往由外而復內為來蔡氏清曰卦名曰泰以天地交而二氣通就造化之本不可相無上取也卦辭曰小往大來以內君子外小人而言就淑慝之分上取也然則泰有二乎曰一也但是天地交而二氣通則決然內陽而外陰矣初九拔茅茹以其彚征吉本義三陽在下相連而進拔茅連茹之象征行之吉也占者陽剛則其征吉矣郭璞洞林讀至彚字絶句下卦放此程傳初以陽爻居下是有剛明之才而在下者也時之否則君子退而窮處時既泰則志在上進也君子之進必與其朋類相牽援如茅之根然拔其一則牽連而起矣茹根之相牽連者故以為象彚類也賢者以其類進同志以行其道是以吉也君子之進必以其類不惟志在相先樂於與善實乃相賴以濟故君子小人未有能獨立不賴朋類之助者也自古君子得位則天下之賢萃於朝廷同志協力以成天下之泰小人在位則不肖者並進然後其黨勝而天下否矣蓋各從其類也集說劉氏向曰賢人在上位則引其類而聚之於朝在下位則思與其類俱進在上則引其類在下則推其類故湯用伊尹不仁者遠而衆賢至類相致也朱子語類云以其彚屬上文嘗見郭璞洞林亦如此作句便是那時人已自恁地讀了蓋拔茅連茹者物象也以其彚者人也林氏希元曰程傳曰茹根之相牽者以本義三陽在下相連而進推之乃别茅之根非本茅之根也蓋一陽進而二陽與之相連猶一茅拔而别茅之根與之相連也九二包荒用馮河不遐遺朋亡得尚于中行本義九二以剛居柔在下之中上有六五之應主乎泰而得中道者也占者能包容荒穢而果斷剛決不遺遐遠而不昵朋比則合乎此又中行之道矣程傳二以陽剛得中上應於五五以柔順得中下應於二君臣同德是以剛中之才為上所専任故二雖居臣位主冶泰者也所謂上下交而其志同也故冶泰之道主二而言包荒用馮河不遐遺朋亡四者處泰之道也人情安肆則政舒緩而法度廢弛庶事無節治之之道必有包含荒穢之量則其施為寬裕詳密弊革事理而人安之若無含𢎞之度有忿疾之心則無深遠之慮有暴擾之患深弊未去而近患已生矣故在包荒也用馮河泰寧之世人情習於又安安於守常惰於因循憚於更變非有馮河之勇不能冇為於斯時也馮河謂其剛果足以濟深越險也自古泰治之世必漸至於衰替蓋由狃習安逸因循而然自非剛斷之君英烈之輔不能挺特奮發以革其弊也故曰用馮河或疑上云包荒則是包含寬容此云用馮河則是奮發改革似相反也不知以含容之量施剛果之用乃聖賢之為也不遐遺泰寧之時人心狃於泰則苟安逸而已惡能復深思遠慮及於遐遠之事哉治夫泰者當周及庶事雖遐遠不可遺若事之微隱賢才之在僻陋皆遐遠者也時泰則固遺之矣朋亡夫時之既泰則人習於安其情肆而失節將約而正之非絶去其朋與之私則不能也故云朋亡自古立法制事牽於人情卒不能行者多矣若夫禁奢侈則害於近戚限田産則妨於貴家如此之類既不能斷以大公而必行則是牽於朋比也治泰不能朋亡則為之難矣治泰之道有此四者則能合於九二之德故曰得尚于中行言能配合中行之義也尚配也集說胡氏炳文曰若有包容而無斷制非剛柔相濟之中也必包容荒穢而又果斷剛決則合乎中矣雖不遺遐遠而或自私於吾之黨類則易至偏重非輕重不偏之中也惟不遺遐遠而又不昵朋比是不忘遠又不泄邇合乎中矣本義兩而字當細玩龔氏煥曰初九以其彚九二則欲其朋亡何也初九在下之賢則欲其引類而進九二大臣所以進退天下之人才者故欲亡其朋類惟亡其朋類則能用天下之賢若獨私其朋則天下之賢有不得進用者矣此其所以不同也案此爻以夫子象傳觀之須以包荒兩字為主蓋聖賢之心無棄物堯舜之道欲並生非包荒則不足以體天地之心而盡君師之道矣然包荒非混而無别之謂故必斷以行之明以周之公以處之然後用舍舉措無不合於中道魯論所謂寬信敏公者意蓋相似也四者以寬為本故曰居上不寬吾何以觀之哉九三無平不陂無往不復艱貞無咎勿恤其孚于食有福本義將過乎中泰將極而否欲來之時也恤憂也孚所期之信也戒占者艱難守貞則無咎而有福程傳三居泰之中在諸陽之上泰之盛也物理如循環在下者必升居上者必降泰久而必否故於泰之盛與陽之將進而為之戒曰無常安平而不險陂者謂無常泰也無常往而不返者謂陰當復也平者陂往者復則為否矣當知天理之必然方泰之時不敢安逸常艱危其思慮正固其施為如是則可以無咎處泰之道既能艱貞則可常保其泰不勞憂恤得其所求也不失所期為孚如是則於其䘵食有福益也祿食謂福祉善處泰者其福可長也蓋德善日積則福祿日臻德踰於祿則雖盛而非滿自古隆盛未有不失道而喪敗者也集說項氏安世曰無平不陂為三陽言之無往不復為三陰言之雨言無不者明此皆天道之必至而有孚者也人能知此則當泰之極不可不盡人事以防之撫極泰之運而操心之危如此則舉動之際必無過咎然後彼必至之孚可以勿恤我固有之福可以長享矣徐氏直方曰小人所以勝君子者非乘其怠則攻其隙艱則無怠之可乘貞則無隙之可攻如此則可以無咎可以勿憂其孚矣或曰陰陽交運否泰相仍時勢然也雖艱貞勿恤如之何曰平陂往復者天運之不能無艱貞勿恤者人事之所當盡天人有交勝之理處其交履其㑹者必有變化持守之道若一諉之天運以為無預於人事則聖人之易可無作矣六四翩翩不富以其鄰不戒以孚本義已過乎中泰已極矣故三陰翩然而下復不待富而其類從之不待戒令而信也其占為有小人合交以害正道君子所當戒也陰虛陽實故凡言不富者皆陰爻也程傳六四處泰之過中以陰在上志在下復上二陰亦志在趨下翩翩疾飛之貌四翩翩就下與其鄰同也鄰其類也謂五與上夫人富而其類從者為利也不富而從者其志同也三陰皆在下之物居上乃失其實其志皆欲下行故不富而相從不待戒告而誠意相合也夫陰陽之升降乃時運之否泰或交或散理之常也泰既過中則將變矣聖人於三尚云艱貞則有福蓋三為將中知戒則可保四已過中矣理必變也故専言始終反復之道五泰之主則復言處泰之義集說沈氏該曰四處上體在近君之位三陽既進樂與賢者共之志同願得是以不富以鄰不戒而孚也趙氏彥肅曰從六五下賢其心休休焉者也李氏簡曰陰氣上升陽氣下降乃天地之交泰也上以謙虛接乎下下以剛直事乎上上下相孚乃君臣之交泰也君臣交泰則天下泰矣故下三爻皆以剛直事其上上三爻皆以謙虛接乎下四當二卦之交故發此義俞氏琰曰翩翩降以相從之貌易以陰虛為不富六四陰爻故曰不富何氏楷曰此正陰陽交泰之爻也翩翩羣飛而下貌陰虛陽實凡言不富者皆陰爻鄰指五上四能挾其並居之鄰相從而下者以三陰皆欲求陽故不待教戒而能以之下孚乎陽也案傳義皆以此爻為小人復來然以彖傳上下交而其志同觀之則四五正當君相之位下交之主兩爻象傳所謂中心願也中以行願也則正所謂志同者也爻辭不富與謙六五同皆言其謙虛而不自滿足爾沈氏趙氏以下諸說義皆可從六五帝乙歸妹以祉元吉本義以陰居尊為泰之主柔中虛已下應九二吉之道也而帝乙歸妹之時亦嘗占得此爻占者如是則有祉而元吉矣凡經以古人為言如髙宗箕子之類者皆放此程傳史謂湯為天乙厥後有帝祖乙亦賢王也後又有帝乙多士曰自成湯至于帝乙罔不明德恤祀稱帝乙者未知誰是以爻義觀之帝乙制王姬下嫁之禮法者也自古帝女雖皆下嫁至帝乙然後制為禮法使降其尊貴以順從其夫也六五以陰柔居君位下應於九二剛明之賢五能倚任其賢臣而順從之如帝乙之歸妹然降其尊而順從於陽則以之受祉且元吉也元吉大吉而盡善者也謂成治泰之功也集說項氏安世曰帝女下嫁之禮至湯而備湯嫁妹之辭曰無以天子之富而驕諸侯陰之從陽女之順夫天下之義也往事爾夫必以禮義湯稱天乙或者亦稱帝乙乎上六城復于隍勿用師自邑告命貞吝本義泰極而否城復于隍之象戒占者不可力爭但可自守雖得其貞亦不免於羞吝也程傳掘隍土積纍以成城如治道積纍以成泰及泰之終將反於否如城土頽圮復反于隍也上泰之終六以小人處之行將否矣勿用師君之所以能用其衆者上下之情通而心從也今泰之將終失泰之道上下之情不通矣民心離散不從其上豈可用也用之則亂衆既不可用方自其親近而告命之雖使所告命者得其正亦可羞吝邑所居謂親近大率告命必自近始凡貞凶貞吝有二義有貞固守此則凶吝者有雖得正亦凶吝者此不云貞凶而云貞吝者將否而方告命為可羞吝否不由於告命也集說朱子語類問泰卦無平不陂無往不復與城復于隍曰此亦事勢之必然治久必亂亂久必治天下無久而不變之理子善遂言天下治亂皆生於人心治久則人心放肆故亂因此生亂極則人心恐懼故治由此起曰固是生於人心履其運者必有變化持守之道可也案貞者常也爻義言當此之時只可告邑未可用師若守常而用師則吝非以告邑為可吝也總論劉氏定之曰泰取天地交而萬物通上下交而其志同故六爻之中相交之義重初與四相交泰之始也故初言以其彚如茅之連茹四言以其鄰如鳥之連翩二與五相交泰之中也故五言人君降其尊貴以任夫臣二言大臣盡其職任以答夫君三與上相交泰之終也故三言平變而為陂上言城復而于隍蓋君子進而小人退所以致泰也君委任而臣效忠所以致泰也抑天運之循環泰極而否有必然者而保泰之意隱然有不容不恐懼焉則平陂城隍其旨嚴哉吳氏曰愼曰初四以氣類言二體之始也三上以時運言二體之終也二五以主泰言二體之中也坤下乾上程傳否序卦泰者通也物不可以終通故受之以否夫物理往來通泰之極則必否否所以次泰也為卦天上地下天地相交隂陽和暢則為泰天處上地處下是天地隔絶不相交通所以為否也否之匪人不利君子貞大往小來本義否閉塞也七月之卦也正與泰反故曰匪人謂非人道也其占不利於君子之正道蓋乾往居外坤來居內又自漸卦而來則九往居四六來居三也或疑之匪人三字衍文由比六三而誤也傳不特解其義亦可見程傳天地交而萬物生於中然後三才備人為最靈故為萬物之首凡生天地之中者皆人道也天地不交則不生萬物是無人道故曰匪人謂非人道也消長闔闢相因而不息泰極則復否終則傾無常而不變之理人道豈能無也既否則泰矣夫上下交通剛柔和㑹君子之道也否則反是故不利君子貞君子正道否塞不行也大往小來陽往而陰來也小人道長君子道消之象故為否也集說孔氏穎逹曰否之匪人者言否閉之世非是人道交通之時故云匪人不利君子貞者由小人道長君子道消故不利君子為正也陽氣往而陰氣來故云大往小來陽主生息故稱大陰主消耗故稱小崔氏憬曰否不通也於不通之時小人道長故云匪人君子道消故不利君子貞也吕氏大臨曰否閉塞而不交也否之匪人不利君子貞言否閉之世非其人者惡直醜正不利乎君子之守正王氏宗傳曰匪人所謂非君子人也人非君子則平時與君子如枘鑿之不相入者正斯人也匪人得志則君子之道否塞而不行矣夫正道之在天下不可以一日無也今也君子之道否塞而不得行者皆否之匪人不利乎貞故也蓋小人之心同乎已者則利之異乎已者則不利也夫惟彼己之勢既不相入故大者往而小者來也喬氏中和曰君子以正自居隱見隨時無入而不自得何不利之有亦小人不利於君子之貞耳於是而君子往小人來而天地否矣由否而之泰焉天也由泰而之否焉人也初六拔茅茹以其彚貞吉亨本義三陰在下當否之時小人連類而進之象而初之惡則未形也故戒其貞則吉而亨蓋能如是則變而為君子矣程傳泰與否皆取茅為象者以羣陽羣陰同在下有牽連之象也泰之時則以同征為吉否之時則以同貞為亨始以內小人外君子為否之義復以初六否而在下為君子之道易隨時取義變動無常否之時在下者君子也否之三陰上皆有應在否隔之時隔絶不相通故無應義初六能與其類貞固其節則處否之吉而其道之亨也當否而能進者小人也君子則伸道免禍而已君子進退未嘗不與其類同也集說王氏弼曰居否之時動則入邪三陰同道皆不可進故拔茅茹以類貞而不諂則吉亨胡氏瑗曰否之初是小人道長君子不可用之時也時既不可用則必引類而退守以正道不可求進然後得其吉而獲亨也王氏宗傳曰否之初六雖有其應然當此之時上下隔絶而不通故初六無上應之義惟其以彚守吾正而已吉亨泰之時為然也初六以其類貞而亦吉且亨者詘身以伸道故無往而不吉亦無往而不亨也吉謂免禍亨謂伸道也王氏應麟曰泰之征吉引其類以有為否之貞吉潔其身以有待案聖人雖許小人改過恐無繫以吉亨之辭之理程傳及諸家作君子守道者近是六二包承小人吉大人否亨本義陰柔而中正小人而能包容承順乎君子之象小人之吉道也故占者小人如是則吉大人則當安守其否而後道亨蓋不可以彼包承於我而自失其守也程傳六二其質則陰柔其居則中正以陰柔小人而言則方否於下志所包畜者在承順乎上以求濟其否為身之利小人之吉也大人當否則以道自處豈肯枉己屈道承順於上惟自守其否而己身之否乃其道之亨也或曰上下不交何所承乎曰正則否矣小人順上之心未嘗無也集說楊氏簡曰小人者之事其上也包而不敢露承而不敢拂故吉若夫大人則否而亨六三包羞本義以陰居陽而不中正小人志於傷善而未能也故為包羞之象然以其未發故無凶咎之戒程傳三以陰柔不中不正而居否又切近於上非能守道安命窮斯濫矣極小人之情狀者也其所包畜謀慮邪濫無所不至可羞耻也集說遊氏酢曰在下體之上位浸顯矣當否之世而不去忍恥冒處故謂之包羞郭氏雍曰尸祿素餐所謂包羞者也孔子曰邦無道榖恥也其六三之謂與楊氏簡曰六三德不如六二而位益高舍正從邪冇愧於中故曰包羞是謂君子中之小人自古此類良多九四有命無咎疇離祉本義否過中矣將濟之時也九四以陽居陰不極其剛故其占為有命無咎而疇類三陽皆獲其福也命謂天命程傳四以陽剛健體居近君之位是有濟否之才而得高位者也足以輔上濟否然當君道方否之時處逼近之地所惡在居功取忌而已若能使動必出於君命威柄一歸於上則無咎而其志行矣能使事皆出於君命則可以濟時之否其疇類皆附離其福祉離麗也君子道行則與其類同進以濟天下之否疇離祉也小人之進亦以其類同也集說項氏安世曰泰九三於無咎之下言有福否九四於無咎之下言疇離祉者二爻當天命之變正君子補過之時也泰之三知其將變能修人事以勝之使在我者無可咎之事然後可以勿恤小人之孚而自食君子之福也否之四因其當變能修人事以乘之有可行之時而無可咎之事則不獨為一己之利又足為衆賢之祉也是二者苟有咎焉其禍可勝言哉又曰泰雖極治以命亂而成否否雖極亂以有命而成泰命者天之所令君之所造也道之廢興豈非天耶世之治亂豈非君耶胡氏炳文曰否泰之變皆天也然泰變為否易故於內卦即言之否變為泰難故於外卦始言之九五休否大人吉其亡其亡繫于苞桑本義陽剛中正以居尊位能休時之否大人之事也故此爻之占大人遇之則吉然又當戒懼如繫辭傳所云也程傳五以陽剛中正之德居尊位故能休息天下之否大人之吉也大人當位能以其道休息天下之否以循致於泰猶未離於否也故有其亡之戒否既休息漸將反泰不可便為安肆當深慮遠戒常虞否之復來曰其亡矣其亡矣其繫于苞桑謂為安固之道如維繫于苞桑也桑之為物其根深固苞謂叢生者其固尤甚聖人之戒深矣漢王允唐李德裕不知此戒所以致禍敗也繫辭曰危者安其位者也亡者保其存者也亂者有其冶者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也集說朱子語類問九五其亡其亡繫于苞桑如何曰有戒懼危亡之心則便有苞桑繫固之象蓋能戒懼危亡則如繫于苞桑堅固不拔矣如此說則象占乃有收殺非是其亡其亡而又繫于苞桑也上九傾否先否後喜本義以陽剛居否極能傾時之否者也其占為先否後喜程傳上九否之終也物理極而必反故泰極則否否極則泰上九否既極矣故否道傾覆而變也先極否也後傾喜也否傾則泰矣後喜也集說孔氏穎逹曰處否之極否道已終能傾毁其否故曰傾否也否道未傾之時是先否已傾之後其事得通故曰後有喜也王氏宗傳曰言傾否而不言否傾人力居多焉胡氏炳文曰以陰柔處泰之終故不能保泰而泰復為否以陽剛處否之終故卒能傾否而否復為泰否泰反復天乎人也何氏楷曰先否後喜即先天下而憂後天下而樂之意正與其亡其亡之君心相似離下乾上程傳同人序卦物不可以終否故受之以同人夫天地不交則為否上下相同則為同人與否義相反故相次又世之方否必與人同力乃能濟同人所以次否也為卦乾上離下以二象言之天在上者也火之性炎上與天同也故為同人以二體言之五居正位為乾之主二為離之主二爻以中正相應上下相同同人之義也又卦惟一陰衆陽所欲同亦同人之義也他卦固有一陰者在同人之時而二五相應天火相同故其義大同人于野亨利涉大川利君子貞本義離亦三畫卦之名一陰麗於二陽之閒故其德為麗為文明其象為火為日為電同人與人同也以離遇乾火上同於天六二得位得中而上應九五又卦惟一隂而五陽同與之故為同人于野謂曠遠而無私也冇亨道矣以健而行故能涉川為卦內文明而外剛健六二中正而有應則君子之道也占者能如是則亨而又可涉險然必其所同合於君子之道乃為利也程傳野謂曠野取遠與外之義夫同人者以天下大同之道則聖賢大公之心也常人之同者以其私意所合乃昵比之情耳故必于野謂不以昵近情之所私而於郊野曠遠之地既不繫所私乃至公大同之道無遠不同也其亨可知能與天下大同是天下皆同之也天下皆同何險阻之不可濟何艱危之不可亨故利涉大川利君子貞上言于野止謂不在昵比此復言宜以君子正道君子之貞謂天下至公大同之道故雖居千里之遠生千嵗之後若合符節推而行之四海之廣兆民之衆莫不同小人則惟用其私意所比者雖非亦同所惡者雖是亦異故其所同者則為阿黨蓋其心不正也故同人之道利在君子之貞正集說孔氏穎逹曰同人謂和同於人野是廣遠之處借其野名喻其廣遠言和同於人必須寬廣無所不同用心無私乃得亨通故云同人于野亨與人同心足以涉難故曰利涉大川與人和同易涉邪僻故利君子貞也胡氏炳文曰同人于野其同也大利君子貞其同也正與人大同亨道也雖大川可涉然有所同者大而不出於正者故又當以正為本蔡氏清曰大人之道豈必人人而求與之同哉亦惟以正而已正也者人心之公理也不期同而自無不同者也若我既得其正而彼或不我同則彼之悖矣吾何計哉然同我者已億萬而不同者僅一二亦不害其為大同也林氏希元曰序卦傳曰與人同者物必歸馬同人于野則物無不應人無不助而事無不濟故亨雖大川之險亦利於涉矣然必所同者合於君子之正道乃為于野而亨且利涉使不以正雖所同滿天下竟是私情之合不足謂之于野又何以致亨而利涉哉初九同人于門無咎本義同人之初未有私主以剛在下上無係應可以無咎故其象占如此程傳九居同人之初而無繫應是無偏私同人之公者也故為出門同人出門謂在外在外則無私昵之偏其同博而公如此則無過咎也集說王氏弼曰居同人之始為同人之首者也無應於上心無係吝通夫大同出門皆同故曰同人于門也出門同人誰與為咎王氏應麟曰同人之初曰出門隨之初曰出門謹於出門之初則不苟同不詭隨胡氏炳文曰同人與隨皆易溺於私隨必出門而後可以有功同人必出門而後可以無咎六二同人于宗吝本義宗黨也六二雖中且正然有應於上不能大同而係於私吝之道也故其象占如此程傳二與五為正應故曰同人子宗宗謂宗黨也同於所係應是有所偏與在同人之道為私狹矣故可吝二若陽爻則為剛中之德乃以中道相同不為私也集說馮氏當可曰以卦體言之則有大同之義以爻義言之則示阿黨之戒蔡氏清曰柔得位得中而應乎乾曰同人今乃謂同人于宗吝者蓋卦是就其全體上取其有相同之義然同人之道貴乎廣今二五相同雖曰兩相與則專然其道則狹矣曰于宗吝以見其利于野也九三伏戎于莽升其高陵三歲不興本義剛而不中上無正應欲同於二而非其正懼九五之見攻故有此象程傳三以陽居剛而不得中是剛暴之人也在同人之時志在於同卦惟一陰諸陽之志皆欲同之三又與之比然二以中正之道與五相應三以剛强居二五之閒欲奪而同之然理不直義不勝故不敢顯發伏藏兵戎於林莽之中懷惡而內負不直故又畏懼時升高陵以顧望如此至於三歲之久終不敢興此爻深見小人之情狀然不曰凶者既不敢發故未至凶也集說朱子語類問伏戎于莽升其高陵如何曰只是伏於高陵之草莽中三歲不敢出胡氏炳文曰卦惟三四不言同人三四有爭奪之象非同者也九四乘其墉弗克攻吉本義剛不中正又無應與亦欲同於六二而為三所隔故為乘墉以攻之象然以居柔故有自反而不克攻之象占者如是則是能改過而得吉也程傳四剛而不中正其志欲同二亦與五為仇者也墉垣所以限隔也四切近於五如隔墉耳乘其墉欲攻之知義不直而不克也苟能自知義之不直而不攻則為吉也若肆其邪欲不能反思義理妄行攻奪則其凶大矣三以剛居剛故終其强而不能反四以剛居柔故有困而能反之義能反則吉矣畏義而能改其吉宜矣集說朱子語類問同人三四皆有爭奪之義曰三以剛居剛便迷而不返四以剛居柔便有返底道理繫辭云近而不相得則凶如初上則各在事外不相干涉所以無爭項氏安世曰凡爻言不克者皆陽居陰位惟其陽故有訟有攻惟其陰故不克訟弗克攻訟之九二九四同人之九四皆是物也案卦名同人而三四兩爻所以有乖爭之象者蓋人情同極必異異極乃復於同正如治極則亂亂極乃復於治此人事分合之端易道循環之理也卦之內體自同而異故于門于宗同也至三而有伏戎之象則不勝其異矣外體自異而同故乘墉而弗克攻大師而克相遇漸反其異也至上而有于郊之象則復歸於同矣三四兩爻正當同而異異而同之際故聖人因其爻位爻德以取象三之所謂敵剛者敵上也四之所謂乘墉者攻初也蓋既非應則不同不同則有相敵相攻之象矣以為爭六二之應而與九五相敵相攻似非卦意也九五同人先號咷而後笑大師克相遇本義五剛中正二以柔中正相應於下同心者也而為三四所隔不得其同然義理所同物不得而閒之故有此象然六二柔弱而三四剛强故必用大師以勝之然後得相遇也程傳九五同於二而為三四二陽所隔五自以義直理勝故不勝憤抑至於號咷然邪不勝正雖為所隔終必得合故後笑也大師克相遇五與二正應而二陽非理隔奪必用大師克勝之乃得相遇也云大師云克者見二陽之强也九五君位而爻不取人君同人之義者蓋五専以私昵應於二而失其中正之德人君當與天下大同而獨私一人非君道也又先隔則號咷後遇則笑是私昵之情非大同之體也二之在下尚以同于宗為吝況人君乎五既於君道無取故更不言君道而明二人同心不可閒隔之義繫辭云君子之道或出或處或默或語二人同心其利斷金中誠所同出處語默無不同天下莫能閒也同者一也一不可分分乃二也一可以通金石冒水火無所不能入故云其利斷金其理至微故聖人贊之曰同心之言其臭如蘭謂其言意味深長也集說楊氏萬里曰師莫大於君心而兵革為小克莫難於小人而敵國為小胡氏炳文曰同人九五剛中正而有應故先號咷而後笑旅上九剛不中正而無應故先笑後號咷吳氏曰愼曰案程傳論九五非人君大同之道本義不用此意何也蓋六二為同人之主著于宗之吝所以明大同之道也至五則取其中正而應故未合而號咷既遇而笑樂非以其私也故象傳明其中直彖傳與其中正而應本義謂其義理所同豈得以私昵病之哉案居尊位而欲下交居下位而欲獲上其中必多忌害閒隔之者故此爻之號咷鼎九二之我仇有疾亦論其理如此爾說易者必欲求其爻以實之則鑿矣上九同人于郊無悔本義居外無應物莫與同然亦可以無悔故其象占如此郊在野之內未至於曠遠但荒僻無與同耳程傳郊在外而遠之地求同者必相親相與上九居外而無應終無與同者也始有同則至終或有睽悔處遠而無與故雖無同亦無悔雖欲同之志不遂而其終無所悔也集說楊氏時曰同人于野亨上九同人于郊止於無悔而已何也蓋以一卦言之則于野無昵比之私焉故亨上九居卦之外而無應不同乎人人亦無同之者則靜而不通乎物也故無悔而已蔡氏淵曰國外曰郊郊外曰野雖在卦上猶未出乎卦也故止曰郊梁氏寅曰上無所係應而同人于郊則所同者遠亦無私矣然猶未能極乎遠故不能吉亨止於無悔而已象傳言志未得蓋其所同者未能周於天下是其志之未遂也總論孔氏穎逹曰凡處同人而不泰焉則必用師矣者王氏注意非止上九一爻乃總論同人一卦之義去初上而言工有同宗之吝三有伏戎之禍四有不克之困五有大師之患是處同人之世無大通之志則必用師矣楊氏文煥曰同人于野則亨于門則無咎于宗則吝于郊則無悔于宗不若于門于門不若于郊于郊不若于野六爻有不能盡卦義者同人是也梁氏寅曰同人之道以大同而不私為善故卦之諸爻或比或應皆為同於所近無大吉者彖言同人于野則能絶其私與而廓然大公此其所以亨也以一卦觀之由內而至外初為同人于門至近也二為同人于宗亦近也至上而同人于郊則遠矣然未如野之尤遠也同人于野豈非超出於家邑之外乎二為同人之主而不能大同故其有應者乃所以為吝初上雖無咎無悔然終不若于野之亨也聖人以四海為一家中國為一人而情無不孚恩無不洽者豈非同人于野之意哉乾下離上程傳大有序卦與人同者物必歸焉故受之以大有夫與人同者物之所歸也大有所以次同人也為卦火在天上火之處高其明及遠萬物之衆無不照見為大有之象又一柔居尊衆陽並應居尊執柔物之所歸也上下應之為大有之義大有盛大豐有也大有元亨本義大有所有之大也離居乾土火在天上無所不照又六五一陰居尊得中而五陽應之故為大有乾健離明居尊應天有亨之道占者有其德則大善而亨也程傳卦之才可以元亨也凡卦德冇卦名自有其義者如比吉謙亨是也有因其卦義便為訓戒者如師貞丈人吉同人于野亨是也有以其卦才而言者大有元亨是也由剛健文明應天時行故能元亨也集說鄭氏汝諧曰陽為大陰為小一陰居尊而為五陽所歸所有者大也大非陰柔所能有也必沖虛不自滿者能有之六五明體而虛中所以為大有所以為元亨若直以大有為富有盛大則失其義矣邱氏富國曰一陰在上卦之中而五陽宗之諸爻之有皆六五之有也豈不大哉惟其所有者大故其亨亦大也案比以九居五視大有之六五為優矣然比之應之者五陰也則民庶之象也大有之應之者五陽也則賢人之象也賢人應之所有孰大於是哉故大有之柔中雖不如比之剛中而比之吉無咎則不如大有之直言元亨也彖辭直言元亨更無他辭者惟此與鼎卦而已皆以尚賢飬賢之故也初九無交害匪咎艱則無咎本義雖當大有之時然以陽居下上無係應而在事初未涉乎害者也何咎之有然亦必艱以處之則無咎戒占者宜如是也程傳九居大有之初未至於盛處平無應與未有驕盈之失故無交害未涉於害也大凡富有鮮不有害以子貢之賢未能盡免況其下者乎匪咎艱則無咎言富有本匪有咎也人因富有自為咎耳若能享富有而知難處則自無咎也處富有而不能思艱兢畏則驕侈之心生矣所以有咎也集說胡氏炳文曰當大有之時反易有害初陽在下未與物接所以未涉於害也何咎之有然以為匪咎而以易心處之反有咎矣無交害大有之初如此艱則無咎大有自初至終皆當如此九二大車以載有攸往無咎本義剛中在下得應乎上為大車以載之象有所往而如是可無咎矣占者必冇此德乃應其占也程傳九以陽剛居二為六五之君所倚任剛健則才勝居柔則謙順得中則無過其才如此所以能勝大有之任如大車之材强壯能勝載重物也可以任重行遠故有攸往而無咎也大有豐盛之時有而未極故以二之才可往而無咎至於盛極則不可以往矣集說王氏弼曰任重而不危九三公用亨于天子小人弗克本義亨春秋傳作享謂朝獻也古者亨通之亨享獻之享烹飪之烹皆作亨字九三居下之上公侯之象剛而得正上有六五之君虛中下賢故為享于天子之象占者有其德則其占如是小人無剛正之德則雖得此爻不能當也程傳三居下體之上在下而居人上諸侯人君之象也公侯上承天子天子居天下之尊率土之濵莫非王臣在下者何敢専其有凡土地之富人民之衆皆王者之有也此理之正也故三當大有之時居諸侯之位有其富盛必用亨通乎天子謂以其有為天子之有也乃人臣之常義也若小人處之則専其富有以為私不知公以奉上之道故曰小人弗克也集說朱子語類云古文無享字亨享烹並通用如公用亨于天子解作亨字便不是又曰亨享二字據說文本是一字故易中多互用如王用亨于岐山亦當為享如王用享于帝之云也字畫音韻是經中淺事故先儒得其大者多不留意然不知此等處不理㑹却枉費了無限辭說牽補而卒不得其大義亦甚害事也九四匪其彭無咎本義彭字音義未詳程傳曰盛貌理或當然六五柔中之君九四以剛近之有僭逼之嫌然以其處柔也故有不極其盛之象而得無咎戒占者宜如是也程傳九四居大有之時已過中矣是大有之盛者也過盛則凶咎所由生也故處之之道匪其彭則得無咎謂能謙損不處其太盛則得無咎也四近君之高位苟處太盛則致凶咎彭盛多之貌詩載驅云汶水湯湯行人彭彭行人盛多之狀雅大明云駟騵彭彭言武王戎馬之盛也集說沈氏該曰以剛處柔謙以自居而懼以戒其盛得明哲保身之義故無咎也六五厥孚交如威如吉本義大有之世柔順而中以處尊位虛已以應九二之賢而上下歸之是其孚信之交也然君道貴剛太柔則廢當以威濟之則吉故其象占如此亦戒辭也程傳六五當大有之時居君位虛中為孚信之象人君執柔守中而以孚信接於下則下亦盡其信誠以事於上上下孚信相交也以柔居尊位當大有之時人心安易若專尚柔順則陵慢生矣故必威如則吉威如有威嚴之謂也既以柔和孚信接於下衆志說從又有威嚴使之有畏善處有者也吉可知矣集說俞氏琰曰既有誠信以接下而人信之又有威嚴以自重而人畏之為大有之君而剛柔得宜如此故吉上九自天祐之吉無不利本義大有之世以剛居上而能下從六五是能履信思順而尚賢也滿而不溢故其占如此程傳上九在卦之終居無位之地是大有之極而不居其有者也處離之上明之極也惟至明所以不居其有不至於過極也有極而不處則無盈滿之災能順乎理者也五之孚信而履其上為蹈履誠信之義五有文明之德上能降志以應之為尚賢崇善之義其處如此合道之至也自當享其福慶自天祐之行順乎天而獲天祐故所往皆吉無所不利也集說郭氏雍曰繫辭曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也六五之君實盡此而言於上九者蓋言大有之吉以此終也故象曰大有上吉則知此吉大有之吉也非止上九之吉也鄭氏汝諧曰履信思順又以尚賢蓋言五也五厥孚交如履信也居尊用柔思順也上九在上尚賢也五獲天之祐吉無不利由其有是也言五而繫之上何也五成卦之主上其終也五之德宜獲是福於終可驗也易之取義若是者衆小畜之上九曰婦貞厲月幾望言六四之畜陽至上而為貞厲之婦幾望之月也若指上九而言則上九陽也不得為婦與月說易者其失在於泥爻以求義故以履信思順尚賢歸之於上九也易之所謂尚者上也五尚上九之賢故自天之祐於上九見之王氏宗傳曰六五以一柔有五剛上九獨在五上五能尚之繫辭傳所謂又以尚賢則上九是也祐之自天吉無不利謂大有至此愈有隆而無替也然則當大有之極莫大於得天而所以得天又莫大於尚賢也胡氏炳文曰小畜上九畜之終也其占曰厲曰凶承六四言也大有上九有之終也其占吉無不利承六五言也小畜一陰畜衆陽故其終也如彼大有一陰有衆陽故其終也如此君臣大分豈不明哉蓋五之厥孚履信也柔中思順也尚上九之一陽尚賢也所以其終也自天祐之吉無不利也案傳義皆以履信思順尚賢為上九之事然易中以上爻終五爻之義者甚多如師之大君有命離之王用出征解之公用射隼皆非以上爻為王公也蒙五爻而終其義爾郭氏鄭氏王氏之說皆與卦意爻義合胡氏最為恪守本義者於此獨從郭氏諸說則亦未允於心故也御纂周易折中卷二

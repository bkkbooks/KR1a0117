body:
  text: 欽定四庫全書御纂周易折中卷十六文言傳本義此篇申彖傳象傳之意以盡乾坤二卦之藴而餘卦之說因可以例推云元者善之長也亨者嘉之會也利者義之和也貞者事之幹也本義元者生物之始天地之徳莫先於此故於時為春於人則為仁而衆善之長也亨者生物之通物至於此莫不嘉羙故於時為夏於人則為禮而衆羙之㑹也利者生物之遂物各得宜不相妨害故於時為秋於人則為義而得其分之和貞者生物之成實理具備隨在各足故於時為冬於人則為智而為衆事之幹幹木之身而枝葉所依以立者也程傳它卦彖象而已獨乾坤更設文言以發明其義推乾之道施於人事元亨利貞乾之四徳在人則元者衆善之首也亨者嘉美之㑹也利者和合於義也貞者幹事之用也集説朱子語類問元者善之長曰元亨利貞皆善也而元乃為四者之長是善端初發見處也問亨者嘉之㑹曰且以草木言之發生到夏時好處都来湊㑹嘉只是好處㑹是期㑹也又云利者義之和義疑於不和矣然處之而各得其所則和義之和處便是利問程子曰義安處便為利只是當然便安否曰是正好去解利者義之和句義截然而不可犯似不和分别後萬物各止其所却是和不和生於不義義則無不和和則無不利矣又云貞者事之幹知是那黙運事變底一件物事所以為事之幹又云正字不能盡貞之義須用連正固説其義方全正如孟子所謂知斯二者弗去是也知斯是正意弗去是固意幹問又有所謂不可貞者是如何曰也是這意思只是不可以為正而固守之項氏安世曰善也嘉也義也皆善之異名也在事之初為善善之衆盛為嘉衆得其宜為義義所成立為事此一理而四名也故分而為四則曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也比而為二則曰乾元者始而亨者也利貞者性情也混而為一則曰乾始能以羙利利天下不言所利大矣哉義之和和謂能順之也事之幹幹謂能立之也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事本義以仁為體則无一物不在所愛之中故足以長人嘉其所㑹則无不合禮使物各得其所利則義无不和貞固者知正之所在而固守之所謂知而弗去者也故足以為事之幹程傳體法於乾之仁乃為君長之道足以長人也體仁體元也比而效之謂之體得㑹通之嘉乃合於禮也不合禮則非理豈得為嘉非理安有亨乎和於義乃能利物豈有不得其宜而能利物者乎貞固所以能幹事也集説李氏鼎祚曰天運四時以生成萬物君法五常以教化於人元為善長故能體仁仁主春生東方木也通為嘉㑹足以合禮禮主夏養南方火也利為物宜足以和義義主秋成西方金也貞為事幹以配於智智主冬藏北方水也不言信者信主土土居中宫分王四季水火金木非土不載朱子語類云體仁不是将仁来為我之體我之體便都是仁也又曰本義云以仁為體者猶言自家一箇身體元来都是仁又云嘉羙也㑹是集齊底意思許多嘉羙一時鬬湊到此故謂之嘉㑹嘉其所㑹便動容周旋無不中禮又云看来義之為義只是一箇冝其初則甚嚴如男正位乎外女正位乎内直是有内外之辦君尊於上臣恭於下尊卑大小截然不可犯似若不和之甚然能使之各得其宜則其和也孰大於是又云幹如木之幹事如木之枝葉貞固者正而固守之貞固在事是與立箇骨子所以為事之幹欲為事而非此之貞固便植立不起自然倒了問貞固二字與體仁嘉㑹利物似不同曰屬北方者便著用兩字方能盡之問文言四徳一叚曰元者善之長以下四句説天徳之自然君子體仁足以長人以下四句説人事之當然元是善之長萬物生理皆始於此衆善百行皆統於此故於時為春於人為仁亨是嘉之㑹嘉羙也㑹猶齊也盖春方生育至此乃無一物不暢茂其在人則禮儀三百威儀三千事事物物一齊到恰好處所謂動容周旋皆中禮故於時為夏於人為禮利者義之和萬物至此各遂其性事理至此無不得宜故於時為秋於人為義貞者事之幹萬物至此收歛成實事理至此無不的正故於時為冬於人為智此天徳之自然其在君子所當從事於此者體者以仁為體仁為我之骨我以之為體仁皆從我發出故無物不在所愛所以能長人欲其所㑹之美當美其所㑹盖其厚薄親踈尊卑小大相接之體各有節文無不中節即所㑹皆美所以能合於禮也能使事物各得其宜不相妨害自無乖戾而各得其分之和知其正之所在固守而不去故足以為事之幹幹如版築之有楨幹胡氏炳文曰體仁有以存諸中嘉㑹則美見乎外利物有以方乎外而貞固有以守於中禮者仁之著智者義之藏體仁長人貞固幹事由理以及用嘉㑹合禮利物和義則由用以及理也董氏真卿曰朱子謂屬北方者便著用兩字方能盡之㓜時聞先君子之言曰北方天氣之終始有分别之義故北字篆文兩人相背至於四端五臓四獸屬北方者皆兩東西南三方者各一四時為冬亦與春為交接四徳為貞亦貞下起元十二辰為亥子六十四卦為坤復林氏希元曰君子克己復禮使仁充乎中而見乎外中之所存無一念之非仁外之所行無一事之非仁則君子之身渾是一箇仁非體其體而體夫仁也體仁仁之至也故無一物不在所愛之中而足以長人安土敦仁故能愛正是如此又曰利者義之和之利乃在人天然之利利物足以和義之利乃人所以求乎天然之利也義之和之和乃在人天然之和足以和義之和乃人所以求乎天然之和也君子行此四徳者故曰乾元亨利貞本義非君子之至健无以行此故曰乾元亨利貞此第一節申彖傳之意與春秋傳所載穆姜之言不異疑古者已有此語穆姜稱之而夫子亦有取焉故下文别以子曰表孔子之辭盖傳者欲以明此章之為古語也程傳行此四徳乃合於乾也集説朱子語類問乾元亨利貞猶言性仁義禮智曰此語甚稳當又曰乾元亨利貞他把乾字當君子蔡氏清曰元亨利貞四字在文王只為占辭至孔子彖傳乃有四徳之説然其所謂四徳者又有不同天之四徳自其生成萬物者言也聖人之四徳自其統治一世者言也至此所謂四徳又只就君子一身所行而言也一身所行者其體也統治一世者其用也四徳無乎不在也又見乾字所該者廣也初九曰潛龍勿用何謂也子曰龍徳而隱者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也本義龍徳聖人之徳也在下故隠易謂變其所守大抵乾卦六爻文言皆以聖人明之有隠顯而无淺深也程傳自此以下言乾之用用九之道也初九陽之微龍徳之潛隠乃聖賢之在側陋也守其道不隨世而變晦其行不求知於時自信自樂見可而動知難而避其守堅不可奪潛龍之徳也集説孔氏穎達曰心以為樂己則行之心以為憂己則違之身雖逐物推移心志守道確乎堅實其不可㧞游氏酢曰龍徳而隠故不易乎世不易乎世者用舍在我故遯世无悶不成乎名者非譽不在物故不見是而无悶吴氏澄曰樂則行之釋上文无悶二句憂則違之釋上文不易不成二句樂者謂无悶也行之謂為之也憂者謂非其所樂也違之謂不為也不求見於世不求知於人者此其所樂也則為之易乎世成乎名者此非其所樂也則不為蔣氏悌生曰行道而濟時者聖人之夲心故曰樂則行之不用而隠遯者非聖人之所願欲也故曰憂則違之雖然其進其退莫不求至理之所在未嘗枉道以狥人也故曰確乎其不可㧞蔡氏清曰遯世無悶二句尤重於不易乎世二句樂則行之三句更重於遯世无悶二句此三句明其無意必也論龍徳之隠必至是而後盡案吴氏蔣氏兩説不同而皆可通九二曰見龍在田利見大人何謂也子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也本義正中不潛而未躍之時也常言亦信常行亦謹盛徳之至也閑邪存其誠无斁亦保之意言君徳也者釋大人之為九二也程傳以龍徳而處正中者也在卦之正中為得正中之義庸信庸謹造次必於是也既處无過之地則唯在閑邪邪既閑則誠存矣善世而不伐不有其善也徳博而化正已而物正也皆大人之事雖非君位君之徳也集説孔氏穎達曰庸常也常言之信實常行之謹慎防閑邪惡自存誠實為善於世而不自伐其功徳能廣博而變化於世俗初爻則全隠遯避世二爻則漸見徳行以化於俗也朱子語類云庸言庸行盛徳之至到這裏猶自閑邪存誠便是無斁亦保雖無厭斁亦當保也保者持守之意又云利見大人君徳也兩處説君徳却是要發明大人即是九二陸氏九淵曰言行之信謹二之所以成己者也善世而不伐二之所以成物者也彼其所謂信謹者乃其所以不伐者也閑邪存其誠存諸己者也徳博而化徳之及乎物者也彼其所以閑而存者乃其所以博而化者也李氏舜臣曰乾畫一實則誠坤畫一虗則生敬故乾九二言誠坤六二言敬誠敬二字始於包犧心畫而實天地自然之理也項氏安世曰稱中正者二事也二五為中隂陽當位為正稱正中者一事也但取其正得中位非以當位言也又曰以在下卦又非陽位故不為中位而為中徳文言兩稱君徳明非君位也此又稱龍徳之中明非龍位之中也馮氏椅曰易者理學之宗而乾坤二卦又易學之宗也子思孟子言誠者天之道先儒謂誠敬者聖學之源皆出於此何氏楷曰道止於中中寓於庸庸者常也平無奇之名言必有物無苟髙也惟其信無擇言矣行必有則無苟難也惟其謹無擇行矣信謹誠也天徳也一實焉而已九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳脩業忠信所以進徳也脩辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣本義忠信主於心者无一念之不誠也脩辭見於事者无一言之不實也雖有忠信之心然非脩辭立誠則无以居之知至至之進徳之事知終終之居業之事所以終日乾乾而夕猶惕若者以此故也可上可下不驕不憂所謂无咎也程傳三居下之上而君徳已著将何為哉唯進徳脩業而已内積忠信所以進徳也擇言篤志所以居業也知至至之致知也求知所至而後至之知之在先故可與㡬所謂始條理者知之事也知終終之力行也既知所終則力進而終之守之在後故可與存義所謂終條理者聖之事也此學之始終也君子之學如是故知處上下之道而无驕憂不懈而知懼雖在危地而无咎也集説孔氏穎逹曰九三所以終日乾乾者欲進益道徳脩營功業故終日乾乾匪懈也進徳則知至将進也脩業則知終存義也程子曰脩辭立其誠不可不子細理㑹言能脩省言辭便是要立誠若只是脩飾言辭為心只是為偽也脩其言辭正為立己之誠意呂氏大臨曰忠信進徳如有諸己又知所以充實之也脩辭立其誠正名是事行其實以稱之也所立卓爾而欲從之知至至之也於徳有先見之明也人不堪其憂而不改其樂知終終之也於分有當安之義也朱子語類云徳是就心上説業是就事上説忠信是自家心中誠實脩辭立其誠是説處有真實底道理又云忠信只是實若無實如何㑹進如播種相似須是實有種子下在泥中方㑹日見發生若把箇空殻下在裏面如何㑹發生道理須是實見得若徒将耳聽過将口説過濟甚事忠信所以為實者且如孝須實是孝方始那孝之徳日進一日如弟須實是弟方始那弟之徳日進一日若不實却自無根了如何㑹進立其誠誠依舊便是上靣忠信脩辭是言語照管得到那裏靣亦須照管得到進徳是自覺得意思日強似一日日振作似一日不是外靣事只是自見得意思不同問立誠不就制行上説而特指脩辭何也曰人不誠處多在言語上又曰人多将言語作沒緊要容易説出来若一一要實這工夫自是大忠信進徳便是見得脩辭立誠底許多道理脩辭立誠便要立得這忠信若口不擇言逢事便説只這忠信亦被汨沒動盪立不住了又云伊川觧脩辭立誠作擇言篤志説得来寛不如明道説云脩其言辭正為立已之誠意又云忠信脩辭且大綱説所以進徳脩業之道知至知終則又詳其始終工夫之序如此忠信心也脩業事也然藴於心者所以見於事脩於事者所以養其心此聖人之學所以為内外兩進而非判然二事也知至則知其道之所止至之乃行矣而騐其所知也知終則見其道之極致終之乃力行而期至於所歸宿之地也知而行行而知二者交相警發而其道日益光明終日乾乾又安有一息之閒哉又云知至至之者言此心所知者心真箇到那所知田地雖行未到而心已到故其精微㡬宻一齊在此故曰可與㡬知終終之者既知到極處便力行到極處此真實見於行事故天下義理都無走失故曰可與存義又云進字貼著那㡬字至字又貼著那進字居字貼著那存字終字又貼著那居字㡬是心上説義是那業上底道理又云忠信進徳與知至至之可與幾也這㡬句都是去底字脩辭立誠與知終終之可與存義都是住底字進徳是日日新居業是日日如此問脩業居業之别曰二者只是一意居守也逐日脩作是脩常常如此是守又云忠信進徳脩辭立誠與敬以直内義以方外分屬乾坤盖取健順二體忠信立誠自有剛健主立之體敬義便有静順之體進脩便是箇篤實敬義便是箇虗静故曰陽實隂虗俞氏琰曰徳與忠信皆主於心者也業與辭皆見於事者也事已成謂之業脩業者業未成則脩而成之也居業業已成則居而守之也辭言辭也脩謂脩省非脩飾也誠即忠信也立其誠謂立其誠意而不為私意所汨撓也若但以脩飾言辭為心則偽矣君子閑邪存其誠則無一念之不正也脩辭立其誠則無一言之不實也蔣氏悌生曰乾乾因其時而惕時字正觧爻辭終日之義見聖人省察之心無少間斷也蔡氏清曰忠信所以進徳也每應一件事俱著一箇心為之主惟心之所主者一於誠則徳之在内者進矣而其於事也又處置恰好如其所言則是誠有所歸宿安頓處是之謂立誠而業之見於外者脩矣又曰誠即忠信也忠信就初閒存主上説脩辭立誠就後来事到就緒上説二者總是敬以直内義以方外忠信直内之事脩辭方外之事又曰閑邪之外再無存誠工夫故承之曰存其誠脩辭之外再無立誠工夫故承之曰立其誠誠即忠信向也誠存於心而今則見於事而誠有立矣又曰中庸章句云反諸身不誠謂反求諸身而其所存所發有未實也所存之實即主忠信也所發之實即脩辭立其誠也合進徳脩業總是中庸之誠身大學之誠意正心脩身又曰九三居下之上是亦有位其上者則九三為在下位矣亦有位在下者則九三又為居上位矣若於初二必不兼言居上位若於九五必不兼言在下位此亦當知林氏希元曰忠信是此心真實如孝則真實是孝弟則真實是弟實心為善則善心日以充長善念日以彰著此之謂進徳實心為善乃誠也若辭不脩語孝弟俱是空言無實事則此誠終於消散不聚集矣何由立又何績業可居故工夫又在脩治言辭上先行其言而後從之言必有物凡吐口言語皆是實事無一句虗妄乃脩辭也脩辭則行成孝成箇孝弟成箇弟吾心之誠集聚而不消散故曰立其誠誠立則業脩而可居非立誠之外又有居業工夫也又曰忠信所以進徳是忠信所以至之也何也凡有所進将必有所至忠信以至之則善心日長神智日開道之壺奥理之𤣥妙為吾所當至者一時雖未能遽至固已先得之矣故可與㡬脩辭立其誠所以居業是脩辭立誠所以終之也何也居是居止終是終身居止而不移居之所以終之也脩辭立誠以終之則踐履篤實持守堅固事理之宜吾所當守者可與存之而不失矣義者事理之宜吾所當守者也鄭氏維嶽曰不曰所以脩業而曰所以居業盖脩辭立誠即是脩矣既脩則有可居矣猶之屋然脩者方在營搆既成則可居也楊氏啓新曰心之存諸中者純乎忠信而不妄則心無外馳而得於己者日進而不已言之見於事者致其脩省而有實則事皆實理而體諸身者安安而不遷九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恆非離羣也君子進徳脩業欲及時也故无咎本義内卦以徳學言外卦以時位言進徳脩業九三備矣此則欲其及時而進也程傳或躍或處上下无常或進或退去就從宜非為邪枉非離羣類進徳脩業欲及時耳時行時止不可恒也故云或深淵者龍之所安也在淵謂躍就所安淵在深而言躍但取進就所安之義或疑辭隨時而未可必也君子之順時猶影之隨形可離非道也集説項氏安世曰進退上下不敢自必相時而動所謂自試也大抵上下之交皆危疑之地故三厲而四猶疑之俞氏琰曰上與進釋躍字下與退釋在淵之義无常无恆釋或之義非為邪非離羣欲及時以申進无咎之義林氏希元曰可上而不上疑於以隠為髙可進而不進疑於遯世離羣及時之時上進之時也欲及時是應非為邪離羣句无咎得時也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也本義作起也物猶人也覩釋利見之意也本乎天者謂動物本乎地者謂植物物各從其類聖人人類之首也故興起於上則人皆見之程傳人之與聖人類也五以龍徳升尊位人之類莫不歸仰况同徳乎上應於下下從於上同聲相應同氣相求也流濕就燥從龍從虎皆以氣類故聖人作而萬物皆覩上既見下下亦見上物人也古語云人物物論謂人也易中利見大人其言則同義則有異如訟之利見大人謂宜見大徳中正之人則其辨明言在見前乾之二五則聖人既出上下相見共成其事所利者見大人也言在見後本乎天者如日月星辰本乎地者如蟲獸草木隂陽各從其類人物莫不然也集説孔氏穎逹曰因大人與衆物感應故廣陳衆物相感應以明聖人之作而萬物瞻覩以結之也又曰周禮大宗伯有天産地産大司徒云動物植物本受氣於天者是動物天體運動含靈之物亦運動是親附於上也本受氣於地者是植物地體凝滯植物亦不移動是親附於下也朱子語類云天下所患無君不患無臣有如是君必有如是臣雖使而今無少閒也必有出来雲從龍風從虎只怕不是真箇龍虎若是真箇龍虎必生風致雲也又云本乎天者親上凡動物首向上是親乎上人類是也本乎地者親下凡植物本向下是親乎下草木是也禽獸首多横生所以無智此本康節説項氏安世曰聖人先得我心之同然者故為同聲同氣之義聖人之於人亦類也故為各從其類之義上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也本義賢人在下位謂九五以下无輔以上九過髙志滿不来輔助之也此第二莭申象傳之意程傳九居上而不當尊位是以无民无輔動則有悔也集説谷氏家杰曰以有位謂之貴以有民謂之髙以有輔謂之賢人在下位其貴而又无位髙而又无民賢人在下位而又无輔者何俱以亢失之也故動而有悔潛龍勿用下也程傳此以下言乾之時勿用以在下未可用也見龍在田時舍也本義言未為時用也程傳隨時而止也終日乾乾行事也程傳進徳脩業也集説林氏希元曰事所當為之事也前章之進徳脩業是也終日乾乾日行其當為之事而不止息也或躍在淵自試也本義未遽有為姑試其可程傳隨時自用也集説趙氏汝楳曰凡飛者必先躍所以作其飛冲之勢今鳥雛習飛必跳躍於巢以自試其羽翰四之躍亦猶是也此以試釋躍俞氏琰曰試釋躍字與中庸日省月試之試同君子謹失時之戒而自試其所學盖欲自知其淺深也谷氏家杰曰人見者淺自見者真必自家試之而後可决也飛龍在天上治也本義居上以治下程傳得位而行上之治也集説蘓氏濬曰上治猶言盛治五帝三王皆治之上者也亢龍有悔窮之災也程傳窮極而災至也乾元用九天下治也本義言乾元用九見與它卦不同君道剛而能柔天下无不治矣此第三莭再申前意程傳用九之道天與聖人同得其用則天下治也集説朱子語類問乾元用九天下治也曰九是天徳健中便自有順用之則天下治如下文乃見天則則便是天徳潛龍勿用陽氣潛藏程傳此以下言乾之義方陽微潜藏之時君子亦當晦隐未可用也集説陸氏銓曰微陽潜藏愈飬則愈厚輕用則𤼵洩無餘矣見龍在田天下文明本義雖不在上位然天下已被其化程傳龍徳見於地上則天下見其文明而化之集説蘓氏軾曰以言行化物故曰文明終日乾乾與時偕行本義時當然也程傳隨時而進也案與時偕行即上乾乾因其時之義言終日之間無時不乾乾或躍在淵乾道乃革本義離下而上變革之時程傳離下位而升上位上下革矣集説趙氏汝楳曰三為下至四革而為上卦革則道亦革此專釋上下卦之交俞氏琰曰革者變也下乾以終上乾方始猶天道更端之時也林氏希元曰此道字輕看猶云陽道隂道九四離下體而入上體是乾道改革之時也故或躍而未果爻下本義改革之際正是取此人都不察妄為之説飛龍在天乃位乎天徳本義天徳即天位也蓋唯有是徳乃宜居是位故以名之程傳正位乎上位當天徳矣集説張氏振淵曰雖有其位苟無其徳可謂之位乎天位而已飛龍在天乃位乎天徳亢龍有悔與時偕極程傳時既極則處時者亦極矣集説朱氏震曰消息盈虗與時偕行則无悔偕極則窮故有悔也林氏栗曰此節上下卦相應初四為始初潜藏四乃革矣革潜為躍也二五為中二文明五乃天徳矣言徳稱其位也三上為終三與時偕行上偕極矣乾元用九乃見天則本義剛而能柔天之法也此第四節又申前意程傳用九之道天之則也天之法則謂天道也或問乾之六爻皆聖人之事乎曰盡其道者聖人也得失則吉凶存焉豈特乾哉諸卦皆然也集説蘓氏軾曰天以无首為則吴氏澄曰剛柔適中天之則也則者理之有限節而無過無不及者也張氏振淵曰不曰乾爻用九而曰乾元用九統六爻而歸之元也亢而用變正是貞之極而歸於元乾之所為終始相因而无首也故曰乾元用九可見乾道變化之則谷氏家杰曰則者有凖而不過之意用九者有變而無常之意天道不是變換焉能使春夏秋冬各有其限聖人不是變換焉能使仁義禮智各有其莭用九正天之凖則不過處故曰乃見乾元者始而亨者也本義始則必亨理勢然也程傳又反覆詳説以盡其義既始則必亨不亨則息矣利貞者性情也本義收歛歸藏乃見性情之實程傳乾之性情也既始而亨非利貞其能不息乎集説朱子語類問利貞者性情也曰此性情如言夲體元亨是𤼵用處利貞是収歛歸夲體處如春時𤼵生到夏長茂條達至秋結子有箇收歛攝聚底意思但未堅實至冬方成在秋雖是已實漸欲脱去其夲之時然受氣未足便種不生故須到冬方成人只到秋冬疑若不見生意不知都已收歛在内胡氏炳文曰性情只是一健字健者乾之性而情其著見者也且性情並言昉於此釋彖曰性命此則曰性情言性而不言命非知性之本言性而不言情非知性之用也俞氏琰曰性言其静也情言其動也物之動極而至於收歛而歸藏則復其夲體之象又将為来春動而𤼵用之地故曰利貞者性情也元起於貞貞下蓋有元繼焉動生於静静中蓋有動存焉貞而元静而動終而復始則生生之道不窮若但言性而不言情則止乎貞純乎静而已矣不見貞下起元静中有動之意而非生生不窮之道也乾始能以美利利天下不言所利大矣哉本義始者元而亨也利天下者利也不言所利者貞也或曰坤利牝馬則言所利矣程傳乾始之道能使庶類生成天下䝉其羙利而不言所利者蓋无所不利非可指名也故賛其利之大曰大矣哉集説程子曰亭毒化育皆利也不有其功常乆而不已者貞也詩曰維天之命於穆不已者貞也朱子語類云明道説得好不有其功言化育之無跡處為貞項氏安世曰物既始則必亨亨則必利利之極必復於元貞者元之復也故四徳總以一言曰乾元又曰乾始而四徳在其中矣以八卦言之震其元也故為出巽則既出而将相見也故為齊離則其亨也故為相見坤則既相見而将利之也故為役兑則其利也故為悅乾則既悦而将入於貞也故為戰坎則其貞也故為勞艮自貞而将出為元也故為萬物之所終始合而言之曰太極而八卦備矣其乾之謂乎俞氏琰曰乾始即乾元也元乃生物之始也美即亨也亨乃衆美之㑹也林氏希元曰上既即物之生長收藏以釋四徳此則歸其功於乾始而贊其大即彖傳統天之説也謂乾雖四徳之流行要一元之所統何也乾既始物由是而亨就能以美利徧利乎天下又收歛於内不言其所利是皆乾始之所為也不其大與盖萬物歸根復命之時造化生物之功不復可見韓琦詩云須臾慰滿三農望歛却神功寂若無亦是此意大哉乾乎剛健中正純粹精也本義剛以體言健兼用言中者其行無過不及正者其立不偏四者乾之徳也純者不雜於隂柔粹者不雜於邪惡盖剛健中正之至極而精者又純粹之至極也或疑乾剛无柔不得言中正者不然也天地之間本一氣之流行而有動静爾以其流行之統體而言則但謂之乾而无所不包矣以其動静分之然後有隂陽剛柔之别也集説喬氏中和曰剛者元也健者亨也中者利也正者貞也元亨利貞實以體之剛健中正也一爻之情六爻之情也六爻發揮旁通情也本義旁通猶言曲盡集説胡氏炳文曰曲盡其義者在六爻而備全其徳者在九五一爻時乘六龍以下則為九五而言也蔡氏清曰六爻𤼵揮只是起下文時乘六龍之意盖上文毎條俱是乾字𤼵端一則曰乾元二則曰乾始三則曰大哉乾乎至此則更端曰六爻𤼵揮可見只是為時乗六龍設矣即彖傳六位時成也時乗六龍以御天也雲行雨施天下平也本義言聖人時乘六龍以御天則如天之雲行雨施而天下平也此苐五莭復申首章之意程傳大哉賛乾道之大也以剛健中正純粹六者形容乾道精謂六者之精極以六爻𤼵揮旁通盡其情義乘六爻之時以當天運則天之功用著矣故見雲行雨施隂陽溥暢天下和平之道也集説張氏清子曰彖言雲行雨施而以品物流形繼之則雲雨為乾之雲雨此言雲行雨施而以天下平繼之則聖人之功即乾而雲雨乃聖人之徳澤也案貞元為體亨利為用然即體即用不相離也即用即體未嘗二也故復釋之曰乾元者始也然即始而亨之理已具不待亨而後知其亨也利貞者成也事之成者得其性情之正而已而豈在外哉盖一心之𤼵散為萬用之施而萬理之宜歸於一性之徳故其始而必亨也是乾始能以羙利利天下也及其終也利及天下而所性無加焉又何利之可言此乾元所以統天而其徳所以為大也由此觀之乾之徳於其元亨也見其動直而剛焉不息而健焉於其利貞也見其裁制而中焉確守而正焉於其一元之妙心普萬物而無心也見其不累於功利之雜駁而純粹不滯於聲臭之粗而至精焉天道如此王道亦然王者之道其𤼵之也剛其行之也健其裁之也中其處之也正要以體天地生生之心能使仁覆天下而莫知為之者如精金羙玉而無疵如太虗浮雲而無迹非如霸者小補之功驩虞之效也卦惟九五全備斯徳故六爻𤼵揮固所以旁通乎乾之情矣而惟九五則兼統衆爻之徳以處崇髙之位其象為飛龍在天者蓋如乘六龍以御天也龍而在天有不興雲致雨而使下土平康者乎夫當其膏澤溥施即乾之美利利天下也及乎蕩蕩平平大化無跡又非乾之不言所利者與夫子之𤼵明天徳王道於是為至君子以成徳為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也本義成徳已成之徳也初九固成徳但其行未可見爾程傳徳之成其事可見者行也徳成而後可施於用初方潛隱未見其行未成未成未著也是以君子弗用也集説朱子語類云徳者行之本君子以成徳為行言徳則行在其中矣徳者得之於心行出来方見這便是行問行而未成如何曰只是事業未就吴氏澄曰隐而未見者潜之象行而未成是以欲其弗用也蔡氏清曰言君子之所以為行者以成徳為行也夫既以成徳為行初九徳已成矣則日可以見之行也夫既可以見之行矣而又何以曰勿用盖初九時乎潜也潜之為言也隐而未見則行猶未成是以君子亦當如之而勿用也君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也本義盖由四者以成大人之徳再言君徳以深明九二之為大人也程傳聖人在下雖已顯而未得位則進徳修業而已學聚問辨進徳也寛居仁行修業也君徳已著利見大人而進以行之耳進居其位者舜禹也進行其道者伊傅也集説朱子語類云學以聚之問以辨之既探討得當且放頓寛大田地待觸類自然有㑹合處故曰寛以居之吴氏澄曰理具於心而散於事物事物之理冇一未明則心之所具有一未盡必博學周知俾萬理皆聚而無所闕遺故曰學以聚之辨剖决也既聚矣必問於先知先覺之人以剖决其是否故曰問以辨之寛猶曽子所謂𢎞張子所謂大心也居謂居業之居問既辨矣必有𢎞廣之量以藏蓄其所得故曰寛以居之仁者心徳之全天理之公也既有以居之矣心徳渾全存存不失應事接物皆踐其所知而所行無非天理之公故曰仁以行之又曰學聚之以知其理仁行之以行其事問辨之以審别所當行於學聚之後寛居之以存貯所已知於仁行之先寛之所居即學之所聚者仁之所行即問之所辨者林氏希元曰學聚問辨是知工夫寛居是把義理放在胸中詳玩深味使透徹貫串乃居安資深時也故亦屬之行九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣本義重剛謂陽爻陽位程傳三重剛剛之盛也過中而居下之上上未至於天而下已離於田危懼之地也因時順處乾乾兢惕以防危故雖危而不至於咎君子順時兢惕所以能泰也集説虞氏翻曰以乾接乾故重剛位非二五故不中也孔氏頴逹曰上不在天謂非五位下不在田謂非二位也居危之地以乾乾夕惕戒懼不息得无咎也吴氏澄曰九三居下乾之終接上乾之始九四居上乾之始接下乾之終當重乾上下之際故皆曰重剛九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎本義九四非重剛重字疑衍在人謂三或者隨時而未定也程傳四不在天不在田而出人之上矣危地也疑者未決之辭處非可必也或進或退唯所安耳所以无咎也集説孔氏穎逹曰三之與四俱為人道人下近於地上逺於天九三近二正是人道九四則上近於天下逺於地非人所處故特云中不在人或之者疑之也此夫子釋經或字經稱或是疑惑之辭欲進欲退猶豫不定故疑之也九三位卑近下向上為難危惕憂深九四則陽徳漸盛去五彌近前進稍易故但疑惑憂則淺也李氏鼎祚曰三居下卦之上四居上卦之下俱非得中故曰重剛而不中也張氏振淵曰或之者據其迹疑之者指其心疑非狐疑之疑只是詳審耳夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎本義大人即釋爻辭所利見之大人也有是徳而當其位乃可當之人與天地鬼神本无二理特蔽於有我之私是以牿於形體而不能相通大人无私以道為體曽何彼此先後之可言哉先天不違謂意之所為黙與道契後天奉天謂知理如是奉而行之回紇謂郭子儀曰卜者言此行當見一大人而還其占盖與此合若子儀者雖未及乎夫子之所論然其至公无我亦可謂當時之大人矣程傳大人與天地日月四時鬼神合者合乎道也天地者道也鬼神者造化之迹也聖人先於天而天同之後於天而能順天者合於道而已合於道則人與鬼神豈能違也集説孔氏穎達曰與天地合其徳謂覆載也與日月合其明謂照臨也與四時合其序者若賞以春夏刑以秋冬之類也與鬼神合其吉凶者若福善禍淫也若在天時之先行事天乃在後不違是天合大人也若在天時之後行事能奉順上天是大人合天也尊而逺者尚不違况小而近者可有違乎程子曰若不一本則安能先天而天弗違後天而奉天時又曰夭且不違况於鬼神乎鬼神言其功用天言其主宰王氏宗傳曰先天而天弗違時之未至我則先乎天而為之而天自不能違乎我後天而奉天時時之既至我則後乎天而奉之而我亦不能違乎天盖大人即天也天即大人也亢之為言也知進而不知退知存而不知亡知得而不知喪本義所以動而有悔也集説孔氏頴達曰言上九所以亢極有悔者正由有此三事若能三事備知雖居上位不至於亢也其唯聖人乎知進退存亡而不失其正者其唯聖人乎本義知其理勢如是而處之以道則不至於有悔矣固非計私以避害者也再言其唯聖人乎始若設問而卒自應之也此苐六莭復申苐二苐三苐四莭之意程傳極之甚為亢至於亢者不知進退存亡得喪之理也聖人則知而處之皆不失其正故不至於亢也集説李氏鼎祚曰再稱聖人者歎羙用九能知進退存亡而不失其正朱氏震曰亢者處極而不知反也萬物之理進必有退存必有亡得必有喪亢知一而不知二故道窮而致災人固有知進退存亡者矣其道詭於聖人則未必得其正不得其正則與天地不相似知進退存亡而不失其正者其唯聖人乎故兩言之胡氏炳文曰陽極則剝乾上則亢中不可過也知其時将過乎中而處之不失其正其唯聖人乎貞者正也乾元之用所歸宿也乾之四徳始於元至此又論聖人之體乾而歸於正其意深矣陳氏琛曰進極必退存極必亡乃理勢之自然也知其如是則隨時變通而處以是道之當然有收歛而無施張有舍棄而無係吝如此則不至於有悔矣然此唯聖人能之盖聖人樂天知命逹理而能權也常人則明不足以見㡬心不免於物累故不能也總論朱子答萬正淳曰大抵易卦之辭本只是各著本卦本爻之象明吉凶之占當如此耳非是就聖賢地位説道理也故乾六爻自天子以至於庶人自聖人以至於愚不肖筮或得之義皆有取但純陽之徳剛健之至若以義類推之則為聖人之象而其六位之髙下又冇似聖人之進退故文言因潛見躍飛自然之文而以聖人之迹各明其義坤至柔而動也剛至靜而徳方本義剛方釋牝馬之貞也方謂生物有常集説朱子語類云坤至柔而動也剛坤只是承天如一氣之施坤則盡能𤼵生承載非剛安能如此問程傳云坤道至柔而動則剛坤體至静而徳則方柔與剛相反静與方疑相似曰静無形方冇體静言其體則不可得見方言其徳則是其著也吴氏澄曰坤體中含乾陽如人肺藏之藏氣故曰至柔然其氣機一動而闢之時乾陽之氣直上而出莫能禦之故曰剛剛即六二爻辭所謂直也乾運轉不已而坤體隤然不動故曰至静然其生物之徳普徧四周無處欠缺故曰方方即六二爻辭所謂方也乾之九五不徒剛健而能中正故為乾元之大坤之六二不徒柔静而能剛方故為坤元之至何氏楷曰乾剛坤柔定體也坤固至柔矣然乾之施一至坤即能翕受而𤼵生之氣機一動不可止遏屈撓此又柔中之剛矣乾動坤静定體也坤固至静矣及其承乾之施陶冶萬類各有定形不可移易此又静中之方矣柔静者體也剛方者用也後得主而有常本義程傳曰主下當有利字集説趙氏汝楳曰坤無乾以為始孰開其端先迷也天先施而地後生後得主也先陽後隂乃天地生生之常理余氏芑舒曰程子以主利為一句朱子因之故以文言後得主為闗文然彖傳後順得常與後得主而有常意正一律似非闕文也俞氏琰曰坤道之常蓋當處後不可攙先也攙先則失坤道之常矣唯處乾之後順乾而行則得其所主而不失坤道之常也含萬物而化光本義復明亨義集説王氏宗傳曰惟其動剛故能徳應乎乾而成萬物化育之功惟其徳方故能不拂乎正而順萬物性命之理此坤之徳所以能配天也後得主而有常則申後順得常之義含萬物而化光則申含𢎞光大品物咸亨之義坤道其順乎承天而時行本義復明順承天之意此以上申彖傳之意程傳坤道至柔而其動則剛坤體至静而其徳則方動剛故應乾不違徳方故生物冇常隂之道不唱而和故居後為得而主利成萬物坤之常也含容萬類其功化光大也主字下脱利字坤道其順乎承天而時行承天之施行不違時賛坤道之順也集説俞氏琰曰至柔而動也剛申徳合无疆之義至静而徳方釋貞義後得主而有常後順得常之謂含萬物而化光即含𢎞光大品物咸亨之謂坤道其順乎承天而時行即乃順承天之謂案動剛釋元亨也氣之𤼵動而物生也徳方釋利貞也形之完就而物成也柔静者坤之本體其剛其方乃是乾為之主而坤順之以行止者故繼之曰後得主而有常釋先迷後得主也含物化光謂亨利之閒致養萬物其功盛大釋西南得朋也承天時行謂順承於元至貞不息隂道終始於陽釋東北喪朋也蓋孔子既以坤之元亨利貞配乾為四徳則所謂西南東北者即四時也故用彖傳所謂含𢎞光大者以切西南又用所謂乃順承天行地无疆者以切東北欲人知四方四徳初非兩義此意彖傳未及故於文言𤼵之又案乾爻惟九五剛健中正得乾道之純故彖傳言乘龍御天首岀庶物即九五飛龍在天利見大人之義也坤爻惟六二柔順中正得坤道之純故文言言動剛徳方含物承天即六二直方大之義也象傳於乾五曰位乎天徳於坤二曰地道光也明乎乾坤之主在此二爻矣積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由来者漸矣由辨之不早辨也易曰履霜堅氷至盖言順也本義古字順慎通用案此當作慎言當辨之於微也程傳天下之事未有不由積而成家之所積者善則福慶及於子孫所積不善則災殃流於後世其大至於弑逆之禍皆因積累而至非朝夕所能成也明者則知漸不可長小積成大辨之於早不使順長故天下之惡无由而成乃知霜冰之戒也霜而至於氷小惡而至於大皆事勢之順長也集説呂氏祖謙曰盖言順也此一句尢可警非心邪念不可順養将去若順将去何所不至懲治遏絶正要人著力張氏振淵曰天道有陽必有隂原相為用然隂之為道利於從陽而不利於抗陽坤道可謂至順矣而順之變反為逆故聖人深著其順之利明臣子之大分究極其逆之禍立君父之大防也直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也本義此以學言之也正謂本體義謂裁制敬則本體之守也直内方外程傳備矣不孤言大也疑故習而後利不疑則何假於習程傳直言其正也方言其義也君子主敬以直其内守義以方其外敬立而内直義形而外方義形於外非在外也敬義既立其徳盛矣不期大而大矣徳不孤也无所用而不周无所施而不利孰為疑乎集説孔氏穎達曰君子用敬以直内内謂心也用此恭敬以直内心義以方外者用此義事以方正外物言君子法地正直而生萬物皆得所宜程子曰敬以直内義以方外合内外之道也釋氏内外之道不備者也敬義夹持直上達天徳自此問必有事焉當用敬否曰敬只是涵養一事必有事焉須當集義又問義莫是中理否曰中理在事義在心問敬義何别曰敬只是持己之道義便知冇是有非順理而行是為義也若只守一箇敬不知集義却是都無事也又問義只在事上如何曰内外一理豈特事上求合義也謝氏良佐曰釋氏所以不如吾儒無義以方外一節義以方外便是窮理釋氏却以理為障礙然不可謂釋氏無見處但見了不肯就理朱子語類云敬以直内是持守功夫義以方外是講學功夫直是直上直下胸中無纎毫委曲方是割截方正之意是處此事皆合宜截然不可得而移易之意又云敬義夹持直上達天徳自此最是下得夹持兩字好敬主乎中義防於外二者相夹持要放下霎時也不得只得直上去故便達天徳自此表裏夹持更無東西走作去處上靣只更有箇天徳問義形而外方曰義是心頭斷事底心斷於内而外便方正萬物各得其宜又云文言将敬字觧直字義字解方字敬義立而徳不孤即觧大字敬而無義則作事岀来必錯了只義而無敬則無本何以為義皆是孤也須是敬義立方不孤施之事君則忠於君事親則悦於親交朋友則信於朋友皆不待習而無一之不利也黄氏榦曰乾言徳業坤言敬義雖若不同而實相為經緯也欲進乾之徳必本之以坤之敬欲修乾之業必制之以坤之義非敬則内不直徳何由而進非義則外不方業何由而修終日乾乾雖進修夫徳業而所以進修者乃用力於敬義之間用力於敬義固可以至於大而所謂大者乃徳之日新而業之富有也王氏應麟曰丹書敬義之訓夫子於坤六二文言發之孟子以集義為本程子以居敬為先張宣公謂功夫並進相須而相成也胡氏炳文曰乾九三明誠並進也坤六二敬義偕立也主敬是為學之要集義乃講學之功薛氏瑄曰敬以直内涵養未𤼵之中義以方外省察中莭之和又曰敬以直内戒慎恐懼之事義以方外知言集義之事内外夹持用力之要莫切於此蔡氏清曰正是無少邪曲義是無少差謬又曰此正義二字皆以見成之徳言然直不自直必由於敬方不自方必由於義直即主忠信方即徙義直即心無私方即事當理故直内以動者言為當隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也程傳為下之道不居其功含晦其章美以從王事代上以終其事而不敢有其成功也猶地道代天終物而成功則主於天也妻道亦然集説宋氏衷曰臣子雖有才美含藏以從其上不敢有所成名也地終天功臣終君事婦終夫業故曰而代有終也程子曰天地日月一般月之光乃日之光也地中生物者皆天氣也惟无成而代冇終者地之道也王氏申子曰三非冇美而不𤼵特不敢暴其美惟知代上以終其事而不居其成功猶地代天生物而功則主於天也俞氏琰曰既曰地道无成而又曰代有終何也乾能始物不能終物坤繼其終而終之則坤之所以為有終者終乾之所未終也蔡氏清曰以從王事以含章之道而從王事弗敢成也即是含章之道用於從王事者也谷氏家杰曰爻言有終此言代有終則并其終亦非坤之所敢冇也何氏楷曰乾能始萬物而已必頼坤以作成之故曰代有終正對乾之始而言天地變化草木蕃天地閉賢人隱易曰括囊无咎无譽盖言謹也程傳四居上近君而无相得之義故為隔絶之象天地交感則變化萬物草木蕃盛君臣相際而道亨天地閉隔則萬物不遂君臣道絶賢者隐遯四於閉隔之時括囊晦藏則雖无令譽可得无咎言當謹自守也集説張氏浚曰括囊盖内充其徳待時而有為者也漢儒乃以括囊為譏豈不陋哉陽舒隂閉故孔子𤼵天地閉之訓夫閉於前而舒於後生化之功自是岀也括囊之慎庸有害乎君子黄中通理本義黄中言中徳在内釋黄字之義也集説蔡氏清曰通理即是黄中處通而理也盖黄中非通則無以應乎外通而非理則所以應乎外者不能皆得其當此所以言黄中而必并以通理言之通理亦在内也正位居體本義雖在尊位而居下體釋裳字之義也案孟子曰立天下之正位正位即禮也此言正位居體者猶言以禮居身爾禮以物躬則自卑而尊人故為釋裳字之義美在其中而暢於四支發於事業美之至也本義美在其中復釋黄中暢於四支復釋居體程傳黄中文在中也君子文中而達於理居正位而不失為下之體五尊位在坤則惟取中正之義羙積於中而通暢於四體𤼵見於事業徳美之至盛也集説朱子語類云二在下方是就功夫上説如不疑其所行是也五得尊位則是就他成就處説所以云美在其中而暢於四支𤼵於事業美之至也蔡氏淵曰黄中通理釋黄義正位居體釋裳義黄中正徳在内通理文無不通言柔順之徳藴於内也正位居在中之位居體居下體而不僣言柔順之徳形於外也美在其中黄中通理也暢於四支𤼵於事業正位居體也二五皆中二居内卦之中其𤼵見於外者不疑其所行而已五外卦之中其施於外有事業之可觀坤道之美至此極矣蔡氏清曰黄裳二字分而言之則黄為中裳為順合而言之則惟中故順存於中為中形於外為順理一而已天下無有形於外而不本乎中者惟有黄中之徳故能以下體自居林氏希元曰文言既分釋黄裳了又恐人認為二物不知歸重處故𤼵美在其中一條見得其所謂順乃本於中與象傳文在中也及六二之動直以方也意思一般附録胡氏炳文曰蓋直内方外之君子即黄中通理之君子也敬以直内則胸中洞然表裏如一是即所以為黄中義以方外則凡事之来義以處之無不合理是即所以為通理五之黄中通理本於直内方外故其正位也雖居乎五之尊而其居體也則不失乎二之常二之直内方外是内外夹持兩致其力五之黄中通理則内外通貫無所容其力矣案乾爻之言學者二於九二則曰言信行謹閑邪存誠也於九三則曰忠信以進徳修辭立誠以居業也坤爻之言學者二於六二則曰敬以直内義以方外也於六五則曰黄中通理正位居體也分而言之則有四合而言之則乾二之存誠即乾三之忠信皆以心之實者言也乾二之信謹即乾三之修辭立誠皆以言行之實者言也在二為大人則以成徳言之由其言行以窺其心見其純亦不已如此也在三為君子則以進學言之根於心而達於言行見其交修不懈如此也坤二之直内即坤五之黄中皆以心之中直者言也坤二之方外即坤五之正位皆以行之方正者言也二言直而五言中直則未有不中者中乃直之至也二言方而五言正方則未有不正者正乃方之極也二居下位不疑所行而已五居尊又有𤼵於事業之美此則兩爻所以異也在乾之兩爻誠之意多實心以體物是乾之徳也坤之兩爻敬之意多虗心以順理是坤之徳也而要之未有誠而不敬未有敬而不誠者乾坤一徳也誠敬一心也聖人所以分言之者蓋乾陽主實坤隂主虗人心之徳必兼體焉非實則不能虗天理為主然後人欲退聽也非虗則不能實人欲屏息然後天理流行也自其實者言之則曰誠自其虗者言之則曰敬是皆一心之徳而非兩人之事但在聖人則純乎誠矣其敬也自然之敬也其次則主敬以至於誠故程子曰誠則無不敬未能誠則必敬而後誠而以乾坤分為聖賢之學者此也隂疑於陽必戰為其嫌於无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄本義疑謂鈞敵而无小大之差也坤雖无陽然陽未嘗无也血隂屬蓋氣陽而血隂也𤣥黄天地之正色言隂陽皆傷也此以上申象傳之意程傳陽大隂小隂必從陽隂既盛極與陽偕矣是疑於陽也不相從則必戰卦雖純隂恐疑无陽故稱龍見其與陽戰也于野進不已而至於外也盛極而進不已則戰矣雖盛極不離隂類也而與陽争其傷可知故稱血隂既盛極至與陽争雖陽不能无傷故其血𤣥黄𤣥黄天地之色謂皆傷也集説干氏寳曰隂在上六十月之時也卦成於乾乾體純剛不堪隂盛故曰龍戰戌亥乾之都也故稱龍焉未離隂類故曰血隂陽色雜故曰𤣥黄隂陽離則異氣合則同功君臣夫妻其義一也蔡氏淵曰十月為純坤之月六爻皆隂然生生之理無頃刻而息聖人為其純隂而或嫌於无陽也故稱龍以明之古人謂十月為陽月者蓋岀於此俞氏琰曰𤣥者天之色黄者地之色血言𤣥黄則天地雜類而隂陽無别矣故曰夫𤣥黄者天地之雜也隂陽相戰雖至於天地之雜亂然而天地定位於上下其大分終不可易故其終又分而言之曰天𤣥而地黄鄭氏維嶽曰謂之曰戰隂與陽交戰也交戰而獨曰龍戰者是時隂處其盛嫌於无陽也故獨稱龍為戰若曰隂犯順而龍戰之云耳以討隂之義與陽不許隂為敵也當其雜也𤣥黄似乎莫辨而不知即雜之中𤣥者是天黄者是也斷斷不可混淆定分原自如此御纂周易折中卷十六

body:
  text: 欽定四庫全書御纂周易折中卷首綱領一此篇論作易傳易源流周禮太卜掌三易之灋一曰連山二曰歸蔵三曰周易其經卦皆八其别皆六十有四陸氏徳明曰宓犧氏之王天下仰則觀於天文俯則察於地理觀鳥獸之文與地之宜近取諸身遠取諸物始畫八卦因而重之為六十四文王拘於羑里作卦辭周公作爻辭孔子作彖辭象辭文言繫辭說卦序卦雜卦十翼班固曰孔子晚而好易讀之韋編三絶而為之傳傳即十翼也自魯商瞿子木受易於孔子以授魯橋庇子庸子庸授江東馯臂子弓子弓授燕周醜子家子家授東武孫虞子乘子乘授齊田何子莊及秦燔書易為卜筮之書獨不禁故傳授者不絶隋書云秦焚書周易獨以卜筮得存惟失說卦三篇後河内女子得之漢興田何以齊田徙杜陵號杜田生授東武王同子中及洛陽周王孫梁人丁寛齊服生皆著易傳漢初言易者本之田生同授緇川楊何寛授同郡碭田王孫王孫授施讎及孟喜梁邱賀由是有施孟梁邱之學焉施讎傳易授張禹及琅邪魯伯禹授淮陽彭宣及沛戴崇伯授太山屯莫如及琅邪邴丹後漢劉昆受施氏易於沛人戴賔其子軼孟喜父孟卿善為禮春秋孟卿以禮經多春秋繁雜乃使喜從田王孫受易喜為易章句授同郡白光及沛翟牧後漢洼丹觟陽鴻任安皆傳孟氏易梁邱賀本從太中大夫京房受易後更事田王孫傳子臨臨傳五鹿充宗及琅邪王駿充宗授平陵士孫張及沛鄧彭祖齊衡咸後漢苑升傳梁邱易以授京兆楊政又潁川張興𫝊梁邱易弟子著録且萬人子魴𫝊其業京房受易梁人焦延夀延夀云嘗從孟喜問易房以延夀易即孟氏學翟救白生不肯曰非也房為易章旬說長於災異以授東海段嘉及珂東姚平河南乘𢎞皆為郎博士由是前漢多京氏學後漢戴馮孫期魏滿並傳之費直傳易授琅邪王璜為費氏學本以古字號古文易無章句徒以彖象繫辭文言觧說上下經漢成帝時劉向典校書考易說以為諸易家說皆祖田何楊叔元丁將軍大義畧同唯京氏為異向又以中古文易經校施孟梁邱三家之易經或脱去无咎悔亡唯費氏經與古文同范氏後漢書云京兆陳元扶風馬融河南鄭衆北海鄭康成潁川荀爽並傳費氏易沛人髙相治易與費直同時其易亦無章句専說隂陽災異自言出丁將軍傳至相相授子康及蘭陵母將永為髙氏學漢初立易楊氏博士宣帝復立施孟梁邱之易元帝又立京氏易費髙二家不得立民閒傳之後漢費氏興而髙氏遂微永嘉之亂施氏梁邱之易亡孟京費之易人無傳者唯鄭康成王輔嗣所注行於世而王氏為世所重其繫辭已下王不注相承以韓康伯注續之孔氏穎逹曰繫辭云河出圖洛出書聖人則之故孔安國馬融王肅姚信等並云伏犧得河圖而作易是則伏犧雖得河圖復須仰觀俯察以相参正然後畫卦伏犧初畫八卦萬物之象皆在其中故繫辭曰八卦成列象在其中矣是也雖有萬物之象其萬物變通之理猶自未備故因其八卦而更重之卦有六爻遂重為六十四卦也繫辭曰因而重之爻在其中矣是也然重卦之人諸儒不同凡有四說王輔嗣等以為伏犧重卦鄭康成之徒以為神農重卦孫盛以為夏禹重卦史遷等以為文王重卦其言夏禹及文王重卦者案繫辭神農之時已有蓋取益與噬嗑以此論之不攻自破其言神農重卦亦未為得今依輔嗣以伏犧既畫八卦即自重為六十四卦為得其實其重卦之意備在說卦此不具叙伏犧之時道尚質素畫卦重爻足以垂法後代澆訛徳不如古爻象不足以為教故作繫辭以明之按周禮太卜三易一曰連山二曰歸藏三曰周易杜子春云連山伏犧歸藏黄帝鄭康成易贊及易論云夏曰連山殷曰歸藏周曰周易鄭康成又釋云連山者象山之出雲連連不絶歸藏者萬物莫不歸藏於其中周易者言易道周普無所不備康成雖有此釋更無所據之文先儒因此遂為文質之義皆繁而無用今所不取桉世譜等羣書神農一曰連山氏亦曰列山氏黄帝一曰歸藏氏既連山歸藏並是代號則周易稱周取岐陽地名毛詩云周原膴膴是也又文王作易之時正在羑里周徳未興猶是殷世也故題周别於殷以此文王所演故謂之周易猶周書周禮題周以别餘代也其周易繫辭凡有二說一說卦辭爻辭並是文王所作知者桉繫辭云易之興也其於中古乎作易者其有憂患乎又曰易之興也其當殷之末世周之盛徳邪當文王與紂之事邪故史遷云文王囚而演易即是作易者其有憂患乎鄭學之徒並依此說二以為騐爻辭多是文王後事桉升卦六四王用亨于岐山武王克殷之後始追號文王為王若爻辭是文王所制不應云王用亨于岐山又明夷六五箕子之明夷武王觀兵之後箕子始被囚奴文王不宜豫言箕子之明夷又左傳韓宣子適魯見易象云吾乃知周公之徳周公被流言之謗亦得為憂患也騐此諸說以為卦辭文王爻辭周公馬融陸績等並同此說今依而用之所以只言三聖不數周公者以父統子業故也然則易之爻辭蓋亦是文王本意故但言文王也其彖象等十翼之辭以為孔子所作先儒更無異論但數十翼亦有多家既文王易經本分為上下二篇則區域各别彖象釋卦亦當随經而分故一家數十翼云上彖一下彖二上象三下象四上繫五下繫六文言七說卦八序卦九雜卦十鄭學之徒並同此說今亦依之晁氏說之曰漢藝文志易經十二篇施孟梁邱三家顔師古曰上下經及十翼故十二篇是則彖象文言繫辭始附卦爻而傳於漢與先儒謂費直専以彖象文言参觧易爻以彖象文言雜入卦中者自費氏始其初費氏不列學官惟行民間至漢末陳元鄭康成之徒學費氏古十二篇之易遂亡孔穎逹又謂輔嗣之意象本釋經宜相附近分爻之象辭各附當爻則費氏初變亂古制時猶若今乾卦彖象繫卦之末與古經始變於費氏而卒大亂於王弼惜哉奈何後之儒生尤而效之杜預分左氏傳於經宋衷范望輩散太𤣥贊與測於八十一首之下是其明比也揆觀其初乃如古文尚書司馬遷班固序傳揚雄法言序篇云爾今民間法言列序篇於其篇首與學官書不同槩可見也唐李鼎祚又取序卦冠之卦首則又效小王之過也劉牧云小象獨乾不係於爻辭尊君也石守道亦曰孔子作彖象於六爻之前小象係逐爻之下惟乾悉屬之於後者讓也嗚呼他人尚何責哉朱子門人問伏犧始畫八卦其六十四者是文王後來重之邪抑伏犧巳自晝邪㸔先大圖則有八卦便有六十四疑伏犧已有畫矣曰周禮言三易經卦皆八其别皆六十有四便見不是文王漸畫又問然則六十四卦名是伏犧元有抑文王所立曰此不可攷子善問據十三卦所言恐伏犧時已有曰十三卦所謂蓋取諸離蓋取諸益者言結繩而為網罟有離之象非觀離而始有此也古文周易經傳十二篇東萊呂祖謙伯恭父之所定而音訓一篇則其門人金華王莘叟所筆受也某嘗以為易經本為卜筮而作皆因吉凶以示訓戒故其言雖約而所包甚廣夫子作傳亦畧舉其一端以見凡例而已然自諸儒分經合傳之後學者便文取義往往未及玩心全經而遽執傳之一端以為定說於是一卦一爻僅為一事而易之為用反有所局而無以通乎天下之故若是者某蓋病之是以三復伯恭父之書而有發焉非特為其章句之近古而已也呂氏祖謙曰漢興言易者六家獨費氏傳古文易而不立於學官劉向以中古文易經校施孟梁邱經或脫去无咎悔亡惟費氏經與古文同然則真孔氏遺書也東京馬融鄭康成皆為費氏學其書始盛行今學官所列王弼易雖宗荘老其書固鄭氏書也費氏易在漢諸家中最近古最見排擯千載之後巋然獨存豈非天哉自康成輔嗣合彖象文言於經學者遂不見古本近世嵩山晁氏編古周易將以復於其舊而其刋補離合之際覽者或以為未安祖謙謹因晁氏書参考傳記復定為十二篇篇目卷帙一以古為斷文王卦下之辭謂之彖孔子序述其彖之意而已故名其篇曰彖使文王卦下之辭不謂之彖孔子何為言知者觀其彖辭則思過半矣爻下辭謂之象爻辭多文王後事故諸說皆以為爻辭出於周公大象卦畫是也天地水火雷風山澤觀卦畫則見其象也大象之辭如天行健君子以自强不息之類小象釋周公之辭如潛龍勿用陽在下也之類皆象之傳也經文王周公所作也傳孔子所作也司馬談論六經要指引天下同歸而殊塗一致而百慮謂之易大傳班固謂孔子晚而學易讀之韋編三絶而為之傳傳即十翼也前漢六經與傳皆别行至後漢諸儒作註始合經傳為一耳魏髙貴鄉公問博士淳于俊曰今彖象不連經文而注連之何也俊對曰鄭康成合彖象於易者欲使學者尋省易了孔子恐其與文王相亂是以不合則鄭未注六經之前彖象不連經文矣自鄭康成合彖象於經故加彖曰象曰以别之諸卦皆然稅氏與權曰按呂汲公元豐壬戌昉刻周易古經十二篇於成都學官景迂晁生建中靖國辛已并為八篇號古周易繕寫而藏於家巽巖李文簡公紹興辛未謂北學各有師授經名從呂篇第從晁而重刻之逮淳熙壬寅新安朱文公表出東萊呂成公古文周易經傳音訓廼謂編古易自晁生始豈二公或不見汲公蜀本與然成公則議晁生并上下經為非而文公易本義則篇第與汲公脗合王氏應麟曰說卦釋文引荀爽九家集解得八卦逸象三十有一隋唐志十卷唯釋文序録列九家名氏云不知何人所集稱荀爽者以為主故也其序有荀爽京房馬融鄭康成宋衷虞翻陸績姚信翟子𤣥為易義注内又有張氏朱氏並不詳何人荀悅漢紀云馬融著易解頗生異說爽著易傳據爻象承應隂陽變化之義以十篇之文解說經意由是兖豫言易者咸傳荀氏學今其說見於李鼎祚集解綱領二此篇論易道精緼經傳義例司馬氏遷曰易本隐以之顯春秋推見至隐班氏固曰六藝之文樂以和神詩以正言禮以明體書以廣聽春秋以斷事五者蓋五常之道相須而備而易為之原故曰易不可見則乾坤或㡬乎息矣言與天地為終始也王氏弼曰夫彖者何也統論一卦之體明其所由之主者也故六爻相錯可舉一以明也剛柔相乘可立主以定也自統而尋之物雖衆則知可以執一御也由本以觀之義雖博則知可以一名舉也故舉卦之名義有主矣觀其彖辭則思過半矣一卦五陽而一隂則一隂為之主五隂而一陽則一陽為之主夫隂之所求者陽也陽之所求者隂也陽苟一焉五隂何得不同而歸之隂苟隻焉五陽何得不同而從之故隂文雖賤而為一卦之主者處其至少之地也或有遺爻而舉二體者卦體不由乎爻也繁而不憂亂變而不憂惑約以存博簡以濟衆其唯彖乎夫爻者何也言乎變者也變者何也情偽之所為也是故情偽相感遠近相追愛惡相攻屈伸相推非天下之至變其孰能與於此哉是故卦以存時爻以示變夫卦者時也爻者適時之變者也時有否泰故用有行藏卦有小大故辭有險易一時之制可反而用也一時之吉可反而凶也故卦以反對而爻亦皆變尋名以觀其吉凶舉時以觀其動静則一體之變由斯見矣夫應者同志之象也位者爻所處之象也承乘者逆順之象也逺近者險易之象也内外者出處之象也初上者終始之象也故觀變動者存乎應察安危者存乎位辨逆順者存乎承乘明出處者存乎内外逺近終始各存其㑹辟險尚遠趣時貴近比復好先乾壯惡首吉凶有時不可犯也動静有適不可過也犯時之忌罪不在大失其所適過不在深觀爻思變變斯盡矣夫象者出意者也言者明象者也盡意莫若象盡象莫若言言生於象故可尋言以觀象象生於意故可尋象以觀意意以象盡象以言著故言者所以明象得象而忘言象者所以存意得意而忘象存言者非得象者也存象者非得意者也象生於意而存象焉則所存者乃非其象也言生於象而存言焉則所存者乃非其言也然則忘象者乃得意者也忘言者乃得象者也爻苟合順何必坤乃為牛義苟應健何必乾乃為馬而或者定馬於乾案文責卦有馬無乾則偽說滋漫難可紀矣互體不足遂及卦變變又不足推致五行一失其原巧喻彌甚縱復或值義無所取盖存象忘意之由也忘象以求其意義斯見矣桉象無初上得位失位之文又繫辭但論三五二四同功異位亦不及初上何乎唯乾上九文言云貴而无位需上六云雖不當位若以上為隂位邪則需上六不得云不當位也若以上為陽位邪則乾上九不得云貴而无位也隂陽處之皆云非位而初亦不說當位失位也然則初上者是事之終始無隂陽定位也故乾初謂之潛過五謂之无位未有處其位而云潛有位而云无者也厯觀衆卦盡亦如之初上無隂陽定位亦以明矣位者列貴賤之地待才用之宅也文者守位兮之任應貴賤之序者也位有尊卑爻有隂陽尊者陽之所處卑者隂之所履也故以尊為陽位卑為隂位去初上而論位分則三五各在一卦之上亦何得不謂之陽位二四各在一卦之下亦何得不謂之隂位初上者體之終始事之先後也故位無常分事無常所非可以隂陽定也尊卑有常序終始無常主故繫辭但論四爻功位之通例而不及初上之定位也然事不可無終始卦不可無六爻初上雖無隂陽本位是終始之地也統而論之爻之所處則謂之位卦以六爻為成則不得不謂之六位時成也凡彖者統論一卦之體者也象者各辨一爻之義者也故履卦六三為兌之主以應於乾成卦之體在斯一爻故彖叙其應雖危而亨也象則各言六爻之義明其吉凶之行去六三成卦之體而指說一爻之徳故危不獲亨而見咥也訟之九二亦同斯義一卦之體必由一爻為主則指明一爻之美以統一卦之義大有之類是也卦體不由乎一爻則全以二體之義明之豐卦之類是也薛收問一卦六爻之義王氏通曰卦也者著天下之時也爻也者傚天下之動也趨時有六動焉吉凶悔吝所以不同也收曰敢問六爻之義曰六者非他也三才之道誰能過乎孔氏穎逹曰易者變化之總名改換之殊稱自天地開闢隂陽運行寒暑迭來日月更出孚萌庻類亭毒羣品新新不停生生相續莫非資變化之力換代之功然變化運行在隂陽二氣故聖人初畫八卦設剛柔兩畫象二氣也布以三位象三才也謂之為易取變化之義鄭康成作易贊及易論云易一名而含三義易簡一也變易二也不易三也崔覲劉貞簡等並用此義云易者謂生生之徳有易簡之義不易者言天地定位不可相易變易者謂生生之道變而相續周簡子云不易者常體之名變易者相變改之名故今之所用同鄭康成等作易所以垂教者孔子曰上古之時人民無别羣物未殊未有衣食器用之利伏犧乃仰觀象於天俯觀法於地中觀萬物之宜於是始作八卦以通神明之徳以類萬物之情故易者所以斷天地理人倫而明王道是以畫八卦建五氣以立五常之行象法乾坤順隂陽以正君臣父子夫婦之義度時制宜作為罔罟以佃以漁以贍民用於是人民乃治君親以尊臣子以順羣生和洽各安其性此其作易垂教之本意也乾坤者隂陽之本始萬物之祖宗故為上篇之始而尊之也離為日坎為月日月之道隂陽之經所以始終萬物故以坎離為上篇之終也咸恒者男女之始夫婦之道人道之興必繇夫婦所以奉承祖宗為天地之主故為下篇之始而貴之也既濟未濟為最終者所以明戒慎而全王道也以此言之則上下二篇文王所定周子曰聖人之精畫卦以示聖人之緼因卦以發卦不畫聖人之精不可得而見微卦聖人之緼殆不可悉得而聞易何止五經之原其天地鬼神之奥乎邵子曰天變而人效之故元亨利貞易之變也人行而天應之故吉凶悔吝易之應也以元亨為變則利貞為應以吉凶為應則悔吝為變元則吉吉則利應之亨則凶凶則應之以貞悔則吉吝則凶是以變中有應應中有變也變中之應天道也故元為變則亨應之利為變則應之以貞應中之變人事也故變則凶應則吉變則吝應則悔也悔者吉之先而吝者凶之本是以君子從天不從人易有意象立意皆所以明象統下三者有言象不擬物而直言以明事有像象擬一物以明意有數象七日八月三年十年之類是也張子曰大易不言有無言有無諸子之陋也易為君子謀不為小人謀故撰徳於卦雖爻有小大及繫辭其爻必告以君子之義程子曰有理而後有象有象而後有數得其義則象數在其中矣必欲窮象之隐微盡數之豪忽乃尋流逐末術家之所尚非儒者之所務也管輅郭璞之學是也理無形也故因象以明理理見乎辭矣則可由辭以觀象故曰得其義則象數在其中矣看易且要知時凡六爻人人有用聖人自有聖人用賢人自有賢人用衆人自有衆人用學者自有學者用君有君用臣有臣用無所不通大抵卦爻始立義既具聖人别起義以錯綜之如春秋前既立例到後來書得全别一般事便書得别有意思若依前例觀之殊失之也作易者自天地幽明至於昆蟲草木之微無一而不合隂之道非必小人也其害陽則小人其助陽成物則君子也利非不善也其害義則不善也其和義則非不善也傳序云易變易也隨時變易以從道也其為書也廣大悉備将以順性命之理通幽明之故盡事物之情而示開物成務之道也聖人之憂患後世可謂至矣去古雖逺遺經尚存然而前儒失意以傳言後學誦言而忘味自秦而下盖無傳矣予主千載之後悼斯文之湮晦将俾後人沿流而求源此傳所以作也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占吉凶消長之理進退存亡之道備於辭推辭考卦可以知變象與占在其中矣君子居則觀其象而玩其辭動則觀其變而玩其占得其辭不逹其意者有矣未有不得於辭而能通其意者也至微者理也至著者象也體用一源顯微無間觀㑹通以行其典禮則辭無所不備故善學者求言必自近易於近者非知言者也予所傳者辭也由辭以得其意則在乎人焉易之為書卦爻彖象之義備而天地萬物之情見聖人之憂天下來世其至矣先天下而開其物後天下而成其務是故極其數以定天下之象著其象以定天下之吉凶六十四卦三百八十四爻皆所以順性命之理盡變化之道也散之在理則有萬殊統之在道則無二致所以易有太極是生兩儀太極者道也兩儀者隂陽也隂陽一道也太極無極也萬物之生負隂而抱陽莫不有太極莫不有兩儀絪緼交感變化不窮形一受其生神一發其智情偽出焉萬緒起焉易所以定吉凶而生大業故易者隂陽之道也卦者隂陽之物也爻者隂陽之動也卦雖不同所同者竒耦爻雖不同所同者九六是以六十四卦為其體三百八十四爻互為其用逺在六合之外近在一身之中暫於瞬息微於動静莫不有卦之象焉莫不有爻之義焉至哉易乎其道至大而無不包其用至神而無不存時固未始有一而卦亦未始有定象事固未始有窮而爻亦未始有定位以一時而索卦則拘於無變非易也以一事而明爻則窒而不通非易也知所謂卦爻彖象之義而不知有卦爻彖象之用亦非易也故得之於精神之運心術之動與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶然後可以謂之知易也雖然易之有卦易之已形者也卦之有爻卦之已見者也已形已見者可以言知未形未見者不可以名求則所謂易者果何如哉此學者所當知也朱子曰漢書易本隐以之顯春秋推見至隐易與春秋天人之道也易以形而上者說出在那形而下者上春秋以形而下者說上那形而上者去問易有交易變易之義如何曰交易是陽交於隂隂交於陽是卦圖上底如天地定位山澤通氣云云者是也變易是陽變隂隂變陽老陽變為少隂老隂變為少陽此是占筮之法如晝夜寒暑屈伸往來者是也易是隂陽屈伸隨時變易大抵古今有大闔闢小闔闢今人說易都無著摸聖人便於六十四卦只以隂陽竒耦寫出來至於所以為隂陽為古今乃是此道理聖人作易之初盖是仰觀俯察見得盈乎天地之閒無非一隂一陽之理有是理則有是象有是象則其數便自在這裏非特河圖洛書為然而圖書為特巧而著耳於是聖人因之而畫卦卦畫既立便有吉凶在裏盖是隂陽往來交錯於其閒其時則有消長之不同長者便為主消者便為客事則有當否之或異當者便為善否者便為惡即其主客善惡之辨而吉凶見矣故曰八卦定吉凶吉凶既决定而不差則以之立事而大業自此生矣此聖人作易教民占筮而以開天下之愚以定天下之志以成天下之事者如此自伏犧而下但有此六畫而未有文字可傳到得文王周公乃繫之以辭故曰聖人設卦觀象繫辭焉而明吉凶大率天下之道只是善惡而已但所居之位不同所處之時既異而其㡬甚微只為天下之人不能曉㑹所以聖人因占筮之法以曉人使人居則觀象玩辭動則觀變玩占不迷於是非得失之途所以是書夏商周皆用之其所言雖不同其辭雖不可盡見然皆大卜之官掌之以為占筮之用自伏犧而文王周公雖自畧而詳所謂占筮之用則一盖即占筮之中而所以處置是事之理便在裏了故其法若粗淺而隨人賢愚皆得其用雖是有定象有定辭皆是虚說此箇地頭合是如此處置初不黏著物上故一卦一爻足以包無窮之事此所以見易之為用無所不該無所不徧但看人如何用之耳易如鏡相似看甚物來都能照得如所謂潛龍只是有箇潛龍之象自天子至於庻人看甚人來都使得孔子說作龍徳而隐便是就事上指殺說來然㑹㸔底雖孔子說也活也無不通不㑹看底雖文王周公說底也死了須知得他是假託說是包含說假託謂不惹著那事包含是說箇影像在這裏無所不包易之有象其取之有所從其推之有所用非苟為寓言也然兩漢諸儒必欲究其所從則既滯泥而不通王弼以來直欲推其所用則又踈畧而無據二者皆失之一偏而不能闕其所疑之過也且以一端論之乾之為馬坤之為牛說卦有明文矣馬之為健牛之為順在物有常理矣至於案文責卦若屯之有馬而無乾離之有牛而無坤乾之六龍則或疑於震坤之牝馬則當反為乾是皆有不可曉者是以漢儒求之說卦而不得則遂相與創為互體變卦五行納甲飛伏之法参互以求而幸其偶合其說雖詳然其不可通者終不可通其可通者又皆傅㑹穿鑿而非有自然之勢唯其一二之適然而無待於巧說者為若可信然上無所關於義理之本原下無所資於人事之訓戒則又何必苦心極力以求於此而欲必得之哉故王弼曰義苟應健何必乾乃為馬爻苟合順何必坤乃為牛而程子亦曰理無形也故假象以顯義此其所以破先儒膠固支離之失而開後學玩辭玩占之方則至矣然觀其意又似直以易之取象無復有所自來但如詩之比興孟子之譬喻而已如此則是說卦之作為無所與於易而近取諸身逺取諸物者亦剰語矣故疑其說亦若有未盡者因竊論之以為易之取象固必有所自來而其為說必已具於大卜之官顧今不可復考則姑闕之而直據辭中之象以求象中之意使足以為訓戒而決吉凶如王氏程子與吾本義之云者其亦可矣固不必深求其象之所自來然亦不可直謂假設而遽欲忘之也易之象似有三様有本畫自有之象如竒畫象陽耦畫象隂是也有實取諸物之象如乾坤六子以大地雷風之類象之是也有只是聖人自取象來明是義者如白馬翰如載鬼一車之類是也易有象辭有占辭有象占相渾之辭問王弼說初上無隂陽定位如何曰伊川說隂陽竒耦豈容無也乾上九貴而无位雷上六不當位乃爵位之位非隂陽之位此說最好易只是為卜筮而作故周禮分明言大卜掌三易連山歸藏周易古人於卜筮之官立之凡數人秦去古未逺故周易亦以卜筮得不焚今人纔說易是卜筮之書便以為辱累了易見夫子說許多義理便以為易只是說道理殊不知其言吉凶悔吝皆有理而其教人之意無不在也今人却道聖人言理而其中因有卜筮之說他說理後說從那卜筮上來作麽上古之時民心昧然不知吉凶之所在故聖人作易教之卜筮使吉則行之凶則避之此是開物成務之道故繫辭云以通天下之志以定天下之業以斷天下之疑正謂此也初但有占而無文往往如今之环珓相似耳今人因火珠林起課者但用其爻而不用其辭則知古者之占往往不待辭而後見吉凶又云如左氏所載得屯之比既不用屯之辭亦不用比之辭卻自别推一法至文王周公方作彖爻之辭使人得此爻者便觀此辭之吉凶至孔子又恐人不知其所以然故又復逐爻觧之謂此爻所以吉者謂以中正也此爻所以凶者謂不當位也明明言之使人易曉耳至如文言之類却是就上靣發眀道理非是聖人作易專為說道理以教人也須見聖人本意方可學易聖人作易本是使人卜筮以決所行之可否而因之以教人為善如嚴君平所謂與人子言依於孝與人臣言依於忠者故卦爻之辭只是因依象類虚設於此以待叩而決者使以所值之辭决所疑之事似若假之神明而亦必有是理而後有是辭理無不正故其丁寕告戒之辭皆依於正天下之動所以正夫一而不謬於所之也卦爻之辭本為卜筮者斷吉凶而因以訓戒至彖象文言之作始因其吉凶訓戒之意而推說其義理以明之後人但見孔子所說義理而不復推本文王周公之本意因鄙卜筮為不足言而其所以言易者遂逺於日用之實類皆牽合委曲偏主一事而言無復包含該貫曲暢旁通之妙若但如此則聖人當時自可别作一書明言義理以詔後世何用假託卦象為此艱深隱晦之辭乎大抵易之書本為卜笙而作故其辭必根於象數而非聖人已意之所為其所勸戒亦以施諸筮得此卦此爻之人而非反以戒夫卦爻者近世言易者殊不知此所以其說雖有義理而無情意雖大儒先生有所不免比因玩索偶幸及此私竊自慶以為天啟其衷而以語人人亦未見有深曉者易中都是貞吉不曽有不貞吉都是利貞不曽說利不貞如占得乾卦固是大亨下則云利貞盖正則利不正則不利至理之權輿聖人之至教寓其閒矣大率是為君子設非小人盜賊所得竊取而用蔡氏元定曰天下之萬聲出於一闔一闢天下之萬理出於一動一静天下之萬數出於一竒一耦天下之萬象出於一方一圓盡起於乾坤二畫許氏衡曰初位之下事之始也以陽居之才可以有為矣或恐其不安於分也以隂居之不患其過越矣或恐其愞弱昏滯未足以趨時也大抵柔弱則難濟剛健則易行或諸卦柔弱而致凶者其數居多若總言之居初者易貞居上者難貞易貞者由其所適之道多難貞者以其所處之位極故六十四卦初爻多得免咎而上每有不可救者始終之際其難易之不同盖如此二與四皆隂位也四雖得正而猶有不中之累况不得其正乎二雖不正而猶有得中之美况正而得中者乎四近君之位也二逺君之位也其勢又不同此二之所以多譽四之所以多懼也二中位隂陽處之皆為得中中者不偏不倚無過不及之謂其才若此故於時義為易合時義既合則吉可斷矣卦爻六位惟三為難處盖上下之交内外之際非平易安和之所也四之位近君多懼之地也以柔居之則有順從之美以剛居之則有僭逼之嫌然又須問居五者隂邪陽邪以隂承陽則得於君而勢順以陽承隂則得於君而勢逆勢順則無不可也勢逆則尤忌上行而凶咎必至以陽承陽以隂承隂皆不得於君也然陽以不正而有才隂以得正而無才故其勢不同有才而不正則貴於寡欲故乾之諸四多得免咎無才而得正則貴乎有應故艮之諸四皆以有應為優無應為劣獨坤之諸四能以柔順處之雖無應援亦皆免咎此又隨時之義也五上卦之中乃人君之位也諸爻之徳莫精於此能首出乎庻物不問何時克濟大事傳謂五多功者此也上事之終時之極也其才之剛柔内之應否雖或取義然終莫及上與終之重也是故難之將出者則指其可由之方事之既成者則示以可保之道義之善或不必勸則直云其吉也勢之惡或不可解則但言其凶也質雖不美而兾其或改焉則猶告之位雖處極而見其可行焉則亦諭之大抵積微而盛過盛而衰有不可變者有不能不變者大傳謂其上易知豈非事之已成乎胡氏一桂曰上下體雖相應其實陽爻與隂爻應隂爻與陽爻應若皆陽皆隂雖居相應之位則亦不應矣然事固多變動在因時故有以有應而得者有以有應而失者亦有以無應而吉者有以無應而凶者斯皆時事之使然不可執一而定論也至若比五以剛中上下五隂應之大有五以柔中上下五陽應之小畜四以柔得位上下五剛亦應之又不以六爻之應例論也六十四卦皆以五為君位者此易之大畧也其閒或有居此位而非君義者有居他位而有君義者斯易之變不可滯於常例胡氏炳文曰易卦之占亨多元亨少爻之占吉多元吉少元亨大善而亨元吉大善而吉也人之行事善百一大善千一故以元為貴然兹事也請論心之初善不善皆自念慮之微處充之即是此善之最大處盖有一豪之不善非元也有一息之不善非元也吳氏澄曰時之為時莫備於易程子謂之隨時變易以從道夫子傳六十四彖獨於十二卦發其凡而賛其時與時義時用之大一卦一時則六十四時不同也一爻一時則三百八十四時不同也始於乾之乾終於未濟之未濟則四千九十六時各有所值引而伸觸類而長時之百千萬變無窮而吾之所以時其時者則一而已薛氏瑄曰六十四卦只是一竒一耦但因所遇之時所居之位不同故有無窮之事變如人只是一動一静但因時位不同故有無窮之道理此所以為易也蔡氏清曰乾卦卦辭只是要人如乾坤卦卦辭只是要人如坤至如䝉蠱等卦則又須反其義此有隨時而順之者有隨時而制之者易道只是時時則有此二義在學者細察之周公之繫爻辭或取爻徳或取爻位又或取本卦之時與本爻之時又或兼取應爻或取所承所乗之爻有承乘應與時位兼取者有僅取其一二節者又有取一爻為衆爻之主者大概不出此數端綱領三此篇論讀易之法及諸家醇疵王氏通曰易之憂患業業焉孜孜焉其畏天憫人思及時而動乎繁師𤣥曰逺矣吾視易之道何其難曰有是夫終日乾乾可也劉炫問易曰聖人於易没身而已况吾儕乎炫曰吾談之於朝無我敵者不荅退謂門人曰黙而成之不言而信存乎徳行北山黄公善醫先寢食而後針藥汾隂侯生善筮先人事而後說卦邵子曰知易者不必引用講解是為知易孟子之言未嘗及易其閒易道存焉但人見之者鮮耳人能用易是為知易如孟子可謂善用易者也程子曰觀易須㸔時然後觀逐爻之才一爻之中常包函數意聖人常取其重者而為之辭亦有易中言之已多取其未嘗言者又有且言其時不及其爻之才者皆臨時参考須先看卦乃看得辭古之學者皆有傳授如聖人作經本欲明道今人若不先明義理不可治經盖不得傳授之意云爾如繫辭本欲明易若不先求卦義則看繫辭不得易須是黙識心通只窮文意徒費力朱子曰看易須是看他卦爻未畫以前是怎模様却就這上見得他許多卦爻象數是自然如此不是杜撰且詩則因風俗世變而作書則因帝王政事而作易初未有物只是懸空說出當其未有卦畫則渾然一太極在人則是喜怒哀樂未發之中一旦發出則隂陽吉凶事事都有在裏靣人須是就至虚靜中見得這道理周遮通瓏方好若先靠定一事說則滯泥不通所謂潔靜精微易之教也經書難讀而此經為尤攀盖未開卷時已有一重象數大概功夫開卷之後經文本意又多被先儒硬說殺了令人看得意思局促不見本來開物成務活法易不比詩書他是說盡天下後世無窮無盡底事理只一兩箇字便是一箇道理人須是經厯天下許多事變讀易方知各有一理精審端正今既未盡經厯非是此心大段虚明寕靜如何見得看易若是靠定象去看便滋味長若只恁地懸空看也没甚意思又曰說易得其理則象數在其中固是如此然泝流以觀却須先見象數的當下落方說得理不走作不然事無實證則虚理易差也今人讀易當分為三等看伏犧之易如未有許多彖象文言說話方見得易之本意只是要作卜筮用及文王周公分為六十四卦添入乾元亨利貞坤元亨利牝馬之貞已是文王周公自說出一般道理了然猶是就人占處說如占得乾卦則大亨而利於正耳及孔子繫易作彖象文言則以元亨利貞為乾之四徳以上論讀易孔氏穎逹曰龍出於河則八卦宣其象麟傷於澤則十翼彰其用業資㡬聖時歴三古及秦亡金鏡未墜斯文漢理珠囊重興儒雅其傳易者西都則有丁孟京田東都則有荀劉馬鄭大體更相祖述非有絶倫唯魏世王輔嗣之注獨冠古今所以江左諸儒並傳其學河北學者罕能及之其江南義疏十有餘家皆辭尚虚𤣥義多浮誕原夫易理難窮雖復𤣥之又𤣥至於垂範作則便是有而教有若論住内住外之空就能就所之說斯乃義渉於釋氏非為教於孔門也程子曰邵堯夫先生之學得之於李挺之挺之得之穆伯長伯長得之華山希夷陳圖南先生溯其源流逺有端緒今穆李之言及其行事槩可見矣而先生淳一不雜汪洋浩大乃其所自得者多矣尹氏焞曰伊川先生踐履盡易其作傳只是因而寫成熟讀玩味即可見矣朱子門人問當朞曰易卦之位震東離南兌西坎北者為一說十二辟卦分屬十二辰者為一說及焦延夀為卦氣直日之法乃合二說而一之既以八卦之震離兌坎二十四爻直四時又以十二辟卦直十二月且為分四十八卦為之公侯卿大夫而六日七分之說生焉若以八卦為主則十二卦之乾不當為已之辟坤不當為亥之辟艮不當侯於申酉巽不當侯於戌亥若以十二卦為主則八卦之乾不當在西北坤不當在西南艮不當在東北巽不當在東南彼此二說互為矛盾且其分四十八卦為公侯卿大夫以附於十二辟卦初無法象而直以意言本已無所據矣不待論其減去四卦二十四爻而後可以見其失也揚雄太𤣥次第乃是全用焦法其八十一首盖亦去其震離兌坎者而但擬其六十卦耳諸家於八十一首多有作擬震離兌坎者近世許翰始正其誤至立踦贏二賛則正以七百二十九賛又不足乎六十卦六日七分之數而益之恐不可反據其說以止焦氏之說也先天圖非某之說乃康節之說非康節之說乃希夷之說非希夷之說乃孔子之說但當日諸儒既失其傳而方外之流隂相付授以為丹竈之術至希夷康節乃反之於易而後其說始得復明於世問伊川易說理太多曰伊川言聖人有聖人用賢人有賢人用若一爻只作一事則三百八十四爻止作得三百八十四事也說得極好然他解依舊是三百八十四爻止作得三百八十四事用也詩書畧看訓詁解釋文義令通而已却只玩味本文其道理只在本文下靣小字儘說如何㑹過得他若易傳却可脱去本文程子此書平淡地漫漫委曲說得更無餘藴不是那敲磕逼匝出底義理平鋪地放在面前只如此等行文亦自難學如其他峭拔雄健之文却可作若易傳淡底文字如何可及問易傳大概將三百八十四爻作人說恐通未盡否曰也是即是不可裝定作人說看占得如何有就事言者有以位言者以吉凶言之則為事以終始言之則為時以髙下言之則為位隨所作而看皆通繫辭云不可為典要唯變所適豈可裝定作人說此書近細讀之恐程傳得之已多但不合全說作義理不就卜筮上看故其說有無頓著處耳今但作卜筮看而以其說推之道理自不可易自秦漢以來考象辭者泥於術數而不得其𢎞通簡易之法談義理者淪於空寂而不適乎仁義中正之歸求其因時立教以承三聖不同於法而同於道者則唯伊川先生程氏之書而已老蘇說易專得於愛惡相攻而吉凶生以下三句他把這六爻似那累世相讎相殺底人相似看這一爻攻那一爻這一畫克那一畫全不近人情東坡見他恁地太粗疎却添得些佛老在裏面其書自作兩様王氏應麟曰以義理解易自王弼始何晏非弼比也清談亡晉衍也非弼也范寗以王弼何晏並言過矣程子言易謂得其義則象數在其中朱子以為先見象數方說得理不然事無實證則虚理易差愚嘗觀顔延之庭誥云馬陸得其象數取之於物荀王舉其正宗得之於心其說以荀王為長李泰發亦謂一行明數而不知其義管輅明象而不通其理盖自輔嗣之學行而象數之說隱然義理象數一以貫之乃為盡善以上論諸家說易義例時消息盈虚之謂時泰否剝復之類是也又有指事言者訟師噬嗑頤之類是也又有以理言者履謙咸恒之類是也又有以象言者井鼎之類是也四者皆謂之時位貴賤上下之謂位王弼謂中四爻有位而初上兩爻無位非謂無隂陽之位也乃謂爵位之位耳五君位也四近臣之位也三雖非近而位亦尊者也二雖不如三四之尊而與五為正應者也此四爻皆當時用事故謂之有位初上則但以時之始終論者為多若以位論之則初為始進而未當事之人上為既退而在事外之人也故謂之無位然此但言其正例耳若論變例則如屯泰復臨之初大有觀大畜頤之上皆得時而用事蓋以其為卦主故也五亦有時不以君位言者則又以其卦義所取者臣道不及於君故也故朱子云常可類求變非例測徳剛柔中正不中正之謂徳剛柔各有善不善時當用剛則以剛為善也時當用柔則以柔為善也惟中與正則無有不善者然正尤不如中之善故程子曰正未必中中則無不正也六爻當位者未必皆吉而二五之中則吉者獨多以此故爾應比應者上下體相對應之爻也比者逐位相比連之爻也易中比應之義惟四與五比二與五應為最重蓋以五為尊位四近而承之二逺而應之也然近而承者則貴乎恭順小心故剛不如柔之善逺而應者則貴乎强毅有為故柔又不如剛之善夫子曰二與四同功而異位二多譽四多懼近也柔之為道不利逺者其要无咎其用柔中也夫言柔之道不利逺可見剛之道不利近矣又可見柔之道利近剛之道利逺矣夫子此條實全易之括例凡比與應必一隂一陽其情乃相求而相得若以剛應剛以柔應柔則謂之無應以剛比剛以柔比柔則亦無相求相得之情矣以此例推之易中以六四承九五者凡十六卦皆吉比曰外比於賢小畜曰有孚惕出觀曰利用賔于王坎曰納約自牖家人曰富家益曰中行告公從井曰井甃无咎漸曰或得其桷巽曰田獲三品渙曰渙其羣元吉節曰安節亨中孚曰月㡬望皆吉辭也惟屯需與蹇則相從於險難之中故曰往吉曰出自穴曰來連既濟則交儆於未亂之際故曰終日戒亦皆吉辭以九四承六五亦十六卦則不能皆吉而凶者多如離之焚如死如棄如恒之田无禽晉之鼫鼠鼎之覆餗震之遂泥皆凶爻也大有之匪彭睽之睽孤解之解拇歸妹之愆期旅之心未快小過之往厲必戒雖非凶爻而亦不純吉惟豫之四一陽而上下應噬嗑之四一陽為用獄主豐之四為動主以應乎明大壯之壯至四而極未濟之未濟至四而濟皆卦主也故得吉利之辭而免凶咎以九二應六五者凡十六卦皆吉䝉之子克家師之在師中泰之得尚于中行大有之大車以載蠱之幹母蠱而得中道臨之咸臨吉而无不利恒之悔亡大壯之貞吉睽之遇主于巷解之得黄矢損之弗損益之升之利用禴鼎之有實皆吉辭也惟大畜之輿說輹則時當止也歸昧利幽貞則時當守也未濟曵輪貞吉則時當待也亦非凶辭也以六二應九五亦十六卦則不能皆吉而凶吝者有之如否之包承也同人之于宗吝也隨之係小子失丈夫也觀之闚觀可醜也咸之咸其腓凶也皆非吉辭也屯之屯如邅如遯之鞏用黄牛蹇之蹇蹇匪躬既濟之䘮茀勿逐則以遭時艱難而顯其貞順之節者也惟比之自内也无妄之利有攸往也家人之在中饋貞吉也益之永貞吉也萃之引吉无咎也革之已日乃孚征吉也漸之飲食衎衎也皆適當上下合徳之時故其辭皆吉夫子所謂其要无咎其用柔中者信矣自二五之外亦有應焉自四五之外亦有比焉然其義不如應五承五者之重也以應言之四與初猶或取相應之義三與上則取應義者絶少矣其故何也四大臣之位也居大臣之位則有以人事君之義故必取在下之賢徳以自助此其所以相應也上居事外而下應於當事之人則失清髙之節矣三居臣位而越五以應上則失勿二之心矣此其所以不相應也然四之應初而吉者亦惟以六四應初九耳盖初九為剛徳之賢而六四有善下之美故如屯賁之求婚媾也頤之虎視眈眈也損之使遄有喜也皆吉也若九四應初六則反以下交小人為累大過之不橈乎下解之解而拇鼎之折足是也以比言之惟五與上或取相比之義餘爻則取比義者亦絶少其故何也五君位也尊莫尚焉而能下於上者則尚其賢也此其所以有取也然亦惟六五遇上九乃取斯義盖上九為髙世之賢而六五為虚中之主故如大有大畜之六五上九孔子則贊之以尚賢頤鼎之六五上九孔子則贊之以養賢其辭皆最吉若以九五比上六則亦反以尊寵小人為累如大過之老婦得其士夫咸之志末夬之莧陸兌之孚于剝皆是也獨隨之九五下上六而義有取者卦義剛來下柔故耳若初與二二與三三與四則非正應而相比者或恐陷於朋黨比周之失故其義不重此皆例之常也若其爻為卦主則羣爻皆以比之應之為吉凶焉故五位之為卦主者不待言矣如豫四為卦主則初鳴而三盱剝上為卦主則三无咎而五无不利復初為卦主則二下仁而四獨復夬上為卦主則三壯頄而五莧陸姤初為卦主則二包有魚而四包无魚此又易之大義不可以尋常比應之例論也卦主凡所謂卦主者有成卦之主焉有主卦之主焉成卦之主則卦之所由以成者無論位之髙下徳之善惡若卦義因之而起則皆得為卦主也主卦之主必皆徳之善而得時得位者為之故取於五位者為多而他爻亦閒取焉其成卦之主即為主卦之主者必其德之善而兼得時位者也其成卦之主不得為主卦之主者必其徳與時位参錯而不相當者也大抵其説皆具於夫子之彖傳當逐卦分别觀之若其卦成卦之主即主卦之主則是一主也若其卦有成卦之主又有主卦之主則兩爻皆為卦主矣或其成卦者兼取兩爻則兩爻又皆為卦主矣或其成卦者兼取兩象則兩象之兩爻又皆為卦主矣亦當逐卦分别觀之乾以九五為卦主盖乾者天道而五則天之象也乾者君道而五則君之位也又剛健中正四者具備得天徳之純故為卦主也觀彖傳所謂時乘六龍以御天首出庶物者主君道而言坤以六二為卦主盖坤者地道而二則地之象也坤者臣道而二則臣之位也又柔順中正四者具得坤徳之純故為卦主也觀彖辭所謂先迷後得主得朋䘮朋者皆主臣道而言屯以初九九五為卦主盖卦惟兩陽初九在下侯也能安民者也九五在上能建侯以安民者也䝉以九二六五為主盖九二有剛中之徳而六五應之九二在下師也能教人者也六五在上能尊師以教人者也需以九五為主盖凡事皆當需而王道尤當以久而成彖傳所謂位乎天位以正中也指五而言之也訟以九五為主盖諸爻皆訟者也九五則聽訟者也彖傳所謂利見大人尚中正也亦指五而言之也師以九二六五為主盖九二在下丈人也六五在上能用丈人者也比以九五為主盖卦惟一陽居尊位為上下所比附者也小畜以六四為成卦之主而九五則主卦之主也盖六四以一隂畜陽故彖傳曰柔得位而上下應之九五與之合志以成其畜故彖傳曰剛中而志行履以六三為成卦之主而九五則主卦之主也盖六三以一柔履衆剛之閒多危多懼卦之所以名履也居尊位尤當常以危懼存心故九五之辭曰貞厲而彖傳曰剛中正履帝位而不疚泰以九二六五為主盖泰者上下交而志同九二能盡臣道以上交者也六五能盡君道以下交者也二爻皆成卦之主亦皆主卦之主也否以六二九五為主盖否者上下不交六二否亨歛徳辟難者也九五休否變否為泰者也然則六二成卦之主而九五則主卦之主也同人以六二九五為主盖六二以一隂能同衆陽而九五與之應故彖傳曰柔得位得中而應乎乾大有以六五為主盖六五以虚中居尊能有衆陽故彖傳曰柔得尊位大中而上下應之謙以九三為主盖卦惟一陽得位而居下體謙之象也故其爻辭與卦同傳曰三多凶而惟此爻最吉豫以九四為主卦惟一陽而居上位卦之所由以為豫者故彖傳曰剛應而志行隨以初九九五為主盖卦之所以為隨者剛能下柔也初五兩爻皆剛居柔下故為卦主蠱以六五為主盖諸爻皆有事於幹蠱者至五而功始成故諸爻皆有戒辭而五獨曰用譽也臨以初九九二為主彖傳所謂剛浸而長是也觀以九五上九為主彖傳所謂大觀在上是也噬嗑以六五為主彖傳所謂柔得中而上行是也賁以六二上九為主彖傳所謂柔來而文剛剛上而文柔是也剝以上九為主隂雖剝陽而陽終不可剝也故為卦主復以初九為主彖傳所謂剛反者是也无妄以初九九五為主盖初九陽動之始如人誠心之初動也九五乾徳之純如人至誠之無息也故彖傳曰剛自外來而為主於内指初也又曰剛中而應指五也大畜以六五上九為主彖傳所謂剛上而尚賢者是也頤亦以六五上九為主彖傳所謂養賢以及萬民者是也大過以九二九四為主盖九二剛中而不過者也九四棟而不橈者也坎以二五二陽為主而五尤為主水之積滿者行也離以二五二隂為主而二尤為主火之方發者明也咸之九四當心位心者感之君則四卦主也然九五當背位為咸中之艮感中之正是謂動而能靜則五尤卦主也恆者常也中則常矣卦惟二五居中而六五之柔中尤不如九二之剛中則二卦主也遯之為遯以二隂則初二成卦之主也然處之盡善者惟九五則九五又主卦之主也故彖傳曰剛當位而應與時行也大壯之為壯以四陽而九四當四陽之上則四卦主也晉以明出地上成卦六五為離之主當中天之位則五卦主也故彖傳曰柔進而上行明夷以日入地中成卦而上六積土之厚夷人之明者也成卦之主也六二六五皆秉中順之徳明而見夷者也主卦之主也故彖傳曰文王以之箕子以之家人以九五六二為主故彖傳曰女正位乎内男正位乎外睽以六五九二為主故彖傳曰桑追而上行得中而應乎剛蹇以九五為主故彖傳曰徃得中也盖彖辭所謂大人者即指五也解以九二六五為主故彖傳曰往得衆也指五也又曰乃得中也指二也損以損下卦上畫益上卦上畫為義則六三上九成卦之主也然損下益上所益者君也故六五為主卦之主益以損上卦下畫益下卦下畫為義則六四初九成卦之主也然損上益下者君施之而臣受之故九五六二為主卦之主夬以一隂極於上為義則上六成卦之主也然五陽決隂而五居其上又尊位也故九五為主卦之主姤以一隂生於下為義則初六成卦之主也然五陽皆有制隂之責而惟二五以剛中之徳一則與之相切近以制之一則居尊臨其上以制之故九五九二為主卦之主萃以九五為主而九四次之卦惟二陽而居髙位為衆隂所萃也升以六五為主彖傳曰柔以時升六五升之最尊者也然升者必自下起其卦以地中生木為象則初六者巽體之主乃木之根也故初六亦為成卦之主困以九二九五為主盖卦以剛揜為義謂二五以剛中之徳而皆揜於隂也故兩爻皆成卦之主又皆主卦之主井以九五為主盖井以水為功而九五坎體之主也井以養民為義而九五養民之君也革以九五為主盖居尊位則有改革之權剛中正則能盡改革之善故其辭曰大人虎變鼎以六五上九為主盖鼎以養賢為義而六五尊尚上九之賢其象如鼎之鉉耳之相得也震以二陽為主然震陽動於下者也故四不為主而初為主艮亦以二陽為主然艮陽止於上者也故三不為主而上為主漸以女歸為義而諸爻惟六二應五合乎女歸之象則六二卦主也然漸又以進為義而九五進居髙位有剛中之徳則九五亦卦之主也歸妹以女之自歸為義其徳不善故彖傳曰无攸利柔乗剛也是六三上六成卦之主也然六五居尊下交則反變不善而為善化凶而為吉是六五又主卦之主也豐以六五為主盖其彖辭曰王假之勿憂宜日中六五之位則王之位也柔而居中則日中之徳也旅亦以六五為主故彖傳曰柔得中乎外又曰止而麗乎明五居外體旅於外之象也處中位為離體之主得中麗明之象也巽雖主於二隂然隂卦以隂為主者惟離為然以其居中故也巽之二隂則為成卦之主而不得為主卦之主主卦之主者九五也申命行事非居尊位者不可故彖傳曰剛巽乎中正而志行指五也兌之二隂亦為成卦之主而不得為主卦之主主卦之主則二五也故彖傳曰剛中而柔外說以利貞渙以九五為主盖收拾天下之散非居尊不能也然九二居内以固其本六四承五以成其功亦卦義之所重故彖傳曰剛來而不窮柔得位乎外而上同節亦以九五為主盖立制度以節天下亦惟居尊有徳者能之故彖傳曰當位以節中正以通中孚之成卦以中虚則六三六四成卦之主也然孚之取義以中實則九二九五主卦之主也至於孚乃化邦乃居尊者之事故卦之主在五小過以二五為主以其柔而得中當過之時而不過也既濟以六二為主盖既濟則初吉而終亂六二居内體正初吉之時也故彖傳曰初吉柔得中也未濟以六五為主盖未濟則始亂而終治六五居外體正開治之時也故彖傳曰未濟亨柔得中也以上之義皆可以據彖傳爻辭而推得之大抵易者成大業之書而成大業者必歸之有徳有位之人故五之為卦主者獨多中間亦有因時義不取五為王位者不過數卦而已自五而外諸爻之辭有曰王者皆非以其爻當王也乃對五位而為言耳如隨之上曰王用亨于西山則因其係於五也益之二曰王用亨于帝則因其應於五也升之四曰王用亨于岐山則因其承於五也皆其德與時稱故王者簡而用之以荅乎神明之心也又上爻有䝉五爻而終其義者如師之上曰大君有命則因五之出師定亂而至此則奏成功也離之上曰王用岀征則因五之憂勤圖治而至此則除亂本也皆䝉五爻之義而語其成效如此易中五上兩爻此類最多亦非以其爻當王也御纂周易折中卷首

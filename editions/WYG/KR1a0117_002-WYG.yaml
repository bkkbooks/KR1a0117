body:
  text: 引用姓氏漢董氏仲舒孔氏安國子國司馬氏遷子長京氏房君明劉氏向子政揚氏雄子雲班氏固孟堅馬氏融季長服氏䖍子慎荀氏爽慈明一名諝鄭氏𤣥康成宋氏衷仲子一作忠虞氏翻仲翔陸氏績公紀王氏肅子邕姚氏信徳祐王氏弼輔嗣翟氏子𤣥未詳世次見荀爽九家易今附於此晉干氏寳令升范氏長生蜀才一名賢韓氏伯康伯齊沈氏驎士雲禎北魏關氏朗子明隋王氏通仲淹文中子唐陸氏𤣥朗徳明孔氏穎達仲達一作沖遠房氏喬𤣥齡侯氏行果李鼎祚集觧作侯果陸氏䞇敬輿韓氏愈退之王氏凱沖崔氏憬以上二人未詳世次見李鼎祚集觧今附於此李氏鼎祚陸氏希聲君陽遯叟劉氏蛻復愚宋王氏昭素酸棗句氏微代氏淵仲顔范氏仲淹希文劉氏牧長民胡氏瑗翼之安定王氏逢㑹之石氏介守道徂徠歐陽氏脩永叔廬陵蘇氏舜欽子美周子敦頤茂叔濂溪邵子雍堯夫康節王氏安石介甫臨川司馬氏光君實涑水張子載子厚横渠程子顥伯淳明道程子頤正叔伊川蘇氏軾子瞻東坡呂氏大臨與叔藍田楊氏繪元素陸氏佃農師沈氏括存中晁氏說之以道嵩山龔氏原深父括蒼薛氏温其盧氏集氏以上三人未詳世次見房審權義海今附於此謝氏良佐顯道上蔡游氏酢定夫廣平楊氏時中立龜山尹氏焞彦明和靖郭氏忠孝立之兼山耿氏南仲希道開封李氏元量閻氏彦升李氏彦章元逹李氏開去非小舟張氏浚徳遠紫巖劉氏子翬彦沖屏山鄭氏剛中亨仲沈氏該守約朱氏震子發漢上郭氏雍子和白雲程氏迥可乆沙隨鄭氏東卿少梅合沙鄭氏汝諧舜舉東谷楊氏萬里庭秀誠齋蘭氏廷瑞惠卿馮氏當可時行縉雲王氏宗傳景孟童溪林氏栗黄中袁氏樞機仲梅巖鄭氏樵漁仲夾漈朱子熹元晦紫陽張氏栻敬夫南軒呂氏祖謙伯恭東萊陸氏九淵子静象山李氏舜臣子思隆山項氏安世平父平庵易氏祓彦章山齋趙氏彦肅子欽復齋蔡氏元定季通西山陳氏淳安卿北溪黄氏榦直卿勉齋董氏銖叔重磐澗陳氏埴器之潛室楊氏簡敬仲慈湖蔡氏淵伯静節齋李氏過季辨西溪馮氏椅儀之厚齋毛氏璞伯玉柴氏中行與之真氏徳秀希元西山魏氏了翁華父鶴山趙氏汝騰茂實趙氏汝楳李氏心傳微之秀巖劉氏彌劭夀翁習静錢氏時子是融堂饒氏魯仲元雙峯稅氏與權巽父潘氏夢旂天錫楊氏文煥彬夫釋褐徐氏幾子與進齋翁氏泳永叔思齋丘氏富國行可建安吳氏綺終畆田氏疇興齋雲閒徐氏直方立大古為陳氏友文隆山王氏應麟伯厚深寧叟吳氏應回鄭氏湘鄉陳氏劉氏董氏楊氏鄭氏以上五人未詳世次或失其名字今附於此金單氏渢雷氏思西仲元許氏衡平仲魯齋李氏簡䝉齋王氏申子巽卿秋山熊氏朋來與可胡氏方平師魯玉齋吳氏澄㓜清草廬臨川龔氏煥㓜文泉峯胡氏允潛齋齊氏夢龍覺翁節初胡氏一桂庭芳雙湖鮑氏雲龍景翔魯齋徐氏之祥麒父方塘胡氏炳文仲虎雲峯張氏清子希獻中溪熊氏良輔任重梅邉萬氏善明復余氏􅉮舒徳新息齋龍氏仁夫觀復黄氏瑞節觀樂董氏真卿季真番陽保氏八公孟普庵俞氏琰玊吾石澗明梁氏寅孟敬石門蔣氏悌生仁叔薛氏瑄徳温敬軒劉氏定之主静保齋胡氏居仁叔心敬齋蔡氏清介夫虚齋邵氏寳國賢二泉林氏希元懋貞次崖陳氏琛思獻紫峯余氏本子華金氏賁亨汝白豐氏寅初復初葉氏良佩敬之姜氏寳廷善􅃫阿楊氏時喬宜遷止庵歸氏有光熙甫震川趙氏玉泉沈氏一貫肩吾蛟門錢氏一本國瑞啟新唐氏鶴徴元卿凝庵髙氏萃蘇氏濬君禹紫溪顧氏憲成叔時涇陽鄭氏維嶽孩如姚氏舜牧虞佐承庵潘氏士藻去華雪松髙氏攀龍存之景逸許氏聞至長聖焦氏竑弱侯澹漪陸氏銓君啟來氏知徳矣鮮瞿唐章氏潢本清江氏盈科楚餘緑蘿方氏時化雨若楊氏啓新文源趙氏光大陸氏振竒庸成繆氏昌期當時西谿方氏應祥孟旋陳氏仁錫明卿張氏振淵彦陵谷氏家杰拙侯喬氏中和還一何氏楷𤣥子黄氏淳耀藴生陶庵錢氏志立爾卓趙氏振芳胥山徐氏在漢天章寒泉顧氏象徳善伯錢氏澄之㓜光吳氏曰慎徽仲敬齋葉氏爾瞻汪氏砥之程氏敬承張氏雨若孫氏質卿吳氏一源汪氏咸池盧氏中庵郭氏鵬海游氏譲溪以上十人未詳世次或失其名字今附於此奉旨開列御纂周易折中總裁校對分脩校錄監造諸臣職名總裁文淵閣大學士兼吏部尚書臣李光地御前校對翰林院侍講臣魏廷珍右春坊右中允兼翰林院編脩臣何國宗右春坊右中允兼翰林院編脩臣吳孝登翰林院庶吉士臣梅㲄成舉人臣王蘭生南書房校對詹事府少詹事兼翰林院侍講學士臣蔣廷錫翰林院侍講學士臣張廷玉翰林院侍講學士臣陳邦彦翰林院侍讀臣趙熊詔候補翰林院侍講臣楊名時右春坊右中允兼翰林院編脩臣王圖炳分脩翰林院編脩臣儲在文翰林院檢討臣胡煦翰林院庶吉士臣何焯户部主事臣李鼎徴進士臣蔣杲舉人臣陳萬策貢生候選知縣臣王之鋭監生臣陳汝楫生員臣李清植生員臣郭珣生員臣李璣武英殿校對翰林院編脩臣張起麟翰林院編脩臣徐用錫舉人臣成文武英殿繕寫翰林院脩撰臣王世琛翰林院編脩臣嵇曽筠翰林院編脩臣蔣漣翰林院編脩臣徐葆光翰林院編脩臣劉於義翰林院編脩臣潘允敏翰林院編脩臣狄貽孫翰林院編脩臣薄海翰林院編脩臣任蘭枝翰林院檢討臣陳世侃原任光禄寺署丞臣伊都立候補翰林院待詔臣曹曰瑛留京食俸知縣臣王曽期進士臣張榮源在館校對繕寫翰林院編脩臣繆沅翰林院編脩臣李鍾僑原任翰林院編脩臣程夢星翰林院檢討臣張照翰林院檢討臣董宏原任内閣中書臣閻詠武英殿監造總監造兼佐領臣張常住總監造臣李國屏監造兼驍騎校臣巴實監造臣神保

body:
  text: 欽定四庫全書御纂周易折中卷十三繫辭上傳本義繫辭本謂文王周公所作之辭繫於卦爻之下者即今經文此篇乃孔子所述繫辭之傳也以其通論一經之大體凡例故无經可附而自分上下云集說孔氏頴達曰夫子本作十翼申説上下二萹經文繫辭條貫義理别自為卷總曰繫辭分為上下二萹朱子語類云熟讀六十四卦則覺得繫辭之語甚為精宻是易之括例又云繫辭或言造化以及易或言易以及造化不出此理胡氏一桂曰其有稱大傳者因太史公引天下同歸而殊途一致而百慮為易大傳蓋太史公受易楊何何之屬自著易傳行世故稱孔子者曰大傳以别之耳天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣本義天地者隂陽形氣之實體乾坤者易中純隂純陽之卦名也卑髙者天地萬物上下之位貴賤者易中卦爻上下之位也動者陽之常静者隂之常剛柔者易中卦爻隂陽之稱也方謂事情所向言事物善惡各以類分而吉凶者易中卦爻占決之辭也象者日月星辰之屬形者山川動植之屬變化者易中蓍策卦爻隂變為陽陽化為隂者也此言聖人作易因隂陽之實體為卦爻之法象莊周所謂易以道隂陽此之謂也集說韓氏伯曰方有類物有羣則有同有異有聚有分順其所同則吉乖其所趣則凶故吉凶生矣象况日月星辰形况山川草木也縣象運轉以成昏眀山澤通氣而雲行雨施故變化見矣蘇氏軾曰天地一物也陰陽一氣也或為象或為形所在之不同故在云者眀其一也象者形之精華𤼵於上者也形者象之體質留於下者也人見其上下直以為兩矣豈知其未嘗不一耶由是觀之世之所謂變化者未嘗不出於一而兩於所在也自兩以往有不可勝計者矣故在天成象在地成形變化之始也朱子語類問第一章第一節蓋言聖人因造化之自然以作易曰論其初則聖人是因天理之自然而著之於書此是後來人説話又是見天地之實體而知易之書如此又云天尊地卑上一截皆説面前道理下一截是説易書聖人作易與天地準處如此如今㸔面前天地便是乾坤卑髙便是貴賤若把下面一句説作未畫之易也不妨然聖人是從那有易後説来蔡氏清曰此一節是夫子從有易之後而追論夫未有易之前以見畫前之有易也夫易有乾坤有剛柔有吉凶有變化然此等名物要皆非聖人鑿空所為不過皆據六合中所自有者而模寫出耳又曰定者有尊卑各安其分之意位者有卑髙以序而列之意斷者有判然不相混淆之意又曰以天地言之天尊地卑其卑髙固昭然不易也以萬物言之如山川陵谷之類其卑髙亦昭然可覩也案此節是說作易源頭總涵乾坤六子在内盖天尊地卑是天地定位也卑髙以陳則兼山澤等皆是天動地静山静水動固有常矣然雖至於有精氣而無形質之物其聚散作息亦有時其流止晦明亦有度則又兼雷風水火等皆是類聚羣分總上通言之在天有方焉春秋冬夏應乎南北東西者是也其生殺之氣則以類聚在地有物焉髙下燥濕别為浮沈升降者是也其清濁之品則以羣分以上皆言造化之體至於天之象地之形其隂陽互根則交易者也其隂陽迭運則變易者也此三句又因體及用以起下文之意是故剛柔相摩八卦相盪本義此言易卦之變化也六十四卦之初剛柔兩畫而已兩相摩而為四四相摩而為八八相盪而為六十四集說韓氏伯曰相切摩言隂陽之交感相推盪言運化之推移朱子語類云摩是那兩個物事相摩戛盪則是圜轉推盪將出來摩是八卦以前事盪是八卦以後為六十四卦底事盪是有那八卦了團旋推盪那六十四卦出來吳氏澄曰畫卦之初以一剛一柔與第二畫之剛柔相摩而為四象又以二剛二柔與第三畫之剛柔相摩而為八卦八卦既成則又各以八悔卦盪於一貞卦之上而一卦為八卦八卦為六十四卦也案此節雖切畫卦言之然是天地閒自有此理盖相摩者以一交一如天與地交水與火交山與澤交雷與風交是也相盪者以一交八如天與地交矣而與水火山澤雷風無不交地與天交矣而亦與水火山澤雷風無不交之類是也惟天地之理如此故聖人畫卦以體象之鼔之以雷霆潤之以風雨日月運行一寒一暑本義此變化之成象者集說孔氏穎達曰重明上變化見矣及剛柔相摩八卦相盪之事八卦既相推盪各有功之所用也鼓動之以震雷離電滋潤之以巽風坎雨離日坎月運動而行一節為寒一節為暑不云乾坤艮兌者乾坤上下備言雷電風雨亦出山澤也張氏浚曰鼓以雷霆而有氣者作潤以風雨而有形者生丘氏富國曰前以乾坤貴賤剛柔吉凶變化言是對待之隂陽交易之體也此以摩盪鼓潤運行言是流行之隂陽變易之用也至下文則言乾坤之徳行而繼以人體乾坤者終之吳氏澄曰章首但言乾坤蓋舉父母以包六子此先言六子而後總之以乾坤也震為雷離為電霆即電也春秋穀梁傳曰震者何雷也電者何霆也巽為風坎為雨羲皇卦圖左起震而次以離鼓之以雷霆也右起巽而次以坎潤之以風雨也風而雨故通言潤離為日坎為月艮山在西北嚴凝之方為寒兑澤在東南温熱之方為暑左離次以兌者日之運行而為暑也右坎次以艮者月之運行而為寒也邵子曰日為暑月為寒書曰日月之行有冬有夏乾道成男坤道成女本義此變化之成形者此兩節又明易之見於實體者與上文相𤼵明也集說朱子語類云天地父母分明是一理乾道成男坤道成女則凡天下之男皆乾之氣天下之女皆坤之氣從這裏便徹上徹下即是一個氣都透了又云乾道成男坤道成女通人物言之在動物如牝牡之類在植物亦有男女如麻有牡麻及竹有雌雄之類皆離陰陽剛柔不得吳氏澄曰乾成男者父道也坤成女者母道也左起震歴離歴兌而終於乾右起巽歴坎歴艮以終於坤故以乾道成男坤道成女二句總之於後也何氏楷曰自天尊地卑至變化見矣是因乾坤而推極於變化自剛柔相摩至坤道成女是又因變化而遡原於乾坤乾知大始坤作成物本義知猶主也乾主始物而坤作成之承上文男女而言乾坤之理蓋凡物之屬乎陰陽者莫不如此大抵陽先陰後陽施陰受陽之輕清未形而陰之重濁有迹也集說胡氏瑗曰乾言知坤言作者蓋乾之生物起於無形未有營作坤能承於天氣已成之物事可營為故乾言知而坤言作也朱子語類云知訓管字不當解作知見之知大始未有形知之而已成物乃流行之時故有為柴氏中行曰一氣之動則自有知覺而生意所始乾實為之一氣既感則妙合而凝其形乃著有作成之意坤實為之吳氏澄曰上言八卦而總之以乾坤此又接成男成女二句而専言乾坤也乾男為父者以其始物也始謂始其氣也坤女為母者以其成物也成謂成其質也知者主之而無心也作者為之而有迹也案自鼓之以雷霆至此二句當總為一叚六子分生成之職乾坤専生成之功也下文則就功化而推原於易簡自為一叚乾以易知坤以簡能本義乾健而動即其所知便能始物而无所難故為以易而知大始坤順而静凡其所能皆從乎陽而不自作故為以簡而能成物集說虞氏翻曰乾縣象著明坤陰陽動闢不習无不利地道光也韓氏伯曰天地之道不為而善始不勞而善成故曰易簡楊氏萬里曰此贊乾坤之功雖至溥而無際而乾坤之徳實至要而不繁也朱子語類問如何是易簡曰他行健所以易易是知阻難之謂人有私意便難簡只是順從而已若外更生出一分如何得簡今人都是私意所以不能簡易問乾以易知坤以簡能若以學者分上言之則廓然大公者易也物來順應者簡也不知是否曰然乾之易知之事也坤之簡行之事也吳氏澄曰易簡者以乾坤之理言始物者乾之所知然乾之性健其知也宰物而不勞心故易而不難成物者坤之所作然坤之性順其作也從陽而不造事故簡而不繁此乾坤皆指天地而易之乾坤二卦象之者也張氏振淵曰乾知大始似乎甚難矣坤作成物似乎甚煩矣乃乾坤則以易知以簡能耳所謂天地無心而成化也吳氏曰慎曰乾健體而動用故易坤順體而静用故簡動静以陰陽之分言然乾知大始而事付於坤則始動而終静坤從乎陽而作成物則始静而終動又乾知坤能皆用之動也乾易坤簡皆體之静也又四徳坤承乎乾元亨皆動利貞皆静不可専以動屬乾以静屬坤也易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之徳可大則賢人之業本義人之所為如乾之易則其心明白而人易知如坤之簡則其事要約而人易從易知則與之同心者多故有親易從則與之協力者衆故有功有親則一於内故可久有功則兼於外故可大徳謂得於已者業謂成於事者上言乾坤之徳不同此言人法乾坤之道至此則可以為賢矣集說范氏長生曰以其易知故物親而附之以其易從故物法而有功也孔氏穎達曰初始無形未有營作故但云知也已成之物事可營為故云作也易謂易略無所造為以此為知故曰乾以易知簡謂簡省不須繁勞以此為能故曰坤以簡能若於物艱難則不可以知若於事繁勞則不可能也易知則有親者性意易知心無險難則相和親易從則有功者於事易從不有繁勞其功易就有親則可久者物既和親無相殘害故可久也有功則可大者事業有功則積漸可大可久則賢人之徳者使物長久是賢人之徳可大則賢人之業者功業既大則是賢人事業蘇氏軾曰簡易者一之謂也一故有信信故物知之也易而從之也不難朱子語類云乾以易知坤以簡能以上是言乾坤之徳易則易知以下是就人而言言人兼體乾坤之徳也乾以易知者乾健不息唯主於生物都無許多艱深險阻故能以易而知大始坤順承天惟以成物都無許多繁擾作為故能以簡而作成物大抵陽施陰受乾之生物如瓶施水其道至易坤唯承天以成物别無作為故其理至簡其在人則無艱阻而自直故人易知順理而不繁擾故人易從易知則人皆同心親之易從則人皆協力而有功矣有親可久則為賢人之德是就存主處言有功可大則為賢人之業是就作事處言蓋自乾以易知便是指存主處坤以簡能便是指作事處林氏希元曰易簡只是因此理而立心處事爾固非於此理之外有所加亦非於此理之内有所减也但以其無險阻而謂之易無煩擾而謂之簡孟子曰禹之行水也行其所無事也如智者亦行其所無事則智亦大矣此易簡之說也趙氏光大曰易從則有功有功不是人来助我作事是我能使人如此便是我之功易簡而天下之理得矣天下之理得而成位乎其中矣本義成位謂成人之位其中謂天地之中至此則體道之極功聖人之能事可以與天地參矣此第一章以造化之實明作經之理又言乾坤之理分見於天地而人兼體之也集說孔氏頴達曰聖人能行天地易簡之化則天下萬事之理並得其宜矣朱子語類云易簡理得是淨淨潔潔無許多勞擾委曲鄭氏維嶽曰易簡原是一理依易之理而作之則為簡何氏楷曰乾坤一陰陽也陰陽一太極也易簡者乾坤之所以知始而作成者也人之所知如乾之易則所知皆性分所固有無一豪人欲之艱深豈不易知人之所能如坤之簡則所能皆職分之當為庶一豪人欲之紛擾豈不易從易知則不逺人以為道故有親易從則夫婦皆可與能故有功有親則有人傳繼其心千百世上下心同理同也故可久有功則有人擴充其事人能𢎞道非道𢎞人也故可大可久則賢人之徳與天同其悠久矣可大則賢人之業與地同其廣大矣所以然者則以我之易簡與乾坤之易簡同原故也夫易簡而天下之理得矣天之所以為天地之所以為地人之所以為人一易簡之理焉盡之所謂天下之公理也得天下之公理以成久大之徳業則是天有是易吾亦有是易地有是簡吾亦有是簡與天地參而為三矣總論程子曰天尊地卑尊卑之位定而乾坤之義明矣尊卑既判貴賤之位分矣陽動陰静各冇其常則剛柔判矣事有理也物有形也事則有類形則有羣善惡分而吉凶生矣象見於天形成於地變化之迹見矣陰陽之交相摩軋八方之氣相推盪雷霆以動之風雨以潤之日月運行寒暑相推而成造化之功得乾者成男得坤者成女乾當始物坤當成物乾坤之道易簡而已乾始物之道易坤成物之能簡平易故人易知簡直故人易從易知則可親就而奉順易從則可取法而成功親合則可以常乆成事則可以廣大聖賢徳業久大得易簡之道也天下之理易簡而已有理而後有象成位在乎中也張氏振淵曰易道盡於乾坤乾坤盡於易簡易簡即在人身學者求易於天地又求天地之易於吾身則易在是矣通章之意總是論易書之作無非𤼵眀乾坤之理要人為聖賢以與天地參耳何氏楷曰此一章乃孔子首明易始乾坤之理至第二章設卦觀象方言易案天地卑髙動靜方物象形造化之實體也乾坤貴賤剛柔吉凶變化易卦之定名也因造化之實體起易卦之定名故自造化之體立而卦之理具矣體立則用必行焉是故剛柔則一與一相摩八卦則一與八相盪造化之情所以交而不離也畫卦之序蓋象此也雷霆者震離風雨者巽坎暑以說物者兌寒以止物者艮成男而職大始者乾成女而職成物者坤造化之機所以變而無窮也建圖之位蓋象此也然而造化之理則一以易簡為歸心一而不貳故易也事順而無為故簡也天地之盛徳大業易簡而己矣賢人之進徳脩業聖人之崇徳廣業亦惟易簡而已矣設卦繫辭所以順性命之理者此也諸儒言易有四義不易也交易也變易也易簡也故天尊地卑一節言不易者也剛柔相摩二句言交易者也鼓以雷霆至坤作成物言變易者也乾以易知以下言易簡者也易道之本原盡乎此故為繫傳之首章焉聖人設卦觀象繫辭焉而明吉凶本義象者物之似也此言聖人作易觀卦爻之象而繋以辭也集說孔氏穎達曰設之卦象則有吉有凶故下文云吉凶者失得之象悔吝者憂虞之象變化者進退之象剛柔者晝夜之象是施設其卦有此諸象也此設卦觀象總為下而言卦象爻象有吉冇凶若不繫辭其理未顯故繫屬吉凶之文辭於卦爻之下而顯明此卦爻吉凶也案吉凶之外猶有悔吝憂虞舉吉凶則包之朱氏震曰聖人設卦本以觀象自伏羲至於文王一也聖人憂患後世懼觀者智不足以知此於是繋之卦辭又繫之爻辭以吉凶明告之朱子語類云易當初只是為卜筮而作文言彖象却是推說作義理上去觀乾坤二卦便可見孔子曰聖人設卦觀象繫辭焉而明吉凶不是卜筮如何眀吉凶王氏申子曰易之初也有象而未有卦及八卦既設而象寓焉及八重而六十四聖人又觀是卦有如是之象則繫之以如是之辭蓋卦以象而立象又以卦而見也眀吉凶者有是象而吉凶之理已具繫之辭而吉凶之象始明也陰陽竒耦相交相錯順則吉逆則凶當則吉否則凶因其順逆當否而繋之辭吉凶明矣剛柔相推而生變化本義言卦久陰陽迭相推盪而陰或變陽陽或化陰聖人所以觀象而繫辭衆人所以因蓍而求卦者也集說張氏振淵曰剛柔相推之中或當位或失位而吉凶悔吝之源正起於此聖人之所觀觀此也聖人之所眀眀此也蓋吉凶悔吝雖繋於辭而其原實起於變是故吉凶者失得之象也悔吝者愛虞之象也本義吉凶悔吝者易之辭也失得憂虞者事之變也得則吉失則凶憂虞雖未至凶然已足以致悔而取羞矣蓋吉凶相對而悔吝居其中間悔自凶而趨吉吝自吉而向凶也故聖人觀卦爻之中或有此象則繫之以此辭也集說虞氏翻曰吉則象得凶則象失悔則象憂吝則象虞也干氏寶曰憂虞未至於失得悔吝不入於吉凶事有小大故辭有緩急各象其意也朱子語類云吉凶悔吝四者循環周而復始悔了便吉吉了便吝吝了便凶凶了又悔正如生於憂患死於安樂相似蓋憂苦患難中必悔悔便是吉之漸及至吉了少閒便安意肆志必至作出不好可羞吝底事出来吝便是凶之漸矣及至凶矣又却悔只管循環不已正如剛柔變化剛了化化便是柔柔了變變便是剛亦循環不已又云悔屬陽吝屬陰悔是逞快作出事来有錯失處這便生悔所以屬陽吝是那隈隈衰衰不分明底所以屬陰亦猶驕是氣盈吝是氣歉又云吉凶者失得之象悔吝者憂虞之象變化者進退之象剛柔者晝夜之象四句皆互換往来吉凶與悔吝相貫悔自凶而趨吉吝自吉而趨凶進退與晝夜相貫進自柔而趨乎剛退自剛而趨乎柔趙氏玉泉曰吉即順理而得之象也凶即逆理而失之象也悔即既失之後困於心衡於慮而為憂之象也吝即未失之先狃於安溺於樂而為虞之象也何氏楷曰吉凶悔吝以卦辭言失得憂虞以人事言上文所謂觀象繫辭以眀吉凶者此也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也本義柔變而趨於剛者退極而進也剛化而趨於柔者進極而退也既變而剛則晝而陽矣既化而柔則夜而陰矣六爻初二為地三四為人五上為天動即變化也極至也三極天地人之至理三才各一太極也此明剛柔相推以生變化而變化之極復為剛柔流行於一卦六爻之間而占者得因所値以斷吉凶也集說韓氏伯曰始總言吉凶變化而下别眀悔吝晝夜者悔吝則吉凶之類晝夜亦變化之道孔氏頴達曰六爻遞相推動而生變化是天地人三才至極之道蔡氏淵曰動變易也極者太極也以其變易無常乃太極之道也三極謂三才各具一太極也變至六爻則一卦之體具而三才之道備矣吳氏澄曰吉凶悔吝象人事之得失憂虞變化剛柔象天地陰陽之晝夜進退是六爻兼有天地人之道也胡氏炳文曰此曰三極是卦爻已動之後各具一太極後曰易有太極者則卦爻未生之先統體一太極也俞氏琰曰三極之道言道之體三才之道言道之用何氏楷曰變化剛柔以卦畫言進退晝夜以造化言六爻之動二句推言變化之故上文所謂剛柔相推而生變化者此也是故君子所居而安者易之序也所樂而玩者爻之辭也本義易之序謂卦爻所著事理當然之次第玩者觀之詳集說孔氏頴逹曰若居在乾之初九而安在勿用若居在乾之九三而安在乾乾是以所居而安者由觀易位之次序也王氏宗傳曰所謂易之序者消息盈虛之有其時是也居之而安則盛行不加窮居不損而與易為一矣所謂爻之辭者是非當否之有所命是也樂之而玩則黙而成之不言而信而與爻為一矣朱子語類問所居而安者易之序也與居則觀其象之居不同上居字是總就身之所處而言下居字則靜對動而言曰然問所居而安者易之序也曰序是次序謂卦爻之初終如潜見飛躍循其序則安又問所樂而玩者爻之辭曰横渠謂每讀每有益所以可樂蓋有契於心則自然樂俞氏琰曰居以位言安謂安其分也樂以心言玩謂繹之而不厭也君子觀易之序而循是理故安觀爻之辭而達是理故樂是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉无不利本義象辭變已見上凡單言變者化在其中占謂其所値吉凶之決也此第二章言聖人作易君子學易之事集說虞氏翻曰以動者尚其變占事知来故玩其占也朱子語類問居則觀其象玩其辭動則觀其變玩其占如何曰若是理㑹不得如何占得必是閑常理㑹得此道理到用時便占蔡氏淵曰觀象玩辭學易也觀變玩占用易也學易則無所不盡其理用易則唯盡乎一爻之時居既盡乎天之理動必合乎天之道故曰自天祐之吉无不利也王氏申子曰平居無事觀卦爻之象而玩其辭則可以察吉凶悔吝之故及動而應事觀卦之變而玩其占則可以決吉凶悔吝之㡬故有不動動無不吉也胡氏炳文曰天地閒剛柔變化無一時閒人在大化中吉凶悔吝無一息停吉一而已凶悔吝三焉上文示人以吉凶悔吝者作易之事此獨吉而無凶悔吝者學易之功也俞氏琰曰觀象玩辭如蔡墨云在乾之姤知莊子云在師之臨謂之在者是也觀變玩占如陳侯遇觀之否晉侯遇大有之睽謂之遇者是也總論孔氏頴逹曰前章言天地成象成形簡易之徳明乾坤之大㫖此章眀聖人設卦觀象爻辭吉凶悔吝之細别程子曰聖人既設卦觀卦之象而繫以辭明其吉凶之理以剛柔相推而知變化之道吉凶之生由失得也悔吝者可憂虞也進退消長所以成變化也剛柔相易而成晝夜觀晝夜則知剛柔之道矣三極上中下也極中也皆其時中也三才以物言也三極以位言也六爻之動以位為義乃其序也得其序則安矣辭以眀義玩其辭義則知其可樂也觀象玩辭而通其意觀變玩占而順其時動不違於天矣何氏楷曰上章言造化自然之易為作易之本此章乃言作易之㫖案上章雖言作易之源本然實以眀在造化者無非自然之易書故先儒以為畫前之易者此也此章乃備言作易學易之事蓋承上章言之而為後諸章之綱也設卦觀象先天之聖人也繫辭而眀吉凶後天之聖人也剛柔相推而生變化申言設卦觀象之事所象者或為人事之失得憂虞或為天道之進退晝夜極而至於天地人之至理莫不包涵統具於其中此辭所由繫而占所由生也居而安者以身驗之樂而玩者以心體之在平時則為觀象玩辭之功在臨事則為觀變玩占之用此所謂奉眀命以周旋述天理而時措者也自天祐之吉无不利學易之效至於如此彖者言乎象者也爻者言乎變者也本義彖謂卦辭文王所作者爻謂爻辭周公所作者象指全體而言變指一節而言集說虞氏翻曰八卦以象告故言乎象也爻有六畫九六變化故言乎變者也項氏安世曰彖辭所言之象即下文所謂卦也爻辭所言之變即下文所謂位也張氏振淵曰易有實理而無實事故謂之象卦立而象形易有定理而無定用故謂之變爻立而變著吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也本義此卦爻辭之通例集說崔氏憬曰繫辭著悔吝之言則異凶咎若疾病之與小疵楊氏萬里曰言動之間盡善之謂得不盡善之謂失小不善之謂疵不明乎善而誤入乎不善之謂過覺其小不善非不欲改而已無及於是乎有悔不覺其小不善猶及於改而不能改或不肯改於是乎有吝吾身之過猶吾衣之破也衣有破補之斯全身有過補之斯還還者何復之於善也補不善而復之於善何咎之有蔡氏淵曰吉凶悔吝无咎即卦與爻之斷辭也失得者事之已成著者也小疵者事之得失未分而能致得失者也善補過者先本有咎脩之則可免咎也胡氏炳文曰前章言卦爻中吉凶悔吝之辭未嘗及无咎之辭此章方及之大抵不貴無過而貴改過无咎者善補過也聖人許人自新之意切矣張氏振淵曰失得指時有消息位有當否說小疵兼兩意向於得而未得尚有小疵則悔向於失而未失已有小疵則吝是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭本義位謂六爻之位齊猶定也小謂陰大謂陽集說王氏肅曰齊猶正也陽卦大陰卦小卦列則小大分故曰齊小大者存乎卦也張氏浚曰卦之所設本乎陰陽陰小陽大體固不同而各以所遇之時為正陽得位則陽用事陰得位則陰用事小大之理至卦而齊朱子語類問上下貴賤之位何也曰二四則四貴而二賤五三則五貴而三賤上初則上貴而初賤上雖無位然本是貴重所謂貴而无位髙而无民在人君則為天子父為天子師在他人則清髙而在物外不與事者此所以為貴也王氏申子曰列分也陽貴陰賤上貴下賤亦有貴而无位有位而在下者故曰列貴賤者存乎位位者六爻之位也齊均也陽大陰小陽卦多陰則陽為之主陰卦多陽則陰為之主雖小大不齊而得時為主則均也故曰齊小大者存乎卦卦者全卦之體也辨明也辨一卦一爻之吉凶者辭也故曰辨吉凶者存乎辭憂悔吝者存乎介震无咎者存乎悔本義介謂辨别之端蓋善惡已動而未形之時也於此憂之則不至於悔吝矣震動也知悔則有以動其補過之心而可以无咎矣集說虞氏翻曰震動也有不善未嘗不知之知之未嘗復行无咎者善補過故存乎悔也韓氏伯曰介纖介也王弼曰憂悔吝之時其介不可慢也即悔吝者言乎小疵也程子曰以悔吝為防則存意於微小震懼而得无咎者以此朱子語類問憂悔吝者存乎介悔吝未至於吉凶是乃初萌動可以向吉凶之微處介又是悔吝之微處介字如界至界限之界是善惡初分界處於此憂之則不至於悔吝矣曰然丘氏富國曰此章就吉凶悔吝上添入无咎說既欲人於悔吝上著力尤欲人於介上用功蓋人知悔則以善補過而无咎雖未至吉亦不至凶也若又於悔吝之介憂之則但有吉而已所謂幾者動之微而吉之先見者也併悔吝亦皆無矣吳氏澄曰列貴賤者存乎位覆說爻者言乎變齊小大者存乎卦覆說彖者言乎象分辨吉凶存乎彖爻之辭覆說言乎其失得也悔吝介乎吉凶之間憂其介則趨於吉不趨於凶矣覆說言乎其小疵也震者動心戒懼之謂有咎而能戒懼則能改悔所為而可以无咎覆說善補過也趙氏玉泉曰介在事前悔在事後汪氏砥之曰易凡言悔吝即寓介之意言无咎即寓悔之意憂盱豫之悔存乎遲速之介也憂即鹿之吝存乎往舎之介也震甘臨之无咎存乎憂而悔也震頻復之旡咎存乎厲而悔也是故卦有小大辭有險易辭也者各指其所之本義小險大易各隨所向此第三章釋卦爻辭之通例集說朱子語類云卦有小大㸔来只是好底卦便是大不好底卦便是小如復如泰如大有如夬之類盡是好底卦如睽如困如小過之類盡是不好底所以謂卦有小大辭有險易大卦辭易小卦辭險即此可見項氏安世曰貴賤以位言小大以材言卦各有主主各有材聖人隨其材之大小時之難易而命之辭使人之知所適從也潘氏夢旂曰卦有小有大隨其消長而分辭有險有易因其安危而别辭者各指其所向凶則指其可避之方吉則指其可趨之所以示乎人也吳氏澄曰上文有貴賤小大此獨再提卦有小大蓋卦彖為諸辭之總也蔡氏清曰據本章通例看此條卦字辭字皆兼爻說案此章申第二章吉凶者失得之象也一節之義首言彖爻者吉凶悔吝之辭彖爻皆有之也吉凶則已著故直言其失得而已悔吝則猶微故必推言其小疵也至四者之外又有所謂无咎者不圖吉利求免罪愆之名也其道至大而貫乎吉凶悔吝之間故易之中有曰吉无咎者有曰凶无咎者有曰吝无咎者然其機皆在於悔蓋惟能悔則吉而不狃於安也凶而能動於困也吝而不包其羞也是故易辭之教人也於吉凶辨之而已於悔吝也則憂之謹其幾也憂之不已又從而震之曰誠能去吝而悔不徒悔而補過則可以无咎矣夫不貳過而无祗悔者至也衆人不貴无悔而貴能悔為其為改過遷善之路也故曰懼以終始其要无咎此之謂易之道易與天地準故能彌綸天地之道本義易書卦爻具有天地之道與之齊準彌如彌縫之彌有終竟聯合之意綸有選擇條理之意集說韓氏伯曰作易以準天地孔氏頴逹曰言聖人作易與天地相準謂準擬天地則乾健以法天坤順以法地之類是也蘇氏軾曰準符合也彌周浹也綸經緯也所以與天地準者以能知幽眀之故死生之說鬼神之情狀也王氏宗傳曰天地之道即下文所謂一陰一陽是也是道也其在天地則為幽眀寓於始終則為生死見於物變則為鬼神朱子語類云凡天地問之物無非天地之道故易能彌綸天地之道彌如封彌之彌糊合使無縫罅綸如綸絲之綸自有條理言雖是彌得外面無縫罅而中則事事物物各有條理彌而非綸則空疎無物綸而非彌則判然不相干此二字見得聖人下字甚密也胡氏炳文曰此易字指易書而言書之中具有天地之道本自與天地相等故於天地之道彌之則是合萬為一渾然無欠綸之則一實萬分粲然有倫案此下三節朱子分為窮理盡性至命者極確然須知非有易以後聖人方用易以窮之盡之至之易是聖人窮理盡性至命之書聖人全體易理故言易窮理盡性至命即是言聖人也易與天地準與天地相似範圍天地之化而不過此三句當為三節冠首第二第三節不言易者蒙第一節文義仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之說精氣為物游魂為變是故知鬼神之情狀本義此窮理之事以者聖人以易之書也易者陰陽而已幽眀死生鬼神皆陰陽之變天地之道也天文則有晝夜上下地理則有南北髙深原者推之於前反者要之於後陰精陽氣聚而成物神之伸也魂游魄降散而為變鬼之歸也集說韓氏伯曰幽明者有形無形之象死生者始終之數也程子曰原始則足以知其終反終則足以知其始死生之說如是而已矣蘇氏軾曰鬼常與體魄俱故謂之物神無適而不可故謂之變精氣為魄魄為鬼志氣為魂魂為神朱子語類問原始反終故知死生之說曰人未死如何知得死之說只是原其始之理將後面摺轉来㸔便見得以此之有知彼之無又云魄為鬼魂為神禮記有孔子答宰我問正說此理甚詳宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也註氣謂嘘吸出入者也耳目之聰眀為魄雜書云魂人陽神也魄人隂神也亦可取陳氏淳曰人生天地間得天地之氣以為體得天地之理以為性原其始而知所以生則要其終而知所以死古人謂得正而斃謂朝聞道夕死可矣只縁受得許多道理須知得盡得便自無愧到死時亦只是這二五之氣聽其自消化而已所謂安死順生與天地同其變化這個便是與造化為徒又曰陰陽二氣㑹在吾身之中為鬼神以寤寐言則寤屬陽寐屬陰以語默言則語屬陽黙屬陰及動靜進退行止等分屬皆有陰陽凡屬陽者皆為魂為神凡屬陰者皆為魄為鬼眞氏徳秀曰人之生精與氣合精屬陰氣屬陽精則魄也目之所以眀耳之所以聰氣充乎體凡人心之能思慮知識身之能舉動勇決此之謂魂神指魂而言鬼指魄而言胡氏炳文曰易不曰陽陰而曰陰陽此所謂幽眀死生鬼神即陰陽之謂也即天地而知幽眀之故即始終而知死生之說即散聚而知鬼神之情狀皆窮理之事也林氏希元曰幽眀之故死生之說鬼神之情狀其理皆在於易故聖人用易以窮之也然亦要見得為聖人窮理盡性之書爾非聖人眞箇即易而後窮理盡性也鄭氏維嶽曰原人之所以始全而生之即反其所以終全而歸之與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛本義此聖人盡性之事也天地之道知仁而已知周萬物者天也道濟天下者地也知且仁則知而不過矣旁行者行權之知也不流者守正之仁也既樂天理而又知天命故能无憂而其知益深随處皆安而无一息之不仁故能不忘其濟物之心而仁益篤蓋仁者愛之理愛者仁之用故其相為表裏如此集說韓氏伯曰徳合天地故曰相似朱子語類云與天地相似故不違下數句是說與天地相似之事又云安土者随所寓而安若自擇安處便只知有己不知有物也此厚於仁者之事故能愛又云安土者隨寓而安也敦乎仁者不失其天地生物之心也安土而敦乎仁則無適而非仁矣所以能愛也胡氏炳文曰上文言易與天地準此言與天地相似似即準也知似天仁似地有周物之知而實諸濟物之仁則其知不過有行權之知而本諸守正之仁則其知不流至於樂天知命而知之迹已泯安土敦仁而仁之心益著此其知仁所以與天地相似而不違盡性之事也俞氏琰曰與天地相似者易似天地天地似易彼此相似也案知周萬物義之精也然所知者皆濟天下之道而不過義合於仁也旁行泛應仁之熟也然所行者皆合中正之則而不流仁合於義也樂玩天理故所知者益深達乎命而不憂安於所處故所行者益篤根於性而能愛所謂樂天之志憂世之誠並行不悖者乃仁義合徳之至也若以旁行為知亦可但恐於行字稍礙範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體本義此聖人至命之事也範如鑄金之有模範圍匡郭也天地之化无窮而聖人為之範圍不使過於中道所謂裁成者也通猶兼也晝夜即幽明死生鬼神之謂如此然後可見至神之妙无有方所易之變化无有形體也此第四章言易道之大聖人用之如此集說韓氏伯曰方體者皆係於形器者也神則陰陽不測易則惟變所適不可以一方一體眀孔氏頴逹曰範謂模範圍謂周圍言聖人所為所作模範周圍天地之化又曰凡无方无體各有二義一者神則不見其處所云為是无方也二則周游運動不常在一處亦是无方也无體者一是自然而變而不知變之所由是无形體也二則隨變而往无定在一體亦是无體也邵子曰神者易之主也所以无方易者神之用也所以无體朱子語類云通乎晝夜之道而知通字只是兼乎晝夜之道而知其所以然又云神无方而易无體神便是在陰底又忽然在陽在陽底又忽然在陰易便是或為陽或為陰交錯代換而不可以形體拘也蔡氏清曰神无方易无體獨係之至命一條至命從窮理盡性上來乃窮理盡性之極致非窮理盡性之外他有所謂至命也故獨係之至命而自足以該乎窮理盡性林氏希元曰通乎晝夜之道而知只是通知晝夜之道蓋幽眀死生鬼神其理相為循環晝夜之道也聖人通知晝夜亦只是上文知幽眀之故知死生之說知鬼神之情狀而益深造與之相黙契如所謂知天地之化育云爾又曰天地之化萬物之生晝夜之循環皆有箇神易易則模寫乎此理者也故在易亦有神易姜氏寳曰晝夜之道乃幽眀死生鬼神之所以然聖人通知之而有以深徹乎其蘊又不但知有其故知有其說知冇其情狀而已也江氏盈科曰上說道濟天下敦仁能愛此則萬物盡屬其曲成上說知幽眀死生鬼神此則晝夜盡屬其通知案準是準則之相似是與之合德範圍則造化在其規模之内蓋一節深一節也萬物者天地之化之迹也曲成者能盡其性而物我聮為一體也晝夜者天地之化之機也通知者洞見原本而隱顯貫為一條也易者化之運用神者化之主宰天地之化其主宰不可以方所求其運用不可以形體拘易之道能範圍之則所謂窮神知化者也而神化在易矣一陰一陽之謂道本義陰陽迭運者氣也其理則所謂道集說邵子曰道無聲無形不可得而見者也故假道路之道而為名人之有行必由乎道一陰一陽天地之道也物由是而生由是而成者也程子曰離了陰陽便無道所以陰陽者是道也陰陽氣也氣是形而下者道是形而上者朱子語類云理則一而已其形者則謂之器其不形者則謂之道然而道非器不形器非道不立蓋陰陽亦器也而所以陰陽者道也是以一陰一陽往來不息而聖人指是以眀道之全體也案一陰一陽兼對立與迭運二義對立者天地日月之類是也即前章所謂剛柔也迭運者寒暑往來之類是也即前章所謂變化也繼之者善也成之者性也本義道具於陰而行乎陽繼言其𤼵也善謂化育之功陽之事也成言其具也性謂物之所受言物生則有性而各具是道也陰之事也周子程子之書言之備矣集說周子曰大哉乾元萬物資始誠之源也乾道變化各正性命誠斯立焉純粹至善者也故曰一陰一陽之謂道繼之者善也成之者性也大哉易也性命之源乎楊氏時曰繼之者善無閒也成之者性無虧也朱子語類云造化所以發育萬物者為繼之者善各正其性命者為成之者性又云繼是接續不息之意成是凝成有主之意又云繼之者善方是天理流行之初人物所資以始成之者性則此理各自有箇安頓處故為人為物或昏或眀方是定若是未有形質則此性是天地之理如何把作人物之性得又云這箇理在天地閒時只是善無有不善者生物得來方始名曰性只是這箇理在天則曰命在人則曰性性便是善問成之者性曰性如寶珠氣質如水水有淸有汙故珠或全見或半見或不見項氏安世曰道之所生無不善者元也萬物之所同出也善之所成各一其性者貞也萬物之所各正也成之者性猶孟子言人之性犬之性牛之性熊氏良輔曰天道流行發育萬物善之繼也元者善之長善即元也人物得所稟受者性之成也率性之謂道則性即道也潘氏士藻曰善者性之原性者善之實善性皆天理中閒雖有剛柔善惡中偏之不同而天命之本然無不同案聖人用繼字極精確不可忽過此繼字猶人子所謂繼體所謂繼志蓋人者天地之子也天地之理全付於人而人受之猶孝經所謂身體髪膚受之父母者是也但謂之付則主於天地而言謂之受則主於人而言惟謂之繼則見得天人承接之意而付與受兩義皆在其中矣天付於人而人受之其理既無不善則人之所以為性者亦豈有不善哉故孟子之道性善者本此也然是理既具於人物之身則其根原雖無不善而其末流區以别矣如下文所云仁知百姓者皆局於所受之偏而不能完其所付之全故程朱之言氣質者亦本此也夫子之言性與天道不可得而聞也惟繫傳此語為言性與天道之至後之論性者折中於夫子則可以息諸子之棼棼矣仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣本義仁陽知陰各得是道之一隅故隨其所見而目為全體也日用不知則莫不飲食鮮能知味者又其每下者也然亦莫不有是道焉或曰上章以知屬乎天仁屬乎地與此不同何也曰彼以淸濁言此以動靜言集說韓氏伯曰君子體道以為用仁知則滯於所見百姓則日用而不知體斯道者不亦鮮矣乎程子曰道者一陰一陽也動靜無端陰陽無始非知道者孰能識之動靜相因而成變化順繼此道則為善也成之在人則謂之性也在衆人則不能識隨其所知故仁者謂之仁知者謂之知百姓則由之而不知故君子之道人鮮克知也王氏宗傳曰仁者知者鮮克全之百姓之愚鮮克知之此豈在我之善有所不足在我之性有所不同與非也蓋在限量使然爾君子之道烏得而不鮮與君子者具仁知之成名得道之大全也朱子語類云萬物各具是性但氣稟不同各以其性之所近者窺之故仁者只見得他發生流動處便以為仁知者只見他貞靜處便以為知下此一等百姓日用之閒習矣而不察所以君子之道鮮矣胡氏炳文曰在造物者方發而賦於物其理無有不善在人物者各具是理以有生則謂之性其發者是天命之性其具者天命之性己不能不麗於氣質矣仁者知者百姓指氣質而言也上章說聖人之知仁知與仁合而為一此說知者仁者仁與知分而為二保氏八曰仁者見其有安土敦仁之理則止謂之為仁知者見其有知周天下之理則止謂之為知是局於一偏矣百姓終日由之而不知故君子之道知者鮮也顯諸仁藏諸用鼓萬物而不與聖人同憂盛徳大業至矣哉本義顯自内而外也仁謂造化之功徳之𤼵也藏自外而内也用謂機緘之妙業之本也程子曰天地无心而成化聖人有心而无為集說孔氏頴達曰顯諸仁者顯見仁功衣被萬物藏諸用者濳藏功用不使物知王氏凱沖曰萬物皆成仁功著也不見所為藏諸用也程子曰運行之迹生育之功顯諸仁也神妙無方變化無迹藏諸用也天地不與聖人同憂天地不宰聖人有心也天地无心而成化聖人有心而无為朱子語類云顯諸仁徳之所以盛藏諸用業之所以成譬如一樹一根生許多枝葉花實此是顯諸仁處及至結實一核成一箇種子此是藏諸用處生生不已所謂日新也萬物無不具此理所謂富有也又云惻隱羞惡辭遜是非只是這箇惻隱隨事𤼵見及至成那事時一事各成一仁此便是藏諸用其𤼵見時在這道理中𤼵去及至成這事時又只是這箇道理一事既各成一道理此便是業業是事之已成處事未成時不得謂之業吳氏澄曰仁者生物之元由春生而為夏長之亨此仁顯見而𤼵達於外長物之所顯者生物之仁也故曰顯諸仁用者收物之利由秋收而為冬藏之貞此用藏伏而歸復於内閉物之所藏者收物之用也故曰藏諸用二氣運行於四時之閒鼓動萬物而生長收閉之天地無心而造化自然非如聖人之於民有所憂而治之教之也仁之顯而生長者為德之盛用之藏而收閉者為業之大其顯者流行不息其藏者充塞無間此所謂易簡之善極其至者故賛之曰至矣哉胡氏炳文曰在聖人者則曰仁與知在造化者則曰仁與用俞氏琰曰仁本藏於内者也顯諸仁則自内而外如春夏之𤼵生所以顯秋冬所藏之仁也用本顯於外者也藏諸用則自外而内如秋冬之收成所以藏春夏所顯之用也富有之謂大業日新之謂盛徳本義張子曰富有者大而无外日新者久而无窮集說王氏凱冲曰物無不備故曰富有變化不息故曰日新吳氏澄曰生物之仁及夏而日長日盛故曰日新收物之用至冬而包括無餘故曰富有胡氏炳文曰富有者無物不有而無一豪之虧欠日新者無時不然而無一息之閒斷藏而愈有則顯而愈新生生之謂易本義陰生陽陽生陰其變无窮理與書皆然也成象之謂乾效法之謂坤本義效呈也法謂造化之詳宻而可見者集說蔡氏淵曰乾主氣故曰成象坤主形故曰效法極數知來之謂占通變之謂事本義占筮也事之未定者屬乎陽也事行事也占之已决者屬乎陰也極數知来所以通事之變張忠定公言公事有陰陽意蓋如此集說俞氏琰曰或言通變或言變通同與曰窮則變變則通易也通其變使民不倦聖人之用易也張氏振淵曰成象二條本生生之謂易来舉乾坤見天地閒無物而非陰陽之生生舉占事見日用間無事而非陰陽之生生谷氏家杰曰生生謂易論其理也有理即有數陰陽消息易數也推極之可以知来占之義也通數之變亦易變也變不與時偕極通之即成天下之事徐氏在漢曰一陰一陽無時而不生生是之謂易成此一陰一陽生生之象是之謂乾效此一陰一陽生生之法是之謂坤極一陰一陽生生之數而知來是之謂占通一陰一陽生生之變是之謂事陰陽不測之謂神本義張子曰兩在故不測此第五章言道之體用不外乎隂陽而其所以然者則未嘗倚於隂陽也集說朱子語類問陰陽不測之謂神便是妙用處曰便是包括許多道理横渠說得極好一故神横渠親註云兩在故不測只是這一物却周行事物之閒如所謂陰陽屈信往来上下以至行乎什伯千萬之中無非這一箇物事所謂兩在故不測丘氏富國曰上章言易无體此言生生之謂易唯其生生所以无體上章言神无方此言陰陽不測之謂神唯其不測所以無方言易而以乾坤繼之乾坤毁則无以見易也梁氏寅曰陰陽非神也陰陽之不測者神也一陰一陽變化不窮果孰使之然哉蓋神之所為也惟神无方故易旡體无方者即不測之謂也无體者即生生之謂也若為有方則非不測之神而其生生者亦有時而窮矣蔡氏清曰合一不測為神不合不謂之一不一不為兩在不兩在不為不測合者兩者之合也神化非二物也故曰一物兩體也總論程氏敬承曰此章承上章説来上言彌綸天地之道此則直指一陰一陽之謂道上言神无方易无體此則直指陰陽之生生謂易陰陽不測謂神案程氏以此為申說上章極是然只舉其首尾天地之道及神易兩端而已須知繼善成性見仁見知即是申說與天地相似一節意顯仁藏用盛德大業即是申說範圍天地之化一節意見仁見知之偏所以見知仁合徳者之全也顯為晝藏為夜鼓萬物而無憂所以見通知晝夜曲成萬物以作易者之有憂患也夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之閒則備矣本義不禦言无盡靜而正言即物而理存備言无所不有案逺近是横說天地之閒是直說理極於無外故曰逺性具於一身故曰近命者自天而人徹上徹下故曰天地之閒不禦者所謂彌綸也靜正者所謂相以也備者所謂範圍也夫乾其靜也専其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉本義乾坤各有動靜於其四德見之靜體而動用靜别而動交也乾一而實故以質言而曰大坤二而虗故以量言而曰廣蓋天之形雖包於地之外而其氣常行乎地之中也易之所以廣大者以此集說孔氏穎達曰若氣不𤼵動則靜而専一故云其靜也専若其運轉則四時不忒寒暑無差剛而得正故云其動也直以其動靜如此故能大生焉閉藏翕歛故其靜也翕動則開生萬物故其動也闢以其如此故能廣生於物焉程子曰乾陽也不動則不剛其靜也専其動也直不専一則不能直遂坤陰也不靜則不柔其静也翕其動也闢不翕聚則不能𤼵散朱子語類云天是一箇渾淪底物雖包乎地之外而氣則迸出乎地之中地雖一塊物在天之中其中實虛容得天之氣迸上来大生是渾淪無所不包廣生是廣濶能容受得那天之氣専直則只是一物直去翕闢則是兩箇翕則翕闢則闢此竒耦之形也又云乾靜専動直而大生坤靜翕動闢而廣生這說陰陽體性如此卦畫也髣髴似恁地乾畫竒便見得其靜也専其動也直坤畫耦便見得其靜也翕其動也闢吳氏澄曰翕謂合而氣之専者藏乎此闢謂開而氣之直者出乎此胡氏炳文曰乾惟健故一以施坤惟順故兩而承靜専一者之存動直一者之達靜翕兩者之合動闢兩者之分一之達所以行乎坤之兩故以質言而曰大兩之分所以承乎乾之一故以量言而曰廣林氏希元曰此推易之所以廣大也乾坤萬物之父母也乾坤各有性氣皆有動靜乾之性氣其靜也専一而不他惟其専一而不他則其動也直遂而無屈撓惟直遂而無屈撓則其性氣之𤼵四方八表無一不到而規模極其大矣故曰大生焉坤之性氣其靜也翕合而不洩惟其翕合而不洩則其動也開闢而無閉拒惟其開闢而無閉拒則乾氣到處坤皆有以承受之而度量極其廣矣故曰廣生焉乾坤即天地也大生廣生皆就乾坤說易書之廣大則模冩乎此不可以本文廣大作易書案此節是承上節廣矣大矣而推言天地之所以廣大者一由於易簡故下節遂言易書廣大配天地而結歸於易簡也靜専動直是豪無私曲形容易字最盡靜翕動闢是豪無作為形容簡字最盡易在直處見坦白而無艱險之謂也其本則從専中來簡在闢處見開通而無阻塞之謂也其本則從翕中來廣大配天地變通配四時陰陽之義配日月易簡之善配至德本義易之廣大變通與其所言陰陽之說易簡之徳配之天道人事則如此此第六章集說孔氏穎達曰初章易為賢人之德簡為賢人之業今總云至徳者對則徳業别散則業由徳而來俱為徳也吳氏澄曰易書廣大之中有變通焉有陰陽之義焉亦猶天地之有四時日月也四時日月即天地猶易之六子即乾坤也易之廣大變通陰陽皆易簡之善為之主宰而天地之至德亦此易簡之善而已是易書易簡之善配乎天地之至德也業此上三章申變化者進退之象一節之義首言易能彌綸天地之道而所謂幽眀死生神鬼之理即進退晝夜之機也次言易與天地相似而所謂仁義之性即三極之道也又言易能範圍天地之化蓋以其賛天地之化育而又知天地之化育則三極之道進退晝夜之機一以貫之矣窮理盡性以至於命則神化之事備此易之藴也既乃一一申明之所謂天地之道者一隂一陽之謂也所謂天地之性者一仁一智之謂也所謂天地之化者一顯一藏以鼓萬物之謂也所謂易无體者生生之謂也著於乾坤形乎占事者皆是而所謂神无方者則陰陽不測之謂也終乃總而極賛之謂易之窮理也逺不禦其盡性也靜而正其至命也於天地之間備矣又推原其根於易簡之理靜専動直易也靜翕動闢簡也易簡之理具於三極之道而行乎進退晝夜之間故易者統而言之廣大配天地也析而言之變化者進退之象變通配四時也剛柔者晝夜之象陰陽之義配日月也六爻之動三極之道易簡之善配至徳也御纂周易折中卷十三

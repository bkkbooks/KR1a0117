body:
  text: 欽定四庫全書御纂周易折中凡例一易經二篇傳十篇在古元不相混費直王弼乃以傳附經而程子從之至呂大防晁說之呂祖謙諸儒以為應復其舊朱子本義所據者祖謙本也明初程傳朱義並用而以世次先程後朱故脩大全書破析本義以從程傳之序今案易學當以朱子為主故列本義於先而經傳次第則亦悉依本義原本庶學者由是以復見古經不至習近而忘本也一諸儒所論易書作述傳授以及易理之奥易義之綱學者讀易之方說者同異之槩皆後學所宜先知也大全有綱領一篇止存程朱之說今案周子張子邵子皆於易理精䆳雖無說經全書而大義微言往往獨得又厯代諸儒叙述源流講論指趣其說皆不可廢並以世次義類叙為三篇不獨與程朱之言互相發明亦以見程朱之書有源有委合古今以為公非夫師心立異者比也一易辭有義例據夫子彖傳象傳求之皆可推見自王氏略例以後諸儒皆有發明而未詳備今稍為之臚列分析示學者觀象玩辭之要蓋全經之大凡故與綱領並叙卷首一大全書所采諸家之說惟宋元為多今所収上自漢晉下迄元明使二千年易道淵源皆可覽見列朱義於前者易之本義朱子獨得也程傳次之者易之義理程子為詳也二子實繼四聖而有作故以其書系經後其餘漢晉唐宋元明諸儒所得有淺深所言有粹駁並采其有益於經者又系朱程之後其或所言與朱程判然不合而亦可以備一說廣多聞者别標為附録以終之稽異闕疑用俟後之君子是亦朱子之志也一漢晉間說易者大抵皆滛於象數之末流而離其宗故隋唐後惟王弼孤行為其能破互卦納甲飛伏之陋而專於理以譚經也然弼所得者乃老莊之理不盡合於聖人之道故自程傳出而弼說又廢今案溺於象數而枝離無根者固可棄矣然易之為書實根於象數而作非他書專言義理者比也但自焦贛京房以來穿鑿太甚故守理之儒者遂鄙象數為不足言至康節邵子其學有傳所發明圖卦蓍策皆易學之本根豈可例以象數目之哉故朱子表章推重與程子並稱本義之作實参程邵兩家以成書也後之學者言理義言象數但折中於朱子可矣近代觧經者猶多拾術數之緒餘以矜其竒僻而不知其非數之真也陳事理之糟粕而入於迂淺而不知其失理之妙也凡若此者皆刪不録以還潔静精微之舊焉一朱子之學出自程子然文義異同者甚多諸經皆然不獨易也況易則程以為聖人說理之書而朱以為聖人卜筮之教其指趣已自不同矣然程子所說皆脩齊治平之道平易精實有補學者朱子亦謂所作本義簡略以義理程傳既備故也今經傳之說先以本義為主其與程傳不合者則稍為折中其異同之致傳義之外厯代諸儒各有所發朋足以佐傳義所未及者又参合而研覈之並為折中以系於諸說之後或前人之所未言朕亦時出已意参錯其閒鑽仰髙堅何敢自信庶幾體先賢虚公無我之意求合乎此理殊塗同歸之宗云一啟䝉為朱子成書與本義相表裏今大全中所載圖說數條乃作本義時略撮大要以冠篇端卦變一圖則又因本義卦下有以卦變為說者故作此以明之與占筮卦變異法總不若啟䝉之詳備也大全以圖說為主而采啟䝉以附其下且又但采其本圖書原卦畫二篇至明蓍策考變占二篇則文既不録圖亦不載但以筮時儀節及不同法之卦變當之使學者不見朱子極論象數之全未免疏略今以啟䝉全編具載書後庶㡬古人右書左圖之意朕講學之外於厯象九章之奥遊心有年渙然知其不出易道故自河洛本原先後天位置以至大衍推迎之法皆稍為摹畫分析敷暢厥㫖附於啟䝉之後目曰啟䝉附論一夫子十翼以序卦雜卦終編其次第微密錯雜成章諸儒置而不講已乆朕因陳希夷反覆九卦之指而思序卦之義因邵康節四象相交成十六事之言而悟雜卦之根始知聖意微妙聖言精深引而不發如衆曜之羅列七緯之交錯参差淩亂有待於仰觀推歩者之能求其故也故為序卦雜卦明義次於啟䝉附論之後而終編焉

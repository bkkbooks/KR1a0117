body:
  text: 欽定四庫全書御纂周易折中卷二十一啓蒙附論朱子之作啓蒙蓋因以象數言易者多穿穴而不根支離而無據然易之為書實以象數而作又不可畧焉而不講也且在當日言圖書卦畫蓍數者皆創為異論以毁成法師其獨智而訾先賢故朱子述此篇以授學者以為欲知易之所以作者於此可得其門户矣今摭圖書卦畫蓍數之所包藴其錯綜變化之妙足以發朱子未盡之意者凡數端各為圖表而繫之以説蓋所以見圖書為天地之文章立卦生蓍為聖神之制作萬理於是乎根本萬法於是乎權輿斷非人力私智之所能參而世之紛紛撰擬屑屑疑辨皆可以熄矣大傳言河圖曰一二曰三四曰五六曰七八曰九十則是以兩相從也大戴禮言洛書曰二九四曰七五三曰六一八則是以三相從也是故原河圖之初則有一便有二有三便有四至五而居中有六便有七有八便有九至十而又居中順而布之以成五位者也原洛書之初則有一二三便有四五六有四五六便有七八九層而列之以成四方者也若以陽動隂静而論則數起於上故河圖之一二本在上也三四本在右也六七本在下也八九本在左也洛書之一二三四五六七八九本自上而下也於是陽數動而交易隂數静而不遷則成河圖洛書之位矣如以陽静隂動而論則數起於下故河圖之一二本在下也三四本在左也六七本在上也八九本在右也洛書之一二三四五六七八九本自下而上也於是陽數静而不遷隂數動而交易則又成河圖洛書之位矣蓋其以兩相從者如有天則有地也有君則有臣也有夫則有婦也以三相從者如有天地則有人也有君臣則有民也有父母則有子也陽動隂静者如乾君而坤藏也君令而臣從也夫行而婦順也自上而下以用而言者也陽静隂動者如乾主而坤役也君逸而臣勞也父安居而妻子勤職也自内而外以體而言者也同本相從以成合一之功動静相資以播生成之化造化人事之妙窮於此矣先後天圖象之精藴莫不於此乎出也自洛書以三三積數為數之原而自四以下皆以為法焉何則三者天數也故其象圓如前圖居四方與居四隅者或動或静居中者一定不易而各成縱横皆十五之數矣四者地數也故其象方如後圖居中居四隅與居四方者或動或静亦各成縦横皆三十四之數矣自五五以下皆以三三圖為根自六六以下皆以四四圖為根而四四圖又實以三三圖為根故洛書為數之原不易之論也今附四四圖如左以相證眀其餘具數學中不悉載四八十二十六四九五十六十三八十二一三七十一十五十四七十一二三十六十五二六十十四十五六十三二十一七十四一五九十三一十二八十三十六五九四此以十六數自左而右自上而下列之第一圖其居中與居四隅者不易而居四方者交易則成縱横皆三十四之數第二圖若居四方者不易而居中與居四隅者交易亦成縦横皆三十四之數第三圖十三九五一十三八十二一四九五十六十四十六二三十六十五十四七十一二十五十一七三二十一七十四十五六十三十六十二八四十六五九四一十二八十三此以十六數自右而左自下而上列之第一圖用前法變為兩圖第二圖第三圖竝得縱横皆三十四之數但其不易者即前之交易者而其交易者即前之不易者此第二圖同前第三圖此第三圖同前第二圖盖亦隂陽互為動静之理云大𫝊曰天一地二天三地四天五地六天七地八天九地十天地之數皆自少而多多而復還於少此加減之原也又曰參天兩地而倚數天數以三行地數以二行此乗除之原也是故河圖以一二為數之體之始洛書以三二為數之用之始然洛書之用始於參兩者以參兩為根也實則諸數循環互為其根莫不寓乗除之法焉而又皆以加減之法為之本今推得洛書加減之法四乗除之法十六積方之法五句股之法四各為圖表以眀之如左洛書加減四法一用奇數左旋相加得相連之耦數一加三為四六九加七為十三加九為十二七加一為八若用奇數減左旋相連之耦數得右旋相連之奇數三減四為一九七減十六為九減十二為三一減八為七一用耦數左旋相加得相連之耦數二加六為八二八加四為十六加八為十四四加二為六若用耦數減左旋相連之耦數得右旋相連之耦數六減八為二八四減十二為八減十四為六二減六為四一用奇數右旋加耦數得相連之奇數一加六為七三九加四為十七加二為九一三加八為十若用奇數減相連之奇數得相連之耦數一減七為六四九減十三為七減九為二八三減十一為一用耦數右旋加奇數得相對之奇數二加九為十一八加一為九四加三為七三六加七為十若用奇數減相對之奇數得相連之耦數九減十一為二一減九為八三減七為四六七減十三為洛書乗除十六法一用三左旋乗奇數得相連之奇數三三如九一三七二十三九二十七三一如三一用八左旋乗耦數得相連之耦數八八六十四八二一十六八四三十二八六四十八一用三左旋乗耦數得相連之耦數三四一十二三六一十八三二如六四三八二十一用八左旋乗奇數得相連之耦數八三二十四八七五十六八九七十二八一如八一用二右旋乗耦數得相連之耦數二二如四六二八一十二四如八二二六一十一用七右旋乗奇數得相連之奇數七七四十九七三二十一七九六十三七一如七一用二右旋乗奇數得隔二位之耦數二九一十八二一如二二三如六四二七一十一用七右旋乗耦數得相連之耦數七二一十四七八五十六七四二十八七六四十二一用一乗奇數得本位之奇數一一如一一九如九一三如三一七如七一用六乗耦數得本位之耦數六六三十六六四二十四六八四十八六二一十二一用一乗耦數得本位之耦數一二如二一八如八一四如四一六如六一用六乗奇數得相連之耦數六七四十二六三一十八六九五十四六一如六一用四乗耦數得相對之耦數四四一十六四二如八四六二十四四八三十二一用九乗奇數得相對之奇數九九八十一九三二十七九一如九三九七六十一用四乗奇數得隔二位之耦數四九三十六四一如四四七二十八四三一十二一用九乗耦數得相對之耦數九二一十八九四三十六九八七十二九六五十四凡除法除其所得之數得其所乗之數洛書乗除十六法可約為八法何則五者河洛之中數自此以上由五以生五加一為六六減五為一是六與一同根也五加二為七七減五為二是七與二同根也三八四九其理如之今用三與八左旋乗竒耦而皆得相連之奇耦可以知八即三矣用二與七右旋乗奇耦而皆得相連之奇耦可以知七即二矣内惟二乗竒數得隔二位之耦數者其所得即相連奇位同根之數猶之乎相連也如二九一十八八與三同根得八猶之得相連之三也餘放此用一與六乗而皆得本位之奇耦可以知六即一矣内惟六乗奇數得相連之耦數者其所得即本位同根之數猶之乎本位也如六七四十二七與二同根得二猶之得本位之七也餘放此用四與九乗而皆得對位之奇耦可以知九即四矣内惟四乗奇數得隔二位之耦數者其所得即對位同根之數猶之乎對位也如四九三十六六與一同根得六猶之得對位之一也餘放此其但得同根之數者何凡奇乗耦耦乗耦所得皆耦數而同如三四一十二八四亦三十二奇乗奇其得數為奇若耦乗奇不能得奇數而同故但得其同根之耦數也如三三為九八三二十四九與四同根得四猶之得九也所以一六二七三八四九在河圖則四方之相配在洛書則正隅之相連以其數之生於中五而同根也數有合數有對數合數生於五對數成於十一六二七三八四九此合數也皆相減而為五者也一九二八三七四六此對數也皆相併而為十者也在河圖則合數同方而對數相連在洛書則合數相連而對數相對相合之相從者六從一也七從二也八從三也九從四也如前乗除十六法相對之相從者九從一也八從二也七從三也六從四也如後積方五法凡以合數共乗一數所得之數必同乗耦既同數乗竒則同根若各自乗焉則又必合矣如三三得九八八六十四以對數共乗一數所得之數必對如三三得九七三二十一若各自乗焉則又必同矣如一一得一九九亦八十一二二得四八八亦六十四是以自乗之數相合之相從者此得自數則彼亦得自數也如一得一六得六此得對數則彼亦得對數也如四得六九得一此得連數則彼亦得連數也如三得九八亦得四二得四七亦得九相對之相從者此得自數則彼得對數也如一得一九亦得一六得六四亦得六此得連數則彼亦得連數也如三得九七亦得九二得四八亦得四要皆㑹於一六四九而齊焉故開平方之自乗數止於一六四九而洛書之位一六四九居上下以為經二七三八居左右以為緯者此也洛書對位成十互乗成百圖一與九對成十十自乗其積一百九自乗八十一一自乗一一乗九九乗一俱為九共十八合之一百與十自乗積同二與八對成十八自乗六十四二自乗四二乗八八乗二俱十六共三十二合之一百三與七對成十七自乗四十九三自乗九三乗七七乗三俱二十一共四十二合之一百四與六對成十六自乗三十六四自乗十六四乗六六乗四俱二十四共四十八合之一百中五含五成十五自乗二十五又五自乗二十五又五互乗各二十五共五十合之一百洛書句股圖句三股四弦五句九股十二弦十五句二十七股三十六弦四十五旬八十一股一百零八弦一百三十五此洛書四隅合中方而寓四句股之法者推之至於無窮法皆視此河圖之數五十有五洛書之數四十有五合為一百此天地之全數也以一百之全數為斜界而中分之則自一至十者積數五十有五自一至九者積數四十有五二者相交而成河洛數之兩三角形矣凡積數自少而多必以三角而破百數之全方以為三角其形不離乎此二者下諸圖之根實出於此河圖之數自一至十洛書之數自一至九象之已分者也圖則生數居内成數居外書則竒數居正耦數居偏位之已變者也如前圖破全方之百數以為河洛二數又就㸃數十位中涵羃形之九層以為河洛合一之數則雖其象未分其位未變而隂陽相包之理三極互根之道己粲然黙寓於其中矣故為分析以明之如後論㸃數應河圖十位周圍三角分三重中一重九次内一重二九一十八外一重三九二十七除中心凡五十四若自上而下作三層亦如之中含六角亦分三重中一重六次内一重二六一十二外一重三六一十八除中心凡三十六若自上而下作三層亦如之冪形應洛書九位周圍三角分三重中一重九次内一重三九二十七外一重五九四十五凡八十一若自上而下作三層亦如之中含六角亦分三重中一重六次内一重三六一十八外一重五六三十凡五十四若自上而下作三層亦如之以上諸圖本同一根雖積數若異而其為九六之變則一也九六可分為内外中之三重亦可分為上下中之三層就毎重毎層論之則九為天而包地六為地而涵於天心為人而主乎天地統三重而論之則外為天内為地而中為人也統三層而論之則上為天下為地而中為人也又合而論之則九六者在天為隂陽在地為剛柔在人為隂陽剛柔之㑹而其心則天地人之極也以上下分者其心有三所謂三極之道三才各具一太極也以内外分者其心惟一所謂人者天地之心三才統體一太極也此圖之中渾具理象數之妙者如此故分而為圖則應乎隂陽剛柔之義根於極而迭運不窮聖人則之易有太極是生兩儀陽九隂六命爻衍䇿者此也分而為書則應乎三才之義主於人而成位其中聖人則之皇極既建彛倫攸敘參天貳地垂範作疇者此也㦯曰河圖洛書出於兩時分為兩象今以一圖括之可乎曰十中涵九故數終於十而位止於九此天地自然之紀而圖書所以相經緯而未嘗相離也非有十者以為之經則九之體無以立非有九者以為之緯則十之用無以行不知圖書之本為一者則亦不知其所以二矣㦯曰河圖洛書有定位矣今以為有未變者何與曰易大傳之言河圖也曰天一地二天三地四天五地六天七地八天九地十順而數之此其未變者也又曰天數五地數五五位相得而各有合分而置之此其定位者也如易卦一每生二以至六十有四則其未變者也乾南坤北離東坎西則其定位者也不知未變之根則亦不足以識定位之妙矣此圖左方注者本數也自一至九而用數全矣中列注者加數也一加二為三二加三為五至於八加九而為十七皆以本數遞加而每層之冪積如之右方注者乗數也一自乗一其冪積一二自乗四其羃積合一三兩層而為四至於九自乗八十一則其羃積亦合自一至十七九層之數而為八十一皆以本數自乗而每形之冪積如之得加乗之法則減除在其中矣自此而衍之至於無窮其數無不合焉推之九章之術其理無不貫焉今考洛書縦横逆順無徃不得加減乗除之法開方句股之算乃自其未變之先而諸法渾具至洛書而始盡其參伍錯綜之致云爾凡有數則有象象不離乎數也萬象起於方圓而測方圓者以三角此句股所以為算之宗也圓者天象方者地象三角形者人象何則天之道如環無端故其象圓也地之道奠定有常故其象方也人受性於天受形於地猶三角之形其心則圓之心其邊則方之邊也今就九數而三分之則一者圓之根也而十數之内惟六角八角為有法之圓形其自十以後角愈多以至於無角者視此矣此一六八所以為圓象之數也二者方之根也而十數之内惟四與九可以積成方面其自十以後積愈多而皆可成方者視此矣此二四九所以為方形之數也以十數裁為三角自一至四則三其心也自一至七則五其心也自一至十則七其心也所謂三角求心之法者如是其自十以後數愈多而皆可以求心者視此矣此三五七所以為三角形之數也洛書之位一六八居下為天道之下濟二四九居上為地道之上行三五七居中為人道之中處其數其象亦於圖形乎有合矣先後天隂陽卦圖陽先天隂陽後天隂先天之陽卦曰震離兑乾其隂卦曰巽坎艮坤後天之陽卦曰乾震坎艮其隂卦曰坤巽離兌不同何也盖先天分隂陽卦自兩儀而分之由陽儀以生者皆陽卦也由隂儀以生者皆隂卦也後天分隂陽卦自爻畫以定之其以陽為主者皆陽卦也其以隂為主者皆隂卦也先天則因乎畫卦之序而中分之後天則卦之已成觀其爻畫之多寡而命之也其理如何曰陽儀上有隂卦此所謂立天之道曰隂與陽也隂儀上有陽卦此所謂立地之道曰柔與剛也其法象之自然者如何曰火之炎熱光眀其為陽也眀矣澤者水之積濕為陽氣所驅以滋潤萬物者也是亦陽也水之幽暗寒肅其為隂也眀矣山者土之隆起與地為一體者也是亦隂也是故先天之卦隂陽之象之正也其變而後天則火與澤從風而俱為隂水與山從雷而俱為陽盖有由矣凡隂陽之氣未有不合而成者也然有感應先後之别焉先有陽而遇隂者屬陽先有隂而遇陽者屬隂有陽氣在下將發而遇隂壓之則奮而為雷矣有陽氣在中將散而遇隂包之則鬱而為雨矣有陽氣直騰而上而遇隂承之則止而為山矣此皆主於陽而遇隂所以皆為陽卦也有隂在内陽氣必入而散之觀之隂霾盡而後風息可見也有隂在中陽氣必附而散之觀之薪芻盡而後火滅可見也有隂在外陽氣必敷而散之觀之濕潤盡而後澤竭可見也此皆主於隂而遇陽所以皆為隂卦也總而論之惟乾純陽坤純隂不可變也雷陽動之始風隂生之始亦不可變也火温煖澤發散故以用言之則陽然火根於隂之燥澤根於隂之濕故以體言之則隂水寒凉山凝固故以用言之則隂然水根於陽之嘘而流山根於陽之矗而起故以體言之則陽先天之象著其用也後天之象探其根也正如仁之發生為陽而其柔和亦可以為隂義之收斂為隂而其剛決亦可以為陽隂陽本一氣而互根故其理並行而不悖也造化所以為造化者天地水火而已矣易卦雖有八而實惟四何則風即天氣之吹嘘而下交於地者也山即地形之隆起而上交於天者也雷即火之鬱於地中而搏擊奮發者也澤即水之聚於地上而布散滋潤者也道家言天地日月釋氏言地水火風西人言水火土氣可見造化之不離乎四物也故先天以南北為經而天地居之體也以東西為緯而水火居之用也後天則以天地為體而居四維以水火為用而居四正雷者火之方發故動於春及火播其氣則王於夏矣澤者水之未收故散於秋及水歸其根則王於冬矣水火為天地之用故居四正以司時令也天氣眹兆於西北至東南而下交於地易所謂天下有風姤也故乾巽相對而為天綱地功致役於西南至東北而上交於天易所謂天在山中大畜也故坤艮相對而為地紀天地為水火之體故居四維以運樞軸也天地水火體用互根以生成萬物此先後天之妙也若以卦畫論之則震即離也一隂閉之於上則為震兑即坎也一陽敷之於下則為兑巽即乾也一隂行於下則為巽艮即坤也一陽亘於上則為艮是以六十四卦始乾坤中坎離而終於既未濟則知造化之道天地水火盡之矣此圖先天凡四變而為後天也盖火之體隂也其用則陽而天用之故乾中畫與坤交而變為離水之體陽也其用則隂而地用之故坤中畫與乾交而變為坎火在地中隂氣自上壓之而奮出則雷之動也故離上畫與坎交而變為震水聚地上陽氣自下敷之而滋潤則澤之說也故坎下畫與離交而變為兌陽感於隂則山出雲是山者雷與澤之上下相感者也故震以上下畫與兌交而變為艮隂感於陽而水生風是風者澤與雷之上下相感者也故兌以上下畫與震交而變為巽風本天氣也因與山交而入其下則下與地接故巽以上二爻與艮下二爻交而變為坤山本地質也因與風交而出其上則上與天接故艮以下二爻與巽上二爻交而變為乾或曰此於經書有徴乎曰在易天與火同人是天以火為用也水與地比是地以水為用也離為火亦為電易曰雷電合而章又曰雷電皆至是雷與火一氣也澤有水則為節澤无水則為困是澤與水一物也周禮云日西則多隂蓋西方積山故多雲雷今之近嶂者皆然也又云日東則多風蓋東方積澤故多風颶今之濱海者皆然也莊周云大塊噫氣其名為風是風與地氣相接也禮登山以祭升中於天是山與天氣相接也夫天地水火者一隂一陽而已其情則交易而相通其體則變易而無定故先天交變以成後天莫不各得其位而妙其化各從其類而歸其根也豈偶然哉圖之左方陽内隂外即先天之震離兑乾陽長而隂消也其右方隂内陽外即先天之巽坎艮坤隂長而陽消也蓋所以象二氣之交運也圖之一六為水居北即後天之坎位也三八為木居東即後天震巽之位也二七為火居南即後天之離位也四九為金居西即後天兌乾之位也五十為土居中即後天之坤艮周流四季而偏旺於丑未之交也盖所以象五行之順布也先天卦配洛書之數圖九八七六四三二一乾震坎艮兑離巽坤直列洛書九數而虚其中五以配八卦陽上隂下故九數為乾一數為坤因自九而逆數之震八坎七艮六乾生三陽也又自一而順數之巽二離三兑四坤生三隂也以八數與八卦相配而先天之位合矣火上水下故九數為離一數為坎火生燥土故八次九而為艮燥土生金故七六次八而為兑為乾水生濕土故二次一而為坤濕土生木故三四次二而為震為巽以八數與八卦相配而後天之位合矣洛書之左邊本一二三四也其右邊本九八七六也然隂陽之道丑未之位必交洛書之二與八正東北西南之維丑未之位此其所以互易也以此類之則先天圖之左方坤巽離兑其右方乾震坎艮以震巽互而成先天也後天圖之左方坎坤震巽其右方離艮兑乾以艮坤互而成後天也據先儒説圖書出有先後又或謂並出於伏羲之世然皆不必深辨先聖後聖其揆一也况天地之理雖更萬年豈不合契哉洛書晚出而其理不妨已具於河圖之中是故以易象推配亦無往而不合也先天圖者序卦之根也序卦之法以兩卦相對為義有相對而翻覆不可變者乾坤坎離頤大過中孚小過是也有相對而翻覆可變者屯蒙以後既未濟以前五十六卦皆是也就五十六卦之中則翻覆而二體不易者十二卦需訟師比泰否同人大有晉眀夷既未濟也翻覆而二體皆易者十二卦隨蠱咸恒損益震艮漸歸妹巽兑也其翻覆而止於一體易者三十二卦則自屯蒙至渙節皆是也蓋翻覆而不可變者法八卦之乾坤坎離也翻覆而可變者法八卦之震艮巽兑也就翻覆可變之中其二體不易者又皆乾坤坎離相交者也其一體不易者亦皆交於乾坤坎離者也惟震艮巽兑相交之卦則二體皆易焉頤中孚大過小過雖為震艮巽兌相交之卦而翻覆不可變者頤中孚具離之象大過小過具坎之象也故序卦以之附於坎離既未濟為其具離坎之象焉爾先天圖八卦兩兩相對序卦之根也乾與坤對坎與離對震與巽對艮與兑對相對而不相變所以定序卦之體也然既相對則必相交四正之卦相交則雖翻覆而其體不易四維之卦相交則翻覆而其體遂易矣若四正之卦與四維之卦雜交則易者半不易者半所以極序卦之用也是故天地定位上經所以始於乾坤中於否泰也山澤通氣雷風相薄下經所以始於咸恒中於損益也水火不相射上下經所以終於坎離既未濟也艮下去一隂上生一隂則為坎坎下去一隂上生一隂則為震震下去一陽上生一陽復為艮乾下去一陽上生一陽仍為乾兌下去一陽上生一陽則為離離下去一陽上生一陽則為巽巽下去一隂上生一隂復為兑坤下去一隂上生一隂仍為坤艮下去一隂上生一陽為巽坎下去一隂上生一陽為離震下去一陽上生一隂為坤乾下去一陽上生一隂為兑兌上去一隂下生一陽為乾離上去一陽下生一隂為坎巽上去一陽下生一隂為艮坤上去一隂下生一陽為震後天圖者雜卦之根也雜卦即互卦也互卦之法㦯上去一畫而下生一畫㦯下去一畫而上生一畫則其體遂變矣互體所成凡十六卦其陽卦從陽卦隂卦從隂卦者八乾坤頤大過蹇解家人睽也其陽卦交隂卦隂卦交陽卦者亦八剝復夬姤漸歸妹既未濟也以交互之法求之乾而上去一陽下生一陽㦯下去一陽上生一陽仍是乾矣坤而上去一隂下生一隂㦯下去一隂上生一隂仍是坤矣惟震而上去一隂下生一隂則變為坎下去一陽上生一陽則變為艮巽而上去一陽下生一陽則變為離下去一隂上生一隂則變為兌坎而上去一隂下生一隂則變為艮下去一隂上生一隂則變為震離而上去一陽下生一陽則變為兌下去一陽上生一陽則變為巽艮而上去一陽下生一陽則變為震下去一隂上生一隂則變為坎兌而上去一隂下生一隂則變為巽下去一陽上生一陽則變為離此八變者皆陽得陽卦隂得隂卦故乾之變則乾也坤之變則坤也震之變則雷水解也山雷頤也巽之變則風火家人也澤風大過也坎之變則水山蹇也雷水解也離之變則火澤睽也風火家人也艮之變則山雷頤也水山蹇也兌之變則澤風大過也火澤睽也皆因其能相變故能相合也又乾而上去一陽下生一隂則變為巽下去一陽上生一隂則變為兌坤而上去一隂下生一陽則變為震下去一隂上生一陽則變為艮震而上去一隂下生一陽則變為兌下去一陽上生一隂則變為坤巽而上去一陽下生一隂則變為艮下去一隂上生一陽則變為乾坎而上去一隂下生一陽㦯下去一隂上生一陽皆變為離離而上去一陽下生一隂㦯下去一陽上生一隂皆變為坎艮而上去一陽下生一隂則變為坤下去一隂上生一陽則變為巽兌而上去一隂下生一陽則變為乾下去一陽上生一隂則變為震此八變者皆陽得隂卦隂得陽卦故乾之變則天風姤也澤天夬也坤之變則地雷復也山地剥也震之變則雷澤歸妹也地雷復也巽之變則風山漸也天風姤也坎之變則既濟也未濟也離之變則未濟也既濟也艮之變則山地剝也風山漸也兌之變則澤天夬也雷澤歸妹也亦皆因其能相變故能相合也易互卦之法盡於此此其卦所以止於十六也後天圖八卦隂陽上下畫互變雜卦之根也何則後天之卦有各從其類以相變者焉有各得其對以相變者焉乾居西北而三陽從之坤居西南而三隂従之此各從其類者也乾與巽對坎與離對艮與坤對震與兑對此各得其對者也相從者除乾坤純陽純隂不變外坎而上去一隂下生一隂則為艮艮而上去一陽下生一陽則為震震而上去一隂下生一隂則復為坎此三陽相次之序也巽而上去一陽下生一陽則為離離而上去一陽下生一陽則為兑兑而上去一隂下生一隂則復為巽此三隂相次之序也相對者乾而上去一陽下生一隂則為巽坎而上去一隂下生一陽則為離艮而上去一陽下生一隂則為坤震而上去一隂下生一陽則為兑此四陽卦變為對位四隂卦之序也巽而下去一隂上生一陽則為乾離而下去一陽上生一隂則為坎坤而下去一隂上生一陽則為艮兑而下去一陽上生一隂則為震此四隂卦變為對位四陽卦之序也然尋其對位相變之根則又自父母男女長少而來蓋四隂卦兑為最少離為中巽為長坤為老四陽卦艮為最少坎為中震為長乾為老凡變者自少而老故兑而上去一隂下生一陽則變為乾矣離而上去一陽下生一隂則變為坎矣巽而上去一陽下生一隂則變為艮矣坤而上去一隂下生一陽則變為震矣四陽卦之變自隂而來故又變而為對位之四隂也艮而下去一隂上生一陽則變為巽矣坎而下去一隂上生一陽則變為離矣震而下去一陽上生一隂則變為坤矣乾而下去一陽上生一隂則變為兑矣四隂卦之變自陽而來故又變而為對位之四陽也合而觀之凡陽卦相變者震變坎艮也坎變震艮也艮又變震坎也凡隂卦相變者巽變離兑也離變巽兑也兑又變巽離也凡陽卦變隂卦者乾變巽兑也震變坤兑也坎變離也艮變坤巽也凡隂卦變陽卦者坤變震艮也巽變乾艮也離變坎也兑變乾震也易中所謂互卦者止於此而其錯綜次序皆具於後天也大衍圓方之原凡方圓可為比例惟徑七者方周二十八圓周二十二即兩積相比例之率也用其半故若十四與十一合二十八與二十二共五十是大衍之數函方圓同徑兩周數大衍句股之原句三其積九股四其積十六弦五其積二十五合之五十是大衍之數函句股弦三面積蓍䇿之數必以七為用者盖方圓之形惟以徑七為率則能得周圍之整數句股之形亦惟以三四為率則能得斜弦之整數徑七固七也句三股四之合亦七也是故論方圓周圍之合數則五十論句股弦之合積亦五十此大衍之體也因而開方則不盡一數而止於四十九此大衍之用也開方而不盡一數則蓍䇿之虚一者是已方面之中函八句股而又不盡一數則蓍䇿之掛一者是已惟老陽老隂之數與此密合故作圖以眀之老陽數合方法全方四十九中含大方六六三十六為過揲之數小角一一如一一六互乗為十二并成十三為掛扐之數此與前洛書以自乗互乗為積方之法同但洛書用對數如一與九之類是也大衍用合數則一與六是也老隂數合句股法全方四十九句三股四其積六四因之得二十四為過揲之數弦五其積二十五為掛扐之數弦實亦函四句股積而多句股較一十數之中除一一不變自二二至十十皆可成方然惟三三則五數居其中七七則二十五數居其中此二者為能得天地之中數餘則不能也蓋三三者洛書之數也七七者蓍䇿之數也洛書之數五居其中矣而其四方則又成四句股之數而以中五為弦之法焉蓍䇿之數二十五居其中矣而其四方則又具四句股之積而即以二十五為弦之實焉是故卦數之八合乎河圖之四也為其虚五十者同一根也蓍數之七合乎洛書之三也為其用中五者同一根也聖人因心之作與天地自然之文其相為經緯者如此大衍迎日推䇿法史稱黄帝迎日推䇿所謂䇿者蓋即神蓍也推衍䇿數以候日月故曰迎日推䇿考之後代譚卦畫者多以歴法推配然孔子未嘗言也惟於大衍之數則曰象四時象閏又曰當期之日則蓍䇿之與歴法相表裏也可見矣顧有以理言之而肖似者有以數推之而宻合者以理言而肖似者孔子大傳所陳是也盖四十九算排列成方以句股之數求之則零一者歸於中而為心以開方之法求之則零一者歸於隅而為角以其歸於中也故分二以象天地而掛一者象人之為天地心也以其歸於隅也故分二以象二氣而掛一者象閏之為一嵗餘也大傳所謂掛一以象三者此零一之䇿也所謂歸奇於扐以象閏者亦此零一之䇿也然當分二之初此一之掛者徒以象氣盈耳至於每揲之後又得餘䇿而扐之然後以此掛一者歸之而并以象閏則合氣盈朔虚而為一者也此以理言之而大概相似是孔子之説也至於以數推之者自黄帝之法不傳至唐僧一行始以大衍命歴以䇿數起嵗分閏餘之算然桉唐書歴志考之其法蓋未宻合也故今以孔子之言為宗而參以一行之數康節之理據顓頊周髀之制以約畧千載坐致之術為法表以眀之如左一年三百六十五日四分日之一每日百分凡三萬六千五百二十五分以天數二十五除之得一千四百六十一分為日數又以地數三十除日數得四十八零七分為月數是為大衍用數大傳言蓍數而以河圖之數首之故一年全數以二十五除之得日數者日有曉午昏夜凡四限四分期日為一千四百六十一也以三十除之得月數者月有朔望上下弦凡四限四分嵗月每月三十日算為四十八零七分也與大衍用數相應揲䇿合左右共四十八應四十八弦每弦七日半為期日嵗月之經數三百六十掛䇿一應氣盈之餘數五日四方日之一以初變為主日法十揲䇿應弦每弦以十分為率掛䇿應氣盈五日四分日之一於日法為十分弦之七扐䇿合隂陽共十二得少則四為陽得多則八為隂應十二朔每朔二十九日九百四十分日之四百九十九為一嵗之實數三百五十四日九百四十分日之三百四十八掛䇿一應朔虚之餘數十日九百四十分日之八百二十七亦以初變為主月法十九扐䇿應朔毎朔以十九分為率掛䇿應朔虚十日九百四十分日之八百二十七於月法為十九分朔之七以初變之揲䇿扐䇿計之揲䇿四十八以應四十八弦之整數其掛一者以應氣盈五日四分日之一也扐䇿十二以應十二朔之實數其掛一者以應朔虚十日八百二十七分也據四分歴法每日九百四十分故一嵗之氣盈有五日二百三十五分一嵗之朔虚此合氣盈總算有十日八百二十七分每弦七日四百七十分如日法十分弦之七則為五日二百三十五分矣每朔二十九日四百九十九分如月法十九分朔之七則為十日八百二十七分矣月毎日行十二度十九分度之七故以十為法九日月之法不同而其餘分皆七故漢儒卦氣毎卦直六日尚餘七分毎卦直六日七分者日以八十分為法也盖嵗數三百六十五日四分日之一四乗而三除之為四百八十七故四百八十七者嵗䇿也每卦直六日六八四十八得四百八十分又餘七分嵗䇿之根也積六十卦直三百六十日餘分之積共四百二十分以日法除之為五日四分日之一古今歴法一章之内有七閏月者法由兹起也其在蓍數則何以見掛一之䇿為餘七之算乎盖亦以生蓍之法而知之爾卦數八八者體數也蓍數七七者用數也蓍以七為用而掛一者用中之用故其分數亦止於七也此皆以一行之歴康節之説參而用之者然一行以弦為實弦而不足七日有半以掛一為實閏而其數又餘於一弦之外故今以弦為七日半之經弦以掛一為五日四分日之一之盈分必待扐餘之後然後其歸奇之掛一乃得應十日八百二十七分之數而為一嵗之實閏也似於大傳之先後次序更為􅝉合過揲為正䇿乾䇿三十六合六爻二百一十有六坤䇿二十四合六爻百四十有四凡三百有六十當一期之日數掛扐為餘䇿乾䇿十三合六爻七十八十坤䇿二十五合六爻百五凡二百二十有八當一章之月數正䇿以三十為進退之法故其合皆六十餘䇿以十九為進退之法故其合皆三十八三十者日法也十九者朔法也二篇之䇿為全䇿陽爻百九十二得六千九百一十二隂爻百九十二得四千六百零八凡萬有一千五百二十當閏終之總數此因大傳之説而推備之者嵗者正數也太陽主之閏者餘數也太隂主之故堯典始而殷正四時則曰日中日永日短此以太陽為主者也終則曰以閏月定四時成嵗此以太隂為主者也蓍䇿之正數三百有六十當一期之日蓋日周天而為一期故為太陽所主也其餘數二百二十有八當一章之月蓋氣朔分齊而為一章故為太隂所主也其全數萬有一千五百二十當閏終之總數蓋三十二月而閏一月其辰萬有一千五百二十三十二年而閏一年其日萬有一千五百二十此則日月正餘㑹終蓍卦齊同之數也歴代之歴嵗分消長不同故有五日四分日之一而有餘者亦有五日四分日之一而不足者然舉其中者以該其變者則四分為常法故顓頊歴周髀􅀴皆用之而司馬遷歴書述焉盖古法也以地平線分周天之度為二各一百八十度日出入朦景昏旦各十八度共三十六度以加晝景一百八十度合二百一十有六則乾之䇿之數也以減夜漏一百八十度餘一百四十有四則坤之䇿之數也大傳曰乾坤之䇿凡三百有六十當期之日故各一百八十者寒暑晝夜並行之體數也然陽生而隂殺陽眀而隂暗故陽饒而隂乏陽盈而隂虚今以晝夜平分推之其自然之數如此若一嵗寒暑之候則若邵子之説開物於寅末是亦先十八日也閉物於戌初是亦後十八日也以故萬物之數萬有一千五百二十其従陽者六千九百一十二其從隂者四千六百八生氣常盛則為豐年善類常多則為治世其消息盈虚之理亦若是而已矣此圖用加一倍法如第二層兩一生第三層中位之二併左右兩一成四是倍二為四也第三層一二各生苐四層中位之三併左右兩一成八是倍四為八也下放此出於數學中謂之開方求亷率其法以左一為方右一為隅而中間之數則其亷法也第三層為平方第四層萬立方第五層六層七層為三乖四乗五乗方於成卦之理亦相肖合何則陽大隂小陽如方隂如隅分居兩端隂陽合則生中間之兩象如平方之方隅合而生兩㢘其長如方其廣如隅也又乗則生中間之六卦如立方之方隅合而生六㢘三平㢘根於方而其厚如隅三長㢘根於隅而其長如方也故開方之法雖相乗至於無窮莫不依方隅以立算成卦之法雖相加至於無窮莫不根隂陽以定體成卦之始一隂一陽每毎相加而已及卦成而分析觀之則自一畫至六畫惟純隂純陽者常不動其餘則方其為四象也中間一隂一陽者二方其為八卦也中間一隂二陽者三一陽二隂者三方其為四畫也中間一隂三陽者四一陽三隂者四二隂二陽者六方其為五畫也中間一隂四陽者五一陽四隂者五二隂三陽者十二陽三隂者十及其六畫之既成也中間一隂五陽者六一陽五隂者六二隂四陽者十五二陽四隂者十五三隂三陽者二十朱子卦變之圖以此而定也盖其倍法同於畫卦而其多寡錯綜之數則卦變用之御纂周易折中卷二十一

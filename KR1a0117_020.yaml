body:
  text: 欽定四庫全書御纂周易折中卷十五繫辭下傳八卦成列象在其中矣因而重之爻在其中矣本義成列謂乾一兑二離三震四巽五坎六艮七坤八之類象謂卦之形體也因而重之謂各因一卦而以八卦次第加之為六十四也爻六爻也既重而後卦有六爻也集説韓氏伯曰夫八卦備天下之理而未極其變故因而重之以象其動用則爻卦之義所存各異故爻在其中矣朱子語類云八卦所以成列乃是從太極兩儀四象漸次生出以至於此畫成之後方見其有三才之象非聖人因見三才遂以己意思維而連畫三爻以象之也因而重之亦是因八卦之已成各就上面節次生出若旋生逐爻則更加三變方成六十四卦若併生全卦則只用一變便成六十四卦雖有遲速之不同然皆自漸次生出各有行列次第畫成之後然後見其可盡天下之變柴氏中行曰八卦成列則凡天下之象舉在其中不止八物如説卦中所列皆是鄭氏曰卦始於三畫未有爻也因而重之其體有上下其位有內外其時有初終其序有先後而爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣本義剛柔相推而卦爻之變往來交錯無不可見聖人因其如此而皆繫之辭以命其吉凶則占者所值當動之爻象亦不出乎此矣集説虞氏翻曰剛柔相推而生變化故變在其中矣繫彖象九六之辭故動在其中鼓天下之動者存乎辭者也孔氏穎達曰上繫第二章云剛柔相推而生變化是變化之道在剛柔相推之中蔡氏清曰天文地理人事物類一剛一柔盡之矣二者之外再無餘物也故凡剛者皆柔之所推也凡柔者皆剛之所推也而易卦中亦只是剛柔二者而已非剛則柔非柔則剛在剛皆柔之所推在柔皆剛之所推蘇氏濬曰動在其中虞翻謂鼓天下之動者存乎辭此説極是此動字與下文生乎動天下之動三動字俱同易之辭原是聖人見天下之動而繫之者故曰鼓天下之動存乎辭此即動在其中之説非當動卦爻之謂也吉凶悔吝者生乎動者也夲義吉凶悔吝皆辭之所命也然必因卦爻之動而後見集説龔氏原曰象者一卦之成體也故天下之賾存焉爻者六位之變動也故天下之動存焉剛柔相推所以成爻也而爻者言乎變則變在其中矣繫辭焉而命之所以明爻也而辭者以鼓天下之動則動在其中矣卦則兆於成列而備於重爻則兆於變而備於動故吉凶悔吝生焉蘇氏濬曰傳曰寂然不動又曰動之微吉之先見當其不動也尚無所謂吉又何有於凶惟動而微也吉斯見焉動而紛紜雜亂也凶與悔吝始生於其間矣案此是覆説繫辭焉而命動在其中之意凡天下之吉凶悔吝皆生於人事之動故易中有吉凶悔吝之辭而動在其中剛柔者立本者也變通者趣時者也夲義一剛一柔各有定位自此而彼變以從時集説朱氏震曰爻有剛柔不有兩則一不立所以立本也剛柔相變通其變以盡利者趣時也趣時者時中也張氏浚曰剛柔相推往來進退為變無常而莫不因乎自然之時故曰趣時朱子語類云此兩句相對説剛柔者隂陽之質是移易不得之定體故謂之本若剛變為柔柔變為剛便是變通之用又云剛柔者晝夜之象所謂立本變化者進退之象所謂趣時剛柔兩箇是本變通便只是其往來者胡氏炳文曰卦有卦之時爻有爻之時立本者天地之常經趣時者古今之通義梁氏寅曰剛柔者立本乃不易之體即所謂闔户闢户也變通者趣時乃變易之用即所謂往來不窮也蔡氏清曰剛柔立本所謂交易而對待者變通趣時所謂變易而流行者案此是覆説剛柔相推而生變化之意凡天地間之理兩者對待斯不偏而可以立本兩者迭用斯不窮而可以趣時故易中剛柔相推而變在其中吉凶者貞勝者也本義貞正也常也物以其所正為常者也天下之事非吉則凶非凶則吉常相勝而不已也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也本義觀示也天下之動其變無窮然順理則吉逆理則凶則其所正而常者亦一理而已矣集説朱子語類云吉凶常相勝不是吉勝凶便是凶勝吉二者常相勝故曰貞勝天地之道則常示日月之道則常明天下之動貞夫齊常有一箇是底故曰貞夫一者也天下之動雖不髙氏萃曰天常示人以易地常示人以簡雖隂不能以不愆陽不能以不伏而貞觀之理常自若也日明乎晝月明乎夜雖中不能以不昃盈不能以不食而貞明之理常自若也天下之動進退存亡不可以一例測然而順理則裕從欲惟危同一揆也惠迪之吉從逆之凶無二致也是則造化人事之正常即吉凶之貞勝豈可以二而求之哉案自吉凶貞勝至此為一節又承吉凶悔吝生乎動之意而明其理之一也貞勝之義張子以為以正為勝朱子以為二者常相勝今玩文義當為以常為勝蓋天下容有善而遇凶惡而獲吉者然非其常也惠迪吉從逆凶乃理之常故當以常者蒍勝如天地則以常者觀示日月則以常者照臨偶有變異不足言也天下之動豈不常歸於一理乎夫乾確然示人易矣夫坤隤然示人簡矣本義確然健貌隤然順貌所謂貞觀者也集説韓氏白曰確剛貌也隤柔貌也乾坤皆恆一其德故簡易也案此節又承剛柔立本變通趣時之意而明其理之一也乾坤者剛柔之宗也乾坤定位而變化不窮矣然其所以立本者一歸於易簡之理所謂天有顯道厥類維彰萬古不易者也爻也者效此者也象也者像此者也本義此謂上文乾坤所示之理爻之竒耦卦之消息所以效而像之案爻也者效此是結吉凶悔吝生乎動而貞夫一之意象也者像此是結剛柔變通而歸於易簡之意爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭本義內謂蓍卦之中外謂蓍卦之外變即動乎內之變辭即見乎外之辭集説韓氏伯曰功業由變以興故見乎變也辭也者各指其所之故曰情也張子曰因爻象之既動明吉凶於未形故曰爻象動乎內吉凶見乎外隨爻象之變以通其利故功業見也聖人之情存乎教人而已吳氏澄曰聖人與民同患之情皆於易而著見聖人之道而獨歸重於辭蓋此篇為繫辭之傳故也案爻象者動而無形故曰內吉凶者顯而有迹故曰外非專以蓍筮言也天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義本義曰人之人今本作仁吕氏從古蓋所謂非衆罔與守邦此第一章言卦爻吉凶造化功業集説陸氏績曰人非財不聚故聖人觀象制器備物盡利以業萬民而聚之也蓋取聚人之本矣崔氏憬曰言聖人行易之道當須法天地之大德寶萬乘之大位謂以道濟天下為寶是其大寶也夫財貨人所貪愛不以義理之則必有敗也言辭人之樞要不以義正之則必有辱也百姓有非不以義禁之則必不改也此三者皆資於義以此行之得其宜也故知仁義聖人寶位之所要也張子曰將陳理財養物於下故先敘天地生物朱氏震曰天地之大德曰生者仁也聖人成位乎兩間者仁而已不仁不足以參天地義所以為仁非二本也故曰立人之道曰仁與義王氏宗傳曰聖人所以配天地而王天下者亦有仁義而已矣仁德之用也義所以輔仁也理財如所謂作網罟以佃漁作耒耜以耕耨致民聚貨以交易之類是也正辭如所謂易結繩以書契百官以治萬民以察是也禁民為非如所謂重門擊柝以待暴客剡矢弦弧以威天下是也朱子語類云正辭便只是分别是非又曰教化便在正辭裏面項氏安世曰聖人之仁即天地之生大寶曰位即崇髙莫大乎富貴也自此以下以包犧氏神農氏黃帝堯舜氏實之皆聖人之富貴者也財者百物之總名皆民之所利也理財謂水火金木土穀惟修所以利之也正辭謂殊貴賤使有度明取豫使有義辨名實使有信利之所在不可不導之使知義也禁民為非謂憲禁令致刑罰以齊其不可導者也蓋養之教之而後齊之聖人之政盡於此三者矣其德意之所發主於仁民義者仁之見於條理者也真氏德秀曰案易之並言仁義者此章及説卦立天之道章而已在天地則曰生在聖人則曰仁仁之義蓋可識矣李氏心傳曰蔡雍云以仁守位以財聚人則漢以前已用此仁字矣總論孔氏頴達曰此第一章覆釋上繫第二章象爻剛柔吉凶悔吝之事更具而詳之案此章與上傳第二章相應故上傳第三章以後皆申説第二章之意下傳則自第二章之後皆申説此章之意也八卦成列因而重之即所謂設卦觀象也因爻象中剛柔相推之變而繫之吉凶悔吝之辭即所謂繫辭焉而明吉凶也此四句由象以及於辭者作易之序也下文又由辭之吉凶悔吝而推本於剛柔之象蓋傳本為繫辭而作而下傳尤詳焉故其立言如此吉凶悔吝由動而生者蓋以剛柔迭運變而從時故也吉凶之遇參差不齊然以常理為勝而天下之動可一者以剛柔變化不離乾坤乾易坤簡而天下之理得故也爻象動乎內四句又總而結言之天地大德一節本義原屬此章然諸儒多言宜為下章之首蓋下章所取十三卦無非理財正辭禁非之事其説可從也古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情本義王昭素曰與地之間諸本多有天字俯仰逺近所取不一然不過以驗隂陽消息兩端而已神明之德如健順動止之性萬物之情如雷風山澤之象集説朱氏震曰自此以下明備物致用立成器以為天下利者無非有取於易皆仁也曰王天下者明守位也王氏申子曰伏羲氏繼天立極畫八卦以前民用後之聖人相繼而作制為相生相養之具皆所以廣天地生生之德自網罟至書契是也蔡氏清曰以通神明之德以類萬物之情二句一是精一是粗一是性情一是形體其下十三卦所尚之象一皆出此作結繩而為網罟以佃以漁蓋取諸離本義兩目相承而物麗焉集説孔氏頴達曰案諸儒象卦制器皆取卦之爻象之體韓氏之意直取卦名因以制器案上繫云以制器者尚其象則取象不取名也韓氏乃取名不取象於義未善胡氏瑗曰蓋者疑之辭也言聖人創立其事不必觀此卦而成之蓋聖人作事立器自然符合於此之卦象也非準擬此卦而後成之故曰蓋取案孔氏所議韓氏是也且六十四卦名是文王所命包犧之時但有八卦名象而已黃農堯舜不應便取卦名經大蓋取之云雖曰假託不必拘泥然亦不應大假疏脫也古者網羅所致曰離詩曰魚網之設鴻則離之又曰有兔爰爰雉離于羅二體皆離上下網羅之象包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益本義二體皆木上入下動天下之益莫大於此集説蔡氏淵曰耜耒首也斷木之鋭而為之耒耜柄也揉木使曲而為之吳氏澄曰益上巽二陽象耒之自地上而入下震一陽象耜之在地下而動也日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑本義日中為市上明而下動又借噬為市嗑為合也集説耿氏南仲曰有菽粟者或不足乎禽魚有禽魚者或不足乎菽粟罄者無所取積者無所散則利不布養不均矣於是日中為市焉日中者萬物相見之時也當萬物相見之時而致天下之民聚天下之貨使遷其有無則得其所矣鄭氏東卿曰十三卦始離次益次噬嗑所取者食貨而已食貨者生民之本也案離為日中震為動出當日中而動出市集之象神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤本義乾坤變化而無為集説郭氏雍曰垂衣裳而天下治無為而治也無為而治者無他焉法乾坤易簡而已王氏申子曰神農以上民用未滋所急者食貨而已此聚人之本也及黃帝堯舜之世民用日滋若復守其朴略則非變而通之之道故黃帝堯舜氏作通其變使民由之而不倦神其化使民宜之而不知凡此者非聖人喜新而惡舊也窮則變變則通通則久易之道然也吳氏澄曰風氣漸開不可如朴略之世此窮而當變也變之則通而不窮矣其能使民喜樂不倦者以其通之之道神妙不測變而不見其迹便於民而民皆宜利之故爾俞氏琰曰時當變則變不變則窮於是乎有變而通之之道焉變而通之所以趣時也民之所未厭聖人不強去民之所未安聖人不強行夫唯其數窮而時將變聖人因而通之則民不倦由之而莫知其所以然者神也以漸相忘於不言之中者化也蔡氏清曰時之當變也而通其變然其所以變通之者非聖人強用其智慮作為於其間也因其自然之變而以自然之理處之是謂神而化之也神而化即其變通之妙於無為也蘇氏濬曰言通變神化而獨詳於黃帝堯舜言黃帝堯舜而獨取諸乾坤乾坤諸卦之宗也黃帝堯舜千古人文之始中天之運至此而開洪荒之俗至此而變此所以為善發羲皇之精藴也案守舊則倦更新則不宜凡事之情也變其舊使民不倦者化也趨於新使民咸宜者神而化之也刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙本義木在水上也致逺以利天下疑衍集説九家易曰木在水上流行若風舟楫之象也何氏楷曰近而可以濟不通逺而可以致逺均之為天下利矣取諸渙者其象巽木在坎水之上故彖曰利涉大川彖傳曰乘木有功服牛乘馬引重致逺以利天下蓋取諸隨本義下動上説集説董氏真卿曰平地任載之大車載物之多者則服牛以引重田車兵車乘車之小車載人而輕者則乘馬以致逺案外説內動象牛馬之奔於前而車動於後也重門擊柝以待暴客蓋取諸豫本義豫備之意集説楊氏文煥曰川途既通則暴客至矣又不可無禦之之術重門以禦之擊柝以警之則暴客無自而至俞氏琰曰坤為闔户重門之象也震動而有聲之木擊柝之象也斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過本義下止上動集説丘氏富國曰以象言之上震為木下艮為土震木上動艮土下止杵臼治米之象弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽本義睽乖然後威以服之集説朱氏震曰知耒耜而不知杵臼之利則利天下者有未盡故教之以杵臼之利知門柝而不知弧矢之利則威天下者有未盡故教之以弧矢之利徐氏幾曰其害之大者以重門擊柝不足以待之故必有弧矢以威之案離威也兌説也威而以説行之所謂説以犯難民忘其死上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯本義壯固之意集説司馬氏光曰風雨動物也風雨動於上棟宇健於下大壯之象也蔡氏淵曰棟屋脊檩也宇椽也棟直而上故曰上棟宇兩垂而下故曰下宇俞氏琰曰聖人之於物有為之者有易之者古未有是而民利之也今則為之所以貽於後也古有是而民厭之也今則易之所以革於前也古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過本義送死大事而過於厚案棺槨者取木在澤中也又死者以土為安故入而後説之上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬本義明決之意此第二章言聖人制器尚象之事集説耿氏南仲曰已前不云上古已下三事或言古與上不同者蓋未造此器之前更無餘物之用故不言上古也以下三事皆是未造此物之前别有所用今將後用而代前用故本之云上古及古者案兑為言語可以通彼此之情書之象也乾為健固可以堅彼此之信契之象也總論吳氏澄曰十三卦之制作自畫卦而始至書契而終蓋萬世文字之祖肇於畫卦而備於書契也此章申苐一章變通趣時而原於易簡之意蓋在案天地則為剛柔在人則為仁義仁義者立夲者也因風氣之宜而通其變則其所以趣時者也法始於伏羲成於堯舜故自八卦既畫而可以周萬事之理凡網罟耒耜至於書契莫非易理之所有也觀其窮而變變而通則趣時之用不窮然其神而化之無為而民安焉則易簡之理惟一故其取諸諸卦者取諸其趣時也而其取諸乾坤者取諸其易簡也是故易者象也象也者像也本義易卦之形理之似也集説干氏寶曰言是故又總結上義也崔氏憬曰上明取象以制器之義故以此重釋於象言易者象於萬物象者形像之象也吳氏澄曰此章之首第一節總敘以起下文自包犧至書契言制作之事而以是故總結之謂易卦皆器物之象象者像似之義聖人制器皆與卦象合也案凡章首不用是故字曰是故者承上結上之辭也諸儒以此句為上章結語者似是彖者材也本義彖言一卦之材集説韓氏伯曰彖言成卦之材以統卦義也案材者構屋之木也聚衆材而成室彖亦聚卦之衆義以立辭故本義謂彖言一卦之材爻也者效天下之動者也本義效放也集説胡氏瑗曰爻有變動位有得失變而合於道者為得動而乖於理者為失人事之情偽物理之是非皆在六爻之中所以象天下之動也是故吉凶生而悔吝著也本義悔吝本微因此而著此第三章集説保氏八曰彖者言一卦之材所以斷一卦之吉凶悔吝爻者言一爻之動所以斷一爻之吉凶悔吝何氏楷曰吉凶在事本顯故曰生悔吝在心尚微故曰著悔有改過之意至於吉則悔之著也吝有文過之意至於凶則吝之著也原其始而言吉凶生於悔吝要其終而言則悔吝著而為吉凶也陽卦多隂隂卦多陽本義震坎艮為陽卦皆一陽二隂巽離兑為隂卦皆一隂二陽其故何也陽卦竒隂卦耦本義凡陽卦皆五畫凡隂卦皆四畫集説韓氏伯曰夫少者多之所宗一者衆之所歸陽卦二隂故竒為之君隂卦二陽故耦為之主陳氏埴曰二耦一竒即竒為主是為陽卦二竒一耦即耦為主是為隂卦故曰陽卦多隂隂卦多陽案陽卦竒隂卦耦言陽卦主竒隂卦主耦也須如韓氏陳氏之説乃與下文相應其德行何也陽一君而二民君子之道也隂二君而一民小人之道也本義君謂陽民謂隂此第四章集説朱氏震曰隂陽二卦其德行不同何也陽卦一君而遍體二民二民共事一君一也故為君子之道隂卦一民共事二君二君共爭一民二也故為小人之道吳氏曰慎曰陽卦固主陽也而隂卦亦主陽可見陽有常尊也案此章是釋彖者材也之義而原其理於一也自八卦始成而分隂分陽一竒則為陽卦者以其一君二民是君之權出於一君為主也君為主則君子之道行故曰君子之道一耦則為隂卦者以其二君一民是君之權出於二反若民為主也民為主則小人之道行故曰小人之道古今言易者曰陽為君子隂為小人蓋以為善惡淑慝之稱焉豈知隂陽不可以相無如有君不可以無民烏有善惡淑慝之分哉惟其君之道一而有統則民之衆翕然從令豈非君子之道乎若君之道二而多門則民之卑各行其私豈非小人之道乎善惡淑慝由此而生吉凶治亂由此而起蓋自三畫之卦而已具此象矣以此例而推之六畫之卦則如復師謙豫此剝一陽為主皆君子之道也姤履夬一隂為主皆小人之道也惟同人之二大有之五不以為小人者以其居中能同乎陽有乎陽也小畜之四亦不以為小人者以其得位能畜乎陽也究之以陽為主也又以其義例變而通之則不特一隂一陽者為主而已凡陽之居內而得時者皆為主也臨泰之類是也凡隂之居內而得時者皆為主也遁否之類是也凡陽卦居內而為主者治隂卦居內而為主者亂泰否損益之類是也凡陽卦居內而先隂者正隂卦居內而先陽者邪隨蠱漸歸妹之類是也或不取內外而取上下以為貴賤或不取先後而取尊卑以為倡隨或以隂為臣道而能順陽為善或以隂為君道而能應陽為美要之其尊陽之意則一而已矣夫子以八卦發凡使人於六十四卦之義推而通之也此即一卦之材而彖之所取故曰彖者材也其歸則陽道不可以有二故曰理之一易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮本義引咸九四爻辭而釋之言理夲無二而殊塗百慮莫非自然何以思慮為哉必思而從則所從者亦狹矣集説韓氏伯曰天下之動必歸於一思以求朋未能一也一以感物不思而至孔氏頴達曰此一之為道為可尚結成前文陽卦以一為君是君子之道也徐氏幾曰塗雖殊而歸同則往來自不容無而加之憧憧則私矣慮雖百而致一則思亦人心所當有而局於朋從則狹矣蔡氏清曰天下感應之理夲同歸也但事物則千形萬狀而其塗各殊耳天下感應之理夲一致也但所接之事物不一而所發之慮亦因之有百耳夫慮雖百而其致則一塗雖殊而其歸則同是其此感彼應之理一出於自然而然而不必少容心於其間者吾之應事接物一惟順其自然之理而已矣天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉本義言往來屈信皆感應自然之常理加憧憧焉則入於私矣所以必思而後有從也集説張子曰屈信相感而利生感以誠也情偽相感而利害生雜之偽也朱子語類云日往則月來一段乃承上文憧憧往來而言往來皆人之所不能無但憧憧則不可案夫子引此爻是發明貞一之理故亦從天地日月説來日月有往來而歸於生明所謂貞明者也寒暑有往來而歸於成嵗所謂貞觀者也天下之動有屈有信而歸於生利順理則利也所謂貞夫一者也言天地則應在日月之前言寒暑則應在日月之後何則四時者日月之所為也觀豫恆彖傳及繫傳首章皆不以四時先日月也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也本義因言屈信往來之理而又推以言學亦有自然之機也精所其義至於入神屈之至也然乃所以為出而致用之夲利其施用無適不安信之極也然乃所以為入而崇德之資內外交相養互相發也集説孔氏頴達曰覆明上往來相感屈信相須尺蠖之蟲初行必屈言信必須屈也龍蛇初蟄是靜也以此存身言動必因靜也聖人用精粹微妙之義入於神化寂然不用乃能致其所用先靜後動是動因靜而來也利己之用安靜其身可以增崇其德此亦先靜後動動亦由靜而來也朱子語類云且如精義入神如何不思那致用的却不必思致用的是事功是效驗俞氏琰曰精研義理無毫釐之差而深造於神妙所以致之於用也見於用而利施於身而安所以為崇德之資也精義入神內也致用外也自內而達外猶尺蠖之屈以求信也利用安身外也崇德內也即外以養內亦猶龍蛇之蟄以存身也蔡氏清曰利用如何以崇其德蓋外邊事事都能迎刃解將去則胸中所得益深所造亦逺矣精義以致知言義者事理之宜也入神只謂到那不容言之妙處利用以行言利用故安身若其用有不利則亦不能在在皆安而泰然處之矣蓋躬行心得自是相關之理吳氏一源曰人皆知信之利而不知屈之所以利也故以尺蠖龍蛇明之專言屈之利以示人正欲人養靜以一動無感以待感也過此以往未之或知也窮神知化德之盛也本義下學之事盡力於精義利用而交養互發之機自不能已自是以上則亦無所用其力矣至於窮神知化乃德盛仁熟而自致耳然不知者往而屈也自致者來而信也是亦感應自然之理而已張子曰氣有隂陽推行有漸為化合一不測為神此上四節皆以釋咸九四爻義集説孔氏頴逹曰精義入神以致用利用安身以崇德此二者皆人理之極過此二者以往則微妙不可知窮極微妙之神曉知變化之道乃是聖人德之盛極也張子曰精義入神事豫吾內求利吾外也利用安身素豫吾外致養吾內也窮神知化乃養盛自致非思勉之能強故崇德而外君子未或致知也又曰氣有隂陽推行有漸為化合一不測為神其在人也知義用利則神化之事備矣德盛者窮神則知不足道知化則義不足云又曰窮神是窮盡其神也入神是僅能入於神也言入如自外而入義固有淺深朱子語類云窮神知化德之盛這德字只是上面崇德之德德盛後便能窮神知化便如聰明睿知皆由此出自誠而明相似又云窮神知化化是逐些子挨將去底一日復一日一月復一月節節挨將去便成一年神是一箇物事或在彼或在此當其在隂時全體在隂在陽時全體在陽都只是這一物兩處都在不可測故謂神撗渠言一故神兩故化又注云兩在故不測這説得甚分曉又云天下何思何慮一句便先打破那箇思字却説同歸殊塗一致百慮又再説天下何思何慮謂何用如此憧憧往來尺蠖龍蛇之屈信皆是自然底道理不往則不來不屈則亦不信也今之為學亦只是如此精義入神用力於內乃所以致用乎外利用安身求利乎外乃所以崇德乎內只是如此作將去雖至於窮神知化地位亦只是德盛仁熟之所致何思何慮之有蔡氏清曰未之或知者不容於有思不容於有為也神以存主處言化以運用處言其神化者亦豈出於精義利用之外哉其始有待於思為則曰精義利用其終無待於思為則曰窮神知化所造有淺深理則無精粗也張氏振淵曰未有下學功夫不到而頓能上達者神化功夫正在精義利用作起此正實落下手處即造到神化地位不過精義利用漸進漸熟耳德盛不是就窮神知化上贊他德之盛惟德盛方能窮神知化案精義入神則所知者精深窮理之事也利用安身則所行者純熟盡性之事也窮神則不止於入神其心與神明相契者也知化則不止於利用其事與造化為徒者也至命之事也窮理盡性學者所當用力至命則無所用其力矣故曰窮理盡性以致於命又案此章是釋爻者效天下之動之義而原其理於一也自此以下十一爻皆是發明此意而此爻之義尤為親切蓋感應者動也不可逐物憧憧而惟貴於貞固其心者一也所以然者此心此理一致同歸本不容以有二也故首以此爻而以致一恆心兩爻終焉易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪本義釋困六三爻義集説朱子語類云有著力不得處若只管著力去作少間去作不成他人便道自家無能便是辱了名易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也本義括結礙也此釋解上六爻義集説韓氏伯曰括結也君子待時而動則無結閡之患也子曰小人不耻不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也本義此釋噬嗑初九爻義集説馮氏椅曰不以不仁為耻故見利而後勸於為仁不以不義為畏故畏威而後懲於不義善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶本義此釋噬嗑上九爻義集説董氏仲舒曰積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也吳氏曰慎曰惡以己之所行者言罪以法之所麗者言子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于包桑本義此釋否九五爻義集説孔氏頴達曰所以今有傾危者由前安樂於其位自以為安故致今日危也所以今日滅亡者由前保有其存恆以為存故今致滅亡也所以今有禍亂者由前自恃有其治理恆以為治故今致禍亂也是故君子今雖獲安心恆不忘傾危之事國雖存心恆不忘滅亡之事政雖治心恆不忘禍亂之事心恆畏懼其將滅亡其將滅亡乃繫于包桑之固也谷氏家杰曰養尊處優曰安宗社鞏固曰存綱舉目張曰治子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也本義此釋鼎九四爻義集説張氏浚曰自昔居台鼎之任德力知三者一有闕則弗能勝其事而况俱不足者乎有德而無知則不足以應變有知而無力則不足以鎮浮若夫德之不立雖有知力亦無以感格天人而措天下於治矣錢氏時曰古之人君必量力度德而後授之官古之人臣亦必量力度德而後居其任雖百工胥史且猶不苟况三公乎為君不明於所擇為臣不審於自擇以至亡身危主誤國亂天下皆由不勝任之故可不戒哉子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望本義此釋豫六二爻義漢書吉之之間有凶字集説孔氏頴達曰動謂心動事動初動之時其理未著唯纎微而己已著之後則心事顯露若未動之先又寂然頓無幾是離無入有在有無之際故云動之微也直云吉不云凶者凡豫前知幾皆向吉而背凶違凶而就吉無復有凶故特云吉也諸夲或有凶字者其定夲則無崔氏憬曰此爻得位於中於豫之時能順以動而防於豫如石之耿介守志不移雖暫豫樂以其見微而不終日則能貞吉斷可知矣張子曰知幾者為能以屈為信朱子語類云上交貴於恭遜恭則便近於諂下交貴於和易和則便近於瀆蓋恭與諂相近和與瀆相近只爭些子便至於流也又云幾者動之微是欲動未動之間便有善惡便須就這處理會若到發出處便怎生奈何得所以聖賢説謹獨便都是要就幾微處理會項氏安世曰諂者本以求福而禍常基於諂瀆者本以交歡而怨常起於瀆易言知幾而孔子以不諂不瀆明之此真所謂知幾者矣欲進此道唯存察之密疆界素明者能之此所以必歸之於介如石者與何氏楷曰知微知彰微而能彰介於石也知柔知剛柔而能剛不終日也子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉本義殆危也庶幾近意言近道也此釋復初九爻義集説虞氏翻曰復以自知自知者明謂顔子不遷怒不二過克己復禮天下歸仁也侯氏行果曰失在未形故有不善知則速改故無大過朱子語類云或以幾為因上文幾字而言但左傳與孟子庶幾兩字都只作近字説又云顔子有不善未嘗不知知之未嘗復行今人只知知之未嘗復行為難殊不知有不善未嘗不知是難處項氏安世曰於微而知其彰於柔而知其剛蓋由用心之精燭理之明是以至此欲進此者當自顔子始毫釐絲忽之過一萌於方寸之間可謂微矣而吾固已瞭然而見之可謂柔矣而吾已斬然而絶之此章內十一爻雖各為一假而意皆相貫此爻尤與上爻文意相關陸氏振竒曰誠則明者知幾之神由介石來也明則誠者不逺之復由真知得也在豫貴守之固故曰貞吉在復貴覺之早故曰元吉天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也本義絪緼交密之狀醇謂厚而凝也言氣化者也化生形化者也此釋損六三爻義集説侯氏行果曰此明物情相感當上法絪緼化醇致一之道子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶本義此釋益上九爻義此第五章集説項氏安世曰危以動則民不與黨與之與無交而求則民不與取與之與也又曰以易對懼其義可見直者其語易曲者其語懼乾之所以易者以其直也郭氏鵬海曰事不順理從欲惟危為危以動心知非理自覺惶恐為懼以語恩非素結信非素孚為無交而求總論葉氏良佩曰下十爻皆承咸九四而言吳氏一源曰咸後十爻皆發明理之貞一而不必憧憧耳往來屈信無二致也天地所以成造化聖人所以臻造化推之事事物物莫不皆然故知動靜之一致則能藏器而時動知小大之一致則能謹小以無咎知安危之一致則能危以保其安知顯微之一致則能見幾而作不逺而復知損益之一致則能損而得友彼非所困而困非所任而任忽小而惡積求益而或繫皆昧於屈信之義以取凶耳案此上三章申吉凶效動而歸於貞一之理第三章統論彖爻也第四章舉彖所以取材之例第五章舉爻所以效動之例也蓋卦有小大辭有險易故凡卦之以陽為主而陽道勝者皆大卦也以隂為主而隂道勝者皆小卦也其原起於八卦之分隂分陽故為舉彖取材之例也三百八十四爻正靜則吉邪動則凶故困三解上相反也噬嗑之初上相反也否五鼎四相反也豫二復初相似也損三益上相反也其義皆統於咸之四故為舉爻效動之例也夫隂陽並行而以陽為君則所以歸其權於君者一矣動靜相循而以靜為主則所以專其事於主者一矣何則理一故也故曰天下之動貞夫一子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德本義諸卦剛柔之體皆以乾坤合德而成故曰乾坤易之門撰猶事也集説荀氏爽曰隂陽相易出於乾坤故曰門葉氏良佩曰此章論文王繫辭之義故首節先夲伏羲卦畫而言之何氏楷曰有形可擬故曰體有理可推故曰通體天地之撰承剛柔有體言兩體字相應通神明之德承隂陽合德言兩德字相應其稱名也雜而不越於稽其類其衰世之意邪夲義萬物雖多無不出於隂陽之變故卦爻之義雖雜出而不差繆然非上古淳質之時思慮所及也故以為衰世之意蓋指文王與紂之時也集説九家易曰名謂卦名隂陽雖錯而卦象各有次序不相踰越侯氏行果曰易象考其事類但以吉凶得失為主則非淳古之時也故云衰世之意耳言邪示疑不欲切指也朱子語類問其稱名也雜而不越是指繫辭而言是指卦名而言曰他下面兩三畨説名後又舉九卦説看來只是謂卦名又云其衰世之意邪伏羲畫卦時這般事都已有了只是未曾經歷到文王時世變不好古來未曽有底事都有了他一一經歷這崎嶇萬變過來所以説出那卦辭夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣本義而微顯恐當作微顯而開而之而亦疑有誤集説郭氏雍曰當名卦也辨物象也正言彖辭也斷辭繫之以吉凶者也朱子語類云微顯闡幽幽者不可見便就這顯處説出來顯者便就上面尋其不可見底教人知得又曰如顯道神德行相似又云微顯闡幽是將道來事上看言那箇雖是粗的然皆出於道義之藴微顯所以闡幽闡幽所以微顯只是一個物事吳氏澄曰彰往即藏往也謂明於天之道而彰明已往之理察來即知來也謂察於民之故而察知未來之事微顯即神德行也謂以人事之顯而夲之於天道所以微其顯闡幽即顯道也謂以天道之幽而用之於人事所以闡其幽蔡氏清曰人事粗迹也易書有以微之蓋於至著之中寓至微之理也天道至幽也易書有以闡之蓋以至微之理寓於至著之象也案彰往察來微顯闡幽承首節伏羲卦畫言當名辨物正言斷辭承次節文王卦名言而因及乎辭也彰往察來即所謂體天地之撰微顯闡幽即所謂通神明之德當名者即所謂稱名雜而不越也命名之後又復辨卦中所具之物以繫之辭而斷其占則所謂彖也文王因卦畫而為之名辭故曰開而有畫無文易道未開也其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報本義肆陳也二疑也此第六章多闕文疑字不可盡通後皆放此集説程氏敬承曰理貞夫一而民二之有失得故二也明失得之報則天下曉然歸於理之一而民行濟矣濟者出之陷溺之危而措之安吉之地此其所以為衰世之意邪案稱名小取類大以卦名言旨逺辭文以彖辭言其言曲而中又申旨逺辭文之意旨逺則多隱約故曲也辭文則有條理故中也其事肆而隱又申名小類大之意名小則事物畢具故肆也類大則義理包涵故隱也總論項氏安世曰此章專論易之彖辭易不過乾坤二畫乾坤即隂陽剛柔也凡易之辭其稱名取類千彚萬狀大要不越於二者而其所以繫辭之意則為世衰道微與民同患不得已而盡言之耳此斷辭之所以作也斷辭即彖辭也易之興也其於中古乎作易者其有憂患乎本義夏商之末易道中微文王拘於羑里而繫彖辭易道復興集説孔氏頴逹曰易之爻卦之象則在上古伏羲之時但其時理尚質素直觀其象足以垂教中古之時事漸澆浮非象可以為教故爻卦之辭起於中古此之所論謂周易也身既憂患須垂法以示於後以防憂患之事吳氏澄曰羲皇之易有畫而已三畫之卦雖有名而六畫之卦未有名文王始名六畫之卦而繫之以辭易道幾微至此而復興也卦名及辭皆前此所未有故不云述而云作作易在羑里時故云其有憂患乎蓋於名卦而知其有憂患也下文舉九卦之名以見其憂患之意谷氏家杰曰憂患二字以憂患天下言乃吉凶同患意民志未通務未成聖人切切然為天下憂患之於是作易故易皆處憂患之道何氏楷曰聖人之憂患者憂患天下之迷復也乃其處困又何憂患焉是故易者所以憂患天下之憂患也是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也本義履禮也上天下澤定分不易必謹乎此然後其德有以為基而立也謙者自卑而尊人又為禮者之所當執持而不可失者也九卦皆反身修德以處憂患之事也而有序焉基所以立柄所以持復者心不外而善端存恆者守不變而常且久懲忿窒欲以修身遷善改過以長善困以自驗其力井以不變其所然後能巽順於理以制事變也集説鄭氏康成曰辨别也遭困之時君子固窮小人則濫德於是别也干氏寶曰柄所以持物謙所以持禮者也朱子語類問巽何以為德之制曰巽為資斧巽多作斷制之象蓋巽字之義非順所能盡乃順而能入之義是入細直徹到底不只是到皮子上如此方能斷得殺若不見得盡如何可以行權陸氏九淵曰上天下澤尊卑之義禮之本也經禮三百曲禮三千皆本諸此履德之基謂以行為德之基也基始也德自行而進也不行則德何由而積有而不居為謙謙者不盈也盈則其德喪矣常執不盈之心則德乃日積故曰德之柄既能謙然後能復復者陽復為復善之義人性本善其不善者遷於物也知物之為害而能自反則知善者乃吾性之固有循吾固有而進德則沛然無他適矣故曰復德之本也知復則內外合矣然而不常則其德不固所謂雖得之必失之故曰恆德之固也君子之修德必去其害德者則德日進矣故曰損德之修也善日積則寬裕故曰益德之裕也不臨患難難處之地未足以見其德故曰困德之辨也井以養人利物為事君子之德亦猶是也故曰井德之地也夫然可以有為有為者常順時制宜不順時制宜者一方一曲之士非盛德之事也順時制宜非隨俗合汙如禹稷顔子是已故曰巽德之制也陳氏琛曰德之基就積行上説德之本就心裏説要當有辨德之固是得寸守寸得尺守尺德之地則全體不窮矣亦要有辨盧氏曰基與地有别基小而地大基是初起腳跟積纍可由此而上地是凝成全體施用之妙皆由此而出也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱本義此如書之九德禮非強世然事皆至極謙以自卑而尊且光復陽微而不亂於羣隂恆處雜而常德不厭損欲先難習熟則易益但充長而不造作困身困而道亨井不動而及物巽稱物之宜而潛隱不露集説韓氏伯曰和而不至從物者也和而能至故可履也微而辨之不逺復也雜而不厭是以能恆刻損以修身故先難也身修而無患故後易也有所興為以益於物故曰長裕因物興務不虛設也程子曰益長裕而不設謂固有此理而就上充長也設是撰造也撰造則為偽也朱子語類云稱而隱是巽順恰好底道理有隱而不能稱量者有能稱量而不能隱伏不露形迹者皆非巽之道也巽德之制也巽以行權都是此意陸氏九淵曰履和而至兑以柔悅承乾之剛健故和天在上澤處下理之至極不可易故至君子所行體履之義故和而至謙尊而光不謙則必自尊自耀自尊則人必賤之自耀則德喪能謙則自卑自晦自卑則人尊之自晦則德益光顯復小而辨於物復貴不逺言動之微念慮之隱必察其為物所誘與否不辨於小則將致悔咎矣恆雜而不厭人之生動用酬酢事變非一人情於此多至厭倦是不恆其德者也能恆者雖雜而不厭損先難而後易人情逆之則難順之則易凡抑損其過必逆乎情故先難既損抑以歸於善則順乎本心故後易益長裕而不設益者遷善以益己之德故其德長進而寬裕設者侈張也有侈大不誠實之意如是則非所以為益也困窮而通不修德者遇窮困則隕穫喪亡而已君子遇窮困則德益進道益通井居其所而遷如君子不以道徇人故曰居其所而博施濟衆無有不及故曰遷巽稱而隱巽順於理故動稱宜其所以稱宜者非有形迹可見故隱案復小而辨於物陸氏蓋用韓氏之説與朱子異然朱子之義為精履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權本義寡怨謂少所怨尤辨義謂安而能慮此第七章三陳九卦以明處憂患之道集説虞氏翻曰禮和為貴故以和行也有不善未嘗不知故自知也恆立不易方故一德也歐陽氏修曰君子者天下係焉一身之損益天下之利害也君子之自損忿欲耳自益遷善而改過耳然而肆其忿欲者豈止一身之損哉天下有被其害矣遷善而改過豈止一身之益哉天下有蒙其利矣朱子語類問巽以行權權是逶迤曲折以順理否曰然巽有入之義巽為風如風之入物只為巽便能入義理之中無細不入又問巽稱而隱隱亦是入物否曰隱便是不見處又云見得道理精熟後於物之精微委曲處無處不入所以説巽以行權又云兌見而巽伏權是隱然作底事物若顯然地作却不成行權陸氏九淵曰履以和行行有不和以不由禮故也能由禮則和矣謙以制禮自尊大則不能由禮卑以自牧乃能自節制以禮復以自知自克乃能復善他人無與焉恆以一德不常則二三常則一終始惟一時乃日新損以逺害如忿欲之類為德之害損者損其害德而已能損其害德者則吾身之害固有可逺之道特君子不取必乎此也益以興利有益於己者為利天下之有益於己者莫如善君子觀易之象而遷善故曰興利能遷善則福慶之利固有自致之理在君子無加損焉有不足言者困以寡怨君子於困厄之時必推致其命吾遂吾之志何怨之有推困之義不必窮厄患難及己也凡道有所不可行皆困也君子於此自反而已未嘗有所怨也井以辨義君子之義在於濟物於井之養人可以明君子之義巽以行權巽順於理如權之於物隨輕重而應則動靜稱宜不以一定而悖理也九卦之列君子修身之要其序如此缺一不可也故詳復贊之王氏應麟曰復以自知必自知然後見天地之心有不善未嘗不知自知之明也何氏楷曰以用也履者禮也用禮以約之而制作始和此履所以為德之基也所貴乎禮者以其為德之品節也然惟讓為禮之實不讓不為禮故用謙以制之此謙所以為德之柄也總論項氏安世曰此章亦論彖辭凡彖辭之體皆先釋卦名次言兩卦之體末推卦用故此章之序亦然以為觀彖者之法也胡氏炳文曰上經自乾至履九卦下經自恆至損益亦九卦上經履至謙五卦下經益至困井亦五卦上經謙至復又九卦下經井至巽又九卦上經自復而後八卦而為下經之恆下經自巽而未濟亦八卦復為上經之乾上下經對待非偶然者葉氏良佩曰此章三陳九卦專言卦也易道屢遷一章專言爻也案此上二章申象之動乎內而吉凶見乎外也六十四卦之象皆以乾坤交錯而成中涵天地變化之道鬼神微妙之德是所謂動乎內者也及聖人命之以名繫之以辭於是吉凶之義昭然見矣六十四卦之名或曰伏羲所命或曰文王所命蓋自夫子之時而已疑也但以其所取事類觀之知其非上古淳質時所有則為文王命名可以理推名當則卦爻之物可辨因正言其是非而吉凶之辭可斷向之體天地之撰而有以彰往察來通神明之德而有以微顯闡幽者至是而大備矣名雜而不越故所稱者小而義則大彖所以發其藴也故寓意深逺而辭則文指逺辭文故言雖曲而中名小類大故事雖肆而隱蓋由於世衰民疑而將以濟其行故非探賾索隱無以盡其變也非周事體物無以悟其心也夫吉凶者失得之報而已矣故下九卦遂言聖人之所處以示觀彖之例易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適本義逺猶忘也周流六虛謂隂陽流行於卦之六位集説侯氏行果曰居則觀象動則玩占故不可逺也孔氏頴達曰六位言虛者位本無體因爻始見故稱虛也邵子曰六虛者六位也虛以待變動之事也朱子語類云易不可為典要易不是確定硬本子楊雄太玄排定三百五十四贊當晝三百五十四贊當夜晝底吉夜底凶吉之中又自分輕重凶之中又自分輕重易却不然有陽居陽爻而吉底又有凶底有隂居隂爻而吉底又有凶底有有應而吉底有有應而凶底是不可為典要之書也是有那許多變所以如此蔡氏淵曰屢遷謂為道變通而不滯乎物自易之為書至屢遷此總言為書為道以起下文之意也自變動不居至唯變所適言易道之屢遷也不居猶不止也六虛六位也位未有爻曰虛卦雖六位而剛柔爻畫往來如寄故以虛言或自上而降或由下而升上下無常也柔求文剛分剛上而文柔剛柔相易也典常也要約也其屢變無常不可為典要唯變所適而已吳氏曰慎曰不可為典要變無方也既有典常理有定也故曰易者變易也不易也其出入以度外內使知懼本義此句未詳疑有脫誤集説韓氏伯曰明出入之度使物知外內之戒也潘氏夢旗曰易雖不可為典要而其出入往來皆有法度而非妄動也故卦之內外皆足以使人知懼蔡氏清曰卦爻所説者皆利用出入之事其出入也皆必以其法法者事理當然之則也使人入而在內出而在外皆知有法而不敢妄為是使知懼也知懼必以度又明於憂患與故無有師保如臨父母本義雖無師保而常若父母臨之戒懼之至集説虞氏翻曰神以知來故明憂患知以藏往故知事故蘇氏軾曰憂患之來苟不明其故則人有苟免之志而怠故易明憂患又明其所以致之之故朱氏震曰又明於己之所當憂患與所以致憂患之故無有師保教訓而嚴憚之有如父母親臨而愛敬之見聖人之情也趙氏振芳曰不特使人知懼又明於憂患與所以致憂患之故諄諄然與民同患與民同憂不止如師保之提命且直如父母之儼臨愛之無所不至慮之無所不周故訓之無所不切也無有師保如臨父母朱氏趙氏之説甚善蓋上文案言出入以度則人知畏懼嚴憚之如師保及觀其示人憂患之故懇切周盡使聞之者不知嚴憚而但感其慈愛此聖人之情所以為至也無有者非無師保也人之意中無有師保也初率其辭而揆其方既有典常苟非其人道不虛行本義方道也姑由辭以度其理則見其有典常矣然神而明之則存乎其人也此第八章集説虞氏翻曰其出入有度故有典常神而明之存乎其人不言而信謂之德行故不虛行也孔氏頴達曰雖千變萬化不可為典要然循其辭度其義原尋其初要結其終皆唯變所適是其常典也邵子曰既有典常常也不可為典要變也龔氏煥曰既曰不可為典要又曰既有典常不可為典要者以剛柔之變易無常者言也既有典常者以卦爻之一定而不可易者言也剛柔變易之無常所以卦爻一定而不可易而一定不易之理未嘗不行於剛系變易之中也總論項氏安世曰此章專論易之爻辭易之為書也不可逺為道也屢遷二句一章大指自變動不居至惟變所適言屢遷也自出入以度至道不虛行言不可逺也惟其屢遷故虛而無常不可為典要惟其不可逺故有度有方有典有常而不可虛方其率之也則謂之辭及其行之也則謂之道辭之所指即道之所遷也人能循其不可逺之理則屢遷之道得矣易之為書也原始要終以為質也六爻相雜唯其時物也本義質謂卦體卦必舉其始終而後成體爻則唯其時物而已集説韓氏伯曰質體也卦兼始終之義也孔氏頴達曰物事也一卦之中六爻交相雜錯唯各會其時各主其事吳氏澄曰質謂卦之體質文王原卦義之始要卦義之終以為卦之體質各名其卦而繫彖辭也爻之為言交也周公觀六位之交錯唯其六爻之時各因其義而繫爻辭也此章言六爻而六爻統於彖故先言彖乃説六爻也谷氏家杰曰此章雖兼卦爻實以卦引起爻專重在爻上何氏楷曰此章統論爻畫而歸重於彖辭説易之法莫備於此易之為書綱紀在卦卦必合爻之全而後成卦一畫不似便成他局聖人之繫卦為之推原其始要約其終彌綸全卦之理如物之有體質至於繫爻則惟相其六位之時而導之宜因其隂陽之物而立之像然其大指要不過推演彖辭之意其初難知其上易知本末也初辭擬之卒成之終本義此言初上二爻集説干氏寶曰初撰議之故難知卒終成之故易知本末勢然也孔氏頴達曰初辭擬之者覆釋其初難知也以初時擬議其始故難知也卒成之終者覆釋其上易知也言上是事之卒了而成就終竟故易知也吳氏澄曰初與終為對擬之與卒成之為對兩句文法顚倒相互案講家以難知易知屬學易者擬之卒成屬作易者然聖人作易六爻之條理渾成於心豈有難易哉故初辭擬之卒成之終兩句是申上兩句皆當屬學易者説若夫雜物撰德辨是與非則非其中爻不備本義此謂卦中四爻案雜字撰字辨字亦當屬學易者説雜者參錯其貴賤上下之位也撰者體察其剛柔健順之德也德位分而是非判矣辨者剖别之於象以考驗之於辭也噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣本義彖統論一卦六爻之體集説蘇氏軾曰彖者常論其用事之爻故觀其彖則其餘皆彖爻之所用者也吳氏澄曰章首第一句言彖第二句總言六爻此一節又總言六爻而歸重於彖蓋為結語與章首起語相始終案彖辭之繫文王蓋統觀六爻以立義者如屯則以初為侯蒙則以二為師師則以二為將比則以五為君其義皆先定於彖爻辭不過因之而隨爻細别耳其爻之合於卦義者吉不合於卦義者凶故彖辭為綱領而爻其目也彖辭為權衡而爻其物也總之於綱則目之先後可知審之於權衡則物之輕重可見夫子彖傳既參錯六爻之義以釋辭示人卦爻之不相離矣於此又特指其要而切言之讀易之法莫先於此二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也本義此以下論中爻同功謂皆隂位異位謂逺近不同四近君故多懼柔不利逺而二多譽者以其柔中也集説崔氏憬曰此重釋中四爻功位所宜也二四皆隂位隂之為道近比承陽故不利逺矣二逺陽雖則不利其要或有無咎者以柔居中異於四也蘇氏軾曰近於五也有善之名而近於君則懼矣故二之善宜著四之善宜隱程氏迥曰易以六居五以九居二為卦十有六雖為時不同其十有五皆吉謂人君柔中虛已而任剛德之臣其臣亦以剛中應之也吳氏澄曰二與四同是隂位若皆以柔居之則六二六四同是以柔居隂故曰同功然其位則有逺近之異五者一卦之尊位故逺近皆自五而言二與五應為逺四與五比為近以位之逺近有異而其善亦不同逺者意氣舒展而多譽近者勢分逼迫而多懼多者謂不盡然而若此者衆爾近也二字釋四多懼謂四之所以懼不能如二之多譽者蓋迫近尊位不得自安故也柔之為道以下釋二多譽柔不能自立近者有所依倚逺者宜若不利二逺於五而其歸得以無咎者以其用柔而居下卦之中也何氏楷曰月逺日則光滿近則光微此多譽多懼之説也案吳氏説亦詳密但以二之譽四之懼專為以柔居柔者三之凶五之功專為以剛居剛者則於經意猶偏蓋聖人之言舉其一隅則可以三隅反多譽多懼以二四之位言不論剛柔居之皆多譽多懼也多凶多功以三五之位言亦不論剛柔居之皆多凶多功也下文言柔之為道不利逺者則可見二雖多譽而九二尤善於六二四既多懼而九四尤甚於六四也又言其柔危其剛勝邪則可見三雖多凶而九三猶善於六三五雖多功而六五猶讓於九五也柔之為道不利逺者為六二言而九二在其中併六四九四皆在其中其柔危為六三言而九三在其中併六五九五亦在其中此聖言之所以妙三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪本義三五同陽位而貴賤不同然以柔居之則危唯剛則能勝之此第九章集説侯氏行果曰三五陽位隂柔處之則多凶危剛正居之則勝其任言邪者不定之辭也或有柔居而吉者得其時也崔氏憬曰三處下卦之極居上卦之下而上承天子若無含章之美則必致凶五既居中不偏貴乘天位以道濟物廣被寰中故多功也吳氏澄曰三與五同是陽位若皆以剛居之則九三九五同是以剛居陽故曰同功然其位則有貴賤之異賤者剛居剛為太過而多凶貴者剛居剛為適宜而多功二多譽四多懼之上有其善不同一句而三多凶五多功之上無之者譽懼雖不同而皆可謂之善凶則不可謂善矣故不言也貴賤之等也五字釋三多凶謂三之所以凶不能如五之功者蓋貴賤有等賤者不與貴者同故也其柔危以下釋五多功五為尊位以柔居之則不勝其任而危惟剛居之則能勝其任而有功也胡氏炳文曰其柔危其剛勝專為三言也蔡氏清曰或逺或近或貴或賤此所謂爻有等故曰物者是為雜物或柔中或不中或多譽或多懼或多凶或多功又或柔危而剛勝此所謂撰德也而辨是與非舉具其中矣案柔危剛勝吳氏以為指五胡氏以為指三侯氏兼之須分别融會乃得經意總論何氏楷曰章末覆舉中爻所以略初上不言者蓋初上非用事之地故所重在時位中四爻用事之地故惟重在德行也若夫卦主在初上者則不可以此例論此章為易之凡例求卦爻之義者執此以求之而已然僅曰要曰多曰過半則雖聖人猶未敢輕言之韋編三絶有以夫案此上二章申爻之動乎內而吉凶見乎外也道屢遷者於周流六虛見之無常相易所謂周流者也唯變所適所謂屢遷者也此則爻之動乎內者及繫辭而吉凶見則使人於日用出入之間各循乎法度而知懼蓋凛乎師保之嚴矣再觀其開示人以憂患與其所以致憂患之故不啻父母之謀其子孫者又使人無有師保之嚴但如臨父母之親而已夫是以由其辭而揆之則不可為典要者未嘗不有典常而欲體其道而行之則所謂不可逺者又存乎其人之不逺於道也下文遂以辭之典常言之大約初上雖無位而為事之始終自二至五則居中而正為用事之位玩辭者擬其初竟其終參合其物理以辨其是非而求其備此學易之法也然彖者括始終以立體而爻則其趨時之物而已故知者觀彖辭而爻義已大半得此又學易之要也又舉中四爻而申之以見凡當位用事則有譽有懼有凶有功非初上無位而或在功過之外者比也聖人所謂明憂患與故者於此尤諄諄焉易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非它也三才之道也本義三畫已具三才重之故六而以上二爻為天中二爻為人下二爻為地集説項氏安世曰言聖人所以兼三才而兩之者非以私意傅會三才之道自各有兩不得而不六也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉本義道有變動謂卦之一體等謂逺近貴賤之差相雜謂剛柔之位相間不當謂爻不當位此第十章集説陸氏績曰天道有晝夜日月之變地道有剛柔燥濕之變人道有行止動靜吉凶善惡之變聖人設爻以效三者之變動故謂之爻者也孔氏頴達曰三才之道既有變化移動故重畫以象之而曰爻也物者物類也爻有隂陽貴賤等級以象萬物之類故謂之物也若相與聚居間雜成文不相妨害則吉凶不生由文之不當相與聚居不當於理故吉凶生也張子曰故曰爻爻者交雜之義項氏安世曰爻有等者初二三四五上也物相雜者初三五與二四上隂陽相間也文不當者九居隂位六居陽位也李氏簡曰一則無變無動兼而兩之故三才之道皆有變動以其道有變動故名其畫曰爻爻者效也言六畫能效天下之動也爻有貴賤上下之等故曰物物有九六雜居剛柔之位則成文交錯之際有當不當吉凶由是生焉汪氏咸池曰文既相雜豈能皆當故有以剛居柔以柔居剛而位不當者亦有以柔居柔以剛居剛而位未必皆當者則吉凶於是而生矣何氏楷曰不當者非專指陽居隂位隂居陽位也卦情若淑或以不當為吉卦情若慝反以當位為凶要在隨時變易得其當而已吳氏曰慎曰以時義之得為當時義之失為不當不以位論易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也本義危懼故得平安慢易則必傾覆易之道也此第十一章集説張氏栻曰既懼其始使人防微杜漸又懼其終使人持盈守成要之以無咎而補過乃易之道也髙氏攀龍曰一部易原始要終只是敬懼無咎而已故曰懼以終始無咎者善補過也易中凡説有喜有慶吉元吉都是及於物處若本等只到了無咎便好趙氏光大曰危者使平二句即是辭危處使之不可作易使之言由危而平者危使之也言其理之必然若有以使之也易之道與其道甚大道字正相應何氏楷曰使者天理之自然若或使之也所謂殖有禮覆昏暴天之道也案此上二章申功業見乎變聖人之情見乎辭也所謂變者生於三才之道以兩而行交合相濟迭用不窮也寫之於易則以其兩相交也而名為爻所處之位不同也而名為物所以處是位者又相錯也而名為文相錯則有當有否而吉凶於此生大業於此起矣故曰功業見乎變雖然上古之聖以是濟民用焉而辭未備也文王當殷商之衰忘己之憂而惟世之患是故其因事設戒者無非欲人戰戰兢兢免於咎而趨於平也是所謂以身立教反覆一編之中千載之上心如見焉故曰聖人之情見乎辭夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻本義至健則所行無難故易至順則所行不繁故簡然其於事皆有以知其難而不敢易以處之是以其有憂患則健者如自髙臨下而知其險順者如自下趨上而知其阻蓋雖易而能知險則不陷於險矣既簡而又知阻則不困於阻矣所以能危能懼而無易者之傾也集説孔氏頴達曰乾之德行恆易略不有艱難以此之故能知險之所興若不易則為險故行易以知險也坤之德行恆為簡靜不有繁亂以此之故知阻之所興若不簡則為阻難故行簡以知阻也蘇氏軾曰已險而能知險已阻而能知阻者天下未嘗有也是故處下以傾髙則髙者畢赴用晦以求明則明者必見易簡以觀險阻則險阻無隱情矣張子曰簡易然後知險阻簡易理得然後一以貫天下之道朱子語類云險與阻不同險是自上視下見下之險故不敢行阻是自下觀上為上所阻故不敢進項氏安世曰易與險相反唯中心易直者能照天下險巇之情簡與阻相反唯行事簡靜者能察天下繁壅之機李氏簡曰兩險相疑兩阻相持則險不能知險知天下之至險者至易者也阻不能知阻知天下之至阻者至簡者也胡氏炳文曰前言乾坤之易簡此言乾坤之所以為易簡蓋乾之德行所以恆易者何也乾天下之至健也坤之德行所以恆簡者何也坤天下之至順也蔡氏清曰天下之至健天下之至順猶中庸云天下至誠天下至聖相似皆以人言君子行此四德者故曰乾元亨利貞此天下之至健者也安貞之吉應地無疆此天下之至順者也能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者本義侯之二字衍説諸心者心與理會乾之事也研諸慮者理因慮審坤之事也説諸心故有以定吉凶研諸慮故有以成亹亹集説張子曰易簡故能説諸心知險阻故能研諸慮朱氏震曰簡易者我心之所固有反而得之能無説乎以我所有慮其不然能無研乎朱子語類云能説諸心能研諸慮方始能定天下之吉凶成天下之亹亹凡事見得通透了自然歡説既説諸心是理會得了於事上更審一審便是研諸慮研是更去研磨定天下之吉凶是剖判得這事成天下之亹亹是作得這事業張氏栻曰心之説也不忤於理慮之研也不昧於事則得者為吉失者為凶吉凶既定則凡勉於事功者莫不𢎞之不息以成其功矣谷氏家杰曰能説諸心能研諸慮二能字應下成能之能見此理人人具有唯聖人能説能研耳是故變化云為吉事有祥象事知器占事知來本義變化云為故象事可以知器吉事有祥故占事可以知來集説蘇氏軾曰言易簡者無不知也朱子語類問有許多變化云為又吉事皆有休祥之應所以象事者於此而知器占事者於此而知來曰是何氏楷曰凡人事之與吉逢者其先必有祥兆天人相感志一之動氣也聖人作易正以迪人於吉故獨以吉事言之與吉之先見同義天地設位聖人成能人謀鬼謀百姓與能本義天地設位而聖人作易以成其功於是人謀鬼謀雖百姓之愚皆得以與其能集説朱子語類云天地設位四句説天人合處天地設位使聖人成其功能人謀鬼謀則雖百姓亦可與其能成能與與能雖大小不同然亦是小小底造化之功用胡氏炳文曰聖人成天地所不能成之能百姓得以與聖人所已成之能也蔡氏清曰凡卜筮問易者先須謀諸人然後乃可問易雖聖人亦然故洪範曰謀及卿士謀及庶人然後曰謀及卜筮又曰朕志先定詢謀僉同然後鬼神其依龜筮協從是也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣本義象謂卦畫爻彖謂卦爻辭集説崔氏憬曰伏羲始畫八卦因而重之以備萬物而告於人也爻謂爻下辭彖謂卦下辭皆是聖人之情見乎繫辭而假爻象以言故曰爻彖以情言六爻剛柔相推而物雜居得理則吉失理則凶故吉凶可見也蔡氏清曰八卦以象告則剛柔離居矣爻彖以情言則吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝本義不相得謂相惡也凶害悔吝皆由此生集説崔氏憬曰逺謂應與不應近謂比與不比或取逺應而舍近比或取近比而舍逺應由此逺近相取所以生悔吝於繫辭矣項氏安世曰愛惡相攻以下皆言吉凶以情遷之事而以六爻之情與辭明之吉凶悔吝利害之三辭分出於相攻相取相感之三情而總屬於相近之一情此四者爻之情也命辭之法必各象其爻之情故觀其辭可以知其情利害者商略其事有利有不利也悔吝則有迹矣吉凶則其成也故總而名之曰吉凶相感者情之始交故以利害言之相取則有事矣故以悔吝言之相攻則其事極矣故以吉凶言之愛惡逺近情偽姑就淺深分之若錯而綜之則相攻相取相感之人其居皆有逺近其行皆有情偽其情皆有愛惡也故總以相近一條明之近而不相得則以惡相攻而凶生矣以偽相感而害生矣不以近相取而悔吝生矣是則一近之中備此三條也凡爻有比爻有應爻有一卦之主爻皆情之當相得者也今稱近者止據比爻言之反以三隅則逺而為應為主者亦必備此三條矣但居之近者其吉凶尤多故聖人槩以近者明之吳氏澄曰害者利之反凡占曰不利無攸利者害也近而不相得則凶害悔吝其相得則吉利悔亡無悔無咎從可知也胡氏一桂曰凡易之情以下獨舉近者總言之近而相取其情乃不相得此必其初之以偽感終至於惡而相攻是以凶耳既至於凶其於害悔吝可知已蔡氏清曰愛惡相攻三句平等説下文却合言之曰大抵凡易之情近而相得者為貴不相得而逺者亦無害唯是近而不相得者則凶又有害而悔且吝矣又曰吉凶悔吝利害六字大抵吉凶重於利害利害重於悔吝故末句先凶次害又次悔吝而凡曰吉凶見乎外吉凶以情遷則皆該利害與悔吝矣林氏希元曰近而不相得是解逺近相取而悔吝生一句并愛惡相攻兩句亦解蓋逺近相取而悔吝生這裏分情相得不相得情相得者逺相取而悔吝情不相得者近相取而悔吝但此意未明故於此發之只曰近不曰逺者舉近則逺者可以三隅反也夫近而不相得則凶可見惡相攻而凶生者以其近也偽相感而害生者亦以其近也故曰是併解愛惡相攻兩句案此條諸説相參極詳密矣然尚有須補備者諸説皆以近為相比之爻於易例未盡應爻雖逺然既謂之應地雖逺而情則近也先儒蓋因上章四多懼近也柔之為道不利逺者故必以相比為近然彼就二四而言之則有逺近之别此就六爻而統論之則比與應皆近也觀蒙之六四曰獨逺實也以其比應皆隂也如雖無比而有應亦不得謂之逺實矣故易於應爻有曰婚媾者有曰宗者有曰主者有曰類者皆親近之稱也逺近相取須分無比應者為逺有比應者為近乃為完備易之情其有逺近者固從爻位而生若愛惡情偽則從何處生來須知易爻吉凶皆在時位德三字上取時隨卦義而變時變則有愛惡矣如泰之時則交否之時則隔比之時則和訟之時則爭是愛惡相攻者由於時也位逐六爻而異位異則有逺近矣如比之內比外比觀之觀光者近也蒙之困蒙復之迷復者逺也是逺近相取者由於位也德由剛柔當否而别德别則有情偽矣如同人五之號咷豫二之介石以中正也同人三之伏戎豫三之盱豫以不中正也是情偽相感者由於德也時有消息盈虛之變位有貴賤上下之異德有剛柔善惡之别此三者皆吉凶悔吝之根然其發動皆因彼己之交而起所謂彼己之交者比也應也非因比應則無所謂相攻也無所謂相取也無所謂相感也所謂相攻相取相感者皆以比應言之故下獨舉近而不相得以見例近而相得相愛者也相取者也以情相感者也善之善者也不相得者而逺則雖惡而不能相攻也不近而不得相取也雖偽而不與相感也善之次也宜相得者而逺則雖愛而不得相親也不近而不能相取也雖有情而無以相感也又其次也惟近而不相得則以惡相攻以近相取以偽相感人事之險阻備矣大者則凶極其惡之情者也同人三之敵剛是也次者則害防其偽之端者也兑之介疾孚剝是也輕者猶不免於悔吝如豫萃之三雖以近而從四然以非同類而曰悔曰吝者此也易者教人知險知阻故特舉此條以見例餘者可以三隅反也故觀易者須先知時位德比應五字又須知時位德之當否皆於比應上發動其義莫備於此章矣將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈本義卦爻之辭亦猶是也此第十二章集説王氏申子曰歉於中者必愧於外故將叛者其辭慙疑於中者必泛其説故中心疑者其辭枝吉德之人見理直故其辭寡躁競之人急於售故其辭多誣善類者必深匿其迹而隂寓其忮故其辭遊失其守者必見義不明而內無所主故其辭屈吳氏澄曰此篇之首泛言辭變象占四道而末句歸重於辭且以本於聖人之情至此卒章凡三節其中亦言四道而首末皆言彖爻之辭末又本於易之情以終繫辭之傳蓋唯聖人之情能知易之情而繫易之辭也是為一篇始終之脈絡云張氏振淵曰此節即人之辭以情遷者驗易之辭以情遷也案此章亦總上十一章之意而通論之易簡即上下傳首章所謂乾坤之理而聖人體之以立極者故此即以乾坤為聖人之名稱見易道之本聖心所自具也易與險反故知險簡與阻反故知阻以是説諸心即以是研諸慮凡天下所謂吉凶亹亹者固已豫定取成於聖人之心矣於是仰觀變化俯察云為知以藏往而通其象神以知來而裕其占此所以作易而天地之功以成百姓之行以濟也爻象動乎內者以象告吉凶見乎外者以情言功業見乎變者以利言聖人之情見乎辭者以情遷時有順逆而愛惡生焉位有離合而逺近判焉德有淑慝而情偽起焉此三者易之情也吉利凶害悔吝之辭所由興也在易則為易之情聖人從而發揮之則吉凶之途明而利害之幾審此即聖人之情也故言凡人之情著於辭而不可掩者六反切上章所謂有憂患者其辭危也御纂周易折中卷十五

body:
  text: 欽定四庫全書聖祖仁皇帝御製周易折中序易學之廣大悉備秦漢而後無復得其精㣲矣至有宋以來周邵程張闡𤼵其奥唯朱子兼象數天理違衆而定之五百餘年無復同異宋元明至於我朝因先儒己開之㣲㫖或有議論已見漸至啟後人之疑朕自弱齡留心經義五十餘年未嘗少輟但知諸書大全之駁雜奈非專經之純熟深知大學士李光地素學有本易理精詳特命脩周易折中上律河洛之本末下及衆儒之考定與通經之不可易者折中而取之越二寒暑甲夜披覽片字一畫斟酌無怠康熙五十四年春告成而傳之天下後世能以正學為事者自有所見歟康熙五十四年春三月十八日

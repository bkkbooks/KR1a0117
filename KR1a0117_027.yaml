body:
  text: 欽定四庫全書御纂周易折中卷二十二序卦雜卦眀義卦之序也雜也皆出於文王也其所以序之雜之必有深意亦必有略例至夫子為之傳乃因其次第而發眀陰陽相生相對之義以見易道之無窮蓋文王之立法至精而夫子之見理至大二者皆不可以不知也韓孔諸儒疑卦序若如夫子所言則不應卦皆反對故程傳於卦下既述夫子之意又為上下篇義以繹其未盡之指至歐陽修諸人直斥序卦為非孔子之書者妄也若雜卦則乾坤之後繼以比師其次敘又與序卦無一同者是豈無義存焉而諸儒皆莫之及惟元儒胡氏於篇終微發其端未竟其緒也今因程胡之説而詳推二篇之所以類序錯綜者目曰眀義以附焉序卦程子有上下篇義今祖其意而詳推之上萹陽也天道也故凡天道之正陽卦陽爻之盛及陰陽長少先後有序者皆上篇之卦也下篇陰也人事也故凡人事之交陰卦陰爻之盛及陰陽交感雜亂長少先後無序者皆下篇之卦也故以八卦而論乾坤陰陽之純也坎離陰陽之中也皆正中之正故為陽震巽陰陽始交也艮兌交之極也皆正中之交故為陰以八卦之交而論惟否泰天地之交交中之正也故為陽咸恆損益既未濟六子之交交中之交也故為陰又乾交陽卦凡六需訟無妄大畜皆為陽盛惟以爻畫參之則大壯為陽過中遁為陰浸長故雖陽卦而居陰也坤交陰卦凡六晉眀夷萃升皆為陰盛惟臨則陽浸長觀則陰過中故雖陰卦而居陽也又乾交陰卦凡六小畜履同人大有皆五陽而一陰陽之盛也惟以爻畫參之則夬為陽已亢姤為陰始生故不得為陽而為陰也坤交陽卦凡六師比謙豫剝復皆五陰而一陽凡陽有主陰之義陰雖多不為盛而為役陽雖少不為衰而為主故皆不為陰而為陽也又陽卦相交凡六屯蒙頤長少先後以序者也故為陽蹇解小過失序者也故為陰又陰卦相交凡六獨大過為頤之對又得其序故亦為陽家人睽革鼎中孚皆陰也革鼎得序故猶為陰中之陽也又陰陽相交之卦凡十有二其得序者六隨蠱噬嗑賁為陽中之陰井困為陰中之陽其失序者六漸歸妹豐旅渙節陰中之陰也二篇之分既定其逐節逐卦次第先後則以陰陽盛衰消長之義次之如後論乾坤屯蒙需訟師比小畜履右陽卦第一節泰否同人大有謙豫右陽卦第二節隨蠱臨觀噬嗑賁剝復右陽卦第三節無妄大畜頤大過坎離右陽卦第四節咸恆遁大壯晉眀夷家人睽蹇解右陰卦第一節損益夬姤萃升右陰卦第二節困井革鼎震艮漸歸妹豐旅巽兌右陰卦第三節渙節中孚小過既濟未濟右陰卦第四節陽卦第一節乾坤者衆卦之宗故居篇首先儒謂周易首乾則此是文王所定不可易也乾坤之外三男為尊屯蒙者三男之卦也而皆長少先後不失其序得陽道之正故次乾坤焉需訟上下皆陽卦二五皆陽爻陽之盛也故次屯蒙焉師比皆以一陽為衆陰主而居二五中位亦陽之盛也故次需訟焉小畜履五陽一陰陽既極多而二陰又退居三四之偏位皆陽盛之卦也故次師比焉陽卦第二節泰否者乾坤之合體義同乾坤者也然以其乾坤之交故亞於乾坤同人大有義反師比然以其陽多極盛故同小畜履而亞於師比謙豫義反小畜履然陽為卦主故同師比而亞於小畜履此六者並為陽盛之次也陽卦第三節以上二節除屯蒙為三男純卦餘則皆有乾坤為主未嘗有男女之交也故曰陽盛至隨蠱噬嗑賁然後有男女之交是陰始生也然而長少先後皆不失序故猶為陽中之陰隨蠱之後繼以臨觀噬嗑賁之後繼以剝復則陽又盛矣陽卦第四節旡妄大畜乾與陽卦合體義同需訟然二五不皆陽爻故亞於需訟頤大過男女類分長少先後義同屯蒙然二卦不皆陽卦故亞於屯蒙坎離得天地之中氣義同乾坤然六子之卦也故又亞於乾坤此六卦者顛倒與篇首六卦相對並為陽復盛之卦也陰卦第一節下篇主人事之交故以夫婦之道始男女之合少則情専老則誼篤故咸為首恆次之遁大壯陰長陽過陰之盛也故次咸恆晉眀夷上下皆陰卦二五皆陰爻義反陽之需訟家人睽三陰之卦也而又長少失序陰道也義反陽之屯蒙故四卦次遁大壯蹇解本三陽之卦而亦長少失序義反屯蒙故從家人睽焉陰卦第二節損益二少二長之交義同咸恆夬姤陽極陰生義同遁大壯萃升坤與陰卦交義同晉眀夷故六卦相繼陰盛之次也陰卦第三節困井男女交而以序義同陽之隨蠱噬嗑賁陰中之陽也革鼎三陰之卦同家人睽然長少以序故從困井猶大過之從頤也震艮雖下經之主然本陽卦也故此六卦並為陰中之陽漸歸妹豐旅男女交而失序與困井革鼎反巽兌陰卦與震艮反此六卦則又自陽而向乎陰矣陰卦第四節漸歸妹豐旅渙節六卦男女交而失序相類也然漸歸妹兩卦長男長女皆在焉豐旅有長男在焉渙節惟長女在焉則渙節者變之窮陰道之極也中孚小過與上篇頤大過相對大過雖陰卦以得其序而從頤故小過雖陽卦以失其序而從中孚其義與蹇解之從家人睽者同並為陰復盛之卦也既濟未濟終篇所重在未濟蓋三陽失位男之窮也陰盛之極也然物不可窮也故受之以未濟終焉孔子繫辭傳敘上下篇九卦曰履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也先儒以其卦推配上下經皆相對蓋乾與咸恆對履與損益對謙與困井對復與巽兌對每以下篇兩卦對上篇一卦凡十二卦而二篇之數適齊矣然十二卦之中又止取九卦者乾咸其始也兌其終也略其終始而取其中間之卦以著陰陽消息盛衰之漸故止於九前所推上下篇各四節陰陽消息盛衰之次與此圖密合雜卦先儒有以雜卦為互卦者今用其説而詳推之四象相交為十六事圖互成乾太陽交太陽互成夬太陽交少陰互成睽太陽交少陽互成歸妹太陽交太陰互成家人少陰交太陽互成既濟少陰交少陰互成頥少陰交少陽互成復少陰交太陰互成姤少陽交太陽互成大過少陽交少陰互成未濟少陽交少陽互成解少陽交太陰互成漸太陰交太陽互成蹇太陰交少陰互成剝太陰交少陽互成坤太陰交太陰此互卦之根也惟其方成四畫時所互有此十六卦故六十四卦成後以中爻互之只此十六卦即以六爻循環互之亦只比十六卦四畫互成十六卦又以其中二畫觀之則互乾坤剝復大過頥姤夬者皆中二爻為太陽太陰者也互漸歸妹解蹇睽家人既未濟者皆中二爻為少陽少陰者也故十六事歸於四象而已六十四卦中四爻互卦圖乾坤剝復大過頤姤夬以上八卦皆互乾坤解蹇睽家人漸歸妹既濟未濟以上八卦皆互既未濟比師臨觀屯蒙損益以上八卦皆互剝復咸恆大壯遁大有同人革鼎以上八卦皆互姤夬大畜無妄萃升隨蠱否泰以上八卦皆互漸歸妹渙節小過中孚豐旅離坎以上八卦皆互大過頤震艮謙豫噬嗑賁晉明夷以上八卦皆互解蹇兌巽井困小畜履需訟以上八卦皆互睽家人十六卦互成四卦圖乾仍互乾漸互未濟坤仍互坤歸妹互既濟剝互坤解互既濟復互坤蹇互未濟大過互乾睽互既濟頤互坤家人互未濟姤互乾既濟互未濟夬互乾未濟互既濟互乾坤既未濟之十六卦即諸卦之所互而成者也故十六卦又只成乾坤既未濟四卦猶十六事之歸於四象也蓋四象即乾坤既未濟之具體故以太陽三疊之即乾以太陰三疊之即坤以少陰三疊之即既濟以少陽三疊之即未濟乾坤既未濟統乎易之道矣故序卦雜卦皆以是終始焉乾坤體也既未濟用也故以乾坤始之既未濟終之中間則左方六卦剝復漸歸妹解蹇為陽卦皆以震艮為主而統於乾坤右方六卦姤夬大過頥睽家人為陰卦皆以巽兌為主而統於既未濟故圖之外一層者六十四卦也次內一層者所互之十六卦也又次內一層者十六卦所互之四卦也以其象限觀之則皆互乾坤者居前互既未濟者居後以其左右觀之則左方者皆統於乾坤右方者皆統於既未濟也為互卦之主不在互卦之內者十四卦乾互之得乾坤互之得坤既濟互之得未濟未濟互之得既濟此四卦者不可變故不在互卦之內也陽卦六剝復者震艮交於坤者也漸歸妹者震艮交於巽兌者也解蹇者震艮交於坎者也故震艮為互陽卦之主陰卦六姤夬者巽兌交於乾者也大過頥者巽兌交於震艮者也睽家人者巽兌交於離者也故巽兌為互陰卦之主以三畫言之艮陽極而震陽生也以六畫言之剝陽極而復陽生也故剝復象艮震而為陽卦之首以三畫言之兌隂極而巽陰生也以六畫言之夬隂極而姤陰生也故夬姤象兌巽而為陰卦之首乾坤之用在否泰猶坎離之用在既未濟也故否泰乾坤之交而為既未濟之宗此十卦亦不在互卦之內雜卦中遇此數卦皆從本卦取義不用互體其餘自比師以後需訟以前悉以互體相次互卦陰陽次第自乾坤至晉眀夷二十八卦為陽卦皆互剝復漸歸妹解蹇凡上經之卦十八而雜下經十卦於其中自井困至需訟二十八卦為陰卦皆互姤夬大過頤睽家人凡下經之卦十八而雜上經十卦於其中自乾坤至噬嗑賁為陽卦之正首剝復次漸歸妹次解蹇自兌巽至晉眀夷為陽卦之變首漸歸妹次剝復次解蹇自井困至否泰為陰卦之變首睽家人次姤夬次大過頤自大壯遁至需訟為陰卦之正首姤夬次大過頤次睽家人乾坤首諸卦乾剛坤柔周易首乾坤故序雜卦皆不易焉以互卦論之惟乾坤既未濟四卦互之仍得乾坤既未濟不與他卦相變然既濟猶變為未濟未濟猶變為既濟惟乾仍得乾坤仍得坤其體一定而不可變者也易之道主於變易交易序卦者時之相生變易者也雜卦者事之相對交易者也然非有不易者以為之體則所謂乾坤毁旡以見易者而變化何自生哉是故先之以乾坤然後别互卦之陰陽以次之陽正卦首剝復比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也此八卦皆互體為剝復而雜震艮二卦於其中蓋震艮陽卦之主而剝復之具體也自比師臨觀屯蒙皆上經之卦而損益獨為下經之卦震艮亦下經之卦也故次於損益之前上經之卦六比師一陽臨觀屯蒙二陽次漸歸妹大畜時也無妄災也萃聚而升不來也此四卦皆互體為漸歸妹陽卦以上經居前下經居後故先大畜無妄後萃升次解蹇謙輕而豫怠也噬嗑食也賁無色也此四卦皆互體為解蹇謙豫一陽噬嗑賁三陽以上為陽卦之正陽變卦首漸歸妹兌見而巽伏也震艮交於兌巽而成漸歸妹下文將敘漸歸妹故以兌巽先之隨無故也蠱則飭也此兩卦互體為漸歸妹上首剝復者天行也此首漸歸妹者人事也次剝復剝爛也復反也此兩卦不用互體但取剝復之義此言剝以歸於復篇終言姤以終於夬皆扶陽之意次解蹇晉晝也眀夷誅也此兩卦互體為解蹇以上為陽卦之變除篇終八卦自立義例外餘皆入陰陽正卦其變者惟各舉兩卦以見義而已自乾坤至比為陽卦者二十八陰變卦首睽家人井通而困相遇也此兩卦互體為睽家人陽卦之變首於漸歸妹者震艮交於巽兌陽中之陰也陰卦之變始於睽家人者巽兌交於離陰中之陰也陽主正自天道而人事陰主變自人事而天道次姤夬咸速也恆久也此兩卦互體為姤夬次大過頤渙離也節止也此兩卦互體為頤六十四卦中有兩卦只互得一卦者如剝復只互得坤夬姤只互得乾渙節只互得頤豐旅只互得大過既未濟統陰卦解緩也蹇難也睽外也家人內也否泰反其類也解蹇睽家人皆互體為既未濟故次於陰變卦之後否泰不在互卦之內而為既未濟之根者也故次於既未濟之後蓋凡陽卦皆統於乾坤而尤以正卦為主故比師之前首以乾坤也凡陰卦皆統於既未濟而尤以變卦為主故渙節之後系以解蹇睽家人否泰也以上為陰卦之變陰正卦首姤夬大壯則止遁則退也大有衆也同人親也革去故也鼎取新也此六卦皆互體為姤夬陰之大壯遁如陽之臨觀陰之大有同人如陽之比師前陽卦中先比師次臨觀此則先大壯遁次大有同人者陰卦先下經後上經也陰之革鼎如陽之屯蒙次大過頤小過過也中孚信也豐多故親寡旅也離上而坎下也此六卦皆互體為大過頤小過中孚豐旅在下經居先離坎在上經居後次睽家人小畜寡也履不處也需不進也訟不親也此四卦皆互體為睽家人小畜履一陰需訟二陰以上為陰卦之正自井困至此為陰卦者亦二十八循環互卦圖大過顚也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君豫道長小人道憂也以上五十六卦皆以兩相對如序卦之例獨此八卦錯綜而不反對者以見卦之有互不獨中四爻可互六爻循環皆可互也卦卦皆然獨舉大過一卦者中四爻以陽居之惟大過一卦且自初爻起而正卦左旋互卦右轉恰始於姤終於夬而乾得易道用陰而尊陽之意也故案圖觀之自初至四為姤自上至三為漸自五至二為頤自四至初為歸妹自三至上為夬自二至五為乾然夫子傳文無乾者乾在篇首夬盡則為純乾首尾相生之義也既未濟不在互卦之內故以義附於此自陰陽相遇之後如漸之得禮如頤之養正則為既濟而定矣如歸妹之越禮失正則為未濟而窮矣故必決陰邪以伸陽道然後君子道長小人道憂也既未濟統六十四卦之義故雜卦以是終篇與序卦同御纂周易折中卷二十二

body:
  text: 欽定四庫全書御纂周易折中卷八艮下離上程傳旅序卦豐大也窮大者必失其居故受之以旅豐盛至於窮極則必失其所安旅所以次豐也為卦離上艮下山止而不遷火行而不居違去而不處之象故為旅也又麗乎外亦旅之象旅小亨旅貞吉本義旅羈旅也山止於下火炎於上為去其所止而不處之象故為旅以六五得中於外而順乎上下之二陽艮止而離麗於明故其占可以小亨而能守其旅之貞則吉旅非常居若可苟者然道無不在故自有其正不可須臾離也程傳以卦才言也如卦之才可以小亨得旅之貞正而吉也集說胡氏炳文曰在旅而亨亨之小者也然事有小大道無不在大亨固利於貞不可以亨之小而失其貞也正道果可須臾離哉初六旅瑣瑣斯其所取災本義當旅之時以隂柔居下位故其象占如此程傳六以隂柔在旅之時處於卑下是柔弱之人處旅困而在卑賤所存污下者也志卑之人既處旅困鄙猥瑣細无所不至乃其所以致侮辱取災咎也瑣瑣猥細之狀當旅困之時才質如是上雖有援无能為也四陽性而離體亦非就下者也又在旅與他卦為大臣之位者異矣集說王氏應麟曰旅初六斯其所取災王輔嗣注云為斯賤之役唐郭京謂斯合作㒋愚桉後漢左雄傳職斯禄薄注云斯賤也不必改㒋字案易中初爻多取童稚小子之象在旅則童僕之象王氏之說是也六二旅即次懷其資得童僕貞本義即次則安懷資則裕得其童僕之貞信則无欺而有賴旅之最吉者也二有柔順中正之德故其象占如此程傳二有柔順中正之德柔順則衆與之中正則處不失當故能保其所有童僕亦盡其忠信雖不若五有文明之德上下之助亦處旅之善者也次舎旅所安也財貨旅所資也童僕旅所賴也得就次舎懷蓄其資財又得童僕之貞良旅之善也柔弱在下者童也强壯處外者僕也二柔順中正故得内外之心在旅所親比者童僕也不云吉者旅寓之際得免於災厲則已善矣集說胡氏炳文曰旅中不能無賴乎童僕之用亦多不免乎童僕之欺惟得其貞信者則無欺而有賴趙氏玉泉曰二處旅而有柔順中正之德則内不失己而已無不安外不失人而人無不與几旅之所恃以不可無者皆有以全之也案二得位得中故曰即次懷資與九四之旅處而得其資斧者異矣下有初六比之故曰得童僕與九三之喪其童僕者異矣在初則為童僕之瑣瑣者自二視之則為童僕之貞者義不相害也九三旅焚其次喪其童僕貞厲本義過剛不中居下之上故其象占如此喪其童僕則不止於失其心矣故貞字連下句為義程傳處旅之道以柔順謙下為先三剛而不中又居下體之上與艮之上有自髙之象在旅而過剛自髙致困災之道也自髙則不順於上故上不與而焚其次失所安也上離為焚象過剛則暴下故下離而喪其童僕之貞信謂失其心也如此則危厲之道也集說潘氏夢旂曰居剛而用剛平時猶不可况旅乎以此與下焚次喪僕固其宜也九三以剛居下體之上則焚次上九以剛居上體之上則焚巢位愈髙剛愈亢則禍愈深矣丘氏富國曰九三爻辭全與二反二即次而三焚二得童僕而三喪二之貞无尤而三之貞則厲者二柔順得中三過剛不中故也過剛豈處旅之道哉案三得位故亦有即次象以其過剛故焚之也六爻惟二三言次得位故也九四旅于處得其資斧我心不快本義以陽居陰處上之下用柔能下故其象占如此然非其正位又上无剛陽之與下唯陰柔之應故其心有所不快也程傳四陽剛雖不居中而處柔在上體之下有用柔能下之象得旅之宜也以剛明之才為五所與為初所應在旅之善者也然四非正位故雖得其處止不若二之就次舎也有剛明之才為上下所與乃旅而得貨財之資器用之利也雖在旅為善然上无剛陽之與下唯陰柔之應故不能伸其才行其志其心不快也云我者據四而言集說蔣氏悌生曰凡卦爻陽剛皆勝陰柔惟旅卦不然二五皆以柔順得吉三上皆以陽剛致凶六爻六五最善二次之上九最凶三次之九四雖得其處姑足以安其身而已豈得盡遂其志案四居位非正故不曰即次而曰于處在旅而處多懼之地故雖得資與六二同而未免加斧以自防衞其未忘戒心可知安得快然而安樂乎六五射雉一矢亡終以譽命本義雉文明之物離之象也六五柔順文明又得中道為離之主故得此爻者為射雉之象雖不无亡矢之費而所喪不多終有譽命也程傳六五有文明柔順之徳處得中道而上下與之處旅之至善者也人之處旅能合文明之道可謂善矣羈旅之人動而或失則困辱隨之動而无失然後為善離為雉文明之物射雉謂取則於文明之道而必合如射雉一矢而亡之𤼵无不中則終能致譽命也譽令聞也命福禄也五居文明之位有文明之德故動必中文明之道也五君位人君无旅旅則失位故不取君義集說朱氏震曰五在旅卦不取君象有文明之徳則令譽升聞而爵命之矣朱子語類云亡字正如秦無亡矢遺鏃之亡不是如伊川之說易中凡言終吉者皆是初不甚好也王氏申子曰一矢亡言中之易也案五在旅卦不取君義程傳之說是也古者士大夫出疆則以贄行而士執雉以相見射雉而得是進身而有階之象也信於友則有譽獲乎上則有命上九鳥焚其巢旅人先笑後號咷喪牛于易凶本義上九過剛處旅之上離之極驕而不順凶之道也故其象占如此程傳鳥飛騰處髙者也上九剛不中而處最髙又離體其亢可知故取鳥象在旅之時謙降柔和乃可自保而過剛自髙失其所安宜矣巢鳥所安止焚其巢失其所安无所止也在離上為焚象陽剛自處於至髙始快其意故先笑既而失安莫與故號咷輕易以喪其順德所以凶也牛順物喪牛于易謂忽易以失其順也離火性上為躁易之象上承鳥焚其巢故更加旅人字不云旅人則是鳥笑哭也集說王氏宗傳曰上九之視九三尤為剛亢者也凡物棲髙處亢而寄諸危地者鳥之巢是也故旅之上取以為象夫髙極必危離火有焚象也故曰鳥焚其巢先笑謂喜居物上也後號咷謂巢焚之故也夫牛順物也旅道以柔順謙下為本上九喪其至順之德此所以凶也徐氏幾曰旅貴柔順中正三陽爻皆失之而最亢者上九也總論范氏仲淹曰内止而不動於心外明而弗迷其往以斯適旅故得小亨而貞吉夫旅人之志卑則自辱髙則見疾能執其中可謂智矣故初𤨏𤨏卑以自辱者也三焚次而上焚巢髙而見疾者也二懷資而五譽命柔而不失其中者也巽下巽上程傳巽序卦旅而无所容故受之以巽巽者入也羈旅親寡非巽順何所取容苟能巽順雖旅困之中何往而不能入巽所以次旅也為卦一陰在二陽之下巽順於陽所以為巽也巽小亨利有攸往利見大人本義巽入也一陰伏於二陽之下其性能巽以入也其象為風亦取入義隂為主故其占為小亨以隂從陽故又利有所往然必知所從乃得其正故又曰利見大人也程傳卦之才可以小亨利有攸往利見大人也巽與兌皆剛中正巽說義亦相類而兌則亨巽乃小亨者兌陽之為也巽隂之為也兌柔在外用柔也巽柔在内性柔也巽之亨所以小也集說郭氏雍曰巽入也能入故利有攸往故利見大人是亦沈潛剛克之意與朱子語類云巽有入之義巽為風如風之入物只為巽便能入義理之中無細不入趙氏汝楳曰一隂生於下二陽巽之於上卦以剛爻得名隂生而陽巽之蔡氏清曰順字解巽字不盡潛心懇到方為巽也程傳只說順然孔子不曰順而每仍卦名曰巽是必巽字與順字有辨矣大傳曰巽入也又曰巽德之制也又曰巽稱而隱未嘗只以順字當之也何氏楷曰凡巽之所以致亨皆陽之為也所謂申命乃陽事也有陽以巽之於上故小亨案巽入也從來說者皆以為一隂入於二陽之下非也蓋一隂伏於内陽必入而散之隂性凝滯必散而後與陽合德也其在造化則吹浮雲散積隂者也其在人心則察㡬㣲窮隱伏者也其在國家則除奸慝釐弊事者也三者皆非入不能卦之所以名巽者以此亨之所以小者如蠱則壞極而更新之故其亨大巽但脩敝舉廢而已觀卦爻庚甲之義可見也天下之事既察知之則必見之於行故曰利有攸往非有剛徳之人不能濟也故又曰利見大人初六進退利武人之貞本義初以陰居下為巽之主卑巽之過故為進退不果之象若以武人之貞處之則有以濟其所不及而得所宜矣程傳六以陰柔居卑巽而不中處最下而承剛過於卑巽者也隂柔之人卑巽太過則志意恐畏而不安或進或退不知所從其所利在武人之貞若能用武人剛貞之志則為宜也勉為剛貞則无過卑恐畏之失矣集說王氏弼曰處令之初未能服令者也故進退也成命齊邪莫善武人故利武人之貞以整之胡氏瑗曰初六以隂柔之質復在一卦之下是以有進退之疑利在武人之正勇於行事然後可獲其吉也俞氏琰曰巽申命行事之卦也令出則務在必行豈宜或進或退初六卑巽而不中柔懦而不武故或進或退而不能自决也若以武人處之則貞固足以幹事矣故曰利武人之貞九二巽在牀下用史巫紛若吉无咎本義二以陽處隂而居下有不安之意然當巽之時不厭其卑而二又居中不至已甚故其占為能過於巽而丁寜煩悉其辭以自道達則可以吉而无咎亦竭誠意以祭祀之吉占也程傳二居巽時以陽處隂而在下過於巽者也牀人之所安巽在牀下是過於巽過所安矣人之過於卑巽非恐怯則諂說皆非正也二實剛中雖巽體而居柔為過於巽非有邪心也恭巽之過雖非正禮可以逺恥辱絶怨咎亦吉道也史巫者通誠意於神明者也紛若多也苟至誠安於謙巽能使通其誠意者多則吉而无咎謂其誠足以動人也人不察其誠意則以過巽為諂矣集說馮氏椅曰周官史掌卜筮巫掌祓禳卜筮所以占其吉凶祓禳所以除其烖􅊣案牀下者隂邪所伏也入於牀下則察之深矣於是既以史占而知之復以巫祓而去之雖有物祅神怪無能為害矣紛若者以喻申命之頻煩而行事之纎悉也二與五皆所謂剛巽乎中正而志行者卦之主也故能盡申命行事之道如此九三頻巽吝本義過剛不中居下之上非能巽者勉為屢失吝之道也故其象占如此程傳三以陽處剛不得其中又在下體之上以剛亢之質而居巽順之時非能巽者勉而為之故屢失也居巽之時處下而上臨之以巽又四以柔順相親所乗者剛而上復有重剛雖欲不巽得乎故頻失而頻巽是可吝也集說趙氏汝楳曰頻巽者既巽復巽猶頻復也案巽者入也然又曰德之制若不能斷制則其入之深者徒足使弊益以滋而奸無所畏非惟無益而又􅊣之也夫子曰再思可矣言事貴斷也九三上九皆過於中則是蓄疑以敗謀多思而少斷然三未如上九之甚也故但為頻巽之象而占曰吝六四悔亡田獲三品本義陰柔无應承乗皆剛宜有悔也而以隂居隂處上之下故得悔亡而又為卜田之吉占也三品者一為乾豆一為賓客一以充庖程傳隂柔无援而承乗皆剛宜有悔也而四以隂居隂得巽之正在上體之下居上而能下也居上之下巽於上也以巽臨下巽於下也善處如此故得悔亡所以得悔亡以如田之獲三品也田獲三品及於上下也田獵之獲分三品一為乾豆一供賓客與充庖一頒徒御四能巽於上下之陽如田之獲三品謂遍及上下也四之地本有悔以處之至善故悔亡而復有功天下之事苟善處則悔或可以為功也集說王氏弼曰雖以柔遇剛而依尊履正以斯行命必能獲强暴遠不仁者也獲而有益莫善三品故曰悔亡田獲三品王氏安石曰田者興事之大者也三品有功之盛者也郭氏雍曰六四近君志決於進無初六之疑則悔亡矣是以有田獲三品之功也六四至柔不當有田獲之功而此以順乎剛得之由是觀之則巽之為道豈柔弱畏懦之謂哉沈氏該曰田獲三品令行之效也田除􅊣也獲得禽也行君之令而致之民将以興利除􅊣也􅊣去利獲令行而功著是以田獲三品也胡氏炳文曰田武事也初利武人之貞四之田獲用武而有功者也案以卦義論則初與四皆伏隂也陽所入而制之者也有以制之則柔順乎剛而在内者無隂慝矣以爻義論則初與四能順乎剛是皆有行事之責者蓋質雖柔而能以剛克則所謂柔而立者也初居重巽之下猶有進退之疑至四則居髙當位上承九五視初又不同矣故在初利武人之貞四則載纉武功而田害悉去解獲三狐而此獲三品所獲者多不止於狐也九五貞吉悔亡无不利无初有終先庚三日後庚三日吉本義九五剛健中正而居巽體故有悔以有貞而吉也故得亡其悔而无不利有悔是无初也亡之是有終也庚更也事之變也先庚三日丁也後庚三日癸也丁所以丁寧於其變之前癸所以揆度於其變之後有所變更而得此占者如是則吉也程傳五居尊位為巽之主命令之所出也處得中正盡巽之善然巽者柔順之道所利在貞非五之不足在巽當戒也既貞則吉而悔亡无所不利貞正中也處巽出令皆以中正為吉柔巽而不貞則有悔安能无所不利也命令之出有所變更也无初始未善也有終更之始善也若已善則何用命也何用更也先庚三日後庚三日吉出命更改之道當如是也甲者事之端也庚者變更之始也十干戊已為中過中則變故謂之庚事之改更當原始要終如先甲後甲之義如是則吉也解在蠱卦集說張氏浚曰巽孰為貞先庚後庚巽之貞也先三日蓋愼始而圖其㡬後三日蓋思終而考其成愼始思終權斯行矣庚有制變之義當以剛徳為主不然其弊将淪溺而入於蠱矣郭氏雍曰愼乃出令君人之道也先後三日而申命之者愼之至也愼之至者令出惟行弗惟反故也命令之出有必可行之善而無不可行復反之失是以吉也上曰貞吉九五之貞吉也下曰吉葢命令以是為吉也庚即命令也先庚謂申命後庚謂出令之後而行事也胡氏炳文曰蠱者事之壊先甲後甲者飭之使復興起巽者事之權先庚後庚者行之使適變通張氏清子曰甲者十干之首事之端也故謂之終則有始庚者十干之過中事之當更者也故謂之无初有終况巽九五乃蠱六五之變以造事言之故取諸甲以更事言之故取諸庚易於甲庚皆曰先後三日者葢聖人瑾其始終之意也梁氏寅曰五居尊位乃命令之所自出也巽之義為入入於理者深而見於行者决巽之道然後為盡矣不然優㳺牽制其多思者乃其所以為累者也曷足貴乎鄭氏維嶽曰九五一爻正所謂剛巽乎中正而志行者五居巽體有蠱壞之病故有悔而以剛中正之道渙號更命得其貞正故吉悔亡而无不利先三後三即是申命行事即是貞處吴氏曰愼曰苟有所變必丁寧揆度而後行事則入於事理順於人心以得重巽之中盡權宜之制是以吉也上九巽在牀下喪其資斧貞凶本義巽在壯下過於巽者也喪其資斧失所以斷也如是則雖貞亦凶矣居巽之極失其陽剛之德故其象占如此程傳牀人所安也在牀下過所安之義也九居巽之極過於巽者也資所有也斧以斷也陽剛本有斷以過巽而失其剛斷失其所有喪資斧也居上而過巽至於自失在正道為凶也集說王氏弼曰處巽之極極巽過甚故曰巽在牀下也斧所以斷者也過巽失正喪所以斷故曰喪其資斧胡氏瑗曰斧斤也善於斷割處無位之地無剛明之才不能斷割以自决其事故凶也案資斧古本作齊斧為是葢因承旅卦同音而誤也說卦齊乎巽齊斧者所以齊物之斧也總論蘇氏濬曰巽者入也然所謂入者豈徒藉口於迂徐漸次之功以濟其因循悠緩之習已耶是故武人之貞不可弛也三品之獲不可後也史巫紛若不以為激也先庚後庚不以為煩也傳曰巽以行權兌下兌上程傳兌序卦巽者入也入而後說之故受之以兌兌者說也物相入則相說相說則相入兌所以次巽也兌亨利貞本義兌說也一陰進乎二陽之上喜之見乎外也其象為澤取其說萬物又取坎水而塞其下流之象卦體剛中而柔外剛中故說而亨柔外故利於貞葢說有亨道而其妄說不可以不戒故其占如此又柔外故為說亨剛中故利於貞亦一義也程傳兌說也說致亨之道也能說於物物莫不說而與之足以致亨然為說之道利於貞正非道求說則為邪諂而有悔咎故戒利貞也集說焦氏竑曰人有喜說必見而在外葢陽假陰之和柔以為用喜說非由於陰也故二陰一陽則陽為之主二陽一陰則陰非為主但為陽之用耳案地有積濕春氣至則潤升於上人身有血陽氣盛則腴敷於色此兌為澤為說之義葢說雖縁隂而所以用隂者陽也人有柔和之質而非以忠直之心行之則失正而入於邪矣故利貞初九和兌吉本義以陽爻居說體而處最下又无係應故其象占如此程傳初雖陽爻居說體而在最下无所係應是能卑下和順以為說而无所偏私者也以和為說而无所偏私說之正也陽剛則不卑居下則能巽處說則能和无應則不偏處說如是所以吉也集說蔡氏淵曰爻位皆剛不比於柔得說之正和而不流者也故吉吴氏澄曰六畫唯初不比隂柔說道之善故曰和趙氏玉泉曰陽剛則無邪媚之嫌居下則無上求之念無應又無私係之累其說也不諂不凟中節而無乖戾和兌之象如是則說得其正矣來氏知德曰和與中庸𤼵而皆中節謂之和同謂其所說者無乖戾之私皆性情之正道義之公也九二孚兌吉悔亡本義剛中為孚居隂為悔占者以孚而說則吉而悔亡矣程傳二承比隂柔隂柔小人也說之則當有悔二剛中之德孚信内充雖比小人自守不失君子和而不同說而不失剛中故吉而悔亡非二之剛中則有悔矣以自守而亡也集說王氏宗傳曰六三隂柔而不正所謂非道以說者也而二比之疑於有悔矣然二以剛居中誠實之德充足於内故雖與三同體而無失已之嫌此其悔所以亡也龔氏煥曰九二陽剛得中當說之時以孚信為說者也已以孚信為說人不得而妄說之所以吉也六三來兌凶本義隂柔不中正為兌之主上无所應而反來就二陽以求說凶之道也程傳六三隂柔不中正之人說不以道者也來兌就之以求說也比於在下之陽枉已非道就以求說所以凶也之内為來上下俱陽而獨之内者以同體而隂性下也失道下行也集說王氏宗傳曰六三居兩兌之閒一兌既盡一兌復來故曰來兌夫以不正之才居兩兌之閒左右逢迎惟以容說為事此小人之失正者故於兌為凶案三居内體故曰來然非來說於下二陽之謂也為說之主志在於說凡外物之可說者皆感之而來也九四商兌未寧介疾有喜本義四上承九五之中正而下比六三之柔邪故不能决而商度所說未能有定然質本陽剛故能介然守正而疾惡柔邪也如此則有喜矣象占如此為戒深矣程傳四上承中正之五而下比柔邪之三雖剛陽而處非正三隂柔陽所說也故不能决而商度未寧謂擬議所從而未决未能有定也兩間謂之介分限也地之界則加田義乃同也故人有節守謂之介若介然守正而疾逺邪惡則有喜也從五正也說三邪也四近君之位若剛介守正疾逺邪惡將得君以行道福慶及物為有喜也若四者得失未有定繋所從耳集說楊氏簡曰九剛四柔近比六三諛佞之小人心知其非而實樂其柔媚故商度所說去耶交戰於胸中而未寧聖人於是勉之曰介然疾惡小人則有喜案易中疾字皆與喜對故曰无妄之疾勿藥有喜又曰損其疾使遄有喜以此爻例之則疾者謂疾病也喜者謂病去也四比於三故曰介疾言介於邪害之閒也若安而溺焉則其為鴆毒大矣惟能商度所說而不以可說者為安則雖介疾而有喜矣論語曰君子易事而難說也說之不以道不說也其商兌之謂乎九五孚于剝有厲本義剝謂隂能剝陽者也九五陽剛中正然當說之時而居尊位宻近上六上六隂柔為說之主處說之極能妄說以剝陽者也故其占但戒以信於上六則有危也程傳九五得尊位而處中正盡說道之善矣而聖人復設有厲之戒葢堯舜之盛未嘗无戒也戒所當戒而已雖聖賢在上天下未嘗无小人然不敢肆其惡也聖人亦說其能勉而革面也彼小人者未嘗不知聖賢之可說也如四凶處堯朝隱惡而順命是也聖人非不知其終惡也取其畏罪而强仁耳五若誠心信小人之假善為實善而不知其色藏則危道也小人者備之不至則害於善聖人為戒之意深矣剝者消陽之名隂消陽者也蓋指上六故孚于剝則危也以五在說之時而宻比於上六故為之戒雖舜之聖且畏巧言令色安得不戒也說之惑人易入而可懼也如此集說王氏弼曰比於上六而與相得處尊正之位不說信乎陽而說信乎隂孚于剝之義也剝之為義小人道長之謂楊氏簡曰九五親信上六柔媚不正之小人故曰孚于剝剝之為卦小人剝君子又剝喪其國家故謂小人為剝信小人危厲之道也胡氏炳文曰說之感人最為可懼感之者將以剝之也况為君者易狃於所說故雖聖人且畏巧言令色况凡為君子者乎錢氏一本曰兌五說體與履五健體不同履五健恐其和之難危在夬兌五說不覺其入之易危在孚故皆有厲之象案易中凡言厲者皆兼内外而言葢事可危而吾危之也履五爻及此爻皆以剛中正居尊位而有厲辭夫子又皆以位正當釋之是其危也以剛中正故能危也履卦有危懼之義而九五居尊所謂履帝位而不疚者故能因夬履而常危兌有說義九五居尊又比上六故亦因孚于剝而心有危也此有厲與夬有厲正同皆以九五比近上六所謂其危乃光者也上六引兌本義上六成說之主以隂居說之極引下二陽相與為說而不能必其從也故九五當戒而此爻不言其吉凶程傳他卦至極則變兌為說極則愈說上六成說之主居說之極說不知已者也故說既極矣又引而長之然而不至悔咎何也曰方言其說不知已未見其所說善惡也又下乗九五之中正无所施其邪說六三則承乗皆非正是以有凶集說劉氏牧曰執德不固見誘則從故稱引兌毛氏璞曰所以為兌者三與上也三為内卦故曰來上為外卦故曰引案三與上皆以隂柔為說主來兌者物感我而來孟子所謂蔽於物樂記所謂感於物而動者也引兌者物引我而去孟子所謂物交物則引之而已矣樂記所謂物至而人化物者也始於來終於引此人心動乎欲之淺深也總論龔氏煥曰兌本以說之見乎外而得名然六爻之義皆不取說之徇乎外者人之所說苟能不徇乎外則其見於外者斯得其正而吉矣蔣氏悌生曰當說之時剛則有節柔則無度故此卦初二及四五四爻皆以剛陽而得吉三上二爻皆以隂柔而致凶坎下巽上程傳渙序卦兌者說也說而後散之故受之以渙說則舒散也人之氣憂則結聚說則舒散故說有散義渙所以繼兌也為卦巽上坎下風行於水上水遇風則渙散所以為渙也渙亨王假有廟利涉大川利貞本義渙散也為卦下坎上巽風行水上離披解散之象故為渙其變則本自漸卦九來居二而得中六往居三得九之位而上同於四故其占可亨又以祖考之精神既散故王者當至於廟以聚之又以巽木坎水舟楫之象故利渉大川其曰利貞則占者之深戒也程傳渙離散也人之離散由乎中人心離則散矣治乎散亦本於中能収拾人心則散可聚也故卦之義皆主於中利貞合渙散之道在乎正固也案渙與萃對假廟者所以聚鬼神之既散也渉川者所以聚人力之不齊也葢盡誠以感格則幽明無有不應秦越而共舟則心力無有不同此二者渙而求聚之大端也然不以正行之則必有黷神犯難之事故曰利貞初六用拯馬壯吉本義居卦之初渙之始也始渙而拯之為力既易又有壯馬其吉可知初六非有濟渙之才但能順乎九二故其象占如此程傳六居卦之初渙之始也始渙而拯之又得馬壯所以吉也六爻獨初不云渙者離散之勢辨之宜早方始而拯之則不至於渙也為教深矣馬人之所託也託於壯馬故能拯渙馬謂二也二有剛中之才初隂柔順兩皆无應无應則親比相求初之柔順而託於剛中之才以拯其渙如得壯馬以致逺必有濟矣故吉也渙拯於始為力則易時之順也集說王氏宗傳曰居渙散之初則時未至於渙也當此之時順此之勢而亟救之則用拯之道得矣故必馬壯而後吉胡氏炳文曰五爻皆言渙初獨不言者救之尚早可不至於渙也九二渙奔其机悔亡本義九而居二宜有悔也然當渙之時來而不窮能亡其悔者也故其象占如此葢九奔而二机也程傳諸爻皆云渙謂渙之時也在渙離之時而處險中其有悔可知若能奔就所安則得悔亡也机者俯憑以為安者也俯就下也奔急往也二與初雖非正應而當渙離之時兩皆無與以隂陽親比相求則相賴者也故二目初為机初謂二為馬二急就於初以為安則能亡其悔矣初雖坎體而不在險中也或疑初之柔㣲何足賴葢渙之時合力為勝先儒皆以五為机非也方渙離之時二陽豈能同也若能同則成濟渙之功當大豈止悔亡而已机謂俯就也集說郭氏雍曰大二之剛自外來而得中得去危就安之義故有奔其机之象惟得中就安故彖傳所以言不窮也朱子語類云九二渙奔其机以人事言之是來就安處案聚渙者先固其本以剛中居内固夲之象也机者所以憑而坐也有所憑依而安居然後可以動而不窮矣六三渙其躬无悔本義隂柔而不中正有私於已之象也然居得陽位志在濟時能散其私以得无悔故其占如此大率此上四爻皆因渙以濟渙者也程傳三在渙時獨有應與无渙散之悔也然以隂柔之質不中正之才上居无位之地豈能拯時之渙而及人也止於其身可以无悔而已上加渙字在渙之時躬无渙之悔也集說王氏申子曰自此以上四爻皆因渙以拯渙者謂渙其所當渙則不當渙者聚矣案易中六三應上九少有吉義惟當渙時則有應於上者忘身徇上之象也蹇之二曰王臣蹇蹇匪躬之故亦以當蹇難之時而與五相應此爻之義同之六四渙其羣元吉渙有丘匪夷所思本義居隂得正上承九五當濟渙之任者也下无應與為能散其朋黨之象占者如是則大善而吉又言能散其小羣以成大羣使所散者聚而若丘則非常人思慮之所及也程傳渙四五二爻義相須故通言之彖故曰上同也四巽順而正居大臣之位五剛中而正居君位君臣合力剛柔相濟以拯天下之渙者也方渙散之時用剛則不能使之懐附用柔則不足為之依歸四以巽順之正道輔剛中正之君君臣同功所以能濟渙也天下渙散而能使之羣聚可謂大善之吉也喚有丘匪夷所思贊羙之辭也丘聚之大也方渙散而能致其大聚其功甚大其事甚難其用至妙夷平常也非平常之見所能思及也非賢智孰能如是集說胡氏瑗曰天下之渙起於衆心乖離人自為羣六四上承九五當濟渙之任而居隂得正下無私應是大臣秉大公之道使天下之黨盡散則天下之心不至於乖散而兼得以萃聚故得盡善元大之吉也朱子語類云老蘓云渙之六四曰渙其羣元吉夫羣者聖人之所欲渙以混一天下者也此說雖程傳有所不及如程傳之說則是羣其渙非渙其羣也葢當人心渙散之時各相朋黨不能混一惟六四能渙小人之私羣成天下之公道此所以元吉也陳氏琛曰天下之所以渙者多由人心叛上而各締其私也私黨既散則公道大行而勢合于一如丘陵之髙矣所謂散小羣以成大羣也然此必才識之髙邁者乃能之非常人思慮所及也案孔安國書序云丘聚也則丘字即訓聚渙有丘匪夷所思語氣葢云常人徒知散之為散不知散之為聚也散中有聚豈常人思慮之所及乎世有合羣黨以為自固之術者然徒以私相結以勢相附耳非眞聚也及其散也相背相傾乃甚於不聚者矣惟無私者公道足以服人惟無邪者正理可以動衆此所謂散中之聚人臣體國者之所當知也九五渙汗其大號渙王居无咎本義陽剛中正以居尊位當渙之時能散其號令與其居積則可以濟渙而无咎矣故其象占如此九五巽體有號令之象汗謂如汗之出而不反也渙王居如陸贄所謂散小儲而成大儲之意程傳五與四君臣合德以剛中正巽順之道治渙得其道矣惟在浹洽於人心則順從也當使號令洽於民心如人身之汗浹於四體則信服而從矣如是則可以濟天下之渙居王位為稱而无咎大號大政令也謂新民之大命救渙之大政再云渙者上謂渙之時下謂處渙如是則无咎也在四已言元吉五惟言稱其位也渙之四五通言者渙以離散為害拯之使合也非君臣同功合力其能濟乎爻義相須時之宜也集說胡氏瑗曰汗者膚腠之所出出則宣人之壅滯愈人之疾猶上有教令釋天下之難使天下各得其所者九五居至尊之位為渙散之主居得其正履得其中能出其號令布其德澤宣天下壅滯𤼵天下堙鬱使天下之人皆信於上咸有所歸所以居位而无悔咎朱子語類云聖人就人身上說一汗字為象不為無意葢人君之號令當出乎人君之中心由中而外由近而逺雖至幽至逺之處無不被而及之亦猶人身之汗出乎中而浹於四體也俞氏琰曰散人之疾而使之愈者汗也散天下之難而使之愈者號令也王居謂王者所居之位何氏楷曰王者以天下為一身欲渙周身之汗其必有大號以與天下更始而後可凡大命令之下大政事之布大財用之𤼵以散則為和風以潤則為甘雨如人之汗從心而液無不霑透則羣邪之鬱積盡渙而天下之險難亦庶乎可解矣案几易中號字皆當作平聲為呼號之號在常人則是哀痛廹切寫情輸心也在王者則是至誠懇惻𤼵號施令也渙王居渙字當一讀言其大號也如渙汗然足以通上下之壅塞回周身之元氣則雖當渙之時而以王者居之必得无咎矣上九渙其血去逖出无咎本義上九以陽居渙極能出乎渙故其象占如此血謂傷害逖當作惕與小畜六四同言渙其血則去渙其惕則出也程傳渙之諸爻皆无係應亦渙離之象惟上應於三三居險陷之極上若下從於彼則不能出於渙也險有傷害畏懼之象故云血惕然九以陽剛處渙之外有出渙之象又居巽之極為能巽順於事理故云若能使其血去其惕出則无咎也其者所有也渙之時以能合為功獨九居渙之極有係而臨險故以能出渙逺害為善也集說王氏弼曰逖逺也最逺於害不近侵克散其憂傷逺出者也散患於逺害之地誰將咎之哉朱氏震曰逖逺也去逖出一本作去惕出然象曰逺害當從逖矣王氏申子曰以諸爻文法律之渙其血句也渙其所傷而免於難俞氏琰曰當依爻傳作渙其血上居渙終去坎甚逺而無傷害故其象為渙其血其占曰无咎錢氏一夲曰去不復來逖不復近出不復入其於坎血逺而又逺何咎之有案萃以聚為義故至卦終而猶齎咨涕洟以求萃者天命之正人心之安也渙以離為義故至卦終而遂逺害離去以避咎者亦樂天之智安土之仁也古之君子不㓗身以亂倫亦不濡首以蹈禍各惟其時而已矣兌下坎上程傳節序卦渙者離也物不可以終離故受之以節物既離散則當節止之節所以次渙也為卦澤上有水澤之容有限澤上置水滿則不容為有節之象故為節節亨苦節不可貞本義節有限而止也為卦下兌上坎澤上有水其容有限故為節節固自有亨道矣又其體隂陽各半而二五皆陽故其占得亨然至於太甚則苦矣故又戒以不可守以為貞也程傳事既有節則能致亨通故節有亨義節貴適中過則苦矣節至於苦豈能常也不可固守以為常不可貞也集說孔氏頴逹曰節者制度之名節止之義制事有節其道乃亨故曰節亨節須得中為節過苦傷於刻薄物所不堪不可復正故曰苦節不可貞也薛氏温其曰節以禮其道乃亨過苦傷陋不可以為正也初九不出户庭无咎本義户庭户外之庭也陽剛得正居節之初未可以行能節而止者也故其象占如此程傳户庭户外之庭門庭門内之庭初以陽在下上復有應非能節者也又當節之初故戒之謹守至於不出户庭則无咎也初能固守終或渝之不謹於初安能有卒故於節之初為戒甚嚴也集說王氏申子曰陽剛在下居得其正當節之初知其時未可行故謹言謹行至於不出户外之庭是知節而能止者故无咎徐氏在漢曰坎變下一畫為兌象止坎下流户以節人之出入澤以節水之出入初不出户庭以極其愼宻為不出此其所以无咎九二不出門庭凶本義門庭門内之庭也九二當可行之時而失剛不正上无應與知節而不知通故其象占如此程傳二雖剛中之質然處隂居說而承柔處隂不正也居說失剛也承柔近邪也節之道當以剛中正二失其剛中之德與九五剛中正異矣不出門庭不之於外也謂不從於五也二五非隂陽正應故不相從若以剛中之道相合則可以成節之功惟其失徳失時是以凶也不合於五乃不正之節也以剛中正為節如懲忿窒慾損過益有餘是也不正之節如嗇節於用懦節於行是也集說朱子語類云户庭是初爻之象門庭是第二爻之象錢氏志立曰澤所以鍾水也水始至則増其防以瀦之初九是也水漸盛則啟其竇以洩之九二是也二與初同道則失其節矣案節卦六爻皆以澤水二體取義澤者止水者行節雖以止為義然必可以通行而不窮乃為節之亨也初二兩爻一在澤底一在澤中在澤底者水之方瀦不出宜也在澤中則當有蓄洩之道不可閉塞而不出也兌本坎體中爻其主也有坎之德可以流行而變兌則為下流之塞二適當之故六爻之失時未有如二者也時應塞而塞則為慎宻不出雖足不窺户可也時不應塞而塞則為絶物自廢所謂出門同人者安在哉六三不節若則嗟若无咎本義隂柔而不中正以當節時非能節者故其象占如此程傳六三不中正乗剛而臨險固宜有咎然柔順而和說若能自節而順於義則可以无過不然則凶咎必至可傷嗟也故不節若則嗟若己所自致无所歸咎也集說張子曰處非其位失節也然能嗟其不節則亦无咎矣又曰王弼於此无咎又别立一例只舊例亦可推行但能嗟其不篩有補過之心則亦无咎也李氏彦章曰臨之六三失臨之道而既憂之節之六三失節之道而嗟若皆得无咎易以補過為善者也鄭氏汝諧曰進乘二陽處澤之溢過乎中而不節者三也知其不節而能傷嗟以自悔其誰咎之哉下體之極極則當變故𤼵此義豐氏寅初曰處兌之極水溢澤上說於驕侈不知謹節以致窮困然其心痛悔形於悲歎能悔則有改過之㡬是猶可以无咎也六四安節亨本義柔順得正上承九五自然有節者也故其象占如此程傳四順承九五剛中正之道是以中正為節也以隂居隂安於正也當位為有節之象下應於初四坎體水也水上溢為无節就下有節也如四之義非强節之安於節者也故能致亨節以安為善强守而不安則不能當豈能亨也集說俞氏琰曰六三失位而處兌澤之極是乃溢而不節六四當位而順承九五之君故為安節案六四以柔正承五故曰安節安與勉對葢凡其制節謹度皆循乎成法而安行非勉强以為節者也於象居坎之下水之下流也柔正為水流平地安瀾之象九五甘節吉往有尚本義所謂當位以節中正以通者也故其象占如此程傳九五剛中正居尊位為節之主所謂當位以節中正以通者也在已則安行天下則說從節之甘羙者也其吉可知以此而行其功大矣故往則有可嘉尚也集說王氏弼曰當位居中為節之主不失其中不傷財不害民之謂也為節而不苦非甘而何術斯以徃往有尚也朱子語類云甘便對那苦甘節與禮之用和為貴相似趙氏汝楳曰鹹苦酸辛味之偏甘味之中也甘受和和者節味之偏而適其中行之以甘人不吾病而事以成節之吉也案水之止者苦積澤為鹵是也其流者甘山下出泉是也五為坎主水之源也在井為冽取其不泥也在節為甘取其不苦也上六苦節貞凶悔亡本義居節之極故為苦節既處過極故雖得正而不免於凶然禮奢寧儉故雖有悔而終得亡之也程傳上六居節之極節之苦者也居險之極亦為苦義固守則凶悔則凶亡悔損過從中之謂也節之悔亡與他卦之悔亡辭同而義異也集說干氏寳曰彖稱苦節不可貞在此爻也故曰貞凶孔氏穎逹曰上六處節之極過節之中節不能甘以至於苦故曰苦節也若以苦節施人則是正道之凶若以苦節脩身則儉約無妄可得亡悔吕氏大臨曰上六居節之極其節己甚苦節者也用過乎節物所不堪守是不變物窮必乖故曰貞凶禮奢寧儉未害乎義故曰悔亡胡氏炳文曰五位中故為甘上位極故為苦彖曰節亨五以之曰苦節不可貞上以之來氏知德曰無甘節之吉故貞凶無不節之嗟故悔亡總論丘氏富國曰彖傳當位以節故節之六爻以當位為善不當位為不善若以兩爻相比者觀之則又各相比而相反初與二比初不出户庭則无咎二不出門庭則凶二反乎初者也三與四比四柔得正則為安節三柔不正則為不節三反乎四者也五與上比五得中則為節之甘上過中則為節之苦上反乎五者也陸氏振竒曰觀下卦通塞二字上卦甘苦二字可以知節道矣通處味甘塞處味苦塞極必潰故三受焉甘失反苦故上受焉案下卦為澤為止故初二皆曰不出三則澤之止而溢也上卦為水為流故四曰安而五曰甘上則水之流而竭也通塞甘苦皆從澤水取義陸氏之說得之矣兌下巽上程傳中孚序卦節而信之故受之以中孚節者為之制節使不得過越也信而後能行上能信守之下則信從之節而信之也中孚所以次節也為卦澤上有風風行澤上而感於水中為中孚之象感謂感而動也内外皆實而中虛為中孚之象又二五皆陽中實亦為孚義在二體則中實在全體則中虛中虛信之夲中實信之質中孚豚魚吉利渉大川利貞本義孚信也為卦二陰在内四陽在外而二五之陽皆得其中以一卦言之為中虛以二體言之為中實皆孚信之象也又下說以應上上巽以順下亦為孚義豚魚无知之物又木在澤上外實内虛皆舟楫之象至信可感豚魚渉險難而不可以失其貞故占者能致豚魚之應則吉而利渉大川又必利于貞也程傳豚躁魚冥物之難感者也孚信能感於豚魚則无不至矣所以吉也忠信可以蹈水火况渉川乎守信之道在乎堅正故利於貞也集說孔氏穎逹曰信𤼵於中謂之中孚魚者蟲之幽隱豚者獸之微賤内有誠信則雖微隱之物信皆及矣既有誠信光被萬物以斯渉難何往不通故曰利渉大川信而不正凶邪之道故利在貞也蘇氏軾曰中孚信也而謂之中孚者如羽蟲之孚有諸中而後能化也内無陽不生故必剛得中然後為中孚也朱子語類問中孚孚字與信字恐亦有别曰伊川云存於中為孚見於事為信說得極好因舉字說孚字從爪從子如鳥抱子之象今之乳字一邉從孚葢中所抱者實有物也中間實有物所以人自信之問中虛信之本中實信之質如何曰只㸔虛實字便見本質之異中虛是無事時虛而無物故曰中虛自中虛中𤼵出來皆是實理所以曰中實又云一念之間中無私主便謂之虛事皆不妄便謂之實不是兩件事胡氏炳文曰豚魚至愚無知惟信足以感之大川至險不測惟信足以濟之然信而或失其正則如盜賊相羣男女相私士夫死黨小人出肺肝相示而遂背之其為孚也人為之偽非天理之正故又戒以利貞蔡氏清曰豚魚吉承中孚云也中孚便有以孚於物矣不然乃為豚魚之吉而不為中孚者之吉矣豚魚是承中孚故彖傳曰豚魚吉信及豚魚也吴氏曰愼曰中孚豚魚吉卦辭連卦名為義猶同人于野履虎尾艮其背之例言人中心能孚信於豚魚則無所不感矣故吉也初九虞吉有他不燕本義當中孚之初上應六四能度其可信而信之則吉復有他焉則失其所以度之之正而不得其所安矣戒占者之辭也程傳九當中孚之初故戒在審其所信虞度也度其可信而後從也雖有至信若不得其所則有悔咎故虞度而後信則吉也既得所信則當誠一若有他則不得其燕安矣燕安裕也有他志不定也人志不定則惑而不安初與四為正應四巽體而居正无不善也爻以謀始之義大故不取相應之義若用應則非虞也集說苟氏爽曰虞安也初應於四宜自安虞無意於四則吉故曰虞吉也有意於四則不安故曰有他不燕也項氏安世曰中孚六爻皆不取外應孚在其中無待於外也初九安處於下不假他求何吉如之苟變其志動而求孚於四則失其安也案荀氏項氏說於易例卦義皆合蓋易例初九應六四義無所取如屯之磐桓賁之賁趾皆不取應四為義頤之朶頤則反以應四為累惟損益之初則適當益上報上之卦時義不同也此卦之義主於中有實德不願乎外故六爻無應者吉有應者凶初之虞吉者謂其有以自守自安也禮有虞祭亦安之義也燕亦安也虞則燕不虞則不燕矣有他不燕正與大過九四有他吝同九四下應初六為有他初九上應六四亦為有他也九二鳴鶴在陰其子和之我有好爵吾與爾靡之本義九二中孚之實而九五亦以中孚之實應之故有鶴鳴子和我爵爾靡之象鶴在陰謂九居二好爵謂得中靡與縻同言懿德人之所好故好爵雖我之所獨有而彼亦繫戀之也程傳二剛實於中孚之至者也孚至則能感通鶴鳴於幽隱之處不聞也而其子相應和中心之願相通也好爵我有而彼亦係慕說好爵之意同也有孚於中物无不應誠同故也至誠无遠近幽深之間故繫辭云善則千里之外應之不善則千里違之言誠通也至誠感通之理知道者為能識之集說孔氏穎逹曰九二體剛處於卦内又在三四重陰之下而履不失中是不徇於外自任其眞者也處於幽昧而行不失信則聲聞於外為同類之所應焉如鶴之鳴於幽遠則為其子所和也靡散也不私權利惟德是與若我有好爵願與爾賢者分散而共之故曰我有好爵吾與爾靡之王氏安石曰君子之言行至誠而善則雖在幽遠為己類者亦以至誠從而應之中孚之至也蘇氏軾曰中孚必正而一静而久而初九六四六三上九有應而相求皆非所謂正而一靜而久者也惟九二端慤無求而物自應焉張氏浚曰二處二陰下為在陰其子和之謂初鄭氏汝諧曰二獨無應若未信於人而爻之最吉莫二若也自耀者其實喪自晦者其德章無心於感物而物無不感者至誠之道也二以剛履柔其居得中且伏於二陰之下葢静晦而無求者無求而物自應故鶴鳴在陰而其子和之者感以天也案易例凡言子言童者皆初之象故張氏以其子和之為初者近是好爵謂㫖酒也靡謂醉也九二有剛中之實徳無應於上而初與之同德故有鹤鳴子和好爵爾靡之象言父子明不出户庭也言爾我明不踰同類也詩云鶴鳴于九臯聲聞于天則居爽塏之地而聲及遠矣處於陰而子和則不求遠聞可知又曰我有㫖酒嘉賔式燕以衎則同樂者衆矣吾與爾靡則惟二人同心而已君子之實德實行不務於遠而脩於邇故繫辭傳兩言况其邇者乎然後推廣而極言之六三得敵或鼓或罷或泣或歌本義敵謂上九信之窮者六三陰柔不中正以居說極而與之為應故不能自主而其象如此程傳敵對敵也謂所交孚者正應上九是也三四皆以虛中為成孚之主然所處則異四得位居正故亡匹以從上三不中失正故得敵以累志以柔說之質既有所係惟所信是從或鼓張或罷廢或悲泣或歌樂動息憂樂皆繫乎所信也惟係所信故未知吉凶然非明逹君子之所為也集說劉氏牧曰人惟信不足故言行之間變動不常如此李氏簡曰六三之得敵以其有私係之心也案諸爻獨三上有應有應者動於外也非中孚也人心動於外則憂樂皆係於物鼓罷泣歌喻其不能坦然自安葢初九虞燕之反也六四月㡬朢馬匹亡无咎本義六四居陰得正位近於君為月㡬朢之象馬匹謂初與已為匹四乃絶之而上以信於五故為馬匹亡之象占者如是則无咎也程傳四為成孚之主居近君之位處得其正而上信之至當孚之任者也如月之㡬朢盛之至也已朢則敵矣臣而敵君禍敗必至故以㡬朢為至盛馬匹亡四與初為正應匹也古者駕車用四馬不能備純色則兩服兩驂各一色又小大必相稱故兩馬為匹謂對也馬者行物也初上應四而四亦進從五皆上行故以馬為象孚道在一四既從五若復下係於初則不一而害於孚為有咎矣故馬匹亡則无咎也上從五而不繫於初是亡其匹也係初則不進不能成孚之功也集說郭氏雍曰匹亦敵之類也得敵匹亡其道相反也彖傳言柔在内而爻則其道相反葢卦爻取義有不得而同者也案易中六四應初九而義有取焉者皆上不遇九五者也如六四遇九五則以從上為義而應非所論易例皆然而此爻尤明葢孚不容於有二况居大臣之位者乎月㡬朢者陰受陽光承五之象也馬匹亡者無有私羣遠初之象也自坤卦牝馬以得主為義而其下曰東北喪朋東北者近君之位也中孚之四當之矣九五有孚攣如无咎本義九五剛健中正中孚之實而居尊位為孚之主者也下應九二與之同德故其象占如此程傳五居君位人君之道當以至誠感通天下使天下之心信之固結如拘攣然則為无咎也人君之孚不能使天下固結如是則億兆之心安能保其不離乎集說王氏弼曰處中誠以相交之時居尊位以為羣物之主信何可舎故有孚攣如乃得无咎胡氏瑗曰居尊而有中正之德是有至誠至信之心發之於内而交於下以攣天下之心上下内外皆以誠信相通是得為君之道何咎之有郭氏雍曰孚之道無不通亦無不感可以通天下之志至於固結攣如是以无咎九五君位足以感通天下又無私應之累故直曰有孚攣如而已胡氏炳文曰六爻不言孚惟九五言之九五孚之主也案此爻是彖所謂孚乃化邦者也人君之孚與在下者不同居下位者中有實德不遷於外而已人君則以孚天下為實德故必誠信固結於天下然後為无咎也此爻義與小畜之九五同其為臣者月㡬朢之義亦同但彼主於君臣相畜而此主于君臣相孚爾要之富以其鄰者即孚乃化邦之說而君子征凶者亦即馬匹亡之意也上九翰音登于天貞凶本義居信之極而不知變雖得其貞亦凶道也故其象占如此雞曰翰音乃巽之象居巽之極為登于天雞非登天之物而欲登天信非所信而不知變亦猶是也程傳翰音者音飛而實不從處信之終信終則衰忠篤内喪華美外颺故云翰音登天正亦滅矣陽性上進風體飛颺九居中孚之時處於最上孚於上進而不知止者也其極至于羽翰之音登聞于天貞固於此而不知變凶可知矣夫子曰好信不好學其蔽也賊固守而不通之謂也集說王氏弼曰翰髙飛也飛音者音飛而實不從之謂也居卦之上處信之終信終則衰忠篤内喪華美外掦故曰翰音登於天也胡氏瑗曰翰者鳥羽之髙飛也上九在一卦之上居窮極之地是無純誠之心篤實之道徒務其虛聲外飾以矯偽為尚如鳥之飛登于天徒聞其虛聲而已蘇氏軾曰翰音飛且鳴者也處外而居上非中孚之道飛而求顯鳴而求信者也故曰翰音登于天九二在陰而子和上九飛鳴而登天其道葢相反也朱氏震曰巽為雞剛其翰也柔其毛也翰羽翮也雞振其羽翮而後出於聲翰音也鄭氏汝諧曰翰音登天者聲聞過情君子耻之章氏潢曰二居兌澤故曰在陰上為巽風故曰于天孚於中也則鳴鶴自有子和孚於外也則翰音徒登于天然則中孚可以人偽為之哉艮下震上程傳小過序卦有其信者必行之故受之以小過人之所信則必行行則過也小過所以繼中孚也為卦山上有雷雷振於髙其聲過常故為小過又陰居尊位陽失位而不中小者過其常也葢為小者過又為小事過又為過之小小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉本義小謂陰也為卦四陰在外二陽在内陰多於陽小者過也既過於陽可以亨矣然必利於守貞則又不可以不戒也卦之二五皆以柔而得中故可小事三四皆以剛失位而不中故不可大事卦體内實外虛如鳥之飛其聲下而不上故能致飛鳥遺音之應則宜下而大吉亦不可大事之類也程傳過者過其常也若矯枉而過正過所以就正也事有時而當然有待過而後能亨者故小過自有亨義利貞者過之道利於貞也不失時宜之謂正過所以求就中也所過者小事也事之大者豈可過也於大過論之詳矣飛鳥遺之音謂過之不逺也不宜上宜下謂宜順也順則大吉過以就之葢順理也過而順理其吉必大集說王氏弼曰飛鳥遺其音聲哀以求處上愈無所適下則得安愈上則愈窮莫若飛鳥也孔氏頴逹曰過之小事謂之小過即行過乎恭喪過乎哀之例是也禇氏云謂小人之行小有過差君子為過厚之行以矯之如晏子狐裘之比也過為小事道乃可通故曰小過亨利貞者矯世勵俗利在歸正也可小事不可大事者小有過差惟可矯以小事不可正以大事飛鳥遺之音不宜上宜下大吉者飛鳥聲哀以求處過上則愈無所適過下則不失其安譬君子處過差之時為過矯之行順則執卑守下􅊇則犯君陵上故以順􅊇類鳥之上下也吕氏大臨曰小過過於小者也君子之道皆以濟其不及然後可以㑹於中大過以濟其大不及小過以濟其小不及者濟所以亨也飛鳥不宜上宜下上窮而下有止也過奢過慢則凶不宜上也過恭過儉則吉宜下也朱子語類云小過是過於慈惠之類大過則是剛嚴果毅底氣象小過是小事過又是過於小如行過乎恭喪過乎哀用過乎儉皆是過於小退後一歩自貶底意思俞氏琰曰小過之時可過者小事而已大事則不可過也林氏希元曰小過不當以人類言當以事類言觀大象本義曰三者之過皆小者之過可過於小而不可過於大可以小過而不可以甚過又曰彖所謂可小事而宜下其意可見矣小過亨者小事過而亨也曰利貞深戒占者之辭可小事不可大事不宜上宜下又是申利貞之意陸氏銓曰君子雖行貴得中事期當可然勢有極重時須損餘以補缺事必矯枉而後平即夫子所謂寧儉寧戚之意理所當過即是時中案大過者大事過也小過者小事過也大事謂關繫天下國家之事小事謂日用常行之事道雖貴中而有時而過者過所以為中也當過而過然後可以通行故有亨道而利於正也可小事不可大事是申小過之義言此卦之義可以施於小事不可施於大事不宜上宜下又是申利貞之義飛鳥遺之音者卦有飛鳥之象卦示以兆如飛鳥之遺以音也上下二字是借鳥飛之上下以切人事飛鳥相呼云不宜上宜下在飛鳥則上無止戾下有棲宿在人事則髙亢者失正而遠於理卑約者得正而近乎情是以大吉也初六飛鳥以凶本義初六陰柔上應九四又居過時上而不下者也飛鳥遺音不宜上宜下故其象占如此郭璞洞林占得此者或致羽蟲之孽程傳初六陰柔在下小人之象又上應於四四復動體小人躁易而上有應助於所當過必至過甚况不當過而過乎其過如飛鳥之迅疾所以凶也躁疾如是所以過之速且逺救止莫及也集說孔氏頴逹曰小過之義上逆下順而初應在上卦進而之逆同於飛鳥無所錯足故曰飛鳥以凶胡氏瑗曰小過之時不宜上位在下而志愈上故獲凶也項氏安世曰初上二爻陰過而不得中是以凶也以卦象觀之二爻皆當鳥翅之末初六在艮之下當止而反飛以飛致凶故曰飛鳥以凶上六居震之極其飛已髙則麗於綱罟故曰飛鳥離之凶龔氏煥曰大過卦辭以棟為象而三四兩爻亦以棟言小過卦辭以鳥為象而初上兩爻亦以鳥言大過陽過於中而三四又陽之中也小過陰過於外初上又陰之外也胡氏炳文曰大過有棟橈象棟之用在中故於三四言之小過有飛鳥象鳥之用在翼故於初上言之然初二五上皆翼也獨初上言之何耶鳥飛不在翼而在翰初上其翰也案大過象棟者兩爻小過象飛鳥者亦兩爻然大過宜隆不宜橈則四居上吉三居下凶宜矣小過之鳥宜下不宜上初居下應吉而反凶者何也葢屋之中棟惟一而已四之象獨當之鳥之翼則有兩初與上之象皆當之也初於時則未過於位則處下如鳥之正當棲宿者乃不能自禁而飛其凶也豈非自取乎六二過其祖遇其妣不及其君遇其臣无咎本義六二柔順中正進則過三四而遇六五是過陽而反遇陰也如此則不及六五而自得其分是不及君而適遇其臣也皆過而不過守正得中之意无咎之道也故其象占如此程傳陽之在上者父之象尊於父者祖之象四在三上故為祖二與五居相應之地同有柔中之德志不從於三四故過四而遇五是過其祖也五陰而尊祖妣之象與二同德相應在他卦則陰陽相求過之時必過其常故異也无所不過故二從五亦戒其過不及其君遇其臣謂上進而不陵及於君適當臣道則无咎也遇當也過臣之分則其咎可知集說王氏宗傳曰六二或過或不及皆適當其時與分而不愆于中焉此在過之道為無過也故曰无咎俞氏琰曰遇妣而過於祖雖過之君子不以為過也遇臣則不可過於君故曰不及其君遇其臣彖言可小事不可大事不宜上宜下而六二柔順中正故其象如此其占无咎張氏振淵曰祖妣只作陰陽象陽亢而陰順也過祖遇妣是去陽而就陰去亢而從順如此則不陵及於君適當臣道之常矣不及其君遇其臣宜下宜順也吴氏曰愼曰六二中正而爻辭以過不及言之葢當過而過當不及而不及此權之所以取中而卒無過不及之偏矣案古者重昭穆故孫則祔於祖孫婦則袝於祖姑晋之王母此爻之妣皆謂祖姑也兩陰相應故取妣婦相配之象凡易之義陰陽有應者則為君臣為夫婦取其耦配也無應者則或為父子或為等夷或為嫡媵或為妣婦取其同類也此爻二五皆柔有妣婦之配無君臣之交故取遇妣不及其君為義孫行而附於祖列疑其過矣然禮所當然是適得其分也無應於君者不敢仰干于君之象然守柔居下是臣莭不失也以人事類之則事之可過者過而得其恭順之體事之必不可過者不及而安於名分之常夫子之言麻冕拜下意正如此也小過之義主於過恭過儉妻道也臣道也二當其位而有中正之德故能權衡於過不及而得其中於六爻為最善九三弗過防之從或戕之凶本義小過之時事每當過然後得中九三以剛居正衆陰所欲害者也而自恃其剛不肯過為之備故其象占如此若占者能過防之則可以免矣程傳小過陰過陽失位之時三獨居正然在下无所能為而為陰所忌惡故有當過者在過防於小人若弗過防之則或從而戕害之矣如是則凶也三於陰過之時以陽居剛過於剛也既戒之過防則過剛亦在所戒矣防小人之道正已為先三不失正故无必凶之義能過防則免矣三居下之上居上為下皆如是也集說楊氏啟新曰言當過於防而九三不知時也案小過者小事過也小事過者敬小愼㣲之義也九三過剛違於斯義矣故為不過於周防而或遇戕害之象傳曰君子能勤小物故無大患此爻之義也九四无咎弗過遇之往厲必戒勿用永貞本義當過之時以剛處柔過乎恭矣无咎之道也弗過遇之言弗過於剛而適合其宜也往則過矣故有厲而當戒陽性堅剛故又戒以勿用永貞言當隨時之宜不可固守也或曰弗過遇之若以六二爻例則當如此説若依九三爻例則過遇當如過防之義未詳孰是當闕以俟知者程傳四當小過之時以剛處柔剛不過也是以无咎既弗過則合其宜矣故云遇之謂得其道也若往則有危必當戒懼也往去柔而以剛進也勿用永貞陽性堅剛故戒以隨宜不可固守也方陰過之時陽剛失位則君子當隨時順處不可固守其常也四居髙位而无上下之交雖比五應初方陰過之時彼豈肯從陽也故往則有厲集說朱子語類云過遇猶言加意待之也與九三弗過防之文體正同案彖傳三四皆剛失位而不中然九三純剛故凶九四居柔故有无咎之義然質本剛也故又戒以當過遇之為善遇者合人情就事理過遇朱子所謂加意待之者是也若不能過遇之則往而有危所當以為戒而不可固執而不變者是小過之時義也六五密雲不雨自我西郊公弋取彼在穴本義以陰居尊又當陰過之時不能有為而弋取六二以為助故有此象在穴陰物也兩陰相得其不能濟大事可知程傳五以陰柔居尊位雖欲過為豈能成功如宻雲而不能成雨所以不能成雨自西郊故也陰不能成雨小畜卦中已解公弋取彼在穴弋射取之也射止是射弋有取義穴山中之空中虚乃空也在穴指六二也五與二本非相應乃弋而取之五當位故云公謂公上也同類相取雖得之兩隂豈能濟大事乎猶密雲之不能成雨也集說張子曰小過有飛鳥之象故因曰取彼在穴胡氏瑗曰弋者所以射髙也穴者所以隱伏而在下也公以弋繳而取穴中之物猶聖賢雖過行其事意在矯下也姚氏舜牧曰時值小過宜下不宜上陰至於五過甚矣其所居者尊位也挟勢自亢澤不下究雲雖密而不雨自我西郊故耳當此之時欲沛膏澤於生民必湏下求巖穴之士以為輔乃可也故又戒之以求助抑之以下賢錢氏志立曰小過所惡者飛鳥也鳥在穴而不飛所謂不宜上而宜下者也故公弋取以為助案小過有飛鳥之象而所惡者飛葢飛則上而不下違乎不宜上宜下之義也雲亦飛物也下而降則為雨密雲不雨是猶飛而未下也五在上體又居尊位當小過之時上而未下者也故取宻雲不雨為象雲而不雨則膏澤不下於民矣以其虚中也故能降心以從道抑志以下交如弋鳥然不弋其飛者而弋其在穴者如此則合乎宜下之義而雲之飛者不崇朝而為雨之潤矣此爻變鳥之象而為雲者以居尊位故也上六弗遇過之飛鳥離之凶是謂災眚本義六以陰居動體之上處陰過之極過之已髙而甚逺者也故其象占如此或曰遇過恐亦只當作過遇義同九四未知是否程傳六陰而動體處過之極不與理遇動皆過之其違理過常如飛鳥之迅速所以凶也離過之逺也是謂災眚是當有災眚也災者天殃眚者人為既過之極豈惟人眚天災亦至其凶可知天理人事皆然也集說王氏弼曰小人之過遂至上極過而不知限至於亢也過至於亢將何所遇飛而不已將何所託災自已致復何言哉孔氏頴逹曰以小人之身過而弗遇必遭羅網其猶鳥飛而無託必離繒繳故曰飛鳥離之凶也過亢離凶是謂自災而致眚胡氏瑗曰上六過而不已若鳥之髙翔不知所止以至窮極而離於凶禍不能反於下以圖其所安猶人之不近人情亢已而行故外来之災自招之損皆有之也余氏芑舒曰飛鳥離之如鴻則離之之離俞氏琰曰彖辭言不宜上而上乃震動之體動極而忘返如飛鳥離於繒繳不亦凶乎是天災也亦人眚也故曰飛鳥離之凶是謂災眚案復之上曰迷復凶有災眚此曰飛鳥離之凶是謂災眚辭意不同凶由已作災眚外至迷復則因凶而致災眚者也此則凶即其災眚也葢時當過極不能自守而徇俗以至於此與初六當時未過而自飛以致凶者稍别總論項氏安世曰坎離者乾坤之用也故上經終於坎離下經終於既未濟頤中孚肖離大小過肖坎故上經以頤大過附坎離下經以中孚小過附既未濟二陽函四陰則謂之頤四陽函二陰則謂之中孚二陰函四陽則謂之大過四陰函二陽則謂之小過離之為麗坎之為陷意亦類此吴氏曰慎曰以二陽言九三過剛居上不能自下故或戕之九四居柔能下故无咎五上皆以陰乗陽上彖傳所謂上逆者也曰已上曰已亢然上凶而五不然者以其柔中也六二柔順中正而承乎陽所謂下順者也故无咎初以柔居下而凶者位雖卑而志則上而不下是以與上六同為飛鳥之象也離下坎上程傳既濟序卦有過物者必濟故受之以既濟能過於物必可以濟故小過之後受之以既濟也為卦水在火上水火相交則為用矣各當其用故為既濟天下萬事已濟之時也既濟亨小利貞初吉終亂本義既濟事之既成也為卦水火相交各得其用六爻之位各得其正故為既濟亨小當為小亨大抵此卦及六爻占辭皆有警戒之意時當然也程傳既濟之時大者既已亨矣小者尚有未亨也雖既濟之時不能无小未亨也小字在下語當然也若言小亨則為亨之小也利貞處既濟之時利在貞固以守之也初吉方濟之時也終亂濟極則反也集說孔氏穎逹曰人皆不能居安思危愼終如始故戒以今日既濟之初雖皆獲吉若不進德脩業至於終極則危亂及之谷氏家杰曰不曰小亨而曰亨小言所亨者其小事也吴氏曰愼曰剛柔正則體立水火交則用行體立用行所以為既濟也案天地交為泰不交則為否水火交為既濟不交則為未濟以治亂之運推之泰否其兩端也既未濟其交際也既濟當在泰之後而否之先未濟當在泰之先而否之後泰猶夏也否猶冬也未濟猶春也既濟猶秋也故先天之圖乾坤居南北是其兩端也離坎居東西是其交際也既濟之義不如泰者為其泰而將否也未濟之義優於否者為其否而將泰也是以既濟彖辭曰初吉終亂即泰城復于隍之戒未濟彖辭曰汔濟濡其尾无攸利即否其亡其亡之心初九曳其輪濡其尾无咎本義輪在下尾在後初之象也曵輪則車不前濡尾則狐不濟既濟之初謹戒如是无咎之道占者如是則无咎矣程傳初以陽居下上應於四又火體其進之志鋭也然時既濟矣進不已則及於悔咎故曵其輪濡其尾乃得无咎輪所以行倒曵之使不進也獸之渉水必掲其尾濡其尾則不能濟方既濟之初能止其進乃得无咎不知已則至於咎也集說李氏簡曰既濟之初以濡尾而曵輪見其用力之難也雖濡其尾於義何咎案爻之文意李氏得之葢曵輪者有心於曵之也濡尾者非有心於濡之也當濟之時衆皆競濟故有濡尾之患惟能曵其輪則雖濡其尾而可及止也觀夫子象傳可知六二婦喪其茀勿逐七日得本義二以文眀中正之德上應九五剛陽中正之君宜得行其志而九五居既濟之時不能下賢以行其道故二有婦喪其茀之象茀婦車之蔽言失其所以行也然中正之道不可終廢時過則行矣故又有勿逐而自得之戒程傳二以文眀中正之徳上應九五剛陽中正之君宜得行其志也然五既得尊位時已既濟无復進而有為矣則於在下賢才豈有求用之意故二不得遂其行也自古既濟而能用人者鮮矣以唐太宗之用賢尚怠於終况其下者乎於斯時也則剛中反為中滿坎離乃為相戾矣人能識時知變則可以言易矣二陰也故以婦言茀婦人出門以自蔽者也喪其茀則不可行矣二不為五之求用則不得行如婦之喪茀也然中正之道豈可廢也時過則行矣逐者從物也從物則失其素守故戒勿逐自守不失則七日當復得也卦有六位七則變矣七日得謂時變也雖不為上所用中正之道无終廢之理不得行於今必行於異時也聖人之勸戒深矣集說胡氏炳文曰喪特失其在外者逐則失其在我者矣案初二居下位故皆取君子欲濟時而未得濟為義輪者車之所以行路也茀者車之所以蔽門也初之時未可以行也故曰曵其輪二可以行矣而不苟於行苟喪其茀亦不行也夫義路也禮門也義不可則不行禮不備則亦不苟於行也二有應而曰喪其茀者既未濟卦義以上下體之交為濟二猶居下體之中故也九三髙宗伐鬼方三年克之小人勿用本義既濟之時以剛居剛髙宗伐鬼方之象也三年克之言其久而後克戒占者不可輕動之意小人勿用占法與師上六同程傳九三當既濟之時以剛居剛用剛之至也既濟而用剛如是乃髙宗伐鬼方之事髙宗必商之髙宗天下之事既濟而逺伐暴亂也威武可及而以救民為心乃王者之事也惟聖賢之君則可若騁威武忿不服貪土地則殘民肆欲也故戒不可用小人小人為之則以貪忿私意也非貪忿則莫肯為也三年克之見其勞憊之甚聖人因九三當既濟而用剛𤼵此義以示人為法為戒豈淺見所能及也集說沈氏該曰既濟初吉銳於始也終止則亂怠於終也中興之業既就逺方之伐既成而使小人預於其閒貪功逞欲憊民不息則必以亂終不可不戒是以小人勿用也龔氏煥曰三言克鬼方則事已濟矣三年言其濟之難小人勿用欲保其濟也案既未濟皆以髙宗言者髙宗商中興之君振衰撥亂自未濟而既濟者也既濟於三言之者卦為既濟至於内卦之終則已濟矣故曰克之者已然之辭也未濟於四言之者卦為未濟則至外卦之初方圖濟也故曰震用者方然之辭也既濟之後則當思患而豫防之故小人勿用與師之戒同六四繻有衣袽終日戒本義既濟之時以柔居柔能豫備而戒懼者也故其象如此程子曰繻當作濡衣袽所以塞舟之罅漏程傳四在濟卦而水體故取舟為義四近君之位當其任者也當既濟之時以防患慮變為急繻當作濡謂滲漏也舟有罅漏則塞以衣袽有衣袽以備濡漏又終日戒懼不怠慮患當如是也不言吉方免於患也既濟之時免患則足矣豈復有加也集說蘇氏軾曰衣袽所以備舟隙也卦以濟為事故取於舟郭氏忠孝曰既濟思患豫防而四又居多懼之地是以有繻有衣袽之戒勿以既濟而忘未濟之難也終日者言無怠時也胡氏炳文曰乗舟者不可以無繻而忘衣袽亦不可謂衣袽已備遂恝然不知戒水浸至而不知則雖有衣袽不及施矣備患之具不失於尋常而慮患之念又不忘於頃刻此處既濟之道張氏清子曰六四出離入坎此濟道將革之時也濟道將革則罅漏必生四坎體也故取漏舟為戒終日戒者自朝至夕不忘戒備常若坐敝舟而水驟至焉斯可以免覆溺之患九五東鄰殺牛不如西鄰之禴祭實受其福本義東陽西陰言九五居尊而時已過不如六二之在下而始得時也又當文王與紂之事故其象占如此彖辭初吉終亂亦此意也程傳五中實孚也二虛中誠也故皆取祭祀為義東鄰陽也謂五西鄰陰也謂三殺牛盛祭也禴薄祭也盛不如薄者時不同也二五皆有孚誠中正之徳二在濟下尚有進也故受福五處濟極无所進矣以至誠中正守之苟未至於反耳理无極而終不反者也已至於極雖善處无如之何矣故爻象惟言其時也集說楊氏簡曰既濟盛極則衰至君子當思患豫防持盈以虚保益以損六四已有終日之戒矣而况於五乎西鄰之時守以損約故終受福潘氏士藻曰五以陽剛中正當物大豐盛之時故借東鄰祭禮以示警懼夫祭時為大時苟得矣則眀徳馨而黍稷可薦眀信昭而沼毛可羞是以東鄰殺牛不如西鄰之禴祭實受其福在於合時不在物豐也東西者彼此之詞不以五與二對言姚氏舜牧曰人君當既濟時享治平之盛驕奢易萌而誠敬必不足故聖人借兩鄰以為訓若曰東鄰殺牛何其盛也西鄰禴祭何其薄也然神無常享享於克誠彼殺牛者反不如禴祭者之實受其福信乎享神者在誠不在物保治者以實不以文此葢教之以祈天保命之道案潘氏姚氏之說皆是當受報収功極熾而豐之時而能行恭敬撙節退讓眀禮之事此其所以受福也與泰三于食有福同皆就本爻設戒爾若以西鄰為六二則受福為六二受福易無此例上六濡其首厲本義旣濟之極險體之上而以陰柔處之為狐渉水而濡其首之象占者不戒危之道也程傳既濟之極固不安而危也又陰柔處之而在險體之上坎為水濟亦取水義故言其窮至於濡首危可知也既濟之終而小人處之其敗壞可立而待也集說胡氏瑗曰物盛則衰治極必亂理之常也上六處既濟之終其道窮極至於衰亂如渉險而濡溺其首是危厲之極也皆由治不思亂安不慮危以至窮極而反於未濟也薛氏温其曰濡其尾者有後顧之義濡其首者不慮前也恃以為濟遂至陷沒沒而至首其危可知歴險而不虞患故曰亂者有其治者也既濟終亂其義見矣朱氏震曰以畫卦言之初為始為本上為終為末以成卦言之上為首為前初為尾為後坎下離上程傳未濟序卦物不可窮也故受之以未濟終焉既濟矣物之窮也物窮而不變則无不已之理易者變易而不窮也故既濟之後受之以未濟而終焉未濟則未窮也未窮則有生生之義為卦離上坎下火在水上不相為用故為未濟未濟亨小狐汔濟濡其尾无攸利本義未濟事未成之時也水火不交不相為用卦之六爻皆失其位故為未濟汔㡬也㡬濟而濡尾猶未濟也占者如此何所利哉程傳未濟之時有亨之理而卦才復有致亨之道惟在愼處狐能度水濡尾則不能濟其老者多疑畏故履氷而聼懼其陷也小者則未能畏愼故勇於濟汔當為仡壯勇之狀書曰仡仡勇夫小狐果於濟則濡其尾而不能濟也未濟之時求濟之道當致慎則能亨若如小狐之果則不能濟也既不能濟无所利矣集說胡氏炳文曰天地不交為否否不曰亨否不通也水火不交為未濟非不濟也未焉爾故曰未濟亨案小狐當從程傳之解汔濟當從本義之解要之是戒人敬愼之意自始濟以至於將濟不可一息而忘敬愼也初六濡其尾吝本義以陰居下當未濟之初未能自進故其象占如此程傳六以陰柔在下處險而應四處險則不安其居有應則志行於上然已既陰柔而四非中正之才不能援之以濟也獸之濟水必掲其尾尾濡則不能濟濡其尾言不能濟也不度其才力而進終不能濟可羞吝也集說張氏振淵曰卦辭所謂小狐正指此爻新進喜事急於求濟而反不能濟可吝孰甚焉九二曳其輪貞吉本義以九二應六五而居柔得中為能自止而不進得為下之正也故其象占如此程傳在他卦九居二為居柔得中无過剛之義也於未濟聖人深取卦象以為戒眀事上恭順之道未濟者君道艱難之時也五以柔處君位而二乃剛陽之才而居相應之地當用者也剛有陵柔之義水有勝火之象方艱難之時所頼者才臣耳尤當盡恭順之道故戒曵其輪則得正而吉也倒曵其輪殺其勢緩其進戒用剛之過也剛過則好犯上而順不足唐之郭子儀李晟當艱危未濟之時能極其恭順所以為得正而能保其終吉也於六五則言其貞吉光輝盡君道之善於九二則戒其恭順盡臣道之正盡上下之道也集說潘氏夢旂曰九二剛中力足以濟者也然身在坎中未可以大用故曵其車輪不敢輕進待時而動乃為吉也不量時度力而勇於赴難適以敗事矣案既濟之時初二兩爻猶未敢輕濟况未濟乎故此爻曳輪之戒與既濟同而差一位者時不同也觀此初二兩爻濡其尾則吝而曳其輪則吉可知既濟之初所謂濡其尾者非自止不進之謂也六三未濟征凶利涉大川本義陰柔不中正居未濟之時以征則凶然以柔乗剛將出乎坎有利涉之象故其占如此葢行者可以水浮而不可以陸走也或疑利字上當有不字程傳未濟征凶謂居險无出險之用而行則凶也必出險而後可征三以陰柔不中正之才而居險不足以濟未有可濟之道出險之用而征所以凶也然未濟有可濟之道險終有出險之理上有剛陽之應若能渉險而往從之則濟矣故利涉大川也然三之陰柔豈能出險而往非時不可才不能也集說趙氏汝楳曰三居未濟之終過此則近於濟矣故特表以卦名也胡氏炳文曰六三居坎上可以出險陰柔非能濟者故明言未濟征凶案此爻之義最為難眀葢上下卦之交有濟之義既濟之三剛也故能濟未濟之三柔也故未能濟傳曰其柔危其剛勝邪於此兩爻見之矣又既未濟兩卦爻辭未有舉卦名者獨此爻曰未濟葢他爻之既濟未濟者時也順時以處之而已此爻時可濟矣而未能濟是未濟在已而不在時故言未濟見其失時也無濟之才故於征則凶有畏愼之心故於步大川則利葢渉大川不可以輕進未濟無陽也聖人之戒失時而又欲人審於赴時也如此九四貞吉悔亡震用伐鬼方三年有賞于大國本義以九居四不正而有悔也能勉而貞則悔亡矣然以不貞之資欲勉而貞非極其陽剛用力之久不能也故為伐鬼方三年而受賞之象程傳九四陽剛居大臣之位上有虚中眀順之主又已出於險未濟已過中矣有可濟之道也濟天下之艱難非剛健之才不能也九雖陽而居四故戒以貞固則吉而悔亡不貞則不能濟有悔者也震動之極也古之人用力之甚者伐鬼方也故以為義力勤而遠伐至於三年然後成功而行大國之賞必如是乃能濟也濟天下之道當貞固如是四居柔故設此戒集說俞氏琰曰震用伐鬼方者震動而使之驚畏也詩時邁云薄言震之莫不震疊與此震同案此伐鬼方亦與既濟同而差一位也三年克之是已克也震用伐鬼方是方伐也三年有賞于大國言三年之間賞勞師旅者不絶非謂事定而論賞也與師之王三錫命同不與師之大君有命同又案三四非君位而以髙宗之事言者葢易中有論時者則不論其位如泰之論平陂之運而利於艱貞革之論變革之道而宜於改命皆以上下卦之交時義論之也六五貞吉无悔君子之光有孚吉本義以六居五亦非正也然文明之主居中應剛虚心以求下之助故得貞而吉且无悔又有光輝之盛信實而不妄吉而又吉也程傳五文明之主居剛而應剛其處得中虚其心而陽為之輔雖以柔居尊處之至正至善无不足也既得貞正故吉而无悔貞其固有非戒也以此而濟无不濟也五文眀之主故稱其光君子徳輝之盛而功實稱之有孚也上云吉以貞也柔而能貞徳之吉也下云吉以功也既光而有孚時可濟也集說楊氏萬里曰六五逢未濟之世而光輝何也日之在夏曀之益熱火之在夜宿之彌熾六五變未濟為既濟文眀之盛又何疑焉案易卦有悔亡无悔者必先悔亡而後无悔葢无悔之義進於悔亡也其四五兩爻相連言之者則咸大壯及此卦是也此卦自下卦而上卦事已過中向乎濟之時也以髙宗論之四其奮伐荆楚之時而五其嘉靖殷邦之候乎凡自晦而明自剝而生自亂而治者其光輝必倍於常時觀之雨後之日光焚餘之山色可見矣上九有孚于飲酒无咎濡其首有孚失是本義以剛明居未濟之極時將可以有為而自信自養以俟命无咎之道也若縱而不反如狐之渉水而濡其首則過於自信而失其義矣程傳九以剛在上剛之極也居月之上明之極也剛極而能明則不為躁而為決明能燭理剛能斷義居未濟之極非得濟之位无可濟之理則當樂天順命而已若否終則有傾時之變也未濟則无極而自濟之理故止為未濟之極至誠安於義命而自樂則可无咎飲酒自樂也不樂其處則忿躁隕穫入於凶咎矣若從樂而耽肆過禮至濡其首亦非能安其處也有孚自信於中也失是失其宜也如是則於有孚為失也人之處患難知其无可奈何而放意不反者豈安於義命者哉集說劉氏牧曰既濟以柔居上止則亂也故濡其首厲未濟以剛居上窮則通矣故有孚于飲酒无咎石氏介曰上九以剛眀之徳是内有孚也在未濟之終終又反於既濟故得飲酒自樂若樂而不知節復濡其首則雖有孚必失於此此戒之之辭也丘氏富國曰既言飲酒之无咎復言飲酒濡首之失何也葢飲酒可也耽飲而至於濡首則昔之有孚者今失於是矣李氏簡曰未濟之終甫及既濟而復以濡首戒之懼以終始其要无咎此之謂易之道也總論鄭氏汝諧曰既濟初吉終亂未濟則初亂終吉以卦之體言之既濟則出明而之險未濟則出險而之明以卦之義言之濟於始者必亂於終亂於始者必濟於終天之道物之理固然也丘氏富國曰内三爻坎險也初言濡尾之吝二言曳輪之貞三有征凶位不當之戒皆未濟之事也外三爻離眀也四言伐鬼方有賞五言君子之光有孚上言飲酒无咎則未濟為既濟矣萬氏善曰泰之變為既濟否之變為未濟葢既濟自泰而趨否者也未濟自否而趨泰者也故既濟爻辭無吉者以其趨於否也未濟爻辭多吉以其趨於泰也否泰者治亂對待之理既未濟者否泰變更之漸也呉氏曰愼曰易之為義不易也交易也變易也乾坤之純不易者也既濟未濟交易變易者也以是始終易之大義御纂周易折中卷八

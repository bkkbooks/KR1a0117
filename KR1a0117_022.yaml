body:
  text: 欽定四庫全書御纂周易折中卷十七說卦傳集說孔氏頴逹曰孔子以伏羲畫八卦後重為六十四卦繫辭中略明八卦小成引而伸之又曰八卦成列象在其中矣因而重之爻在其中矣又曰觀象於天觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物始作八卦以通神明之德以類萬物之情然引而神之重三成六之意猶自未明仰觀俯察近身逺物之象亦為未見故於此更備說重卦之由及八卦所為之象謂之說卦焉昔者聖人之作易也幽贊於神明而生蓍本義幽贊神明猶言贊化育龜策傳曰天下和平王道得而蓍莖長文其叢生滿百莖集說孔氏穎逹曰以此聖知深知神明之道而生用蓍求卦之法故曰幽贊於神明而生蓍程子曰幽贊於神明而生蓍用蓍以求卦非謂有蓍而後畫卦蘇氏軾曰介紹以𫝊命謂之贊天地鬼神不能與人接也故以蓍龜為之介紹項氏安世曰生蓍謂創立用蓍之法神不能言以蓍言之所以贊神出命故謂之幽贊神明即大衍所謂佑神也龔氏煥曰項氏生蓍之說與夲義不同然以下文倚數立卦生爻觀之似當以項氏之說為正蘇氏濬曰生蓍當以生爻之例推之參天兩地而倚數本義天圎地方圎者一而圍三三各一竒故參天而為三方者一而圍四四合二耦故兩地而為二數皆倚此而起故揲蓍三變之末其餘三竒則三三而九三耦則三二而六兩二一三則為七兩三一二則為八集說孔氏頴逹曰七九為竒天數也六八為耦地數也故取竒於天取耦於地而立七八九六之數也何以參兩為目竒耦蓋古之竒耦亦以參兩言之且以兩是耦數之始三是竒數之初故也不以一目竒者張氏云以三中含兩有一以包兩之義明天有包地之德陽有包陰之道陸氏振竒曰倚依也倚數在生蓍之後立卦之前蓋用蓍得數而後布以為卦故以七八九六當之案參天兩地以方圎徑圍定之亦其大致爾實則徑一者不止圍三非密率也以理言之則張氏所謂以一包兩者是蓋天能兼地故一并二以成三也以算言之則孔氏所謂兩為耦數之始三為竒數之初者是蓋以一乘一以一除一皆不可變故乘除之數起於三與二也以象言之凡圎者錯置三㸃求心而規之即成凡方者錯置兩㸃折角而矩之即成統而言之皆數也故參天兩地者數之原也其用於筮法則為七八九六者蓋以理言之則參兩之數皆統之以三故三三為九三二為六一三二二為七一二二三為八也以算言之竒數起於一三成於九七耦數起於二四成於八六故以其成數紀隂陽陽之進者為老退者為少隂之退者為老進者為少也以象言之凡圎者以六而包一虛其中則六也實其中則七也凡方者以八而包一實其中則九也虛其中則八也陽圎陰方陽實陰虛故惟七圎而實為盛陽惟八方而虛為壯陰九雖實而積方則陽將變而為隂矣故為老陽六雖虛而積圎則隂將變而為陽矣故為老隂也其數皆自參兩中來故曰倚數觀變於陰陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命本義和順從容無所乖逆統言之也理謂隨事得其條理析言之也窮天下之理盡人物之性而合於天道此聖人作易之極功也此第一章集說韓氏伯曰卦象也蓍數也卦則雷風相薄山澤通氣擬象隂陽變化之體蓍則錯綜天地參兩之數蓍極數以定象卦備象以盡數故蓍曰參天兩地而倚數卦曰觀變於隂陽孔氏頴逹曰繫辭言伏羲作易之初故直言仰觀俯察此則論其既重之後端䇿布爻故先言生蓍後言立卦非是聖人幽贊在觀變之前也邵子曰天使我有是之謂命命之在我之謂性性之在物之謂理朱子語類問觀變於隂陽而立卦是就蓍數上觀否曰恐只是就陰陽上觀未用說到蓍數處問既有卦則有爻矣先言卦而後言爻何也曰方其立卦只見是卦及細别之則有六爻又問隂陽剛柔一也而别言之何也曰觀變於隂陽近於造化而言發揮剛柔近於人事而言且如泰卦以卦言之只見得小往大來隂陽消長之意爻裏面便有包荒之類又云和順於道德是默契本原處理於義是應變合宜處物物皆有理須一一推窮性則是理之極處故云盡命則性之所自來處故云至問窮理盡性至於命曰此夲是就易上說易上盡具許多道理直是窮得物理盡得人性到得那天命所以通書說易者性命之原項氏安世曰道即命德即性義即理和順於道德而理於義窮理盡性以至於命反覆互言也易之竒耦在天之命則為隂陽之道在人之性則為仁義之德在地之宜則為剛柔之理和順於道德而理於義自幽而言以至於顯此所謂顯道也窮理盡性以至於命自顯而言以至於幽此所謂神德行也陳氏淳曰理與性對說理乃是在物之理性乃是在我之理在物底便是天地人物公共底道理在我底乃是此理已具得為我所有者徐氏幾曰如乾為天道而彖之元亨利貞則其德爻之潛見躍飛則其義以一卦而統言之所謂和順也就六爻而言之所謂理也善觀易者推爻義以窮天下之理明卦德以盡一己之性窮理盡性則進退存亡得喪之天道可以知而天命在我矣龔氏煥曰上句是自源而流下句是自末而本蓋必和順於道德而後能理於義必窮理盡性而後能至於命也盧氏曰立卦生爻在聖人作易上看若作蓍數之變說却是用易了朱子謂未用說到蓍數處是也聖人觀察天地變化之道而立乾坤等卦故曰觀變於陰陽而立卦既觀象立卦又就卦中剛柔兩畫或上或下微細闡發出來而生變動之爻故曰發揮於剛柔而生爻何氏楷曰數既形矣卦斯立焉卦既立矣爻斯生焉和順於道德而理於義從合而分窮理盡性以至於命從分而合理義非二也程子謂在物為理處物為義是也性命與道德非二也子思謂天命之謂性率性之謂道是也窮盡至皆造極之意性者理之原理窮則逢其原故窮理所以盡性命者性之原性盡則逢其原故盡性所以至命只是一事總論孔氏穎逹曰昔者聖人至以至於命此一節將明聖人引伸因重之意故先叙聖人本制蓍數卦爻備明天道人事妙極之理何氏楷曰此章統論蓍卦及爻辭聖人謂羲文周公乾鑿度曰垂皇䇿者羲則自伏羲時已用蓍矣卦爻辭至文王周公始繫此以知其總言之也案此章次第最明易為卜筮之書而又為五經之原者於此章可見矣生蓍者立蓍筮之法也倚數者起蓍筮之數也立卦生爻則指畫卦繫辭言之是二者蓍筮之體而言於後眀易為卜筮而作也和順於道德而理於義言卦畫既立則有以契合乎天之道性之德而下周乎事物之宜也窮理盡性以至於命言爻辭既設則有以窮盡乎事之理人之性而上逹乎天命之本也夫易以卜筮為教而道德性命之奧存焉然則以禨祥之末言易者迷道之原者也以事物之迹言易者失教之意者也昔者聖人之作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章本義兼三才而兩之總言六畫又細分之則隂陽之位閒雜而成文章也此第二章集說崔氏憬曰此眀一卦六爻有三才二體之義故明天道既立隂陽地道又立剛柔人道亦立仁義也何則在天雖剛亦有柔德在地雖柔亦有剛德故書曰沈潛剛克髙明柔克人稟天地豈不兼仁義乎所以易道兼之矣朱氏震曰易有太極隂陽者太虛聚而有氣柔剛者氣聚而有體仁義根於太虛見於氣體動於知覺者也自萬物一源觀之謂之性自稟賦觀之謂之命自天地人觀之謂之理三者一也聖人將以順性命之理曰隂陽曰柔剛曰仁義以立天地人之道蓋互見也易兼三才而兩之六畫成卦則三才合而為一然道有變動故分隂分陽迭用柔剛郭氏雍曰分隂分陽非謂立天之道隂陽也言三才二道皆一為隂一為陽見於六位也迭用柔剛非謂立地之道柔剛也言三才隂陽分為六畫迭以九六柔剛居之也故三才二道不兼九六言之則曰六畫兼明九六柔剛而後謂之六位朱子語類云隂陽剛柔仁義看來當曰義與仁當以仁對陽仁若不是陽剛如何作得許多造化義雖剛却主於收斂仁却主發舒這也是陽中之陰隂中之陽互藏其根之意且如今人用賞罰到賜與人自是無疑便作將去若是刑殺時便遲疑不肯果決這見得陽舒隂斂仁屬陽義屬陰處丘氏富國曰上言窮理盡性至命此言順性命則易中所言之理皆性命也然所謂性命之理即隂陽柔剛仁義是也兼三才而兩之言重卦也方卦之小成三畫已具三才之道至重而六則天地人之道各兩所謂六畫成卦也分隂分陽以位言凡卦初三五位為陽二四上位為陰自初至上隂陽各半故曰分迭用柔剛以爻言柔謂六剛謂九也位之陽者剛居之柔亦居之位之陰者柔居之剛亦居之或柔或剛更相為用故曰迭分之以示其經迭用以為之緯經緯錯綜粲然有文所謂六位成章也吳氏澄曰性之理謂人之道也命之理謂天地之道也天之氣有陰陽地之質有柔剛人之德有仁義道則主宰其氣質而為是德者也又曰上文以隂陽為天之道下隂陽二字則總言六位也六位之中分初三五為陽位二四上為隂位也上文以柔剛為地之道下柔剛二字則總言六畫也六畫之中竒畫皆謂之剛耦畫皆謂之柔也位無質故以隂陽名之畫有質故以柔剛名之位之隂陽相閒則分布一定畫之柔剛不同則迭用以居繫辭傳所謂物相雜曰文即此成章之謂也胡氏炳文曰上章和順於道德統言之也理於義析言之也此章六畫而成卦統言之也分陰分陽迭用柔剛六位而成章又析言之也蔡氏清曰立天之道非有以立之也謂天道之立以隂陽也其曰分隂分陽者陰陽之自分也其曰迭用柔剛者剛柔之自迭用也非有分之用之者也何氏楷曰此章言卦畫順性命之理即上章所謂和順於道德而理於義窮理盡性以至於命者以一言蔽之也性者人之理命者天地之理陰陽剛柔仁義正所謂性命之理也分隂陽用柔剛以斷吉凶而成亹亹則仁義之道固在其中矣案上章總論易道此章以下專眀卦也上章云觀變於隂陽而立卦和順於道德而理於義此章即所以申其指性即德也命即道也性命流行於事物而理名焉即道德之散而為義者也故總之曰性命之理六畫成卦則與三極之道相似其於天地之道人性之德也不亦和順矣乎六位成章則隂陽剛柔仁義之用不窮其於事物之宜也不亦曲盡其理矣乎又案兼三才而兩之及分隂分陽迭用柔剛三句先儒皆就易上說細玩文義當且就造化上說兼字分字用字皆不是著力字言合三才之道而皆兩此易所以六畫成卦也三才之道既以相對而分又以更迭而用此易所以六位成章也如此方於故易兩字語氣相合蔡氏說極貼天地定位山澤通氣雷風相薄水火不相射八卦相錯本義邵子曰此伏羲八卦之位乾南坤北離東坎西兌居東南震居東北巽居西南艮居西北於是八卦相交而成六十四卦所謂先天之學也集說孔氏穎逹曰此一節就卦象明重卦之意若使天地不交水火異處則庶類無生成之用品物無變化之理故云天地定位而合德山澤異體而通氣雷風各動而相薄水火不相入而相資八卦之用變化如此故聖人重卦令八卦相錯乾坤震巽坎離艮兌莫不交互以象天地雷風水火山澤莫不交錯則易之爻卦與天地等性命之理吉凶之數既往之事將來之幾備在爻卦之中矣項氏安世曰八卦雖八實則隂陽二字而已是故位雖定而氣則通勢雖相薄而情不厭明本一物也龔氏煥曰定位以體言通氣相薄不相射以用言天地乾坤之定體水火乾坤之大用山澤之氣即水之氣雷風之氣即火之氣而水火之氣又天地之氣也數往者順知來者逆是故易逆數也本義起震而歷離兌以至於乾數已生之卦也自巽而歷坎艮以至於坤推未生之卦也易之生卦則以乾兌離震巽坎艮坤為次故皆逆數也此第三章集說朱子語類云先天圖曲折細詳圖意若自乾一橫排至坤八此則全是自然故說卦云易逆數也若如圎圖則須如此方見隂陽消長次第雖似稍涉安排然亦莫非自然之理自冬至至夏至為順蓋與前逆數若相反自夏至至冬至為逆蓋與前逆數者同其左右與今天文家說左右不同蓋從中而分其初若有左右之勢爾陳氏埴曰易本逆數也有一便有二有二便有四有四便有十六以至於六十四皆由此可以知彼由今可以知來故自乾一以至於坤八皆循序而生一如橫圖之次今欲以圎圖象渾天之形若一依此序則乾坤相並寒暑不分故伏羲以乾坤定上下之位坎離列左右之門艮兌震巽皆相對而立悉以隂陽相配自一陽始生起冬至節厯離震之閒為春分以至於乾為純陽是進而得其已生之卦如今日復數昨日故曰數往者順自一隂始生起夏至節歷艮兌之間為秋分以至於坤為純隂是進而推其未生之卦如今日逆計來日故曰知來者逆然本易之所成只是自乾一而坤八如橫圖之序與圎圖之右方而已故曰易逆數也胡氏炳文曰諸儒訓釋皆謂已往而易見為順未來而前知為逆易主於前民用故曰易逆數也惟本義依邵子以數往者順一段為指圎圖而言卦氣之所以行易逆數一假為指橫圖而言卦畫之所以生非本義發邵子之藴則學者孰知此所謂先天之學哉案此節順逆之義朱子之意如此然與邵子本意各成一說蓋邵子本意以三隂三陽追數至一隂一陽處為順自一隂一陽漸推至三隂三陽處為逆朱子則謂左方四卦數已生者為順右方四卦推未生者為逆兩說可並存而邵子之說於此兩章文義尤為貫串天地定位一節自乾坤說到震巽是數往也雷以動之一節自震巽說到乾坤是知來也此三句是承上節以起下節言圖象數往則順知來則逆如上節所列是順數順數者尊乾坤次六子也若建圖之意則欲見隂陽之運行功用之先後所重在逆數如下節所推也諸說之詳備啓蒙中雷以動之風以散之雨以潤之日以烜之艮以止之兌以說之乾以君之坤以藏之本義此卦位相對與上章同此第四章集說孔氏穎逹曰上四舉象下四舉卦者王肅云互相備也張子曰隂性凝聚陽性發散隂聚之陽必散之其勢均散陽為隂纍則相持為雨而降隂為陽得則飄揚為雲而升故雲物班布太虛者隂為風驅斂聚而未散者也凡陰氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風其聚有逺近虛實故雷風有大小暴緩和而散則為霜雪雨露不和而散則為戾氣曀霾陰常散緩受交於陽則風雨調寒暑正朱氏震曰前說乾坤以至六子此說六子而歸乾坤終始循環不見首尾易之道也朱子語類云雷以動之以下四句取象義多故以象言艮以止之以下四句取卦義多故以卦言項氏安世曰自天地定位至八卦相錯言先天之順象也自雷以動之至坤以藏之言先天之逆象也胡氏炳文曰此章卦位相對與上章同特上章先之以乾坤此章則終之以乾坤也金氏賁亨曰上章以天地居首序尊卑也此章以乾坤居後總成功也上以體言此以功用言也吳氏曰慎曰前章始乾坤終坎離此章始震巽終乾坤首乾者其重在乾首震者其重在震二章雖皆明先天卦序而後天始震之義亦具其中矣案此上二章明伏羲卦位也天地萬物之理交易變易焉盡之矣定位通氣相薄不相射以至於相錯所謂交易者也動散潤烜止說以統於君藏所謂變易者也定位通氣相薄不相射即繫傳首章所謂相摩者也八卦相錯即繫傳首章所謂相蕩者也左方震離所謂鼓之以雷霆右方巽坎所謂潤之以風雨兌以說物艮以止物所謂一寒一暑乾以君主坤以藏載所謂乾道成男而知犬始坤道成女而作成物也中間以順逆為說者指明卦序也先言天地以及六子體之序也於圖位為數往其理則繫傳天尊地卑終之以象形者也先言六子以及天地用之序也於圖位為知來其理則繫傳雷霆風雨終之以乾坤者也圖意取用之序邵子謂此一節直解圖意者是也然非體則無以立本故易雖主於逆數而必以順數先之又案艮兌不言山澤則是指氣言也暑氣溫熱發生故曰兌以說之寒氣嚴凝收斂故曰艮以止之上傳於雷霆風雨之下亦曰一寒一暑而不言山澤也若雷以動積寒之氣而日以烜之風以散積暑之氣而雨以潤之則於卦象皆切乾君坤藏亦主大夏大冬而言大夏如下章所云萬物皆相見向明而治是君之也大冬如下章所云萬物之所歸是藏之也帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮本義帝者天之主宰邵子曰此卦位乃文王所定所謂後天之學也集說程子曰易八卦之位元不曽有人說先儒以為乾位西北坤位西南乾坤任六子而自處於無為之地此大故無義理雷風山澤之類便是天地之用如人身之有耳目手足便是人之用也豈可謂手足耳目皆用而身無為乎何氏楷曰三男震坎艮以次綱紀於始終三女巽離兌以次而處綱紀之內自東南至西皆陰自西北至東皆陽亦最齊整故坤蹇彖辭有西南東北之語萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聼天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮本義上言帝此言萬物之隨帝以出入也此第五章所推卦位之說多未詳者集說鄭氏康成曰萬物出乎震雷發聲以生之也齊乎巽風搖動以齊之也潔猶新也萬物皆相見日照之使光大萬物皆致養地氣含養使秀實也萬物之所說草木皆老猶以澤氣說成之戰言隂陽相薄西北隂也而乾以純陽臨之坎勞卦也水性勞而不倦萬物之所歸也萬物自春出生於地冬氣閉藏還皆入地萬物之所成終而所成始言萬物隂氣終陽氣始皆艮之用事也程子曰艮止也生也止則便生不止則不生此艮終始萬物又曰冬至一陽生每遇至後則倍寒何也隂陽消長之際無截然斷絶之理故相攙掩過如天將曉復至隂黑亦是理也大抵終始萬物盛乎艮此儘神妙須研窮此理鄭氏樵曰乾居西北父道也父道尊嚴嚴凝之氣盛於西北西北者萬物成就之方也坤居西南母道也母道在養育萬物萬物之生盛於西南西南者萬物長養之方也坎艮震方位次於乾者乾統三男也巽離兌方位夾乎坤者坤統三女也西北盛隂用事而陰氣盛矣非至健莫能與爭故隂陽相薄曰戰乎乾而乾位焉戰勝則陽氣起矣楊氏萬里曰於帝言致役者蓋坤臣也帝君也君之於臣役之而已於萬物言致養者蓋坤母也萬物子也母之於子養之而已至於他卦不言戰而乾言戰乾西北之卦隂盛陽微之時隂疑於陽也不然則坤之上六何以言龍戰于野項氏安世曰後天之序據太極既分之後播五行於四時也震巽二木主春故震在東方巽東南次之離火主夏故為南方之卦兌乾二金主秋故兌為正秋乾西北次之坎水主冬故為北方之卦土王四季故坤土在夏秋之交為西南方之卦艮土在冬春之交為東北方之卦木金土各二者以形王也水火各一者以氣王也坤隂土故在陰地艮陽土故在陽地震陽木故正東巽陰木故近南而接乎陰兌隂金故正西乾陽金故近北而接乎陽其序甚明徐氏幾曰坎離天地之大用也得乾坤之中氣故離火居南坎水居北也震動也物生之初也故居東兌說也物成之後也故居西此四者各居正位也震屬木巽亦屬木震陽木也巽隂木也故巽居東南已之位也兌屬金乾亦屬金兌隂金也乾陽金也故乾居西北亥之方也坤艮皆土也坤隂土艮陽土坤居西南艮居東北者所以均王乎四時也此四者分居四隅也後天八卦以震巽離坤兌乾坎艮為次者震巽屬木木生火故離次之離火生土故坤次之坤土生金故兌乾次之金生水故坎次之水非土亦不能以生木故艮次之水土又生木木又生火八卦之用五行之生循環無窮此所以為造化流行之序也龔氏煥曰土之於物無時而不養今獨言致役乎坤何也曰土之養物雖無時不然然於西南夏秋之交物將成就之時土氣正旺致養之功莫盛於此故曰致役乎坤非他時不養而獨養乎此也故又曰成言乎艮艮亦土也養者成之漸成者養之終成而終者又將於此而始此土無不在其於養物之功成始而成終者也水火一而木金土二者水火隂陽之正木金土隂陽之交正者一而交者二也胡氏炳文曰離明以德言八卦之德可推坤地坎水以象言八卦之象可推兌秋以時言八卦之時可推以互見也夏而秋火克金者也火金之交有坤土焉則火生土土生金克者又順以相生冬而春水生木者也水木之交有艮土焉木克土土克水生者又逆以相克土金順以相生所以為秋之克木土逆以相克所以為春之生生生克克變化無窮孰主宰之曰帝是也俞氏琰曰艮止也不言止而言成蓋止則生意絶矣成終而復成始則生意周流故曰成言乎艮陳氏琛曰火氣極熱物無由而成水氣極寒物無由而生惟土氣最為中和故火金之交有坤土水木之交有艮土而為萬物之所由出入者也養身養民治天下皆要中和張氏振淵曰成始只在成終內無兩截事吳氏曰慎曰氣不翕聚則不能發散物未堅實則不能復種而生未有不能成終而能成始者也此貞下起元之理主靜立本之道蓋必體立而後用有以行天地人物其理一也案此章明文王卦位也震動而發散者生機之始雷厲而風行者造化之初是故陽氣奮而物無不出隂氣順而物無不齊陽氣盛麗於隂則明極矣隂精厚順於陽則養至矣陽之和足於內隂之滋足於外則說乎物而物成矣雖然天之道資陰而用之而功乃就克隂而化之而命斯行自始至終莫非天也而終始之際見其健而不已焉者天之所以為天也由是役者於此休故坎以習熟之義而司勞焉動者於此止故艮以動靜不窮之義而司成焉夫文之位變乎羲矣而其體用交錯之妙動靜互根之機則必合而觀之然後造化之理盡孔子所以釋文王之意者如此而已諸儒或以五行言之說亦詳密故備載以相參考然諸儒所言坤艮之理亦有未盡者蓋呂令以土獨王未月而為中央則土位惟一也亰房以土分王辰戌丑未而直四季則土位有四也今文王之卦惟坤艮二土位於丑未視月令則多其一視京房則少其二何也蓋木之生火金之生水無所藉於土若火非土必不能成金水非土必不能生木則土之功於是為著又一嵗之間隂陽二氣皆互相勝陽勝隂則為木之溫火之熱自卯至未陽多之卦是也隂勝陽則為金之凉水之寒自酉至丑隂多之卦是也惟丑接於寅未接於申為三隂三陽之卦則二氣適均而為中和之會此所以獨為土德之居也其精義亦非諸術所及尚有先天後天列象交變之妙見啓蒙附論中神也者妙萬物而為言者也動萬物者莫疾乎雷橈萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也本義此去乾坤而專言六子以見神之所為然其位序亦用上章之說未詳其義此第六章集說韓氏伯曰於此言神者明八卦運動變化推移莫有使之然者神無物妙萬物而為言則雷疾風行火炎水潤莫不自然相與為變化故能萬物既成也崔氏憬曰此言六卦之用而不及乾坤者以天地無為而無不為故能成雷風等有為之神妙也艮不言山獨舉卦名者以動橈燥潤功是雷風水火至於終始萬物於山義則不然故言卦而餘皆稱物各取便而論也朱氏震曰張子云一則神兩則化妙萬物者一則神也且動橈燥說潤終始萬物者孰若六子然不能以獨化故必相逮也不相悖也通氣也然後能變化既成萬物合則化化則神項氏安世曰動橈燥說潤盛皆據後天分治之序而相逮不相悖通氣變化復據先天相合之位者明五氣順布四季分王之時無極之真二五之精所以妙合而凝者未始有戾於先天之事也又曰澤不為潤而為說者潤者氣之濕而在內者也說者色之光而在外者也澤氣上浮而光溢於外故說而可愛若潤物之功淫液而深長則惟水足以當之吳氏澄曰此承上章文王卦位之後而言六卦之用不言乾坤者乾坤主宰萬物之帝行乎六子之中所謂神也者妙萬物而為言者也萬物有迹可見而神在其中無迹可見然神不離乎物也即萬物之中而妙不可測者神也故曰妙萬物雷之所以動風之所以橈火之所以燥澤之所以說水之所以潤艮之所以終始皆乾坤之神也動者發萌啓蟄震之出也橈者吹拂長養巽之齊也燥者炎赫暴炙離之相見也說者欣懌充實兌之說也潤者滋液歸根坎之勞也終始者貞下起元艮之成也胡氏炳文曰以上第三章第四章言先天第五章言後天此第六章則由後天而推先天者也去乾坤而専言六子以見神之所為言神則乾坤在其中矣雷之所以動風之所以橈以至艮之所以終所以始後天之所以變化者實由先天而來先天水火相逮以次隂陽之交合後天雷動風橈以次五行之變化惟其交合之妙如此然後變化之妙亦如此俞氏琰曰物之方萌雷以動之萌而未舒風以橈之舒而尚柔火以燥之及其長也澤以說其外水以潤其內既說且潤矣於是艮以止之止則終終則復始此六子各一其用而其所以成萬物者如是也乃若能變能化畢成萬物則又在乎兩相為用然後能變化既成萬物也梁氏寅曰神即帝也帝者神之體神者帝之用故主宰萬物者帝也所以妙萬物者帝之神也蔡氏清曰如雷専於動風專於橈則滯於一隅不得謂之妙天地則役使六子以造化乎萬物而六子之伸縮變化皆天地之為也所以謂神當乾坤也於此蓋可以驗合一不測之義無在無不在之意蓋神如君后六子則六官之分職也六官所施行皆帝后所主宰然後六職交舉而治功成矣葉氏爾瞻曰神非乾坤乃乾坤之運六子而不測者曰動曰橈曰燥曰說曰潤曰終始此正變化成萬物處然天地功用惟一故神非兩不化先天之六子各得其耦者所謂兩也兩者體之立也後天之變化成萬物者所謂兩者之化也兩者之化用之行也就此兩化之合一不測處乃所謂神案此章合羲文卦位而總贊之蓋變易之序後天為著而交易之理先天為明變易者化也動萬物橈萬物燥萬物說萬物潤萬物終始萬物者也交易者神也所以變變化化道並行而不相悖使物並育而不相害者也化者造物之迹也統乎地者也故以其可見之功而謂之成神者生物之心也統乎天者也故以其不測之機而謂之妙乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也本義此言八卦之性情此第七章集說孔氏穎逹曰此一節說八卦名訓乾象天天體運轉不息故為健坤象地地順承於天故為順震象雷雷奮動萬物故為動巽象風風行無所不入故為入坎象水水處險陷故為陷離象火火必著於物故為麗艮象山山體靜止故為止兌象澤澤潤萬物故為說邵子曰乾竒也陽也健也故天下之健莫如天坤耦也隂也順也故天下之順莫如地所以順天也震起也一陽起也起動也故天下之動莫如雷坎陷也一陽陷於二隂陷下也故天下之下莫如水艮止也一陽於是而止也故天下之止莫如山巽入也一隂入二陽之下故天下之入莫如風離麗也一隂麗於二陽其卦錯然成文而華麗也天下之麗莫如火故又為附麗之麗兌說也一隂出於外而說於物故天下之說莫如澤張子曰陽陷於隂為水附於隂為火又曰一陷溺而不得出為坎一附麗而不能去為離朱子語類云以通神眀之德以類萬物之情盡於八卦而震巽坎離艮兌又總於乾坤曰動曰陷曰止皆健底意思曰入曰麗曰說皆順底意思聖人下此八字極狀得八卦性情盡項氏安世曰健者始於動而終於止順者始於入而終於說陽之動志於得所止隂之入志於得所說蔡氏清曰自震而艮者陽之由動而靜也自巽而兌者隂之由靜而動也坎離在中間坎則自動而向於靜也離則自靜而向於動也案八卦以卦畫定名義在先取象於雷風山澤等在後孔氏之說固不如邵子之說矣然邵子說三陽卦則既得之其說三隂卦以巽為隂入於陽離為隂附於陽則似未合經義蓋隂在內陽必入而散之隂在中陽必附而散之入與麗皆陽也特以先有隂質為主故謂之陰卦爾惟張子曰陽陷於隂為水附於隂為火又曰陰在內陽在外者不得入則周旋不舍而為風實盡物理之妙乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊本義逺取諸物如此此第八章集說孔氏頴逹曰此一節略眀逺取諸物也乾象天天行健故為馬坤象地任重而順故為牛震動象龍動物故為龍巽主號令雞能知時故為雞坎主水瀆豕處汚濕故為豕離為文明雉有文章故為雉艮為靜止狗能善守禁止外人故為狗兌說也王廙云羊者順之畜故為羊也項氏安世曰健者為馬順者為牛善動者為龍善伏者為雞質躁而外汚者為豕質野而外明者為雉前剛而止物者為狗內狠而外說者為羊又曰造化權輿云乾陽物也馬故蹄圎坤隂物也牛故蹄拆陽病則隂故馬疾則卧隂病則陽故牛疾則立馬陽物故起先前足卧先後足牛陰物故起先後足卧先前足乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口本義近取諸身如此此第九章集說孔氏頴逹曰此一節略明近取諸身也乾尊而在上故為首坤能包藏含容故為腹足能動用故震為足也股隨於足則巽順之謂故巽為股也坎北方之卦主聽故為耳也離南方之卦主視故為目也艮既為止手亦能止持其物故為手也兌主言語故為口也龔氏原曰其外圎諸陽之所聚者首也其中寬衆隂之所藏者腹也足則在下而善動股則從上而善隨耳則內陽而聰目則外陽而明在上而止者手也在外而說者口也余氏芑舒曰首以君之腹以藏之足履於下為動手持於上為止股下岐而伏口上竅而見耳外虛目內虛各以反對也案諸儒說股義惟余氏得之蓋股者隂所伏也乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女本義索求也謂揲蓍以求爻也男女指卦中一陰一陽之爻而言此第十章集說朱子語類云乾求於坤而得震坎艮坤求於乾而得巽離兌一二三者以其畫之次序言也又云一索再索之說初閒畫卦時也不恁地只是畫成八卦後便見有此象耳項氏安世曰乾坤六子初為氣末為形中為精雷風氣也山澤形也水火精也吳氏澄曰萬物資始於天猶子之氣始於父也資生於地猶子之形生於母也故乾稱父坤稱母索求而取之也坤交於乾求取乾之初畫中畫上畫而得長中少三男乾交於坤求取坤之初畫中畫上畫而得長中少三女一索謂交初再索謂交中三索謂交上以索之先後為長中少之次也胡氏炳文曰此章本義乃朱子未改正之筆當以語録說為正若專言揲蓍求卦則無復此卦序矣俞氏琰曰一索再索三索蓋以三畫自下而上之次序言稱者尊之之辭謂者卑之之辭案以上四章皆言八卦之德之象而健順動入陷麗止說諸德則名卦之義易理之根也不言雷風山澤諸象者為前圖位中已具乾求坤坤求乾之說當從吳氏朱子語類記録偶誤乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果本義荀九家此下有為龍為直為衣為言集說孔氏頴逹曰此一節廣明乾象乾既為天天動運轉故為圜為君為父取其尊道而為萬物之始也為玉為金取其剛之清明也為寒為冰取其西北寒冰之地也為大赤取其盛陽之色也為良馬取其行健之善也老馬取其行健之久也瘠馬取其行健之甚瘠馬骨多也駁馬有牙如鋸能食虎豹取其至健也為木果取其果實著木有似星之著天也邵子曰木結實而種之又成是木而結是實木非舊木也此木之神不二也此實生生之理也郭氏雍曰果者木之始也木以果為始猶物以乾為始也程氏逈曰為圜天之體也為君居上而覆下也為玉德粹也為金堅剛也為寒位西北也為冰寒之凝也為木果以實承實也朱子語類云卦象指文王卦言所以乾言為寒為冰坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑本義荀九家有為牝為迷為方為囊為裳為黃為帛為漿集說孔氏頴逹曰此一節廣眀坤象坤既為地地受任生育故為母也為布取其廣載也為釜取其化生成熟也為吝嗇取其生物不轉移也為均地道平均也為子母牛取其多蕃育而順之也為大輿取其載萬物也為文取其萬物之色雜也為衆取其載物非一也為柄取其生物之夲也為黑取其極陰之色也崔氏憬曰遍布萬物於致養故坤為布地生萬物不擇美惡故為均也萬物依之為本故為柄項氏安世曰吝嗇其靜之翕均其動之闢也乾質故坤文乾一故坤衆震為雷為龍為𤣥黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮本義荀九家有為玉為鵠為鼓集說虞氏翻曰天𤣥地黃震天地之雜故為𤣥黃孔氏頴逹曰此一節廣明震象為𤣥黃取其相離而成蒼色也為敷取其春時氣至草木皆吐敷布而生也為大塗取其萬物之所生也為長子震為長子也為決躁取其剛動也為蒼筤竹竹初生色蒼也為萑葦竹之類也其於馬也為善鳴取雷聲之逺聞也為馵足馬後足白為馵取其動而見也為作足取其動而行健也為的顙白額為的顙亦取動而見也其於稼也為反生取其始生戴甲而出也其䆒為健極於震動則為健也為蕃鮮取其春時草木蕃育而鮮明俞氏琰曰陽長而不已則其䆒為乾之健三爻俱變則為巽故為蕃鮮蔡氏清曰凡稼之始生皆為反生蓋以其初閒生意實從種子中出而下著地以為根然後種中萌芽乃自舉巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦本義荀九家有為楊為鸛集說翟氏𤣥曰為繩直上二陽共正一隂使不得邪僻如繩之直也孔氏頴逹曰此一節廣明巽象巽為木木可以輮曲直巽順之謂也為繩直取其號令齊物也為工亦取繩直之類為白取其潔也為長取其風行之逺也為髙取其木生而上也為進退取其風性前却為不果亦進退之義也為臭取其風所發也為寡髮風落樹之華葉則在樹者稀疏如人之少髮為廣顙額濶髮寡少之義為多白眼取躁人之眼其色多白也為近利取躁人之情多近於利也市三倍取其木生蕃盛於市則三倍之利也其究為躁卦取其風之勢極於躁急也項氏安世曰繩直其齊白其潔也案寡髮廣顙多白眼皆取潔義今人之額濶少寒毛而眸子清明者皆潔者也坎為氷為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盜其於木也為堅多心本義荀九家有為宫為律為可為棟為叢棘為狐為蒺藜為桎梏集說宋氏衷曰曲者更直為矯直者更曲為輮水流有曲直故為矯輮為美脊陽在中央馬脊之象也孔氏頴逹曰此一節廣明坎象坎為水取其北方之行也為溝瀆取其水行無所不通也為隱伏取其水藏地中也為矯輮使曲者直為矯使直者曲為輮水流曲直故為矯輮也為弓輪弓者激矢如水激射也輪者運行如水行也為加憂取其憂險難也為心病憂險難故心病也為耳痛坎為勞卦聼勞則耳痛也為血卦人之有血猶地有水也為赤亦取血之色其於馬也為美脊取其陽在中也為亟心亟急也取其中堅內動也為下首取其水流向下也為薄蹄取水流迫地而行也為曳取水磨地而行也其於與也為多眚取其表裏有隂力弱不能重載也為通取其行有孔穴也為月月是水之精也為盜取水行潛竊也其於木也為堅多心取剛在內也鄭氏正夫曰血在形如水在天地間故為血卦蔡氏清曰日火外影也金水內影也月是金水之精何獨外影曰月體亦內影坎象也得日之光以為光故兼外影耳凡金與水得日之光亦光輝外射也案坎以習險取勞義故加憂心病耳痛者人之勞也亟心下首薄蹄曳者馬之勞也多眚者車之勞也凡馬勞極則心亟而屢下其首蹄薄而足曳皆歷險之甚所致也離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上槁本義荀九家有為牝牛集說孔氏頴逹曰此一節廣明離象離為火取南方之行也為日日是火精也為電火之類也為中女離為中女為甲胄取其剛在外也為戈兵取其以剛自捍也其於人也為大腹取其懷隂氣也為乾卦取其日所烜也為鱉為蟹為螺為蚌為龜皆取剛在外也其於木也為科上槁科空也隂在內為空木既空中上必枯槁也俞氏琰曰離中虛而外乾燥故為木之科上槁蓋與坎之堅多心相反艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節本義荀九家有為鼻為虎為狐集說宋氏衷曰閽人主門寺人主巷艮為止此職皆掌禁止者也虞氏翻曰為山故為徑路也艮手故為指陽剛在上故堅多節孔氏頴逹曰此一節廣明艮象艮為山取隂在下為止陽在上為髙故艮象山也為徑路取其山路有㵎道也為小石取其艮為山又為陽卦之小者也為門闕取其崇髙也為果蓏木實為果草實為蓏取其出於山谷之中也為閽寺取其禁止人也為指取其執止物也為狗為鼠取其皆止人家也為黔喙之屬取其山居之獸也其於木也為堅多節取其堅凝故多節也項氏安世曰震為敷為蕃鮮草木之始也艮為果蓏草木之終也果蓏能終而又能始故於艮之象為切俞氏琰曰周官閽人掌王宫中門之禁止物之不應入者寺人掌王之內人及女官之戒令止物之不得出者坎之剛在內故為木之堅多心艮之剛在外故為木之堅多節兌為澤為少女為巫為口舌為毁折為附决其於地也為剛鹵為妾為羊本義荀九家有為常為輔頰此第十一章廣八卦之象其間多不可曉者求之於經亦不盡合也集說孔氏穎逹曰此一節廣明兌象兌為澤取其隂卦之小地類卑也為少女兌為少女也為巫取其口舌之官也為口舌取西方於五事而言也為毁折為附决兌西方之卦取秋物成熟稿稈之屬則毁折也果蓏之屬則附决也其於地也為剛鹵取水澤所停則鹹鹵也為妾取少女從姊為娣也總論項氏安世曰此章推廣象類使之明備以資占者之决也胡氏炳文曰此章廣八卦之象凡百十有二其中有相對取象者如乾為天坤為地之類是也上文乾為馬此則為良馬老馬瘠馬駁馬上文坤為牛此則為子母牛乾為木果結於上而圎坤為大輿載於下而方震為决躁巽為進退為不果剛柔之性也震巽獨以其究言剛柔之始也坎內陽外隂水與月則內明外暗離內隂外陽火與日則內暗外明坎中實故於人為加憂為心病為耳痛離中虛故於人為大腹艮為閽寺為指艮之止也兌為巫為口舌隂之說也有相反取象者震為大塗反而艮則為徑路巽為長為髙反而兌則為毁折有相因取象者乾為馬震得乾初之陽故於馬為善鳴馵足作足的顙坎得乾中爻之陽故於馬為美脊亟心下首薄蹄曳巽為木幹陽而根隂也坎中陽故於木為堅多心艮上陽故於木為堅多節離中陰而虛故於木為科上槁乾為木果艮為果蓏果陽在上果蓏陽上而隂下也有一卦之中自相因取象者坎為隱伏因而為盜巽為繩直因而為工艮為門闕因而為閽寺兌為口舌因而為巫有不言而互見者乾為君以見坤之為臣乾為圜以見坤之為方吝嗇者隂之翕也以見陽之闢均者地之平也以見天之髙離為乾卦以見坎之為濕坎為血卦以見離之為氣巽為臭以見震之為聲震為長子而坎艮不言者於陽之長者尊之也兌少女為妾而㢲離不言者於隂之少者卑之也乾為馬震坎得乾之陽皆言馬而艮不言者艮止也止之性非馬也他可觸類而通矣案此章雖廣八卦之象然有前文所取而此反不備者則非廣也意前為歷代相傳而此則周易義例與御纂周易折中卷十七

body:
  text: 欽定四庫全書御纂周易折中卷十二象下傳山上有澤咸君子以虛受人本義山上有澤以虛而通也程傳澤性潤下土性受潤澤在山上而其漸潤通徹是二物之氣相感通也君子觀山澤通氣之象而虛其中以受於人夫人中虛則能受實則不能入矣虛中者无我也中无私主則无感不通以量而容之擇合而受之非聖人有感必通之道也集說崔氏憬曰山高而降澤下而升山澤通氣咸之象也吕氏大臨曰澤居下而山居高然山能出雲而致雨者山内虛而澤氣通也故君子居物之上物情交感者亦以虛受也郭氏雍曰唯虛故受受故能感不能感者以不能受故也不能受者以不能虚故也胡氏炳文曰以虛受人無心之感也陳氏琛曰山上有澤澤以潤而感乎山山以虚而受其感咸之象也君子禮之則虛其心以受人之感焉蓋心無私主有感皆通若有一豪私意自蔽則先入者爲主而感應之機窒矣雖有所受未必其所當受而所當受者反以爲不合而不之受矣何氏楷曰六爻之中一言思三言志思何可廢而至於朋從則非虛志何可無而末而外而隨人則非虛極而言之天地以虚而感物聖人以虛而感人心三才之道盡於是矣吳氏曰愼曰虛者咸之貞也天地之常以其心普萬物而無心聖人之常以其情順萬事而無情者虛而已君子之學廓然大公物來順應所謂以虛受人也咸其拇志在外也程傳初志之動感於四也故曰在外志雖動而感未深如拇之動未足以進也集說虞氏翻曰志在外謂四也孔氏穎逹曰與四相應所感在外俞氏琰曰初與四感應以相與則志之所之在於外矣雖凶居吉順不害也程傳二居中得正所應又中正其才本善以其在咸之時質柔而上應故戒以先動求君則凶居以自守則吉象復明之云非戒之不得相感唯順理則不害謂守道不先動也集說顧氏象德曰雖凶而居則吉者蓋能順理以為感不為躁動害也居非專靜特不妄動而已咸其股亦不處也志在隨人所執下也本義言亦者因前二爻皆欲動而云也二爻隂躁其動也宜九三陽剛居止之極宜靜而動可吝之甚也程傳云亦者蓋象辭本不與易相比自作一處故諸爻之象辭意有相續者此言亦者承上爻辭也上云咸其拇志在外也雖凶居吉順不害也咸其股亦不處也前二隂爻皆有感而動三雖陽爻亦然故云亦不處也不處謂動也有陽剛之質而不能自主志反在於隨人是所操執者卑下之甚也貞吉悔亡未感害也憧憧往來未光大也本義感害言不正而感則有害也程傳貞則吉而悔亡未為私感所害也係私應則害於感矣憧憧往來以私心相感感之道狹矣故云未光大也集說陸氏九淵曰咸九四一爻聖人以其當心之位其言感通爲尤至曰貞吉悔亡而象以為未感害也蓋未為私感所害則心之本然無適而不正無感而不通曰憧憧往來朋從爾思而象以為未光大也蓋憧憧往來之私心其所感必狹從其思者獨其私朋而已聖人之洗心其諸以滌去憧憧往來之私而全其本然之正也與此所以退藏於密而能同乎民交乎物而不墮於膠焉溺焉之一偏者也咸其脢志末也本義志末謂不能感物程傳戒使背其心而咸脢者爲其存心淺末係二而說上感於私欲也集說李氏鼎祚曰末猶上也五比於上故咸其脢志末者謂五志感於上也朱氏震曰卦以初爲本上為末王氏宗傳曰謂五有咸其脢之象者以其志意之所向在於一卦之末故欲咸其脢以背去之也何氏楷曰謂五志在與上相感也繫辭曰其初難知其上易知本末也大過彖傳本末弱末指上六可知矣咸其輔頰舌滕口說也本義滕騰通用程傳唯至誠爲能感人乃以柔說騰揚於口舌言說豈能感於人乎集說王氏弼曰咸道轉末故在口舌言語而已雷風恆君子以立不易方程傳君子觀雷風相與成恆之象以常久其德自立於大中常久之道不變易其方所也集說吕氏大臨曰雷風雖若非常其所以相與則恆胡氏炳文曰雷風雖變而有不變者存體雷風之變者爲我之不變者善體雷風者也案說此象者用烈風雷雨弗迷說震象者用迅雷風烈必變皆非也雷風者天地之變而不失其常也立不易方者君子之歴萬變而不失其常也洊雷者天地震動之氣也恐懼脩省者君子震動之心也浚恒之凶始求深也程傳居恆之始而求望於上之深是知常而不知度勢之甚也所以凶陰暗不得恆之宜也集說朱氏震曰初居巽下以深入為恆上居震極以震動為恆在始而求深在上而好動皆凶道也郭氏雍曰進道有漸而後可久在恆之初浚而深求非其道也王氏申子曰可恆之道以久而成始而求深是施諸己則欲速不達施諸人則責之太遽者也故凶蘇氏濬曰凡人用功之始立志太銳取效太急便有欲速助長之病故曰始求深孟子言深造必以道正是此意九二悔亡能久中也程傳所以得悔亡者由其能恆久於中也人能恆久於中豈止亡其悔德之善也集說胡氏炳文曰九二獨提能久中諸爻不中故不久可見不恆其德无所容也程傳人旣无恆何所容處當處之地旣不能恆處非其據豈能恆哉是不恆之人无所容處其身也案此无所容與離四相似皆謂德行無常度自若無所容非人不容之也乆非其位安得禽也程傳處非其位雖久何所得乎以田爲喻故云安得禽也集說王氏弼曰恆非其位雖勞無獲也案爻旣以田爲喻則非處非其位也乃所往者非其位耳謂所動而施爲者不得其方也婦人貞吉從一而終也夫子制義從婦凶也程傳如五之從二在婦人則爲正而吉婦人以從爲正以順爲德當終守於從一夫子則以義制者也從婦人之道則爲凶也集說項氏安世曰九二以剛中爲常故悔亡六五以柔中為恆在二可也在五則夫也父也君也而可乎婦人從夫則吉夫子從婦則凶矣楊氏啟新曰爻辭只曰婦人吉象傳又添一貞字明恆其德貞爲婦人之貞也振恆在上大无功也程傳居上之道必有恆德乃能有功若躁動不常豈能有所成乎居上而不恆其凶甚矣象又言其不能有所成立故曰大无功也集說王氏安石曰終乎動以動爲恆者也以動爲恆而在物上其害大矣王氏申子曰此所謂天下本無事庸人自擾之其好功生事之過乎故聖人折之曰大无功言振擾於守恆之時決無所成也天下有山遯君子以遠小人不惡而嚴本義天體无窮山高有限遯之象也嚴者君子自守之常而小人自不能近程傳天下有山山下起而乃正天上進而相違是遯避之象也君子觀其象以避遠乎小人遠小人之道若以惡聲厲色適足以致其怨忿惟在乎矜莊威嚴使知敬畏則自然遠矣集說石氏介曰不惡而嚴外順而内正也尚惡則小人憎不嚴則正道消張子曰惡讀為憎惡之惡遠小人不可示以惡也惡則患及之又焉能遠嚴之爲言敬小人而遠之之意也楊氏時曰天下有山其藏疾也無所拒然亦終莫之陵也此君子遠小人不惡而嚴之象也郭氏雍曰君子當遯之時畏小人之害志在遠之而已遠之之道何如不惡其人而嚴其分是也孔子曰疾之已甚亂也不惡則不疾矣俞氏琰曰君子觀象以遠小人豈有他哉不過危行言遜而已遜其言則不惡不使之怨也危其行則有不可犯之嚴不使之不遜也此君子遠小人之道也案天下有山以山喻小人以天喻君子似未切蓋天下有山山之高峻極於天也山之高峻者未嘗絶人而自不可攀躋故有不惡而嚴之象楊氏之說蓋是此意遯尾之厲不往何災也程傳見幾先遯固爲善也遯而爲尾危之道也往旣有危不若不往而晦藏可免於災處危故也古人處微下隱亂世而不去者多矣案程傳以不遯爲免災朱子以晦處勿有所行爲免災故朱子嘗欲劾韓侂胄占得此爻而止執用黃牛固志也程傳上下以中順之道相固結其心志甚堅如執之以牛革也集說侯氏行果曰上應貴主志在輔時不隨物遯獨守中直堅如革束執此之志莫之勝說殷之父師當此爻矣蔡氏淸曰謂自固其志不可榮以祿也附録孔氏穎達曰固志者堅固遯者之志使不去己也係遯之厲有疾憊也畜臣妾吉不可大事也程傳遯而有係累必以困憊致危其有疾乃憊也蓋力亦不足矣以此暱愛之心畜養臣妾則吉豈可以當大事乎集說張氏淸子曰當遯而係故有疾而厲至於憊乏也惟當以剛自守止下二陰而畜之以臣妾之道然後獲吉又豈可當大事乎案不可大事言未可直行其志危言危行也與彖小貞吉大象不惡而嚴之意皆相貫君子好遯小人否也程傳君子雖有好而能遯不失於義小人則不能勝其私意而至於不善也集說俞氏琰曰爻辭云好遯君子吉小人否爻傳不及吉字蓋謂惟君子爲能好遯小人則不能好遯也旣好遯則遯而亨其吉不假言矣嘉遯貞吉以正志也程傳志正則動必由正所以爲遯之嘉也居中得正而應中正是其志正也所以爲吉人之遯也止也唯在正其志而已矣集說張子曰居正處中能正其志故獲貞吉案君子之志不在寵利故進以禮而退以義所謂正志也肥遯无不利无所疑也程傳其遯之遠无所疑滯也蓋在外則已遠无應則无累故爲剛決无疑也集說侯氏行果曰最處外極無應於内心無疑戀超世高舉安時無悶故肥遯无不利趙氏汝楳曰四陽之中三係於陰四五應於陰皆不能不自疑至上則疑慮盡亡蓋无有不利者矣李氏心傳曰无所疑也此及升之九三並言之此決於退彼決於進時之宜耳雷在天上大壯君子以非禮弗履本義自勝者強程傳雷震於天上大而壯也君子觀大壯之象以行其壯君子之大壯者莫若克己復禮古人云自勝之謂強中庸於和而不流中立而不倚皆曰強哉矯赴湯火蹈白刃武夫之勇可能也至於克己復禮則非君子之大壯不可能也故云君子以非禮弗履集說張子曰克己反禮壯莫盛焉朱子語類云雷在天上是甚生威嚴人之克己須是如雷在天上方能克去非禮項氏安世曰君子所以養其剛大者亦曰非禮勿履而已壯于趾其孚窮也本義言必窮困程傳在最下而用壯以行可必信其窮困而凶也集說王氏申子曰居下而用壯任剛而決行信乎其窮而凶也九二貞吉以中也程傳所以貞正而吉者以其得中道也中則不失正況陽剛而乾禮乎集說孔氏穎達曰以其居中履謙行不違禮故得正而吉也案卦言大壯利貞惟九二剛徳則爲大健體則爲壯而居中則爲處壯之貞乃卦之主也故傳言以中明大壯之貞在於中也小人用壯君子罔也本義小人以壯敗君子以罔困程傳在小人則爲用其強壯之力在君子則爲用罔志氣剛強蔑視於事靡所顧憚也集說項氏安世曰君子用罔說者不同然觀爻辭之例如小人吉大人否亨君子吉小人否婦人吉夫子凶皆是相反之辭又象辭曰小人用壯君子罔也全與君子好遯小人否也句法相類詩書中罔字與弗字勿字毋字通用皆禁止之義也楊氏簡曰九三益進勢雖壯君子之心未嘗以爲意焉唯小人則自喜己勢之壯而益肆益壯是謂小人用壯罔無也言君子之所用異乎小人之用也故曰小人用壯君子罔也龔氏煥曰大壯本以四陽盛長而得名九三又以陽居陽而過剛壯而又壯者也用壯如此是小人之所爲而非君子之道故曰君子用罔象釋之曰小人用壯君子罔也語意與遯九四君子好遯小人否也同蓋遯之九四卽大壯九三之反對皆君子小人並言俞氏琰曰孔子恐後世疑爻辭有兩用字以爲小人之用與君子同故特去其一藩決不羸尚往也程傳剛陽之長必至於極四雖已盛然其往未止也以至盛之陽用壯而進故莫有當之藩決開而不羸困其力也尚往其進不已也集說項氏安世曰九四以剛居柔有能正之吉無過剛之悔貞吉悔亡四字旣盡之矣又曰藩決不羸壯于大輿之輹者恐人以居柔爲不進也故以尚往明之喪羊于易位不當也程傳所以必用柔和者以陰柔居尊位故也若以陽剛中正得尊位則下无壯矣以六五位不當也故設喪羊于易之義然大率治壯不可用剛夫君臣上下之勢不相侔也苟君之權足以制乎下則雖有強壯跋扈之人不足謂之壯也必人君之勢有所不足然後謂之治壯故治壯之道不可以剛也集說王氏安石曰剛柔者所以立本變通者所以趨時方其趨時則位正當而有咎凶位不當而無悔者有矣大壯之時得中而處之以柔能喪其很者也案位當位不當易例多借爻位以𤼵明其德與時地之相當不相當也此位不當不止謂以陰居陽不任剛壯而已蓋謂四陽已過矣則五所處非當壯之位也於是而以柔中居之故爲喪羊于易不能退不能遂不詳也艱則吉咎不長也程傳非其處而處故進退不能是其自處之不詳愼也艱則吉柔遇艱難又居壯終自當變矣變則得其分過咎不長乃吉也集說胡氏炳文曰臨六三壯上六皆无攸利皆曰咎不長蓋六三之憂上六之艱不貴無過而貴改過也俞氏琰曰人之處事以爲易則不詳審以爲艱則詳審向也旣以不詳審而致咎今詳審而不輕率則其咎不長也明出地上晉君子以自昭明德本義昭明之也程傳昭明之也傳曰昭德塞違昭其度也君子觀明出地上而益明盛之象而以自昭其明德去蔽致知昭明徳於己也明明德於天下昭明德於外也明明德在已故云自昭集說胡氏炳文曰至健莫如天君子以之自強至明莫如日君子以之自昭俞氏琰曰明德君子固有之徳也自昭者自有此徳而自明之也人德本明人欲蔽之不能不少昏昧其本然之明固未嘗息知所以自明則本然之明如日之出地而其昭著初無増損也大學所謂明明德所謂自明與此同旨晉如摧如獨行正也裕无咎未受命也本義初居下位未有官守之命程傳无進无抑唯獨行正道也寛裕則无咎者始欲進而未當位故也君子之於進退或遲或速唯義所當未嘗不裕也聖人恐後之人不達寛裕之義居位者廢職失守以為裕故特云初六裕則无咎者始進未受命當職任故也若有官守不信於上而失其職一日不可居也然事非一槪久速唯時亦容有爲之兆者集說劉氏曰君子之於正不可以人之不見知而改其度張氏振淵曰獨行正是原所以見摧之故大凡君子處世枉已易合直道難容惟正所以見摧然安可因摧而自失其正正與爻互相發明案未受命與臨九二同臨晉皆君子道長向用之卦也然君子無急於乗勢趨時之意當其臨也至誠感物如忘其勢當其進也守道優游若將終身然故一則曰未順命一則曰未受命受兹介福以中正也程傳受兹介福以中正之道也人能守中正之道久而必亨況大明在上而同德必受大福也集說楊氏時曰六二以柔順處乎衆陰而獨無應是不見知也故晉如愁如然居中守正素位而行鬼神其福之矣詩曰靖其爾位好是正直神之聽之介爾景福此之謂也何氏楷曰爾雅云父之妣爲王母小過六二遇妣卽此言王母二五德同位應二受介福以其履中得正也衆允之志上行也程傳上行上順麗於大明也上從大明之君衆志之所同也集說李氏過曰初之罔孚衆未允也二之愁如猶有悔也三徳孚於衆進得所願而悔亡也鼫鼠貞厲位不當也程傳賢者以正德宜在高位不正而處高位則為非據貪而懼失則畏人固處其地危可知也集說陸氏希聲曰履非其位固其寵祿鼫鼠之志竊食黍稷而已失得勿恤往有慶也程傳以大明之德得下之附推誠委任則可以成天下之大功是往而有福慶也維用伐邑道未光也程傳維用伐邑旣得吉而无咎復云貞吝者其道未光大也以正理言之尤可吝也夫道旣光大則无不中正安有過也今以過剛自治雖有功矣然其道未光大故亦可吝聖人言盡善之道案道未光乃推原所以伐邑之故蓋進之極則於道必未光也如勢位重則有居成功之嫌爵禄羈則失獨行願之志故必克治其私然後高而不危免於亢悔也夬五之中未光同明入地中明夷君子以涖衆用晦而明程傳明所以照君子无所不照然用明之過則傷於察太察則盡事而无含𢎞之度故君子觀明入地中之象於涖衆也不極其明察而用晦然後能容物和衆衆親而安是用晦乃所以爲明也若自任其明无所不察則已不勝其忿疾而无寛厚含容之德人情睽疑而不安失涖衆之道適所以爲不明也古之聖人設前旒屏樹者不欲明之盡乎隱也集說孔氏穎達曰冕旒垂目黈纊塞耳無爲清靜民化不欺若運其聰明顯其智慧民卽逃其密網姦詐愈生豈非藏明用晦反得其明也張子曰不任察而不失其治也林氏希元曰用晦而明不是以晦爲明亦不是晦其明蓋雖明而用晦雖用晦而明也用晦而明只是不盡用其明蓋盡用其明則傷於太察而无含𢎞之道惟明而用晦則旣不汶汶而暗亦不察察而明雖无所不照而有不盡照者此古先帝王所以涖衆之術也何氏楷曰晦其明謂藏明於晦晦而明謂生明於晦意實相𤼵君子于行義不食也本義唯義所在不食可也程傳君子遯藏而困窮義當然也唯義之當然故安處而无悶雖不食可也集說王氏申子曰義所不食則于飛攸往義所當行亦明矣去之可不速乎此伯夷太公之事六二之吉順以則也程傳六二之得吉者以其順處而有法則也則謂中正之道能順而得中正所以處明傷之時而能保其吉也集說項氏安世曰明夷之下三爻惟六二有救之之誠上三爻惟六五無去之之心皆中順之臣也王氏申子曰以柔順處之而不失其中正之則昔者文王用明夷之道其如是乎南狩之志乃大得也程傳夫以下之明除上之暗其志在去害而已如商周之湯武豈有意於利天下乎得其大首是能去害而大得其志矣志苟不然乃悖亂之事也入于左腹獲心意也程傳入于左腹謂以邪僻之道入于君而得其心意也得其心所以終不悟也箕子之貞明不可息也程傳箕子晦藏不失其貞固雖遭患難其明自存不可滅息也若逼禍患遂失其所守則是亡其明乃滅息也古之人如揚雄者是也集說蘇氏軾曰六五之於上六正之則勢不敵救之則力不能去之則義不可此最難處者也如箕子而後可箕子之處於此身可辱也而明不可息也初登于天照四國也後入于地失則也本義照四國以位言程傳初登于天居高而明則當照及四方也乃被傷而昏暗是後入于地失明之道也失則失其道也集說胡氏炳文曰則者不可踰之理失則所以爲紂順則所以爲文王風自火出家人君子以言有物而行有恆本義身脩則家治矣程傳正家之本在正其身正身之道一言一動不可易也君子觀風自火出之象知事之由内而出故所言必有物所行必有恆也物謂事實恆謂常度法則也德業之著於外由言行之謹於内也言愼行脩則身正而家治矣集說孔氏穎達曰物事也言必有事卽口無擇言行必有常卽身無擇行正家之義脩於近小言之與行君子樞機出身加人發邇化遠故舉言行以爲之誡楊氏時曰言忠信則有物行篤敬則有常胡氏炳文曰風自火出一家之化自吾言行出皆由内及外自然薰蒸而成者也俞氏琰曰齊家之道自脩身始此風自火出所以爲家人之象也君子知風之自於是齊家以脩身爲本而脩身以言行爲先言必有物而无妄行必有恆而不改物謂事實言而誠實則有物不誠實則無物也恆謂常度行而常久則有恆不常久則無恆也閑有家志未變也本義志未變而豫防之程傳閑之於始家人志意未變動之前也正志未流散變動而閑之則不傷恩不失義處家之善也是以悔亡志變而後治則所傷多矣乃有悔也集說蘇氏軾曰忘閑焉則志變矣及其未變而閑之故悔亡楊氏簡曰治家之道當防閑其初及其心志未變而閑之以禮邪僻之意無由而興矣六二之吉順以巽也程傳二以陰柔居中正能順從而卑巽者也故爲婦人之貞吉也案六二六四之爲順同順者女之貞也四位高故曰順在位二位卑故曰順以巽家人嗃嗃未失也婦子嘻嘻失家節也程傳雖嗃嗃於治家之道未爲甚失若婦子嘻嘻是无禮法失家之節家必亂矣集說王氏弼曰以陽處陽剛嚴者也處下體之極爲一家之長者也行與其慢寧過乎恭家與其瀆寧過乎嚴是以家人雖嗃嗃悔厲猶得其道婦子嘻嘻乃失其節也富家大吉順在位也程傳以巽順而居正位正而巽順能保有其富者也富家之大吉也集說俞氏琰曰禮運云父子篤兄弟睦夫婦和家之肥也豈以多財爲吉哉以順居之則滿而不溢可以保其家而長守其富吉孰大焉王假有家交相愛也本義程子曰夫愛其内助婦愛其刑家程傳王假有家之道者非止能使之順從而已必致其心化誠合夫愛其内助婦愛其刑家交相愛也能如是者文王之妃乎若身脩法立而家未化未得爲假有家之道也集說郭氏雍曰父父子子兄兄弟弟夫夫婦婦同大順而無逆焉者交相愛之義也龔氏煥曰交相愛則一家之父子兄弟夫婦長幼莫不相愛非特夫婦而已也威如之吉反身之謂也本義謂非作威也反身自治則人畏服之矣程傳治家之道以正身爲本故云反身之謂爻辭謂治家當有威嚴而夫子又復戒云當先嚴其身也威嚴不先行於己則人怨而不服故云威如而吉者能自反於身也孟子所謂身不行道不行於妻子也集說朱氏震曰威非外求反諸身而已反身則正正則誠誠則不怒而威後世不知所謂威嚴者正其身也或不正而尚威怒則父子相夷愈不服矣安得吉郭氏雍曰象明言有物而行有恒而此又言反身之謂者家人之道所以成始成終者脩身而已趙氏汝楳曰爻於初言閑三言嗃嗃上言威聖人慮後世以爲威嚴有餘而親睦不足故特釋之以反身謂威如者非嚴厲以爲威反求諸己而已上火下澤睽君子以同而異本義二卦合體而性不同程傳上火下澤二物之性違異所以爲睽離之象君子觀睽異之象於大同之中而知所當異也夫聖賢之處世在人理之常莫不大同於世俗所同者則有時而獨異蓋於秉彞則同矣於世俗之失則異也不能大同者亂常拂理之人也不能獨異者隨俗習非之人也要在同而能異耳中庸曰和而不流是也集說荀氏爽曰火性炎上澤性潤下故曰睽也大歸雖同小事當異百官殊職四民異業文武並用威德相反共歸於治故曰君子以同而異也項氏安世曰同象兌之說異象離之明見惡人以辟咎也程傳睽離之時人情乖違求和合之且病其不能得也若以惡人而拒絶之則將衆仇於君子而禍咎至矣故必見之所以免避怨咎也无怨咎則有可合之道遇主于巷未失道也本義本其正應非有邪也程傳當睽之時君心未合賢臣在下竭力盡誠期使之信合而已至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是宛轉以求其合也遇非枉道迎逢也巷非邪僻由徑也故夫子特云遇主于巷未失道也未非必也非必謂失道也集說王氏申子曰處上下睽離之時不得不委曲以求合故曰未失道言於正道未爲失也見輿曳位不當也无初有終遇剛也程傳以六居三非正也非正則不安又在二陽之閒所以有如是艱戹由位不當也无初有終者終必與上九相遇而合乃遇剛也不正而合未有久而不離者也合以正道自无終睽之理故賢者順理而安行知者知幾而固守集說胡氏瑗曰无初有終遇剛也者言初爲上之見疑然終則知己之誠而與之應是六三所遇得剛明之人也案爻有兩喻而象傳偏舉者舉其重者也此舉見輿曳以乘剛也困三舉據于蒺藜亦以乘剛也易例乘剛之危最甚交孚无咎志行也程傳初四皆陽剛君子當睽乖之時上下以至誠相交協志同力則其志可以行不止无咎而已卦辭但言无咎夫子又從而明之云可以行其志救時之睽也蓋以君子陽剛之才而至誠相輔何所不能濟也唯有君子則能行其志矣厥宗噬膚往有慶也程傳爻辭但言厥宗噬膚則可以往而无咎象復推明其義言人君雖己才不足若能信任賢輔使以其道深入於己則可以有爲是往而有福慶也集說項氏安世曰二以五爲主而委曲以入之巷雖曲而通諸道遇主于巷將以行道非爲邪也五以二爲宗而親之二五以中道相應當睽之時其閒也微而易合如膚之柔噬之則入豈獨无咎又將有慶二五陰陽正應故其辭如此何氏楷曰厥宗旣噬膚矣往則有相合之慶蓋決之也遇雨之吉羣疑亡也程傳雨者陰陽和也始睽而能終和故吉也所以能和者以羣疑盡亡也其始睽也无所不疑故云羣疑睽極而合則皆亡也集說孔氏穎達曰羣疑亡者往與三合如雨之和向之見豕見鬼張弧之疑倂消釋矣故曰羣疑亡也王氏安石曰上九睽極有應而疑之夫睽之極則物有似是而非者雖明猶疑疑之己甚則以無爲有無所不至況於不明者乎上九剛過中用明而過者也故其始不能無疑朱子語類云諸爻立象聖人必有所據非是白撰但今不可考耳到孔子方不說象如見豕負塗載鬼一車之類孔子只說羣疑亡也便見得上面許多皆是狐惑可疑之事而已到後人解說便多牽強趙氏汝楳曰怪力亂神聖人所不語而此卦言之甚詳故聖人斷之曰疑蓋心疑則境見心明則疑亡知此者志怪之書可焚無鬼之論可熄王氏申子曰孤生於睽睽生於疑今羣疑旣亡則睽而合合而和所以吉也山上有水蹇君子以反身脩德程傳山之峻阻上復有水坎水爲險陷之象上下險阻故爲蹇也君子觀蹇難之象而以反身脩德君子之遇艱阻必反求諸己而益自脩孟子曰行有不得者皆反求諸己故遇艱蹇必自省於身有失而致之乎是反身也有所未善則改之无歉於心則加勉乃自脩其德也君子脩德以俟時而已集說吕氏大臨曰山上有水水行不利不得其地故蹇也水行不得其地猶君子之行不得於人不得於人反求諸己而已故愛人不親反其仁治人不治反其知禮人不荅反其敬朱子語類云潘謙之書曰蹇與困相似致命遂志反身脩德亦一般殊不知不然象曰澤无水困處困之極事無可爲者故只得致命遂志若蹇則猶可進歩如山上之泉曲折多艱阻然猶可行故敎人以反身脩徳只觀澤无水困與山上有水蹇二句便全不同項氏安世曰反身象艮之背脩德象坎之勞往蹇來譽宜待也程傳方蹇之初進則益蹇時之未可進也故宜見幾而止以待時可行而後行也諸爻皆蹇往而善來然則无出蹇之義乎曰在蹇而往則蹇也蹇終則變矣故上已有碩義集說王氏申子曰往而行險不如居易以俟之爲宜也龔氏煥曰居止之初去險尚遠見險而卽止彖傳之所謂知也王臣蹇蹇終无尤也本義事雖不濟亦无可尤程傳雖艱戹於蹇時然其志在濟君難雖未能成功然終无過尤也聖人取其志義而謂其无尤所以勸忠藎也集說侯氏行果曰二上應於五五在坎中險而又險志在匡弼匪惜其躬故曰王臣蹇蹇匪躬之故輔君以此終无尤也往蹇來反内喜之也程傳内在下之陰也方蹇之時陰柔不能自立故皆附於九三之陽而喜愛之九之處三在蹇爲得其所也處蹇而得下之心可以求安故以來爲反猶春秋之言歸也集說孔氏穎達曰内卦三爻唯九三一陽居二陰之上是内之所恃故云内喜之也往蹇來連當位實也程傳四當蹇之時居上位不往而來與下同志固足以得衆矣又以陰居陰爲得其實以誠實與下故能連合而下之二三亦各得其實初以隂居下亦其實也當同患之時相交以實其合可知故來而連者當位以實也處蹇難非誠實何以濟當位不曰正而曰實上下之交主於誠實用各有其所也集說荀氏爽曰處正承陽故曰當位實也沈氏該曰四當位可進而陰柔不能獨濟來而承五連於陽實則得所輔也姜氏寶曰以陰比於陽陽爲實故云傳以爲誠實之實未然案荀氏沈氏姜氏之說皆是然如此則當位兩字宜著九五說言當尊位者有實徳也如敵剛也之例大蹇朋來以中節也程傳朋者其朋類也五有中正之德而二亦中正雖大蹇之時不失其守蹇於蹇以相應助是以其中正之節也上下中正而弗濟者臣之才不足也自古守節秉義而才不足以濟者豈少乎漢李固王允晉周顗王導之徒是也集說孔氏穎達曰得位履中不改其節則同志者自遠而來故曰朋來案蹇卦之義在乎進止得宜爻之往來卽進止也九五雖不言往來而傳明其爲中節則進止之宜不失可以濟難而不至於犯難矣裴度云朝廷處置得宜有以服其心其中節之謂乎往蹇來碩志在内也利見大人以從貴也程傳上六應三而從五志在内也蹇旣極而有助是以碩而吉也六以隂柔當蹇之極密近剛陽中正之君自然其志從附以求自濟故利見大人謂從九五之貴也所以云從貴恐人不知大人爲指五也集說蘇氏軾曰内與貴皆五之謂雷雨作解君子以赦過宥罪程傳天地解散而成雷雨故雷雨作而爲解也與明兩而作離語不同赦釋之宥寛之過失則赦之可也罪惡而赦之則非義也故寛之而己君子觀雷雨作解之象體其發育則施恩仁體其解散則行寛釋也集說孔氏穎達曰赦謂放免過謂誤失宥謂寛宥罪謂故犯過輕則赦罪重則宥皆解緩之義也趙氏汝楳曰雷者天之威雨者天之澤威中有澤猶刑獄之有赦宥剛柔之際義无咎也程傳初四相應是剛柔相際接也剛柔相際爲得其宜難旣解而處之剛柔得宜其義无咎也集說蔡氏淵曰柔居解初而承剛應剛得剛柔交際之宜難必解矣故曰義无咎也案初本以居最内最後得來復之義故无咎孔子恐人謂其一無所爲也故以從陽補其義在後之例與遯初同九二貞吉得中道也程傳所謂貞吉者得其中道也除去邪惡使其中直之道得行乃正而吉也案黄者中也矢者直也人臣之道固主乎直然直而不中則有以嫉惡去邪而激成禍亂者多矣得中道正釋得黃矢之義負且乗亦可醜也自我致戎又誰咎也程傳負荷之人而且乗載爲可醜惡也處非其據德不稱其器則宼戎之致乃已招取將誰咎乎聖人又於繫辭明其致宼之道謂作易者其知盜乎盜者乗釁而至苟无釁隙則盜安能犯負者小人之事乘者君子之器以小人而乗君子之器非其所能安也故盜乗釁而奪之小人而居君子之位非其所能堪也故滿假而陵慢其上侵暴其下盜則乘其過惡而伐之矣伐者聲其罪也盜橫暴而至者也貨財而輕慢其藏是敎誨乎盜使取之也女子而夭冶其容是敎誨滛者使暴之也小人而乗君子之器是招盜使奪之也皆自取之之謂也集說雷氏思曰負且乗小人自以爲榮而君子所耻故可醜寇小則爲盜大則爲戎任使非人則變解而蹇天下起戎矣案雷氏說極得此傳及繫傳之意此傳所謂致戎繫傳所謂盜斯伐之皆謂有國家者也解而拇未當位也程傳四雖陽剛然居陰於正疑不足若復親比小人則其失正必矣故戒必解其拇然後能來君子以其處未當位也解者本合而離之也必解拇而後朋孚蓋君子之交而小人容於其閒是與君子之誠未至也集說鄭氏汝諧曰四之所自處者不當宜小人之所附麗也必解去之然後孚於其朋朋剛陽之類拇在下之陰案德非中正而應初比三故曰未當位君子有解小人退也程傳君子之所解者謂退去小人也小人去則君子之道行是以吉也集說吳氏曰愼曰君子能有解則小人退矣小人若未退則是君子未能解也以小人之退驗君子之解雖不言有孚而有孚之義明矣案如鄭氏說則須云君子果能有解則雖小人亦信之而回心易行不待黜抑而自退矣公用射隼以解悖也程傳至解終而未解者悖亂之大者也射之所以解之也解則天下平矣集說吳氏曰愼曰天下之難由小人作羣比如拇邪媚如狐鷙害如隼解拇獲狐射隼而難解矣故解卦以去小人爲要義案五以前所謂者但總名之爲小人耳此則曰悖内亂外亂之别也在有虞則共驩者内亂也三苖者外亂也山下有澤損君子以懲忿窒欲本義君子脩身所當損者莫切於此程傳山下有澤氣通上潤與深下以增高皆損下之象君子觀損之象以損於己在脩己之道所當損者唯忿與欲故以懲戒其忿怒窒塞其意欲也集說虞氏翻曰兌說故懲忿艮止故窒欲孔氏穎逹曰懲者息其旣往窒者閉其將來懲窒互文而相足也楊氏時曰損德之脩也所當損者惟忿慾而已故九思始於視聽貌言終於忿思難見得思義者以此朱子語類問何以窒慾伊川云思此莫是慾心一萌當思禮義以勝之否曰然王氏申子曰和說則無忿知止則無慾故曰脩德之要也案凡大象配兩體之徳者皆先内後外故當以虞氏之說爲是益象亦然已事遄往尚合志也本義尚上通程傳尚上也時之所崇用爲尚初之所尚者與上合志也四賴於初初益於四與上合志也案易例初九與六四雖正應却無往從之之義在下位不援上也惟損初爻言遄往而傳謂上合志蓋當損下益上之時故也九二利貞中以爲志也程傳九居二非正也處說非剛也而得中爲善若守其中德何有不善豈有中而不正者豈有中而有過者二所謂利貞謂以中爲志也志存乎中則自正矣大率中重於正中則正矣正不必中也能守中則有益於上矣集說孔氏穎達曰言九二所以能居而守貞不損益之良由居中以中爲志故損益得其節適也王氏宗傳曰順從爲事則在己者所損多矣以道自守乃所以益之故曰九二利貞中以爲志也中以爲志則在己者無失而益上之實亦無出諸此一人行三則疑也程傳一人行而得一人乃得友也若三人行則疑所與矣理當損去其一人損其餘也案自二以上皆可以三槪之不必正三人也季文子三思南容三復之類損其疾亦可喜也程傳損其所疾固可喜也云亦發語辭集說項氏安世曰能不吝其疾自損以受之使合志者得效其忠豈非可喜之事哉案易多言有喜而此傳云亦可喜也則此喜不主己身乃主於使遄來而益我者有喜故變文曰可喜者他人之辭也六五元吉自上祐也程傳所以得元吉者以其能盡衆人之見合天地之理故自上天降之福祐也案自上祐以爲正釋龜筮弗違亦可然觀益二言朋龜不違下又云享于帝吉則帝者又百神之主也故此上祐亦是言天心克享人神不能違也弗損益之大得志也程傳居上不損下而反益之是君子大得行其志也君子之志唯在益於人而已風雷益君子以見善則遷有過則改本義風雷之勢交相助益遷善改過益之大者而其相益亦猶是也程傳風烈則雷迅雷激則風怒二物相益者也君子觀風雷相益之象而求益於己爲益之道无若見善則遷有過則改也見善能遷則可以盡天下之善有過能改則无過矣益於人者无大於是集說王氏弼曰遷善改過益莫大焉胡氏炳文曰雷與風自有相益之勢速於遷善則過當益寡決於改過則善當益純是遷善改過又自有相益之功也蔣氏悌生曰風雷相益迅速不遲君子法之見善則即遷知過必速改不可猶豫何氏楷曰咸言速心之德通於虚也不損不虛懲忿窒欲損之又損致虛以復其爲咸恆言久心之德凝於實也不益不實遷善改過益之又益充實而成其爲恆案雷者動陽氣者也故人心奮𤼵而勇於善者如之風者散隂氣者也故人心蕩滌以消其惡者如之元吉无咎下不厚事也本義下本不當任厚事故不如是不足以塞咎也程傳在下者本不當處厚事厚事重大之事也以爲在上所任所以當大事必能濟大事而致元吉乃爲无咎能致元吉則在上者任之爲知人已當之爲勝任不然則上下皆有咎也集說鄭氏汝諧曰得益者非以是而自私也故損之上利有攸往得臣无家益之初利用爲大作爲大作者當爲大益之事也然在下而爲大益之事位未崇也誠未孚也必元吉然後无咎以其位非厚事之地也朱子語類云利用大作象曰下不厚事也自此推之則凡居下者不當厚事如子之於父臣之於君僚屬之於官長皆不可以踰分越職縱可爲亦須是盡善方能無過所以有元吉无咎之戒也或益之自外來也本義或者衆无定主之辭程傳旣中正虛中能受天下之善而固守則有有益之事衆人自外來益之矣或曰自外來豈非謂五乎曰如二之中正虛中天下孰不願益之五爲正應固在其中矣集說孔氏穎逹曰自外來者明益之者從外而來不召而至也楊氏簡曰或益之自外來也亦猶損六五之或益之自上祐也皆言本無求益之意而益自至也曰自外來言非中心之所期自外而至也益用凶事固有之也本義益用凶事欲其困心衡慮而固有之也程傳六三益之獨可用於凶事者以其固有之也謂專固自任其事也居下當稟承於上乃專任其事唯救民之凶災拯時之艱急則可也乃處急難變故之權宜故得无咎若平時則不可也集說龔氏煥曰益之以凶事雖曰災自外來而已乃受益乃其已分之所固有者非自外來也告公從以益志也程傳爻辭但云得中行則告公而獲從象復明之曰告公而獲從者告之以益天下之志也志苟在於益天下上必信而從之事君者不患上之不從患其志之不誠也集說龔氏煥曰六四之告公以益民爲志故得見從也有孚惠心勿問之矣惠我德大得志也程傳人君有至誠惠益天下之心其元吉不假言也故云勿問之矣天下至誠懐吾德以爲惠是其道大行人君之志得矣集說崔氏憬曰損上之時一以損己爲念雖有孚惠心及下終不言以彰已功故曰有孚惠心勿問問猶言也如是獲元吉且爲下所信而懐己德故曰有孚惠我德君雖不言人惠其徳則我大得志也張氏振淵曰惠出於心又何問焉大得志非以民之惠我爲得志以我足以致民惠我爲得志也莫益之偏辭也或擊之自外來也本義莫益之者猶從其求益之偏辭而言也若究而言之則又有擊之者矣程傳理者天下之至公利者衆人所同欲苟公其心不失其正理則與衆同利无侵於人人亦欲與之若切於好利蔽於自私求自益以損於人則人亦與之力爭故莫肯益之而有擊奪之者矣云莫益之者非其偏己之辭也苟不偏己合於公道則人亦益之何爲擊之乎旣求益於人至於甚極則人皆惡而欲攻之故擊之者自外來也人爲善則千里之外應之六二中正虛己益之者自外而至是也苟爲不善則千里之外違之上九求益之極擊之者自外而至是也繫辭曰君子安其身而後動易其心而後語定其交而後求君子脩此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶君子言動與求皆以其道乃完善也不然則取傷而凶矣集說胡氏炳文曰二不求益而或益之自外來也上求益而或擊之亦自外來也孰有以來之五之吉由中心之有孚上之凶由立心之勿恆吉凶之道未有不自心生者澤上於天夬君子以施祿及下居德則忌本義澤上於天潰決之勢也施祿及下潰決之意也居德則忌未詳程傳澤水之聚也而上於天至髙之處故爲夬象君子觀澤決於上而注漑於下之象則以施祿及下謂施其祿澤以及於下也觀其決潰之象則以居德則忌居德謂安處其德則約也忌防也謂約立防禁有防禁則无潰散也王弼作明忌亦通不云澤在天上而云澤上於天上於天則意不安而有決潰之勢云在天上乃安辭也案澤上於天所謂稽天之浸也必潰決無疑矣財聚而不散則悖出故君子以施祿及下居身無所畏忌則滿而溢故君子之居德也則常存畏忌而已禮曰積而能散書曰敬忌而罔有擇言在躬夫如是則何潰決之患之有不勝而往咎也程傳人之行必度其事可爲然後決之則无過矣理不能勝而且往其咎可知凡行而有咎者皆決之過也集說王氏申子曰謂非往之爲咎不能度其可勝而後往之爲咎也谷氏家杰曰夬之道其危乃光勝心不可有也況不勝而往乎有戎勿恤得中道也程傳莫夜有兵戎可懼之甚也然可勿恤者以自處之善也旣得中道又知惕懼且有戒備何事之足恤也九居二雖得中然非正其爲至善何也曰陽決陰君子決小人而得中豈有不正也知時識勢學易之大方也集說張子曰能得中道故剛而不暴蘇氏軾曰能靜而不忘警能警而不用得中道矣與大壯九二貞吉同故皆稱其得中案有戎勿恤者謂不輕於卽戎也此所以爲得中道君子夬夬終无咎也程傳牽梏於私好由无決也君子義之與比決於當決故終不至於有咎也集說黃氏淳耀曰終對始言之始雖若濡有慍終必決去而无咎也其行次且位不當也聞言不信聰不明也程傳九處隂位不當也以陽居柔失其剛決故不能強進其行次且剛然後能明處柔則遷失其正性豈復有明也故聞言而不能信者蓋其聰聽之不明也案四與陰尚隔位不當者借爻位以明四之未當事任而欲次且前進之非宜也中行无咎中未光也本義程傳備矣程傳卦辭言夬夬則於中行爲无咎矣象復盡其義云中未光也夫人心正意誠乃能極中正之道而充實光輝五心有所比以義之不可而決之雖行於外不失中正之義可以无咎然於中道未得爲光大也蓋人心一有所欲則離道矣夫子於此示人之意深矣集說張子曰陽近於陰不能無累故必正其行然後免咎趙氏汝楳曰他卦貴於中行此爻乃止於无咎其亦體兌之說溺於上而致然乎故於中爲未光也案張子之說極是蓋因中未光故貴於中行非謂雖中行而猶未光也无號之凶終不可長也程傳陽剛君子之道進而益盛小人之道旣已窮極自然消亡豈復能長久乎雖號咷无以爲也故云終不可長也先儒以卦中有孚號惕號欲以无號爲无號作去聲謂无用更加號令非也一卦中適有兩去聲字一平聲字何害而讀易者率皆疑之或曰聖人之於天下雖大惡未嘗必絶之也今直使之无號謂必有凶可乎曰夬者小人之道消亡之時也決去小人之道豈必盡誅之乎使之變革乃小人之道亡也道亡乃其凶也天下有風姤后以施命誥四方程傳風行天下无所不周爲君后者觀其周徧之象以施其命令周誥四方也風行地上與天下有風皆爲周徧庶物之象而行於地上徧觸萬物則爲觀經歴觀省之象也行於天下周徧四方則爲姤施發命令之象也諸象或稱先王或稱后或稱君子大人稱先王者先王所以立法制建國作樂省方敕法閉關育物享帝皆是也稱后者后王之所爲也財成天地之道施命誥四方是也君子則上下之通稱大人者王公之通稱集說龔氏煥曰天下有風姤與風行地上觀相似故在姤則曰施命誥四方在觀則曰省方觀民設敎曰施曰誥自上而下天下有風之象也曰省曰觀周歴徧覽風行地上之象也案巽之申命因有積弊而振飭之也姤之施命與巽正同蓋在三畫之卦爲巽者在六畫之卦卽爲姤也施命申命所以消隠慝除積弊法風之吹散伏陰也繫于金柅柔道牽也本義牽進也以其進故止之程傳牽者引而進也陰始生而漸進柔道方牽也擊之于金柅所以止其進也不使進則不能消正道乃貞吉也集說孔氏穎達曰柔道牽者陰柔之道必須有所牽繫也鄭氏汝諧曰此羸豕也力雖微而其志則蹢躅惟信其蹢躅則不可不有所牽制故曰柔道牽也趙氏汝楳曰姤之初言繫言牽惡陰之長而止之也包有魚義不及賓也程傳二之遇初不可使有二於外當如包苴之有魚包苴之魚義不及於賓客也集說吳氏曰愼曰九二旣包有魚則當盡其防制之責以義言之不可使遇於賓也若不制而使遇於賓則失其義矣其行次且行未牽也程傳其始志在求遇於初故其行遲遲未牽不促其行也旣知危而改之故未至於大咎也集說郭氏雍曰无膚次且之厲蓋未嘗牽勉而妄行焉是以至此案易中言牽者自小畜至此皆當爲牽制之義无魚之凶遠民也本義民之去已猶已遠之程傳下之離由已致之遠民者已遠之也爲上者有以使之離也集說余氏本曰言其使民失道無以結民之心致民之去已由已之遠乎民也案九四因與陰相應故惡而欲遠之正如夬三壯于頄之意徒欲遠之而不能容之制之此所以包无魚也君子之於小人也惟其能容之是以能制之不能容之則彼自絶矣欲以力制不亦難乎書曰民可近不可下此之謂也九五含章中正也有隕自天志不舍命也程傳所謂含章謂其含蘊中正之德也德充實則成章而有輝光命天理也舍違也至誠中正屈已求賢存志合於天理所以有隕自天必得之矣集說蘇氏軾曰陰長而消陽天之命也有以勝之人之志也君子不以命廢志故九五之志堅則必有自天而隕者言人之至者天不能勝也楊氏啟新曰陰陽迭勝天運自然而心心念念不舍天命以靜制之此所以挽回造化也案詩云桑之落矣其黃而隕故有隕自天謂天時旣至而瓜隕也雖天命之必然亦由君子積誠脩德與之符㑹故曰志不舍命姤其角上窮吝也程傳旣處窮上剛亦極矣是上窮而致吝也以剛極居高而求遇不亦難乎案不與陰遇雖无咎然君子終以不能濟時爲可羞爲其身在事外所處之窮故爾澤上於地萃君子以除戎器戒不虞本義除者脩而聚之之謂程傳澤上於地爲萃聚之象君子觀萃象以除治戎器用戒備於不虞凡物之萃則有不虞度之事故衆聚則有爭物聚則有奪大牽旣聚則多故矣故觀萃象而戒也除謂簡治也去弊惡也除而聚之所以戒不虞也集說王氏弼曰聚而無防則衆生心朱子語類云大凡物聚衆盛處必有爭故當豫爲之備又澤本當在地中今却上於地上是水盛有潰決奔突之憂故取象如此王氏申子曰澤上有地臨則聚澤者地岸也澤上於地萃則聚澤者隄防也以地岸而聚澤則無隄防之勞以隄防而聚澤則有潰決之憂故君子觀此象爲治世之防除治其戎器以爲不虞之戒若以治安而忘戰守之備則是以舊防爲無用而壊之也其可乎乃亂乃萃其志亂也程傳其心志爲同類所惑亂故乃萃於羣陰也不能固其守則爲小人所惑亂而失其正矣集說李氏簡曰非其志惑亂必無舍應亂萃之理引吉无咎中未變也程傳萃之時以得聚爲吉故九四爲得上下之萃二與五雖正應然異處有閒乃當萃而未合者也故能相引而萃則吉而无咎以其有中正之德未遽至改變也變則不相引矣或曰二旣有中正之德而象云未變辭若不足何也曰羣陰比處乃其類聚方萃之時居其閒能自守不變遠須正應剛立者能之二陰柔之才以其有中正之德可覬其未至於變耳故象含其意以存戒也集說楊氏萬里曰中未變者蓋六二所守之中道不以爲上所引而有所變也案此中未變與比二不自失之意同中庸所謂不變塞焉孟子所謂達不離道者是也往无咎上巽也程傳上居柔說之極三往而无咎者上六巽順而受之也集說虞氏翻曰動之四故上巽鄭氏汝諧曰下二陰皆萃於陽矣三獨無附故咨嗟怨嘆而无攸利雖然當萃之時下欲萃於上上亦欲下之萃於我三不以無應之故能往歸於上雖小吝而亦可以无咎上非上六謂在上之陽也大吉无咎位不當也程傳以其位之不當疑其所爲未能盡善故云必得大吉然後爲无咎也非盡善安得爲大吉乎集說蘇氏軾曰非其位而有聚物之權非大吉則有咎矣郭氏雍曰四得上下之聚而非君位故言不當也鄭氏汝諧曰其位近其德同其爲下之所歸亦同自非所爲至善則其君病之烏能无咎戒之也凡言位不當其義不一此所謂不當者爲其以剛陽廹近其君也熊氏良輔曰九四九五皆萃之主九五在上之萃也九四在下之萃也故九五曰萃有位而四象曰位不當大吉无咎者上比於君以臣而有君萃之象疑於有咎故也案鄭氏謂凡言位不當其義不一者是已然須知是借爻位之當不當以發明其德與時位之當不當萃有位志未光也本義未光謂匪孚程傳象舉爻上句王者之志必欲誠信著於天下有感必通含生之類莫不懷歸若尚有匪孚是其志之未光大也集說龔氏煥曰五有其位者也徒有其位故人或匪孚此志之所以未光也胡氏炳文曰四必大吉而後无咎位不當也五有位矣而匪孚志猶未光也然則欲當天下之萃者不可無其位有其位又不可無其德齎咨涕洟未安上也程傳小人所處常失其宜旣貪而從欲不能自擇安地至於困窮則顚沛不知所爲六之涕洟蓋不安於處上也君子愼其所處非義不居不幸而有危困則泰然自安不以累其心小人居不擇安常履非據及其窮廹則隕穫躁撓甚至涕洟爲可羞也未者非遽之辭猶俗云未便也未便能安於上也陰而居上孤處无與旣非其據豈能安乎集說趙氏光大曰言危懼而不敢自安於上操心危慮患深安得晏然而已乎案上猶外也雖在外而不敢自安如舜之耕歴山周公之處東國必號泣嘵嘵求萃於君父而後已也地中生木升君子以順德積小以高大本義王肅本順作愼今案他書引此亦多作愼意尤明白蓋古字通用也說見上篇䝉卦程傳木生地中長而上升爲升之象君子觀升之象以順脩其德積累微小以至髙大也順則可進逆乃退也萬物之進皆以順道也善不積不足以成名學業之充實道德之崇高皆由積累而至積小所以成高大升之義也集說胡氏炳文曰木之生也一日不長則枯德之進也一息不愼則退必念念謹審事事謹審其德積小高大當如木之升矣允升大吉上合志也程傳與在上者合志同升也上謂九二從二而升乃與二同志也能信從剛中之賢所以大吉集說吕氏大臨曰初六以柔居下當升之時柔進而上雖處至下志與三陰同升衆之所允無所不利故曰允升大吉案吕氏以上爲上體三陰者是九二之孚有喜也程傳二能以孚誠事上則不唯爲臣之道无咎而已可以行剛中之道澤及天下是有喜也凡象言有慶者如是則有福慶及於物也言有喜者事旣善而又有可喜也如大畜童牛之梏元吉象云有喜蓋梏於童則易又免強制之難是有可喜也升虛邑无所疑也程傳入无人之邑其進无疑阻也集說蘇氏軾曰九三以陽用陽其升也果矣故曰升虛邑无所疑也不言吉者其爲禍福未可知也存乎其人而已案乾四曰或之者疑之也故无咎果於進而无所疑可乎蘇氏之說善矣王用亨于岐山順事也本義以順而升登祭於山之象程傳四居近君之位而當升時得吉而无咎者以其有順德也以柔居坤順之至也文王之亨于岐山亦以順時而已上順於上下順乎下已順處其義故云順事也案用賢以享於神明是順神明之心而事之者也貞吉升階大得志也程傳倚任賢才而能貞固如是而升可以致天下之大治其志可大得也君道之升患无賢才之助爾有助則猶自階而升也集說何氏楷曰卽彖所謂有慶志行者也案自初而升至此而升極矣故初曰上合志此曰大得志冥升在上消不富也程傳昏冥於升極上而不知己唯有消亡豈復有加益也不富无復增益也升旣極則有退而无進也集說胡氏瑗曰上六旣不達存亡之幾以至於上位固當消虛自損不爲尊大以自至於富盛也案胡氏之說善矣然不曰不息之貞消不富也而曰冥升在上者以在上明其位勢之滿盛故當以自消損爲貞也澤无水困君子以致命遂志本義水下漏則澤上枯故曰澤无水致命猶言授命言持以與人而不之有也能如是則雖困而亨矣程傳澤无水困乏之象也君子當困窮之時旣盡其防慮之道而不得免則命也當推致其命以遂其志知命之當然也則窮塞禍患不以動其心行吾義而已苟不知命則恐懼於險難隕穫於窮戹所守亡矣安能遂其爲善之志乎集說王氏弼曰澤无水則水在澤下水在澤下困之象也處困而屈其志者小人也君子固窮道可忘乎鄭氏汝諧曰知其不可求而聽其自至焉致命也在命者不可求在志者則可遂所謂從吾所好也馮氏當可曰君子之處困也命在天而致之志在我則遂之困而安於困者命之致也困而有不困者志之遂也若小人處之則凡可以求幸免者無不爲也而卒不得免焉則亦徒喪其所守而已矣體坎險以致命體兌說而遂志何氏楷曰致猶委也人不信其命則死生禍福營爲百端居貞之志何以自遂今一委之命則不以命貳志者夫且能以志立命入于幽谷幽不明也程傳幽不明也謂益入昏暗自陷於深困也明則不至於陷矣困于酒食中有慶也程傳雖困於所欲未能施惠於人然守其剛中之德必能致亨而有福慶也雖使時未亨通守其中德亦君子之道亨乃有慶也案二有中德故能以酒食亨祀而有福慶據于蒺藜乗剛也入于其宫不見其妻不祥也程傳據于蒺藜謂乗九二之剛不安猶藉刺也不祥者不善之徴失其所安者不善之效故云不見其妻不祥也集說鄭氏汝諧曰進阨於四故困于石退乗二之剛故據于蒺藜上其宫也其宫可入而以柔遇柔非其配也以此處困不祥莫甚焉案爻有衆喻而傳偏舉一者舉其重者也易乗剛之義最重故睽三見輿曵此爻據于蒺藜皆以其乗剛言之來徐徐志在下也雖不當位有與也程傳四應於初而隔於二志在下求故徐徐而來雖居不當位爲未善然其正應相與故有終也集說蘇氏濬曰四與五同爲上六所掩進而見掩豈君子直遂之時耶惟沈濳以養其晦從容以俟其幾故五曰乃徐四曰徐徐志在下者四位雖上而心則下也然四五合德天下之事終以舒徐濟之故曰有與又曰有終何氏楷曰五爲近比則四之所與者劓刖志未得也乃徐有說以中直也利用祭祀受福也程傳始爲陰揜无上下之與方困未得志之時也徐而有說以中直之道得在下之賢共濟於困也不曰中正與二合者云直乃宜也直比正意差緩盡其誠意如祭祀然以求天下之賢則能亨天下之困而享受其福慶也集說陸氏希聲曰困窮而通德辨而明中正道行志則大遂故乃徐有說也困于葛藟未當也動悔有悔吉行也程傳爲困所纏而不能變未得其道也是處之未當也知動則得悔遂有悔而去之可出於困是其行而吉也集說陸氏希聲曰行而獲吉故曰變乃通也句田氏疇曰諸家皆以吉行也三字爲一非也蓋動悔有悔吉是句行也是句動悔有悔之所以吉者以能行而得之也行也二字乃是解征吉之義木上有水井君子以勞民勸相本義木上有水津潤上行井之象也勞民者以君養民勸相者使民相養皆取井養之義程傳木承水而上之乃器汲水而出井之象君子觀井之象法井之德以勞徠其民而勸勉以相助之道也勞徠其民法井之用也勸民使相助法井之施也集說張子曰養而不窮莫若勞民而勸相也楊氏繪曰水性潤下能上潤於物者井之用也朱子語類云木上有水井說者以爲木是汲器則後面却有瓶瓶自是瓦器只是說水之津潤上行至那木之杪這便是井水上行之象又云草木之生津潤皆上行直至樹末便是木上有水之義如菖蒲葉每晨葉尾皆有水如珠顆雖藏之密室亦然非露水也問如此則井之義與木上有水何預曰木上有水便如水本在井底却能汲上來給人之食故取象如此李氏心傳曰勸相卽相友相助相扶持之意案大象木上有水須以朱子之說爲長彖傳巽乎水而上水則鄭氏桔橰之說不妨並存也勞民者如巽風之布號令勸相者如坎水之相灌輸井泥不食下也舊井无禽時舍也本義言爲時所棄程傳以陰而居井之下泥之象也无水而泥人所不食也人不食則水不上无以及禽鳥禽鳥亦不至矣見其不能濟物爲時所舍置不用也若能及禽鳥是亦有所濟也舍上聲與乾之時舍音不同集說孔氏穎逹曰下也者以其最在井下故爲井泥也時舍也者人旣不食禽亦不向是一時共棄舍也井谷射鮒无與也程傳井以上出爲功二陽剛之才本可濟用以在下而上無應援是以下比而射鮒若上有與之者則當汲引而上成井之功矣集說谷氏家杰曰謂有泉而无與與無泉而時棄者自不可同也井渫不食行惻也求王明受福也本義行惻者行道之人皆以爲惻程傳井渫治而不見食乃人有才知而不見用以不得行爲憂惻也旣以不得行爲惻則豈免有求也故求王明而受福志切於行也集說趙氏汝楳曰井不以不食爲憂賢者不以不遇而惻心惻者行人也行汲之人爲之求王者之明也求王之明豈朋比以干祿爲其見知於上則福被生民猶井汲而出然後利及於人也王氏申子曰井渫而不爲人所食縱不自惻行道之人亦爲之惻然矣縱不求人之我用人亦爲之求之以並受其福矣井甃无咎脩井也程傳甃者脩治於井也雖不能大其濟物之功亦能脩治不廢也故无咎僅能免咎而已若在剛陽自不至如是如是則可咎矣集說虞氏翻曰脩治也以瓦甓壘井稱甃蘇氏軾曰脩潔也陽爲動爲實陰爲靜爲虚泉者所以爲井也動也實也井者泉之所寄也靜也虚也初六最下故曰泥上六最上故曰收六四居其閒而不失正故曰甃甃之於井所以禦惡而潔井也井待是而潔故无咎寒泉之食中正也程傳寒泉而可食井道之至善者也九五中正之德爲至善之義案詩云泉之竭矣不云自中蓋不中則源不常裕而不寒也又云冽彼下泉浸彼苞蕭蓋不正則流不逮下而不食也元吉在上大成也程傳以大善之吉在卦之上井道之大成也井以上爲成功澤中有火革君子以治歴明時本義四時之變革之大者程傳水火相息爲革革變也君子觀變革之象推日月星辰之遷易以治歴數明四時之序也夫變易之道事之至大理之至明跡之至著莫如四時觀四時而順變革則與天地合其序矣集說虞氏翻曰歴象謂日月星辰也天地革而四時成故君子以治歴明時也朱子語類云治歴明時非謂歴當改革蓋四時變革中便有箇治歴明時底道理鞏用黃牛不可以有爲也程傳以初九時位才皆不可以有爲故當以中順自固也集說胡氏瑗曰凡革之道必須已日然後可以革之也民固卽日而未孚可遽革之乎故但可固守中順未可大有所爲鄭氏汝諧曰居位之下革之而人未必從當革之始遽革而人未必信固執中順之道循理而變通可也自我有爲不可也於革之初言之欲其謹於始也已日革之行有嘉也程傳已日而革之征則吉而无咎者行則有嘉慶也謂可以革天下之弊新天下之事處而不行是无救弊濟世之心失時而有咎也集說俞氏琰曰未當革而遽往適以滋弊耳何嘉之有必往於已日當革之時則其行有嘉美之功行釋征字嘉釋吉无咎革言三就又何之矣本義言已審程傳稽之衆論至於三就事至當也又何之矣乃俗語更何往也如是而行乃順理時行非已之私意所欲爲也必得其宜矣集說徐氏幾曰初未可革二乃革之三則變革之事成矣凡事詳審至再至三則止矣又何往焉改命之吉信志也程傳改命而吉以上下信其志也誠旣至則上下信矣革之道以上下之信爲本不當不孚則不信當而不信猶不可行也况不當乎集說龔氏煥曰信志卽有孚之謂革以有孚爲本信足以孚乎人心則可以改命而得吉矣大人虎變其文炳也程傳事理明著若虎文之炳煥明盛也天下有不孚乎集說俞氏琰曰虎之斑文大而疎朗革道已成事理簡明如虎文之炳然也君子豹變其文蔚也小人革面順以從君也程傳君子從化遷善成文彬蔚章見於外也中人以上莫不變革雖不移之小人則亦不敢肆其惡革易其外以順從君上之敎令是革面也至此革道成矣小人勉而假善君子所容也更往而治之則凶矣集說張子曰以柔爲德不及九五剛中炳明故但文章蔚縟能使小人改觀而從也吕氏大臨曰上六與九五皆革道已成之時虎之文脩大而有理豹之文密茂而成斑其文炳然如火之照而易辨也其文蔚然如草之暢茂而叢聚也俞氏琰曰小人居革之終幡然嚮道以順從君無不心悅而誠服或者乃謂面革而心不革非也木上有火鼎君子以正位凝命本義鼎重器也故有正位凝命之意凝猶至道不凝之凝傳所謂協于上下以承天休者也程傳木上有火以木巽火也烹餁之象故爲鼎君子觀鼎之象以正位凝命鼎者法象之器其形端正其體安重取其端正之象則以正其位謂正其所居之位君子所處必正其小至於席不正不坐毋跛毋倚取其安重之象則凝其命令安重其命令也凝聚止之義謂安重也今世俗有凝然之語以命令而言耳凡動爲皆當安重也集說房氏喬曰鼎者神器至大至重正位凝命法其重大不可遷移也李氏元量曰木上有火非鼎也鼎之用也猶之木上有水非井也井之功也鄭氏汝諧曰革以改命鼎以定命知革而不知鼎則天下之亂滋矣項氏安世曰存神息氣人所以凝壽命中心無爲以守至正君所以凝天命王氏申子曰鼎形端而正體鎮而重君子取其端正之象以正其所居之位使之愈久而愈安取其鎮重之象以凝其所受之命使之愈久而愈固胡氏炳文曰鼎之器正然後可凝其所受之實君之位正然後可凝其所受之命鼎顚趾未悖也利出否以從貴也本義鼎而顚趾悖道也而因可出否以從貴則未爲悖也從貴謂應四亦爲取新之意程傳鼎覆而趾顚悖道也然非必爲悖者蓋有傾出否惡之時也去故而納新㵼惡而受美從貴之義也應於四上從於貴者也集說陸氏希聲曰趾當承鼎顚而覆之悖也於是出其惡故雖覆未悖猶妾至賤不當貴以其子故得貴焉春秋之義母以子貴是也鄭氏汝諧曰初居下乃鼎之趾必顚趾者乃出否也猶之妾也其可從上以子也子貴則母貴也凡取新之義必捨惡而取善捨賤而取貴期合於義初之應乎四顚趾也從貴也柔而應於上必有此義乃可案傳於得妾之辭不釋但以從貴之意包之聖言之簡而盡如此鼎有實愼所之也我仇有疾終无尤也本義有實而不謹其所往則爲仇所卽而陷於惡矣程傳鼎之有實乃人之有才業也當愼所趨向不愼所往則亦陷於非義二能不暱於初而上從六五之正應乃是愼所之也我仇有疾舉上文也我仇對已者謂初也初比已而非正是有疾也旣自守以正則彼不能卽我所以終无過尤也集說張子曰以陽居中故有實實而與物競則所喪多矣故所之不可不愼也案尤者已之過尤也人之怨尤也能愼其所行則雖我仇有疾害之心无過尤之可指而怨尤之念亦消矣鼎耳革失其義也程傳始與鼎耳革異者失其相求之義也與五非應失求合之道也不中非同志之象也是以其行塞而不通然上明而下才終必和合故方雨而吉也案象傳凡言義者謂卦義也此失其義非謂已之所行失義蓋謂爻象無相應之義爾覆公餗信如何也本義言失信也程傳大臣當天下之任必能成天下之治安則不誤君上之所倚下民之所望與已致身任道之志不失所期乃所謂信也不然則失其職誤上之委任得爲信乎故曰信如何也集說楊氏簡曰居大臣之位是許國以大臣之事業也而實則不稱折足覆餗失許國之信矣鼎黃耳中以爲實也程傳六五以得中爲善是以中爲實德也五之所以聰明應剛爲鼎之主得鼎之道皆由得中也集說陸氏績曰得中承陽故曰中以爲實郭氏雍曰中以爲實者六五陰虛以黃中之德爲實也猶坤之六五美在其中之道也玉鉉在上剛柔節也程傳剛而溫乃有節也上居成功致用之地而剛柔中節所以大吉无不利也井鼎皆以上出爲成功而鼎不云元吉何也曰井之功用皆在上出又有博施有常之德是以元吉鼎以烹餁爲功居上爲成德與井異以剛柔節故得大吉也集說熊氏良輔曰上以剛居柔故曰剛柔節而比德於玉也洊雷震君子以恐懼脩省程傳洊重襲也上下皆震故爲洊雷雷重仍則威益盛君子觀洊雷威震之象以恐懼自脩飭循省也君子畏天之威則脩正其身思省其過咎而改之不唯雷震凡遇驚懼之事皆當如是集說項氏安世曰恐懼脩省所謂洊也人能恐懼則旣震矣又脩省焉洊在其中矣胡氏炳文曰恐懼作於心脩省見於事脩克治之功省審察之力案恐懼脩省者君子之洊雷也非遇雷震而恐懼也須從項氏震來虩虩恐致福也笑言啞啞後有則也程傳震來而能恐懼周顧則无患矣是能因恐懼而反致福也因恐懼而自脩省不敢違於法度是由震而後有法則故能保其安吉而笑言啞啞也集說范氏仲淹曰君子之懼於心也思慮必愼其始則百志弗違於道懼於身也進退不履於危則百行弗罹於禍故初九震來而致福愼於始也震來厲乗剛也程傳當震而乗剛是以彼厲而已危震剛之來其可禦乎集說胡氏炳文曰屯六二豫六五噬嗑六二困六三震六二皆言乗剛惟困六三乗坎之中爻其餘皆乗震之初也震蘇蘇位不當也程傳其恐懼自失蘇蘇然由其所處不當故也不中不正其能安乎案震當虩虩不當蘇蘇六三當重震之閒正奮厲以有爲之時也而以陰不中正處之至於蘇蘇緩散故曰位不當震遂泥未光也程傳陽者剛物震者動義以剛處動本有光亨之道乃失其剛正而陷於重陰以致遂泥豈能光也云未光見陽剛本能震也以失德故泥耳案四有剛德非失德者此言未光蓋志氣未能自遂行拂亂其所爲耳與噬嗑九四之未光同皆謂所處者未能遂其所志非兌上未光之比震往來厲危行也其事在中大无喪也程傳往來皆厲行則有危也動皆有危唯在无喪其事而已其事謂中也能不失其中則可自守也大无喪以无喪爲大也集說張子曰无喪有事猶云不失其所有也以其乗剛故危以其在中故无喪禍至與不至皆懼則无喪有事郭氏雍曰二以來厲而喪貝則五之往來皆厲宜其大有喪也六五位雖不正而用中焉其事旣不失中道雖涉危行可以大无喪矣震索索中未得也雖凶无咎畏鄰戒也本義中謂中心程傳所以恐懼自失如此以未得於中道也謂過中也使之得中則不至於索索矣極而復征則凶也若能見鄰戒而知懼變於未極之前則无咎也上六動之極震極則有變義也集說吳氏澄曰畏鄰戒謂因鄰之戒而知畏也龔氏煥曰中未得者處震之極志氣消索中無所主也兼山艮君子以思不出其位程傳上下皆山故爲兼山此而幷彼爲兼謂重復也重艮之象也君子觀艮止之象而思安所止不出其位也位者所處之分也萬事各有其所得其所則止而安若當行而止當速而久或過或不及皆出其位也况踰分非據乎集說董氏曰兩雷兩風兩火兩水兩澤皆有相往來之理惟兩山並立不相往來此止之象也丘氏富國曰凡人所爲所以易至於出位者以其不能思也思則心有所悟知其所當止而得所止矣案思不出位諸家皆作思欲不出其位思字不甚重今觀咸卦云貞吉悔亡憧憧往來朋從爾思而夫子以何思何慮明之則此思字蓋不可畧雜擾之思動於欲者也通微之思濬於理者也大學云安而后能慮蓋思不出位之說也艮其趾未失正也程傳當止而行非正也止之於初故未至失正事止於始則易而未至於失也集說虞氏翻曰動而得正故未失正也郭氏雍曰趾初象也動莫先於趾止於動之先則易而止於旣動之後則難傳言未失正者止於動之先未有失正之事也不拯其隨未退聽也本義三止乎上亦不肯退而聽乎二也程傳所以不拯之而唯隨者在上者未能下從也退聽下從也艮其限危薰心也程傳謂其固止不能進退危懼之慮常薰爍其中心也集說鄭氏汝諧曰三雖止而不與物交而其危則實薰心也何氏楷曰以強制故危薰心艮限者強制之謂也艮其身止諸躬也程傳不能爲天下之止能止於其身而已豈足稱大臣之位也集說孔氏穎達曰止諸躬也者躬猶身也明能静止其身不爲躁動也王氏應麟曰艮六四艮其身象以躬解之傴背爲躬見背而不見面朱文公詩云反躬艮其背案止諸躬便是艮其身但易其字爲諸字爾蓋易其字爲諸字便見得是止之於躬與夫正本淸源自然而止者畧異矣王氏解姑備一說艮其輔以中正也本義正字羨文叶韻可見程傳五之所善者中也艮其輔謂止於中也言以得中爲正止之於輔使不失中乃得正也集說余氏本曰言不妄發發必當理唯有中德者能之敦艮之吉以厚終也程傳天下之事唯終守之爲難能敦於止有終者也上之吉以其能厚於終也集說王氏申子曰德愈厚而止愈安是止之善終者也其吉可知案艮者萬物之所成終而所成始故於上言厚終凡人之心惟患其養之不厚不患其發之不光水蓄則彌盛火宿則彌壯厚其終則萬事皆由此始山上有木漸君子以居賢德善俗本義二者皆當以漸而進疑賢字衍或善下有脫字程傳山上有木其高有因漸之義也君子觀漸之象以居賢善之德化美於風俗人之進於賢德必有其漸習而後能安非可陵節而遽至也在己且然敎化之於人不以漸其能入乎移風易俗非一朝一夕所能成故善俗必以漸也集說楊氏曰地中生木以時而升山上有木其進以漸馮氏當可曰居積也德以漸而積俗以漸而善內卦艮止居德者止諸內也外卦巽入善俗者入於外也體艮以居德體巽以善俗案地中生木始生之木也山上有木高大之木也凡木始生枝條驟長旦異而夕不同及旣高大則自拱把而合抱自捩手而干霄必須踰年積嵗此升與漸之義所以異也居德善俗皆須以漸又居賢德然後可以善俗亦漸之意也小子之厲義无咎也程傳雖小子以爲危厲在義理實无咎也飲食衎衎不素飽也本義素飽如詩言素餐得之以道則不爲徒飽而處之安矣程傳爻辭以其進之安平故取飲食和樂爲言夫子恐後人之未喻又釋之云中正君子遇中正之主漸進於上將行其道以及天下所謂飲食衎衎謂其得志和樂不謂空飽飲食而已素空也集說龔氏煥曰二以中正應五而得祿非尸位素餐者比故食之衎衎而樂也案六爻以鴻取進象自水涯以至山上自遠而近自下而高也干爲最逺是士之將進而不苟進者故在詩曰置之河之干兮彼君子兮不素餐兮二雖進爲時用漸于磐矣而不忘不素餐之義所謂達不變塞者也夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也程傳夫征不復則失漸之正從欲而失正離判其羣類爲可醜也卦之諸爻皆无不善若獨失正是離其羣類婦孕不由其道所以不育也所利在禦寇謂以順道相保君子之與小人比也自守以正豈唯君子自完其己而已乎亦使小人得不陷於非義是以順道相保禦止其惡故曰禦寇集說楊氏簡曰夫征不復上九不應離羣醜也婦孕不育九三失其所以爲婦也三不中有失道之象故凶非正者足以害我故曰寇慮三之失道或親於寇而不能禦也故敎之禦寇則我不失於正順而夫婦可以相保矣熊氏良輔曰順相保順愼通用只是謹愼以相保守也案楊氏之說爻義文意兩得之矣君子之仕也上雖不交而已必盡其道故周公曰恩斯勤斯育子之閔斯不可以不遇而遂棄其殷勤也王仲淹曰美哉公旦之爲周也必使我君臣相安而禍亂不作其順相保之謂乎或得其桷順以巽也程傳桷者平安之處求安之道唯順與巽若其義順正其處卑巽何處而不安如四之順正而巽乃得桷也終莫之勝吉得所願也程傳君臣以中正相交其道當行雖有閒其閒者終豈能勝哉徐必得其所願乃漸之吉也其羽可用爲儀吉不可亂也本義漸進愈高而不爲无用其志卓然豈可得而亂哉程傳君子之進自下而上由微而著跬歩造次莫不有序不失其序則无所不得其吉故九雖窮高而不失其吉可用爲儀法者以其有序而不可亂也集說胡氏炳文曰二居有用之位有益於人之國家而非素飽者上在無用之地亦足爲人之儀表而非無用者二志不在温飽上志卓然不可亂士大夫之出處於此當有取焉張氏振淵曰志慮高潔而功名富貴不足以累其心故其志可則使志可得而亂又安可用爲儀哉澤上有雷歸妹君子以永終知敝本義雷動澤隨歸妹之象君子觀其合之不正知其終之有敝也推之事物莫不皆然程傳雷震於上澤隨而動陽動於上陰說而從女從男之象也故爲歸妹君子觀男女配合生息相續之象而以永其終知有敝也永終謂生息嗣續永久其傳也知敝謂知物有敝壞而爲相繼之道也女歸則有生息故有永終之義又夫婦之道當常永有終必知其有敝壞之理而戒愼之敝壞謂離隙歸妹說以動者也異乎恆之巽而動漸之止而巽也少女之說情之感動動則失正非夫婦正而可常之道久必敝壞知其必敝則當思永其終也天下之反目者皆不能永終者也不獨夫婦之道天下之事莫不有終有敝莫不有可繼可久之道觀歸妹則當思永終之戒也集說崔氏憬曰歸妹人之始終也始則征凶終則无攸利故君子以永終知敝爲戒者也吳氏曰愼曰永終知敝言逺慮其終而知有敝也氓之詩不思其反所以終見棄於人與案澤上有雷不當以澤從雷取象當以澤感雷取象蓋取於陰氣先動爲歸妹之義歸妹以娣以恆也跛能履吉相承也本義恆謂有常久之德程傳歸妹之義以說而動非夫婦能常之道九乃剛陽有賢貞之德雖娣之微乃能以常者也雖在下不能有所爲如跛者之能履然征而吉者以其能相承助也能助其君娣之吉也集說鄭氏汝諧曰初少女且微而在下以娣媵而歸乃其常也娣媵不能成內助之功雖有其德如跛者之履耳跛者之履雖不足以有行然亦可以行者以其佐小君能相承助也如是而征則爲安分故吉俞氏琰曰相承者佐其嫡以相與奉承其夫也案言以恆者女而自歸非常惟娣則從嫡而歸乃其常也利幽人之貞未變常也程傳守其幽貞未失夫婦常正之道也世人以媟狎爲常故以貞靜爲變常不知乃常久之道也集說俞氏琰曰屯六二曰反常謂字乃女子之常不字則非常至十年之後而乃字則返其常也此曰未變常謂嫁者女子之常九二不願嫁似乎變常然能以幽靜自守是亦女德之常未爲變常也來氏知德曰一與之齊終身不改此婦道之常也守幽人之貞則未變其常矣歸妹以須未當也程傳未當者其處其德其求歸之道皆不當故无取之者所以須也集說朱氏震曰六三居不當位德不正也柔而上剛行不順也爲說之主以說而歸動非禮也上無應無受之者也如是而賤矣故曰未當也未當故無取之者反歸以娣也愆期之志有待而行也程傳所以愆期者由已而不由彼賢女人所願取所以愆期乃其志欲有所待待得佳配而後行也集說孔氏穎達曰嫁宜及時今乃過期而遲歸者此嫁者之志欲有所待而後乃行也俞氏琰曰爻辭言愆期而爻傳直述其志以見愆期在我而不苟從人蓋有待而行非爲人所棄也行謂出嫁詩泉水云女子有行是也帝乙歸妹不如其娣之袂良也其位在中以貴行也本義以其有中德之貴而行故不尚飭程傳以帝乙歸妹之道言其袂不如其娣之袂良尚禮而不尚飾也五以柔中在尊高之位以尊貴而行中道也柔順降屈尚禮而不尚飾乃中道也集說王氏申子曰上二句舉爻辭下二句釋之也言五居尊位而用中故能以至貴而行其勤儉謙遜之道也上六无實承虛筐也程傳筐无實是空筐也空筐可以祭乎言不可以奉祭祀也女不可以承祭祀則離絶而已是女歸之无終者也集說王氏宗傳曰專取虛筐无實爲言者上六女子也雷電皆至豐君子以折獄致刑本義取其威照並行之象程傳雷電皆至明震並行也二體相合故云皆至明動相資成豐之象離明也照察之象震動也威斷之象折獄者必照其情實唯明克允致刑者以威於姦惡唯斷乃成故君子觀雷電明動之象以折獄致刑也噬嗑言先王飭法豐言君子折獄以明在上而麗於威震王者之事故爲制刑立法以明在下而麗於威震君子之用故爲折獄致刑旅明在上而云君子者旅取愼用刑與不留獄君子皆當然也集說孔氏穎達曰斷決獄訟須得虛實之情致用刑罰必得輕重之中若動而不明則滛濫斯及故君子象於此卦而折獄致刑蘇氏軾曰傳曰爲刑罰威獄以類天之震曜故易至於雷電相遇則必及刑獄取其明以動也至於離與艮相遇曰无折獄无留獄取其明以止也朱氏震曰電明照也所以折獄雷威怒也所以致刑朱子語類問雷電噬嗑與雷電豐亦同曰噬嗑明在上是明得事理先立這法在此未有犯威人留待異時之用故云明罰飭法豐威在上明在下是用這法時須是明見下情曲折方得不然威動於上必有過錯也故云折獄致刑雖旬无咎過旬災也本義戒占者不可求勝其配亦爻辭外意程傳聖人因時而處宜隨事而順理夫勢均則不相下者常理也然有雖敵而相資者則相求也初四是也所以雖旬而无咎也與人同而力均者在乎降已以相求協力以從事若懷先已之私有加上之意則患當至矣故曰過旬災也均而先已是過旬也一求勝則不能同矣集說劉氏牧曰旬數之極也猶日之中也言无咎者謂初未至中猶可進也若進而過中則災故象稱過旬災也爻辭不言豐者謂初未至豐也胡氏瑗曰言雖居豐盈之時可以无咎若過於盈滿則必有傾覆之災也俞氏琰曰爻辭云雖旬无咎爻傳云過旬災則戒其不可過也蓋與彖傳天地日月說同案過旬災卽日中則昃月盈則食之意也經意謂同德相濟雖當盈滿之時可以无咎況初居豐之始未及日中乎傳意則謂正宜及今而圗之耳稍過於中便將有災矣其義相備也有孚發若信以發志也程傳有孚發若謂以已之孚信感發上之心志也苟能發則其吉可知雖柔暗有可發之道也集說趙氏汝楳曰疾得於境之疑孚發於志之信王氏申子曰二虛中故有孚五亦虛中故可發言以誠相感也豐其沛不可大事也折其右肱終不可用也程傳三應於上上應而无位陰柔无勢力而處旣終其可共濟大事乎旣无所賴如右肱之折終不可用矣集說潘氏士藻曰六二雖當豐蔀之時然五得位得中猶可以大事故六二發若之孚可施也九三所應上六无可發之明矣不可用而不用保身之哲也豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也程傳位不當謂以不中正居高位所以闇而不能致豐日中見斗幽不明也謂幽暗不能光明君陰柔而臣不中正故也遇其夷主吉行也陽剛相遇吉之行也下就於初故云行下求則爲吉也集說項氏安世曰六二指六五爲蔀爲斗故往則入於闇而得疑九四之蔀與斗皆自指也故行則遇明而得吉吳氏澄曰豐蔀見斗六二爻辭已備象傳不釋而獨九四致其詳者蓋二象由九四而成四爲蔀故二見斗二爻之象同而所重在四也六五之吉有慶也程傳其所謂吉者可以有慶福及於天下也人君雖柔暗若能用賢才則可以爲天下之福唯患不能耳集說何氏楷曰人君以天下常豐爲慶慶以天下故吉言慶則譽在其中矣豐其屋天際翔也闚其戸闃其无人自藏也本義藏謂障蔽程傳六處豐大之極在上而自高若飛翔於天際謂其高大之甚闚其户而无人者雖居豐大之極而實无位之地人以其昏暗自高大故皆棄絶之自藏避而弗與親也集說石氏介曰始顯大終自藏皆聖人戒其過盛子雲曰炎炎者滅隆隆者絶觀雷觀火爲盈爲實天收其聲地藏其熱高明之家鬼瞰其室正合此義張子曰豐屋蔀家自蔽之甚窮大而失居者也處上之極不交於下而居動之末故曰天際翔也朱子語類云豐其屋天際翔也似說如翬斯飛様言其屋高大到於天際却只是自蔽障得濶山上有火旅君子以明愼用刑而不留獄本義愼刑如山不留如火程傳火之在高明无不照君子觀明照之象則以明愼用刑明不可恃故戒於愼明而止亦愼象觀火行不處之象則不留獄獄者不得已而設民有罪而入豈可留滯淹久也集說孔氏穎達曰火在山上逐草而行勢不乆留故爲旅象又上下二體艮止離明故君子象此以明察審愼用刑而不稽留獄訟項氏安世曰山非火之所留也野燒延緣過之而已故名之曰旅而象之以不留獄趙氏汝楳曰火煬則宅於竈冶則宅於爐在山則野燒之暫猶旅寓耳故爲旅之象離虛爲明艮止爲謹君子體之明謹於用刑而不留獄蓋獄者人之所旅也不留獄不使久處其中也用刑固貴於明然明者未必謹謹者或留獄明矣謹矣而淹延不決雖明猶闇也雖謹反害也張氏淸子曰明則無遁情愼則無濫罰明愼旣盡斷決隨之聖人取象於旅正恐其留獄也旅瑣瑣志窮災也程傳志意窮廹益自取災也災眚對言則有分獨言則謂災患耳集說谷氏家杰曰爻賤其行象鄙其志楊氏啟新曰窮不是困窮局促猥陋之義得童僕貞終无尤也程傳羈旅之人所賴者童僕也旣得童僕之忠貞終无尤悔矣集說王氏弼曰旣得童僕然後卽次懷資皆无所失故終无尤旅焚其次亦以傷矣以旅與下其義喪也本義以旅之時而與下之道如此義當喪也程傳旅焚失其次舍亦以困傷矣以旅之時而與下之道如此義當喪也在旅而以過剛自高待下必喪其忠貞謂失其心也在旅而失其童僕之心爲可危也集說郭氏雍曰九三剛而不中故不能安旅失其所安亦可傷矣以剛暴之才而以旅道居童僕宜其失衆心而喪也夫旅豈與人之道哉君子自厚而已故終無以旅與下之事王氏宗傳曰旣已有焚其次之傷矣而又喪其童僕焉此暴厲之過也夫旅親寡之時也朝夕之所與者童僕而已爾豈可以旅視之也九三以旅視乎下則彼童僕也亦必以旅視乎上矣其能久留乎故曰其義喪也黄氏淳耀曰下卽童僕以旅與下者謂視童僕如旅人也焚次而失其身所依庇亦已傷而不安矣況又喪其童僕乎然非童僕之無良也當旅時而與下之道刻薄寡㤙直若旅人然宜不得其心力義當喪也將誰咎哉旅于處未得位也得其資斧心未快也程傳四以近君爲當位在旅五不取君義故四爲未得位也曰然則以九居四不正爲有咎矣曰以剛居柔旅之宜也九以剛明之才欲得時而行其志故雖得資斧於旅爲善其心志未快也集說黄氏淳耀曰資斧防患之物得其資斧不過有以自防故曰心未快也終以譽命上逮也本義上逮言其譽命聞於上也程傳有文明柔順之德則上下與之逮與也能順承於上而上與之爲上所逮也在上而得乎下爲下所上逮也在旅而上下與之所以致譽命也旅者困而未得所安之時也終以譽命終當致譽命也己譽命則非旅也困而親寡則爲旅不必在外也集說胡氏瑗曰六五所謂柔得中乎外而順乎剛者也柔順中正之德爲上九所信尊顯之命及之也案六五有位而上九無位不必以六五爲上九所尊顯也蓋居高位便是上逮爾此爻雖不以君位言而亦主於大夫士之載䞇而獲乎名位者故曰上逮言其地望已高也以旅在上其義焚也喪牛于易終莫之聞也程傳以旅在上而以尊高自處豈能保其居其義當有焚巢之事方以極剛自高爲得志而笑不知喪其順德於躁易是終莫之聞謂終不自聞知也使自覺知則不至於極而號咷矣陽剛不中而處極固有高亢躁動之象而火復炎上則又甚焉集說張子曰以陽極上旅而驕肆者也失柔順之正故曰喪牛于易怒而忤物雖有凶危其誰告之故曰終莫之聞也案九三以旅與下郭氏王氏黃氏之說美矣惟以旅在上則未有說蓋以旅之道在上則視所居之位如寄寓然其無敬愼之心可知故曰其義焚也隨風巽君子以申命行事本義隨相繼之義程傳兩風相重隨風也隨相繼之義君子觀重巽相繼以順之象而以申命令行政事隨與重上下皆順也上順下而出之下順上而從之上下皆順重巽之義也命令政事順理則合民心而民順從矣集說荀氏爽曰巽爲號令兩巽相隨故申命也法敎百端令行爲上故曰行事也胡氏瑗曰巽之體上下皆巽如風之入物無所不至無所不順故曰隨風巽君子法此巽風之象以申其命行其事於天下無有不至而無有不順者也郭氏雍曰君子之德風也有風之德而下無不從然後具重巽之義易於巽主敎命猶詩之言風也故觀則省方觀民設敎姤則施命誥四方皆主巽而言也邱氏富國曰申命者所以致其戒於行事之先行事者所以踐其言於申命之後俞氏琰曰旣告戒之又丁寧之使人聽信其說然後見之行事則民之從之也亦如風之迅速也大抵命令之出務在必行不行則徒爲虛文耳進退志疑也利武人之貞志治也程傳進退不知所安者其志疑懼也利用武人之剛貞以立其志則其志治也治謂脩立也集說趙氏汝楳曰治與疑對志疑而不決故進退靡定志治而不亂故決於行黄氏淳耀曰兩可不決之謂疑一定不亂之謂治紛若之吉得中也程傳二以居柔在下爲過巽之象而能使通其誠意者衆多紛然由得中也陽居中爲中實之象中旣誠實則人自當信之以誠意則非諂畏也所以吉而无咎集說郭氏雍曰二有剛中之德能行巽之道是其所以无咎也何氏楷曰申命行事紛若而得中也頻巽之吝志窮也程傳三之才質本非能巽而上臨之以巽承重剛而履剛勢不得行其志故頻失而頻巽是其志窮困可吝之甚也集說蘇氏濬曰九三之頻巽非勉爲之而失習爲之而過也巽而頻焉則振作之氣不足其志亦窮而無所復之矣張氏振淵曰志疑者可以治救之志窮則有吝而已田獲三品有功也程傳巽於上下如田之獲三品而遍及上下成巽之功也集說孔氏穎達曰有功者田獵有獲以喻行命有功也九五之吉位正中也程傳九五之吉以處正中也得正中之道則吉而其悔亡也正中謂不過无不及正得其中也處柔巽與出命令唯得中爲善失中則悔也集說邱氏富國曰以九居五位乎中正此所以貞吉而爲申命之主也巽在牀下上窮也喪其資斧正乎凶也本義正乎凶言必凶程傳巽在牀下過於巽也處卦之上巽至於窮極也居上而過極於巽至於自失得爲正乎乃凶道也巽本善行故疑之曰得爲正乎復斷之曰乃凶也集說楊氏啓新曰巽在牀下居巽之極也天下事惟斷乃成今焉喪其資斧是失所以斷矣無斷則敗可必其凶也麗澤兌君子以朋友講習本義兩澤相麗互相滋益朋友講習其象如此程傳麗澤二澤相附麗也兩澤相麗交相浸潤互有滋益之象故君子觀其象而以朋友講習朋友講習互相益也先儒謂天下之可說莫若朋友講習朋友講習固可說之大者然當明相益之象集說虞氏翻曰學以聚之問以辨之兌兩口對故朋友講習也孔氏穎達曰同門曰朋同志曰友朋友聚居講習道義相說之盛莫過於此也程子曰天下之說不可極惟朋友講習雖過說無害兌澤有相滋益處蘇氏軾曰取其樂而不流者也朱氏震曰講其所知習其所行蔡氏淵曰講兌象習重兌象俞氏琰曰講者講其所未明講多則義理明矣習者習其所未熟習久則踐履熟矣此朋友講習所以爲有滋益而如兩澤之相麗也若獨學無友則孤陋而寡聞故論語以學之不講爲憂以學而時習爲說以有朋自遠方來爲樂和兌之吉行未疑也本義居卦之初其說也正未有所疑也程傳有求而和則涉於邪諂初隨時順處心无所係无所爲也以和而已是以吉也象又以其處說在下而非中正故云行未疑也其行末有可疑謂未見其有失也若得中正則无是言也說以中正爲本爻直陳其義象則推而盡之集說蔡氏淵曰初未牽於陰所行未有疑惑若四比三有商兌之疑矣徐氏幾曰疑謂係於陰也卦四陽惟初與陰無係故未疑鄭氏維嶽曰以陽剛居兌初又不與陰比故信心信理而出行之於外者未與心疑使有繫應便不能自決矣孚兌之吉信志也程傳心之所存爲志二剛實居中孚信存於中也志存誠信豈至說小人而自失乎是以吉也集說何氏楷曰初去三遠不特志可信而行亦未涉於可疑二去三近行雖不免於可疑而志則可信來兌之凶位不當也程傳自處不中正无與而妄求說所以凶也集說熊氏良輔曰六三位不當居上下二兌之閒下兌方終上兌又來說而又說不得其正者也上六曰引兌蓋與六三相表裏九四之喜有慶也程傳所謂喜者若守正而君說之則得行其陽剛之道而福慶及物也集說郭氏雍曰當兌之時虞上下之際不妄從說知所擇者也介然自守故能全兌說之喜喜非獨一身而已終亦有及物之慶也孚于剝位正當也本義與履九五同程傳戒孚于剝者以五所處之位正當戒也密比陰柔有相說之道故戒在信之也集說王氏申子曰謂正當尊位若孚上之柔說則消剝於陽必矣上六引兌未光也程傳說旣極矣又引而長之雖說之之心不已而事理已過實无所說事之盛則有光輝旣極而強引之長其无意味甚矣豈有光也未非必之辭象中多用非必能有光輝謂不能光也集說楊氏啓新曰來兌引兌皆小人也在君子則當來而勿受引而勿去也君子以道德相引其道爲光明引而爲說則心術曖昩行事邪僻甚矣豈得爲光乎風行水上渙先王以享于帝立廟本義皆所以合其散程傳風行水上有渙散之象先王觀是象救天下之渙散至於享帝立廟也收合人心无如宗廟祭祀之報出於其心故享帝立廟人心之所歸也係人心合離散之道无大於此集說程子曰萃渙皆享于帝立廟因其精神之聚而形於此爲其渙散故立此以收之吕氏大臨曰風行水上波瀾必作振蕩離散不寧之時王者求以合其散莫若反其本享帝立廟所以明天人之本也初六之吉順也程傳初之所以吉者以其能順從剛中之才也始渙而用拯能順乎時也集說郭氏雍曰初六難之始也方難之始而拯之無不濟矣天下之事辦之於早則順而易舉故傳曰初六之吉順也渙奔其机得願也程傳渙散之時以合爲安二居險中急就於初求安也賴之如机而亡其悔乃得所願也集說王氏宗傳曰當渙之時以陽剛來居二二安靜之位也故有奔其机之象夫惟安靜然後能一天下之動五奠王居於上而二奔其机於下各得所安此所以能合天下之渙也渙其躬志在外也程傳志應於上在外也與上相應故其身得免於渙而无悔悔亡者本有而得亡无悔者本无也集說黄氏淳耀曰外指天下言惟躬之渙所以能濟天下之渙惟志在天下之渙所以有躬之渙也渙其羣元吉光大也程傳稱元吉者謂其功德光大也元吉光大不在五而在四者二爻之義通言也於四言其施用於五言其成功君臣之分也集說來氏知德曰凡樹私黨者皆心之暗昧狹小者也惟無一豪之私則光明正大自能渙其羣矣故曰光大也王居无咎正位也程傳王居謂正位人君之尊位也能如五之爲則居尊位爲稱而无咎也集說熊氏良輔曰天下渙散之時須人君𤼵號施令正位乎上使人心知所歸向而天下一矣故曰王居无咎而象曰正位也此與萃有位之義同本義以渙王居爲渙其居積然當渙散之時必有爲渙之主者所當從小象正位之說渙其血遠害也程傳若如象文爲渙其血乃與屯其膏同也義則不然蓋血字下脫去字血去惕出謂能遠害則无咎也集說項氏安世曰上九爻辭血與出韻叶皆三字成句不以血連去字也小畜之血去惕出與此不同此血已散不假更去又惕與逖文義自殊據小象言遠害也則逖義甚明不容作惕矣卦中惟上九一爻去險最遠故其辭如此又曰散其汗以去滯鬰散其血以遠傷害陳氏友文曰坎爲血卦逖遠也小象遠害正是以遠釋逖字上雖與三應然超處渙上故渙散其血捨之遠去去坎險之害而得无咎也澤上有水節君子以制數度議德行程傳澤之容水有限過則盈溢是有節故爲節也君子觀節之象以制立數度凡物之大小輕重高下文質皆有數度所以爲節也數多寡度法制議德行者存諸中爲德發於外爲行人之德行當議則中節議謂商度求中節也集說侯氏行果曰澤上有水以隄防爲節張氏浚曰數度之制因乎人德行之議自於已記曰君子議道自已而置法以民蓋已之所不能行與其所不可行而強於人誰其從之一言盡節之道中而已中必自身始也朱氏震曰澤之容水固有限量虛則納之滿則泄之水以澤爲節也郭氏雍曰澤无水則爲不足澤上有水則爲有餘不足則爲困有餘則當節理之常也在人之節則制數度所以節於外議德行所以節於内也爲國爲家至於一身其内外制節皆一也附録孔氏穎逹曰數度謂尊卑禮命之多少德行謂人才堪任之優劣君子象節以制其禮數等差皆使有度議人之德行任用皆使得宜案議德行諸儒皆謂一身之德行獨孔氏謂在人之德行於議字尤切且得愛爵祿愼名器之意不出戶庭知通塞也程傳爻辭於節之初戒之謹守故云不出户庭則无咎也象恐人之泥於言也故復明之云雖當謹守不出户庭又必知時之通塞也通則行塞則止義當出則出矣尾生之信水至不去不知通塞也故君子貞而不諒繫辭所解獨以言者在人所節唯言與行節於言則行可知言當在先也集說王氏申子曰時有通塞通則行塞則止當止卽止其知通塞之君子乎繫辭專以愼密言語說之兌體故也吳氏曰愼曰節兼通塞言猶艮之兼行止言也初九不出户庭知塞也而兼言知通者見其非一於止者也二失時極則但知塞而不知通矣不出門庭凶失時極也程傳不能上從九五剛中正之道成節之功乃係於私暱之陰柔是失時之至極所以凶也失時失其所宜也集說蘇氏軾曰水之始至澤當塞而不當通旣至當通而不當塞故初九以不出户庭爲无咎言當塞也九二以不出門庭爲凶言當通也至是而不通則失時而至於極郭氏雍曰初爲不當有事之地而二以剛中居有爲之位其道不可同也故初以不出户庭爲知塞而二以不出門庭爲不知通知塞故无咎不知通則有失時之凶矣不節之嗟又誰咎也本義此无咎與諸爻異言无所歸咎也程傳節則可以免過而不能自節以致可嗟將誰咎乎集說沈氏一貫曰王介甫程沙隨謂能嗟怨自治亦无咎嗟與戚嗟若之嗟同又誰咎與出門同人之象同何氏楷曰諸卦爻辭言无咎者九十有九多補過之辭解三爻傳又誰咎語雖與此同然爻辭未嘗有无咎字安節之亨承上道也程傳四能安節之義非一象獨舉其重者上承九五剛中正之道以爲節足以亨矣餘善亦不出於中正也集說錢氏一本曰中正之通在五四以近承不以徒止爲功更以通行爲道故曰承上道也案節曰亨爲九五中正以通也而亨於四言之者五者水之源也四者水之流也水之通在流承上之源而布之者也甘節之吉居位中也程傳旣居尊位又得中道所以吉而有功節以中爲貴得中則正矣正不能盡中也集說俞氏琰曰節貴乎中當節而不節則六三有不節之嗟過於節則上六有苦節之凶惟九五甘節而吉者蓋居位之中當位以節無過無不及也苦節貞凶其道窮也程傳節旣苦而貞固守之則凶蓋節之道至於窮極矣集說吳氏曰愼曰爻言苦節貞凶彖言苦節不可貞惟其貞凶是以不可貞也故彖象傳皆以其道窮也釋之澤上有風中孚君子以議獄緩死本義風感水受中孚之象議獄緩死中孚之意程傳澤上有風感於澤中水體虛故風能入之人心虛故物能感之風之動乎澤猶物之感於中故爲中孚之象君子觀其象以議獄與緩死君子之於議獄盡其忠而已於決死極於惻而已故誠意常求於緩緩寛也於天下之事无所不盡其忠而議獄緩死最其大者也集說楊氏萬里曰風無形而能鼔幽濳誠無象而能感人物中孚之感莫大於好生不殺議獄者求其入中之出緩死者求其死中之生也項氏安世曰獄之將決則議之其旣決則又緩之然後盡於人心王聽之司寇聽之三公聽之議獄也旬而職聽二旬而職聽三月而上之緩死也故獄成而孚輸而孚在我者盡故在人者無憾也徐氏幾曰象言刑獄五卦噬嗑豐以其有離之明震之威也賁次噬嗑旅次豐離明不易震皆反爲艮矣蓋明貴無時不然威則有時當止至於中孚則全體似離互體有震艮而又兌以議之巽以緩之聖人卽象垂敎其忠厚惻怛之意見於謹刑如此案風之入物也不獨平地草木爲之披拂巖谷竅穴爲之吹吁卽積水重陰之下亦因之而凍解氷釋焉此所以爲至誠無所不入之象也民之有獄猶地之有重陰也王者體察天下之情隱至於議獄緩死然後其至誠無所不入矣初九虞吉志未變也程傳當信之始志未有所存而虞度所信則得其正是以吉也蓋其志未有變動志有所從則是變動虞之不得其正矣在初言求所信之道也案志未變言其實心不失也志變則有他矣其子和之中心願也程傳中心願謂誠意所願也故通而相應集說朱氏震曰荀子所謂同焉者合類焉者應也程氏敬承曰鶴之鳴由中而發子之和亦根心而應故曰中心願願出於中乃孚之至也或鼓或罷位不當也程傳居不當位故无所主唯所信是從所處得正則所信有方矣集說俞氏琰曰六三居不當位心無所主故或鼔或罷而不定若初九則不如是也馬匹亡絶類上也程傳絶其類而上從五也類謂應也集說胡氏炳文曰坤以喪朋爲有慶中孚之四以絶類爲无咎趙氏玉泉曰馬匹亡者四有柔正之德故能絶初之黨類而上以信於五也案三與四皆卦所謂中虛者也其居内以成中虛之象同其得應而有匹敵者亦同然三心繫於敵而四志絶乎匹者三不正而四正也又六四承九五者多吉六三應上九者多凶易例如此有孚攣如位正當也程傳五居君位之尊由中正之道能使天下信之如拘攣之固乃稱其位人君之道當如是也集說孔氏穎逹曰以其正當尊位故戒以繫信乃得无咎翰音登于天何可長也程傳守孚至於窮極而不知變豈可長久也固守而不通如是則凶也集說孔氏穎達曰虛聲無實何可久長侯氏行果曰窮上失位信不由中有聲無實虛華外揚是翰音登天也虛音登天何可久也胡氏瑗曰上九徒以虛聲外飾無純誠篤實之行以此而往愈久愈凶故聖人戒之曰何可長如此蓋欲人改過反誠以信實爲本也項氏安世曰上九巽極而躁不正不中內不足而求孚於外聲聞過情其涸也可立而待愈久愈凶何可長也山上有雷小過君子以行過乎恭喪過乎哀用過乎儉本義山上有雷其聲小過三者之過皆小者之過可過於小而不可過於大可以小過而不可甚過彖所謂可小事而宜下者也程傳雷震於山上其聲過常故爲小過天下之事有時當過而不可過甚故爲小過君子觀小過之象事之宜過者則勉之行過乎恭喪過乎哀用過乎儉是也當過而過乃其宜也不當過而過則過矣集說孔氏穎達曰小人過差失在慢易奢侈故君子矯之以行過乎恭喪過乎哀用過乎儉也張子曰過恭哀儉皆宜下之義鼂氏說之曰時有舉趾高之莫敖故正考父矯之以循牆時有短喪之宰予故高柴矯之以泣血時有三歸反坫之管仲故晏子矯之以敝裘雖非中行亦足以矯時厲俗趙氏彦肅曰恭哀儉多不及過之而後中楊氏啟新曰過恭過哀過儉此豈不爲高世絶俗之行而過乎人但其所過者以收歛卑下爲過故但可言小過而不可言大過也案雷出地則聲方發達而大及至山上則聲漸收歛而微故有平地風雷大作而高山之上不覺者此小過之義也飛鳥以凶不可如何也程傳其過之疾如飛鳥之迅豈容救止也凶其宜矣不可如何无所用其力也集說何氏楷曰以凶者自納於凶也孼由己作可如何哉不及其君臣不可過也本義所以不及君而還遇臣者以臣不可過故也程傳過之時事无不過其常故於上進則戒及其君臣不可過臣之分也集說胡氏炳文曰小者有時而可過臣之於君不可過也從或戕之凶如何也程傳陰過之時必害於陽小人道盛必害君子當過爲之防防之不至則爲其所戕矣故曰凶如何也言其甚也弗過遇之位不當也往厲必戒終不可長也本義爻義未明此亦當闕程傳位不當謂處柔九四當過之時不過剛而反居柔乃得其宜故曰遇之遇其宜也以九居四位不當也居柔乃遇其宜也當陰過之時陽退縮自保足矣終豈能長而盛也故往則有危必當戒也長上聲作平聲則大失易意以夬與剝觀之可見與夬之象文同而音異也集說錢氏一本曰三四皆失位故特明其位不當三防四遇亦皆宜下三從或戕四往必戒亦皆不宜上案位不當卽所謂剛失位而不中者惟剛失位而不中故戒以當過遇之不然則有危矣豈可長執此而不知變乎密雲不雨已上也本義已上太高也程傳陽降陰升合則和而成雨陰已在上雲雖密豈能成雨乎陰過不能成大之義也集說龔氏煥曰密雲不雨小畜謂其尚往者陰不足以畜陽而陽尚往也小過謂其已上者陰過乎陽而陰已上也一爲陽之過一爲陰之過皆陰陽不和之象所以不能爲雨也案兩卦密雲不雨龔氏謂皆陰陽不和之象是已然小畜所謂尚往者亦是隂氣上行與此爻已上同非兩義也但小畜卦義喻在下者則尚往者當積厚而自雨此爻之義喻在上者則已上者當下交而乃雨意義不同爾弗遇過之已亢也程傳居過之終弗遇於理而過之過已亢極其凶宜也集說孔氏穎達曰釋所以弗遇過之以其已在亢極之地故也趙氏汝楳曰已上未爲極已亢則極矣俞氏琰曰六五曰已上謂其已過也上六又過甚故曰已亢水在火上旣濟君子以思患而豫防之程傳水火旣交各得其用爲旣濟時當旣濟唯慮患害之生故思而豫防使不至於患也自古天下旣濟而致禍亂者蓋不能思患而豫防也集說王氏申子曰旣濟雖非有患之時患每生於旣濟之後君子思此而豫防之則可以保其初吉而無終亂之憂矣龔氏煥曰水上火下雖相爲用然水決則火滅火炎則水涸相交之中相害之機伏焉故君子思患而豫防之能防在乎豫能豫在乎思曳其輪義无咎也程傳旣濟之初而能止其進則不至於極其義自无咎也集說徐氏在漢曰初當方濟之始而曳其濟險之輪控制在我則義無不濟此所以濡其尾而无咎象故歸重於曳其輪也七日得以中道也程傳中正之道雖不爲時所用然无終不行之理故喪茀七日當復得謂自守其中異時必行也不失其中則正矣集說何氏楷曰二居下卦之中以中感中得其正應故終必相孚也三年克之憊也程傳言憊以見其事之至難在高宗爲之則可无高宗之心則貪忿以殃民也案言憊以見成功之非易如人之疾病而以毒藥攻去之者其元氣亦秏傷矣苟無休養之方以復元氣則又大病之根也終日戒有所疑也程傳終日戒懼常疑患之將至也處旣濟之時當畏愼如是也集說李氏簡曰終日戒謂備患之心無時可忘也東鄰殺牛不如西鄰之時也實受其福吉大來也程傳五之才德非不善不如二之時也二在下有進之時故中正而孚則其吉大來所謂受福也吉大來者在旣濟之時爲大來也亨小初吉是也集說朱氏震曰盛不如薄者時也五旣濟無所進盈則當虛故曰不如西鄰之禴祭理無極而不反者旣濟極矣五以中正守之能未至於反而已王氏申子曰言人君處旣濟如未濟而後有受福之實不然雖極其豐盛而濟道衰矣張氏淸子曰旣濟之後唯恐過盛以祭言之於斯時也豐不如約故東鄰不如西鄰牛不如禴蓋祭而得其時雖禴之薄實足以受其福而吉之大來可知矣濡其首厲何可久也程傳旣濟之窮危至於濡首其能長久乎集說胡氏瑗曰旣濟之終反於未濟至於濡沒其首故當翻然而警惕然而改何可久如此乎案厲未至於凶特可危爾知其危而反之則不至於濡首矣凡易言何可長何可久者自屯上至此爻皆惕以改悟而不可迷溺之意火在水上未濟君子以愼辨物居方本義水火異物各居其所故君子觀象而審辨之程傳水火不交不相濟爲用故爲未濟火在水上非其處也君子觀其處不當之象以愼處於事物辨其所當各居其方謂止於其所也集說朱氏震曰火上水下各居其所未濟也君子觀此愼辨萬物有辨然後有交有未濟乃有旣濟而末濟含既濟之象何氏楷曰愼辨物者物以羣分也愼居方者方以類聚也濡其尾亦不知極也本義極字未詳考上下韻亦不叶或恐是敬字今且闕之程傳不度其才力而進至於濡尾是不知之極也集說張氏振淵曰事必敬始而後可善其用於終初所以致尾之濡不是時不可爲心不知敬愼故耳九二貞吉中以行正也本義九居二本非正以中故得正也程傳九二得正而吉者以曳輪而得中道乃正也案程子言正未必中中無不正故凡九二六五皆非正也而多言貞吉者以其中也惟此象傳釋義最明未濟征凶位不當也程傳三征則凶者以位不當也謂陰柔不中正无濟險之才也若能涉險以從應則利矣集說吳氏澄曰未濟諸爻皆位不當而獨於六三言之以未濟由六三故也俞氏琰曰六爻皆位不當而獨於六三曰位不當以六三才弱而處下體之上也貞吉悔亡志行也程傳如四之才與時合而加以貞固則能行其志吉而悔亡鬼方之伐貞之至也集說俞氏琰曰爻以六三爲未濟則九四其濟矣是以其志行也君子之光其暉吉也本義暉者光之散也程傳光盛則有暉暉光之散也君子積充而光盛至於有暉善之至也故重云吉集說張氏振淵曰光而言暉昭其盛也貞吉之吉吉在五暉吉之吉吉在天下飲酒濡首亦不知節也程傳飲酒至於濡首不知節之甚也所以至如是不能安義命也能安則不失其常矣集說孔氏穎達曰釋飲酒所以致濡首之難以其不知止節故也案旣濟之上彖所謂終亂未濟之上則彖所謂汔濟者也緣尾之象在初故此不用濡尾之義但戒以不可濡首而失其節則猶之不續終之意也御纂周易折中卷十二

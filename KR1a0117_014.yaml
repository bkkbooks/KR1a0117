body:
  text: 欽定四庫全書御纂周易折中卷九彖上傳本義彖即文王所繫之辭上者經之上篇傳者孔子所以釋經之辭也後凡言傳者放此案彖傳者孔子所以釋文王之意先釋名後釋辭其釋名則雜取諸卦象卦德卦體有兼取者有但取其一二者要皆以傳中首一句之義為重如屯則剛柔始交而難生蒙則山下有險皆第一義也釋辭之體尤為不一有直據卦名而論其理者有雜取卦象卦德卦體者蓋辭生於名就文王本文觀之則據卦名而論其理者正也然名既根於卦則辭亦不離乎卦雜而取之一則所以盡名中之縕以見辭義之有所從來一則以為二體六爻吉凶之斷例而見辭義之無所不包也惟乾坤坎離震艮巽兌八卦不釋名者八卦之名文王無改於伏羲之舊而其德其象相傳已久不待釋也惟坎加習字有取於重卦之義故特釋之其釋辭則亦雜取德象與其爻位如釋乾元亨利貞之辭則以天言之者其卦象也以九五言之者其爻位也釋坤辭以地釋坎辭以水釋震辭以雷則皆卦象也釋坎以剛中釋離以柔中釋艮曰上下敵應不相與也釋巽曰剛巽柔順釋兌曰剛中柔外則皆爻位也先明乾卦則諸卦可通矣大哉乾元萬物資始乃統天本義此專以天道明乾義又析元亨利貞為四德以發明之而此一節首釋元義也大哉歎辭元大也始也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之始終故曰統天集説九家易曰乾者純陽天之象也觀乾之始以知天德惟天為大故曰大哉元者氣之始也朱子語類云乾元只是天之性不是兩箇物事又云元者用之端而亨利貞之理具焉至於為亨為利為貞則亦元之為耳此元之所以包四德也若分而言之則元亨誠之通利貞誠之復其體用固有在矣以用言則元為主以體言則貞為主又云元者天地生物之端倪也元者生意在亨則生意之長在利則生意之遂在貞則生意之成若言仁便是這意思仁本生意生意則惻隱之心也苟傷著這生意則惻隱之心便發若羞惡也是仁去那義上發若辭讓也是仁去那禮上發若是非也是仁去那智上發若不仁之人安得更有義禮智蔡氏清曰天地間凡大者皆為始始者便自大有生之初自然之理是如此有生之後當然之序亦如此彖辭元字只訓大者以本文原無始字義也此以有萬物資始句故兼言之抑乾元之大亦於萬物資始處見也雲行雨施品物流形本義此釋乾之亨也集説楊氏萬里曰彖言元利貞而獨不言亨者蓋雲行雨施即氣之亨也品物流形即形之亨也俞氏琰曰前言萬物此言品物萬與品同與異與元為稟氣之始未可區别故總謂之萬亨則流動形見而洪纎髙下各有區别故特謂之品大明終始六位時成時乘六龍以御天本義始即元也終謂貞也不終則無始不貞則無以為元也此言聖人大明乾道之終始則見卦之六位各以時成而乘此六陽以行天道是乃聖人之元亨也集説朱子語類云乾道終始即四德也始則元終則貞蓋不終則無以為始不貞則無以為元六爻之立由此而立耳以時成者言各以其時而成如潛見飛躍皆以時耳然皆四德之流行也又云六龍只是六爻龍只是譬喻明此六爻之義潛見飛躍以時而動便是乘六龍便是御天聖人便是天天便是聖人蔡氏清曰謂之乘者因龍字生也御者如御車之御乾道變化各正性命保合大和乃利貞本義變者化之漸化者變之成物所受為性天所賦為命大和隂陽會合沖和之氣也各正者得於有生之初保合者全於已生之後此言乾道變化無所不利而萬物各得其性命以自全以釋利貞之義也集説朱子語類云各正性命他那元亨時雖正了然未成形質到這裏方成如百穀堅實了方喚作正性命又云乾道變化各正性命總只是一箇理此理處處相渾淪如一粒粟生為苗苗便生花花便結實又成粟還復本形一穗有百粒每粒箇箇完全又將這百粒去種又各成百粒生生只管不已初間只是這一粒分去物物各有理總只是一箇理又云保合大和即是保合此生理也天地氤氳乃天地保合此生物之理造化不息及其萬物化生之後則萬物各自保合其生理不保合則無物矣又云保合大和天地萬物皆然天地便是大底萬物萬物便是小底天地又云仁為四德之首而智則能成始而成終猶元為四德之長然元不生於元而生於貞蓋天地之化不翕聚則不能發散也仁智交際之間乃萬化之機軸此理循環不窮吻合無間不貞則無以為元也項氏安世曰推其本統言之則曰乾元極其變化言之則曰乾道始乎乾元終乎大和萬物出於元入於元此元之所以為大也胡氏炳文曰以二氣之分言則變者萬物之出機元亨是也化者萬物之入機利貞是也以一氣之運言則變者其漸化者其成先言品物流形後言各正性命物有此形即有此性皆天所命也謂之各正則命之稟也乃性之所以一定而不易謂之保合則性之存也又命之所以流行而不已蓋大和者隂陽會合沖和之氣而乾元資始之理固在其中矣薛氏瑄曰大哉乾元萬物資始誠之源也道之體也萬殊之所以一本也乾道變化各正性命誠斯立焉道之用也一本之所以萬殊也然凡言體用不可分而為二蔡氏清曰各正保合雖合為乾之利貞然細分之各正者利也保合者貞也文言本義云利者生物之遂物各得宜不相妨害非即此之各正性命乎貞者生物之成實理具備隨在各足非即此之保合大和乎林氏希元曰各正性命是利保合大和是貞向之資始於元流形於亨者今則各效法象各成形質而性命於是乎各正既而愈斂愈固生意凝畜而不滲漏化機內蘊而不外見則大和於是保合矣首出庶物萬國咸寧本義聖人在上髙出於物猶乾道之變化也萬國各得其所而咸寧猶萬物之各正性命而保合大和也此言聖人之利貞也蓋嘗統而論之元者物之始生亨者物之暢茂利則向於實也貞則實之成也實之既成則其根蒂脫落可復種而生矣此四德之所以循環而無端也然而四者之間生氣流行初無間斷此元之所以包四德而統天也其以聖人而言則孔子之意蓋以此卦為聖人得天位行天道而致太平之占也雖其文義有非文王之舊者然讀者各以其意求之則並行而不悖也坤卦放此程傳卦下之辭為彖夫子從而釋之通謂之彖彖者言一卦之義故知者觀其彖辭則思過半矣大哉乾元贊乾元始萬物之道大也四德之元猶五常之仁偏言則一事專言則包四者萬物資始乃統天言元也乾元統言天之道也天道始萬物物資始於天也雲行雨施品物流形言亨也天道運行生育萬物也大明天道之終始則見卦之六位各以時成卦之初終乃天道終始乘此六爻之時乃天運也以御天謂以當天運乾道變化生育萬物洪纎髙下各以其類各正性命也天所賦為命物所受為性保合大和乃利貞保謂常存合謂常和保合大和是以利且貞也天地之道常久而不已者保合大和也天為萬物之祖王為萬邦之宗乾道首出庶物而萬彚亨君道尊臨天位而四海從王者體天之道則萬國咸寧也集説朱子語類云大哉乾元萬物資始至哉坤元萬物資生那元字便是生物之仁資始是得其氣資生是成其形到得亨便是他彰著利便是結聚貞便是收斂收斂既無形迹又須復生至如夜半子時此物雖存猶未動在到寅卯便生巳午便著申酉便結亥子丑便實及至寅又生他這箇只管運轉一歲有一嵗之運一月有一月之運一日有一日之運一時有一時之運雖一息之微亦有四箇段子恁地運轉又曰元亨利貞無斷處貞了又元今日子時前便是昨日亥時物有夏秋冬生底是到這裏方感得生氣他自有箇小小元亨利貞林氏希元曰伏羲所畫乾卦其義所該者廣不止天道文王元亨利貞之繫只是箇占辭原無他意夫子贊易則專以天道來發明乾義又將元亨利貞之辭分為四德以發明乾義以天道明乾義他無所見只在析元亨利貞為四德上見得又曰元亨利貞本旨在卦辭者與諸卦一般至吾夫子分為四德而後世之言天道者因之此夫子所以為道德之宗也又如仁字首見於尚書只作愛人説至夫子始作心德説以此立教仁道始行於世又曰利者生物之遂貞者生物之成遂與成如何分别論語遂事不諌注云遂謂事雖未成而勢不能已也則知遂是方向成之勢而貞則成矣故曰利則向於實也貞則實之成也案乾者健也彖辭但言至健之道大通而宜於正固以為人事之占而已夫子作彖傳乃推卦象卦位以發明之以卦象明之者乾之象莫大於天也以卦位明之者乾之位莫尊於五也以天之元亨言之其以一時統四時之德者莫如元至於澤流萬物則亨也以君之元亨言之九五以一位統六位之德是亦天之元矣澤流萬民是亦天之亨矣其言六位又言六龍者蓋以切飛龍在天之義言四德之終始寓於六爻之中而獨九五備衆爻之德處在天之位如乘駕六龍以御於天路則能行雲施雨與天之雲行雨施同也又以天之利貞言之萬物成遂性命正而大和洽者利貞之候也以君之利貞言之九五一爻為卦之主上下五陽與之同德如大君在上萬民各得其性命之理以休養於大和之化是亦天之利貞矣其言庶物言萬國者又以切利見大人之義以德位之所統言之則曰庶物以功化之所及言之則曰萬國首出則為物所覩至於咸寧而臻乎上治矣乾之為義無所不包夫子舉其大者故以天道君道盡之至哉坤元萬物資生乃順承天本義此以地道明坤之義而首言元也至極也比大義差緩始者氣之始生者形之始順承天施地之道也集説呂氏大臨曰乾之體大矣坤之效乾之法至乾之大而後已故乾元曰大哉坤元曰至哉朱子語類云資乾以始便資坤以生不爭得霎時間萬物資乾以始而有氣資坤以生而有形氣至而生即坤元也蔡氏清曰若徒曰至哉坤元萬物資生則疑於與大哉乾元萬物資始者敵矣今曰乃順承天非惟可以見坤道無成有終之義而乾坤之合德以共成生物之功者亦於此乎見之不然乾有乾四德坤有坤四德而名實混矣坤厚載物德合無疆含𢎞光大品物咸亨本義言亨也德合無疆謂配乾也集説崔氏憬曰含育萬物為𢎞光華萬物為大動植各遂其性故曰品物咸亨也遊氏酢曰其靜也翕故曰含𢎞含言無所不容𢎞言無所不有其動也闢故曰光大光言無所不著大言無所不被此所以德合無疆也林氏希元曰無所不包可見其𢎞無所不逹可見其大含𢎞光大坤之亨也品物咸亨是物隨坤亨而亨也變萬言品者與乾雲行雨施品物流形一般牝馬地類行地無疆柔順利貞君子攸行本義言利貞也馬乾之象而以為地類者牝隂物而馬又行地之物也行地無疆則順而健矣柔順利貞坤之德也君子攸行人之所行如坤之德也所行如是則其占如下文所云也程傳資生之道可謂大矣乾既稱大故坤稱至至義差緩不若大之盛也聖人於尊卑之辨謹嚴如此萬物資乾以始資坤以生父母之道也順承天施以成其功坤之厚德持載萬物合於乾之無疆也以含𢎞光大四者形容坤道猶乾之剛健中正純粹也含包容也𢎞寬裕也光昭明也大博厚也有此四者故能成承天之功品物咸得亨遂取牝馬為象者以其柔順而健行地之類也行地無疆謂健也乾健坤順坤亦健乎曰非健何以配乾未有乾行而坤止也其動也剛不害其為柔也柔順而利貞乃坤德也君子之所行也君子之道合坤德也集説王氏弼曰地之所以得無疆者以卑順行之故也乾以龍御天坤以馬行地朱子語類云牝馬地類行地無疆便是那柔順利貞君子攸行本連下面緣他趁押韻後故説在此又云程傳云未有乾行而坤止此説是且如乾施物坤不應則不能生物既會生物便是動若不是他健後如何配乾只是健得來順龔氏煥曰坤先迷後得而亦有元亨者坤之元亨承乾而已故曰至哉坤元乃順承天又曰德合無疆品物咸亨坤之利貞乃坤之德故曰牝馬地類行地無疆柔順利貞此亦先迷後得之意坤所以能承乾之元亨以為元亨者以其柔順利貞也熊氏良輔曰君子攸行合聮下文先迷之上不必以韻為拘當時夫子只是從頭説下來蔡氏清曰以象言則為牝馬地類行地無疆以義言則為柔順利貞本義謂馬行地之物者明龍之能飛乎天而為乾之象也林氏希元曰牝馬地類順也行地無疆順而健也故承之曰柔順利貞言此即坤德之順健云爾不敢自主承天之施以生萬物柔順也承天生物直至於有終利貞也彖辭利牝馬之貞本無四德夫子以四德解故為之説如此先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶本義陽大隂小陽得兼隂隂不得兼陽故坤之德常減於乾之半也東北雖喪朋然反之西南則終有慶矣集説程子曰東北喪朋隂必從陽然後乃終有慶也項氏安世曰東北喪朋乃終有慶者所以發文王言外之意也地之交乎天臣之事乎君婦之從乎夫皆喪朋之慶也丘氏富國曰坤道主成成在後故先乾而動則迷而失其道從乾而動則順而得其常西南為後於坤為得地故往西南則與類行東北為先於坤為不得地故往東北則必喪朋王氏申子曰馬而非牝則不順而非地之類牝而非馬則不能配乾而行地無疆此坤之柔順利貞也故君子行坤之道者先乎陽則迷而失後乎陽則順而得以隂從隂猶與類行以隂從陽然後有慶林氏希元曰先迷失道是以失道解先迷蓋隂本居後今居先是失道故迷也後順得常是以順解得常蓋隂本居後居先為逆居後為順故得其常道也金氏賁亨曰喪朋猶泰之朋亡舍其朋而從陽則有得主之慶何氏楷曰君子攸行雖趁上韻然意連下文釋卦辭君子有攸往也君子之行以陽剛為主以隂抗陽故迷而失道以隂順陽故得所主而不失其常蓋陽為主隂承之此天地不易之常理也得朋者合羣隂以從陽後代終也喪朋者斂羣隂以避陽先無成也安貞之吉應地無疆本義安而且貞地之德也程傳乾之用陽之為也坤之用隂之為也形而上曰天地之道形而下曰隂陽之功先迷後得以下言隂道也先唱則迷失隂道後和則順而得其常理西南隂方從其類得朋也東北陽方離其類喪朋也離其類而從陽則能成生物之功終有吉慶也與類行者本也從於陽者用也隂體柔躁故從於陽則能安貞而吉應地道之無疆也隂而不安貞豈能應地之道彖有三無疆蓋不同也德合無疆天之不已也應地無疆地之無窮也行地無疆馬之健行也集説孔氏穎達曰萬物資生者言萬物資地而生乾本氣初故云資始坤據成形故云資生乃順承天者乾是剛健能統領於天坤是隂柔以和順承奉於天以其廣厚故能載物有此生長之德合會無疆凡言無疆者有二義一是廣博無疆二是長久無疆也自此已上論坤元之德也包含𢎞厚光著盛大故品類之物皆得亨通此二句釋亨也牝馬以其柔順故云地類以柔順為體故行地無疆不復窮已此二句釋利貞故上文云利牝馬之貞是也柔順利貞君子攸行者重釋利貞之義是君子之所行兼釋前文君子有攸往也先迷失道者以隂在物之先失其為隂之道後順得常者以隂在物之後陽唱而隂和是後順得常乃與類行者以隂而造坤位是乃與類行乃終有慶者以隂而詣陽初雖離羣乃終久有慶善也安謂安靜貞謂貞正地體安靜而貞正人若靜而能正即得其吉應合地之無疆也屯剛柔始交而難生本義以二體釋卦名義始交謂震難生謂坎集説朱氏震曰震者乾交於坤一索得之剛柔始交也坎險難剛柔始交而難生也張氏清子曰乾坤之後一索得震為始交再索得坎為難生而承上接下之辭所以合震坎之義而釋其為屯也動乎險中大亨貞本義以二體之德釋卦辭動震之為也險坎之地也自此以下釋元亨利貞乃用文王本意集説朱子語類問本義云此以下釋元亨利貞用文王本意何也曰乾元亨利貞至孔子方作四德説後人不知將謂文王作易便作四德説即非也如屯卦所謂元亨利貞者以其能動雖可以亨而在險則宜守正故筮得之者其占為大亨而利於正初非謂四德也故孔子釋此彖辭只曰動乎險中大亨貞是用文王本意釋之也雷雨之動滿盈天造草昧宜建侯而不寧本義以二體之象釋卦辭雷震象雨坎象天造猶言天運草雜亂昧晦冥也隂陽交而雷雨作雜亂晦冥塞乎兩間天下未定名分未明宜立君以統治而未可遽謂安寧之時也不取初九爻義者取義多端姑舉其一也程傳以雲雷二象言之則剛柔始交也以坎震二體言之動乎險中也剛柔始交未能通暢則艱屯故云難生又動於險中為艱屯之義所謂大亨而貞者雷雨之動滿盈也隂陽始交則艱屯未能通暢及其和洽則成雷雨滿盈於天地之間生物乃遂屯有大亨之道也所以能大亨由夫貞也非貞固安能出屯人之處屯有致大亨之道亦在夫貞固也天造草昧上文言天地生物之義此言時事天造謂時運也草草亂無倫序昧冥昧不明當此時運所宜建立輔助則可以濟屯雖建侯自輔又當憂勤兢畏不遑寧處聖人之深戒也集説孔氏穎達曰草謂草創昧謂冥昧言天造萬物於草創之始如在冥昧之時也於此草昧之時王者宜建立諸侯以撫恤萬方之物而不得安居無事王氏安石曰難生也動乎險中也此雲雷之時也故曰雲雷屯卒至於雷雨之動滿盈然後能免乎險而屯難解大亨貞要屯之終而為言也朱子語類問剛柔始交而難生程傳以雲雷之象為始交謂震始交於下坎始交於中如何曰剛柔始交只指震言所謂震一索而得男也此三句各有所指剛柔始交而難生是以二體釋卦名義動乎險中大亨貞是以二體之德釋卦辭雷雨之動滿盈天造草昧宜建侯而不寧是以二體之象釋卦辭只如此看甚明緣後來説者交雜混了故覺語意重復蔡氏清曰草雜亂則不定矣故下云天下未定昧晦冥則不明矣故下云名分未明名分不獨謂君臣上下如父子夫婦昆弟之類皆是也立君統治者君臣人道之綱也何氏楷曰震之未動坎氣為雲雲上雷下鬱結而未成雨所以為屯動則雲化為雨雷上雨下屯之鬱結者變而為解而未亨者果大亨矣案本義以動乎險中釋大亨貞雷雨之動以下釋建侯程傳則以動乎險中屬上句總釋卦名而以雷雨之動滿盈一句釋大亨貞今觀屯稱雲雷解稱雷雨則屯之時猶未解也夫子欲明元亨之義故變雲雷言雷雨以見屯之必解則觀其動也而屯之元亨可知矣然動者亨之機爾其醞釀絪縕以滿盈其氣又足以見貞固之義程傳説可從故王氏何氏同蒙山下有險險而止蒙本義以卦象卦德釋卦名有兩義蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也本義以卦體釋卦辭也九二以可亨之道發人之蒙而又得其時之中謂如下文所指之事皆以亨行而當其可也志應者二剛明五柔暗故二不求五而五求二其志自相應也以剛中者以剛而中故能告而有節也瀆筮者二三則問者固瀆而告者亦瀆矣蒙以養正乃作聖之功所以釋利貞之義也程傳山下有險內險不可處外止莫能進未知所為故為昏蒙之義蒙亨以亨行時中也蒙之能亨以亨道行也所謂亨道時中也時謂得君之應中謂處得其中得中則時也匪我求童蒙童蒙求我志應也二以剛明之賢處於下五以童蒙居上非是二求於五蓋五之志應於二也賢者在下豈可自進以求於君苟自求之必無能信用之理古之人所以必待人君致敬盡禮而後往者非欲自為尊大蓋其尊德樂道不如是不足與有為也初筮謂誠一而來求決其蒙則當以剛中之道告而開發之再三煩數也來筮之意煩數不能誠一則瀆慢矣不當告也告之必不能信受徒為煩瀆故曰瀆蒙也求者告者皆煩瀆矣卦辭曰利貞彖復伸其義以明不止為戒於二實養蒙之道也未發之謂蒙以純一未發之蒙而養其正乃作聖之功也發而後禁則扞格而難勝養正於蒙學之至善也蒙之六爻二陽為治蒙者四隂皆處蒙者也集説朱子語類云蒙以養正聖功也蓋言蒙昧之時先自養教正當了到那開發時便有作聖之功若蒙昧之中已自不正他日何由會有聖功胡氏炳文曰程傳云亨道即時中也本義謂九二以可亨之道發人之蒙而又得其時之中蓋蒙豈無可亨之道但恐亨之不得乎時之中耳本義謂如下文所指之事蓋謂志未應而遽欲亨之非時中也再三瀆而亦告之非時中也蒙宜養正過此而後養之非時中也俞氏琰曰聖者無所不通之謂童蒙之時便當以正道涵養其正性是乃作聖之功也古之人含德之厚比於赤子大人之所以為大人者不失其赤子之心而已童蒙之時情竇未開天真未散粹然一出於正所謂赤子之心是也涵養正性全在童蒙之時若童蒙之時無所養而失其正則他日欲望其作聖不可得矣林氏希元曰養蒙發蒙原非二事對前日之蒙言則曰發對後日之作聖言則曰養利貞之語實蒙上文如咸恆利貞之例非發蒙之後又别出養蒙之義也需須也險在前也剛健而不陷其義不困窮矣本義此以卦德釋卦名義程傳需之義須也以險在於前未可遽進故需待而行也以乾之剛健而能需待不輕動故不陷於險其義不至於困窮也剛健之人其動必躁乃能需待而動處之至善者也故夫子贊之云其義不困窮矣集説王氏申子曰需者坎險在前須而後進也惟剛則內有所主故能需惟健則動不可禦故能濟蔡氏清曰以剛遇險而不遽進以陷於險者蓋隂柔不能寧耐乾剛則沈毅不苟而能寧耐所謂乾天下之至健也德行恆易以知險需有孚光亨貞吉位乎天位以正中也利涉大川往有功也本義以卦體及兩象釋卦辭程傳五以剛實居中為孚之象而得其所需亦為有孚之義以乾剛而至誠故其德光明而能亨通得貞正而吉也所以能然者以居天位而得正中也居天位指五以正中兼二言故云正中既有孚而貞正雖涉險阻往則有功也需道之至善也以乾剛而能需何所不利集説谷氏家杰曰此卦合坎乾成需惟乾易而知險故曰剛健曰正中見有天德者能需也訟上剛下險險而健訟本義以卦德釋卦名義程傳訟之為卦上剛下險險而又健也又為險健相接內險外健皆所以為訟也若健而不險不生訟也險而不健不能訟也險而又健是以訟也集説毛氏璞曰上剛下險以彼此言之險而健以一人言之訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也本義以卦變卦體卦象釋卦辭程傳訟之道固如是又據卦才而言九二以剛自外來而成訟則二乃訟之主也以剛處中中實之象故為有孚處訟之時雖有孚信亦必艱阻窒塞而有惕懼不窒則不成訟矣又居險陷之中亦為窒塞惕懼之義二以陽剛自外來而得中為以剛來訟而不過之義是以吉也卦有更取成卦之由為義者此是也卦義不取成卦之由則更不言所變之爻也據卦辭二乃善也而爻中不見其善蓋卦辭取其有孚得中而言乃善也爻則以自下訟上為義所取不同也訟非善事不得已也安可終極其事極意於其事則凶矣故曰不可成也成謂窮盡其事也訟者求辨其是非也辨之當乃中正也故利見大人以所尚者中正也聽者非其人則或不得其中正也中正大人九五是也與人訟者必處其身於安平之地若蹈危險則陷其身矣乃入于深淵也卦中有中正險陷之象集説孔氏穎達曰剛來而得中輔嗣必以為九二者凡上下二象在於下象者則稱來故賁卦云柔來而文剛是離下艮上而稱柔來今此云剛來而得中故知九二也且凡云來者皆據異類而來九二在二隂之中故稱來若於爻辭之中亦有從下卦向上卦稱來也故需上六有不速之客三人來謂下卦三陽然需上六隂爻陽來詣之亦是非類而稱來也劉氏牧曰剛來謂二也性本剛好勝而訟也來居柔能屈其性也處中位不失中道也王氏安石曰彖言乎其才也訟有孚窒惕中吉此言九二之才也終凶此言上九之才也利見大人言九五之才也不利涉大川言一卦之才也蔡氏清曰訟不可成以理言之揚人之惡也煩上之聼也損已之德也增俗之偷也又人巳之間俱廢其業雖得不償失也此豈君子之所樂成者哉謂之不可成見其宜惕中也案彖傳中有言剛柔往來上下者皆虛象也先儒因此而卦變之説紛然然觀泰否卦下小往大來大往小來云者文王之辭也果從何卦而往何卦而來乎亦云有其象而已耳故依王孔注疏作虛象者近是師衆也貞正也能以衆正可以王矣本義此以卦體釋師貞之義以謂能左右之也一陽在下之中而五隂皆為所以也能以衆正則王者之師矣程傳能使衆人皆正可以王天下矣得衆心服從而歸正王道止於是也剛中而應行險而順以此毒天下而民從之吉又何咎矣本義又以卦體卦德釋丈人吉無咎之義剛中謂九二應謂六五應之行險謂行危道順謂順人心此非有老成之德者不能也毒害也師旅之興不無害於天下然以其有是才德是以民悅而從之也程傳言二也以剛處中剛而得中道也六五之君為正應信任之專也雖行險道而以順動所謂義兵王者之師也上順下險行險而順也師旅之興不無傷財害人毒害天下然而民心從之者以其義動也古者東征西怨民心從也如是故吉而無咎吉謂必克無咎謂合義又何咎矣其義故無咎也集説遊氏酢曰用師之道將以正天下之不正也故師謂之征己則不正其能正人乎剛中而應任將之道也行險而順興師之義也仰順乎天無違天以干時俯順乎人無咈人以從欲興師之順如此故能以衆正以衆正之則人皆知其欲正己而已天下孰不趨於正哉胡氏炳文曰毒之一字見得王者之師不得已而用之如毒藥之攻病非有沈痾堅癥不輕用也其指深矣比吉也本義此三字疑衍文比輔也下順從也本義此以卦體釋卦名義程傳比吉也比者吉之道也物相親比乃吉道也比輔也釋比之義比者相親附也下順從也解卦所以為比也五以陽居尊位羣下順從以親輔之所以為比也集説孔氏穎達曰比吉也者言相親比而得吉也比輔也者釋比所以得吉下順從者謂衆隂順從九五也朱子語類云比吉也也字羡當云比吉比輔也下順從也比輔也解比字下順從也解吉字楊氏啓新曰下順從以卦體言實則兼上下衆隂不曰上下而曰下者以九五為主也至不寧方來則曰上下應前是尊上之辭後是舉衆之辭原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也本義亦以卦體釋卦辭剛中謂五上下謂五隂程傳推原筮決相比之道得元永貞而後可以無咎所謂元永貞如五是也以陽剛居中正盡比道之善者也以陽剛當尊位為君德元也居中得正能永而貞也卦辭本泛言比道彖言元永貞者九五以剛處中正是也人之生不能保其安寧方且來求附比民不能自保故戴君以求寧君不能獨立故保民以為安不寧而來比者上下相應也以聖人之公言之固至誠求天下之比以安民也以後王之私言之不求下民之附則危亡至矣故上下之志必相應也在卦言之上下羣隂比於五五比其衆乃上下應也衆必相比而後能遂其生天地之間未有不相親比而能遂者也若相從之志不疾而後則不能成比雖夫亦凶矣無所親比困屈以致凶窮之道也集説胡氏炳文曰凡應字多謂剛柔兩爻相應此則謂上下五隂應乎五之剛又一例也師比皆一陽五隂師之應謂五應二將之任專也比之應則謂上下應五君之分嚴也小畜柔得位而上下應之曰小畜本義以卦體釋卦名義柔得位指六居四上下謂五陽程傳言成卦之義也以隂居四又處上位柔得位也上下五陽皆應之為所畜也以一隂而畜五陽能係而不能固是以為小畜也彖解成卦之義而加曰字者皆重卦名文勢當然單名卦惟革有曰字亦文勢然也集説胡氏瑗曰小畜卦有二義六四以一隂得位體無二隂以分其應故上下五陽皆應之是小者能畜矣三陽在下而並進四以一隂獨當其路是小有所畜也此二義也健而巽剛中而志行乃亨本義以卦德卦體而言陽猶可亨也程傳以卦才言也內健而外巽健而能巽也二五居中剛中也陽性上進下復乾體志在於行也剛居中為剛而得中又為中剛言畜陽則以柔巽言能亨則由剛中以成卦之義言則為隂畜陽以卦才言則陽為剛中才如是故畜雖小而能亨也密雲不雨尚往也自我西郊施未行也本義尚往言畜之未極其氣猶上進也程傳畜道不能成大如密雲而不成雨隂陽交而和則相固而成雨二氣不和陽尚往而上故不成雨蓋自我隂方之氣先倡故不和而不能成雨其功施未行也小畜之不能成大猶西郊之雲不能成雨也集説王氏逢曰四以隂盛有密雲之象以柔止健不能固陽是以不雨西郊隂地臣之類也楊氏時曰卦五陽而一隂則一隂為之主四以隂居隂柔得位也為一卦之主而上下應之以隂畜陽也陽大而隂小小者畜也此以六四一爻言之也合一卦之才則三陽健而進一隂體巽而上行九五剛得中與之合志則志行矣是以亨也項氏安世曰隂陽之理畜極則亨畜之小者雖未遽亨及其成也終有亨理以六爻言之一柔得位五陽應之能係其情未能全制之也故為小畜以二卦言之健而能巽不激不亢其勢必通二五皆剛中同心同德其志必行故有亨理凡隂閉之極則陽氣蒸而成雨密雲不雨者隂方上往未至於極也自我西郊者方起於此未至於彼也此皆言所畜之小然謂之尚往則非不往謂之未行則非不行亨固在其中矣此於人事為以臣畜君終當感悟之象蔡氏清曰本義其氣猶上進也當以既雨既處來照看此句全就雲雨説不然用不得氣字履柔履剛也本義以二體釋卦名義集説王氏申子曰履以六三成卦三之象下迫於二陽之進上躡乎三陽之剛胡氏炳文曰本義謂二體見得是以兌體之柔履乾體之剛非指六三以柔而履剛也案王氏胡氏二説不同然當兼用其義乃備説而應乎乾是以履虎尾不嘻人亨本義以卦德釋彖辭程傳兌以隂柔履藉乾之陽剛柔履剛也兌以説順應乎乾剛而履藉之下順乎上隂承乎陽天下之正理也所履如此至順至當雖履虎尾亦不見傷害以此履行其亨可知集説遊氏酢曰卦以一柔進退履衆剛故有履虎尾之象然而不嘻人亨者説而應乎乾故也夫敬以和何事不行君子之所履苟在於是則雖暴人之前無虞矣項氏安世曰以兌説而應乎乾則所行無忤履雖危而不傷莊周曰虎媚養已者順也惟柔順而説則履虎尾而不嘻人且有能亨之理胡氏炳文曰説而應乎乾亦是以下體之兌應上體之乾若蒙曰志應師曰剛中而應是剛柔兩爻自相應比小畜上下應是一爻為主而衆爻應之剛中正履帝位而不疚光明也本義又以卦體明之指九五也程傳九五以陽剛中正尊履帝位苟無疚病得履道之至善光明者也疚謂疵病夬履是也光明德盛而輝光也集説張氏浚曰九五履乾正位曰剛中正剛健不息體大中至正之道以君臨天下履帝位而不疚也君臨天下者其可危為大蓋人君以一身撫馭海內使所履一不正而蹈於非禮則政令紀綱弛於上讒賊寇攘起於下穆王命君牙曰心之憂危若蹈虎尾涉於春冰是也泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外陰內健而外順內君子而外小人君子道長小人道消也程傳小往大來隂往而陽來也則是天地隂陽之氣相交而萬物得遂其通泰也在人則上下之情交通而其志意同也陽來居內隂往居外陽進而隂退也乾健在內坤順在外為內健而外順君子之道也君子在內小人在外是君子道長小人道消所以為泰也既取隂陽交和又取君子道長隂陽交和乃君子之道長也集説孔氏穎達曰所以得名為泰者由天地氣交而生養萬物物得大通故云泰也上下交而其志同以人事象天地之交也內陽外隂據其象內健外順明其性此就卦爻釋小往大來吉亨也內君子而外小人君子道長小人道消更就人事之中釋小往大來吉亨也項氏安世曰泰否彖皆具三義第一段以重卦上下為義於隂陽二氣無所抑揚但貴其交而已第二段以卦體內外為義雖在內在外各得其所要是重內輕外則已於隂陽有所抑揚矣第三假以六爻消長為義至此則全是好陽而惡隂以陽長隂消為福則不止於抑揚而已否彖依此推之大抵諸卦皆然如小畜之彖柔得位而上下應之是統論六爻五陽一隂也健而巽却以兩卦言之剛中而志行又以九二九五兩爻言之故彖之義無所不備不可以一説通也丘氏富國曰天地之形不可交而以氣交氣交而物通者天地之泰也上下之分不可交而以心交心交而志同者人事之泰也隂陽以氣言健順以德言君子小人以類言內外釋往來之義隂陽健順君子小人釋小大之義王氏應麟曰君子道盛小人自化故舜湯舉臯伊而不仁者逺玉泉喻氏云泰小人道消非消小人也化小人為君子也喬氏中和曰有陽必有隂有君子必有小人必欲絶而去之有是哉善養身者化痰邪為氣血善治國者化盜賊為良民而已矣否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內陰而外陽內柔而外剛內小人而外君子小人道長君子道消也程傳夫天地之氣不交則萬物無生成之理上下之義不交則天下無邦國之道建邦國所以為治也上施政以治民民戴君而從命上下相交所以治安也今上下不交是天下無邦國之道也隂柔在內陽剛在外君子往居於外小人來處於內小人道長君子道消之時也集説胡氏瑗曰內柔而外剛者小人之體也語曰色厲而內荏外有嚴厲之色內有柔荏之心此所以反君子之道也李氏過曰否泰反其類故否之辭皆與泰反吳氏綺曰六十四卦獨乾坤泰否四卦言隂陽乾坤隂陽也惟泰否二卦內外皆得乾坤之全體故亦以隂陽言也同人柔得位得中而應乎乾曰同人本義以卦體釋卦名義柔謂六二乾謂九五程傳言成卦之義柔得位謂二以隂居隂得其正位也五中正而二以中正應之得中而應乎乾也五剛健中正而二以柔順中正應之各得其正其德同也故為同人五乾之主故云應乎乾象取天火之象而彖專以二言集説項氏安世曰同人以一柔為主徒柔不能以同乎人也必以天德行之故雖得位得中而必應乎乾乃可謂之同人至於利涉大川則又曰此乾行也明非柔之所能辦也凡卦之以柔為主者皆然履之六三不能以自亨也必曰應乎乾是以履虎尾不嘻人亨小畜之六四不能以自亨也必曰剛中而志行乃亨大有之六五不能以自亨也必曰應乎天而時行是以元亨凡此皆柔為卦主而其濟也必稱乾焉此乾之所以為大與案傳義皆以乾為專指九五然若專指二五之應恐不得謂之同人于野矣蓋乾者陽爻之通稱一隂虗中與五陽相應此卦所以為同人也不言上下應者蓋隂陽居上體而為卦主則可言上下應如比如小畜如大有是也若在下體則但言應而已蒙師履及此卦是也同人曰本義衍文程傳此三字羡文集説孔氏穎達曰稱同人曰猶言同人卦曰也同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志本義以卦德卦體釋卦辭通天下之志乃為大同不然則是私情之合而已何以致亨而利涉哉程傳至誠無私可以蹈險難者乾之行也無私天德也又以二體言其義有文明之德而剛健以中正之道相應乃君子之正道也天下之志萬殊理則一也君子明理故能通天下之志聖人視億兆之心猶一心者通於理而已文明則能燭理故能明大同之義剛健則能克己故能盡大同之道然後能中正合乎乾行也案上專以乾行釋于野涉川者但取剛健無私之義也下釋利貞則兼取明健中正之義蓋健德但主於無私而已必也有文明在於先而所知無不明有中正在於後而所與無不當然後可以盡無私之義而為君子之貞也大有柔得尊位大中而上下應之曰大有本義以卦體釋卦名義柔謂六五上下謂五陽程傳言卦之所以為大有也五以隂居君位柔得尊位也處中得大中之道也為諸陽所宗上下應之也夫居尊執柔固衆之所歸也而又有虛中文明大中之德故上下同志應之所以為大有也集説蘇氏軾曰謂五也大者皆見有於五故曰大有郭氏忠孝曰柔得尊位大中謙以居之不自滿假者也以一柔而應五剛所謂所寶惟賢光天之下萬邦黎獻共惟帝臣不如是不足以為尚賢也楊氏萬里曰同人大有一柔五剛均也柔在下者曰得位曰得中曰應乎乾而為同人我同乎彼之辭也柔在上者曰尊位曰大中曰上下應而為大有我有其大之辭也項氏安世曰一隂在下勢不足以有衆能推所有以同乎人者也故名曰同人一隂在上人同乎我為我所有者也故名曰大有彖於同人曰應乎乾明我應之也於大有曰上下應之明人應我也履卦柔在下亦曰應乎乾小畜柔在上亦曰上下應之此可以推卦例矣胡氏炳文曰或曰小畜亦五陽一隂之卦主巽之一隂則曰小此主離之一隂則曰大何也曰巽之一隂在四欲畜上下五陽其勢逆而難離之一隂在五而有上下五陽其勢順而易其德剛健而文明應乎天而時行是以元亨本義以卦德卦體釋卦辭應天指六五也程傳卦之德內剛健而外文明六五之君應於乾之九二五之性柔順而明能順應乎二二乾之主也是應乎乾也順應乾行順乎天時也故曰應乎天而時行其德如此是以元亨也王弼云不大通何由得大有乎大有則必元亨矣此不識卦義離乾成大有之義非大有之義便有元亨由其才故得元亨大有而不善者與不能亨者有矣諸卦具元亨利貞則彖皆釋為大亨恐疑與乾坤同也不兼利貞則釋為元亨盡元義也元有大善之義有元亨者四卦大有蠱升鼎也惟升之彖誤隨他卦作大亨曰諸卦之元與乾不同何也曰元之在乾為元始之義為首出庶物之義他卦則不能有此義為善為大而已曰元之為大可矣為善何也曰元者物之先也物之先豈有不善者乎事成而後有敗敗非先成者也興而後有衰衰固後於興也得而後有失非得則何以有失也至於善惡治亂是非天下之事莫不皆然必善為先故文言曰元者善之長也集説王氏弼曰德應於天則行不失時矣剛健不滯文明不犯應天則大時行無違是以元亨項氏安世曰同人大有兩卦皆以離之中爻為主而以乾為應者也同人離在下以德為主故曰應乎乾者應其德也大有離在上以位為主故曰應乎天而時行者應其命也履兌在下曰應乎乾大畜艮在上曰應乎天亦卦例也案卦辭未有不根卦名而繫者况柔中居尊能有衆陽是虛心下賢之君而衆君子皆為之用其亨孰大於是哉彖傳又推卦德卦體以盡其縕其實皆不出乎卦名之中也程傳謂卦名未足以致元亨由卦才而得元亨者恐非易之通例謙亨天道下濟而光明地道卑而上行本義言謙之必亨程傳濟當為際此明謙而能亨之義天之道以其氣下際故能化育萬物其道光明下際謂下交也地之道以其處卑所以其氣上行交於天皆以卑降而亨也集説項氏安世曰天道下際而光明地道卑而上行此以卦體釋卦辭也九三乾也降在下卦是下濟而光明也坤地道勢處至卑而升在上卦是卑而上行也下濟與卑皆釋謙字光明與上行皆釋亨字自人事言之尊者行之則有光即天道下濟而光明也卑者行之則不可踰即地道卑而上行也始雖謙下終必髙明是有終也自天道虧盈以下皆極言謙之必有後福質之於天地神人之心以明有終之義也丘氏富國曰凡卦以一陽為主者彖傳皆以剛言復曰剛反豫曰剛應師比曰剛中剝曰變剛謙主九三而彖不言剛者謙無用於剛也用剛則不能謙矣三有剛而不用此其所以為謙也蔡氏淵曰下濟而光明艮也艮有光明之象故艮之彖曰其道光明謂艮陽止乎上隂不得而掩之故光明卑而上行坤也天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也本義變謂傾壞流謂聚而歸之人能謙則其居尊者其德愈光其居卑者人亦莫能過此君子所以有終也程傳以天行而言盈者則虧謙者則益日月陰陽是也以地勢而言盈滿者傾變而反陷卑下者流注而益增也鬼神謂造化之迹盈滿者禍害之謙損者福祐之凡過而損不足而益者皆是也人情疾惡於盈滿而好與於謙巽也謙者人之至德故聖人詳言所以戒盈而勸謙也謙為卑巽也而其道尊大而光顯自處雖卑屈而其德實髙不可加尚是不可踰也君子至誠於謙恆而不變有終也故尊光集説崔氏憬曰若日中則昃月滿則虧損有餘以補不足天之道也髙岸為谷深谷為陵是為變盈而流謙地之道也朱門之家鬼闞其室黍稷非馨明德惟馨是其義矣滿招損謙受益人之道也劉氏牧曰降卑接下名譽益隆故其道光顯辭貌卑遜而志行剛正故雖卑退而不可踰朱子語類云天道是就寒暑往來上説地道是就地形髙下上説鬼神言害福是有些造化之柄各自主一事而言耳問謙之為義不知天地人鬼何以皆好尚之曰太極中本無物若事業功勞於我何有觀天地生萬物而不言所利可見矣又云謙尊而光卑而不可踰以尊而行謙則其道光以卑而行謙則其德不可踰尊對卑言伊川以謙對卑説非是聖人九卦引此一句看來大綱説蔡氏清曰如日沒而升中而昃月晦而弦盈而蝕之類天非有意於虧之益之也若論至無心處則雖人道惡盈好謙初亦何容心於好惡哉在我者有以感召其好惡耳可不愼哉豫剛應而志行順以動豫本義以卦體卦德釋卦名義程傳剛應謂四為羣陰所應剛得衆應也志行謂陽志上行動而上下順從其志得行也順以動豫震動而坤順為動而順理順理而動又為動而衆順所以豫也集説胡氏炳文曰建萬國聚大衆非順理而動使人心皆和樂而從不可也故二者皆繫之豫案彖傳中凡稱卦德皆先內而後外而其文義又各不同其曰而者兩字並重如訟之險而健既險又健也小畜之健而巽既健又巽也大有剛健而文明既剛健而又文明也其曰以者則重在上一字如同人文明以健重在文明字此卦順以動重在順字其或以下一字為重者則又變其文法如復卦動而以順行之類豫順以動故天地如之而況建侯行師乎本義以卦德釋卦辭程傳以豫順而動則天地如之而弗違況建侯行師豈有不順乎天地之道萬物之理惟至順而已大人所以先天後天而不違者亦順乎理而已集説吳氏曰愼曰順以動所謂行其所無事也天地如之猶云天且弗違得其民者得其心也故豫利建侯多助之至天下順之故豫利行師天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉本義極言之而贊其大也程傳復詳言順動之道天地之運以其順動所以日月之度不過差四時之行不愆忒聖人以順動故經正而民興於善刑罰清簡而萬民服也既言豫順之道矣然其旨味淵永言盡而意有餘也故復贊之云豫之時義大矣哉欲人研味其理優柔涵泳而識之也時義謂豫之時義諸卦之時與義用大者皆贊其大矣哉豫以下十一卦是也豫遁姤旅言時義坎睽蹇言時用頤大過解革言時各以其大者也集説項氏安世曰豫隨遁姤旅皆若淺事而有深意故曰時義大矣哉欲人之思之也坎睽蹇皆非美事而聖人有時而用之故曰時用大矣哉欲人之别之也頤大過解革皆大事大變也故曰時大矣哉欲人之謹之也吳氏澄曰專言時者重在時字時義重在義字時用重在用字蔡氏清曰時之一字貫六十四卦皆有不止豫等諸卦耳有時則有義有義則有用單言時則義與用在其中矣言義未嘗無用言用未嘗無義各就所切而言隨剛來而下柔動而説隨本義以卦變卦德釋卦名義集説孔氏穎達曰剛謂震也柔謂兌也震處兌下是剛來下柔震動而兌説既能下人動則喜説所以物皆隨從也胡氏瑗曰震以動其性剛兌以説其性柔今震在兌下是剛來而下於柔也猶聖賢君子以至剛之德至尊之位至貴之勢接於臣而下於民故賞罰號令一出於上則民皆説而隨於下也王氏逢曰上能下下下之所以隨上貴能下賤賤之所以隨貴隨之義剛下柔也王氏宗傳曰陽剛非在下之物也今也得隨之義來下於陰柔則是能以上下下以貴下賤者也物安得不隨之乎動而説此有所動而彼無不説之謂也彼無不説則亦無不隨矣或曰易家以隨自否來蠱自泰來其義如何曰非也乾坤重而為泰否故隨蠱無自泰否而來之理世儒惑於卦變殊不知八卦成列因而重之而內外上下往來之義已備乎其中自八卦既重之後又烏有所謂內外上下往來之義乎蔣氏悌生曰程傳謂説而動動而説皆隨之義朱子語録云但當言動而説不當言説而動凡卦體卦德皆從內説出去案王氏説最足以破卦變之支離得易象之本旨大亨貞無咎而天下隨時本義王肅本時作之今當從之釋卦辭言能如是則天下之所從也程傳卦所以為隨以剛來而下柔動而説也謂乾之上九來居坤之下坤之初六往居乾之上以陽剛來下於陰柔是以上下下以貴下賤能如是物之所説隨也又下動而上説動而可説也所以隨也如是則可大亨而得正能大亨而得正則為無咎不能亨不得正則非可隨之道豈能使天下隨之乎天下所隨者時也故云天下隨時集説孔氏穎達曰大亨貞正無有咎害而天下隨之以正道相隨故隨之者廣若不以大亨貞無咎而以邪僻相隨則天下不從也喬氏中和曰剛下柔而陽隨陰以我隨物則物自隨我而動罔不説此大亨之正道也人同此心天下有不隨之者哉隨時之義大矣哉本義王肅本時字在之字下今當從之程傳君子之道隨時而動從宜適變不可為典要非造道之深知幾能權者不能與於此也故贊之曰隨時之義大矣哉凡贊之者欲人知其義之大玩而識之也此贊隨時之義大與豫等諸卦不同諸卦時與義是兩事蠱剛上而柔下巽而止蠱本義以卦體卦變卦德釋卦名義蓋如此則積弊而至於蠱矣程傳以卦變及二體之義而言剛上而柔下謂乾之初九上而為上九坤之上六下而為初六也陽剛尊而在上者也今往居於上陰柔卑而在下者也今來居於下男雖少而居上女雖長而在下尊卑得正上下順理治蠱之道也由剛之上柔之下變而為艮巽艮止也巽順也下巽而上止止於巽順也以巽順之道治蠱是以元亨也集説集氏曰巽而止者巽而不為因循至壞者也朱子語類云剛上柔下巽而止此是言致蠱之由非治蠱之道又云龜山説巽而止乃治蠱之道言當柔順而止不可堅正非惟不成道理且非易彖文義巽而止蠱猶順以動豫動而説隨皆言卦義俞氏琰曰巽固進退不決苟非艮之止亦未至於蠱惟其巽而止所以蠱也巽則無奮迅之志止則無健行之才於是事事因循苟且積斃而至於蠱故曰巽而止蠱蓋以卦德言致蠱之由非飭蠱之道也蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也本義釋卦辭治蠱至於元亨則亂而復治之象也亂之終治之始天運然也程傳治蠱之道如卦之才則元亨而天下治矣夫治亂者苟能使尊卑上下之義正在下者巽順在上者能止齊安定之事皆止於順則何蠱之不治也其道大善而亨也如此則天下治矣方天下壞亂之際宜涉艱險以往而濟之是往有所事也夫有始則必有終既終則必有始天之道也聖人知終始之道故能原始而究其所以然要終而備其將然先甲後甲而為之慮所以能治蠱而致元亨也集説楊氏萬里曰蠱壞矣而曰元亨而天下治何也蓋亂為治根蠱為飭源雖然亂不自治蠱不自飭不植不立不振不起故利於濟大難往有事也朱子語類云蠱元亨而天下治言蠱之時如此必須是大善亨通而後天下治胡氏炳文曰諸卦皆言往有功蠱獨曰往有事蠱者事也事雖已治不可以無事視之也前事過中而將壞即當為自新之圖後事方始而尚新即當致丁寧之意亂之極而治之始雖天運然也亦人事致然也龔氏煥曰蠱卦辭言先甲後甲巽卦辭言先庚後庚事壞而至蠱則當復始甲者事之始故蠱彖傳以先甲後甲為終則有始也事久而有弊不可以不更庚者事之變故巽爻辭以先庚後庚為無初有終也夫事之壞而新之是謂終則有始事之斃而革之是謂無初有終終則有始如創業之君新一代之法度也無初有終如中興之主革前朝之弊事也俞氏琰曰往有事者當蠱壞之時宜涉艱險而往有攸濟不可處之於無事之域也文子云流水之不腐以其逝故也户樞之不蠧以其運故也大抵器欲常用久不用則蠧生體欲常動久不動則病生蠱之時止而不動則天下之事終於蠱而已矣故勉之使往不宜坐視其斃而弗救也臨剛浸而長本義以卦體釋卦名集説王氏應麟曰陰符經云天地之道浸故陰陽勝愚嘗讀易之臨曰剛浸而長遁曰浸而長也自臨而長為泰自遁而長為否浸者漸也聖人之戒深矣張氏清子曰自復一陽生積而至臨則二陽長矣故曰剛浸而長遁者臨之反也臨彖曰剛浸而長遁彖不曰柔浸而長而止曰小利貞浸而長易不為小人謀也説而順剛中而應本義又以卦德卦體言卦之善案剛浸而長説而順剛中而應皆釋卦名也蓋剛浸而長則陽道方亨有説順之德則人心和附剛中得應則上下交而志同此其所以德澤及於天下而足以有臨也此亦如泰之取義兼交泰與消長兩意見正道之盛大故夫子釋之曰臨者大也若但以臨為陵逼小人之義則於卦爻之辭多有所難通者大亨以正天之道也本義當剛長之時又有此善故其占如此也程傳浸漸也二陽長於下而漸進也下兌上坤和説而順也剛得中道而有應助是以能大亨而得正合天之道剛正而和順天之道也化育之功所以不息者剛正和順而已以此臨人臨事臨天下莫不大亨而得正也兌為説説乃和也夬彖云決而和至于八月有凶消不久也本義言雖天運之當然然君子宜知所戒程傳臨二陽生陽方漸盛之時故聖人為之戒云陽雖方長然至于八月則消而凶矣八月謂陽生之八月陽始生於復自復至遁凡八月自建子至建未也二隂長而陽消矣故云消不久也在隂陽之氣言之則消長如循環不可易也以人事言之則陽為君子隂為小人方君子道長之時聖人為之誡使知極則有凶之理而虞備之常不至於滿極則無凶也集説孔氏穎達曰陽長之卦每卦皆應八月有凶但此卦名臨是盛大之義故於此卦特戒之耳若以類言之則陽長之卦至其終末皆有凶也陸氏振竒曰日陽象月隂象八少隂之數七少陽之數故言隂來之期曰八月言陽來之期曰七日案八月七日説者多鑿陸氏之説最為得之蓋陽數窮於九則退而生少隂之八隂數窮於六則進而生少陽之七七八者隂陽始生之數也若拘拘於卦氣月候之配則震既濟之七日與夫三日三年十年之類皆多不可通者矣大觀在上順而巽中正以觀天下本義以卦體卦德釋卦名義程傳五居尊位以剛陽中正之德為下所觀其德甚大故曰大觀在上下坤而上巽是能順而巽也五居中正以巽順中正之德為觀於天下也集説趙氏彥肅曰大觀在上統謂二陽中正以觀天下獨舉九五楊氏啓新曰順以宅心堯舜之溫恭克讓文王之徽柔懿恭是也巽以制事通人情酌物理隨物付物因時制宜者也巽德之制也非巽何以使萬事各得其宜觀盥而不薦有孚顒若下觀而化也本義釋卦辭程傳為觀之道嚴敬如始盥之時則下民至誠瞻仰而從化也不薦謂不使誠意少散也集説虞氏翻曰孚信顒有威容貌容止可觀進退可度則下觀其德而順其化詩曰顒顒卬卬如圭如璋君德之義也朱氏震曰祭之初迎尸入廟天子涗手而後酌酒涗謂之盥酌酒獻尸尸得之灌地而祭謂之祼祼之後三獻而薦腥五獻而薦熟謂之薦盥者未祼之時精神專一誠意未散不言之信發而為敬順之貌顒顒如也故下觀而化莫不有敬順之心也王氏申子曰觀示天下之道其誠意精一常如始盥之時則觀感之下莫不從化蓋有不動而敬不言而信之妙觀天之神道而四時不忒聖人以神道設教而天下服矣本義極言觀之道也四時不忒天之所以為觀也神道設教聖人之所以為觀也程傳天道至神故曰神道觀天之運行四時無有差忒則見其神妙聖人見天道之神體神道以設教故天下莫不服也夫天道至神故運行四時化育萬物無有差忒至神之道莫可名言唯聖人默契體其妙用設為政教故天下之人涵泳其德而不知其功鼓舞其化而莫測其用自然仰觀而戴服故曰以神道設教而天下服矣集説虞氏翻曰聖人退藏於密以神明其德故設教而天下服矣王氏弼曰統説觀之為道不以刑制使物而以觀感化物神則無形者也不見天之使四時而四時不忒不見聖人使百姓而百姓自服也楊氏時曰古人所以交神而接人其道一主於誠故曰明則有禮樂幽則有鬼神幽明本無二理故所以感之者一聖人以神道設教所謂神道誠意而已誠意天德也朱子語類云聖人以神道設教即是盥而不薦之義又云天之神道只是自然運行底道理四時自然不忒聖人神道亦是有教人自然觀感處吳氏澄曰常人以言設教則有聲音以身設教則有形迹聖人妙天道於不測其應捷如影響蓋所存者神故所過者化也楊氏啓新曰聖人設教誠於此動於彼不顯之德篤恭之妙與上天之載無聲無臭者同一機而其動物之妙丕變之感有非人所能測者故曰神道設教頤中有物曰噬嗑本義以卦體釋卦名義集説王氏宗傳曰易之立卦其命名立象各有所指鼎井大過棟橈小過飛鳥若此類者逺取諸物也艮背頤頤噬嗑頤中有物若此類者近取諸身也噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也本義又以卦名卦體卦德二象卦變釋卦辭程傳頤中有物故為噬嗑有物間於頤中則為害噬而嗑之則其害亡乃亨通也故云噬嗑而亨剛柔分動而明雷電合而章以卦才言也剛爻與柔爻相間剛柔分而不相雜為明辨之象明辨察獄之本也動而明下震上離其動而明也雷電合而章雷震而電耀相須並見合而章也照與威並行用獄之道也能照則無所隱情有威則莫敢不畏上既以二象言其動而明故復言威照並用之意六五以柔居中為用柔得中之義上行謂居尊位雖不當位謂以柔居五為不當而利於用獄者治獄之道全剛則傷於嚴暴過柔則失於寬縱五為用獄之主以柔處剛而得中得用獄之宜也以柔居剛為利用獄以剛居柔為利否曰剛柔質也居用也用柔非治獄之宜也集説崔氏憬曰物在頤中隔其上下因齧而合乃得其亨焉以喻人於上下之間有亂羣者當用刑去之故言利用獄石氏介曰大凡柔則言上行剛則言來柔下剛上定體也剛來如訟無妄渙等剛體本在上而來下上行如晉睽鼎噬嗑等柔體本在下今居五位為上行朱氏震曰六五柔中不當位也施於用獄無若柔中之為利蓋人君止於仁不以明斷稱以臯陶寧失不經曾子哀矜而勿喜之言觀之則不在明斷審矣趙氏汝梅曰體卦之畫則寬嚴胥濟體卦之德則明清善聽體卦之象則獄不淹宿噬以剛動而能嗑彖言利用獄疑當以剛能斷制而聖人歸之六五之柔其哀矜惟良之義乎大君在上三宥而後制刑德雖柔於獄則利俞氏琰曰噬嗑倒轉為賁亦有頤中有物之象而以為賁何耶曰凡噬者必下動賁無震故不得為噬嗑也夫頤而中虛則無事於噬而自可合今有物焉則窒塞矣苟不以齒決之烏得而合故噬已則嗑嗑則窒者去而上下亨通故文王曰噬嗑亨孔子添一而字蓋謂噬而嗑之則亨不噬則不嗑不嗑則不亨也賁亨本義亨字疑衍柔來而文剛故亨分剛上而文柔故小利有攸往天文也本義以卦變釋卦辭剛柔之交自然之象故曰天文先儒説天文上當有剛柔交錯四字理或然也集説蘇氏軾曰易有剛柔往來上下相易之説而其最著者賁之彖傳也故學者沿是爭推其所從變曰泰變為賁此大惑也一卦之變為六十三豈獨為賁也哉徒知泰之為賁又烏知賁之不為泰乎凡易之所謂剛柔往來相易者皆本諸乾坤也乾施一陽於坤以化其一隂而生三子凡三子之卦有言剛來者明此本坤也而乾來化之坤施一隂於乾以化其一陽而生三女凡三女之卦有言柔來者明此本乾也而坤來化之非是卦也則無是言也胡氏炳文曰柔來而文剛是以剛為主也剛往文柔必曰分剛上而文柔者亦以剛為主也故本義於柔文剛則曰陽得隂助於剛文柔而不曰隂得陽助蓋一隂下而為離則隂為陽之助而明於內一陽上而為艮則陽為隂之主而止於外是知皆以剛為主也何氏楷曰剛為質柔為文柔來文剛是本先立矣而文行焉故亨分剛上而文柔者非以剛為文也分剛畫居上而柔始得成其文不然無質之文非文已張氏振淵曰柔來文剛是當質勝之餘而以文濟之剛上文柔是當文勝之後而以質救之二者皆以質為主案亨與小利有攸往皆指文而言之故柔來而文剛者見剛當以柔濟之而後可通也剛上文柔者見柔當以剛節之而柔之道不可純用以行也何氏張氏質文之説極明又案剛上文柔而曰分者本於內之誠實以為節文之則乃是由中而分出者故曰分也文明以止人文也本義又以卦德言之止謂各得其分程傳卦為賁飾之象以上下二體剛柔交相為文飾也下體本乾柔來文其中而為離上體本坤剛往文其上而為艮乃為山下有火止於文明而成賁也天下之事無飾不行故賁則能亨也柔來而文剛故亨柔來文於剛而成文明之象文明所以為賁也賁之道能致亨實由飾而能亨也分剛上而文柔故小利有攸往分乾之中爻往文於艮之上也事由飾而加盛由飾而能行故小利有攸往夫往而能利者以有本也賁飾之道非能增其實也但加之文彩耳事由文而顯盛故為小利有攸往亨者亨通也往者加進也二卦之變共成賁義而彖分言上下各主一事者蓋離明足以致亨文柔又能小進也天文也文明以止人文也此承上文言陰陽剛柔相文者天之文也止於文明者人之文也止謂處於文明也質必有文自然之理理必有對待生生之本也有上則有下有此則有彼有質則有文一不獨立二則為文非知道者孰能識之天文天之理也人文人之道也集説孔氏穎達曰文明離也以止艮也用此文明之道裁止於人是人之文德之教胡氏允曰君臣父子兄弟夫婦朋友粲然有禮以相接者文之明也截然有分以相守者文之止也是則卦中離明而艮止者也王氏應麟曰大畜為學賁為文能止健而後可以為學文明以止而後可以為文者篤實而已不以篤實為本則學不足以成德文不足以明理何氏楷曰止者限而不過之謂一文之一止之而文成禮以節文為訓即此意觀乎天文以察時變觀乎人文以化成天下本義極言賁道之大也程傳天文謂日月星辰之錯列寒暑陰陽之代變觀其運行以察四時之遷改也人文人理之倫序觀人文以教化天下天下成其禮俗乃聖人用賁之道也賁之象取山下有火又取卦變柔來文剛剛上文柔凡卦有以二體之義及二象而成者如屯取動乎險中與雲雷訟取上剛下險與天水違行是也有取一爻者成卦之由也柔得位而上下應之曰小畜柔得尊位大中而上下應之曰大有是也有取二體又取消長之義者雷在地中復山附於地剝是也有取二象兼取二爻交變為義者風雷益兼取損上益下山下有澤損兼取損下益上是也有既以二象成卦復取爻之義者夬之剛決柔姤之柔遇剛是也有以用成卦者巽乎水而上水井木上有火鼎是也鼎又以卦形為象有以形為象者山下有雷頤頤中有物曰噬嗑是也此成卦之義也如剛上柔下損上益下謂剛居上柔在下損於上益於下據成卦而言非謂就卦中升降也如訟無妄云剛來豈自上體而來也凡以柔居五者皆云柔進而上行柔居下者也乃居尊位是進而上也非謂自下體而上也卦之變皆自乾坤先儒不達故謂賁本自泰卦豈有乾坤重而為泰又由泰而變之理下離本乾中爻變而成離上艮本坤上爻變而成艮離在內故云柔來艮在上故云剛上非自下體而上也乾坤變而為六子八卦重而為六十四皆由乾坤之變也剝剝也柔變剛也本義以卦體釋卦名義言柔進干陽變剛為柔也集説陳氏友文曰夬彖曰剛決柔而剝曰柔變剛何也君子之去小人聲其罪與天下共棄之名正言順故曰決小人之欲去君子辭不順理不直必萋斐浸潤以侵蝕之故曰變一字之間君子小人之情狀皎然矣不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也本義以卦體卦德釋卦辭程傳剝剝也謂剝落也柔變剛也柔長而剛變也夏至一陰生而漸長一陰長則一陽消至於建戌則極而成剝是陰柔變剛陽也陰小人之道方長盛而剝消於陽故君子不利有所往也君子當剝之時知不可有所往順時而止乃能觀剝之象也卦有順止之象乃處剝之道君子當觀而體之君子尚消息盈虛天行也君子存心消息盈虛之理而能順之乃合乎天行也理有消衰有息長有盈滿有虛損順之則吉逆之則凶君子隨時敦尚所以事天也復亨剛反本義剛反則亨動而以順行是以出入無疾朋來無咎本義以卦德而言集説孔氏穎達曰復亨者以陽復則亨故以亨連復而釋之也剛反動而以順行者既上釋復亨之義又下釋出入無疾朋來無咎之理潘氏夢旗曰剝以順而止復以順而行君子處道消之極至道長之初未嘗一豪之不以順也反復其道七日來復天行也本義陰陽消息天運然也集説侯氏行果曰五月天行至午陰升也十一月天行至子陽升也天地運往陰陽升復凡歷七月故曰七日來復此天之運行也豳詩曰一之日觱發二之日栗烈一之日周之正月也二之日周之二月也則古人呼月為日明矣利有攸往剛長也本義以卦體而言既生則漸長矣集説項氏安世曰剝曰不利有攸往小人長也復曰利有攸往剛長也易之意凡以為君子謀也丘氏富國曰剛反言剝之一剛窮上反下而為復也剛長言復之一陽自下進上為臨為泰以至為乾也以其既去而來反也故亨以其既反而漸長也故利有攸往剛反言方復之初剛長言已復之後復其見天地之心乎本義積陰之下一陽復生天地生物之心幾於滅息而至此乃復可見在人則為靜極而動惡極而善本心幾息而復見之端也程子論之詳矣而邵子之詩亦曰冬至子之半天心無改移一陽初動處萬物未生時玄酒味方淡大音聲正希此言如不信更請問包義至哉言也學者宜盡心焉程傳復亨謂剛反而亨也陽剛消極而來反既來反則漸長盛而亨通矣動而以順行是以出入無疾朋來無咎以卦才言其所以然也下動而上順是動而以順行也陽剛反而順動是以得出入無疾朋來而無咎也朋之來亦順動也其道反復往來迭消迭息七日而來復者天地之運行如是也消長相因天之理也陽剛君子之道長故利有攸往一陽復於下乃天地生物之心也先儒皆以靜為見天地之心蓋不知動之端乃天地之心也非知道者孰能識之集説程子曰復其見天地之心皆謂至靜能見天地之心非也復之卦下面一畫便是動也安得謂之靜自古儒者皆言靜見天地之心惟某言動而見天地之心或曰莫是於動上求靜否曰固是然最難又曰復其見天地之心一言以蔽之天地以生物為心張子曰復言見天地之心咸恆大壯言天地之情心發乎微情發乎顯朱子語類云天地以生生為德元亨利貞乃生物之心也但其靜而復乃未發之體動而通焉則已發之用一陽來復其始生甚微固若靜矣然動之機日長而萬物莫不資始焉此天命流行之初造化發育之始天地生生不已之心於是而可見也若其靜而未發則此心之體雖無所不在然却有未發見處此程子所以以動之端為天地之心亦舉用以該其體爾又云伊川與濂溪説復字亦差不同濂溪就回來處説伊川却正就動處説如元亨利貞濂溪就利貞上説復字伊川就元字頭説復字以周易卦爻之意推之則伊川之説為正然濂溪伊川之説道理只一般只是所指地頭不同王弼之説與濂溪同胡氏炳文曰天地生物之心即人之本心也皆於幾息而復萌之時見之俞氏琰曰天地之心謂天地生萬物之心也天地生物之心無乎不在聖人於剝反為復靜極動初見天地生物之心未嘗一日息非謂惟復卦見天地之心也或謂靜為天地之心非也或又謂動為天地之心亦非也吳氏曰愼曰天地以生物為心所謂仁也復之一陽初動仁也故曰復其見天地之心乎案天地之心在人則為道心也道心甚微故曰復小而辨於物於是而惟精以察之惟一以守之則道心流行而微者著矣顔子有不善未嘗不知是其精也知之未嘗復行是其一也夫子以初爻之義當之者此也惟精惟一者所以執中而已矣二五皆中故二則休復而吉五則敦復而無悔初爻之外惟此兩爻最善三則頻復而厲者所謂人心危而難安也四之中行而獨者所謂道心微而難著也然皆能自求其心者也至於上六則不獨微而且迷不獨危而且敗迷而以至於敗則所謂天君者不能以自主矣故夫子咎之曰反君道也堯舜相傳之心學皆於復卦見之無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉本義以卦變卦德卦體言卦之善如此故其占當獲大亨而利於正乃天命之當然也其有不正則不利有所往欲何往哉蓋其逆天之命而天不祐之故不可以有行也程傳謂初九也坤初爻變而為震剛自外而來也震以初爻為主成卦由之故初為無妄之主動以天為無妄動而以天動為主也以剛變柔為以正去妄之象又剛正為主於內無妄之義也九居初正也下動而上健是其動剛健也剛健無妄之體也剛中而應五以剛居中正二復以中正相應是順理而不妄也故其道大亨通而貞正乃天之命也天命謂天道也所謂無妄也所謂無妄正而已小失於正則為有過乃妄也所謂匪正蓋由有往若無妄而不往何由有匪正乎無妄者理之正也更有往將何之矣乃入於妄也往則悖於天理天道所不佑可行乎哉集説王氏宗傳曰初九之剛乾一索於坤而得之是以為震而無妄之外體又乾也則初九之剛實自乾來故曰剛自外來震以初爻為主其在無妄則內體也故曰為主於內趙氏彥肅曰剛自外來寄象爾其實天之所賦我固有也胡氏炳文曰外卦為乾震之剛自乾來也無妄釋元亨利貞與臨同命即道也無妄之往程子以為無妄而又往本義只順上文本意解舉首尾句而包中間也不可泥文而失意何氏楷曰震初一剛其所從來即乾之初畫無妄外乾內震初九得外卦乾剛初爻以為內卦之主故曰剛自外來而為主於內案彖言剛來柔來未有言自外來者則王氏諸家謂指外卦乾體者信矣在卦為震得乾最初之畫在人為吾心得天最初之理此所以為無妄也天理非由外鑠我者此特指卦象言之見自乾來之意趙氏之説是矣大畜剛健篤實輝光日新其德本義以卦德釋卦名義程傳以卦之才德而言也乾體剛健艮體篤實人之才剛健篤實則所畜能大充實而有輝光畜之不已則其德日新也集説鄭氏汝諧曰畜有三義以蘊畜言之畜德也以畜養言之畜賢也以畜止言之畜健也剛健篤實輝光日新其德此蘊畜之大者養賢以及萬民此畜養之大者乾天下之至健而四五能畜之此畜止之大者故彖傳兼此三者言之剛上而尚賢能止健大正也本義以卦變卦體釋卦辭程傳剛上陽居上也陽剛居尊位之上為尚賢之義止居健上為能止健之義止乎健者非大正則安能以剛陽在上與尊尚賢德能止至健皆大正之道也集説郭氏忠孝曰大有有賢之卦也大畜畜賢之卦也故曰剛上而尚賢朱子語類云能止健不説健而止見得是艮來止這乾不家食吉養賢也本義亦取尚賢之象集説梁氏寅曰養賢者亦取尚賢之象自剛上而言則謂之尚賢所以盡其禮也自不家食而言則謂之養賢所以重其祿也利涉大川應乎天也本義亦以卦體而言程傳大畜之人所宜施其所畜以濟天下故不食於家則吉謂居天位享天祿也國家養賢賢者得行其道也利涉大川謂大有蘊畜之人宜濟天下之艱險也彖更發明卦才云所以能涉大川者以應乎天也六五君也下應乾之中爻乃大畜之君應乾而行也所行能應乎天無艱險之不可濟況其他乎集説胡氏炳文曰卦有乾體者多曰利涉大川健故也案尚賢止健之義六爻中皆可見然夫子釋卦必以剛健篤實一句居首者蓋莫大於天德剛健者天德也人欲畜其天德非篤實則不能篤實者論語所謂重大學所謂靜中庸所謂暗雖至於達天德而必有以固其聰明聖智故篤實者學之所以成始成終如艮為萬物之所成終而所成始也此義最大故首發之頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也本義釋卦辭程傳貞吉所養者正則吉也所養謂所養之人與養之之道自求口實謂其自求養身之道皆以正則吉也集説李氏舜臣曰古之觀人每每觀其所養而所養之大小則必以其所自養者觀之夫重道義之養而略口體此養之大者也急口體之養而輕道義此養之小者也養其大體則為大人養其小體則為小人天之賦豫初無小大之别而人之所養各殊則其所成就者亦異谷氏家杰曰觀頤者當於所養觀之又當於所養中自養處觀之案李氏谷氏説皆得孟子考其善不善之意天地養萬物聖人養賢以及萬民頤之時大矣哉本義極言養道而贊之程傳聖人極言頤之道而贊其大天地之道則養育萬物養育萬物之道正而已矣聖人作養賢才與之共天位使之食天祿俾施澤於天下養賢以及萬民也養賢所以養萬民也夫天地之中品物之衆非養則不生聖人裁成天地之道輔相天地之宜以養天下至於鳥獸草木皆有養之之政其道配天地故夫子推頤之道贊天地與聖人之功曰頤之時大矣哉或云義或云用或止云時以其大者也萬物之生與養時為大故云時集説趙氏汝梅曰聖人之於萬民豈能家與之粟而人與之衣其急先務者亦曰養賢而已賢得所養則仁恩自及於百姓矣案卦有曰尚賢養賢者皆是六五上九相遇大有大畜頤鼎是也此卦頤為養義而六五又賴上九之養以養人故曰聖人養賢以及萬民也大過大者過也本義以卦體釋卦名義程傳大者過謂陽過也在事為事之大者過與其過之大集説俞氏琰曰大過謂陽之過也在人事則泛言萬事大者之過凡大者皆是非一端也棟橈本末弱也本義復以卦體釋卦辭本謂初末謂上弱謂陰柔程傳謂上下二陰衰弱陽盛則陰衰故為大者過在小過則曰小者過陰過也集説何氏楷曰剛過始致本末之弱本末既弱剛亦不能獨支本末弱即大過之象乃棟所由橈也剛過而中巽而説行利有攸往乃亨本義又以卦體卦德釋卦辭程傳言卦才之善也剛雖過而二五皆得中是處不失中道也下巽上兌是以巽順和説之道而行也在大過之時以中道巽説而行故利有攸往乃所以能亨也集説朱氏震曰剛過而中所謂時中也過非過於理也以過為中也猶之治疾疾勢沈痼必攻之以瞑眩之藥自其治微疾之道視之則謂之過自藥病相對言之則謂之中大過之時君子過越常分以濟弱能達乎時中矣項氏安世曰棟橈二字以六爻之象言之中四爻強初上二爻弱有棟橈之象此禍變之大者也利有攸往亨以六爻之才言之中四爻剛雖大過而得時措之中初上二爻又能巽而説不失人心故利於有行雖遇大變而可以亨此才略之大者也巽而説之下加行字者能以巽説而行是以利有攸往也又曰先言亨後言利有攸往者亨自亨利自利也今先言利有攸往後言亨者明亨因於往也故彖曰利有攸往乃亨言往乃亨不往則不亨也大過之時大矣哉本義大過之時非有大過人之材不能濟也故歎其大程傳大過之時其事甚大故贊之曰大矣哉如立非常之大事興不世之大功成絶俗之大德皆大過之事也集説胡氏炳文曰大過之事甚大無其時不可過有其時無其才愈不可過蔡氏清曰大過之時非時大過也人當大過之時也以其時事宜於大過也其理正小過所謂過以利貞與時行者也大過二字屬人習坎重險也本義釋卦名義集説孔氏穎達曰釋習坎之義險難也若險難不重不須便習今險難既重是險之甚者若不便習不可濟也故注云習坎者習重險也水流而不盈行險而不失其信本義以卦象釋有孚之義言內實而行有常也程傳習坎者謂重險也上下皆坎兩險相重也初六云坎窞是坎中之坎重險也水流而不盈陽動於險中而未出於險乃水性之流行而未盈於坎既盈則出乎坎矣行險而不失其信陽剛中實居險之中行險而不失其信者也坎中實水就下皆為信義有孚也集説朱子語類云坎水只是平不解滿盈是滿出來胡氏炳文曰水字當讀流而不盈行險而不失其信兩句皆指水言以水之內實行有常者釋卦辭有孚之義也俞氏琰曰坎水流水也晝夜常流流則不盈故曰水流而不盈水之流迂回曲折不知更歷幾險而終至於海兹非行險而不失其信者乎梁氏寅曰流而不盈時止則止也盈而後進時行則行也坎以能止為信以能行為功時止時行其君子處險之道與維心亨乃以剛中也行有尚往有功也本義以剛在中心亨之象如是而往必有功也程傳維其心可以亨通者乃以其剛中也中實為有孚之象至誠之道何所不通以剛中之道而行則可以濟險難而亨通也以其剛中之才而往則有功故可嘉尚若止而不行則常在險中矣坎以能行為功天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉本義極言之而贊其大也程傳髙不可升者天之險也山川丘陵地之險也王公君人者觀坎之象知險之不可陵也故設為城郭溝池之險以守其國保其民人是有用險之時其用甚大故贊其大矣哉山河城池設險之大端也若夫尊卑之辨貴賤之分明等威異物采凡所以杜絶陵僭限隔上下者皆體險之用也集説王氏應麟曰下陽舉而虢亡虎牢城而鄭懼西河失而魏蹙大峴度而燕危故曰設險以守其國俞氏琰曰時用謂有時乎用而非用之常也案彖辭發習險之義彖傳又發用險之義習險者練習於艱難之事而無所避立身之大本也用險者自然有嚴峻之象而不可干禦物之大權也天之崇窿不可升地之修阻不可越此天地用險之著者在人則所謂忠信以為甲胄禮義以為干櫓皆此意也其大者則又莫如王公之設險守國蓋用天之道而刑賞之威莫敢以干犯因地之利而河山之固莫敢以窺伺險之用豈不大哉大抵八卦之德皆有其善坎之德險雖微與諸卦不同然以其用言之則亦與諸卦之德同歸矣離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下本義釋卦名義程傳離麗也謂附麗也如日月則麗於天百穀草木則麗於土萬物莫不各有所麗天地之中無無麗之物在人當審其所麗麗得其正則能亨也重明以麗乎正以卦才言也上下皆離重明也五二皆處中正麗乎正也君臣上下皆有明德而處中正可以化天下成文明之俗也集説項氏安世曰日月麗乎天而成明百穀草木麗乎土而成文故離為文又為明齊氏夢龍曰龜山楊氏云火無常形麗物而有形最得本旨人之生也得水為精得火為神其合也氣聚而形成於有其分也氣散而神泯於無蓋精所以為形而神麗於形者也天地形之大者也日月麗天百穀草木麗土其神之發見而可見者也案項氏齊氏説則是陽麗乎陰而以為陰麗乎陽者非矣惟張子正蒙之説得之柔麗乎中正故亨是以畜牝牛吉也本義以卦體釋卦辭程傳二五以柔順麗於中正所以能亨人能養其至順以麗中正則吉故曰畜牝牛吉也或曰二則中正矣五以陰居陽得為正乎曰離主於所麗五中正之位六麗於正位乃為正也學者知時義而不失輕重則可以言易矣集説項氏安世曰重明以麗乎正此統論一卦之義以釋卦名也柔麗乎中正此以二五成卦之爻釋卦辭也胡氏炳文曰坎之剛中九五分數多故九五曰坎不盈卦辭釋有孚亦曰水流而不盈離之中正六二分數多故卦辭曰畜牝牛吉而六二爻辭亦曰黃離元吉御纂周易折中卷九

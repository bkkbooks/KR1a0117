body:
  text: 欽定四庫全書御纂周易折中卷十八序卦傳集說孔氏頴逹曰韓康伯云序卦之所明非易之藴也盖因卦之次托象以明義今驗六十四卦二二相偶非覆即變覆者表裏視之遂成兩卦屯蒙需訟師比之類是也變者反覆惟成一卦則變以對之乾坤坎離大過頤中孚小過之類是也且聖人本定先後若元用孔子序卦之意則不應非覆即變然則康伯所云因卦之次托象以明義盖不虛矣張子曰序卦相受聖人作易須有次序朱子語類問序卦或以為非聖人之書信乎曰此沙隨程氏之說也先儒以為非聖人之藴某以為非聖人之精則可謂非易之藴則不可周子分精與藴字甚分明序卦却正是易之藴事事夾雜都有在裏面問如何謂易之精曰如易有太極是生兩儀兩儀生四象四象生八卦這是易之精問如序卦中亦見消長進退之義喚作不是精不得曰此正是事事夾雜有在裏面正是藴須是自一箇生岀來以至於無窮便是精問易上經三十卦下經三十四卦多寡不均何也曰卦有正對有反對乾坤坎離頤大過中孚小過八卦正對也正對不變故反覆觀之止成八卦其餘五十六卦反對也反對者皆變故反覆觀之共二十八卦以正對卦合反對卦觀之總而為三十六卦其在上經不變卦凡六乾坤坎離頤大過是也自屯蒙而下二十四卦反之則為十二以十二而加六則十八也其在下經不變卦凡二中孚小過是也自咸恒而下三十二卦反之則為十六以十六加二亦十八也其多寡之數則未嘗不均也問序卦中有一二不可曉處如六十四卦獨不言咸卦何也曰夫婦之道即咸也問恐亦知上經不言乾坤但言天地則乾坤可見否曰然項氏安世曰易之稱上下經者未有考也以序卦觀之二篇之分斷可知矣案卦之所以序者必自有故而孔子以義次之就其所次亦足以見天道之盈虛消長人事之得失存亡國家之興衰理亂如孔氏朱子之言皆是也然須知若别為之序則其理亦未嘗不相貫如蓍筮之法一卦可變為六十四卦隨其所遇而其貞與悔皆可以相生然後有以周義理而極事變故曰天下之能事畢也孔子盖因序卦之次以明例所謂舉其一隅焉爾神而眀之則知易道之周流而趨時無定且知筮法之變通而觸類可長此義盖易之旁通至極處也有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也集說項氏安世曰屯不訓盈也當屯之時剛柔始交天地絪緼雷雨動盪見其氣之充塞也是以謂之盈爾故謂之盈者其氣也謂之物之始生者其時也謂之難者其事也若屯之訓紛紜盤錯之義云爾屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稺也物稺不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟集說孔氏頴逹曰上言屯者盈也釋屯次乾坤其言已畢更言屯者物之始生者開說下物生必蒙直取始生之意非重釋屯之名也朱氏震曰蒙冥昧也物生者必始於㝠昧勾萌胎卵是也故次之以蒙蒙童蒙也物如此稺也又曰飲食必有訟乾餱以愆豕酒生禍有血氣者必有争心故次之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也集說韓氏伯曰衆起而不比則争無由息必相親比而後得寧項氏安世曰師比二卦相反師取伍兩卒旅師軍之名比取比閭族黨州鄉之名師以衆正為義比以相親為主比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰本義晁氏云鄭无而泰二字集說姚氏信曰安上治民莫善於禮有禮然後泰泰然後安也項氏安世曰履不訓禮人所履未有外於禮者外於禮則非所當履故以履為有禮也上天下澤亦有禮之名分焉胡氏一桂曰乾坤至履十變隂陽之氣一周矣泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫集說郭氏雍曰以謙有大則絶盈滿之累故優㳺不迫而暇豫也豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也集說韓氏伯曰可大之業由事而生朱氏震曰以喜隨人必有所事臣事君子事父婦事夫弟子事師非樂於所事者其肯隨乎項氏安世曰蠱不訓事物壊則萬事生矣事因壞而起故以蠱為事之先又曰臨不訓大大者以上臨下以大臨小凡稱臨者皆大者之事故以大釋之若豐者大也則真訓大矣吳氏澄曰因蠱之有事而後有臨之盛大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剥也集説崔氏憬曰言徳業大者可以觀於人也蘇氏軾曰君臣父子夫婦朋友之際所謂合也直情而行謂之苟禮以飾情謂之賁苟則易合易則相瀆相瀆則易以離賁則難合難合則相敬相敬則能久飾極則文勝而實衰故剝張氏栻曰賁飾則貴於文文之太過則又滅其質而有所不通故致飾則亨有所盡物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以无妄有无妄然後可畜故受之以大畜集說崔氏憬曰物復其本則為誠實故言復則无妄矣周子曰不善之動妄也妄復則无妄矣无妄則誠矣故无妄次復郭氏忠孝曰健為天徳大畜止健畜天徳也故曰剛健篤實輝光日新其徳不能畜天徳則見於有為者不能无妄故天徳止於大畜而動於无妄也閻氏彦升曰无妄然後可畜所畜者在徳故曰大余氏芑舒曰自有事而大大而可觀可觀而合合而飾所謂忠信之薄而偽之始也故一變而為剝剝而復則真實獨存而不妄矣何氏楷曰不妄與无妄當辨由不妄然後能无妄也物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也集說蘇氏軾曰養而不用其極必動動而不已其極必過閻氏彦升曰養者君子所以成已動者君子所以應物然君子處則中立動則中行豈求勝物哉及其應變則有時或過故受之以大過林氏希元曰不専一則不能直遂不翕聚則不能發散故必有養然後能動不養則不可以動孟子曰人有不為也而後可以有為即此理也故受之以大過大過即動也以大過之才當大過之時而行大過之事是之謂動而本於養也姜氏寳曰無所養則其體不立不可舉動以應大事惟養充而動動必有大過人者矣有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恒恒者久也集說干氏寳曰此詳言人道三綱六紀有自來也人有男女隂陽之性則自然有夫婦配合之道隂陽化生血體相傳則自然有父子之親以父立君以子資臣則必有君臣之位有君臣之位故有上下之序有上下之位則必禮以定其體義以制其宜明先王制作盖取之於情者也上經始於乾坤有生之本也下經始於咸恒人道之首也易之興也當殷之末世有妲己之禍當周之盛徳有三母之功以言天不地不生夫不婦不成相須之至王教之端故詩以闗睢為國風之始而易於咸恒備論禮義所由生也朱子語類問禮義有所錯錯字陸氏兩音如何曰只是作措字謂禮義有所設施耳吳氏澄曰此言咸所以為下經之首也夫婦謂咸卦先言天地萬物男女者有夫婦之所由也後言父子君臣上下者有夫婦之所致也有夫婦則其所生為父子由家而國雖非父子也而君尊臣卑之分如父子也由國而天下雖非君臣而上貴下賤之分如君臣也禮義所以分别尊卑貴賤之等錯猶置也乾坤咸不出卦名者以其為上下經之首卦特别言之物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人集說郭氏忠孝曰傷乎外者必反其家盖行有不得於人則反求諸己閻氏彦升曰知進而已不知消息盈虛與時偕行則傷之者至矣故受之以眀夷以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相収也明夷之傷豈得不反於家人乎何氏楷曰晉與漸皆進進必有歸者先以艮進必有傷者先以壯也家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也集説周子曰家人離必起於婦人故睽次家人以二女同居而志不同行也朱子語類問緩字恐不是遲緩之緩乃是懈怠之意故曰解緩也曰緩是散漫意問如縱弛之類曰然項氏安世曰凡言屯者皆以為難而蹇又稱難者卦皆有坎也然屯動乎險中行乎患難者也蹇見險而止但為所阻難而不得前耳非患難之難也故居屯者必以經綸濟之遇蹇者待其解緩而後前緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也集說朱氏震曰益久必盈盈則必決隄防是已故次之以夬胡氏一桂曰咸恒十變為損益亦猶乾坤十變為否泰也俞氏琰曰損益盛衰若循環然損而不已天道復還故必益益而不已則所積滿盈故必決此乃理之常也損之後繼以益深谷為陵之意也益之後繼以夬髙岸為谷之意也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井集說崔氏憬曰冥升在上則窮故言升而不已必困也張氏栻曰天下之物散之則小合而聚之則積小以成其髙大故聚而上者為升也項氏安世曰物相遇而聚者彼此之情交相會也以衆言之也比而有所畜者係而止之也自我言之也畜有止而聚之義聚者不必止也井道不可不革故受之以革集說朱氏震曰井在下者也井久則穢濁不食治井之道革去其害井者而已革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也集說閻氏彦升曰晉者進也進必有所傷漸者進也進必有歸何也曰晉所謂進者有進而已此進必有傷也漸之所謂進者漸進而已烏有不得所歸者乎朱氏震曰前曰與人同者物必歸焉故受之以大有此曰得其所歸者必大大有次同人者處大之道也豐次歸妹者致大之道也案得其所歸猶言得其所依歸也婦得賢夫而配之臣得聖君而事之皆得其所歸之謂故同人之物必歸焉者人歸已也此之得其所歸者已歸人也兩者皆足以致事業之大窮大者必失其居故受之以旅旅而无所容故受之以巽巽者入也集說郭氏雍曰動極而止止極復進進極必傷進以漸則有歸歸得其所則大窮其大則必失盖非有大以謙故也張氏栻曰旅者親寡之時无所容也惟巽然後得所入故受之以巽而巽者入也俞氏琰曰大而能謙則豫大而至於窮極則必失其所安故豐後繼以旅入而後說之故受之以兌兌者說也說而後散之故受之以渙渙者離也集說張氏栻曰入於道故有見而說故㢲而受之以兌惟說於道故推而及人說而後散故受之以渙項氏安世曰人之情相拒則怒相入則說故入而後說之物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過集說韓氏伯曰孚信也既已有節則宜信以守之守其信者則失貞而不諒之道而以信為過故曰小過也項氏安世曰有其信猶書所謂有其善言以此自負而居有之也自恃其信者其行必果而過於中吳氏澄曰過者行動而踰越之也故大過云動小過云行凡行動未至其所為未及既至其所為至既至而又動又行則為踰越其所至之地而過也蔡氏清曰節而信之必立為節制於此上之人當信而守之下之人當信而行之故受之以中孚有其信者必行之若果於自信則於事不加詳審而在所必行矣能免於過乎有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉集說韓氏伯曰行過乎恭用過乎儉可以矯世勵俗有所濟也項氏安世曰大過則踰越常理故必至於陷小過或可濟事故有濟而無陷也坎離之交謂之既濟此生生不窮之所從出也而聖人猶以為有窮也又分之以為未濟此即咸感之後繼之以恒久之義也盖情之交者不可以久而無弊故必以分之正者終之總論王氏通中説讚易至序卦曰大哉時之相生也逹者可與幾矣至雜卦曰旁行而不流守者可與存義矣邵子曰乾坤天地之本坎離天地之用是以易始於乾坤中於坎離終於既未濟而泰否為上經之中咸恒為下經之首皆言乎其用也又曰乾坤坎離為上篇之用兌艮震㢲為下篇之用也頤中孚大過小過為二篇之正也又曰自乾坤至坎離以天道也自咸恒至既濟未濟以人事也程子上下篇義曰乾坤天地之道隂陽之本故為上篇之首坎離隂陽之成質故為上篇之終咸恒夫婦之道生育之本故為下篇之首未濟坎離之合既濟坎離之交合而交則生物隂陽之成功也故為下篇之終二篇之卦既分而後推其義以為之次序卦是也卦之分則以隂陽陽盛者居上隂盛者居下所謂盛者或以卦或以爻卦與爻取義有不同如剝以卦言則隂長陽剝也以爻言則陽極於上又一陽為衆隂主也如大壯以卦言則陽長而壯以爻言則隂盛於上用各於其所不相害也乾父也莫亢焉坤母也非乾無與為敵也故卦有乾者居上篇有坤者居下篇而復陽生臨陽長觀陽盛剝陽極則雖有坤而居上姤隂生遯隂長大壯隂盛夬陰極則雖有乾而居下其餘有乾者皆在上篇泰否需訟小畜履同人大有无妄大畜也有坤而在上篇皆一陽之卦也卦五隂而一陽則一陽為之主故一陽之卦皆在上篇師謙豫比復剝也其餘有坤者皆在下篇晉明夷萃升也卦一隂五陽者皆有乾也又陽衆而盛也雖衆陽說於一隂說之而已非如一陽為衆隂主也王弼云一隂為之主非也故一隂之卦皆在上篇小畜履同人大有也卦二陽者有坤則居下篇小過雖無坤隂過之卦也亦在下篇其餘二陽之卦皆一陽生於下而逹於上又二體皆陽陽之盛也皆在上篇屯蒙頤習坎也陽生於下謂震坎在下震生於下也坎始於中也逹於上謂一陽至上或得正位生於下而上逹陽暢之盛也陽生於下而不逹於上又隂衆而陽寡復失正位陽之弱也震也解也上有陽而下無陽無本也艮也蹇也震坎艮以卦言則陽也以爻言則皆始變㣲也而震之上艮之下無陽坎則陽陷皆非盛也惟習坎則陽上逹矣故為盛卦二隂者有乾則陽盛可知需訟大畜无妄也無乾而為盛者大過也離也大過陽盛於中上下之隂弱矣陽居上下則綱紀於隂頤是也隂居上下不能主制於陽而反弱也必上下各二隂中惟兩陽然後為勝小過是也大過小過之名可見也離則二體上下皆陽隂實麗焉陽之盛也其餘二隂之卦二體俱隂隂盛也皆在下篇家人睽革鼎㢲兌中孚也卦三隂三陽者敵也則以義為勝隂陽尊卑之義男女長少之序天地之大經也陽少於隂而居上則為勝蠱少陽居長隂上賁少男在中女上皆陽盛也坎雖陽卦而陽為隂所陷溺也又與隂卦重陰盛也故隂陽敵而有坎者皆在下篇困井渙節既濟未濟也或曰一體有坎尚為陽陷二體皆坎反為陽盛何也曰一體有坎陽為隂所陷又重於陰也二體皆坎陽生於下而逹於上又二體皆陽可謂盛矣男在女上乃理之常未為盛也若失正位而隂反居尊則弱也故恒損歸妹豐皆在下篇女在男上隂之勝也凡女居上者皆在下篇咸益漸旅困渙未濟也唯隨與噬嗑則男下女非女勝男也故隨之彖曰剛來而下柔噬嗑彖曰柔得中而上行長陽非少隂可敵以長男下中少女故為下之若長少敵勢力侔則隂在上為陵陽在下為弱咸益之類是也咸亦有下女之象非以長下少也乃二少相感以相與所以致陵也故有利貞之戒困雖女少於男乃陽陷而為隂揜無相下之義也小過二陽居四隂之中則為隂盛中孚二隂居四陽之中而不為陽盛何也曰陽體實中乎中虛也然則頤中四隂不為虛乎曰頤二體皆陽卦而本末皆陽盛之至也中孚二體皆隂卦上下各二陽不成本末之象以其中虛故為中孚隂盛可知矣項氏安世曰上經言天地生萬物以氣而流形故始於乾坤終於坎離言氣化之本也下經言萬物之相生以形而傳氣故始於咸恒終於既濟未濟言夫婦之道也蔡氏清曰序卦之義有相反者有相因者相反者極而變者也相因者其未至於極者也總不出此二例雜卦傳集說孔氏頴逹曰序卦依文王上下而次序之此雜卦孔子更以意錯雜而對辨其次第不與序卦同朱子語類云卦有反有對乾坤坎離是反艮兌震㢲是對乾坤坎離倒轉也只是四卦艮兌震㢲倒轉則為中孚頤小過大過其餘皆是對卦又云八卦便只是六卦乾坤坎離是四正卦兌便是翻轉底巽震便是翻轉的艮六十四卦只八卦是正卦餘便只二十四卦翻轉為五十六卦中孚是箇雙夾底離小過是箇雙夾的坎大過是箇厚畫底坎頤是箇厚畫底離又云三畫之卦只是六卦即六畫之卦以正卦八加反卦二十有八為三十有六六六三十六也邵子謂之暗卦小成之卦八即大成之卦六十四八八六十四也三十六與六十四同龍氏仁夫曰桉春秋傳釋繫辭所謂屯固比入坤安震殺之屬以一字斷卦義往往古筮書多有之雜卦此類是也夫子存之為經羽翼非創作也乾剛坤柔比樂師憂集說蘇氏軾曰有親則樂動衆則憂朱氏震曰比得位而衆比之故樂師犯難而衆從之故憂憂樂以天下也臨觀之義或與或求本義以我臨物曰與物來觀我曰求或曰二卦互有與求之義集說郭氏雍曰臨與所臨觀與所觀二卦皆有與求之義或有與無求或有求無與皆非臨觀之道屯見而不失其居蒙雜而著本義屯震遇坎震動故見坎險不行也蒙坎遇艮坎幽昧艮光明也或曰屯以初言蒙以二言集說蘇氏軾曰君子以經綸故曰見盤桓利居貞故曰不失其居蒙以養正蒙正未分故曰雜童明故曰著龔氏原曰不見則不足以濟衆不居則不足以為主柴氏中行曰在蒙昧之中雖未有識别而善理昭著震起也艮止也損益盛衰之始也集說虞氏翻曰震陽動行故起艮陽終止故止朱氏震曰陽起於坤而出震則静者動陽止於艮而入坤則動者静郭氏雍曰損己必盛故為盛之始益己必衰故為衰之始消長相循在道常如是也俞氏琰曰損益蓋未至於盛衰而盛衰自此始也錢氏志立曰損益否泰為盛衰反復之介易所㝡重者也雜卦於他卦分舉而損益否泰則合舉之以明盛衰之無常反復之甚速也周易自乾坤至否泰十二卦自咸恒至損益十二卦此除乾坤外自比師至損益十卦自咸恒至泰否十卦大畜時也无妄災也本義止健者時有適然无妄而災自外至集說郭氏雍曰君子藏器於身待時而動然則多識前言往行以畜其徳亦以待時也无妄之謂災其餘自作孽而已故无妄匪正有眚何氏楷曰大畜若上九天衢之亨可謂得時矣然無畜而時不謂時也大畜故謂之時耳无妄若六三或繫之牛可謂逢災矣然有妄而災不謂災也无妄故謂之災耳萃聚而升不來也謙輕而豫怠也集說郭氏雍曰謙輕已豫怠已也以樂豫故心怠是以君子貴知㡬朱子語類云輕是不自尊重卑小之義豫是悦之極便放倒了如上六冥豫是也項氏安世曰自以為少故謙自以為多故豫少故輕多故怠柴氏中行曰謙者視己若甚輕豫則有滿盈之志而怠矣張氏振淵曰萃有聚而尚往之義升有往而不反之義噬嗑食也賁无色也本義白受采集說郭氏雍曰賁以白賁无咎故无色則質全有天下之至賁存焉項氏安世曰物消曰食噬者合則強物消矣案此二語之義即所謂食取其充腹衣取其蔽體者也若飫於膏梁則噬之不能合而失飲食之正若競於華美則目迷五色而非自然之文兌見而巽伏也本義兌隂外見巽隂内伏集說何氏楷曰巽本以隂在下為能巽也彖傳乃為剛巽乎中正而志行柔皆順乎剛兌本以隂在上為能説也彖傳乃謂剛中而柔外說以利貞蓋終主陽也云爾隨无故也蠱則飭也本義隨前无故蠱後當飭集說俞氏琰曰故謂故舊與革去故之故同隨人則忘舊蠱則飭而新也案无故猶荘子言去故人心有舊見則不能隨人故堯舜舎己從人者无故也剝爛也復反也集說項氏安世曰剝爛盡復反生也凡果爛而仁生物爛而蠱生木葉爛而根生糞壤爛而苗生皆剝復之理也徐氏㡬曰剝爛則陽窮於上復反則陽生於下猶果之爛墜於下則可種而生矣晉晝也明夷誅也本義誅傷也集說虞氏翻曰離日在上故晝也明入地中故誅也郭氏雍曰晋與明夷朝暮之象也故言明出地上明入地中誅亦傷也井通而困相遇也本義剛柔相遇而剛見揜也集說張子曰澤无水理勢適然故曰相遇朱氏震曰往來不窮故曰井通遇陰則見揜而困惟其時也郭氏雍曰往來井井則其道通困遇剛揜所以為困項氏安世曰自乾坤至此三十卦正與上經之數相當而下經亦以咸恒為始以此見卦雖以雜名而乾坤咸恒上下經之首則未嘗雜也咸速也恒久也本義咸速恒久集說蔡氏淵曰有感則應故速常故能久蔡氏清曰咸非訓速也天下之事無速於感通者坎曰咸速渙離也節止也解緩也蹇難也睽外也家人内也否泰反其類也集說虞氏翻曰渙散故離節制度數故止張子曰天下之難既觧故安於佚樂毎失於緩蹇者見險而止故為難項氏安世曰渙節正與井困相反井以木出水故居塞而能通渙則以水浮木故通之極而至於散也節以澤上之水故居通而能塞困為澤下之水故塞之極而至於困也徐氏㡬曰睽者疏而外也家人者親而内也俞氏琰曰渙節皆有坎水風以散之則離澤以瀦之則止徐氏在漢曰外猶言外之也非内外之外以情之親疏為内外也大壯則止遯則退也本義止謂不進集說郭氏雍曰壮不知止小人之壮也君子之壯則有止遯之退大壮之止則克己之道趙氏玉泉曰大壯以壮趾為凶用壮為厲欲陽之知所止也遯以嘉遯為吉肥遯為利欲陽之知所處也何氏楷曰壯不可用宜止不宜躁遯與時行應退不應進止者難進退者易退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故親寡旅也本義既明且動其故多矣集說朱氏震曰大有六五柔得尊位而有其衆有其衆則衆亦歸之故曰大有衆也同人六二得中得位而同乎人同乎人則人亦親之故曰同人親也潘氏夢旂曰物盛則多故旅寓則少親離上而坎下也本義火炎上水潤下小畜寡也履不處也本義不處行進之義集說龔氏原曰柔為君故大有則衆柔為臣故小畜則寡案寡者一隂雖得位而畜衆陽其力寡也不處者一隂不得位而行乎衆陽之中不敢寧處也需不進也訟不親也集說李氏舜臣曰乾上離下為同人火性炎上而趨乾故曰同人親也乾上坎下為訟水性就下與乾違行故不親也大過顚也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也本義自大過以下卦不反對或疑其錯簡今以韻協之又似非誤未詳何義集說韓氏伯曰剛柔失位其道未濟故曰窮也朱子語類云女待男而行所以為漸又云雜卦以乾為首不終之以他卦而必終之以夬者盖夬以五陽决一隂決去一隂則復為純乾矣項氏安世曰大過之象本末俱弱而在雜卦之終聖人作易示天下以無終窮之理教人以撥亂反正之法是故原其亂之始生於姤而極其勢之上窮於夬以示㣲之當防盛之不足畏自夬而乾有終而復始之義也又曰自大過以下特皆以男女為言至夬而明言之曰君子小人然則聖人之意斷可識矣胡氏炳文曰本義謂自大過以下或疑其錯簡以韻協之又似非誤愚竊以為雜物撰徳非其中爻不備此盖指中四爻互體而言也先天圖之左互復頤既濟家人歸妹睽夬乾八卦右互姤大過未濟解漸蹇剝坤八卦此則於右取姤大過未濟漸四卦於左取頤既濟歸妹夬四卦各舉其半可兼其餘矣始於乾終於夬夬之一隂决盡則為乾御纂周易折中卷十八

body:
  text: 欽定四庫全書經部一御纂周易折中易類提要臣等謹案御纂周易折中二十二卷康熙五十四年聖祖仁皇帝御纂自宋以來惟説易者至夥亦惟説易者多岐門戶交增務求相勝遂至各倚於一偏故數者易之本主數太過使魏伯陽陳摶之説竄而相雜而易入於道家理者易之蘊主理太過使王宗傅楊簡之説溢而旁出而易入於釋氏明永樂中官修易經大全龎雜割裂無所取裁由羣言淆亂無聖人以折其中也我聖祖仁皇帝道契羲文心符周孔幾餘典學深見彌綸天地之源詔大學士李光地採托羣言恭呈乙覽以定著是編冠以圖説殿以啓蒙未嘗不用數而不以盛談河洛致晦玩占觀象之元冠以程傅次以本義未嘗不主理而不以屏斥讖緯併廢互體變爻之用其諸家訓解或不合於伊川紫陽而實足發明經義者皆兼收並採不病異同惟一切支離幻渺之説咸斥不録不使溷四聖之遺文蓋數百年分朋立異之見至是而盡融數千年畫卦繫詞之旨乃至是而大彰矣至於經傳分編一從古本尤足正費直以來割裂綴附之失焉乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀

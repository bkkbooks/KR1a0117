body:
  text: 欽定四庫全書御纂周易折中卷二十啓蒙下眀蓍策第三大衍之數五十河圖洛書之中數皆五衍之而各極其數以至於十則合為五十矣河圖積數五十五其五十者皆因五而後得獨五為五十所因而自無所因故虛之則但為五十又五十五之中其四十者分為陰陽老少之數而其五與十者無所為則又以五乘十以十乘五而亦皆為五十矣洛書積數四十五而其四十者散布於外而分陰陽老少之數唯五居中而無所為則亦自含五數而並為五十矣案洪範曰卜五占用二衍忒衍者推衍也忒者過差也卜筮所以推衍人事之過差故揲蓍之法謂之大衍大音太如太卜太筮之比乃尊之之稱非如先儒小衍大衍之説也五十之數説者不一惟推本於圖書者得之河圖之數則贏五數之體也洛書之數則虛五數之用也大衍者其酌河洛之數之中而兼體用之理之備者與其用四十有九大衍之數五十而蓍一根百莖可當大衍之數者二故揲蓍之法取五十莖為一握置其一不用以象太極而其當用之策凡四十有九蓋兩儀體具而未分之象也集説崔氏憬曰其用四十有九者法長陽七七之數也六十四卦既法長隂八八之數故四十九蓍則法長陽七七之數蓍圓而神象天卦方而智象地陰陽之别也捨一不用者以象太極虛而不用也邵子曰蓍之用數挂一以象三其餘四十八則一卦之策也四其十二為四十八也十二去三而用九四三十二所去之策也四九三十六所用之策也十二去五而用七四五二十所去之策也四七二十八所用之策也十二去六而用六四六二十四所去之策也四六二十四所用之策也十二去四而用八四四十六所去之策也四八三十二所用之策也是故七九為陽六八為陰九者陽之極數六者陰之極數數極則反故為卦之變也又曰奇數極於四而五不用策數極於九而十不用故去五十而用四十九也分而為二以象兩挂一以象三揲之以四以象四時歸奇於扐以象閏五歲再閏故再扐而後挂挂者懸於小指之間揲者以大指食指間而别之奇謂餘數扐者扐於中三指之兩間也蓍凡四十有九信手中分各置一手以象兩儀而挂右手一策於左手小指之間以象三才遂以四揲左手之策以象四時而歸其餘數於左手第四指間以象閏又以四揲右手之策而再歸其餘數於左手第三指間以象再閏五歲之象挂一一也揲左二也扐左三也揲右四也扐右五也是謂一變其挂扐之數不五即九案河圖之中宫太極也洛書之中宫人極也故大衍之數具虛一者既以象太極之無為其挂一者又以象人極之參贊虛一之後繼以分二者眀乎分陰分陽造化之本也挂一之後繼以揲四歸奇者明乎定時成歲人事之綱也分二挂一則天地設位而人立焉而三才之體具矣揲四歸奇則四氣交運五行參差百物生焉萬事起焉而三才之用行矣大衍之數所以為酌河洛之中而兼體用之備者如此扐挂扐挂扐挂得五者三所謂奇也五除挂一即四以四約之為一故為奇即兩儀之陽數也得九者一所謂耦也九除挂一即八以四約之為二故為耦即兩儀之陰數也一變之後除前餘數復合其見存之策或四十或四十四分挂揲歸如前法是謂再變其挂扐者不四則八扐挂扐挂得四者二所謂奇也不去挂一餘同前義得八者二所謂耦也不去挂一餘同前義再變之後除前兩次餘數復合其見存之策或四十或三十六或三十二分挂揲歸如前法是謂三變其挂扐者如再變例三變既畢乃合三變視其挂扐之奇耦以分所遇陰陽之老少是謂一爻右三奇為老陽者凡十有二挂扐之數十有三除初挂之一為十有二以四約而三分之為一者三一奇象圓而圍三故三一之中各復有三而積三三之數則為九過揲之數三十有六以四約之亦得九焉挂扐除一四分四十有八而得其一也一其十二而三其四也九之母也過揲之數四分四十八而得其三也三其十二而九其四也九之子也皆徑一而圍三也即四象太陽居一含九之數也右兩奇一耦以耦為主為少陰者凡二十有八挂扐之數十有七除初挂之一為十有六以四約而三分之為一者二為二者一一奇象圓而用其全故二一之中各復有三二耦象方而用其半故一二之中復有二焉而積二三一二之數則為八過揲之數三十有二以四約之亦得八焉挂扐除一四其四也自一其十二者而進四也八之母也過揲之數八其四也自三其十二者而退四也八之子也即四象少陰居二含八之數也右兩耦一奇以奇為主為少陽者凡二十挂扐之數二十有一除初挂之一為二十以四約而三分之為二者二為一者一二耦象方而用其半故二二之中各復有二一奇象圓而用其全故一三之中復有三焉而積二二一三之數則為七過揲之數二十有八以四約之亦得七焉挂扐除一五其四也自兩其十二者而退四也七之母也過揲之數七其四也自兩其十二者而進四也七之子也即四象少陽居三含七之數也三二一右三耦為老陰者四挂扐之數二十有五除初挂之一為二十有四以四約而三分之為二者三二耦象方而用其半故三二之中各復有二而積三二之數則為六過揲之數亦二十有四以四約之亦得六焉挂扐除一六之母也過揲之數六之子也四分四十有八而各得其二也兩其十二而六其四也皆圍四而用半也即四象太陰居四含六之數也集説蔡氏元定曰蓍之奇數老陽十二老陰四少陽二十少陰二十八合六十有四三十二為陽老陽十二少陽二十三十二為陰老陰四少陰二十八其十六則老陽老陰也老陽十二老陰四其四十八則少陽少陰也少陽二十少陰二十八老陽老陰乾坤之象也二八也少陽少陰六子之象也六八也凡此四者皆以三變皆挂之法得之蓋經曰再扐而後挂又曰四營而成易其指甚明注疏雖不詳説然劉禹錫所記僧一行畢中和顧彖之説亦已備矣近世諸儒乃有前一變獨挂後二變不挂之説考之於經乃為六扐而後挂不應五歲再閏之義且後兩變又止三營蓋已誤矣集説胡氏方平曰案王輔嗣注云分而為二一營也挂一象三二營也揲之以四三營也歸奇於扐四營也孔頴逹疏云再扐而後挂者既分天於左手地於右手乃四四揲天之數最末之餘歸之合為挂扐之一處是一扐也又以四四揲地之數最末之餘又合於前所歸之扐而總扐之是再扐而後挂也劉禹錫辨易九六論云畢中和之學其傳原於一行禪師一行唐開元時所作大衍厯本議云綜盈虛之數五歲而再閏蓋其衍法皆以再扐而後挂也畢中和有揲法其言三揲皆挂正合四營之義朱子亦謂畢氏揲法視疏義為詳顧彖之説未詳禹錫又自言揲法第一指餘一益三餘二益二餘三益一餘四益四第二指餘一益二餘二益一餘三益四餘四益三第三指與第二指同此可以見三變皆挂矣近世儒者若郭雍所著蓍卦辨疑專以前一變獨挂後二變不挂其載橫渠先生之言曰再扐而後挂每成一爻而後挂也謂第二第三揲不挂也且謂橫渠之言所以明注疏之失朱子辨之曰此説大誤恐非橫渠之言也再扐者一變之中左右再揲而再扐也一挂再揲再扐而當五歲蓋一挂再揲當其不閏之年而再扐當其再閏之歲也而後挂者一變既成又合見存之策分二挂一以起後變之端也今曰第一變挂而第二第三變不挂遂以當挂之變為挂而象閏以不挂之變為扐而當不閏之歲則與大傳所云挂一象三再扐象閏者全不相應矣且不數第一變之再扐而以第二第三變為再扐又使第二第三變中止有三營而不足乎成易之數且於陰陽老少之數亦多有不合者其載伊川先生之説曰再以左右手分而為二更不重挂奇朱子辨之曰此説尤多可疑然郭氏云本無文字則其傳授之際不無差舛宜矣郭氏又云第二第三揲雖不挂亦有四八之變蓋不必挂也朱子辨之曰所以不可不挂者有兩説蓋三變之中前一變屬陽故其餘五九皆奇數後二變屬陰故其餘四八皆耦數屬陽者為陽三而隂一皆圍三徑一之術屬陰者為陰二而陽二皆以圍四用半之術也是皆以三變皆挂之法得之後兩變不挂則不得也三變之後其可為老陽者十二可為老隂者四可為少陰者二十八可為少陽者二十雖多寡之不同而皆有法象是亦以三變皆挂之法得之而後兩變不挂則不得也郭氏僅見第二第三變可以不挂之一端耳而遂執以為説夫豈知其挂與不挂之為得失乃如此哉大抵郭氏他説偏滯雖多而其為法尚無甚戾獨此一義所差雖小而深有害於成卦變爻之法尤不可不辨愚嘗考之第一變獨挂後二變不挂非特為六扐而後挂三營而成易於再扐四營之義不協且後二變不挂其數雖亦不四則八而所以為四八者實有不同蓋挂則所謂四者左手餘一則右手餘二左手餘二則右手餘一不挂則左手餘一右手餘三左手餘二右手餘二左手餘三右手餘一此四之所以不同也挂則所謂八者左手餘四右手餘三左手餘三右手餘四不挂則左手餘四右手亦餘四此八之所以不同也三變之後陰陽變數皆參差不齊無復自然之法象矣且用舊法則三變之中又以前一變為奇後二變為耦奇故其餘五九耦故其餘四八餘五九者五三而九一亦圍三徑一之義也餘四八者四八皆二亦圍四用半之義也三變之後老者陽饒而陰乏少者陽少而陰多亦皆有自然之法象焉蔡元定曰案五十之蓍虛一分二挂一揲四為奇者三為耦者二是天三地二自然之數而三揲之變老陽老陰之數本皆八合之得十六陰陽以老為動而隂性本靜故以四歸於老陽此老陰之數所以四老陽之數所以十二也少陽少陰之數本皆二十四合之四十八陰陽以少為靜而陽性本動故以四歸於少陰此少陽之數所以二十而少陰之數所以二十八也陽用老而不用少故六十四變所用者十六變又以四約之陽用其三陰用其一蓋一奇一耦對待者陰陽之體陽三陰一一饒一之者陰陽之用故四時春夏秋生物而冬不生物天地東西南可見而北不可見人之瞻視亦前與左右可見而背不可見也不然則以四十九蓍虛一分二挂一揲四則為奇者二為耦者二而老陽得八老陰得八少陽得二十四少陰得二十四不亦善乎聖人之智豈不及此而其取此而不取彼者誠以陰陽之體數常均用數則陽三而陰一也集説蘇氏軾曰唐一行之學以為三變皆少則乾之象也乾所以為老陽而四數其揲得九故以九名之三變皆多則坤之象也坤所以為老陰而四數其揲得六故以六名之三變而少者一則震坎艮之象也震坎艮所以為少陽而四數其揲得七故以七名之三變而多者一則巽離兌之象也巽離兌所以為少陰而四數其揲得八故以八名之故七八九六者因揲數以名陰陽而隂陽之所以為老少者不在乎是而在乎三變之間八卦之象也此唐一行之學也朱子文集曰初一變得五者三得九者一故曰餘五九者五三而九一後二變得四者二得八者二故曰餘四八者四八皆二三變之後為老陽者十有二老陰四故曰陽饒而陰乏少陽二十少陰二十八故曰陽少而陰多沈氏筆談云易象九為老陽七為少陽八為少陰六為老陰其九七八六之數皆有所從來得之自然非意之所配也凡歸餘之數有多有少多為陰如爻之耦少為陽如爻之奇三少乾也故曰老陽九揲而得之故其數九其策三十六兩多一少則一少為之主震坎艮也故皆謂之少陽少在初為震中為坎末為艮皆七揲而得之故其數七其策二十有八三多坤也故曰老陰六揲而得之故其數六其策二十有四兩少一多則一多為之主巽離兌也故皆謂之少陰多在初謂之巽中為離末為兌皆八揲而得之故其數八其策三十有二諸家揲蓍説惟筆談簡而盡孔頴逹非不曉揲法者但為之不熟故其言之易差然其於大數亦不差也畢中和視疏義為詳栁子厚詆劉夢得以為膚末於學者誤矣畢論三揲皆挂一正合四營之義惟以三揲之挂扐分措於三指間為小誤然於其大數亦不差也其言餘一益三之屬乃夢得立文太簡之誤使讀者疑其不出於自然而出於人意耳此與孔氏之説不可不正然恐亦不可不原其情也蔡氏所謂以四十九蓍虛一分二挂一揲四者蓋謂虛一外止用四十八分挂揲之餘為奇耦各二老陽老陰變數各八少隂少陽變數各二十四合為六十四八卦各得八焉然此乃奇耦對待加倍而得者體數也若天三地二衍而為五十者用數也蓋體數常均用數則陽饒而陰乏也此正造化之妙若陰陽同科老少一例是體數非用數也若用近世之法則三變之餘皆為圍三徑一之義而無復奇耦之分三變之後為老陽少陰者皆二十七為少陽者九為老陰者一又皆參差不齊而無復自然之法象此足以見其説之誤矣至於陰陽老少之所以然者則請復得而通論之蓋四十九策除初挂之一而為四十八以四約之為十二以十二約之為四故其揲之一變也挂扐之數一其四者為奇兩其四者為耦其三變也挂扐之數三其四一其十二而過揲之數九其四三其十二者為老陽挂扐過揲之數皆六其四兩其十二者為老陰自老陽之挂扐而增一四則是四其四也一其十二而又進一四也自其過揲者而損一四則是八其四也三其十二而損一四也此所謂少陰者也自老陰之挂扐而損一四則是五其四也兩其十二而去一四也自其過揲而增一四則是七其四也兩其十一而進一四也此所謂少陽者也二老者陰陽之極也二極之間相距之數凡十有二而三分之自陽之極而進其挂扐退其過揲各至於三之一則為少陰自陰之極而退其挂扐進其過揲各至於三之一則為少陽老陽居一而含九故其挂扐十二為最少而過揲三十六為最多少陰居二而含八故其挂扐十六為次少而過揲三十二為次多少陽居三而含七故其挂扐二十為稍多而過揲二十八為稍少老陰居四而含六故其挂扐二十四為極多而過揲亦二十四為極少蓋陽奇而陰耦是以挂扐之數老陽極少老陰極多而二少者一進一退而交於中焉此其以少為貴者也陽實而陰虛是以過揲之數老陽極多老陰極少而二少者亦一進一退而交於中焉此其以多為貴者也凡此不唯陰之與陽既為二物而迭為消長而其一物之中此二端者又各自為一物而迭為消長其相與低昻如權衡其相與判合如符契固有非人之私智所能取舍而有無者而况挂扐之數乃七八九六之原而過揲之數乃七八九六之委其勢又有輕重之不同而或者乃欲廢置挂扐而獨以過揲之數為斷則是舍本而取末去約以就繁而不知其不可也豈不誤哉集説歸氏有光曰九具於揲則三奇見於餘六具於揲則三耦見於餘七具於揲則二耦一奇見於餘八具於揲則二奇一耦見於餘不必反觀其在揲之數而巳舉其要矣其曰乾之策二百一十有六坤之策百四十有四二篇之策萬有一千五百二十何也挂扐雖舉其要而七八九六之數仍以在揲之策為正七八九六者自揲之以四而取也若挂扐之策因過揲而見者也故曰揲之以四以象四時又曰當期之日而歸奇以象閏何氏楷曰案翼言揲四以象四時歸奇以象閏四時正也閏餘也下文云乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也皆以七八九六起數明乎用正數而不用餘數矣案歸氏何氏之説亦可與朱子相參酌邵子曰五與四四去挂一之數則四三十二也九與八八去挂一之數則四六二十四也五與八八九與四八去挂一之數則四五二十也九與四四五與四八去挂一之數則四四十六也故去其三四五六之數以成九八七六之策此之謂也一爻已成再合四十九策復分挂揲歸以成一變每三變而成一爻並如前法乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日乾之策二百一十有六者積六爻之策各三十六而得之也坤之策百四十有四者積六爻之策各二十有四而得之也凡三百六十者合二百一十有六百四十有四而得之也當期之日者每月三十日合十二月為三百六十也蓋以氣言之則有三百六十六日以朔言之則有三百五十四日今舉氣盈朔虛之中數而言故曰三百有六十也然少陽之策二十八積乾六爻之策則一百六十八少陰之策三十二積坤六爻之策則一百九十二此獨以老陰陽之策為言者以易用九六不用七八也然二少之合亦三百有六十二篇之策萬有一千五百二十當萬物之數也二篇者上下經六十四挂也其陽爻百九十二每爻各三十六策積之得六千九百一十二陰爻百九十二每爻二十四策積之得四千六百八又合二者為萬有一千五百二十也若為少陽則每爻二十八策凡五千三百七十六少陰則每爻三十二策凡六千一百四十四合之亦為萬一千五百二十也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣四營者四次經營也分二者第一營也挂一者第二營也揲四者第三營也歸奇者第四營也易變易也謂揲之一變也四營成變三變成爻一變而得兩儀之象再變而得四象之象三變而得八卦之象一爻而得兩儀之畫二爻而得四象之畫三爻而得八卦之畫四爻成而得其十六者之一五爻成而得其三十二者之一至於積七十二營而成十有八變則六爻見而得乎六十四卦之一矣然方其三十六營而九變也已得三畫而八卦之名可見則內卦之為貞者立矣此所謂八卦而小成者也自是而往引而伸之又三十六營九變以成三畫而再得小成之卦者一則外卦之為悔者亦備矣六爻成內外卦備六十四卦之别可見然後視其爻之變與不變而觸類以長焉則天下之事其吉凶悔吝皆不越乎此矣顯道神德行是故可與酬酢可與祐神矣道因辭顯行以數神酬酢者言幽明之相應如賓主之相交也祐神者言有以祐助神化之功也卷內蔡氏説為奇者三為耦者二蓋凡初揲左手餘一餘二餘三皆為奇餘四為耦至再揲三揲則餘三者亦為耦故曰奇三而耦二也考變占第四乾卦用九見羣龍無首吉象曰用九天德不可為首也坤卦用六利永貞象曰用六永貞以大終也用九用六者變卦之凡例也言凡陽爻皆用九而不用七陰爻皆用六而不用八用九故老陽變為少陰用六故老陰變為少陽不用七八故少陽少陰不變獨於乾坤二卦言之者以其在諸卦之首又為純陽純陰之卦也聖人因繫以辭使遇乾而六爻皆九遇坤而六爻皆六者即此而占之蓋羣龍無首則陽皆變陰之象利永貞則陰皆變陽之義也餘見六爻變例歐陽子曰乾坤之用九用六何謂也曰乾爻七九坤爻八六九六變而七八無為易道占其變故以其所占者名爻不謂六爻皆九六也及其筮也七八常多而九六常少有無九六者焉此不可以不釋也六十四卦皆然特於乾坤見之則餘可知耳愚案此説發明先儒所未到最為有功其論七八多而九六少又見當時占法三變皆挂如一行説凡卦六爻皆不變則占本卦彖辭而以內卦為貞外卦為悔彖辭為卦下之辭孔成子筮立衛公子元遇屯曰利建侯秦伯伐晉筮之遇蠱曰貞風也其悔山也一爻變則以本卦變爻辭占沙隨程氏曰畢萬遇屯之比初九變也蔡墨遇乾之同人九二變也晉文公遇大有之睽九三變也陳敬仲遇觀之否六四變也南蒯遇坤之比六五變也晉獻公遇歸妹之睽上六變也集説胡氏一桂曰啓蒙謂一爻變則以本卦變爻辭占其下引畢萬所筮以今觀之未嘗不取之卦且不特論一爻兼取真悔卦體似可為占者法也觀陳宣公筮公子完之生尤可見矣二爻變則以本卦二變爻辭占仍以上爻為主經傳無文今以例推之當如此集説胡氏一桂曰案陳摶為宋太祖占亦旁及諸爻與卦體三爻變則占本卦及之卦之彖辭而以本卦為貞之卦為悔前十卦主貞後十卦主悔凡三爻變者通二十卦有圖在後沙隨程氏曰晉公子重耳筮得國遇貞屯悔豫皆八蓋初與四五凡三爻變也初與五用九變四用六變其不變者二三上在兩卦皆為八故云皆八而司空季子占之曰皆利建侯集説胡氏一桂曰案啓蒙但云占本卦之卦彖辭然以晉侯屯豫之占則并占卦體可見熊氏朋來曰七八皆不變爻何以罕言七而專言八曰七七蓍數也八八卦數也四爻變則以之卦二不變爻占仍以下爻為主經傳亦無文今以例推之當如此五爻變則以之卦不變爻占穆薑往東宫筮遇艮之八史曰是謂艮之隨蓋五爻皆變唯二得八故不變也法宜以係小子失丈夫為占而史妄引隨之彖辭以對則非也六爻變則乾坤占二用餘卦占之卦彖辭蔡墨曰乾之坤曰見羣龍無首吉是也然羣龍無首即坤之牝馬先迷也坤之利永貞即乾之不言所利也於是一卦可變六十四卦而四千九十六卦在其中矣所謂引而伸之觸類而長之天下之能事畢矣豈不信哉今以六十四卦之變列為三十二圖得初卦者自初而終自上而下得末卦者自終而初自下而上變在第三十二卦以前者占本卦爻之辭變在第三十二卦以後者占變卦爻之辭凡言初終上下者據圖而言言第幾卦前後者從本卦起乾姤同人履小畜大有夬遁訟巽鼎大過無妄家人離革中孚睽兌大畜需大壯否漸旅咸渙未濟困蠱井恆益噬嗑隨賁既濟豐損節歸妹泰觀晉萃艮蹇小過蒙坎解升頤屯震明夷臨剝比豫謙師復坤姤乾遁訟巽鼎大過同人履小畜大有夬否漸旅咸渙未濟困蠱井恆無妄家人離革中孚睽兌大畜需大壯觀晉萃艮蹇小過蒙坎解升益噬嗑隨賁既濟豐損節歸妹泰剝比豫謙師頤屯震明夷臨坤復同人遁乾無妄家人離革姤否漸旅咸履小畜大有夬益噬嗑隨賁既濟豐訟巽鼎大過觀晉萃良蹇小過中孚暌兌大畜需大壯頤屯震明夷渙未濟困蠱井恆剝比豫謙損節歸妹泰復蒙坎解升坤臨師履訟無妄乾中孚睽兌否姤渙未濟困同人益噬嗑隨小畜大有夬損節歸妹遁觀晉萃巽鼎大過蒙坎解家人離革頤屯震大畜需大壯臨漸旅咸剝比豫蠱井恆師賁既濟豐復泰艮蹇小過坤升明夷謙小畜巽家人中孚乾大畜需漸渙姤蠱井益同人賁既濟履損節大有夬泰觀遁艮蹇訟蒙坎鼎大過升無妄頤屯離革明夷睽兌臨大壯否剝比旅咸謙未濟困師恆噬嗑隨復豐歸妹晉萃坤小過解震豫大有鼎離睽大畜乾大壯旅未濟蠱姤恆噬嗑賁同人豐損履歸妹小畜泰夬晉艮遁小過蒙訟解巽升大過頤無妄震家人明夷革中孚臨兌需剝否豫漸謙咸渙師困井益復隨既濟節觀坤萃蹇坎屯比夬大過革兌需大壯乾咸困井恆姤隨既濟豐同人節歸妹履泰小畜大有萃蹇小過遁坎解訟升巽鼎屯震無妄明夷家人離臨中孚睽大畜比豫否謙漸旅師渙未濟蠱復益噬嗑賁損坤觀晉艮蒙頤剝遁同人姤否漸旅咸乾無妄家人離革訟巽鼎大過觀晉萃艮蹇小過履小畜大有夬益噬嗑隨賁既濟豐渙未濟困蠱井恆剝比豫謙中孚睽兌大畜需大壯頤屯震明夷蒙坎解升坤損節歸妹泰復師臨訟履否姤渙未濟困無妄乾中孚睽兌遁觀晉萃巽鼎大過蒙坎解同人益噬嗑隨小畜大有夬損節歸妹漸旅咸剝比豫蠱井恆師家人離革頤屯震大畜需大壯臨艮蹇小過坤升賁既濟豐復泰謙明夷巽小畜漸渙姤蠱井家人中孚乾大畜需觀遁艮蹇訟蒙坎鼎大過升益同人賁既濟履損節大有夬泰否剝比旅咸謙未濟困師恆無
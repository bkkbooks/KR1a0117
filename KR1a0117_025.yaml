為詳密而後學之疑義有二一曰筮法用九六不用七八今四爻五爻變者用之卦之不變爻占則是兼用七八也二曰周公未繫爻之先則彖辭之用有所不周也三代筮法既不盡傳今惟以經傳為據而推之則用九用六經文甚明而用七八者諸書皆無明文惟杜預以為夏商用之先儒已摘其非矣考之春秋內外傳蓋無論變與不變及變之多寡皆論卦之體象與其彖辭即一爻變者雖占爻辭而亦必先以卦之體象與其彖辭為主則知古人占法未有爻辭之先即彖辭而已周於用既有爻辭之後則但以専動者占而初亦不離乎彖辭以為斷也惟其一卦可變為六十四則兩卦相參而可以盡事物之理故卦之有變者意主於生卦不主於成爻爻之有變者專動則有占雜動則無占如是則傳記之文皆合而學者之疑可釋矣至內外傳言得八者三一曰泰之八則不變者也一曰貞屯悔豫皆八則三爻變者也一曰艮之八為艮之隨則五爻變者也諸儒以八為不動之爻考之文意似未符協蓋三占者雖變數不同然皆無専動之爻則其為用卦一也卦以八成故以八識卦猶之爻以九六成則以九六識爻云爾觀朱子之圖者更須以左傳國語諸書互相參考御纂周易折中卷二十

body:
  text: 欽定四庫全書御纂周易折中卷六坎下震上程傳解序卦蹇者難也物不可以終難故受之以解物無終難之理難極則必散解者散也所以次蹇也為卦震上坎下震動也坎險也動於險外出乎險也故為患難解散之象又震為雷坎為雨雷雨之作蓋隂陽交感和暢而緩散故為解解者天下患難解散之時也解利西南無所往其來復吉有攸往夙吉本義解難之散也居險能動則出於險之外矣解之象也難之既解利於平易安靜不欲久為煩擾且其卦自升來三往居四入於坤體二居其所而又得中故利於西南平易之地若無所往則宜來復其所而安靜若尚有所往則宜早往早復不可久煩擾也程傳西南坤方坤之體廣大平易當天下之難方解人始離艱苦不可復以煩苛嚴急治之當濟以寬大簡易乃其宜也如是則人心懷而安之故利於西南也湯除桀之虐而以寬治武王誅紂之暴而反商政皆從寬易也無所往其來復吉有攸往夙吉無所往謂天下之難已解散無所為也有攸往謂尚有所當解之事也夫天下國家必紀綱法度廢亂而後禍患生聖人既解其難而平安無事矣是無所往也則當修復治道正紀綱明法度進復先代明王之治是來復也謂反正理也天下之吉也其發語辭自古聖王救難定亂其始未暇遽為也既安定則為可久可繼之治自漢以下亂既除則不復有為姑隨時維持而已故不能成善治蓋不知衆復之義也有攸往夙吉謂尚有當解之事則早為之乃吉也當解而未盡者不早去則將復盛事之復生者不早為則將漸大故夙則吉也集說王氏弼曰解之為義解難而濟厄者也以解來復則不失中有難而往則以速為吉也無難則能復其中有難則能濟其厄也孔氏穎達曰褚氏云世有無事求功故誠以無難宜靜亦有待敗乃救故誡以有難須速也林氏栗曰蹇止乎坎中是以言利西南不利東北解動於險外是以但言西南之利不復言東北之不利也胡氏炳文曰解之時以平易為利略有苛急即非利以安靜為吉久為煩擾即非吉本義曰若無所往則宜來復其所而安靜是以安靜為吉也曰若有所往則宜早往早復不可久為煩擾亦以安靜為吉也本義兩若字未定之辭顧其時何如耳然其吉也皆在於來復案解之時異於蹇之時故其辭小異然處解之道猶然處蹇之道故其意大同言利西南不言不利東北是辭小異也然西南者退後也猶蹇所云來也東北者前進也偤蹇所謂往也今無事則來周以西南為利矣有事雖可以往而必以夙為吉不可以往而忘返也是猶不以東北為利而終以西南為利也其與處蹇之道意大同矣蓋國家無論有事無事皆以退而自修為本以爻義與卦相參皆可見矣初六無咎本義難既解矣以柔在下上有正應何咎之有故其占如此程傳六居解初患難既解之時以柔居剛以隂應陽柔而能剛之義既無患難而自處得剛柔之宜患難既解安寧無事唯自處得宜則為無咎矣方解之初宜安靜以休息之爻之辭寡所以示意集說郭氏雍曰處解之初得無所往其來復吉之義故無咎也胡氏炳文曰恆九二悔亡大壯九二貞吉解初六無咎三爻之占只二字其言甚簡象在爻中不復言也蔡氏清曰初六以柔在下則能安靜而不生事以自擾何咎之有案彖利西南者處後也初應剛承剛而處其後得卦義矣義明故辭寡九二田獲三狐得黃矢貞吉本義此爻取象之意未詳或曰卦凡四隂除六五君位餘三隂即三狐之象也大抵此爻為卜田之吉占亦為去邪媚而得中直之象能守其正則無不吉矣程傳九二以陽剛得中之才上應六五之君用於時者也天下小人常衆剛明之君在上則明足以照之威足以懼之剛足以斷之故小人不敢用其情然猶常存警戒慮其有閒而害正也六五以隂柔居尊位其明易蔽其威易犯其斷不果而易惑小人一近之則移其心矣況難方解而治之初其變尚易二既當用必須能去小人則可以正君心而行其剛中之道田者去害之事狐者邪媚之獸三狐指卦之三隂時之小人也獲謂能變化除去之如田之獲狐也獲之則得中直之道乃貞正而吉也黃中色矢直物黃矢謂中直也羣邪不去君心一入則中直之道無由行矣桓敬之不去武三思是也集說楊氏萬里曰當解之時此爻欲其獲狐三戒其致寇四欲其解拇五欲其退小人六欲其射隼一卦六爻而去小人之象居其五然則召天下多雖者誰乎人君亦何利於天下之多難而樂於近小人以疏君子哉王氏應麟曰世之治也君子以直勝小人之邪易曰曰獲三狐得黃矢世之亂也小人以狡勝君子之介詩曰有爰爰雉離于羅何氏楷曰天下之難率自小人始欲解天下之難者必有以處小人然後可然非柔者所能辦又非剛而過者所能辦也九二以陽居隂秉剛中之德果而不激故有田獲三狐之象黃矢所以取狐狐獲則黃矢亦得矣六三負且乘致寇至貞吝本義繫辭備矣貞吝言雖以正得之亦可羞也唯避而去之為可免耳程傳六三隂柔居下之上處非其位猶小人宜在下以負荷而且乘車非其據也必致寇奪之至雖使所為得正亦可鄙吝也小人而竊盛位雖勉為正事而氣質卑下本非在上之物終可吝也若能大正則如何曰大正非隂柔所能也若能之則是化為君子矣三隂柔小人宜在下而反處下之上猶小人宜負而反乘當致寇奪也難解之時而小人竊位復致寇矣集說孔氏穎達曰乘者君子之器也負者小人之事也施之於人即在車騎之上而負物也故寇盜知其非己所有於是競欲奪之胡氏瑗曰六三以不正之質居至貴之地是小人在君子之位也故致寇盜之至為害於己而奪取之然而小人得在高位者蓋在上之人慢其名器不辨賢否而與之以至為衆人所奪而致寇戎之害也案繫辭傳釋此爻云盜斯奪之者奪負乘之人也又云盜斯伐之者非伐負乘之人乃伐上慢下暴之國家也蓋上䙝其名器則是上慢如慢藏之誨盜下肆其貪竊則是下暴如冶容之誨淫夫是以賊民興而國家受其害難又將何時而解乎九四解而拇朋至斯孚本義拇指初初與四皆不得其位而相應應之不以正者也然四陽初隂其類不同若能解而去之則君子之朋至而相信矣程傳九四以陽剛之才居上位承六五之君大臣也而下與初六之隂為應拇在下而微者謂初也居上位而親小人則賢人正士遠退矣斥去小人則君子之黨進而誠相得也四能薢去初六之隂柔則陽剛君子之朋來至而誠合矣不解去小人則己之誠未至安能得人之孚也初六其應故謂遠之為解集說劉氏牧曰拇謂初也居下體之下而應於己故曰拇何氏楷曰解去小人之卦也卦惟二四兩陽爻皆任解之責者而汝也拇足大指也九四居近君之位苟昵近比之小人而不解則君子之朋雖至彼必肆其離閒之術矣六五君子維有解吉有孚于小人本義卦凡四隂而六五當君位與三隂同類者必解而去之則吉也孚驗也君子有解以小人之退為驗也程傳六五居尊位為解之主人君之解也以君子通言之君子所親比者必君子也所解去者必小人也故君子維有解則吉也小人去則君子進矣吉孰大焉有孚者世云見驗也可驗之於小人小人之黨去則是君子能有解也小人去則君子自進正道自行天下不足治也集說鄭氏汝諧曰益之戒曰任賢勿二去邪勿疑如使世之小人皆信上之所用者必君子而所解者必小人則必改心易慮不復有投隙抵巇之望惟未孚於小人此小人所以猶有覬幸之心也五解之主也以其隂柔故有戒意胡氏炳文曰卦惟四五言解四能解小人可以來君子五能解小人亦可驗其能為君子案鄭氏說有孚于小人與傳義異而其理尤精蓋朋至斯孚者君子信之也有孚于小人者小人亦信之也君子信故樂於為善小人信故化而不為惡往往國家有舉錯而小人未革心者未信之也信則枉者直而不仁者遠矣上六公用射隼于高墉之上獲之無不利本義繫辭備矣程傳上六尊高之地而非君位故曰公但據解終而言也隼鷙害之物象為害之小人墉墻內外之限也害若在內則是未解之時也若出墉外則是無害矣復何所解故在墉上離乎內而未去也云高見防限之嚴而未去者上解之極也解極之時而獨有未解者乃害之堅強者也上居解極解道已至器已成也故能射而獲之既獲之則天下之患解已盡矣何所不利夫子於繫辭復伸其義曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也鷙害之物在墉上苟無其器與不待時而發則安能獲之所以解之之道器也事之當解與已解之之道至者時也如是而動故無括結發而無不利矣括結謂阻礙聖人於此發明藏器待時之義夫行一身至於天下之事苟無其器與不以時而動小則括塞大則喪敗自古喜有為而無成功或顛覆者皆由是也集說沈氏該曰隼之為物果於悖害者也墉所以衛內而限外也害在內小人在君側也出乎墉之外則非射之所能及高墉之上在內外之間據衛限之勢於此而射之則擬而後動動而不括獲之無不利矣在外卦之上射于高墉之象也鄭氏汝諧曰所謂公者非上六也言公於此爻當用射隼之道也隼指上之隂而言也墉指上之位而言也王氏申子曰隼指上以其柔邪謂之狐以其隂鷙謂之隼上以隂柔處震之極而居一卦之上是隂鷙而居高者解之既極尚何俟乎故獲之無不利案此言公用乃隨上離上王用之例皆非以本爻之位當王公也鄭氏王氏之說似可從或以解終言之而不指隼之為誰亦可蓋狐者邪而穴於城社在內之奸也隼者鷙而翔於坰野化外之悍也自二至五所以解內難者備矣於是而猶有外來之強猛乘高墉以射之動而有功矣何則內修者外攘之具所謂藏器於身待時而動者也前四爻所謂其來復吉此爻所謂有攸往夙吉也總論徐氏幾曰下三爻不言解上三爻言解所謂動而免乎險也兌下艮上程傳損序卦解者緩也緩必有所失故受之以損縱緩則必有所失失則損也損所以繼解也為卦艮上兌下山體高澤體深下深則上益高為損下益上之義又澤在山下其氣上通潤及草木百物是損下而益上也又下為兌說三爻皆上應是說以奉上亦損下益上之義又下兌之成兌由六三之變也上艮之成艮自上九之變也三本剛而成柔上本柔而成剛亦損下益上之義損上而益於下則為益取下而益於上則為損在人上者施其澤以及下則益也取其下以自厚則損也譬諸壘土損於上以培厚其基本則上下安固矣豈非益乎取於下以增上之高則危墜至矣豈非損乎故損者損下益上之義益則及是損有孚元吉無咎可貞利有攸往本義損減省也為卦損下卦上畫之陽益上卦上畫之隂損兌澤之深益艮山之高損下益上損內益外剝民奉君之象所以為損也損所當損而有孚信則其占當有此下四者之應矣程傳損減損也凡損抑其過以就義理皆損之道也損之道必有孚誠謂至誠順於理也損而順理則大善而吉所損無過差可貞固常行而利有所往也人之所損或過或不及或不常皆不合正理非有孚也非有孚則無吉而有咎非可貞之道不可行也集說吕氏大臨曰損之道不可以為正當損之時故曰可貞時損則損時益則益苟當其時無往而不可故損益皆利有攸往蔡氏清曰剝民奉君之義只可用之卦名其卦辭有孚元吉無咎可貞利有攸往只承損字泛說言損所當損人人皆可用不專指上之損下也益卦利有攸往利涉大川亦然豈專為益下之事乎曷之用二簋可用享本義言當損時則至薄無害程傳損者損過而就中損浮末而就本實也聖人以寧儉為禮之本故為損發明其義以享祀言之享祀之禮其文最繁然以誠敬為本多儀備物所以將飾其誠敬之心飾過其誠則為僞矣損飾所以存誠也故云曷之用二簋可用享二簋之約可用享祭言在乎誠而已誠為本也天下之害無不由末之勝也峻宇雕牆本於宫室酒池肉林本於飲食淫酷殘忍本於刑罰窮兵黷武本於征討凡人欲之過者皆本於奉養其流之遠則為害矣先王制其本者天理也後人流於末者人欲也損之義損人欲以復天理而已集說孔氏穎達曰曷之用二簋可用享者明行損之禮貴夫誠信不在於豐二簋至約可用享祭案彖辭自有孚以下泛說損所當損之義蔡氏之說極為得之蓋損益者時也時在當損不得不損惟以誠意為主而行之又得乎大善之吉則不但無咎而且可以為常道而利有所往矣舉一端以明之則如二簋薄祭固因乎時而節損者也然能積誠盡禮則可以致孝乎鬼神而推之凡事之當損者視此矣卦義以孚而行損程傳則因損以致孚略有不同也初九巳事遄往無咎酌損之本義初九當損下益上之時上應六四之隂輟所為之事而速往以益之無咎之道也故其象占如此然居下而益上亦當斟酌其淺深也程傳損之義損剛益柔損下益上也初以陽剛應於四四以隂柔居上位賴初之益者也下之益上當損己而不自以為功所益於上者事既已則速去之不居其功乃無咎也若享其成功之美非損己益上也於為下之道為有咎矣四之隂柔賴初者也故聽於初初當酌度其宜而損己以益之過與不及皆不可也集說孔氏穎逹曰損之為道損下益上如人臣欲自損己奉上然各有職掌若廢事而往咎莫大焉竟事速往乃得無咎酌損之者以剛奉柔初未見親也故須酌而減損之朱子語類云酌損之在損之初下猶可以斟酌也案孔氏說已事之義謂如學優而後從政之類於理亦精九二利貞征凶弗損益之本義九二剛中志在自守不肯妄進故占者利貞而征則凶也弗損益之言不變其所守乃所以益上也程傳二以剛中當損剛之時居柔而說體上應六五隂柔之君以柔說應上則失其剛中之德故戒所利在貞正也征行也離乎中則失其貞正而凶矣守其中乃貞也弗損益之不自損其剛貞則能益其上乃益之也若失其剛貞而用柔說適足以損之而已非損己而益上也世之愚者冇雖無邪心而唯知竭力順上為忠者蓋不知弗損益之之義也集說林氏希元曰九二在爻則為剛中在人事則為志在自守不肯妄進志在自守不肯妄進九二之貞也故占者利於守貞若征行則是變其所守而得凶矣夫自守而不妄進宜若無益於上矣然由是而啓時君尊德樂道之心止士大夫奔競之習其益於上也不少是弗損乃所以益之也桐江一絲繫漢九鼎清風高節披拂士習可當此爻之義六三三人行則損一人一人行則得其友本義下卦本乾而損上爻以益坤三人行而損一人也一陽上而一隂下一人行而得其友也兩相與則專三則雜而亂卦有此象故戒占者當致一也程傳損者損有餘也益者益不足也三人謂下三陽上三隂三陽同行則損九三以益上三隂同行則損上六以為三三人行則損一人也上以柔易剛而謂之損但言其減一耳上與三雖本相應由二爻升降而一卦皆成兩相與也初二二陽四五二隂同德相比三與上應皆兩相與則其志專皆為得其友也三雖與四相比然異體而應上非同行者也三人則損一人一人則得其友蓋天下無不二者一與二相對待生生之本也三則餘而當損矣此損益之大義也夫子又於繫辭盡其義曰天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也絪緼交密之狀天地之氣相交而密則生萬物之化醇醇謂醲厚醲厚猶精一也男女精氣交構則化生萬物惟精醇專一所以能生也一隂一陽豈可二也故三則當損吉專致乎一也天地之間當損益之明且大者莫過此也集說林氏希元曰此爻之辭兼舉六爻以三正是當損之爻乃卦之所以為損者故於此言之楊氏啓新曰人之相與惟其心之同而巳苟精神不孚意氣不貫則羣黨比周固三也即一人之異亦三也是皆不可以不損也苟精神相孚意氣相貫則二人同心固兩也即千百其朋亦兩也是皆不可以不得者也六四捐其疾使遄有喜無咎本義以初九之陽剛益已而損其隂柔之疾唯速則善戒占者如是則無咎也程傳四以隂柔居上與初之剛陽相應在損時而應剛能自損以從剛陽也損不善以從善也初之益四損其柔而益之以剛損其不善也故曰損其疾疾謂疾病不善也損於不善唯使之遄速則有喜而無咎人之損過唯患不速速則不致於深過為可喜也集說王氏弼曰履得其位以柔納剛能損其疾也疾何可久故速乃有喜有喜乃無咎也蘇氏軾曰遄者初九也損其疾則初之從我也易故遄有喜楊氏萬里曰六四以柔居柔得初九之陽以為應損其疾者也初言遄往四言使遄蓋初之遄實四有以使之也胡氏炳文曰六四與初九為應初方巳其事而速於益四四損其隂柔之疾惟速則有喜不然彼方汲汲此乃悠悠非受益之道又曰下損巳以益上當使下亦速冇所喜乃無咎案蘇氏楊氏說於使字語氣亦近是六五或益之十朋之龜弗克違元吉本義柔順虛中以居尊位當損之時受天下之益者也兩龜為朋十朋之龜大寶也或以此益之而不能辭其吉可知占者有是德則獲其應也程傳六五於損時以中順居尊位虛其中以應乎二之剛陽是人君能虛中自損以順從在下之賢也能如是天下孰不損巳自盡以益之故或有益之之事則十朋助之矣十衆辭龜者決是非吉凶之物衆人之公論必合正理雖龜策不能違也如此可謂大善之吉矣古人曰謀從衆則合天心集說張子曰龜弗能違言受益之可必信然不疑也楊氏時曰柔得尊位虛已而下人則謙受益時乃天道天且不違況於人乎況於鬼神乎宜其益之者至矣故曰或益之十朋之龜弗克違元吉郭氏雍曰益之至豈獨人事而已雖元龜之靈弗能違此其所以元吉也洪範曰汝則從龜從筮從卿士從庶民從是之謂大同六五之元吉猶洪範之大同也楊氏簡曰或者不一之辭益之者不一也人心歸之也十朋之龜皆從而弗違天與鬼神祐之也鬼神祐之故龜筮協從上九弗損益之無咎貞吉利有攸往得臣無家本義上九當損下益上之時居卦之上受益之極而欲自損以益人也然居上而益下有所謂惠而不費者不待損已然後可以益人也能如是則無咎然亦必以正則吉而利有所往惠而不費其惠廣矣故又曰得臣無家程傳凡損之義有三損巳從人也自損以益於人也行損道以損於人也損巳從人徙於義也自損益人及於物也行損道以損於人行其義也各因其時取大者言之四五二爻取損巳從人下體三爻取自損以益人損時之用行損道以損天下之當損者也上九則取不行其損為義九居損之終損極而當變者也以剛陽居上若用剛以損削於下非為上之道其咎大矣若不行其損變而以剛陽之道益於下則無咎而得其正且吉也如是則宜有所往往則有益矣在上能不損其下而益之天下孰不服從從服之衆無有內外也故曰得臣無家得臣謂得人心歸服無家謂無有遠近內外之限也集說王氏肅曰處損之極損極則益故曰不損益之得臣則萬方一軌故無家也句氏微曰上九剛德為物所歸雖曰得臣非已所有蓋以四海為家朱子語類云得臣有家其所得也小矣無家則可見其大案卦以損三益上成義則上者受益之極卦之主也故無咎可貞利有攸往之辭皆與卦同其不言有孚元吉者弗損於下而有益於已此非有至誠仁愛之心者不能也蓋黎民之生厚則所以固本寧邦者至矣仁義之俗成則其有遺親後君者鮮矣其為益孰大於是然其不損於下者乃所以自損於已也此所以合乎卦義有孚元善之德也得臣無家則又極言弗損之規模與夫獲益之氣象自其弗損之心而言之為天下君而不自利於己自其得益之量而言之莫匪王臣而不視為私屬皆所謂得臣無家王道之至也蓋五上二爻相蒙為義五之虛中既已格乎鬼神而獲元吉則彖所謂有孚元吉者巳備故於此爻遂究其說以終其義也九二之弗損謂損己益之謂益人此爻之弗損謂損人益之謂益己辭同而指異者卦義損下益上故在下卦為自損在上卦為受益卦名以損下益上為義卦辭則泛論損所當損而損中有益也六爻之辭其以上下體分損益則根乎卦名其言損所當損而損中有益則又根乎卦辭震下巽上程傳益序卦損而不已必益故受之以益盛衰損益如循環損極必益理之自然益所以繼損也為卦巽上震下雷風二物相益者也風烈則雷迅雷激則風怒兩相助益所以為益此以象言也巽震二卦皆由下變而成陽變而為隂者損也隂變而為陽者益也上卦損而下卦益損上益下所以為益此以義言也下厚則上安故益下為益益利有攸往利涉大川本義益增益也為卦損上卦初畫之陽益下卦初畫之隂自上卦而下於下卦之下故為益卦之九五六二皆得中正下震上巽皆木之象故其占利有所往而利涉大川也程傳益者益於天下之道也故利有攸往益之道可以濟險難利涉大川也集說孔氏穎達曰損卦則損下益上益卦則損上益下得名皆就下而不據上者向秀云明王之道志在惠下故取下謂之損與下謂之益陸氏贄曰損上益下曰益損下益上曰損約己而裕於人人必悅而奉上矣豈不謂之益乎上蔑人而肆諸已人必怨而畔上矣豈不謂之損乎范氏仲淹曰益上曰損損上曰益者何也益上則損下損下則傷其本也損上則益下益下則固其本也蔡氏清曰損下益上民貧則君不能獨富損道也故為損損上益下民富則君不能獨貧益道也故為益損則上下通一損益則上下通一益要知關於上者為多案彖辭與損同亦不專主損己惠下為義蓋益以興利故利以圖大事而濟大難天下事有動而後獲益者不可坐以需時也初九利用為大作元吉無咎本義初雖居下然當益下之時受上之益者也不可徒然無所報效故利用為大作必元吉然後得無咎程傳初九震動之主剛陽之盛也居益之時其才足以益物雖居至下而上有六四之大臣應於巳四巽順之主上能巽於君下能順於賢才也在下者不能有為也得在上者應從之則宜以其道輔於上作大益天下之事利用為大作也居下而得上之用以行其志必須所為大善而吉則無過咎不能元吉則不惟在已有咎乃纍乎上為上之咎也在至下而當大任小善不足以稱也故必元吉然後得無咎集說朱子語類云初九在下為四所任而大作者必盡善而後無咎若所作不盡善未免有咎也案卦以損四益初為義則初亦受益之極卦之主也故其辭亦與卦同利用為大作者即彖所謂利有攸往利涉大川也必大為益人之事然後可以自受其益非然則受大益者乃所以為大損矣凡易中言吉無咎者皆謂得吉而後可以免咎而損彖辭及此爻與萃四之辭為尤著六二或益之十朋之龜弗克違永貞吉王用享于帝吉本義六二當益下之時虛中處下故其象占與損六五同然爻位皆隂故以永貞為戒以其居下而受上之益故又為卜郊之吉占程傳六二處中正而體柔順有虛中之象人處中正之道虛其中以求益而能順從天下孰不願告而益之孟子曰夫苟好善則四海之內皆將輕千里而來告之以善夫滿則不受虛則來物理自然也故或有可益之事則衆朋助而益之十者衆辭衆人所是理之至當也龜者占吉凶辨是非之物言其至是龜不能違也永貞吉就六二之才而言二中正虛中能得衆人之益者也然而質本隂柔故戒在常永貞固則吉也求益之道非永貞則安能守也損之六五十朋之則元吉者蓋居尊自損應下之剛以柔而居剛柔為虛受剛為固守求益之至善故元吉也六二虛中求益亦有剛陽之應而以柔居柔疑益之未固也故戒能常永貞固則吉也王用享于帝吉如二之虛中而能永貞用以享上帝猶當獲吉況與人接物其意有不通乎求益於人有不應乎祭天天子之事故云王用也集說王氏逢曰為臣若是王者用之可享上帝郭氏雍曰或益之人益之也十朋之龜弗克違鬼神益之也王用享于帝吉天益之也天且弗違況於人與鬼神乎蘭氏廷瑞曰六二柔順受益之臣王用之可以享帝獲吉如成湯用伊尹而享天心太戊用伊陟而格上帝李氏簡曰王用享于帝吉猶言使之主祭而百神享之也鄭氏維嶽曰王用享帝言王用六二以享帝也古人一德克享天心又曰籲俊尊上帝案郭氏說於文意甚明益之者人也弗克違者鬼神也然必克當天心乃獲是應故損五象傳推本於自上祐而此爻辭又更有享於上帝之義也鄭氏謂王用六二以享帝者極是隨上升四其義皆同但彼云西山岐山而此云上帝者彼但言鬼神享之而已此爻上文既云朋龜弗違則鬼神其依之義已見故復推而上之至於上帝若山川之神則不大於蓍龜也六三益之用凶事無咎有孚中行告公用圭本義六三隂柔不中不正不當得益者也然當益下之時居下之上故有益之以凶事者蓋警戒震動乃所以益之也占者如此然後可以無咎又戒以有孚中行而告公用圭也用圭所以通信程傳三居下體之上在民上者也乃守令也居陽應剛處動之極居民上而剛決果於為益者也果於為益用之凶事則無咎凶事謂患難非常之事三居下之上在下當承禀於上安得自任擅為益乎唯於患難非常之事則可量宜應卒奮不顧身力庇其民故無咎也下專自任上必忌疾雖當凶難以義在可為然必有其孚誠而所為合於中道則誠意通於上而上信與之矣專為而無為上愛民之至誠固不可也雖有誠意而所為不合中行亦不可也圭者通信之物禮云大夫執圭而使所以申信也凡祭祀朝聘用圭玉所以通達誠信也有誠孚而得中道則能使上信之是猶告公上用圭玉也其孚能通逹於上矣在下而有為之道固當有孚中行又三隂爻而不中故發此義或曰三乃隂柔何得反以剛衆任事為義曰三質雖本隂然其居陽乃自處以剛也應剛乃志在乎剛也居動之極剛果於行也以此行益非剛果而何易以所勝為義故不論其本質也集說王氏安石曰以至誠而中行則不獨無咎可以成功圭者所以告成功也游氏酢曰益則吉矣而用凶事者所謂吉人凶其吉也三居下體之上當震之極不用凶事則高而危滿而溢矣朱子語類云益之用凶事猶書言用降我凶德嘉績于朕邦蔡氏淵曰凶事困心衡慮之事在一卦之中故三四皆曰中行蔡氏清曰當益之時槩當得益而居下之上乃危地也故獨為益之以凶事之象雖益之而以凶事雖凶事亦益之也所謂苦其心志行拂亂其所為所以動心忍性增益其所不能者也其功夫又在有孚中行上張氏振淵曰益不以美事而以凶事如投之艱難置之盤錯警戒震動之謂也無咎言可因是而遷善補過也下二句正言其所以無咎有孚者滌慮洗心誠於體國而不欺中行者履正奉公合於中道而不悖即此便是上通於君處猶告公而用圭以通信者然案此爻與損之六四相反對損四受下之益者此爻受上之益者然皆不言所益而曰疾曰凶事蓋三四凶懼之位也故其獲益亦與他爻不同在上位者而知損四之義則不以下之承奉為益而能匡其過能輔其所不逮者乃益也在下位者而知此爻之義則不以上之恩榮為益而試之諸艱投之以多難者乃益也然在損四則宜速以改過在此爻則宜緩以通誠乃有以為受益之地六四中行告公從利用為依遷國本義三四皆不得中故皆以中行為戒此言以益下為心而合於中行則告公而見從矣傳曰周之東遷晉鄭焉依蓋古者遷國以益下必有所依然後能立此爻又為遷國之吉占也程傳四當益時處近君之位居得其正以柔巽輔上而下順應於初之剛陽如是可以益於上也唯處不得其中而所應又不中是不足於中也故云若行得中道則可以益於君上告於上而獲信從矣以柔巽之體非有剛特之操故利用為依遷國為依依附於上也遷國順下而動也上依剛中之君而致其益下順剛陽之才以行其事利用如是也自古國邑民不安其居則遷遷國者順下而動也集說吳氏曰愼曰四正主於益下者然非君位不敢自專必告於公也中行則見從矣案此爻亦與損三相反對損三為卦之所損以益上者此爻為卦之所損以益下者故辭義相類損三無私交而與上同德乃可以益上此爻不專已而與上同德乃可以益下也用用六四也與六二王用之用同遷國大事也亦即卦之所謂利有攸往利涉大川者也九五有孚惠心勿問元吉有孚惠我德本義上有信以惠於下則下亦有信以惠於上矣不問而元吉可知程傳五剛陽中正居尊位又得六二之中正相應以行其益何所不利以陽實在中有孚之象也以九五之德之才之位而中心至誠在惠益於物其至善大吉不問可知故云勿問元吉人君居得致之位操可致之權苟至誠益於天下天下受其大福其元吉不假言也有孚惠我德人君至誠益於天下天下之人無不至誠愛戴以君之德澤為恩惠也集說王氏弼曰得位履尊為益之主者也為益之大莫大於信為惠之大莫大於心因民所利而利之焉惠而不費惠心者也信以惠心盡物之願固不待問而元吉以誠惠物物亦應之故曰有孚惠我德也吕氏祖謙曰人君但誠心惠民不須問民之感如此然後元吉民皆交孚而惠君之德也苟惠民而先問民之感不感是計功利非誠心惠民者也安能使民之樂應乎蔡氏清曰惠心惠下之心也惠我德下惠我之德也而皆有孚上感而下應也有孚之施於下者在我只為心自下之受此施者目之則為德矣實非有二也鄭氏維嶽曰損之六五受下之益者也益之九五益下者也損六五受益而獲元吉益九五但知民之當益而已勿問元吉也此惠心之出於有孚者也然上雖不望德於民而民固德其惠矣其德其惠亦出於冇孚也故曰王道本於誠意案勿問二字吕氏說是觀孔子象傳可見上九莫益之或擊之立心勿恆凶本義以陽居益之極求益不已故莫益而或擊之立心勿恆戒之也程傳上居無位之地非行益於人者也以剛處益之極求益之甚者也所應者隂非取善自益者也利者衆人所同欲也專欲益己其害大矣欲之甚則昏蔽而忘義理求之極則侵奪而致仇怨故夫子曰放於利而行多怨孟子謂先利則不奪不饜聖賢之深戒也九以剛而求益之極衆人所共惡故無益之者而或攻擊之矣立心勿恆凶聖人戒人存心不可專利云勿恆如是凶之道也所當速改也集說孔氏穎達曰上九處益之極益之過甚者也求益無厭怨者非一故曰莫益之或擊之也勿猶無也求益無已是立心無恆者也無恆之人必凶咎之所集案卦義損上益下則上者受損之極者也若以受損為克己利下亦可而爻義不然者蓋能克己利下則受益莫大焉不得云受損矣故損上以處損之終自損之極而得益為義此爻以處益之終自益之極而得損為義書云滿招損謙受益兩爻之意相備也總論熊氏良輔曰損益二卦皆以損陽益隂為義損自泰來者也益自否來者也天下之理未有泰而不否否而不泰亦未有損而不益益而不損者故泰居上經十一卦而損居下經十一卦泰否損益為上下經之對後天序易其微意蓋可識矣乾下兌上程傳夬序卦益而不已必決故受之以夬夬者決也益之極必決而後止理無常益益而不已已乃決也夬所以次益也為卦兌上乾下以二體言之澤水之聚也乃上於至高之處有潰決之象以爻言之五陽在下長而將極一隂在上消而將盡衆陽上進決去一隂所以為夬也夬者剛決之義衆陽進而決去一隂君子道長小人消衰將盡之時也夬揚干王庭孚號有厲告自邑不利即戎利有攸往本義夬決也陽決隂也三月之卦也以五陽去一隂决之而已然其決之也必正名其罪而盡誠以呼號其衆相與合力然亦尚有危厲不可安肆又當先治其私而不可專尚威武則利有所往也皆戒之之辭程傳小人方盛之時君子之道未勝安能顯然以正道決去之故含晦俟時漸圖消之之道今既小人衰微君子道盛當顯行之於公朝使人明知善惡故云揚于王庭孚信之在中誠意也號者命衆之辭君子之道雖長盛而不敢忘戒備故至誠以命衆使知尚有危道雖以此之甚盛決彼之甚衰若易而無備則有不虞之悔是尚有危理必有戒懼之心則無患也聖人設戒之意深矣君子之治小人以其不善也必以己之善道勝革之故聖人誅亂必先修已舜之敷文德是也邑私邑告自邑先自治也以衆陽之盛決於一隂力固有餘然不可極其剛至於太過太過乃如䝉上九之為寇也戎兵者強武之事不利即戎謂不宜尚壯武也即從也從戎尚武也利有攸往陽雖盛未極乎上隂雖微猶有未去是小人尚有存者君子之道有未至也故宜進而往也不尚剛武而其道益進乃夬之善也集說游氏酢曰揚于王庭誦言于上也孚號誕告于下也告自邑自近而及遠也胡氏炳文曰以五陽去一隂而彖為警戒危懼之辭不一蓋必揚于王庭使小人之罪明以至誠呼號其衆使君子之類合不可以小人之衰而遂安肆也有危道焉不可以君子之盛而事威武也有自治之道焉復利往往而為臨為泰為夬也夬利往往而為乾也蓋隂之勢雖微蔓或可滋窮或為敵君子固無時不戒懼尤不可於小人道衰之時忘戒懼也案以彖傳觀之則揚于王庭者聲罪正辭也孚號有厲者警戒危懼也有厲不指時事謂其心之憂危也夫既曰揚于王庭矣則所宣告者衆而治之務於武斷矣而又曰告自邑不利即戎意似相反何也曰雖宣告者衆而其本則在于自修雖治之貴剛而神武則存乎不殺也蓋告自邑不利即戎是終孚號有厲之意利有攸往是終揚于王庭之意初九壯于前趾往不勝為咎本義前猶進也當決之時居下任壯不勝宜矣故其象占如此程傳九陽爻而乾體剛健在上之物乃在下而居決時壯于前進者也前趾謂進行人之決於行也行而宜則其決為是往而不宜則決之過也故往而不勝則為咎也夬之時而往往決也故以勝負言九居初而壯於進躁於動者也故有不勝之戒隂雖將盡而已之躁動自宜有不勝之咎不計彼也集說蘇氏軾曰大壯之長則為夬故夬之初九與大壯之初九無異朱子語類云壯于前趾與大壯初爻同此卦大率似大壯只爭一畫蔡氏清曰其不勝者自為不勝也故曰為咎明非時勢不利也九二惕號莫夜有戎勿恤本義九二當決之時剛而居柔又得中道故能憂惕號呼以自戒備而莫夜有戎亦可無患也程傳夬者陽決隂君子決小人之時不可忘戒備也陽長將極之時而二處中居柔不為過剛能知戒備處夬之至善也內懷兢惕而外嚴誠號雖莫夜有兵戎亦可勿恤矣集說張子曰警懼中號能孚號而有厲也以必勝之剛決至危之柔能自危厲雖有戎何恤蘇氏軾曰莫夜警也有戎勿恤靜也王氏中子曰彖言孚號而以有厲處之矣二剛得中而知戒懼故亦惕號蓋必如是而後可免小人乘閒抵隙之憂故雖莫夜隂伏之時有兵戎亦不足慮矣以防之密而備之素也吳氏曰愼曰剛中居柔能憂惕號呼即彖之孚號有厲告自邑不利即戎者也雖莫夜有戎而無憂案此爻辭有以惕號莫夜為句有戎勿恤為句者言莫夜人所忽也而猶惕號則所以警懼者素矣有戎人所畏也而不之恤則所以持重者至矣蓋即彖之所謂孚號有厲不利即戎者也夫惟無事而惕號故有事而能勿恤史稱終日欽欽如對大敵及臨陳則志氣安閒若不欲戰者是也此卦當以九五為卦主而彖辭之意獨備於九二者蓋九二遠隂主於平時則發孚號告邑不利即戎之義九五近隂主於臨事則發揚于王庭利有攸往之義然其為中行中道則一也九三壯于頄有凶君子夬夬獨行遇雨若濡有慍無咎本義頄顴也九三當決之時以剛而過乎中是欲決小人而剛壯見於面目也如是則有凶道矣然在衆陽之中獨與上六為應若能果決其決不係私愛則雖合於上六如獨行遇雨至於若濡而為君子所慍然終必能決去小人而無所咎也溫嶠之於王敦其事類此程傳爻辭差錯安定胡公移其文曰壯于頄有凶獨行遇雨若濡有慍君子夬夬無咎亦未安也當云壯于頄有凶獨行遇雨君子夬夬若濡冇慍無咎夬決尚剛健之時三居下體之上又處健體之極剛果於決者也頄顴骨也在上而未極於上者也三居下體之上雖在上而未為最上上有君而自任其剛決壯于頄者也有凶之道也獨行遇雨三與上六為正應方羣陽共決一隂之時已若以私應之故不與衆同而獨行則與上六隂陽和合故云遇雨易中言雨者皆謂隂陽和也君子道長決去小人之時而已獨與之和其非可知唯君子處斯時則能夬夬謂夬其夬果決其斷也雖其私與當遠絶之若見濡汚有慍惡之色如此則無過咎也三健體而處正非必有是失也因此義以為教耳爻文所以交錯者由有遇雨字又有濡字故誤以為連也集說陸氏希聲曰當君子之世而應小人故外有沾汚之纍內有慍恨之心然後獲無咎者志冇存焉王氏安石曰九三乾體之上剛亢外見壯于頄者也夬夬者必乎夬之辭也應乎上六疑於汚也故曰若濡君子之所為衆人固不識若濡則有慍之者矣和而不同有夬夬之志焉何咎之有郭氏雍曰夬與大壯內卦三爻相類故初九九三言壯壯者小人用剛之事非大者之壯也二卦九三皆具君子小人二義故大壯曰小人用壯君子用罔而此曰壯于頄有凶君子夬夬是也以小人用壯言之則知壯于頄者小人之事也是以凶也唯君子明夬夬之義則終無咎矣朱子語類云君子之去小人不必悻悻然見於面目至於遇雨而為所濡濕雖為衆陽所慍然志在决隂故得無咎也蓋九三雖與上六為應而以剛居剛有能決之象故壯于頄則有凶而和柔以去之乃無咎蔡氏清曰大意為君子之去小人顧其本心何如耳本心果是要決小人則雖暫與之合而為善類之慍終必能決之而無咎不愈於壯于頄而有凶乎此所以貴於決而和也何氏楷曰上六為成兌之主澤上於天故稱雨以其適值而非本心也故稱遇本非濡也而迹類之故稱若或觀其跡而不察其心也故稱有慍九四臀無膚其行次且牽羊悔亡聞言不信本義以陽居隂不中不正居則不安行則不進若不與衆陽競進而安出其後則可以亡其悔然當決之時志在上進必不能也占者聞言而信則轉凶而吉矣牽羊者當其前則不進縱之使前而隨其後則可以行矣程傳臀無膚居不安也行次且進不前也次且進雖之狀九四以陽居隂剛決不足欲止則衆陽並進於下勢不得安猶臀傷而居不能安也欲行則居柔失其剛壯不能强進故其行次且也牽羊悔亡羊者羣行之物牽者挽拽之義言若能自強而牽挽以從羣行則可以亡其悔然既處柔必不能也雖使聞是言亦必不能信用也夫過而能改聞善而能用克已以從義唯剛明者能之在它卦九居四其失未至如此之甚在夬而居柔其害大矣集說方氏應祥曰牽羊之說木義謂讓羊使前而隨其後則羊乃衆君子之象若就兌羊之象言之則羊還是九四羊性善觸不至羸角不已聖人教以自牽其羊抑其很性則可以亡悔矣是亦壯頄有凶之意案臀者與隂相背之物也夬四姤三皆與隂連體而相背故皆以臀為象夫相背則勢猶和遠緩以處之可也若臀有膚則能安坐矣臀無膚喻四之不能安坐也不能安坐故次且而欲進所以然者不能白制其剛壯故也苟能制其剛壯如牽羊然則可亡其悔特恐當此時也聞持重之言而不信耳聖人於占戒之外又設為反辭者凡人有所憂畏瞻慮則受警戒也易時之可為勢之可乘一則恐失事機二則恐犯衆議是以聞言而多不信也牽羊方氏說善九五莧陸夬夬中行無咎本義莧陸今馬齒莧感隂氣之多者九五當決之時為決之主而切近上六之隂如莧陸然若決而決之而又不為過暴合於中行則無咎矣戒占者當如是也程傳五雖剛陽中正居尊位然切近於上六上六說體而卦獨一隂陽之所比也五為決隂之主而反比之其咎大矣故必決其決如莧陸然則於其中行之德為無咎也中行中道也莧陸今所謂馬齒莧是也曝之難乾感隂氣之多者也而脆易折五若如莧陸雖感於隂而決斷之易則於中行無過咎矣不然則失其中正也感隂多之物莧陸為易斷故取為象集說鄭氏汝諧曰莧陸本草云一名商陸其根至蔓雖盡取之而旁根復生小人之類難絶如此朱子語類云莧陸是兩物莧者馬齒莧陸者草陸一名商陸皆感隂氣多之物藥中用商陸治水腫其物難乾其子紅項氏安世曰夬夬者重夬也當夬者上六也三應之五比之嫌其不能夬也故皆以夬夬明之三謂之遇雨五謂之莧陸皆與隂俱行者也比於隂而能自決以保其中故可免咎案此言莧陸夬夬猶姤言包瓜皆以細草隂類喻小人也時當含章則包之時當揚庭則決之然其包之也以杞剛之體不失也其決之也以中行柔之用兼濟也上六無號終有凶本義隂柔小人居窮極之時黨類已盡無所號呼終必有凶也占者有君子之德則其敵當之不然反是程傳陽長將極隂消將盡獨一隂處窮極之地是衆君子得時決去危極之小人也其勢必須消盡故云無用號咷畏懼終必有凶也集說蘇氏軾曰無號者不警也陽不警則有以乘之矣楊氏簡曰柔已決去剛道已長然不可不敬戒苟忽焉不敬不戒不警號則亦終有凶雖未必凶遂至而既不警戒則放逸逸則失道矣失道者終於凶蔣氏悌生曰易為君子謀不為小人謀詳味此爻若如傳義說似為小人謀恐只依卦辭孚號有厲之意言雖是五陽決去一隂尚存為君子之計苟或默然養禍則其終必致凶聖人之情何當慮小人冇凶也總論徐氏幾曰夬決也以盛進之五剛決衰退之一柔其勢若甚易然而聖人不敢以易而忽之故於夬之一卦丁寧深切所以周防戒備者無所不至龔氏煥曰夬卦似大壯故諸爻多與大壯相似初之壯于趾三之壯于頄之類是也夬以五陽決一隂其壯甚矣聖人慮其夬決之過故於爻皆致戒而以陽居陽者為尤甚焉陽之決隂君子之去小人亦貴乎中而已矣案夬之與壯前三爻全相類是已後三爻先儒未詳說須知壯之當前者四也夬之當前者五也故壯四之藩決即夬五之夬夬若壯之六五則壯已過而非用壯之時夬之九四則夬未及而亦未可為果決之事故壯五之喪羊即夬四之牽羊也若壯上之艱夬上之號則戒之始終不忘危懼而已壯不如夬之盛故猶曰不能遂夬則可以遂矣然其危懼之心同也巽下乾上程傳姤序卦夬決也決必冇遇故受之以姤姤遇也決判也物之決判則有遇合本合則何遇姤所以次夬也為卦乾上巽下以二體言之風行天下天之下者萬物也風之行無不經觸乃遇之象又一隂始生於下隂與陽遇也故為姤姤女壯勿用取女本義姤遇也決盡則為純乾四月之卦至姤然後一隂可見而為五月之卦以其本非所望而卒然值之如不期而遇者故為遇遇已非正又一隂而遇五陽則女德不貞而壯之甚也取以自配必害乎陽故其象占如此程傳一隂始生自是而長漸以盛大是女之將長壯也隂長則陽消女壯則男弱故戒勿用取如是之女取女者欲其柔和順從以成家道姤乃方進之隂漸壯而敵陽者是以不可取也女漸壯則失男女之正家道敗矣姤雖一隂甚微然有漸壯之道所以戒也集說孔氏穎逹曰姤遇也此卦一柔而遇五剛故名為姤施之於人則是一女而遇五男為壯至甚故戒之曰此女壯甚勿用取此女也郭氏雍曰陽至四五而後言壯姤一隂方長即為壯者亦見君子小人之情不同也馮氏椅曰古文姤作遘遇也亦婚媾也以女遇男為象王洙易改為今文為姤雜卦猶是古文鄭本同胡氏炳文曰女壯諸家皆以為一隂有將盛之漸本義以為一隂當五陽已有女壯之象案女壯之義非以一隂始生於下為壯亦非以一隂獨當五陽為壯蓋卦以隂為主隂而為主即是壯也初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅本義柅所以止車以金為之其剛可知一隂始生靜正則吉往進則凶故以二義戒小人使不害於君子則有吉而無凶然其勢不可止也故以羸豕蹢躅曉君子使深為之備云程傳姤隂始生而將長之卦一隂生則長而漸盛隂長則陽消小人道長也制之當於其微而未盛之時柅止車之物金為之堅强之至也止之以金柅而又繫之止之固也固止使不得進則陽剛貞正之道吉也使之進往則漸盛而害於陽是見凶也羸豕孚蹢躅聖人重為之戒言隂雖甚微不可忽也豕隂躁之物故以為況羸弱之豕雖未能強猛然其中心在乎蹢躅蹢躅跳躑也隂微而在下可謂羸矣然其中心常在乎消陽也君子小人異道小人雖微弱之時未嘗無害君子之心防於微則無能為矣集說丘氏富國曰姤之所以為姤者在此一爻一隂始生非以金柅繫之則柔道何所牽制而不敢進繫之所以防之也胡氏炳文曰彖總一卦而言則以一隂而當五陽故於女為壯爻指一畫而言五陽之下一隂甚微故於豕為羸壯可畏也羸不可忽也案一隂窮於上衆以為無凶矣而曰終有凶防其後之辭也一隂伏於下衆未覺其凶矣而曰兄凶察於先之辭也隂陽消息循環無端能察於先即所以防其後能防其後即所以察於先也九二包有魚無咎不利賓本義魚隂物二與初遇為包有魚之象然制之在已故猶可以無咎若不制而使遇於衆則其為害廣矣故其象占如此程傳姤遇也二與初密比相遇者也在他卦則初正應於四在姤則以遇為重相遇之道主於專一二之剛中遇固以誠然初之隂柔羣陽在上而又有所應者其志所求也隂柔之質鮮克貞固二之於初難得其誠心矣所遇不得其誠心遇道之乖也包者苴裹也魚隂物之美者陽之於隂其所悅美故取魚象二於初若能固畜之如包苴之有魚則於遇為無咎矣賓外來者也不利賓包苴之魚豈能及賓謂不可更及外人也遇道當專一二則雜矣集說陸氏希聲曰不正之隂與剛中之二相比能包而有之使其邪不及於外李氏開曰剝之貫魚姤之包有魚皆能制隂者也胡氏炳文曰包如包苴之包容之於內而制之使不得逸於外也何氏楷曰包字與繫豕包瓜同意古之小人所以亂天下者往往君子激之也二曰包有魚則不視小人為異類而直以兼容之量包之既下邇之使近亦不激之使無所容其何咎焉案制隂之義不取諸九四之相應而取諸九二之相比者隂陽主卦皆以近比者為親切而處之又有中有不中焉故復六四之獨復亦不如六二休復之為美也夬五近上則有莧陸之嫌姤二比初獨不以隂邪為纍乎曰夬之隂其勢極矣如病之既劇如亂之已成非有以除去之不可姤則隂始生也如病將發如亂初萌豫防而早冶之則不至於盛長矣觀乎不利賓之戒未嘗不以隂邪之漸馴為諄諄也詩云敝笱在梁其魚魴鰥齊子歸止其從如雲是不能制之而使及賓之驗矣九三臀無膚其行次且厲無大咎本義九三過剛不中下不遇於初上無應於上居則不安行則不進故其象占如此然既無所遇則無隂邪之傷故雖危厲而無大咎也程傳二與初既相遇三說初而密比於二非所安也又為二所忌惡其居不安若臀之無膚也處既不安則當去之而居姤之時志求乎遇一隂在下是所欲也故處雖不安而其行則又次且也次且進難之狀謂不能遽舍也然三剛正而處巽有不終迷之義若知其不正而懷危懼不敢妄動則可以無大咎也非義求遇固已有咎矣知危而止則不至於大也集說李氏簡曰居則臀在下故困初六言臀行則臀在中故夬姤三四言臀案臀無膚之義與夬四同其行次且志欲制隂也非其位任而欲制之有危道焉然於義則無咎九四包無魚起凶本義初六正應已遇於二而不及於己故其象占如此程傳包者所裹畜也魚所美也四與初為正應當相遇者也而初已遇於二矣失其所遇猶包之無魚亡其所有也四當姤遇之時居上位而失其下下之離由已之失德也四之失者不中正也以不中正而失其民所以凶也曰初之從二以比近也豈四之罪乎曰在四而言義當有咎不能保其下由失道也豈有上不失道而下離者乎遇之道君臣民主夫婦朋友皆在焉四以下睽故主民而言為上而下離必有凶變起者將生之謂民心既離難將作矣集說吳氏曰愼曰九三以不遇隂而無大咎上九以不遇隂而無咎四則包無魚起凶何也蓋初六本其正應當遇而不遇故也案四與初正應當制隂之任者也然不能制之而為包無魚之象何也曰此與夬之九三同當決隂制隂之任而德非中正故一則剛壯而懷慍怒一則疾惡而胥絶遠無包容之量無制服之方故也以是爻德而適犯卦義取女之戒則其起凶宜矣書曰寬而有制有容德乃大又曰爾無忿疾于頑是包有魚無魚之所由分也九五以杞包瓜含章有隕自天本義瓜隂物之在下者甘美而善潰杞高大堅實之木也五以陽剛中正主卦於上而下防始生必潰之隂其象如此然隂陽迭勝時運之常若能含晦章美靜以制之則可以回造化矣有隕自天本無而倏有之象也程傳九五下亦無應非有遇也然得遇之道故終必有遇夫上下之遇由相求也杞高木而葉大處高體大而可以包物者杞也美實之在下者瓜也美而居下者側微之賢之象也九五尊居君位而下求賢才以至高而求至下猶以杞葉而包瓜能自降屈如此又其內蘊中正之德充實章美人君如是則無有不遇所求者也雖屈己求賢若其德不正賢者不屑也故必含蓄章美內積至誠則有隕自天矣猶云自天而降言必得之也自古人君至誠降屈以中正之道求天下之賢未有不遇者也高宗感於夢寐文王遇於漁釣皆由是道也集說胡氏炳文曰魚與瓜皆隂物二與初遇故包有魚五與初無相遇之道猶以高大之杞而包在地之瓜也然瓜雖始生而必潰九五陽剛中正能含晦章美靜以待之是雖隂陽消長時運之常而造化未有不可回者姤其將可轉而為復乎俞氏琰曰含即包之謂其初含蓄不露一旦瓜熟蒂脫自杞墜地故曰含章有隕自天林氏希元曰含章不是全無所事是用意周密不動聲色而自有以消患於方萌也案五為卦主而與隂無比應得卦勿用取女之義也夫與隂雖無比應而為卦主則有制隂之任焉故極言修德回天之道上九姤其角吝無咎本義角剛乎上者也上九以剛居上而無位不得其遇故其象占與九三類程傳至剛而在最上者角也九以剛居上故以角為象人之相遇由降屈以相從和順以相接故能合也上九高亢而剛極人誰與之以此求遇固可吝也已則如是人之遠之非他人之罪也由己致之故無所歸咎集說徐氏幾曰上九處姤之窮與初無遇雖吝然亦無咎隂不必遇也胡氏炳文曰九三以剛居下卦之上於初隂無所遇故雖厲而無大咎上九以剛居上卦之上於初隂亦不得其遇故雖吝而亦無咎遇本非正不遇不足為咎也案此爻亦與夬初反對皆與隂絶遠者也不與隂遇不能制隂故可吝然非其事任也故無咎此如避世之士不能救時而亦身不與亂者也坤下兌上程傳萃序卦姤者遇也物相遇而后聚故受之以萃萃者聚也物相㑹遇則成羣萃所以次姤也為卦兌上坤下澤上於地水之聚也故為萃不言澤在地上而云澤上於地則為方聚之義也萃亨王假有廟利見大人亨利貞用大牲吉利有攸往本義萃聚也坤順兌說九五剛中而二應之又為澤上於地萬物萃聚之象故為萃亨字衍文王假有廟言王者可以至乎宗廟之中王者卜祭之吉占也祭義曰公假于太廟是也廟所以聚祖考之精神又人必能聚己之精神則可以至於廟而承祖考也物既聚則必見大人而後可以得亨然又必利於正所聚不正則亦不能亨也大牲必聚而後有聚則可以有所往皆占吉而有戒之辭程傳王者萃聚天下之道至於有廟極也羣生至衆也而可一其歸仰人心莫知其鄉也而能致其誠敬鬼神之不可度也而能致其來格天下萃合人心總攝衆志之道非一其至大莫過於宗廟故王者萃天下之道至於有廟則萃道之至也祭祀之報本於人心聖人制禮以成其德耳故豺獺能祭其性然也萃下有亨字羡文也亨字自在下與渙不同渙則先言卦才萃乃先言卦義彖辭甚明天下之聚必得大人以治之人聚則亂物聚則爭事聚則紊非大人治之則萃所以致爭亂也萃以不正則人聚為苟合財聚為悖入安得亨乎故利貞萃者豐厚之時也其用宜稱故用大牲吉事莫重於祭故以祭享而言上交鬼神下接民物百用莫不皆然當萃之時而交物以厚則是享豐富之吉也天下莫不同其富樂矣若時之厚而交物以薄乃不享其豐美天下莫之與而悔吝生矣蓋隨時之宜順理而行故彖云順天命也夫不能有為者力之不足也當萃之時故利有攸往大凡興工立事貴得可為之時萃而後用是動而有裕天理然也集說程子曰萃渙皆立廟因其精神之萃而形於此為其渙散故立此以收之項氏安世曰卦名下元無亨字獨王肅本有王弼遂用其說孔子彖辭初不及此字趙氏汝騰曰陽居五而五隂從之為比陽居五與四而四隂從之為萃二卦相似然比者衆隂始附之初聖人作而萬物覩之時也萃者二陽相比羣隂萃而歸之君臣同德萬物盛多之時也龔氏煥曰假字疑當作昭假烈祖之假謂感格也王者致祭於宗廟以已之精神感格祖考之精神所以為萃也何氏楷曰用大牲吉承王假有廟言利有攸往承利見大人言案以彖傳觀之利見大人亨利貞為一事無疑王假有廟者神人之聚也利見大人者上下之聚也用大牲吉廣言羣祀由假廟而推之皆所以聚於神也利有攸往廣言所行由見大人而推之皆所以聚於人也初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎本義初六上應九四而隔於二隂當萃之時不能自守是有孚而不終志亂而妄聚也若呼號正應則衆以為笑但勿恤而往從正應則無咎矣戒占者當如是也程傳初與四為正應本有孚以相從者也然當萃時三隂聚處柔無守正之節若捨正應而從其類乃有孚而不終也乃亂惑亂其心也乃萃與其同類聚也初若守正不從號呼以求正應則一握笑之矣一握俗語一圑也謂衆以為笑也若能勿恤而往從剛陽之正應則無過咎不然則入小人之羣矣集說胡氏瑗曰號謂號咷也萃聚之世必上下相求和會然後必有所濟故始有號咷之怨終得與四萃聚而有歡笑也王氏宗傳曰初之於四相信之志疑亂而不一也然居萃之時上下相求若號焉四必說而應之則一握之頃變號咷而為笑樂矣謂得其所萃也故戒之曰勿恤又勉之曰往無咎姚氏舜牧曰初四相應此心本自相孚但孚須有終為善如有孚而不終則乃亂而乃萃矣萃其可亂乎哉若念有孚之當終而呼號以往從之則正應可合而無妄萃之咎矣錢氏志立曰萃與比同所異者多九四一陽耳比初無應曰有孚者一於五也萃初與四應曰有孚不終者有二陽焉不終於四也及此時而號以求萃可以破涕為笑同人先號咷而後笑者是也案胡氏王氏姚氏錢氏諸說皆於文義甚合蓋易中號笑二字每每相對也兩乃字不同上乃字虛字也下乃字猶汝也正如書而康而色上而字虛字也下而字猶汝也言有孚不終則必亂汝之所萃也其所以亂之故則錢氏得之矣握者手所執持以轉移之機也言能致誠迫切則一轉移之閒必有和合之喜故曰若號一握為笑六二引吉無咎孚乃利用禴本義二應五而雜於二隂之閒必牽引以萃乃吉而無咎又二中正柔順虛中以上應九五剛健中正誠實而下交故卜祭者有其孚誠則雖薄物亦可以祭矣程傳初隂柔又非中正恐不能終其孚故因其才而為之戒二雖隂柔而得中正故雖戒而微辭凡爻之辭關得失二端者為法為戒亦各隨其才而設也引吉無咎引者相牽也人之交相求則合相待則離二與五為正應當萃者也而相遠又在羣隂之閒必相牽引則得其萃矣五居尊位有中正之德二亦以中正之道往與之萃乃君臣和合也其所共致豈可量也是以吉而無咎也無咎者善補過也二與五不相引則過矣孚乃利用禴孚信之在中誠之謂也禴祭之簡薄者也菲薄而祭不尚備物直以誠意交於神明也孚乃者謂有其孚則可不用文飾專以至誠交於上也以禴言者謂薦其誠而已上下相聚而尚飾焉是未誠也蓋其中實者不假飾於外用禴之義也孚信者萃之本也不獨君臣之聚凡天下之聚在誠而已集說胡氏瑗曰君子之進不可自媒以苟媚其君而幸其時之寵榮也是故君子進用必須有道六二以隂居隂履得其中又上應九五中正之君必待其君援引於已然後往之此所以得吉而無咎也孚信也禴薄祭也君子之進必在乎誠信相交心志相接當萃聚之時誠信既著心志既通則可以不煩外飾其道得行矣孚信中立則雖禴之薄祭亦可通於神明也張子曰能自持不變引而後往吉乃無咎凡言利用禴皆誠素著白於幽明之際王氏宗傳曰彖以用大牲為吉而六二以用禴為利何也備物者王者所以隨其時有孚者人臣所以通乎上案彖言利見大人九五者卦之大人也六二應之得見大人之義矣然見大人者聚必以正故必待其引而從之乃吉而無咎蓋聚而不正則不亨也孚乃利用禴者言相聚之道以誠為本苟有明信雖用禴可祭矣況大牲乎亦根卦義而反其辭也易曰可用汲王明並受其福傳曰在下位不援上此引字是汲引之引非援引之引六三萃如嗟如無攸利往無咎小吝本義六三隂柔不中不正上無應與欲求萃於近而不得故嗟如而無所利唯往從於上可以無咎然不得其萃困然後往復得隂極無位之爻亦小可羞矣戒占者當近捨不正之强援而遠結正應之窮交則無咎也程傳三隂柔不中正之人也求萃於人而人莫與求四則非其正應又非其類是以不正為四所棄也與二則二自以中正應五是以不正為二所不與也故欲萃如則為人棄絶而嗟如不獲萃而嗟恨也上下皆不與無所利也唯往而從上六則得其萃為無咎也三與上雖非隂陽正應然萃之時以類相從皆以柔居一體之上又皆無與居相應之地上復處說順之極故得其萃而無咎也易道變動無常在人識之然而小吝何也三始求萃於四與二不獲而後往從上六人之動為如此雖得所求亦可小羞吝也集說吳氏澄曰與二隂萃於下而上無應故嗟嘆不得志雖無應而比近九四之陽苟能往而上求九四則可無咎俞氏琰曰萃之時利見大人三與五非應非比而不得其萃未免有嗟嘆之聲則無攸利矣既曰無攸利又曰往無咎三與四比則其往也捨四可乎三之從四四亦巽而受之故無咎第無正應而近比於四所聚非正有此小疵耳案以象傳觀之吳氏俞氏之說是也易例三四隔體無相從之義然亦有以時義而相從者隨三之係丈夫及此爻是也其不正而亦以時義相從者豫三咸三是也皆因九四有主卦之義者故然九四大吉無咎本義上比九五下比衆隂得其萃矣然以陽居隂不正故戒占者必大吉然後得無咎也程傳四當萃之時上比九五之君得君臣之聚也下比下體萃隂得下民之聚也得上下之聚可謂善矣然四以陽居隂非正也雖得上下之聚必得大吉然後為無咎也大為周遍之義無所不周然後為大無所不正則為大吉大吉則無咎也夫上下之聚固有不由正道而得者非理枉道而得君者自古多矣非理枉道而得民者蓋亦有焉如齊之陳恆魯之季氏是也然得為大吉乎得為無咎乎故九四必能大吉然後為無咎也集說房氏喬曰大吉謂匪躬盡瘁始終無玷可免專民之咎有謂立大功可免咎者非也項氏安世曰無尊位而得衆心故必大吉而後可以無咎如益之初九在下位而任厚事亦必元吉而後可以無咎也胡氏炳文曰比卦五隂皆比五之一陽萃四隂皆聚歸五與四之二陽五曰萃有位以見四之萃非有位也無尊位而得衆心非大吉安能無咎九五萃有位無咎匪孚元永貞悔亡本義九五剛陽中正當萃之時而居尊固無咎矣若有未信則亦修其元永貞之德而悔亡矣戒占者當如是也程傳九五居天下之尊萃天下之衆而君臨之當正其位修其德以陽剛居尊位稱其位矣為有其位矣得中正之道無過咎也如是而有不信而未歸者則當自反以修其元永貞之德則無思不服而悔亡矣元永貞者君之德民所歸也故比天下之道與萃天下之道皆在此三者王者既有其位又有其德中正無過咎而天下尚有未信服歸附者蓋其道未光大也元永貞之道未至也在修德以來之如苗民逆命帝乃誕敷文德舜德非不至也蓋有遠近昏明之異故其歸有先後既有未歸則當修德也所謂德元永貞之道也元首也長也為君德首出庶物君長羣生有尊大之義焉有主統之義焉而又恆永貞固則通於神明光於四海無思不服矣乃無匪孚而其悔亡也所謂悔志之未光心之未慊也集說王氏宗傳曰五萃之主也當萃之時為萃之主莫大於有其位尤莫大於有其道有是位而無是道則天下不我信者亦衆矣故曰匪孚謂天下之人容有言曰上之人但以位而萃我也而其道則未至也故必元永貞而後悔亡朱子語類問九五以陽剛中正當萃之時而居尊位安得又有匪孚曰此言有位而無德則雖萃而不能使人信故人有不信當修其元永貞之德而後悔亡也案萃九五居尊以萃羣隂與比略同卦象澤上於地與比象亦略同也故其元永貞之辭亦同元永貞悔亡即所謂原筮元永貞無咎也上六齎咨涕洟無咎本義處萃之終隂柔無位求萃不得故戒占者必如此而後可以無咎也程傳六說之主隂柔小人說高位而處之天下孰肯與也求萃而人莫之與其窮至於齎咨而涕洟也齎咨咨嗟也人之絶之由已自取又將誰咎為人惡絶不知所為則隕獲而至嗟涕真小人之情狀也集說方氏應祥曰此爻照後夫凶看比之上六以比之最後而凶萃之上六亦以萃之最後而有未安者故其憂懼若此此正所謂孤臣孽子也黃氏淳耀曰上乃孤孽之臣子也萃極將散而不得所萃乃不得於君親者齎咨涕洟四字乃極言怨艾求萃之情故終得萃而無咎案方氏黃氏之說得之蓋不止孤臣孽子乃放臣屏子之倫也方氏以比上相照亦是然比上直曰凶此則齎咨涕洟而無咎者比彖有後夫凶之辭故遂以上六當之此彖有利見大人之辭正與蹇卦同例故尚有積誠求萃之理也巽下坤上程傳升序卦萃者聚也聚而上者謂之升故受之以升物之積聚而益高大聚而上也故為升所以次於萃也為卦坤上巽下木在地下為地中生木木生地中長而益高為升之象也升元亨用見大人勿恤南征吉本義升進而上也卦自解來柔上居四內異外順九二剛中而五應之是以其占如此南征前進也程傳升者進而上也升進則有亨義而以卦才之善故元亨也用此道以見大人不假憂恤前進則吉也南征前進也集說代氏淵曰尊爻無此人故不云利見案卦直言元亨而無他辭者大有鼎也雖有他辭而非戒辭者升也歷選易卦惟此三者蓋大有與比相似然所比者隂也民也所有者陽也賢也鼎與井相似然往來井井者民也大烹以養者賢也升與漸相似然漸者賢之有所需待而進者也升者賢之無所阻礙而登者也易道莫大於尚賢而賢人得時之卦莫盛於此三者故其彖皆曰元亨而無戒辭也不曰利見大人而曰用見代氏之說得之初六允升大吉本義初以柔順居下巽之主也當升之時巽於二陽占者如之則信能升而大吉矣程傳初以柔居巽體之下又巽之主上承於九二之剛巽之至者也二以剛中之德上應於君當升之任者也允者信從也初之柔巽唯信從於二信二而從之同升乃大吉也二以德言則剛中以力言則當任初之隂柔又無應援不能自升從於剛中之賢以進是由剛中之道也吉孰大焉集說王氏申子曰以柔而升升之義也初以柔居下即木之升言之乃木之根故信其升之必達而獲大吉也何氏楷曰初六巽主居下猶木之根也而得地氣以滋之其升也允矣所以為升者巽也所以為巽者初也大吉孰如之案此允升允字當與晉之衆允同義蓋不獲上信友不可以升進也然晉三言衆允升初遂言允升則王氏何氏巽主木根之說是也九二孚乃利用禴無咎本義義見萃卦程傳二陽剛而在下五隂柔而居上夫以剛而事柔以陽而從隂雖有時而然非順道也以暗而臨明以剛而事弱若黽勉於事勢非誠服也上下之交不以誠其可以久乎其可以有為乎五雖隂柔然居尊位二雖剛陽事上者也當內存至誠不假文飾於外誠積於中則自不事外飾故曰利用禴謂尚誠敬也自古剛強之臣事柔弱之君未有不為矯飾者也禴祭之簡質者也云孚乃謂既孚乃宜不用文飾專以其誠感通於上也如是則得無咎以剛強之臣而事柔弱之君又當升之時非誠意相交其能免於咎乎集說張氏清子曰萃六二以中虛為孚而與九五應升九二以中實為孚而與六五應二爻虛實雖殊其孚則一也孚則雖用禴而亦利故二爻皆曰孚乃利用禴彖言剛中而應指此爻也案升晉之時以柔為善二剛而亦利者以其中也剛中有應是見大人者也故亦為升之利初言吉以君子得時之遇言也二言無咎以君子進身之道言也六四則兼之九三升虛邑本義陽實隂虛而坤有國邑之象九三以陽剛當升時而進臨於坤故其象占如此程傳三以陽剛之才正而且巽上皆順之復有援應以是而升如入無人之邑孰禦哉案諸爻皆有吉利之占三獨無之則升虛邑者但言其勇於進而無所疑畏耳方升之時故無凶咎之辭然終不如二五之中初四之順也九三過剛與柔以時升之義反故其辭非盡善六四王用亨于岐山吉無咎本義義見隨卦程傳四柔順之才上順君之升下順下之進已則止其所焉以隂居柔隂而在下止其所也昔者文王之居岐山之下上順天子而欲致之有道下順天下之賢而使之升進已則柔順謙恭不出其位至德如此周之王業用是而亨也四能如是則亨而吉且無咎矣四之才固自善矣復有無咎之辭何也曰四之才雖善而其位當戒也居近君之位在升之時不可復升升則凶咎可知故云如文王則吉而無咎也然處大臣之位不得無事於升當上升其君之道下升天下之賢已則止其分焉分雖當止而德則當升也道則當亨也盡斯道者其唯文王乎案卦義柔以時升六四初交上體又位在巽坤之閒有南征之象迫近尊位有見大人之義是爻之合於卦義者也在已者用之以見大人則吉為大人者用之以享神明則宜與隨上之義同皆言王用此人以享於山川也不曰西山而曰岐山避彖辭南征之文先儒或言岐山在周西南六五貞吉升階本義以隂居陽當升而居尊位必能正固則可以得吉而升階矣階升之易者程傳五以下有剛中之應故能居尊位而吉然質本隂柔必守貞固乃得其吉也若不能貞固則信賢不篤任賢不終安能吉也階所由而升也任剛中之賢輔之而升猶登進自階言有由而易也指言九二正應然在下之賢皆用升之階也能用賢則彚升矣集說李氏元量曰貞吉升階升而有序故以階言之謂賓主以揖遜而升者也王氏宗傳曰彖傳柔以時升蓋謂五也熊氏良輔曰以順而升如歷階然案升至五而極居坤地之中亦有南征之象焉乃卦之主也不取君象但為臣位之極者與晉漸之五同也升階須從李氏熊氏之說蓋古者賓主三揖三讓而後升階將上堂矣而猶退遜如此以況君子始終之進以禮者也升晉之所以必貴於柔順者以此升階之戒不在貞字之外乃發明貞吉之意爾上六冥升利于不息之貞本義以隂居升極昏冥不已者也占者遇此無適而利但可反其不已於外之心施之於不息之正而已程傳六以隂居升之極昏冥於升知進而不知止者也其為不明甚矣然求升不已之心有時而用於貞正而當不息之事則為宜矣君子於貞正之德終日乾乾自彊不息如上六不已之心用之於此則利也以小人貪求無已之心移於進德則何善如之集說石氏介曰已在升極是昧於升進之理若能知時消息但自消退不更求進乃利也徐氏之祥曰豫上樂極故冥豫升上進極故冥升案冥升與晉其角之義同皆進而不能退者也以其剛也故曰角以其柔也故曰冥利于不息之貞其戒亦與維用伐邑之義同皆勤於自治不敢以盛滿自居者也以其剛也故曰伐邑以其柔也故曰不息之貞坎下兌上程傳困序卦升而不已必困故受之以困升者自下而上自下升上以力進也不已必困矣故升之後受之以困也困者憊乏之義為卦兌上而坎下水居澤上則澤中有水也乃在澤下枯涸無水之象為困乏之義又兌以隂在上坎以陽居下與上六在二陽之上而九二陷於二隂之中皆隂柔掩於陽剛所以為困也君子為小人所掩蔽窮困之時也困亨貞大人吉無咎有言不信本義困者窮而不能自振之義坎剛為兌柔所掩九二為二隂所掩四五為上六所掩所以為困坎險兌說處險而說是身雖困而道則亨也二五剛中又有大人之象占者處困能亨則得其正矣非大人其孰能之故曰貞人曰大人者明不正之小人不能當也有言不信又戒以當務晦默不可尚口益取窮困程傳如卦之才則困而能亨且得貞正乃大人處困之道也故能吉而無咎大人處困不唯其道自吉樂天安命乃不失其吉也況隨時善處愎有裕乎有言不信當困而言人誰信之集說孔氏穎達曰困者窮厄委頓之名道窮力竭不能自濟故名為困小人遭困則窮斯濫矣君子遇之則不改其操處困而不失其自通之道故曰困亨處困而能自通必是履正體大之人能濟於团然後得吉而無咎故曰貞大人吉無咎處困求濟在於正身修德若巧言飾辭人所不信則其道彌窮故誠之以有言不信也案困亨者非謂處困而能亨也蓋困窮者所以動人之心忍人之性因屈以致伸有必通之理也然惟守正之夫人則能進德於困而得其所以可通者爾豈小人之所能乎困者君子道屈之時也屈則不伸矣有言不信信字疑當作伸字解蓋有言而動見沮抑乃是困厄之極不特人疑之而不信也夬卦聞言不信已不信人之言也而夫子以聰不明解之以信字對聰字則信字當為疑信之信此卦有言不信人不行已之言也而夫子以尚口乃窮解之以信字對窮字則信字當為屈伸之伸初六臀困于株木入于幽谷三歲不覿本義臀物之底也困于株木傷而不能安也初六以隂柔處困之底居暗之甚故其象占如此程傳六以隂柔處於至卑又居坎險之下在困不能自濟者也必得在上剛明之人為援助則可以濟其困矣初與四為正應九四以陽而居隂為不正失剛而不中又方困於隂掩是惡能濟人之困猶株木之下不能䕃覆於物株木無枝葉之木也四近君之位在他卦不為無助以居困而不能庇物故為株木臀所以居也臀困于株木謂無所庇而不得安其居居安則非困也入于幽谷隂柔之人非能安其所遇既不能免於困則益迷暗妄動入於深困幽谷深暗之所也方益入於困無自出之勢故至於三嵗不覿終困者也不覿不遇其所亨也集說項氏安世曰初六在坎下故為入于幽谷即坎初爻入于坎窞也張氏清子曰人之體行則趾為下坐則臀為下初六困而不行此坐困之象也案詩云出于幽谷遷于喬木初不能自遷于喬木而惟坐困株木之下則有愈入于幽谷而已隂柔處困之最下故其象如此在人則卑暗窮陋而不能自拔者言臀者況其坐而不遷也九二困于酒食朱紱方來利用亨祀征凶無咎本義困于酒食厭飫苦惱之意酒食人之所欲然醉飽過宜則是反為所困矣朱紱方來上應之也九二有剛中之德以處困時雖無凶害而反困於得其所欲之多故其象如此而其占利以享祀若征行則非其時故凶而於義為無咎也程傳酒食人所欲而所以施惠也二以剛中之才而處困之時君子安其所遇雖窮厄險難無所動其心不恤其為困也所困者唯困於所欲耳君子之所欲者澤天下之民濟天下之困也二未得遂其欲施其惠故為困于酒食也大人君子懷其道而困於下必得有道之君求而用之然後能施其所藴二以剛中之德困於下上有九五剛中之君道同德合必來相求故云朱紱方來方來方且來也朱紱王者之服蔽膝也以行來為義故以蔽膝言之利用享祀享祀以至誠通神明也在困之時利用至誠如享祀然其德至誠自能感通於上自昔賢哲困於幽遠而德卒升聞道卒為用者唯自守至誠而已征凶無咎方困之時若不至誠安處以俟命往而求之則犯難得凶乃自取也將誰咎乎不度時而征乃不安其所為困所動也失剛中之德自取凶悔何所怨咎諸卦二五以隂陽相應而吉唯小畜與困乃厄於隂故同道相求小畜陽為隂所畜困陽為隂所掩也集說石氏介曰朱紱祭服謂可衣朱紱而享宗廟也征凶既在險中何可以行無咎以其居陽明之德可以無咎案小人以身窮為困君子以道窮為困卦之三陽所謂君子也所困者非身之窮乃道之窮也故二五則紱服榮於躬四則金車寵於行然而道之不通則其榮寵也適以為困而已矣然榮寵亦非無故而來神明之意必有在焉惟竭誠以求當神明之意則終有通時矣故雖當困之時征行必凶而其要無咎也用享祀者謂服此朱紱用此酒食以享之喻所得之爵祿不敢以之自奉而以為竭誠盡職之其也書曰豫不敢宿則禋于文王武王意義相近六三困于石據于蒺藜入于其宮不見其妻凶本義隂柔而不中正故有此象而其占則凶石指四蒺藜指二宫謂三而妻則六也其義則繫辭備矣程傳六三以隂柔不中正之質處險極而用剛居陽用剛也不善處困之甚者也石堅重難勝之物蒺藜刺不可據之物三以剛險而上進則二陽在上力不能勝堅不可犯益自困耳困于石也以不善之德居九二剛中之上其不安猶藉刺據于蒺藜也進退既皆益困欲安其所益不能矣宮其居所安也妻所安之主也知進退之不可而欲安其居則失其所安矣進退與處皆不可唯死而已其凶可知繫辭曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪二陽不可犯也而犯之以取困是非所困而困也名辱其事惡也三在二上固為據之然苟能謙柔以下之則無害矣乃用剛險以乘之則不安而取困如據蒺藜也如是死期將至所安之主可得而見乎案三隂皆非能處困者初在下坐而困者也三居進退之際行而困者也傷於外者必反其家而又無所歸甚言妄行取困其極如此九四來徐徐困于金車吝有終本義初六九四之正應九四處位不當不能濟物而初六方困於下又為九二所隔故其象如此然邪不勝正故其占雖為可吝而必有終也金車為九二象未詳疑坎有輪象也程傳唯力不足故困亨困之道必由援助當困之時上下相求理當然也四與初為正應然四以不中正處困其才不足以濟人之困初比二二有剛中之才足以拯困則宜為初所從矣金剛也車載物者也二以剛在下載已故謂之金車四欲從初而阻於二故其來遲疑而徐徐是困于金車也已之所應疑其少已而之它將從之則猶豫不敢遽前豈不可羞吝乎有終者事之所歸者正也初四正應終必相從也寒士之妻弱國之臣各安其正而已苟擇勢而從則惡之大者不容於世矣二與四皆以陽居隂而二以剛中之才所以能濟困也居隂者尚柔也得中者不失剛柔之宜也集說胡氏瑗曰徐徐者舒緩不敢決進也案來徐徐者喻君子當困時不欲上進也困于金車者招我以車不容不來也如是則可羞吝矣然上近九五之剛中正乃卦所謂大人者與之同德終有亨道九五劓刖困于赤紱乃徐有說利用祭祀本義劓刖者傷於上下上下既傷則赤紱無所用而反為困矣九五當困之時上為隂掩下則乘剛故有此象然剛中而說體故能遲久而有說也占具象中又利用祭祀久當獲福程傳截鼻曰劓傷於上也去足為刖傷於下也上下皆掩於隂為其傷害劓刖之象也五君位也人君之困由上下無與也赤紱臣下之服取行來之義故以紱言人君之困以天下不來也天下皆來則非困也五雖在困而有剛中之德下有九二剛中之賢道同德合徐必相應而來共濟天下之困是始困而徐有喜說也利用祭祀祭祀之事必致其誠敬而後受福人君在困時宜念天下之困求天下之賢若祭祀然致其誠敬則能致天下之賢濟天下之困矣五與二同德而云上下無與何也曰隂陽相應者自然相應也如夫婦骨肉分定也五與二皆陽爻以剛中之德同而相應相求而後合者也如君臣朋友義合也方其始困安有上下之與有與則非困故徐合而後有說也二云享祀五云祭祀大意則宜用至誠乃受福也祭與祀享泛言之則可通分而言之祭天神祀地示享人鬼五君位言祭二在下言享各以其所當用也集說王氏應麟曰困九五曰利用祭祀李公晦謂明雖困於人而幽可感於神豈不以人不能知而鬼神獨知之乎愚謂孔子云知我者其天乎韓子云惟乖於時乃與天通不求人知而求天知處困之道也案九五不取君象但取位高而益困者耳其象與九二同但二則朱紱方將來五則高位而已困于赤紱矣乃徐有說者五兌體故能從容以處之而有餘裕也利用祭祀之義亦與二同上六困于葛藟于臲卼曰動悔有悔征吉本義以隂柔處困極故有困于葛藟于臲卼曰動悔之象然物窮則變故其占曰若能有悔則可以征而吉矣程傳物極則反事極則變困既極矣理當變矣葛藟纏束之物臲卼危動之狀六處困之極為困所纏束而居最高危之地困于葛藟與臲卼也動悔動輒有悔無所不困也有悔咎前之失也曰自謂也若能曰如是動皆得悔當變前之所為有悔也能悔則往而得吉也困極而征則出於困矣故吉三以隂在下卦之上而凶上居一卦之上而無凶何也曰三居剛而處險困而用剛險故凶上以柔居說唯為困極耳困極則有變困之道也困與屯之上皆以無應居卦終屯則泣血漣如困則有悔征吉屯險極而困說體故也以說順進可以離乎困也集說項氏安世曰此彖所謂尚口乃窮也若能斷葛藟而不牽辭臲卼而不居行而去之吉孰加焉易氏祓曰陽剛不可終困而二四五皆不言吉隂柔未免乎困而上獨言吉者困極則變如否之有泰雖險而終濟也徐氏幾曰震無咎者存乎悔困已極矣有悔則可出困而征吉困窮而通其謂是夫吳氏曰愼曰困非自己致而時勢適逄者則當守其剛中之德是謂困而不失其所亨也其道主於貞若困由已之柔暗而致者則當變其所為以免於困也其道主於悔學者深察乎此則處困之道異宜而各得矣案處困貴於說而上說之主也故雖當困極而尚有征吉之占異乎初與三之坐困行塞者也然為兌主則又有尚口之象尚口則支離繳繞如困于葛藟然將且臲卼不安而失其所為說矣故必悔悟而離去之則吉總論龔氏煥曰卦以柔掩剛而為困主乎陽而言也而隂之困為尤甚彖傳曰困而不失其所亨其惟君子乎三剛爻之謂矣御纂周易折中卷六
